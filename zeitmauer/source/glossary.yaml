# Working glossary for recurring terms.
# `preferred` can remain null while the term is still unstable.

- term: "An der Zeitmauer"
  kind: title
  preferred: null
  alternatives:
    - "At the Time Wall"
    - "On the Time Wall"
    - "By the Time Wall"
  status: open
  notes: "Keep the German title at project level until the metaphor settles across later sections."

- term: "Fremde Vögel"
  kind: section_title
  preferred: "Strange Birds"
  alternatives:
    - "Foreign Birds"
  status: tentative
  notes: "The section treats migratory birds as omens or indicators, not merely exotic species."

- term: "Meßbare und Schicksalszeit"
  kind: section_title
  preferred: "Measurable Time and Fateful Time"
  alternatives:
    - "Measurable Time and Destinal Time"
    - "Measured Time and Time of Destiny"
  status: tentative
  notes: "Still workable after §§4-6. The surrounding fate-compounds keep the register elevated without forcing `destinal` yet."

- term: "Schicksalszeit"
  kind: concept
  preferred: "fateful time"
  alternatives:
    - "destinal time"
    - "time of destiny"
  status: tentative
  notes: "Sections 4-6 support `fateful time`: the neighboring compounds stay concrete (`Schicksalsweisung`, `Schicksalsdeutung`, `Schicksalsqualitäten`) while retaining metaphysical weight."

- term: "mantisch"
  kind: concept
  preferred: "mantic"
  alternatives:
    - "divinatory"
  status: tentative
  notes: "Sections 1 and 4 support the technical feel of `mantic`: the word sits beside augury, omens, and oracle practices rather than generalized mysticism."

- term: "Urgrund"
  kind: concept
  preferred: "primal ground"
  alternatives:
    - "ground of being"
    - "deep ground"
  status: open
  notes: "Needs wider context from the final section before fixing."

- term: "erdgeschichtlich"
  kind: concept
  preferred: "earth-historical"
  alternatives:
    - "geo-historical"
  status: tentative
  notes: "The term needs to remain visibly larger in scale than ordinary history."

- term: "Weltplan"
  kind: concept
  preferred: "world-plan"
  alternatives:
    - "cosmic plan"
    - "plan of the world"
  status: tentative
  notes: "Hyphenation keeps the German compound visible."

- term: "Bruchstelle"
  kind: concept
  preferred: null
  alternatives:
    - "fault line"
    - "fracture point"
    - "break point"
  status: open
  notes: "Jünger uses it both conceptually and imagistically. The English choice may need to shift by context."
