# Working glossary for recurring terms.
# `preferred` can remain null while the English pressure is still unsettled.

- term: "Erkenntnisproblem"
  handle: "term:erkenntnisproblem"
  kind: concept
  preferred: "problem of knowledge"
  alternatives:
    - "epistemological problem"
  status: tentative
  notes: "The title term is broader and more historical than ordinary academic `epistemology`."

- term: "Erkenntnis"
  handle: "term:erkenntnis"
  kind: concept
  preferred: "knowledge"
  alternatives:
    - "cognition"
    - "knowing"
  status: open
  notes: "Needs contextual discipline. `Knowledge` is the default, but some passages may require a more active rendering."

- term: "Gegenstand"
  handle: "term:gegenstand"
  kind: concept
  preferred: "object"
  alternatives:
    - "object of knowledge"
    - "object-domain"
  status: tentative
  notes: "Keep pressure on the Kantian background without overloading every occurrence."

- term: "Grundbegriff"
  handle: "term:grundbegriff"
  kind: concept
  preferred: "basic concept"
  alternatives:
    - "fundamental concept"
    - "ground concept"
  status: tentative
  notes: "Use for load-bearing logical units rather than for any merely important notion. In the introduction Cassirer treats `Grundbegriffe` as the conceptual means by which science orders experience, and later chapters reactivate the pressure when historical epochs reformulate the basic conditions of knowing."

- term: "Begriff"
  handle: "term:begriff"
  kind: concept
  preferred: "concept"
  alternatives:
    - "notion"
  status: tentative
  notes: "Do not vary casually. Cassirer often builds arguments by repetition and recombination."

- term: "Rechenmarken"
  handle: "term:rechenmarken"
  kind: metaphor
  preferred: null
  alternatives:
    - "reckoning-marks"
    - "tally-marks"
    - "counters"
  status: open
  notes: "A bookkeeping and calculation image for concepts reduced to provisional devices. `Counters` is too flat, while `tokens` now carries avoidable computational baggage."

- term: "Apriori"
  handle: "term:apriori"
  kind: concept
  preferred: "a priori"
  alternatives:
    - "aprioric"
    - "aprioristic"
  status: tentative
  notes: "Preserve the philosophical term without flattening it into generic `prior assumption`. In adjectival contexts, prefer `a priori` or `aprioristic` according to the sentence."

- term: "docta ignorantia"
  handle: "term:docta-ignorantia"
  kind: concept
  preferred: "learned ignorance"
  alternatives:
    - "the doctrine of learned ignorance"
    - "the science of not-knowing"
  status: tentative
  notes: "Keep the Latin when Cassirer is explicitly naming Cusa's formula or book-title. In expository paraphrase, `learned ignorance` is the current front-runner."

- term: "conjectura"
  handle: "term:conjectura"
  kind: concept
  preferred: "conjecture"
  alternatives:
    - "assumption"
    - "conjectural assertion"
  status: tentative
  notes: "A technical Cusan term, not just a casual guess. Cassirer sometimes paraphrases it as `Annahme`, but the Latin should stay visible where the term itself is doing philosophical work."

- term: "similitudo"
  handle: "term:similitudo"
  kind: concept
  preferred: "likeness"
  alternatives:
    - "resemblance"
    - "similarity"
  status: tentative
  notes: "In the Cusa chapter this names the older, more passive model of cognition as resemblance to what is already there."

- term: "assimilatio"
  handle: "term:assimilatio"
  kind: concept
  preferred: "assimilation"
  alternatives:
    - "self-assimilation"
    - "active assimilation"
  status: tentative
  notes: "The key Cusan reversal. Cassirer uses it for the active process by which mind establishes the relation to its objects and, in mathematics, measures them from forms it finds in itself."

- term: "complicatio"
  handle: "term:complicatio"
  kind: concept
  preferred: "enfolding"
  alternatives:
    - "complication"
    - "implicit containment"
  status: tentative
  notes: "A central Cusan term. In Cassirer it names the simple or implicit mode in which multiplicity is contained before development."

- term: "explicatio"
  handle: "term:explicatio"
  kind: concept
  preferred: "unfolding"
  alternatives:
    - "explication"
    - "development"
  status: tentative
  notes: "The counterpart to `complicatio`: the developed articulation of what was previously enfolded."

- term: "coincidentia oppositorum"
  handle: "term:coincidentia-oppositorum"
  kind: concept
  preferred: "coincidence of opposites"
  alternatives:
    - "unity of opposites"
  status: tentative
  notes: "The classic Cusan formula standing behind Cassirer's German `Coincidenz der Gegensätze`. Keep the Latin visible where the technical doctrine, not just a generic paradox, is at stake. Distinguish two pressures: an early mystical/theological sense in which oppositions are resolved in the divine infinite, and the current Cassirerian methodological/logical sense in which apparently separated domains are linked through a productive rule or continuous transition."

- term: "ratio"
  handle: "term:ratio"
  kind: concept
  preferred: null
  alternatives:
    - "reason"
    - "understanding"
  status: open
  notes: "A major pressure point in the Cusa chapter. Cassirer locally aligns it with `Verstand` and discursive, abstractive cognition governed by the excluded middle; do not settle the English globally too early."

- term: "leidender Verstand"
  handle: "term:leidender-verstand"
  kind: concept
  preferred: null
  alternatives:
    - "passive intellect"
    - "receptive intellect"
    - "passive understanding"
  status: open
  notes: "In the Aristotelian psychology section this renders the `nous pathetikos`: the understanding insofar as it receives and gathers the material offered by sense and imagination. Technical context may favor `intellect` over literal `understanding`."

- term: "tätiger Verstand"
  handle: "term:taetiger-verstand"
  kind: concept
  preferred: null
  alternatives:
    - "active intellect"
    - "agent intellect"
    - "active understanding"
  status: open
  notes: "In the Aristotelian psychology section this names the power treated as independent of sensible conditioning and later radicalized in Averroism. Keep open whether the historical register is better served by `active intellect` or `agent intellect`."

- term: "intellectus"
  handle: "term:intellectus"
  kind: concept
  preferred: "intellect"
  alternatives:
    - "understanding"
    - "intellection"
  status: tentative
  notes: "In the current tranche this is the higher faculty that comprehends principle and totality in a single act. The phrase `visus intellectualis` names its operative mode."

- term: "emanatio"
  handle: "term:emanatio"
  kind: concept
  preferred: "emanation"
  alternatives:
    - "outflow"
    - "derivation"
  status: tentative
  notes: "In the current Cusa tranche Cassirer rereads the Neoplatonic term methodologically: not merely a cosmological descent, but the logical demand to derive the particular from an originating ground."

- term: "non aliud"
  handle: "term:non-aliud"
  kind: concept
  preferred: "not-other"
  alternatives:
    - "the not-other"
  status: tentative
  notes: "Cusa's late title-formula. Cassirer treats it as holding together two claims at once: the absolute as immanent to finite things, and the absolute as not determinable like any individual thing. Keep the Latin visible where the treatise-title or technical doctrine is in view."

- term: "scientia infinita"
  handle: "term:scientia-infinita"
  kind: concept
  preferred: "infinite knowledge"
  alternatives:
    - "infinite science"
    - "infinite knowing"
  status: tentative
  notes: "In the current Cusa tranche this names the presupposed unity of all knowing. Cassirer uses it to mark the shift from an ontological grounding in absolute being toward an inner certainty native to inquiry itself."

- term: "Ars oppositorum"
  handle: "term:ars-oppositorum"
  kind: concept
  preferred: "art of opposites"
  alternatives:
    - "art of contraries"
    - "art of opposing terms"
  status: tentative
  notes: "In the Bovillus section this names the goal of a true logic capable of presenting opposed moments, their relation, and their eventual coincidence. Keep the Latin visible when Cassirer is naming Bovillus's formula or work-title."

- term: "Identität von Mikrokosmos und Makrokosmos"
  handle: "term:microcosm-macrocosm-identity"
  kind: concept
  preferred: "identity of microcosm and macrocosm"
  alternatives:
    - "microcosm-macrocosm identity"
  status: tentative
  notes: "Cassirer treats this as only touched by Cusa but first given determinate Renaissance form in Bovillus, before it reappears more forcefully in Paracelsus."

- term: "Spezies"
  handle: "term:species"
  kind: concept
  preferred: "species"
  alternatives:
    - "intelligible species"
    - "formal image"
  status: tentative
  notes: "A scholastic technical term left partially Latinized in English. In the Bovillus tranche it carries a deliberate doubleness: both the formal content of the thing and the sensible or conceptual image received from it."

- term: "Phantasma"
  handle: "term:phantasma"
  kind: concept
  preferred: null
  alternatives:
    - "phantasm"
    - "image"
    - "image of presentation"
  status: open
  notes: "In the Aristotelian psychology section this names the image-content on whose ground thought, as a psychological act, must still arise. `Phantasm` preserves the scholastic-Aristotelian register, but can sound too technical if overused."

- term: "Substanzbegriff"
  handle: "term:substanzbegriff"
  kind: concept
  preferred: "concept of substance"
  alternatives:
    - "substance-concept"
  status: tentative
  notes: "In the current Bovillus conclusion Cassirer names the contradiction within the Aristotelian `Substanzbegriff`: the individual thing as true substance, yet also an inner substantial essence reached only through universal form."

- term: "substantielle Form"
  handle: "term:substantielle-form"
  kind: concept
  preferred: "substantial form"
  alternatives:
    - "substantive form"
  status: tentative
  notes: "The opening thesis of the Humanism chapter. Cassirer treats the Renaissance as united above all by a struggle against the scholastic doctrine of the `substantial form`."

- term: "Funktionsbegriff"
  handle: "term:funktionsbegriff"
  kind: concept
  preferred: "concept of function"
  alternatives:
    - "functional concept"
  status: tentative
  notes: "Explicitly paired with `Substanzbegriff` in the Humanism chapter: modern physics first accomplishes the step from being to activity by moving from a substance-concept to a function-concept."

- term: "Logos-Lehre"
  handle: "term:logos-lehre"
  kind: concept
  preferred: "doctrine of the Logos"
  alternatives:
    - "Logos doctrine"
  status: tentative
  notes: "In the Platonism section this names the Greek speculative content that Christianity had absorbed and that Renaissance Platonism seeks to restore beyond merely theological use."

- term: "Wiedererinnerung"
  handle: "term:wiedererinnerung"
  kind: concept
  preferred: "recollection"
  alternatives:
    - "anamnesis"
    - "remembrance"
  status: tentative
  notes: "The Platonic doctrine of recollection. In the Ficino tranche Cassirer treats its transmission as a fixed historical center for the modern development of the concept of consciousness."

- term: "Praecision"
  handle: "term:praecision"
  kind: concept
  preferred: "precision"
  alternatives:
    - "exactness"
  status: tentative
  notes: "Cassirer is still using the Latinized form in the Cusa chapter; `precision` is the current default, but the term may later need differentiation from ordinary exactness."

- term: "quidditas"
  handle: "term:quidditas"
  kind: concept
  preferred: null
  alternatives:
    - "whatness"
    - "essence"
  status: open
  notes: "Keep the Latin visible where Cusa explicitly contrasts `quidditas` with `quantitas`. `Whatness` is philosophically pointed, but can sound too scholastic if overused."

- term: "quantitas"
  handle: "term:quantitas"
  kind: concept
  preferred: "quantity"
  alternatives:
    - "magnitude"
  status: tentative
  notes: "Usually `quantity`, but preserve the Latin in the explicit Cusan contrast with `quidditas`."

- term: "Qualität"
  handle: "term:qualitaet"
  kind: concept
  preferred: "quality"
  alternatives:
    - "determinate quality"
  status: tentative
  notes: "The Ficino tranche makes this structurally important: a non-compositional determination such as light or color, present whole in each part and mediating between body and soul."

- term: "Quantität"
  handle: "term:quantitaet"
  kind: concept
  preferred: "quantity"
  alternatives:
    - "magnitude"
  status: tentative
  notes: "In the current Ficino tranche this names the order of divisible extension and composition. Cassirer isolates the distinction between `Quantität` and `Qualität` as the passage's pure logical core."

- term: "Wissenschaft"
  handle: "term:wissenschaft"
  kind: concept
  preferred: null
  alternatives:
    - "science"
    - "systematic knowledge"
    - "scholarship"
  status: open
  notes: "A major pressure point. English `science` is often too narrow, but `knowledge` is too broad. In the introduction Cassirer often means the rational or scientific disciplines that furnish critique with its current foothold, while other contexts widen toward systematic knowledge or learned inquiry."

- term: "Erfahrung"
  handle: "term:erfahrung"
  kind: concept
  preferred: "experience"
  alternatives:
    - "empirical experience"
  status: tentative
  notes: "Keep open where Cassirer is explicitly distinguishing historical, psychological, and scientific layers. In the introduction it is not mere raw givenness, but the field whose content is selected, organized, and repeatedly redefined by scientific work."

- term: "exakte Wissenschaft"
  handle: "term:exakte-wissenschaft"
  kind: concept
  preferred: "exact science"
  alternatives:
    - "exact sciences"
  status: tentative
  notes: "Likely to be singular or plural by context; preserve the historical phrase where possible. In the introduction this names the domain, above all mathematical natural science, in which the unity of the concept of knowledge first gains steady proof and historical efficacy."

- term: "transscendentale Methode"
  handle: "term:transscendentale-methode"
  kind: concept
  preferred: "transcendental method"
  alternatives:
    - "transcendental procedure"
  status: tentative
  notes: "Preserve the explicit methodological claim rather than smoothing it into generic critical philosophy."

- term: "Geist"
  handle: "term:geist"
  kind: concept
  preferred: null
  alternatives:
    - "mind"
    - "spirit"
  status: open
  notes: "Use contextually. The calibration tranche pressures both `mind` and `spirit`; do not settle the term globally too early. The introduction now leans toward `mind`, `intellectual`, or `conceptual` where Cassirer rejects `Geist` as a finished substance or names the non-religious sphere of thought and culture."

- term: "Geisteswissenschaften"
  handle: "term:geisteswissenschaften"
  kind: concept
  preferred: null
  alternatives:
    - "human sciences"
    - "sciences of mind"
    - "cultural sciences"
  status: open
  notes: "Needs contextual care. `Human sciences` is the current front-runner in the introduction, but the term remains bound to the unresolved pressure on `Geist`."

- term: "Vorstellung"
  handle: "term:vorstellung"
  kind: concept
  preferred: "representation"
  alternatives:
    - "idea"
    - "presentation"
  status: tentative
  notes: "The Kantian background matters. In the introduction prefer `representation` where Cassirer is measuring truth against `Vorstellungen`; `idea` is often too loose for those epistemic contexts."

- term: "Selbstbewußtsein"
  handle: "term:selbstbewusstsein"
  kind: concept
  preferred: "self-consciousness"
  alternatives:
    - "self-awareness"
  status: tentative
  notes: "Prefer `self-consciousness` in methodological or historical-philosophical passages unless the psychological sense dominates."

- term: "kompositive Methode"
  handle: "term:kompositive-methode"
  kind: concept
  preferred: "compositive method"
  alternatives:
    - "synthetic method"
  status: tentative
  notes: "In the Zabarella tranche Cassirer explicitly renders the modern stake of this term as the deductive movement from causes or presuppositions toward effects. Keep the historical term visible where it is paired with `resolutive Methode`."

- term: "resolutive Methode"
  handle: "term:resolutive-methode"
  kind: concept
  preferred: "resolutive method"
  alternatives:
    - "method of resolution"
  status: tentative
  notes: "Load-bearing in the Zabarella tranches. Distinguish it from mathematical `analysis`: in the strict sense it names the natural-scientific path from effects toward the discovery of hidden causes, with `inventio` rather than completed `scientia` as its immediate goal."

- term: "beweisende Induktion"
  handle: "term:beweisende-induktion"
  kind: concept
  preferred: "demonstrative induction"
  alternatives:
    - "proof-yielding induction"
  status: tentative
  notes: "Cassirer's key bridge from Zabarella to Galileo. Not mere accumulation of cases, but induction exercised on `necessary matter` and essential connection, such that a universal law is seen in and through particular examples."

- term: "Comprehension"
  handle: "term:comprehension"
  kind: concept
  preferred: "comprehension"
  alternatives:
    - "comprehensive contraction"
  status: tentative
  notes: "Nizolius's counter-term to scholastic abstraction. The universal concept does not isolate a hidden common nature, but contracts the verified judgments about individuals into a concise linguistic and logical expression."

- term: "Cabbala"
  handle: "term:cabbala"
  kind: concept
  preferred: "Cabbala"
  alternatives:
    - "Kabbalah"
  status: tentative
  notes: "Keep the historical spelling where Cassirer is following Reuchlin's Renaissance universal-tradition model. In the current section it names the unitary stream into which Greek and Hebrew wisdom are made to converge."

- term: "perennis philosophia"
  handle: "term:perennis-philosophia"
  kind: concept
  preferred: "perennial philosophy"
  alternatives:
    - "perennis philosophia"
    - "everlasting philosophy"
  status: tentative
  notes: "Load-bearing in the history-philosophy tranche. Cassirer uses the Latin formula not as a loose slogan, but as the ordering principle under which a universal history of philosophy is first constructed; keep the Latin visible where the Renaissance self-description itself is in view."
