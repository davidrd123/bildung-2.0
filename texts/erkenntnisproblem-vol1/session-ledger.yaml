      - "Paracelsus turned the microcosm line into method: Erfahrung split into grounded experiment versus Irrsaal, and Sichtiges / Unsichtiges became a methodological unity."
      - "Fracastoro carried the chapter into psychology-of-knowing: species, subnotio, and esse ab anima exposed self-consciousness and relation as pressures the sensualist frame could not stabilize."
      - "Telesio grounded cognition in bodily process and physiological memory, but could not generate mathematics or pure relations from within the system; Aristotelian form survives in psychology."
      - "Campanella and Patrizzi drove the whole approach into the explicit Raum/Zeit problem: mathematical relation forced ontological rescue, continuum was made prior to number, and the missed route toward the analysis of the infinite became visible."
      - "The Campanella line then bent back through the Unendliche itself: nature's own totality and infinity now visibly exceed the first sensualist epistemology and hand the pressure forward into Bruno."
      - "With Copernicus the astronomical world-picture becomes openly methodological and ethical: mathematical construction, harmony, and the unity of nature and Erkenntnisgesetz now move together."
      - "Galilei then hardens Copernicanism into the self-assertion of reason, while Bruno's first profile remains entangled with Weltseele and sympathy; the decisive question shifts to epistemic grounding."
