      - "Bruno then qualifies that break through beauty and imagination: mediation becomes richer and more inward, but still not yet specifically scientific or critically autonomous."
      - "Bruno now comes as close as he will to a two-realm epistemology and relation-centered science, but Cassirer says the whole attempt still fails scientifically because the middle term of mathematics is missing."
