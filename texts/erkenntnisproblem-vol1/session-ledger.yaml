      - "I came in expecting a straightforward praise of Paracelsian empiricism, but the text instead split Erfahrung in two and made experiment a disciplined use of forces rather than mere accumulation of observations."
      - "The next surprise was that the push toward empiricism did not simply leave mysticism behind; it bent back into the double meaning of Licht der Natur, and then immediately into a mediated species-psychology."
      - "I expected the universals discussion to stay terminist, but the real hinge turned out to be the mind's own reality: self-consciousness, not abstraction alone, is what finally breaks the schema."
      - "The Telesio turn made clear that the real novelty here is not just sense-primacy, but the reduction of intellect to remote touch and physiological memory."
      - "The sharpest clarification in the Telesio conclusion was that the problem is not too much epistemology but too little: physics fills the frame so completely that cognition can only be modeled as a thing-like transfer."
      - "Campanella made the limit visible: once the old metaphysical content is translated into motion-language, the resulting account can redescribe cognition but not yet explain what synthesis or representation actually are."
      - "The next pressure is harsher: once abstraction itself looks like loss rather than determination, the collapse threatens not only object-knowledge but the self that knows."
