# Session ledger for Erkenntnisproblem translation.
# Experimental handoff file for session re-entry.
#
# Keep the scaffolding in English for fast cross-collaborator re-entry.
# Keep German inline where the term itself carries the conceptual load
# (for example: Potenz, Substanz, Weltorganismus, Bild des Bildes).
# One record per session. Blocked sessions can still be recorded if they
# sharpen the re-entry edge.
# `what_shifted` should stay short: only the pivots that matter for re-entry,
# not a tranche-by-tranche log. `journal.md` carries the running archive.
# `formation_notes` is optional raw trace and should only keep real shifts in
# stance or framing, not recap.

