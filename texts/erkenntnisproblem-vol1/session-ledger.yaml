    what_shifted:
      - "Reconciled the concurrent Bruno collision by keeping the stronger two-realms / analysis branch canonical and removing the weaker duplicate variant."
      - "Bruno's anti-Aristotelian critique now moves from matter/form to individual substance itself: true reality belongs only to enduring unity, not to the singular thing bound to `Hier` and `Jetzt`."
      - "Cassirer now states Bruno's strict epistemic object directly: not the natural thing, but nature as the one abiding ground and universal rule of appearances."
      - "This gives Bruno's pantheism a retrospective epistemological foundation and clarifies the exact proximity and distance to Galileo: Bruno prepares nature-as-law ontologically, while Galileo secures it mathematically."
      - "Cassirer then names Bruno's inner antinomy directly: the same epistemology that was supposed to ground the empirical heavens dissolves exact physics into metaphysics and leaves only a history of facts."
      - "The late doctrine of the `Minimum` is Bruno's repair attempt: domain-specific elementary unities are meant to restore the singular and qualitative difference to intelligibility."
      - "The repair immediately becomes a closure, because the irrational and incommensurable are rejected in the name of measure and reason, blocking the very mathematical development modern analysis will later require."
      - "Cassirer then sharpens the paradox further: Bruno opposes mathematical reason with a rival logical-ontological rationalism and rebuilds geometry as a synthesis of discrete minima."
      - "But the distinction Bruno needs between `Minimum` and `Grenze` reopens what the doctrine cannot absorb: lawful relations and termini are not reducible to the composition of elements."
      - "Cassirer now makes the correction explicit: interval, pure quantity, and relation return as conditions Bruno's doctrine presupposes but cannot autonomously admit."
      - "The Leibniz comparison then fixes the residue exactly: Bruno's minimum still carries extension as an absolute predicate, so the older harmony of thought and nature breaks at the continuum."
      - "Cassirer then closes Bruno methodologically: mathematics remains the acknowledged model and middle, but because no mathematical theory of experience is secured, the path falls back into magic and mnemonic technique."
      - "The next chapter opens the positive counter-image through Plato's Phaedo: exact science begins from concepts and original thought-positings rather than immediate sensory fusion with things."

