# Escolios a un texto implicito II — Italian witness extraction
# Extracted from the corrected volume II text export.
# Main aphorism body: lines 392-14325.
# Endnotes begin at line 14326; postface begins at line 14442.
# `it` preserves the available Italian witness, including inline note markers.
- id: 1
  line_start: 392
  it: >
    La nostra attenzione per le lettere contemporanee decresce con gli anni non
    perché i sensi si ottundano, bensì perché abbiamo visto varie letterature
    contemporanee succedersi le une alle altre lasciando meramente una manciata
    di risultati problematici in mezzo ad una colossale accozzaglia di
    spazzatura.

- id: 2
  line_start: 396
  it: >
    L’obiettività dello storico non consiste nell’astenersi dal dare giudizi di
    valore, ma nell’emettere sentenze azzeccate.

- id: 3
  line_start: 400
  it: >
    L’opera d’arte non è un artefatto preparato al fine di esercitare la nostra
    facoltà di analisi, ma uno strumento che ci incita a proferire giudizi di
    valore.

- id: 4
  line_start: 404
  it: >
    Ammettere che ogni epoca scriva una diversa storia del passato non significa
    confessare che tutte le interpretazioni si equivalgono. Certe epoche hanno
    la vocazione della storia mentre altre sono carenti di talento
    storiografico.

- id: 5
  line_start: 406
  it: >
    Ogni visione della storia è specifica di un’epoca, però il genio
    storiografico di alcuni periodi trasmette alla visione propria un valore
    storiografico atemporale, analogo all’atemporalità del valore estetico. La
    goffaggine storiografica di altri periodi, invece, azzarda interpretazioni
    che documentano semplicemente l’epoca che le produce.

- id: 6
  line_start: 410
  it: >
    Se un vuoto fìsico non lo convince della scomparsa di una cosa, l’uomo si
    ostina a vederla presente fintantoché ne persista lo spettro. Nel mondo
    contemporaneo le cose si ergono ancora nella loro apparenza intatta, ma il
    secolo risucchia implacabilmente la loro linfa. La spessa polpa delle cose,
    istante per istante, si corrompe, imputridisce, si dissipa.

- id: 7
  line_start: 412
  it: >
    L’uomo si insedia ciecamente nella solidità terrestre del proprio destino,
    quando la sostanza del mondo fluisce oggi verso il nulla attraverso una
    segreta ferita.

- id: 8
  line_start: 416
  it: >
    Solo un talento evidente fa sì che al reazionario gli si perdonino le sue
    idee, mentre le idee dell’individuo di sinistra fanno sì che gli si perdoni
    la sua mancanza di talento.

- id: 9
  line_start: 420
  it: >
    Quando ignoriamo che ogni cosa porta con sé il criterio che la condanna o la
    assolve stiamo mutilando obblighi e piaceri.

- id: 10
  line_start: 424
  it: >
    Nominalismo e realismo non sono correnti filosofiche parallele o successive,
    bensì periodi storici.

- id: 11
  line_start: 426
  it: >
    In certe epoche la realtà si polverizza in individui. In altri tempi gli
    universali sono i protagonisti della storia.

- id: 12
  line_start: 430
  it: >
    L’anima non fiorisce se non nella tappa biologica che corrisponde all’età
    con cui nasce.

- id: 13
  line_start: 432
  it: >
    Coloro che nascono per essere giovani quando invecchiano diventano
    grotteschi. Coloro che nascono per essere vecchi sono grotteschi durante la
    loro aspra giovinezza.

- id: 14
  line_start: 436
  it: >
    Chi semplicemente si rassegna alla propria sorte si sente frustrato da un
    destino privo di senso. Chi umilmente la accetta sa soltanto che non
    comprende il significato della decisione divina che lo riguarda.

- id: 15
  line_start: 440
  it: >
    L’unico scrittore del XVIII secolo risuscitato dall’ammirazione dei nostri
    contemporanei è stato Sade.

- id: 16
  line_start: 442
  it: >
    Visitatori che di un palazzo non ammirano altro che le latrine.

- id: 17
  line_start: 446
  it: >
    Così come alcuni definiscono “parlare con franchezza” il vomitare il proprio
    fiele e la propria bava, allo stesso modo altri battezzano “stabilire
    relazioni sociali autentiche” il proprio affanno nello sprofondare nel
    sangue e nella merda.

- id: 18
  line_start: 450
  it: >
    La letteratura contemporanea sembra un baccano di eunuchi in calore.

- id: 19
  line_start: 454
  it: >
    Esistono oggi due tipi di luoghi comuni consunti e triti: quelli che ne
    rimangono indifferenti e quelli che infuriati negano di esserlo.

- id: 20
  line_start: 456
  it: >
    Le opinioni del piccolo-borghese costituiscono il primo tipo. Quelle
    dell’intellettuale di sinistra il secondo tipo.

- id: 21
  line_start: 460
  it: >
    Risulta più facile, nel nostro tempo, trovare comportamenti cristiani che
    anime cristiane.

- id: 22
  line_start: 462
  it: >
    Avendo relegato il suo cristianesimo verso la zona periferica della persona,
    il cristiano attuale gli sottopone parzialmente ancora la propria condotta,
    ma non subordina ad esso i suoi atteggiamenti radicali.

- id: 23
  line_start: 464
  it: >
    Scarseggiano ormai quegli esseri indelebilmente cristiani nei quali occhi
    intorbiditi dall’orgoglio, dalla lussuria o dalla bestemmia la nostra vista
    indovina uno sguardo segretamente fraterno.

- id: 24
  line_start: 468
  it: >
    Quando il cattolico si difende meglio contro i vizi che contro l’eresia, è
    già poco il cristianesimo che gli rimane in testa.

- id: 25
  line_start: 472
  it: >
    Nelle Geisteswissenschaften1 le matematiche “servent a cacher les défauts de
    l’esprit”.2

- id: 26
  line_start: 476
  it: >
    La storia intellettuale della Germania ci insegna che lo spirito soffia
    preferentemente sulle anime che conquistano la propria grandezza
    rinchiudendosi in grigiastre abitudini.

- id: 27
  line_start: 480
  it: >
    Chi impara a dire “Sì, però...” oppure “No, però...” oltrepassa le porte
    della storia.

- id: 28
  line_start: 484
  it: >
    Il progressista dimentica che il peccato frustra qualunque ideale di cui
    sente la mancanza; il conservatore dimentica che esso corrompe qualunque
    realtà che difende.

- id: 29
  line_start: 488
  it: >
    La deduzione filosofica è l’arte di trasformare un’osservazione esatta, ma
    limitata, in un sistema comprensivo, ma falso.

- id: 30
  line_start: 492
  it: >
    Visitare un museo o leggere un classico sono per le moltitudini
    contemporanee semplici comportamenti etici.

- id: 31
  line_start: 496
  it: >
    Col passare degli anni scopriamo spesso che le soluzioni deliberate
    risultano più intollerabili degli stessi problemi.

- id: 32
  line_start: 500
  it: >
    La critica “sterile” a volte ottiene quelle conversioni dell’anima che
    modificano sostanzialmente i problemi.

- id: 33
  line_start: 502
  it: >
    La critica “costruttiva” moltiplica solo le catastrofi.

- id: 34
  line_start: 506
  it: >
    La crocifissione, secondo il cristiano di oggi, fu un deplorevole errore
    giudiziario.

- id: 35
  line_start: 510
  it: >
    La facoltà di percepire la misteriosa necessità dell’atroce è morta con la
    scena greca e gli altari cristiani.

- id: 36
  line_start: 514
  it: >
    Se le superstizioni scomparissero, la teologia liquiderebbe rapidamente la
    religione.

- id: 37
  line_start: 518
  it: >
    Per alleggerire la nave cristiana che scuffia in acque moderne, la teologia
    liberale si è sbarazzata ieri della divinità di Cristo e la teologia
    radicale si sbarazza oggi dell’esistenza di Dio.

- id: 38
  line_start: 522
  it: >
    L’intellettuale di sinistra non attacca con audacia ed arroganza se non le
    idee che crede morte.

- id: 39
  line_start: 526
  it: >
    Evidentemente in molti casi inventiamo le nostre idee, però non siamo i
    primi né gli unici ad inventarle.

- id: 40
  line_start: 530
  it: >
    Una rivoluzione è legittima soltanto quando il rivoluzionario sente nelle
    proprie ossa che la società contro cui si alza è il legittimo reo di
    ribellione.

- id: 41
  line_start: 534
  it: >
    Per contenere l’avidità il democratico pensa solo ad abolire i beni
    agognati.

- id: 42
  line_start: 538
  it: >
    Lo storico completo sarebbe colui che analizza con malevolenza narrando con
    simpatia.

- id: 43
  line_start: 542
  it: >
    Chiunque ha diritto di essere stupido, ma non di esigere che si venerino le
    sue sciocchezze.

- id: 44
  line_start: 546
  it: >
    L’intelligenza letteraria, e non l’intelligenza filosofica o l’intelligenza
    scientifica, è la fase zenitale dell’intelligenza.

- id: 45
  line_start: 550
  it: >
    L’intelligenza non invecchia, però ha un’epoca.

- id: 46
  line_start: 554
  it: >
    Quando impara che le prove dell’esistenza di Dio non sono valide lo scemo
    crede automaticamente che le prove dell’esistenza del mondo lo siano.

- id: 47
  line_start: 558
  it: >
    La “storia scientifica” diffida della verità personale delle Memorie per
    confidare nella menzogna impersonale degli Archivi.

- id: 48
  line_start: 562
  it: >
    L’utilità pedagogica delle pratiche superstiziose è dovuta all’assenza di
    nesso intelligibile fra i mezzi che impiegano e i fini che ricercano.

- id: 49
  line_start: 564
  it: >
    Solo la superstizione insegna alla moltitudine che non esiste una tecnica
    razionale delle cose importanti.

- id: 50
  line_start: 568
  it: >
    La colpevolezza del mondo moderno è maggiore per aver raso al suolo le
    chaumières3 che per aver incendiato gli chateaux.4 Ciò che si estingue lungo
    il XIX secolo è la dignità degli umili.

- id: 51
  line_start: 572
  it: >
    Per persuadere dobbiamo esprimere argomenti sottili in formule prive di
    sottigliezza.

- id: 52
  line_start: 576
  it: >
    Nello scienziato si riuniscono preoccupazioni da uomo intelligente I con la
    pazienza di un imbecille.

- id: 53
  line_start: 580
  it: >
    Il mio secolo prediletto è il XIX perché ci ha insegnato a vedere gli altri
    secoli.

- id: 54
  line_start: 582
  it: >
    Ma la civiltà è ciò che muore con il XVIII.

- id: 55
  line_start: 586
  it: >
    Il viavai moderno non impedisce di credere in Dio, ma rende impossibile
    sentirlo.

- id: 56
  line_start: 590
  it: >
    L’umanità è congenitamente restia a qualsiasi proposito nobile. Per produrre
    qualcosa di insigne è necessario che la storia la assilli e la metta alle
    strette.

- id: 57
  line_start: 594
  it: >
    Non possiamo sperare che la civiltà rinasca fintantoché l’uomo non tornerà a
    sentirsi umiliato nel consacrarsi a compiti economici.

- id: 58
  line_start: 598
  it: >
    La provvidenza concede solo a pochi uomini il diritto di essere autentici.

- id: 59
  line_start: 600
  it: >
    Tanto l’estetica quanto l’etica chiedono a gran voce che gli altri si
    affrettino a falsificarsi.

- id: 60
  line_start: 604
  it: >
    L’individuo non nasce per “scoprire” ed “esprimere” la gamma embrionale
    della sua anima.

- id: 61
  line_start: 606
  it: >
    Bensì per infeudare la sua persona al padrone più nobile che incontra.

- id: 62
  line_start: 610
  it: >
    L’intelligenza si irrobustisce con i luoghi comuni eterni e si debilita con
    quelli del proprio tempo e del proprio luogo.

- id: 63
  line_start: 614
  it: >
    È facile simpatizzare con qualsiasi uomo finché non esprime opinioni.

- id: 64
  line_start: 618
  it: >
    Fintantoché non ci attribuiremo alcun merito, potremo inorgoglirci di ciò
    che siamo.

- id: 65
  line_start: 622
  it: >
    Esistono anime che l’assoluzione non purifica, bensì che insudiciano le
    assoluzioni.

- id: 66
  line_start: 626
  it: >
    A nulla giova al mediocre emigrare laddove dimorano i grandi. Tutti ci
    portiamo addosso la nostra mediocrità.

- id: 67
  line_start: 630
  it: >
    L’eleganza di qualunque uniforme dipende dal portamento di colui che la
    indossa.

- id: 68
  line_start: 634
  it: >
    Elogiare la giovinezza significa dimenticare la nostra passata stupidaggine.

- id: 69
  line_start: 638
  it: >
    L’astrazione è lo strumento del potere dell’uomo e il padrone del suo tedio.

- id: 70
  line_start: 642
  it: >
    I fatti hanno bisogno dello storico per diventare interessanti. Finché
    l’immaginazione non lo affina ogni avvenimento è banale.

- id: 71
  line_start: 646
  it: >
    Chiamiamo storia della letteratura l’enumerazione delle opere che sono evase
    dalla storia.

- id: 72
  line_start: 650
  it: >
    La storia è il campo in cui il numero inganna.

- id: 73
  line_start: 652
  it: >
    La precisione aritmetica è qui una forma insidiosa di anacronismo. Chi pensa
    di raggiungere una veracità maggiore stabilendo cifre esatte, e pertanto
    comparabili tra di esse, scambia inutilmente ciò che esiste esclusivamente
    come dissomiglianza concreta per una similitudine astratta.

- id: 74
  line_start: 654
  it: >
    Il numero storico è invariabilmente qualitativo.

- id: 75
  line_start: 658
  it: >
    Etichettando come “Giustizia” il fagotto chiuso è stato facile introdurre da
    secoli qualsiasi contrabbando.

- id: 76
  line_start: 662
  it: >
    Ci sono evidenze che scompaiono assieme a coloro che meritavano di
    percepirle.

- id: 77
  line_start: 666
  it: >
    La storia è obiettiva finché si limita a ricostruire la coscienza che un
    determinato passato ebbe di se stesso.

- id: 78
  line_start: 668
  it: >
    Lo storico che al contrario indaga “cause”, “strutture” e “leggi” si
    rinchiude nella propria soggettività.

- id: 79
  line_start: 672
  it: >
    L’ambizione di trascendere le presentazioni empiriche della coscienza altrui
    trasforma la storia in una mera proiezione dello storico.

- id: 80
  line_start: 674
  it: >
    Al di là della coscienza dei soggetti storici, lo storico non scopre altro
    che la propria coscienza.

- id: 81
  line_start: 678
  it: >
    La storia è la serie di universi presenti alla coscienza di soggetti
    successivi.

- id: 82
  line_start: 682
  it: >
    Storia è ciò che ricostruisce un’immaginazione capace di pensare coscienze
    altrui.

- id: 83
  line_start: 684
  it: >
    Il resto è politica.

- id: 84
  line_start: 688
  it: >
    Né le dottrine sociali nascono dalle circostanze né le ipotesi scientifiche
    dai fatti.

- id: 85
  line_start: 690
  it: >
    Entrambe le affermazioni sono aspetti di un’epistemologia scaduta.

- id: 86
  line_start: 694
  it: >
    Quandanche nessuno ignori che non esiste opinione stupida che non faccia
    martiri e non moltiplichi le vittime, il numero degli adepti di una dottrina
    inquieta l’ingenuo.

- id: 87
  line_start: 696
  it: >
    Come se il fatto psicologico della stupidità fosse il criterio logico della
    verità.

- id: 88
  line_start: 700
  it: >
    Il successo di un libro non prova nulla a favore o contro di esso. Ma quando
    intuiamo la sua mediocrità, il successo conferma automaticamente i nostri
    sospetti.

- id: 89
  line_start: 704
  it: >
    Vivere fra anime basse esaspera la passione del nostro appetito di
    grandezza.

- id: 90
  line_start: 708
  it: >
    Per “perseverare nel suo essere” l’individuo può fare concessioni, però
    l’idea che le faccia si trasforma in un’idea diversa.

- id: 91
  line_start: 710
  it: >
    Se la Chiesa è meramente un raggruppamento di individui interessati a
    difendere la propria esistenza collettiva, le concessioni abili le sono
    lecite. Ma se è il veicolo della fede e del corpo di Cristo qualunque
    “aggiornamento”5 la perverte.

- id: 92
  line_start: 714
  it: >
    La distanza fra giovani e vecchi è oggi uguale a sempre.

- id: 93
  line_start: 716
  it: >
    Oggigiorno si parla di “abisso” tra le generazioni perché l’adulto attuale
    si rifiuta di invecchiare, e il giovane con la dovuta mancanza di rispetto
    gli assicura che è invecchiato.

- id: 94
  line_start: 720
  it: >
    È toccato a questo secolo il privilegio di inventare il pedantismo
    dell’oscenità.

- id: 95
  line_start: 724
  it: >
    Nella misura in cui aumentano le acque di questo secolo, i sentimenti
    delicati e nobili, i gusti voluttuosi e fini, le idee discrete e profonde si
    rifugiano in poche anime elette, come i sopravvissuti del diluvio sulle cime
    di picchi silenziosi.

- id: 96
  line_start: 728
  it: >
    Ciò che meno posso perdonare a questo secolo è il fatto che mi infastidisca
    con una nausea tale da farmi dimenticare che la sua abiezione non macchia
    l’intatta primavera.

- id: 97
  line_start: 732
  it: >
    La sapienza di questo secolo si riduce ad osservare il mondo con lo sguardo
    amaro e sporco di un adolescente depravato.

- id: 98
  line_start: 736
  it: >
    Il corpo, nel XX secolo, non imprigiona semplicemente l’anima, ma la mutila.

- id: 99
  line_start: 740
  it: >
    Come sopportare questo mondo moderno se non udissimo già un lontano rantolo
    di agonia?

- id: 100
  line_start: 744
  it: >
    Quello che l’immaginazione inventa non è meno reale di quello che
    impressiona i sensi.

- id: 101
  line_start: 746
  it: >
    Solo che è più fragile.

- id: 102
  line_start: 750
  it: >
    L’appetito dell’uomo si esacerba perché non sempre ha avuto fame.

- id: 103
  line_start: 754
  it: >
    Nulla di più rischioso che figurarci di sapere in quale momento della storia
    ci troviamo.

- id: 104
  line_start: 756
  it: >
    Chi presume di saperlo si attribuisce, con dogmatica insolenza, la missione
    di imporre agli uomini il compimento del proprio destino.

- id: 105
  line_start: 758
  it: >
    Lo storicismo necessitarlo corona la propria petulanza con crimini inutili.

- id: 106
  line_start: 760
  it: >
    La storia è carente di struttura. L’uomo ha solo l’obbligazione di osservare
    certe norme, qualunque sia il momento problematico della storia in cui si
    trova.

- id: 107
  line_start: 762
  it: >
    Ogni uomo conosce il proprio dovere. Nessuno conosce il presunto compito del
    proprio tempo.

- id: 108
  line_start: 766
  it: >
    Finché la Aufklärung non morirà - soltanto adesso si espande su tutta la
    terra e si infiltra fino agli ultimi strati sociali - la più moderna
    posizione dello spirito continuerà ad essere il pensiero tedesco fra il 1770
    e il 1830.

- id: 109
  line_start: 770
  it: >
    Spendiamo una vita per comprendere ciò che un estraneo comprende con
    un’occhiata: che siamo altrettanto insignificanti di chiunque altro.

- id: 110
  line_start: 774
  it: >
    Lo storico si distingue dal giornalista che lo emula perché rimarca le
    differenze, mentre quest’ultimo fa lo stesso con le somiglianze tra le
    epoche.

- id: 111
  line_start: 778
  it: >
    Il determinista si spazientisce con i suoi avversari come se questi avessero
    ragione nel dirsi liberi.

- id: 112
  line_start: 780
  it: >
    I deterministi sono persone molto irritabili.

- id: 113
  line_start: 784
  it: >
    A forza di adattarsi alla “mentalità moderna” il cristianesimo è diventato
    una dottrina non difficile da osservare, ma che neppure è interessante
    farlo.

- id: 114
  line_start: 788
  it: >
    Chi tenta di evadere dalla propria razza pretende di saltar fuori dalla
    propria ombra.

- id: 115
  line_start: 790
  it: >
    Però, dato che l’autentica indole di una razza è sempre un mistero, il suo
    spirito non serve come norma cosciente per i nostri atti. L’individuo è
    fedele al suo sangue quando è leale alla sua più intima vocazione.

- id: 116
  line_start: 794
  it: >
    Può essere ottimista solo l’intelligenza che fiuta nella civiltà moderna un
    fievole tanfo.

- id: 117
  line_start: 798
  it: >
    Le rivoluzioni latino-americane non hanno mai preteso altro che consegnare
    il potere a qualche Directoire.

- id: 118
  line_start: 802
  it: >
    Il cristianesimo di una società è direttamente proporzionale al numero di
    abbazie che essa fonda.

- id: 119
  line_start: 806
  it: >
    Nulla irrita tanto gli stupidi come il cristianesimo.

- id: 120
  line_start: 810
  it: >
    Soprattutto i cristiani stupidi.

- id: 121
  line_start: 814
  it: >
    Il cristianesimo non è dottrina per la classe media.

- id: 122
  line_start: 816
  it: >
    Neanche per la classe media economica. E neppure per la classe media
    intellettuale.

- id: 123
  line_start: 818
  it: >
    È carente, quindi, di avvenire.

- id: 124
  line_start: 822
  it: >
    Diffidenti dell’instaurazione di strutture feudali in America, i Re
    Cattolici, tanto gli Asburgo quanto i Borbone, fecero abortire qualsiasi
    embrione di feudalesimo, ottenendo così che solo tre fattori tessessero la
    storia di questo continente: la pusillanimità del burocrate, la cupidigia
    del bottegaio e l’anarchia del meticcio.

- id: 125
