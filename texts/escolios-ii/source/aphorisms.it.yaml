- id: 674
  line_start: 2784
  it: >
    I capricci delle proprie passioni forse salveranno l’uomo dalla catastrofe
    verso la quale lo precipitano gli automatismi della sua intelligenza.

- id: 675
  line_start: 2788
  it: >
    La letteratura passa attraverso tre età: prima il sogno, poi l’inventario e
    infine la confessione.

- id: 676
  line_start: 2792
  it: >
    Per destare la sensibilità dal suo crescente torpore di fronte al mistero è
    necessario curare l’intelligenza.

- id: 677
  line_start: 2796
  it: >
    Dio non è la chiave dell’enigma, bensì ciò che ne annulla lo scandalo.

- id: 678
  line_start: 2798
  it: >
    La fede non ha bisogno di teodicee.

- id: 679
  line_start: 2802
  it: >
    Dio è la verità di tutte le illusioni.

- id: 680
  line_start: 2806
  it: >
    L’assiologia è l’autentica teologia naturale.

- id: 681
  line_start: 2810
  it: >
    Il desiderio crede di desiderare quello che desidera, ma in realtà desidera
    solo Dio.

- id: 682
  line_start: 2814
  it: >
    La vera religione è monastica, ascetica, autoritaria e gerarchica.

- id: 683
  line_start: 2818
  it: >
    È sufficiente valutare le opere dell’uomo senza criterio retorico affinché
    la sua superbia sembri meno blasfema che ridicola.

- id: 684
  line_start: 2822
  it: >
    Finiamo per comprendere colui che sa quello che dice, per quanto complicato
    sia ciò che dice.

- id: 685
  line_start: 2824
  it: >
    Però è impossibile capire colui che solo immagina di sapere ciò che dice.

- id: 686
  line_start: 2828
  it: >
    Negli indici culturali di un paese la decadenza della sua cultura si misura
    dalla proliferazione di errori nelle citazioni latine e greche e dal
    pullulare di aggettivi putativamente letterari nella sua prosa scientifica.

- id: 687
  line_start: 2832
  it: >
    Per dubitare dell’esistenza di Dio basterebbe che esistessero prove della
    sua esistenza.

- id: 688
  line_start: 2834
  it: >
    Un Dio implicato dall’universo non sarebbe il Dio in cui crediamo.

- id: 689
  line_start: 2836
  it: >
    La trascendenza non può essere il corollario di nessuna immanenza. Bensì
    verticale irruzione del divino.

- id: 690
  line_start: 2840
  it: >
    Il progresso di falsificazione dell’universo culmina con la fotografia che
    spoglia l’oggetto dei suoi universali per ridurlo ad un’astrazione
    nominalista.

- id: 691
  line_start: 2844
  it: >
    Gli uomini sono così naturalmente vili che solo a pochi possiamo fare
    l’onore di non perdonare le loro viltà.

- id: 692
  line_start: 2848
  it: >
    Lo storico non deve dimenticare che i tratti essenziali dell’uomo non sono
    mai causa sufficiente di un avvenimento concreto.

- id: 693
  line_start: 2850
  it: >
    Ignorare che il fatto irripetibile ha una causa irripetibile costituisce il
    peccato di ipercronismo.

- id: 694
  line_start: 2854
  it: >
    La credenza nella risolvibilità fondamentale dei problemi è caratteristica
    propria del mondo moderno: che qualunque antagonismo di princìpi sia un
    semplice equivoco, che ci sarà un’aspirina per qualsiasi cefalea.

- id: 695
  line_start: 2858
  it: >
    Il grande artista si impone come soggetto autonomo; negli altri esseri ci
    imbattiamo come con oggetti che ci servono o ci disturbano.

- id: 696
  line_start: 2862
  it: >
    I concetti filosofici non sono prodotto di un’intelligenza finalmente
    adulta, bensì cadaveri di miti antichi.

- id: 697
  line_start: 2866
  it: >
    Sentirci capaci di leggere testi letterari con imparzialità da professore
    vuol dire confessare che la letteratura ha smesso di piacerci.

- id: 698
  line_start: 2870
  it: >
    Il feudalesimo era fondato su sentimenti nobili: lealtà, protezione,
    servizio.

- id: 699
  line_start: 2872
  it: >
    Gli altri sistemi politici si fondano su sentimenti vili: egoismo,
    cupidigia, indivia, codardia.

- id: 700
  line_start: 2876
  it: >
    Dobbiamo evitare che l’urgenza pratica di classificare ci induca a supporre
    di star comprendendo l’atto concreto quando identifichiamo la classe a cui
    esso appartiene.

- id: 701
  line_start: 2880
  it: >
    La relazione fra Cristo e il cristianesimo è il prototipo della relazione
    feudale.

- id: 702
  line_start: 2882
  it: >
    Un signore che dà la vita per i suoi fedeli e vassalli fedeli al signore
    fino al martirio.

- id: 703
  line_start: 2884
  it: >
    Il cristianesimo è un vassallaggio mistico.

- id: 704
  line_start: 2888
  it: >
    La posterità, questa consolazione dell’artista, si limita a pochi eruditi
    sgradevoli e dispeptici.

- id: 705
  line_start: 2892
  it: >
    L’archeologia si reputa più scientifica della storia perché si limita al
    confronto di oggetti senza poter confrontarsi con persone.

- id: 706
  line_start: 2896
  it: >
    Quanto più radicalmente condivida i pregiudizi del proprio tempo, tanto più
    facile sarà allo storico credersi padrone di criteri oggettivi per giudicare
    la storia.

- id: 707
  line_start: 2898
  it: >
    La moda è l’unico assoluto che nessuno di solito discute.

- id: 708
  line_start: 2902
  it: >
    L’atto di spogliare un individuo dei suoi beni si chiama furto quando è un
    altro individuo a spogliarlo.

- id: 709
  line_start: 2904
  it: >
    E giustizia sociale quando a farlo è una collettività intera.

- id: 710
  line_start: 2908
  it: >
    L’imparzialità dello storico lucido sta nel mantenersi sempre cosciente
    della sua parzialità.

- id: 711
  line_start: 2912
  it: >
    I biografi di uno scrittore di solito eliminano la persona per occuparsi
    della sua insignificante vita.

- id: 712
  line_start: 2916
  it: >
    Dio è la realtà che il deista perde e che il panteista recupera.

- id: 713
  line_start: 2920
  it: >
    Non esiste oggetto che un’interpretazione proterva non possa collocare entro
    un contesto che lo svilisca.

- id: 714
  line_start: 2924
  it: >
    Rendere banale ogni cosa è alla portata di tutti.

- id: 715
  line_start: 2928
  it: >
    Alla fine del secolo scorso ci fu solo un’“arte senza stile”; nella seconda
    metà di questo secolo c’è solo uno stile senza arte.

- id: 716
  line_start: 2932
  it: >
    Le stravaganze dell’arte moderna ci stanno insegnando ad apprezzare come si
    deve le insipidezze dell’arte classica.

- id: 717
  line_start: 2936
  it: >
    Le burocrazie non succedono casualmente alle rivoluzioni.

- id: 718
  line_start: 2940
  it: >
    Le rivoluzioni sono i parti sanguinari delle burocrazie.

- id: 719
  line_start: 2944
  it: >
    Gli argomenti che girano per il mondo sono di tale risma che l’uomo comune
    può indovinare solo per sbaglio.

- id: 720
  line_start: 2948
  it: >
    Un universo attraversato dal Macedone è, quantomeno, capace di arcangeli.

- id: 721
  line_start: 2952
  it: >
    Coloro che non si lasciano commuovere da nobili retoriche non sono
    ponderati, pratici ed equanimi, ma vili.

- id: 722
  line_start: 2956
  it: >
    Forse le cose più nobili della terra non esistono se non nelle parole che le
    invocano.

- id: 723
  line_start: 2958
  it: >
    Ma è sufficiente che stiano lì affinché siano.

- id: 724
  line_start: 2962
  it: >
    Lo scrittore deve esibire senza epiteti le viltà che mostra, perché il
    lettore che non si indigna spontaneamente automaticamente si condanni.

- id: 725
  line_start: 2966
  it: >
    La storia è l’arte di dare ai termini generali le differenti tinte che hanno
    in ogni epoca.

- id: 726
  line_start: 2970
  it: >
    Gli dèi non abitano che le regioni, le stanze, le anime in cui la storia,
    l’umile storia, accumula pietosamente le proprie cianfrusaglie. La
    maledizione delle opere moderne è che non possono fondarsi se non sul suolo
    nudo.

- id: 727
  line_start: 2972
  it: >
    Sulla roccia sterile.

- id: 728
  line_start: 2976
  it: >
    Le insolenze dell’adolescente non sono altro che le pedate dell’asino che si
    stabilisce nella stalla.

- id: 729
  line_start: 2978
  it: >
    Mentre l’insolenza dell’adulto che getta bruscamente dalle sue spalle gli
    anni di pazienza che lo incurvano è uno spettacolo ammirevole.

- id: 730
  line_start: 2982
  it: >
    Piaceri ed obblighi, oggetti e persone: basta muoverli dal posto subordinato
    che corrisponde a ciascuno per convertirli in nulla.

- id: 731
  line_start: 2986
  it: >
    Chiedere ad una cosa ciò che non è destinata a dare è una maniera efficace
    di rendere irrisorio ciò che dà.

- id: 732
  line_start: 2990
  it: >
    Tutti i nonconformisti sanno, nel fondo dell’anima, che il posto che la loro
    vanità rifiuta è lo stesso posto che la loro natura gli ha fissato.

- id: 733
  line_start: 2994
  it: >
    Vi sono meno ambiziosi nel mondo che individui che oggi si credono obbligati
    moralmente ad esserlo.

- id: 734
  line_start: 2998
  it: >
    Quando le gerarchie scompaiono non è tanto il caos quello che predomina, ma
    l’insulsaggine.

- id: 735
  line_start: 3002
  it: >
    Ciascuna generazione comprende solo alcuni libri della biblioteca che
    eredita.

- id: 736
  line_start: 3006
  it: >
    Lo storico marxista, per maggiore tranquillità, deve omettere cautamente
    dalla propria bibliografia i libri dello storico serio.

- id: 737
  line_start: 3010
  it: >
    Le dottrine si difendono meglio contro argomenti schiaccianti che contro il
    più lieve disprezzo.

- id: 738
  line_start: 3014
  it: >
    Religione e scienza non devono firmare accordi di confini, bensì un trattato
    di disconoscimento reciproco.

- id: 739
  line_start: 3018
  it: >
    Allo sciocco sembrano importanti solo i problemi del proprio tempo.

- id: 740
  line_start: 3022
  it: >
    Educare significa insegnare ad appassionarsi per ciò che non è vigente.

- id: 741
  line_start: 3026
  it: >
    Il massimo a cui può aspirare l’uomo che conosce se stesso è essere il meno
    ripugnante possibile.

- id: 742
  line_start: 3030
  it: >
    La frase che non interpunge se stessa è informe.

- id: 743
  line_start: 3034
  it: >
    Gli appassionati di ecumenismo dimenticano che essere cristiano non consiste
    solo nell’avere fede in Dio, bensì nell’avere fede nel Dio in cui si deve
    avere fede.

- id: 744
  line_start: 3038
  it: >
    Il sociologo esprime, con un numero stupefacente di decimali, fatti le cui
    unità in certi casi non riesce a contare e in certi altri casi non riesce
    neppure a definire.

- id: 745
  line_start: 3042
  it: >
    Un postulato fondamentale della democrazia: la legge è la coscienza del
    cittadino.

- id: 746
  line_start: 3046
  it: >
    L’individualismo è una posizione di ritirata dalla quale è sempre possibile
    rinnovare il combattimento.

- id: 747
  line_start: 3048
  it: >
    Però non è una posizione la cui conquista possa assicurare il possesso
    felice e pacifico del territorio umano.

- id: 748
  line_start: 3052
  it: >
    La Aufklärung, nei romantici francesi, sconfigge infine il romanticismo.

- id: 749
  line_start: 3056
  it: >
    La vera storia fluisce sotto i fatti.

- id: 750
  line_start: 3058
  it: >
    Tanto le suprastrutture quanto le sub-strutture sono espressioni del clima
    dell’anima.

- id: 751
  line_start: 3060
  it: >
    Tutto quello che accade deriva da alterazioni nella sostanza stessa
    dell’uomo.

- id: 752
  line_start: 3064
  it: >
    La nozione di provvidenza non può far parte di alcuna filosofia. Ma
    qualunque filosofia che non affondi segretamente in essa le proprie radici
    risulta grottesca.

- id: 753
  line_start: 3068
  it: >
    Il carattere provvidenziale di un atto esiste solo per chi lo vive. La
    provvidenza è un mito ridicolo oppure un’evidenza assoluta, secondo la
    posizione di attore o di spettatore in cui ci troviamo.

- id: 754
  line_start: 3072
  it: >
    La tolleranza consiste in una ferma decisione di permettere che si insulti
    tutto ciò che pretendiamo di amare e rispettare, sempre che non siano
    minacciate le nostre comodità materiali.

- id: 755
  line_start: 3074
  it: >
    L’uomo moderno, liberale, democratico e progressista, se non è infastidito
    tollera che gli si insudici l’anima.

- id: 756
  line_start: 3078
  it: >
    Dire che la libertà consiste in qualcosa di diverso dal fare ciò che
    vogliamo è una menzogna.

- id: 757
  line_start: 3080
  it: >
    Che d’altra parte convenga limitare la libertà è cosa evidente.

- id: 758
  line_start: 3082
  it: >
    Ma l’inganno inizia quando si pretende di identificarla con le limitazioni
    che le si impongono.

- id: 759
  line_start: 3086
  it: >
    La storia moderna si riduce in ultima analisi alla sconfitta della borghesia
    e alla vittoria delle idee borghesi.

- id: 760
  line_start: 3090
  it: >
    I palazzi non ardono ogni qualvolta le baracche si incendiano, però il fuoco
    che consuma i palazzi fa ardere le baracche.

- id: 761
  line_start: 3094
  it: >
    Nessun miracolo sembra un miracolo a chi non era destinato a riceverlo.

- id: 762
  line_start: 3098
  it: >
    Il predicatore del regno di Dio, quando non predica Cristo, finisce per
    predicare il regno dell’uomo.

- id: 763
  line_start: 3102
  it: >
    La verità per il cristiano è tensione fra certe proposizioni contrarie. La
    teologia non ha la funzione di risolvere il conflitto, bensì di mostrare la
    sua necessità.

- id: 764
  line_start: 3106
  it: >
    La teologia, in mani goffe, diventa l’arte di rendere irrisorio il mistero.

- id: 765
  line_start: 3110
  it: >
    Il problema filosofico consiste in ultima analisi nel sapere se l’universo è
    raziocinio oppure storia.

- id: 766
  line_start: 3114
  it: >
    San Tommaso: un orléaniste della teologia?

- id: 767
  line_start: 3118
  it: >
    La ragione, in teologia, ha solo la funzione di demolire idoli.

- id: 768
  line_start: 3122
  it: >
    Quando si desta in noi la brama di altri luoghi e di altri secoli in realtà
    non è in questo o quel tempo o in questo o quel luogo dove desideriamo
    vivere, bensì nelle stesse frasi dello scrittore che ha saputo parlarci di
    quel luogo o quel tempo.

- id: 769
  line_start: 3126
  it: >
    Nazioni ed individui, salvo rare eccezioni, si comportano con decenza solo
    quando le circostanze non permettono loro altrimenti.

- id: 770
  line_start: 3130
  it: >
    L’intelligenza non ha peggior nemico che l’impazienza, la quale
    imprudentemente libera l’automatismo logico dell’idea.

- id: 771
  line_start: 3134
  it: >
    Finché lo storico non ammetterà che la causa dell’esistenza o
    dell’inesistenza di determinati fatti in determinate epoche è la presenza o
    l’assenza di individui capaci o incapaci di produrli, un crescente
    pullulamento di teorie continuerà ad attribuire la paternità dei fatti a
    cause che non sono in grado di generarli.

- id: 772
  line_start: 3138
  it: >
    Se il borghese di ieri comprava quadri perché il loro tema era sentimentale
    o pittoresco, il borghese di oggi non li compra quando hanno un tema
    pittoresco o sentimentale.

- id: 773
  line_start: 3140
  it: >
    È il tema che continua a vendere il quadro.

- id: 774
  line_start: 3144
  it: >
    L’interpretazione di qualunque fatto storico richiede un numero infinito di
    teorie.

- id: 775
  line_start: 3148
  it: >
    Per sentenziare che una norma è morta, allo sciocco basta sapere che non la
    si osserva.

- id: 776
  line_start: 3152
  it: >
    L’etica deve essere l’estetica della condotta.

- id: 777
  line_start: 3156
  it: >
    Chi non si anticipa alla vecchiaia non prolunga la sua gioventù, bensì
    corrompe persino i propri ricordi.

- id: 778
  line_start: 3160
  it: >
    Nella nostra vita intellettuale, come nella storia, certi blocchi letterari
    - generi, epoche, lingue - che erano divenuti illeggibili e insipidi,
    risorgono improvvisamente rinnovati e freschi.

- id: 779
  line_start: 3162
  it: >
    Qualsiasi cadavere intellettuale può risuscitare subitaneamente con
    portentosa vitalità.

- id: 780
  line_start: 3166
  it: >
    Fintantoché non si converta l’uguaglianza in un dogma, ci potremo trattare
    come uguali.

- id: 781
  line_start: 3170
  it: >
    Non dobbiamo aspettarci nulla dal romanzo finché il buon romanziere non si
    risolva a scrivere, come nel secolo scorso, “cattivi” romanzi.

- id: 782
  line_start: 3174
  it: >
    La meno probatoria delle prove, in filosofia, è quella che pretende di
    confermare le tesi di un sistema con le tesi di un altro sistema.

- id: 783
  line_start: 3178
  it: >
    L’uomo intelligente non ha idee confuse se non quando serba, senza saperlo,
    propositi inconfessabili.

- id: 784
  line_start: 3182
  it: >
    Quandanche l’erudizione oggi fiorisca, le scienze umane stanno strangolando
    la storia.

- id: 785
  line_start: 3184
  it: >
    Psicologia, sociologia, economia, ecc., costruiscono schemi atemporali che
    restaurano surrettiziamente l’uomo astratto del XVIII secolo.

- id: 786
  line_start: 3188
  it: >
    In una democrazia ogni verità sembra un paradosso.

- id: 787
  line_start: 3192
  it: >
    I veri dèi dimorano in luoghi intrasferibili ed in irripetibili istanti.

- id: 788
  line_start: 3196
  it: >
    È davvero importante solo ciò che al mero spettatore sembra un gesto banale.

- id: 789
  line_start: 3200
  it: >
    Il mondo deve servire da tema, ma non da norma.

- id: 790
  line_start: 3202
  it: >
    Così come uno spettacolo volgare si piega, sulla tela, a imperativi
    estetici.

- id: 791
  line_start: 3206
  it: >
    La civiltà non consiste nella somma degli oggetti che la compongono, come
    neppure l’uomo consiste nella somma degli organi che lo costituiscono.

- id: 792
  line_start: 3210
  it: >
    Il verso tende spontaneamente a mentire.

- id: 793
  line_start: 3212
  it: >
    Però è solo nel verso che l’anima a volte riesce a confessarsi.

- id: 794
  line_start: 3216
  it: >
    La capacità di leggere poesia tradotta è un segno inequivocabile di
    insensibilità alla poesia.

- id: 795
  line_start: 3220
  it: >
    Non ho nostalgia di una natura vergine, una natura priva dell’impronta
    contadina che la nobilita e del palazzo che corona la collina.

- id: 796
  line_start: 3222
  it: >
    Però ho nostalgia di una natura salva da industrialismi plebei e
    manomissioni irriverenti.

- id: 797
  line_start: 3226
  it: >
    Non dobbiamo disconoscere i meriti dell’autore subalterno e neppure perdere
    del tempo leggendolo.

- id: 798
  line_start: 3230
  it: >
    Pochi lettori intuiscono l’astuzia di cui necessita una frase per sembrare
    ingenua.

- id: 799
  line_start: 3234
  it: >
    Lo scrittore che non ha torturato le sue frasi tortura il lettore.

- id: 800
  line_start: 3238
  it: >
    La civiltà ha come requisito ineludibile che noi mediocri imitiamo senza
    nessuna vergogna.

- id: 801
  line_start: 3240
  it: >
    Che solo pochi osino innovare.

- id: 802
  line_start: 3244
  it: >
    L’aroma degli orti monacali e il suono dei boschi che circondano il
    monastero solitario circolano nel latino austero dell’alto Medioevo. Come le
    pietre romaniche, arte di contadini nobili nelle loro fortezze monastiche.

- id: 803
  line_start: 3248
  it: >
    La moltiplicazione di scrittori mediocri in certe epoche intriga chi
    dimentica che una simile moltiplicazione esiste in tutte le epoche, e che
    semplicemente non la vediamo dove l’apparizione inspiegabile di un grande
    scrittore la eclissa.

- id: 804
  line_start: 3252
  it: >
    L’uomo moderno si è imprigionato nella propria autonomia, sordo al
    misterioso rumore di onde che colpiscono la nostra società.

- id: 805
  line_start: 3256
  it: >
    Colui che non crede ai miti che il grande poeta inventa non lo ha compreso,
    anche quando abbia passato l’intera vita a studiarlo.

- id: 806
  line_start: 3260
  it: >
    I ribelli verso una tradizione non contano oppure risultano più leali alla
    tradizione dei suoi presunti fedeli.

- id: 807
  line_start: 3264
  it: >
    L’uomo chiude gli occhi davanti ai veri problemi come il commentatore di
    fronte alle vere difficoltà del testo.

