    Per scandalizzare l’individuo di sinistra basta dire la verità.

- id: 3791
  line_start: 14166
  it: >
    Senza la complicità dell’immaginazione il potere si trasforma in forza
    bruta.

- id: 3792
  line_start: 14168
  it: >
    Bisogna incorniciarlo con delle quinte o circondarlo di mitragliatrici.

- id: 3793
  line_start: 14172
  it: >
    La rivoluzione assoluta è il tema prediletto di coloro che neppure si
    azzardano a protestare quando vengono calpestati.

- id: 3794
  line_start: 14176
  it: >
    L’unica cosa che fa vergognare i moderni è confessare dell’ammirazione per
    un autore passato di moda.

- id: 3795
  line_start: 14180
  it: >
    L’individuo di sinistra evita con miracoloso tatto di dare fastidio ai veri
    potenti.

- id: 3796
  line_start: 14182
  it: >
    Egli vilipendia soltanto i simulacri di potere.

- id: 3797
  line_start: 14186
  it: >
    Il sinistrorso che protesti allo stesso modo contro i crimini di destra o di
    sinistra è chiamato dai suoi compagni, a ragione, reazionario.

- id: 3798
  line_start: 14190
  it: >
    Il sinistrismo è la bandiera sotto la quale la mentalità borghese del XIX
    secolo mantiene la propria egemonia nel XX.

- id: 3799
  line_start: 14194
  it: >
    L’affanno con cui oggi si cerca spiegazione a tutto nella psicologia
    dell’inconscio è il riflesso dell’angoscia moderna di fronte alla
    trascendenza.

- id: 3800
  line_start: 14198
  it: >
    La differenza tra originalità e imitazione, nelle arti, dipende dal grado di
    fusione che raggiungono nella mente dell’artista i materiali che una
    tradizione culturale accumula.

- id: 3801
  line_start: 14202
  it: >
    I drammi causati dalle leggi dell’uomo, e non dalle leggi del mondo,
    sembrano presto ai posteri delle semplici curiosità etnografiche.

- id: 3802
  line_start: 14206
  it: >
    Tutto può essere espressione, però solo la parola è rivelazione finale.

- id: 3803
  line_start: 14210
  it: >
    La cultura è fondamentalmente il codice delle maniere nobili
    dell’intelligenza.

- id: 3804
  line_start: 14214
  it: >
    Non è chi risponde alle domande a conoscere l’argomento, bensì chi le
    complica.

- id: 3805
  line_start: 14218
  it: >
    Quandanche abbia ragione, una rivoluzione non risolve nulla.

- id: 3806
  line_start: 14222
  it: >
    Il giornalismo è stato la culla della critica letteraria.

- id: 3807
  line_start: 14224
  it: >
    L’università è la sua tomba.

- id: 3808
  line_start: 14228
  it: >
    L’eccentricità letteraria è carente di efficacia estetica se è qualcosa di
    più di una scorciatoia per arrivare presto al cammino reale.

- id: 3809
  line_start: 14232
  it: >
    Sono come il popolo: il lusso non mi indigna se non in mani indegne.

- id: 3810
  line_start: 14236
  it: >
    Quello che comporta più lavoro insegnare al giovane è che non esistono
    ricette.

- id: 3811
  line_start: 14240
  it: >
    Vorremmo che tutto fosse dimostrabile: per poter arrivare alla verità senza
    aver bisogno di essere intelligenti.

- id: 3812
  line_start: 14244
  it: >
    Le rivoluzioni hanno la funzione di distruggere le illusioni che le causano.

- id: 3813
  line_start: 14248
  it: >
    Anche gli errori passano di moda, come le verità.

- id: 3814
  line_start: 14252
  it: >
    L’anarchia che minaccia una società che si svilisce non è il suo castigo,
    bensì il suo rimedio.

- id: 3815
  line_start: 14256
  it: >
    La parola “progresso” avrà senso quando si inventerà il metodo di
    sciogliere, nodo per nodo, le maglie della rete con cui il progressista ci
    ha pescato.

- id: 3816
  line_start: 14260
  it: >
    Il reazionario non è indignato da determinate cose, ma da qualsiasi cosa
    fuori luogo.

- id: 3817
  line_start: 14264
  it: >
    La sinistra e la destra hanno firmato, contro il reazionario, un patto
    segreto di aggressione perpetua.

- id: 3818
  line_start: 14268
  it: >
    Il reazionario è il guardiano delle eredità.

- id: 3819
  line_start: 14270
  it: >
    Persino dell’eredità del rivoluzionario.

- id: 3820
  line_start: 14274
  it: >
    Per comprendere il filosofo non bisogna inventariare le sue idee, ma
    identificare l’angelo contro cui lotta.

- id: 3821
  line_start: 14278
  it: >
    Lo scrittore che si internazionalizza si priva della sostanza.

- id: 3822
  line_start: 14280
  it: >
    Lo scrittore non è chiamato a cambiare di territorio, bensì di livello.

- id: 3823
  line_start: 14284
  it: >
    Lo scrittore dev’essere professionale, però la letteratura non deve essere
    professione.

- id: 3824
  line_start: 14288
  it: >
    La cultura dello scrittore non deve disseminarsi nella sua prosa, bensì
    nobilitare il timbro della sua frase.

- id: 3825
  line_start: 14292
  it: >
    Lo scrittore ci invita a capire il suo linguaggio, non a tradurlo nella
    lingua delle nostre equivalenze.

- id: 3826
  line_start: 14296
  it: >
    Chi ambisce ad essere scrittore non deve approfittare dei depositi del
    linguaggio.

- id: 3827
  line_start: 14298
  it: >
    La frase non deve tollerare parole soddisfatte del solo sedimento di
    significato sufficiente a renderle intelligibili.

- id: 3828
  line_start: 14302
  it: >
    Ogni parola deve scoppiare come una compatta carica di senso.

- id: 3829
  line_start: 14306
  it: >
    Né la polvere né il tempo sporcano le frasi limpide.

- id: 3830
  line_start: 14310
  issues: [truncated-opening]
  it: >
    qualità di scrittura. Quandanche nessuno ci legga.

- id: 3831
  line_start: 14314
  it: >
    Dubiterei di più della qualità di queste pagine se non sapessi già chi
    troverà in esse il repertorio delle opinioni che detesta.

- id: 3832
  line_start: 14318
  it: >
    Non appartengo a un mondo che perisce.

- id: 3833
  line_start: 14320
  it: >
    Prolungo e trasmetto una verità che non muore.

