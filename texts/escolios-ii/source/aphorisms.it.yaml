  line_start: 1264
  it: >
    Nelle scienze umane, l’intelligenza non compie la propria funzione se non
    assumendo per suo conto e a suo rischio in ogni momento l’intero passato di
    quelle scienze.

- id: 254
  line_start: 1268
  it: >
    L’uomo è inorgoglito dalle proprie opere perché dimentica che se ciò che fa
    è suo, suo non è l’avere la capacità di farlo.

- id: 255
  line_start: 1272
  it: >
    La prosa si corrompe quando si propone di essere convincente invece di
    essere semplicemente intelligibile.

- id: 256
  line_start: 1274
  it: >
    Dobbiamo dire senza storture quello che pensiamo, ma lasciare che il lettore
    si convinca da solo.

- id: 257
  line_start: 1278
  it: >
    Il dialogo perverte i propri partecipanti.

- id: 258
  line_start: 1280
  it: >
    O si impuntano per ostinazione o concedono per apatia.

- id: 259
  line_start: 1284
  it: >
    È durato più di un millennio il periodo della storia europea durante il
    quale la salvezza sociale è stata possibile.

- id: 260
  line_start: 1286
  it: >
    Ed ottenuta varie volte.

- id: 261
  line_start: 1290
  it: >
    Ma in tempi democratici, o cesarei, possiamo soltanto salvare l’anima. E
    nemmeno sempre.

- id: 262
  line_start: 1294
  it: >
    L’uomo d’azione confonde ed inganna l’intellettuale che lo interpreta
    precisamente perché non ha mai tempo per essere sottile.

- id: 263
  line_start: 1298
  it: >
    Indignato verso il borghese che “placa la sua coscienza” dando un’elemosina
    dal proprio peculio, il cattolico di sinistra si propone di farlo
    distribuendo abnegatamente il peculio altrui.

- id: 264
  line_start: 1302
  it: >
    La scienza politica continuerà ad essere ridotta a un incoerente catalogo di
    incidenti storici fintantoché non esisterà un’assiologia che le fissi dei
    fini e una biologia politica che le somministri dei mezzi.

- id: 265
  line_start: 1306
  it: >
    Il poeta, rinunciando al metro, consegna la poesia all’intellettualismo.

- id: 266
  line_start: 1310
  it: >
    Per risolversi ad intraprendere qualsiasi cosa, l’uomo intelligente oggi ha
    bisogno di una noia insondabile.

- id: 267
  line_start: 1314
  it: >
    Ogni retta porta dritto all’inferno.

- id: 268
  line_start: 1318
  it: >
    Le vie non affascinano l’immaginazione se non quando serpeggiano fra muri
    ciechi.

- id: 269
  line_start: 1322
  it: >
    Le rivoluzioni non sono figlie di poveri invidiosi o famelici, bensì di
    ricchi pusillanimi o ambiziosi.

- id: 270
  line_start: 1326
  it: >
    È sufficiente guardare chi è ad insultarci per saperci vendicati.

- id: 271
  line_start: 1330
  it: >
    La società moderna serba il peculiare proposito di cambiare sistematicamente
    le autorità sociali a favore di autorità politiche.

- id: 272
  line_start: 1332
  it: >
    Vale a dire: le istanze civilizzatrici a favore di cariche amministrative.

- id: 273
  line_start: 1336
  it: >
    La propaganda, tanto in Russia quanto in Cina, seleziona così
    intenzionalmente gli argomenti grossolani e le falsificazioni ovvie che è
    necessario attribuire il trionfo del comunismo al disprezzo con cui tratta
    l’intelligenza delle moltitudini.

- id: 274
  line_start: 1340
  it: >
    Ciò che lo psicologo attuale rifiuta enfaticamente è più la parola “istinto”
    che la nozione di istinto.

- id: 275
  line_start: 1344
  it: >
    Giacché spiegare significa identificare, la conoscenza non è esplicativa
    dove l’individualità è il suo oggetto.

- id: 276
  line_start: 1348
  it: >
    La giustizia immanente postula che solo un rivoluzionario possa fucilarne un
    altro.

- id: 277
  line_start: 1352
  it: >
    L’efficacia come oggetto, la tecnica come meta, i mezzi come fini.

- id: 278
  line_start: 1356
  it: >
    Il socialismo di questo secolo non ha ereditato dalla società borghese che
    seppellisce se non le deformità denunciate dal socialismo del secolo scorso.

- id: 279
  line_start: 1360
  it: >
    Non è facile discernere se il giornalismo contemporaneo sia un cinico
    proposito di lucrarsi avvilendo l’uomo oppure un apostolato “culturale” di
    menti irrimediabilmente incolte.

- id: 280
  line_start: 1364
  it: >
    La filosofia diventa più sensata quanto più si approssima alla letteratura.

- id: 281
  line_start: 1366
  it: >
    La prosa limpida è lo scoglio della speculazione stravagante.

- id: 282
  line_start: 1370
  it: >
    La lucidità nel XX secolo ha per requisito la rinuncia alla speranza.

- id: 283
  line_start: 1374
  it: >
    Molti credono che l’enunciato laconico sia dogmatico e stimano la generosità
    di un’intelligenza proporzionale alla prolissità della sua prosa.

- id: 284
  line_start: 1378
  it: >
    L’individuo deve pensare nella lingua di una tradizione filosofica così come
    deve esprimersi nella lingua di una collettività linguistica.

- id: 285
  line_start: 1380
  it: >
    L’originalità dipende solo dalla piega dello spirito.

- id: 286
  line_start: 1384
  it: >
    Una cultura muore quando nessuno sa in che cosa consiste, o quando tutti
    credono di saperlo.

- id: 287
  line_start: 1388
  it: >
    Il mondo moderno critica con acredine coloro che “voltano le spalle alla
    vita”.

- id: 288
  line_start: 1390
  it: >
    Come se fosse possibile sapere con certezza che voltare le spalle alla vita
    non significhi ritornare col volto verso la luce.

- id: 289
  line_start: 1394
  it: >
    I conflitti sociali in una società sana sorgono fra settori funzionali,
    mentre in una società malata fra strati economici.

- id: 290
  line_start: 1398
  it: >
    Avendo l’uomo un animale rannicchiato nel retrobottega della sua anima,
    persino una società giusta avrebbe bisogno di proteggersi dalla perversione
    umana.

- id: 291
  line_start: 1400
  it: >
    La coercizione sociale non è una conseguenza della storia sociale, bensì
    della natura dell’uomo.

- id: 292
  line_start: 1404
  it: >
    Anche in Arcadia è prudente tenere d’occhio i sognatori di utopie.

- id: 293
  line_start: 1408
  it: >
    “Necessità storica” è il nome dell’ultima metamorfosi del più sanguinario
    dio azteco.

- id: 294
  line_start: 1412
  it: >
    Se i paleontologi non sbagliano nell’affermare che l’ominide apparve venti
    milioni di anni fa, il progressista dovrà aspettare altrettanto tempo
    affinché l’uomo cambi la propria perversione in favore di una nuova.

- id: 295
  line_start: 1416
  it: >
    Non dobbiamo accusare i moderni di aver ucciso Dio. Questo crimine non è
    alla loro portata.

- id: 296
  line_start: 1420
  it: >
    Dobbiamo accusarli di aver ucciso gli dèi.

- id: 297
  line_start: 1422
  it: >
    Dio continua ad essere intatto, ma l’universo appassisce e imputridisce
    perché gli dèi subalterni sono morti.

- id: 298
  line_start: 1426
  it: >
    Non valeva la pena negare grani di incenso agli altari di Augusto, che
    dopotutto qualcosa di divino aveva, per concludere celebrando con ditirambi
    sacrileghi la moltitudine, che di divino non ha nulla.

- id: 299
  line_start: 1430
  it: >
    Per soffocare l’angoscia di fronte alla trascendenza che lo invade, l’uomo
    inventa una mitologia di larve subcoscienti.

- id: 300
  line_start: 1432
  it: >
    Niente di più tranquillizzante che ridurre a fermentazioni interne le
    evidenze che spaventano.

- id: 301
  line_start: 1436
  it: >
    La verità del cristianesimo non abita nella sua mitologia, ma è presente nel
    mito come la Presenza nell’ostia.

- id: 302
  line_start: 1440
  it: >
    Il nostro dovere attuale non sta tanto nell’obbedire a determinate regole
    etiche, quanto nel salvare la coscienza del sacro.

- id: 303
  line_start: 1444
  it: >
    Nostro fratello non è chi possiede forma corporale simile alla nostra, bensì
    chi palpa lo stesso mistero.

- id: 304
  line_start: 1448
  it: >
    Quando l’uomo la estromette dall’universo, la religione si rifugia nella
    poesia.

- id: 305
  line_start: 1452
  it: >
    La poesia è l’impronta digitale di Dio nell’argilla umana.

- id: 306
  line_start: 1456
  it: >
    Sotto i dogmi sui quali si collocano i naturalismi l’immaginazione accumula
    silenziosamente la propria dinamite.

- id: 307
  line_start: 1460
  it: >
    Ci si deve opporre oggi a qualsiasi censura affinché la carogna moderna
    imputridisca con maggior celerità.

- id: 308
  line_start: 1464
  it: >
    Per passare dal mondo profano a quello sacro, la postierla8 dell’esperienza
    estetica si offre a coloro che sono intimiditi dalla porta della conversione
    religiosa.

- id: 309
  line_start: 1468
  it: >
    La zona dell’universo evidente alla coscienza si è ristretta tanto che ormai
    non percepiamo altro che l’ombra della materia.

- id: 310
  line_start: 1472
  it: >
    Quelli che come me non vogliono appartenere a questo secolo di invidia
    devono tagliare quotidianamente sette teste all’invidia del proprio cuore.

- id: 311
  line_start: 1474
  it: >
    Siccome tutto quello che oggi si costruisce passa automaticamente al nemico,
    prima di costruire dobbiamo attendere che il tempo porti dei materiali che
    non tradiscono.

- id: 312
  line_start: 1478
  it: >
    Chi è fedele alle regole di un sistema chiama presuntuoso colui che opina
    liberamente in ciascuna occasione.

- id: 313
  line_start: 1480
  it: >
    Come se optare per un sistema totale non fosse più presuntuoso che azzardare
    giudizi limitati.

- id: 314
  line_start: 1484
  it: >
    Lo storico suol ritenere universali i criteri di verosimiglianza del proprio
    tempo.

- id: 315
  line_start: 1488
  it: >
    Gli apostoli della “necessità storica” scordano il fatto che sia opera di
    coloro che non si sono sottomessi ad essa.

- id: 316
  line_start: 1492
  it: >
    Per vivere non è necessario occupare un trono. È sufficiente saperci
    legittimi pretendenti ad una corona.

- id: 317
  line_start: 1494
  it: >
    Ma è impossibile vivere se sospettiamo che le nostre pretese siano
    illegittime.

- id: 318
  line_start: 1498
  it: >
    Ogni soluzione sembra banale a chi ignora il problema.

- id: 319
  line_start: 1502
  it: >
    Esprimere idee è facile, però è quasi impossibile comunicare il contesto che
    le rende intelligibili.

- id: 320
  line_start: 1504
  it: >
    Chi non condivide le nostre esperienze quando crede di capirci si inganna.

- id: 321
  line_start: 1508
  it: >
    Al cospetto di così tanti intellettuali insipidi, artisti senza talento,
    rivoluzionari stereotipati, un borghese senza pretese pare una statua greca.

- id: 322
  line_start: 1512
  it: >
    Chi si esprime brevemente senza l’abituale apparato di riferimenti e di
    citazioni aspira ad essere avvalorato dalle sue sole maniere.

- id: 323
  line_start: 1516
  it: >
    Dobbiamo diffidare di chi ha bisogno di certificati d’origine per provare la
    propria nobiltà.

- id: 324
  line_start: 1520
  it: >
    Non è la ricchezza ciò che scandalizza il povero, bensì l’arricchimento.

- id: 325
  line_start: 1524
  it: >
    Il popolo si è sempre burlato dei nuovi ricchi ma rispetta le fortune
    antiche, anche se le confisca.

- id: 326
  line_start: 1528
  it: >
    Questo mondo impoverito è il prodotto di una visione deformata da pregiudizi
    già abrogati.

- id: 327
  line_start: 1530
  it: >
    Non dobbiamo occuparci di ripetere confutazioni, bensì di inventare riti
    propizi alla catarsi dei sensi.

- id: 328
  line_start: 1534
  it: >
    Né l’uomo possiede istinti religiosi o artistici né la filosofia o la
    scienza dipendono da facoltà inerenti alla natura umana.

- id: 329
  line_start: 1536
  it: >
    Nessuna di queste attività è un elemento costitutivo della condizione
    dell’uomo. Sono tutte incidenti della sua storia.

- id: 330
  line_start: 1538
  it: >
    Dio, la bellezza, la verità possono morire perché non sono mere proiezioni
    innate della natura umana.

- id: 331
  line_start: 1540
  it: >
    Sono immortali nell’uomo solo gli appetiti che condivide con le bestie.

- id: 332
  line_start: 1544
  it: >
    Qualunque teoria che pretenda di qualificare come inganno ciò che un giorno
    ci commosse nobilmente, è falsa.

- id: 333
  line_start: 1548
  it: >
    La maggioranza degli uomini muoiono senza che sia nata loro l’anima.

- id: 334
  line_start: 1552
  it: >
    L’opinione della posterità sulle nostre lingue è imprevedibile, però le idee
    moderne sembreranno pensate in latino corrotto.

- id: 335
  line_start: 1554
  it: >
    La sintassi intellettuale dei moderni ricorda la sintassi grammaticale di
    Fredegario.

- id: 336
  line_start: 1558
  it: >
    Le verità non sono strumenti per lo sfruttamento del pianeta, ma stendardi
    sotto i quali crediamo che valga la pena di morire.

- id: 337
  line_start: 1562
  it: >
    Lo storico si suicida quando trasforma l’interpretazione corretta di un
    avvenimento in chiave della storia.

- id: 338
  line_start: 1566
  it: >
    La nostra miseria proviene meno dai nostri problemi che dalle soluzioni che
    sono idonee per essi.

- id: 339
  line_start: 1570
  it: >
    La sorte della verità allarma e tiene svegli molti.

- id: 340
  line_start: 1572
  it: >
    Come se l’uomo potesse fare di più che suicidarsi!

- id: 341
  line_start: 1576
  it: >
    Una civiltà cristiana non è un patto con una civiltà profana, bensì un’eco
    del combattimento cristiano con il mondo.

- id: 342
  line_start: 1580
  it: >
    La Chiesa potè battezzare la società medioevale perché era una società di
    peccatori, ma il suo avvenire non è lusinghiero nella società moderna in cui
    tutti si credono innocenti.

- id: 343
  line_start: 1584
  it: >
    La Chiesa deve intervenire in politica.

- id: 344
  line_start: 1586
  it: >
    Ma senza programma politico.

- id: 345
  line_start: 1590
  it: >
    Solo il cattolico prossimo all’apostasia è irritato dalle provvidenziali
    sonnolenze della Chiesa.

- id: 346
  line_start: 1594
  it: >
    Il canonico corpulento e lussurioso che crede in Dio è più indiscutibilmente
    cristiano del pastore austero e macilento che crede nell’uomo.

- id: 347
  line_start: 1598
  it: >
    Il metodo dialettico sembra inventato per eludere l’obbligo di collocare
    ciascuna cosa al suo posto dettato dal metodo gerarchico.

- id: 348
  line_start: 1602
  it: >
    Molte dottrine valgono meno per i successi che contengono che per gli errori
    che rifiutano.

- id: 349
  line_start: 1606
  it: >
    L’uomo non può condannare se stesso né assolversi.

- id: 350
  line_start: 1608
  it: >
    L’uomo non è altro che una capacità di essere perdonato.

- id: 351
  line_start: 1612
  it: >
    Comprendere senza giustificare è l’unico atteggiamento che permette di
    evitare la scelta frequentemente imperativa fra complicità e stolidità.

- id: 352
  line_start: 1616
  it: >
    Questo secolo sciocco tollera che la volgarità dell’erotismo lo privi dei
    piaceri dell’impudicizia.

- id: 353
  line_start: 1620
  it: >
    Quandanche la necessità reggesse il corso della storia e conoscessimo la sua
    rotta ad ogni istante, le norme atemporali ci intimerebbero molte volte di
    andare contropelo rispetto ai fatti e a scegliere deliberatamente il
    disastro.

- id: 354
  line_start: 1624
  it: >
    Immaginazione, fantasia e umorismo sono indirizzi divergenti della metafora.

- id: 355
  line_start: 1626
  it: >
    Immaginazione, quando l’identificazione metaforica ascende ad uno strato
    superiore dell’essere.

- id: 356
  line_start: 1628
  it: >
    Fantasia, quando i termini della metafora appartengono al medesimo strato.

- id: 357
  line_start: 1630
  it: >
    Umorismo, quando l’identificazione discende a strati inferiori.

- id: 358
  line_start: 1634
  it: >
    Avendo previamente risolto che le forme religiose non sono altro che tappe
    di un progresso, la filosofia della religione, a partire da Lessing, limita
    la religione autentica al rispetto che si ha per la direzione attribuita a
    quel presunto progresso.

- id: 359
  line_start: 1638
  it: >
    A questa soluzione insipida si oppone il cattolicesimo, il quale integra
    tanto il rito magico quanto la contemplazione mistica, tanto il
    comportamento etico quanto il raziocinio teologico.

- id: 360
  line_start: 1642
  it: >
    Il cattolicesimo è la strutturazione gerarchica della storia delle
    religioni.

- id: 361
  line_start: 1646
  it: >
    Il reazionario non diventa conservatore se non nelle epoche che serbano
    qualcosa che è degno di essere conservato.

- id: 362
  line_start: 1650
  it: >
    Anche nell’immensità dello spazio ci sentiamo ingabbiati.

- id: 363
  line_start: 1652
  it: >
    Il mistero è l’unico infinito che non ci sembra una prigione.

- id: 364
  line_start: 1656
  it: >
    Colui che si precipita mette in fuga moltitudini di dèi.

- id: 365
  line_start: 1660
  it: >
    Anche le virtù sono intraducibili.

- id: 366
  line_start: 1664
  it: >
    Alcune parlano solo latino. Altre sanno solo l’inglese. Ce ne sono di
    squisite in francese che in altre lingue si corrompono.

- id: 367
  line_start: 1668
  it: >
    Certune hanno bisogno del tedesco per esprimere la propria scrupolosa
    serietà. Certe altre solo in spagnolo non paiono semplici modi plebei.

- id: 368
  line_start: 1672
  it: >
    Dal greco, infine, nessuno ha potuto tradurre una sola virtù.

- id: 369
  line_start: 1676
  it: >
    La Chiesa attuale esclude gentilmente dal deposito rivelato tutto quello che
    l’opinione pubblica condanna.

- id: 370
  line_start: 1680
  it: >
    I nuovi liturgisti hanno soppresso i pulpiti sacri affinché nessun malevolo
    sostenga che la Chiesa pretende di rivaleggiare con le cattedre profane.

- id: 371
  line_start: 1684
  it: >
    L’attuale pontefice prega per quel progresso che Bury - il suo storico - ha
    definito “sostituto della provvidenza”.

- id: 372
  line_start: 1688
  it: >
    I pagani, gli scismatici e gli eretici sono gli archi rampanti della
    cattedrale cattolica.

- id: 373
  line_start: 1692
  it: >
    Ciò che irrita il cristiano attuale nel Medioevo è il cristianesimo.

- id: 374
  line_start: 1696
  it: >
    Il mio cristianesimo è meno etico che ontologico: mi vivo meno come
    peccatore che come creatura.

- id: 375
  line_start: 1700
  it: >
    Autorità è la caratteristica propria di quello che ci soggioga, come la
    poesia di Omero o il genio di Platone.

- id: 376
  line_start: 1702
  it: >
    Autorità non è quello che riesce a comandare, bensì quello a cui non è
    concepibile disobbedire senza demenza.

- id: 377
  line_start: 1706
  it: >
    Nulla di autentico si può autenticare con degli argomenti. Possiamo solo
    argomentare la nostra adesione a persone o la nostra ammirazione per opere
    d’arte, quando la persona è mezzo di fini egoisti e le opere pretesti
    ideologici.

- id: 378
  line_start: 1710
  it: >
    L’uomo non ama la realtà empirica dell’essere amato, ma la sua idea
    concreta.

- id: 379
  line_start: 1712
  it: >
    Non somma di accidenti e nemmeno semplice partecipe di un ideale generico,
    l’essere amato è l’idea concreta della sua perfezione individuale.

- id: 380
  line_start: 1716
  it: >
    Ogni essere è una statua tronca alla quale solo l’amore restituisce le curve
    mutilate.

- id: 381
  line_start: 1720
  it: >
    La filosofia è l’arte di formulare lucidamente dei problemi. Inventare
    soluzioni non è un’occupazione da intelligenze serie.

- id: 382
  line_start: 1724
  it: >
    Tutte le proposizioni universali sono false.

- id: 383
  line_start: 1726
  it: >
    Eccetto questa.

- id: 384
  line_start: 1730
  it: >
    Coloro che pretendono di abolire l’alienazione dell’uomo cambiando la
    struttura giuridica dell’economia, ricordano colui che risolse il problema
    della sua sventura coniugale vendendo il divano dell’adulterio.

- id: 385
  line_start: 1734
  it: >
    Lo sciocco si immagina che la voluttà di infrangere le regole cresca
    indefinitamente con l’abolizione delle stesse regole.

- id: 386
  line_start: 1738
  it: >
    Tutto ciò che è terrestre che si presume essere un fine si corrompe.

- id: 387
  line_start: 1742
  it: >
    L’essere immanente risplende solo dove si formano crepe.

- id: 388
  line_start: 1746
  it: >
    Quasi tutti gli uomini si frustrano quando le dottrine imperanti negano
    loro, come oggi, il diritto alla legittima subordinazione a cui segretamente
    aspirano.

- id: 389
