    Tanto l’amore pagano quanto quello romantico sono innocenti: è depravata
    solo la sessualità soddisfatta e igienica fra uguali.

- id: 1088
  line_start: 4286
  it: >
    Saint-Just, nonostante i suoi gesti da iena, è un eminente pensatore
    borghese: la sua celebre frase su le bonheur19 merita di servire da
    intestazione alle riviste per signore.

- id: 1089
  line_start: 4290
  it: >
    Non dobbiamo cercare di convincere; l’apostolato guasta le buone maniere.

- id: 1090
  line_start: 4294
  it: >
    Accettiamo la sociologia finché classifica senza pretendere di spiegare.

- id: 1091
  line_start: 4298
  it: >
    La sete di ciò che è grande, nobile e bello è un appetito di Dio che
    ignoriamo.

- id: 1092
  line_start: 4302
  it: >
    La varietà (diversità, molteplicità) che non proviene dalla natura ma dalla
    volontà risulta banale e monotona.

- id: 1093
  line_start: 4306
  it: >
    Cercare la “verità fuori dal tempo” è il modo di trovare la “verità del
    nostro tempo”.

- id: 1094
  line_start: 4308
  it: >
    Chi cerca la “verità del proprio tempo” trova i luoghi comuni di quel
    giorno.

- id: 1095
  line_start: 4312
  it: >
    Con l’Indipendenza finì l’autenticità spirituale dell’America. Capace,
    durante il periodo coloniale, di adattare le forme mediterranee ai nuovi
    paesaggi e anche di dare una propria modulazione al barocco, successivamente
    copia con docilità plebea solo le mode del momento.

- id: 1096
  line_start: 4314
  it: >
    L’originalità limitata ma autentica da provincia spagnola che ebbe durante
    la Colonia si convertì in plagio volgare, peculiare dei quartieri poveri.

- id: 1097
  line_start: 4318
  it: >
    Quando l’uomo si rifiuta di farsi disciplinare dagli dèi, sarà disciplinato
    dai demoni.

- id: 1098
  line_start: 4322
  it: >
    Quello che probabilmente si avvicina non è un terrore rivoluzionario, bensì
    un terrore controrivoluzionario instaurato da rivoluzionari schifati.

- id: 1099
  line_start: 4326
  it: >
    L’intelligenza è spontaneamente aristocratica perché è la facoltà di
    distinguere le differenze e fissare dei ranghi.

- id: 1100
  line_start: 4330
  it: >
    Nietzsche è il paradigma del reazionario che claudica, nell’adottare le armi
    del nemico, perché non si rassegna alla sconfitta.

- id: 1101
  line_start: 4334
  it: >
    Per partecipare ai conflitti sociali di questo secolo il cittadino onesto
    deve richiedere un fucile che spari simultaneamente in direzioni
    antagoniste.

- id: 1102
  line_start: 4338
  it: >
    Il socialista non capisce che coloro che prevedono il trionfo del socialismo
    sono reazionari.

- id: 1103
  line_start: 4340
  it: >
    Quando lo sono precisamente perché lo prevedono.

- id: 1104
  line_start: 4344
  it: >
    Non bisogna contare tra i sostenitori della disuguaglianza quelli che
    rifiutano l’uguaglianza economica, perché sanno che li distingue solo la
    ricchezza.

- id: 1105
  line_start: 4348
  it: >
    Le individualità vigorose non compaiono se non nel seno di severe discipline
    collettive.

- id: 1106
  line_start: 4352
  it: >
    Affinché il tronco dell’individualità cresca è necessario impedire che la
    libertà lo sparpagli in rami.

- id: 1107
  line_start: 4356
  it: >
    La comparsa del nazionalismo in qualsiasi nazione indica che la sua
    originalità è agonizzante.

- id: 1108
  line_start: 4360
  it: >
    Sfarzo da palazzo barocco o nudità da cella romanica. In nessun modo lusso
    da società industriale.

- id: 1109
  line_start: 4364
  it: >
    Né gli individui né i popoli sono originali quando esprimono meramente
    quello che sono, bensì quando coniano a propria effigie princìpi universali.

- id: 1110
  line_start: 4368
  it: >
    Rango culturale e rango estetico dell’opera d’arte sono categorie distinte.

- id: 1111
  line_start: 4370
  it: >
    Il rango culturale dipende dalla qualità della cultura alla quale l’opera
    appartiene e il rango estetico dipende dalla sola qualità dell’opera. Opere
    di basso rango estetico possono avere un alto rango culturale perché portano
    con sé i valori della cultura insigne a cui appartengono.

- id: 1112
  line_start: 4372
  it: >
    Inversamente, opere di basso rango culturale possono essere redente dalla
    loro eccellenza estetica.

- id: 1113
  line_start: 4376
  it: >
    L’universo non è sistema, vale a dire coerenza logica.

- id: 1114
  line_start: 4378
  it: >
    Esso è una struttura gerarchica di paradossi.

- id: 1115
  line_start: 4382
  it: >
    Che il cristianesimo non risolva i problemi sociali è una ragione di
    apostasia solo per coloro che dimenticano che non ha mai promesso di
    risolverli.

- id: 1116
  line_start: 4386
  it: >
    Il cristianesimo dei secoli autenticamente cristiani non fu figlio della
    debolezza, ma della forza.

- id: 1117
  line_start: 4388
  it: >
    Della forza che conosce la propria debolezza.

- id: 1118
  line_start: 4392
  it: >
    Non sarmento.

- id: 1119
  line_start: 4394
  it: >
    Mera polvere, al riparo della sua ombra.

- id: 1120
  line_start: 4398
  it: >
    Il cristianesimo è radicalmente avverso alla teocrazia.

- id: 1121
  line_start: 4400
  it: >
    Una società diventata Chiesa non preannuncia il regno di Dio. Disegna,
    invece, la sua caricatura satanica.

- id: 1122
  line_start: 4402
  it: >
    La Chiesa reclama la parallela esistenza dell’Impero.

- id: 1123
  line_start: 4404
  it: >
    Personalmente, credo legittimo solo un mondo che sia presieduto, in troni
    simmetrici, dal Pontefice Romano e dall’Imperatore Germanico.

- id: 1124
  line_start: 4408
  it: >
    La cristianità non ha mai preteso, né lo pretenderà se dovesse risuscitare,
    di essere il regno di Dio.

- id: 1125
  line_start: 4410
  it: >
    Ma una società di peccatori cristiani.

- id: 1126
  line_start: 4414
  it: >
    Non è una restaurazione ciò che il reazionario brama, bensì un nuovo
    miracolo.

- id: 1127
  line_start: 4418
  it: >
    Solo l’anima ancorata al passato non naufraga sotto i venti notturni.

- id: 1128
  line_start: 4422
  it: >
    La fede nel clero moderno non è stata sufficiente per controbilanciare la
    rozzezza della sua bassa estrazione.

- id: 1129
  line_start: 4426
  it: >
    Una certa ironia dispiaciuta non è altro che un riflesso compensatorio di
    invidia.

- id: 1130
  line_start: 4430
  it: >
    Il distintivo del giovane di sinistra: figa e rivoluzione.

- id: 1131
  line_start: 4434
  it: >
    Ogni valore è individuale.

- id: 1132
  line_start: 4436
  it: >
    E pertanto imprevedibile, casuale e irriducibile.

- id: 1133
  line_start: 4438
  it: >
    (Nessuno ricostruirà le tragedie perdute di Eschilo).

- id: 1134
  line_start: 4442
  it: >
    Lo scettico che non è più tentato dalla fede di solito si arrende a
    convinzioni ingenue.

- id: 1135
  line_start: 4446
  it: >
    La speranza non intontisce fatalmente se non è speranza in un futuro con la
    maiuscola.

- id: 1136
  line_start: 4448
  it: >
    Serbare la speranza di un nuovo splendore terrestre non è cosa illecita,
    sempre che si speri in uno splendore ferito, debole e mortale. Possiamo
    amare senza colpa ciò che è terrestre finché ricordiamo di amare un’effimera
    argilla.

- id: 1137
  line_start: 4452
  it: >
    La nostra indipendenza intellettuale cresce con la crescente indifferenza
    degli anni.

- id: 1138
  line_start: 4456
  it: >
    La capacità di complicare l’ovvio fu una condizione basilare della
    metamorfosi dell’animale in uomo.

- id: 1139
  line_start: 4458
  it: >
    Passare direttamente dall’appetito alla sua soddisfazione è ciò che
    caratterizza l’animale.

- id: 1140
  line_start: 4462
  it: >
    Una civiltà consiste sempre nel vestirsi e non nello spogliarsi.

- id: 1141
  line_start: 4466
  it: >
    Gli unici insegnamenti importanti sono quelli che solo il tono della voce
    può trasmettere.

- id: 1142
  line_start: 4470
  it: >
    Lo specialista e il giornalista stanno finendo di spartirsi l’eredità della
    cultura strangolata.

- id: 1143
  line_start: 4474
  it: >
    Oggi non è possibile rispettare i cristiani.

- id: 1144
  line_start: 4476
  it: >
    Per rispetto verso il cristianesimo.

- id: 1145
  line_start: 4480
  it: >
    L’indissolubilità del patto fra Antichità e Cristianesimo si è evidenziata
    con la ribellione simultanea della mentalità moderna contro lo spirito
    antico e lo spirito cristiano.

- id: 1146
  line_start: 4484
  it: >
    La mentalità moderna è quella che può esporsi alla cultura senza bagnarsi.

- id: 1147
  line_start: 4488
  it: >
    L’umiltà cristiana non è il disconoscimento ipocrita delle virtù che
    possediamo, bensì il riconoscimento esplicito del fatto che non sono meriti
    nostri.

- id: 1148
  line_start: 4492
  it: >
    Essere cristiano non significa professare una falsa umiltà.

- id: 1149
  line_start: 4496
  it: >
    Significa confessare che tutto ciò che è insigne è gratuito.

- id: 1150
  line_start: 4500
  it: >
    Dalla filosofia della storia ci salva solo l’epistemologia della storia.

- id: 1151
  line_start: 4504
  it: >
    Il cristianesimo non ha mai insegnato che la storia ha una finalità. Solo
    una fine.

- id: 1152
  line_start: 4508
  it: >
    La sventura dei moderni non è dover vivere una vita mediocre, bensì credere
    che potrebbero viverne una che non lo è.

- id: 1153
  line_start: 4512
  it: >
    La democrazia è il regime politico in cui il cittadino affida gli interessi
    pubblici a chi non affiderebbe mai i propri interessi privati.

- id: 1154
  line_start: 4516
  it: >
    La massima immoralità consiste in qualsiasi contributo al progresso.

- id: 1155
  line_start: 4520
  it: >
    Per non essere dei dissoluti oggi si richiede un’anima quasi altrettanto
    vigorosa di quella per esser santi in altri secoli.

- id: 1156
  line_start: 4524
  it: >
    Qualunque opera d’arte ci parla di Dio.

- id: 1157
  line_start: 4526
  it: >
    Qualsiasi cosa esprima.

- id: 1158
  line_start: 4530
  it: >
    Il mondo, fortunatamente, è inesplicabile.

- id: 1159
  line_start: 4532
  it: >
    (Cosa sarebbe un mondo spiegabile dall’uomo!)

- id: 1160
  line_start: 4536
  it: >
    La sorte dell’uomo alla fine dipenderà dal recupero della capacità di
    coniugare il verbo “rinunciare”.

- id: 1161
  line_start: 4540
  it: >
    L’unica impresa dell’uomo degna di rispetto sarebbe quella di innalzare
    monasteri su tutte le colline.

- id: 1162
  line_start: 4544
  it: >
    La letteratura è la più sottile delle filosofie, e forse l’unica esatta.

- id: 1163
  line_start: 4548
  it: >
    Nobile è la persona capace di non fare tutto ciò che potrebbe.

- id: 1164
  line_start: 4552
  it: >
    Le civiltà sono opera di coloro che assegnano all’uomo un fine extramondano.

- id: 1165
  line_start: 4554
  it: >
    La loro distruzione è opera di quelli che gli stabiliscono un destino
    terrestre.

- id: 1166
  line_start: 4558
  it: >
    Dialogare con chi non condivide i nostri postulati non è altro che una
    maniera stupida di ammazzare il tempo.

- id: 1167
  line_start: 4562
  it: >
    La diffusione della cultura ha avuto l’effetto di rendere capace lo stupido
    di cianciare di quello che ignora.

- id: 1168
  line_start: 4566
  it: >
    Le tradizioni sociali sono il sostituto della forza.

- id: 1169
  line_start: 4568
  it: >
    Violenza statale o violenza popolare è l’alternativa delle società in
    “progresso costante”.

- id: 1170
  line_start: 4572
  it: >
    Bene comune, volontà generale, necessità storica sono i nomi con cui il
    leccapiedi di turno battezza i capricci della forza.

- id: 1171
  line_start: 4576
  it: >
    La storia sociale non può accontentarsi di inventariare senza giudicare.

- id: 1172
  line_start: 4578
  it: >
    L’esistenza di strutture presuppone giudizi di valore.

- id: 1173
  line_start: 4582
  it: >
    Come criterio del meglio l’uomo moderno non conosce se non la posteriorità.

- id: 1174
  line_start: 4586
  it: >
    Per smascherare lo stupido non esiste miglior reagente della parola
    “medioevale”.

- id: 1175
  line_start: 4588
  it: >
    Vede rosso immediatamente.

- id: 1176
  line_start: 4592
  it: >
    L’uomo si abitua alla bruttezza assoluta e al male puro con una facilità
    inquietante.

- id: 1177
  line_start: 4594
  it: >
    Un inferno senza supplizi si trasforma facilmente in un luogo piuttosto
    torrido di villeggiatura.

- id: 1178
  line_start: 4598
  it: >
    “Anarchia feudale” è il soprannome con cui il terrorismo democratico denigra
    l’unico periodo di libertà concreta che la storia abbia conosciuto.

- id: 1179
  line_start: 4602
  it: >
    I valori non sono indimostrabili perché sono dei postulati, bensì perché
    sono delle immagini.

- id: 1180
  line_start: 4604
  it: >
    Non portano una data di invenzione come le idee, ma di scoperta come i
    continenti.

- id: 1181
  line_start: 4606
  it: >
    L’assiologia è una conoscenza empirica, storica e particolare di assoluti.

- id: 1182
  line_start: 4610
  it: >
    Dio non è presente nel mondo come una roccia in un paesaggio concreto, bensì
    come la nostalgia in un paesaggio dipinto.

- id: 1183
  line_start: 4614
  it: >
    Non è nel far coincidere le nostre evidenze ciò in cui dobbiamo impegnarci,
    bensì nel subordinarle.

- id: 1184
  line_start: 4618
  it: >
    La prevaricazione e la corruzione sono gli ultimi rifugi della libertà nei
    tempi democratici.

- id: 1185
  line_start: 4622
  it: >
    L’escatologia ebraica e quella profana sono state storiche.

- id: 1186
  line_start: 4624
  it: >
    Quella cristiana invece non lo è mai stata.

- id: 1187
  line_start: 4626
  it: >
    Persino l’impazienza escatologica della generazione apostolica non attendeva
    la pienezza della storia, ma la chiusura apocalittica del tempo.

- id: 1188
  line_start: 4630
  it: >
    Per il cristiano la storia non ha una rotta, bensì un centro.

- id: 1189
  line_start: 4634
  it: >
    Se la storia avesse un senso, l’Incarnazione sarebbe di troppo.

- id: 1190
  line_start: 4638
  it: >
    Le cose non sono mute.

- id: 1191
  line_start: 4640
  it: >
    Semplicemente selezionano i propri uditori.

- id: 1192
  line_start: 4644
  it: >
    La burocrazia è uno di quei mezzi democratici che si trasformano in uno dei
    suoi fini.

- id: 1193
  line_start: 4648
  it: >
    I nomi degli individui di sinistra celebri finiscono per essere aggettivi
    insultanti in bocca degli individui di sinistra.

- id: 1194
  line_start: 4652
  it: >
    L’intellettuale non si confronta con l’uomo di Stato con integrità di
    spirito, bensì col radicalismo dell’inesperienza.

- id: 1195
  line_start: 4656
  it: >
    Una cerimonia democratica non cessa di essere volgare se non diventando
    atroce.

- id: 1196
  line_start: 4660
  it: >
    Le ideologie ottimistiche cominciano fucilando per amore.

- id: 1197
  line_start: 4662
  it: >
    Per sanare l’umanità.

- id: 1198
  line_start: 4664
  it: >
    E finiscono fucilando per rancore.

- id: 1199
  line_start: 4666
  it: >
    Perché l’umanità risulta insanabile.

- id: 1200
  line_start: 4670
  it: >
    Il pensiero reazionario non è una reazione di paura, ma una reazione di
    fronte a un crimine.

- id: 1201
  line_start: 4674
  it: >
    Non esiste compito umile che non ci colmi né gesto spettacolare che non ci
    stanchi.

- id: 1202
  line_start: 4678
  it: >
    Forse la storia, dopotutto, potrebbe non avere altra finalità se non quella
    di divertire lo storico.

- id: 1203
  line_start: 4682
  it: >
    L’individuo di sinistra non paga se non con assegni postdatati.

- id: 1204
  line_start: 4686
  it: >
    L’individuo di sinistra scopre antenati propri solo nei quartieri bassi
    dello spirito.

- id: 1205
  line_start: 4690
  it: >
    Un “socialismo dal volto umano” è un’acquavite senz’alcool.

- id: 1206
  line_start: 4694
  it: >
    Il Messia annunciato dai profeti della democrazia ottocentesca è risultato
    essere meramente un aborto dell’Anticristo.

- id: 1207
  line_start: 4698
  it: >
    Al contrario di quello che succede ai giovani, tra i vecchi solo l’imbecille
    dice sciocchezze.

- id: 1208
  line_start: 4702
  it: >
    Quella liberazione dell’umanità cantata dal XIX secolo non è altro che il
    turismo internazionale.

- id: 1209
  line_start: 4706
  it: >
    Il cattolico progressista ha decretato che l’ateismo consiste nel dubitare
    della divinità dell’uomo.

- id: 1210
  line_start: 4710
  it: >
    Il progressismo cristiano è una sbronza di tradimento.

- id: 1211
  line_start: 4712
  it: >
    Nulla di ciò che ammiriamo sinceramente in un individuo dipende da lui.

- id: 1212
  line_start: 4716
  it: >
    L’opera d’arte riuscita differisce radicalmente dall’opera d’arte fallita,
    però quella fallita differisce poco da quella riuscita.

- id: 1213
  line_start: 4718
  it: >
    Nelle arti, condannare è più difficile che scegliere.

- id: 1214
  line_start: 4722
  it: >
    A chi va a caccia di una spiegazione precisa del mondo dobbiamo consigliare
    di inventarsela.

- id: 1215
  line_start: 4724
  it: >
    Affinché corra meno pericolo di credere in essa.

- id: 1216
  line_start: 4728
  it: >
    Quando navighiamo in oceani di imbecillità, l’intelligenza ha bisogno
    dell’ausilio del buongusto.

- id: 1217
  line_start: 4732
  it: >
    La giustizia è stata uno dei motori della storia perché è il nome che assume
    l’invidia in bocca del querelante.

- id: 1218
  line_start: 4736
  it: >
    Nel XIX secolo non si viveva più angosciati per le repressioni sessuali
    piuttosto che nel XX secolo per la liberazione sessuale. Identica
    ossessione, quandanche di segno contrario.

- id: 1219
  line_start: 4740
  it: >
    Dobbiamo anelare che trionfino in modo passeggero i momenti nobili delle
    ricorrenze storiche.

- id: 1220
  line_start: 4742
  it: >
    Ma non cadiamo però nella scempiaggine di sperare in un’abolizione terrestre
    della loro monotona ripetizione.

- id: 1221
  line_start: 4746
  it: >
    Quando gli intellettuali taceranno sarà possibile che la letteratura
    risusciti.

- id: 1222
  line_start: 4750
  it: >
    I moderni pensano che il diavolo sia scomparso quando invece è diventato
    semplicemente più sottile.

- id: 1223
  line_start: 4754
  it: >
    Il problema più circoscritto interessa eternamente, se è stato trattato da
    un uomo intelligente.

- id: 1224
  line_start: 4758
  it: >
    La posterità guarda con ironia l’opera dei rivoluzionari vittoriosi, ma non
    ha ancora imparato a citare senza lagnanze il nome dei rivoluzionari
    sconfitti.

- id: 1225
  line_start: 4762
  it: >
    Tanto la percezione autentica di qualsiasi splendore terrestre quanto la
    legittimità della nostra osservanza sono condizionate dall’ammissione previa
    della loro radicale dipendenza.

- id: 1226
  line_start: 4766
  it: >
    L’imparzialità proibisce l’ingiustizia, ma non la lotta.

- id: 1227
  line_start: 4770
  it: >
    Se il reazionario non si risveglia conservatore, si trattava solo di un
    progressista paralizzato.

- id: 1228
  line_start: 4774
  it: >
    Chi bolla di sedizioso il Vangelo confonde burlescamente la negazione
    rivoluzionaria della società con la negazione apocalittica del mondo.

- id: 1229
  line_start: 4778
  it: >
    L’eternità affiora nel tempo solo quando lo viviamo come durata minacciata
    ontologicamente.

- id: 1230
  line_start: 4780
  it: >
    Tutto è effimero in una durata garantita.

- id: 1231
  line_start: 4784
  it: >
    Il cattolicesimo è la somma delle forme imposte ad un proposito tenace da
    parte di tentativi ripetuti di abolirlo.

- id: 1232
  line_start: 4786
  it: >
    Il cattolicesimo non è una successione di patti con il mondo, bensì una scia
    di trionfali naufragi.

- id: 1233
