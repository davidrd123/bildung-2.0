- id: 649
  pdf_page: 225
  print_page: 118
  es: >
    La retórica no gana sola las batallas, pero nadie gana batallas sin ella.

- id: 650
  pdf_page: 226
  es: >
    De la riqueza lo único que el rico ignora son los usos nobles, así como de
    la pobreza lo único que el pobre ignora son las virtudes.

- id: 651
  pdf_page: 227
  print_page: 119
  es: >
    El hombre asegura que la vida lo envilece, para esconder que meramente lo
    revela.

- id: 652
  pdf_page: 227
  print_page: 119
  es: >
    El mundo sería aún más tedioso, si fuese tan fácil actuar como soñar.

- id: 653
  pdf_page: 227
  print_page: 119
  es: >
    El hombre inteligente suele entregarse a combinaciones tan sutiles que les
    deja la verdad a los bobos.

- id: 654
  pdf_page: 227
  print_page: 119
  es: >
    El solo talento de un escritor nos aburre tarde o temprano, pero el escritor
    inteligente no nos aburre jamás.

- id: 655
  pdf_page: 227
  print_page: 119
  es: >
    Los tontos se dividen en dos clases: los que "quieren ser como los demás";
    los que "no quieren ser como los demás".

- id: 656
  pdf_page: 228
  es: >
    Si extraemos de la sola inmanencia los principios de la acción inmanente,
