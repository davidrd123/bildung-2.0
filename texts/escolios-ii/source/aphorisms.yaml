- id: 632
  pdf_page: 220
  es: >
    Muchas cosas parecen defensables, hasta que vemos a sus defensores.

- id: 633
  pdf_page: 221
  print_page: 116
  es: >
    Del libro del mundo no conocemos sino las páginas escritas en un idioma que
    ignoramos.

- id: 634
  pdf_page: 221
  print_page: 116
  es: >
    Se aproxima la época en que la naturaleza, desalojada por el hombre, no
