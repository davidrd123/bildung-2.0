- id: 544
  pdf_page: 190
  print_page: 100
  es: >
    Hay menos ambiciosos en el mundo que individuos que hoy se creen obligados
    moralmente a serlo.

- id: 545
  pdf_page: 191
  es: >
    Cuando las jerarquías desaparecen, no es tanto el caos, como la insulsez, lo
    que predomina.

- id: 546
  pdf_page: 192
  es: >
    Cada generación sólo entiende unos pocos libros de la biblioteca que hereda.

- id: 547
  pdf_page: 192
  es: >
    El historiador marxista, para mayor tranquilidad, debe omitir cautelosamente
    de su bibliografía los libros del historiador serio.

- id: 548
  pdf_page: 192
  es: >
    Las doctrinas se defienden mejor contra argumentos contundentes que contra
    el más leve desdén.

- id: 549
  pdf_page: 192
  es: >
    Religión y ciencia no deben firmar pactos de límites, sino tratado de
    desconocimiento recíproco.

- id: 550
  pdf_page: 192
  es: >
    Sólo los problemas de su tiempo le parecen importantes al tonto.

- id: 551
  pdf_page: 192
  es: >
    Educar es enseñar a apasionarse por lo que carece de vigencia.

- id: 552
  pdf_page: 193
  es: >
    A lo más que puede aspirar el hombre que se conoce es a ser lo menos
    repugnante posible.

- id: 553
  pdf_page: 194
  print_page: 102
  es: >
    La frase que no se puntúa a sí misma es informe.

- id: 554
  pdf_page: 194
  print_page: 102
  es: >
    Los fervientes del ecumenismo olvidan que ser cristiano no consiste sólo en
    tener fe en Dios, sino en tener fe en el Dios en que se debe tener fe.

- id: 555
  pdf_page: 194
  print_page: 102
  es: >
    El sociólogo expresa, con número estupendo de decimales, hechos cuyas
    unidades no logra contar en unos casos y no logra, en otros, ni siquiera
    definir.

- id: 556
  pdf_page: 194
  print_page: 102
  es: >
    Postulado básico de la democracia: la ley es la conciencia del ciudadano.

- id: 557
  pdf_page: 194
  print_page: 102
  es: >
    El individualismo es una posición de repliegue, desde la cual renovar el
    combate es siempre posible. Pero no es posición cuya conquista asegure la
    posesión venturosa y pacífica del territorio humano.

- id: 558
  pdf_page: 195
  print_page: 103
  es: >
    El Aufklärung, en los románticos franceses, vence finalmente al
    romanticismo.

- id: 559
  pdf_page: 195
  print_page: 103
  es: >
    La verdadera historia fluye bajo los hechos. Tanto supra-estructuras como
    infra-estructuras son expresiones del clima del alma. Todo lo que acontece
    resulta de alteraciones en la substancia misma del hombre.

- id: 560
  pdf_page: 195
  print_page: 103
  es: >
    La noción de providencia no puede hacer parte de filosofía alguna. Pero toda
    filosofía que no hunda en ella secretamente sus raíces resulta grotesca.

- id: 561
  pdf_page: 195
  print_page: 103
  es: >
    El carácter providencial de un acto existe sólo para el que lo vive. La
    providencia es mito ridículo o evidencia absoluta, según la posición de
    actor o de espectador en que nos encontremos.

- id: 562
  pdf_page: 196
  es: >
    La tolerancia consiste en una firme decisión de permitir que insulten todo
    lo que pretendemos querer y respetar, siempre que no amenacen nuestras
    comodidades materiales. El hombre moderno, liberal, demócrata, progresista,
    siempre que no le pisen los callos, tolera que le empuerquen el alma.

- id: 563
  pdf_page: 197
  print_page: 104
  es: >
    Decir que la libertad consiste en cosa distinta de hacer lo que queremos es
    mentira. Que convenga, por otra parte, limitar la libertad es cosa evidente.
    Pero el engaño comienza cuando pretenden identificarla con las limitaciones
    que le imponen.

- id: 564
  pdf_page: 197
  print_page: 104
  es: >
    La historia moderna se reduce, en última instancia, a la derrota de la
    burguesía y a la victoria de las ideas burguesas.

- id: 565
  pdf_page: 197
  print_page: 104
  es: >
    Los palacios no se abrasan siempre que las chozas se incendian, pero el
    fuego que consume palacios abrasa chozas.

- id: 566
  pdf_page: 197
  print_page: 104
  es: >
    Ningún milagro parece milagro a quienes no estaba destinado.

- id: 567
  pdf_page: 197
  print_page: 104
  es: >
    El predicador del reino de Dios, cuando no es Cristo el que predica, acaba
    predicando el reino del hombre.

- id: 568
  pdf_page: 198
  es: >
    La verdad, para el cristiano, es tensión entre ciertas proposiciones
    contrarias. La teología no tiene la función de resolver el conflicto, sino
    de mostrar su necesidad.

- id: 569
  pdf_page: 199
  print_page: 105
  es: >
    La teología, en manos torpes, se vuelve el arte de hacer irrisorio el
    misterio.

- id: 570
  pdf_page: 199
  print_page: 105
  es: >
    El problema filosófico, en última instancia, está en saber si el universo es
    raciocinio o historia.

- id: 571
  pdf_page: 199
  print_page: 105
  es: >
    Santo Tomás: ¿un "orléaniste" de la teología?

- id: 572
  pdf_page: 199
  print_page: 105
  es: >
    La razón, en teología, sólo tiene la función de demoler ídolos.

- id: 573
  pdf_page: 199
  print_page: 105
  es: >
    Cuando despierta en nosotros el anhelo de otros lugares, de otros siglos, no
    es realmente en tal o cual tiempo, en tal o cual país, donde deseamos vivir,
    sino en las frases mismas del escritor que supo hablarnos de ese país o de
    ese tiempo.

- id: 574
  pdf_page: 200
  es: >
    Naciones e individuos, salvo excepciones raras, sólo se portan con decencia
    cuando las circunstancias no les permiten otra cosa.

- id: 575
  pdf_page: 201
  es: >
    La inteligencia no tiene peor enemigo que la impaciencia, que
    imprudentemente libera el automatismo lógico de la idea.

- id: 576
  pdf_page: 201
  es: >
    Mientras el historiador no admita que la causa de la existencia, o de la
    inexistencia, de determinados hechos en determinadas épocas es la presencia,
    o la ausencia, de individuos capaces, o incapaces, de producirlos, una
    creciente pululación de teorías seguirá atribuyendo la paternidad de los
    hechos a causas incapaces de engendrarlos.

- id: 577
  pdf_page: 201
  es: >
    Si el burgués de ayer compraba cuadros porque su tema era sentimental o
    pintoresco, el burgués de hoy no los compra cuando tienen tema pintoresco o
    sentimental. El tema sigue vendiendo el cuadro.

- id: 578
  pdf_page: 201
  es: >
    La interpretación de cualquier hecho histórico requiere un número infinito
    de teorías.

- id: 579
  pdf_page: 201
  es: >
    Para sentenciar que una norma ha muerto, al tonto le basta saber que no la
    acatan.

- id: 580
  pdf_page: 202
  es: >
    La ética debe ser la estética de la conducta.

- id: 581
  pdf_page: 203
  print_page: 107
  es: >
    El que no se anticipa a la vejez no prolonga su juventud, sino corrompe
    hasta sus recuerdos.

- id: 582
  pdf_page: 203
  print_page: 107
  es: >
    En nuestra vida intelectual, como en la historia, ciertos bloques literarios
    —géneros, épocas, lenguas— que se habían vuelto ilegibles, e insípidos,
    resurgen de pronto remozados y frescos. Todo cadáver intelectual puede
    resucitar súbitamente con vitalidad portentosa.

- id: 583
  pdf_page: 203
  print_page: 107
  es: >
    Mientras no convierten la igualdad en dogma, nos podemos tratar como
    iguales.

- id: 584
  pdf_page: 203
  print_page: 107
  es: >
    No esperemos nada de la novela mientras el buen novelista no se resuelva a
    escribir, como en el siglo pasado, "malas" novelas.

- id: 585
  pdf_page: 203
  print_page: 107
  es: >
    La menos probatoria de las pruebas, en filosofía, es la que pretende
    confirmar las tesis de un sistema con tesis de otro.

- id: 586
  pdf_page: 204
  es: >
    El hombre inteligente no tiene ideas confusas sino cuando abriga, sin
    saberlo, inconfesables propósitos.

- id: 587
  pdf_page: 205
  print_page: 108
  es: >
    Aun cuando la erudición hoy florezca, las ciencias humanas están
    estrangulando la historia. Psicología, sociología, economía, etc, construyen
    esquemas intemporales que restauran, subrepticiamente, al hombre abstracto
    del dieciocho.

- id: 588
  pdf_page: 205
  print_page: 108
  es: >
    En una democracia toda verdad parece paradoja.

- id: 589
  pdf_page: 205
  print_page: 108
  es: >
    Los verdaderos dioses moran en lugares intransferibles y en irrepetibles
    instantes.

- id: 590
  pdf_page: 205
  print_page: 108
  es: >
    Sólo es realmente importante lo que al mero espectador parece gesto trivial.

- id: 591
  pdf_page: 205
  print_page: 108
  es: >
    El mundo debe servir de tema, pero no de norma. Así como un espectáculo
    vulgar se pliega, sobre el lienzo, a imperativos estéticos.

- id: 592
  pdf_page: 206
  es: >
    La civilización no consiste en la suma de objetos que la componen, como
    tampoco el hombre en la suma de órganos que lo constituyen.

- id: 593
  pdf_page: 207
  es: >
    El verso tiende a mentir espontáneamente. Pero es sólo en verso que el alma
    logra a veces confesarse.

- id: 594
  pdf_page: 207
  es: >
    La capacidad de leer poemas traducidos es signo inequívoco de insensibilidad
    a la poesía.

- id: 595
  pdf_page: 207
  es: >
    No añoro una naturaleza virgen, una naturaleza sin la huella campesina que
    la ennoblece y sin el palacio que corona la colina. Sino una naturaleza a
    salvo de industrialismos plebeyos y de manipuleos irreverentes.

- id: 596
  pdf_page: 207
  es: >
    Ni desconozcamos los méritos del autor subalterno, ni perdamos el tiempo en
    leerlo.

- id: 597
  pdf_page: 207
  es: >
    Pocos lectores sospechan la astucia que necesita una frase para parecer
    ingenua.

- id: 598
  pdf_page: 208
  print_page: 109
  es: >
    El escritor que no ha torturado sus frases tortura al lector.

- id: 599
  pdf_page: 209
  print_page: 110
  es: >
    La civilización tiene por requisito ineludible que los mediocres imitemos
    sin vergüenza alguna. Que sólo unos pocos osen innovar.

- id: 600
  pdf_page: 209
  print_page: 110
  es: >
    El aroma de los huertos monacales y el rumor de los bosques que rodean el
    monasterio solitario circulan en el latín adusto del alto medievo. Como las
    piedras románicas, arte de campesinos nobles en sus fortalezas monásticas.

- id: 601
  pdf_page: 209
  print_page: 110
  es: >
    La pululación de escritores mediocres en ciertas épocas intriga al que
    olvida que una pululación semejante existe en todas, que meramente no la
    vemos donde la aparición inexplicable de un gran escritor la oculta.

- id: 602
  pdf_page: 209
  print_page: 110
  es: >
    El hombre moderno se encarceló en su autonomía, sordo al misterioso rumor de
    oleaje que golpea contra nuestra soledad.

- id: 603
  pdf_page: 209
  print_page: 110
  es: >
    El que no cree en los mitos que el gran poeta inventa no lo ha entendido,
    aun cuando haya pasado su vida estudiándolo.

- id: 604
  pdf_page: 210
  es: >
    Los rebeldes a una tradición, o no cuentan, o resultan más leales a la
    tradición que sus fieles presuntos.

- id: 605
  pdf_page: 211
  print_page: 111
  es: >
    El hombre cierra los ojos ante los verdaderos problemas, como el
    comentarista ante las verdaderas dificultades del texto.

- id: 606
  pdf_page: 211
  print_page: 111
  es: >
    No es a abrazar toda verdad a lo que el hombre debe alistarse, sino a morir
    con sus dioses. Adaptarse envilece.

- id: 607
  pdf_page: 211
  print_page: 111
  es: >
    Cuando el diálogo es el último recurso, la situación ya no tiene remedio.

- id: 608
  pdf_page: 211
  print_page: 111
  es: >
    El cristianismo no inventó la noción de pecado, sino la de perdón.

- id: 609
  pdf_page: 211
  print_page: 111
  es: >
    Los textos de nuestros contemporáneos embrollan y desmoralizan al filólogo,
