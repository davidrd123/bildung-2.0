- id: 624
  pdf_page: 217
  print_page: 114
  es: >
    No demos a nadie la ocasión de ser vil. La aprovecha.

- id: 625
  pdf_page: 217
  print_page: 114
  es: >
    "Todos los versos" no "han sido hechos". Cada cultura, sin embargo, es
