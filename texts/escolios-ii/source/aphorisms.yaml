- id: 635
  pdf_page: 221
  print_page: 116
  es: >
    La sabiduría se reduce a no olvidar jamás, ni la nada que es el hombre, ni
    la belleza que nace a veces en sus manos.

- id: 636
  pdf_page: 221
  print_page: 116
  es: >
    Sería más fácil admitir que los poetas piensan, si a veces no se expresaran
