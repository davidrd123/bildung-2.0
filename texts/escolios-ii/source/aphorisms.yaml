- id: 646
  pdf_page: 225
  print_page: 118
  es: >
    Muchos que presumen de ironistas no son más que sectarios timoratos.

- id: 647
  pdf_page: 225
  print_page: 118
  es: >
    La democratización del erotismo sirvió, por lo menos, para mostrarnos que la
