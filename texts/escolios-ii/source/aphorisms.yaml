- id: 610
  pdf_page: 212
  es: >
    Mientras más generalicemos, más crecen el error, la inanidad, el tedio.

- id: 611
  pdf_page: 213
  print_page: 112
  es: >
    Basta que un sistema parezca descifrar el enigma de la existencia, para
    saber que sus soluciones son falsas.

- id: 612
  pdf_page: 213
  print_page: 112
  es: >
    El supremo esplendor del arte dórico —noble, robusto, sereno— florece en las
