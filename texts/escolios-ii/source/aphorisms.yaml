- id: 614
  pdf_page: 213
  print_page: 112
  es: >
    Para ir más allá de la ética hay que llevarla consigo.

- id: 615
  pdf_page: 213
  print_page: 112
  es: >
    El universo no se venga de quienes lo tratan como mecanismo inánime,
    haciéndolos morir humillados, sino prósperos y embrutecidos.

- id: 616
  pdf_page: 214
  es: >
    La sociedad moderna procede simultáneamente a volverse inhóspita a los
    viejos y a multiplicar su número, prolongando su vida.

- id: 617
  pdf_page: 215
  print_page: 113
  es: >
    Tragedia griega o dogma cristiano son meditaciones de adulto sobre el
    destino del hombre, frente al sentimentalismo adolescente de la filosofía
    moderna.

- id: 618
  pdf_page: 215
  print_page: 113
  es: >
    El moderno ya no se atreve a predicar que el individuo nazca como página
