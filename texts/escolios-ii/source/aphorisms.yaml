# Escolios a un texto implicito II — Spanish PDF extraction
# Primary source extracted from the 1977 Bogotá volume II PDF.
# Body pages detected from the first to the last page carrying aphorism starts.
# `pdf_page` is the scan page index; `print_page` is present when recoverable.
# Compare against `aphorisms.it.yaml` for the secondary Italian witness.
- id: 1
  pdf_page: 4
  print_page: 5
  es: >
    Nuestra atención a las letras contemporáneas decrece con los años, no porque
    los sentidos se emboten, sino porque hemos visto varias literaturas
    contemporáneas sucederse las unas a las otras, dejando meramente un puñado
    de aciertos problemáticos entre un acervo colosal de basura.

- id: 2
  pdf_page: 4
  print_page: 5
  es: >
    La objetividad del historiador no consiste en abstenerse de dictar juicios
    de valor, sino en sentenciar con acierto.

- id: 3
  pdf_page: 5
  es: >
    La obra de arte no es artefacto preparado para ejercitar nuestra facultad de
    análisis, sino aparato para incitarnos a disparar juicios de valor.

- id: 4
  pdf_page: 6
  print_page: 6
  es: >
    Admitir que cada época escriba una distinta historia del pasado no es
    confesar que todas las interpretaciones se valgan. Ciertas épocas tienen
    vocación para la historia, mientras que otras carecen de talento
    historiográfico. Toda visión de la historia es peculiar a una época, pero el
    genio historiográfico de algunas transmite a su visión un valor
    historiográfico intemporal, análogo a la intemporalidad del valor estético.
    La torpeza historiográfica de otras épocas, en cambio, aventura
    interpretaciones que documentan meramente sobre la época que las fabrica.

- id: 5
  pdf_page: 6
  print_page: 6
  es: >
    Si un vacío físico no lo convence de la desaparición de una cosa, el hombre
    se obstina en verla presente mientras persista su espectro. En el mundo
    contemporáneo las cosas yerguen aún su apariencia intacta, pero el siglo
    succiona implacablemente su savia. La espesa pulpa de las cosas, de momento
    en momento, se corrompe, se pudre, se disipa. El hombre se instala
    ciegamente en la terrestre solidez de su destino, cuando la substancia del
    mundo fluye hoy por una secreta herida hacia la nada.

- id: 6
  pdf_page: 6
  print_page: 6
  es: >
    Sólo un talento evidente hace que le perdonen sus ideas al reaccionario,
    mientras que las ideas del izquierdista hacen que le perdonen su falta de
    talento.

- id: 7
  pdf_page: 7
  es: >
    Mutilamos obligaciones y placeres cuando ignoramos que cada cosa trae
    consigo el criterio que la condena o que la absuelve.

- id: 8
  pdf_page: 8
  print_page: 7
  es: >
    Nominalismo y realismo no son corrientes filosóficas paralelas o sucesivas,
    sino períodos históricos. En ciertas épocas la realidad se pulveriza en
    individuos. En otros tiempos los universales son los protagonistas de la
    historia.

- id: 9
  pdf_page: 8
  print_page: 7
  es: >
    El alma no florece sino en el período biológico que corresponde a la edad
    con que nace. Quienes nacen para ser jóvenes se vuelven grotescos al
    envejecer. Quienes nacen para ser viejos son grotescos durante su agria
    juventud.

- id: 10
  pdf_page: 8
  print_page: 7
  es: >
    El que meramente se resigna a su suerte se siente frustrado por un destino
    sin sentido. El que humildemente la acepta sabe que tan sólo no entiende el
    significado de la divina decisión que lo concierne.

- id: 11
  pdf_page: 8
  print_page: 7
  es: >
    El único escritor del xviii resucitado por la admiración de nuestros
    contemporáneos ha sido Sade. Visitantes que de un palacio no admiran sino
    las letrinas.

- id: 12
  pdf_page: 9
  es: >
    Así como algunos llaman "hablar con franqueza" vomitar su hiel y su baba,
    así otros bautizan "establecer relaciones sociales auténticas" su afán de
    hundirse en la sangre y la mierda.

- id: 13
  pdf_page: 10
  es: >
    La literatura contemporánea parece una algarabía de eunucos en celo.

- id: 14
  pdf_page: 10
  es: >
    Existen hoy dos clases de tópicos ajados y manidos: los que son indiferentes
    a serlo, los que enfurecidos niegan que lo son. Las opiniones del
    pequeño-burgués forman la primera clase. Las del intelectual de izquierda la
    segunda.

- id: 15
  pdf_page: 10
  es: >
    Resulta más fácil, en nuestro tiempo, encontrar comportamientos cristianos
    que almas cristianas. Habiendo expulsado su cristianismo hacia la zona
    periférica de la persona, el cristiano actual aún le somete parcialmente su
    conducta, pero no le subordina sus actitudes radicales. Ya escasean esos
    seres indeleblemente cristianos, en cuyos ojos enturbiados por el orgullo,
    la lujuria o la blasfemia, nuestros ojos adivinan una mirada secretamente
    fraternal.

- id: 16
  pdf_page: 10
  es: >
    Cuando el católico se defiende mejor contra los vicios que contra la
    herejía, ya es poco el cristianismo que queda en su cabeza.

- id: 17
  pdf_page: 11
  print_page: 8
  es: >
    En las Geisteswissenschaften las matemáticas "servent à cacher les défauts
    de l'esprit".

- id: 18
  pdf_page: 12
  print_page: 9
  es: >
    La historia intelectual de Alemania nos enseña que el espíritu
    preferencialmente sopla sobre las almas que conquistan su grandeza
    enclaustrándose en grisáceas rutinas.

- id: 19
  pdf_page: 12
  print_page: 9
  es: >
    Quien aprende a decir "Si, pero." o "No, pero. " se franquea las puertas de
    la historia.

- id: 20
  pdf_page: 12
  print_page: 9
  es: >
    El progresista olvida que el pecado frustra todo ideal que añore, el
    conservador olvida que corrompe toda realidad que defienda.

- id: 21
  pdf_page: 12
  print_page: 9
  es: >
    La deducción filosófica es el arte de transformar, una observación exacta,
    pero limitada, en un sistema comprehensivo, pero falso.

- id: 22
  pdf_page: 12
  print_page: 9
  es: >
    Visitar un museo o leer a un clásico son, para las muchedumbres
    contemporáneas, simples comportamientos éticos.

- id: 23
  pdf_page: 12
  print_page: 9
  es: >
    Con frecuencia descubrimos, al cabo de los años, que las soluciones
    deliberadas resultan más intolerables que los problemas.

- id: 24
  pdf_page: 13
  print_page: 10
  es: >
    La crítica "estéril" logra a veces esas conversiones del alma que modifican
    substancialmente los problemas. La crítica "constructiva" sólo multiplica
    catástrofes.

- id: 25
  pdf_page: 13
  print_page: 10
  es: >
    La crucifixión, según el cristiano de hoy, fue un lamentable error judicial.
    La facultad de percibir la misteriosa necesidad de lo atroz pereció con la
    escena griega y los altares cristianos.

- id: 26
  pdf_page: 13
  print_page: 10
  es: >
    Si las supersticiones desaparecieran, la teología liquidaría rápidamente la
    religión.

- id: 27
  pdf_page: 13
  print_page: 10
  es: >
    Para aligerar la nave cristiana, que zozobra en aguas modernas, la teología
    liberal se desembarazó ayer de la divinidad de Cristo, la teología radical
    se desembaraza hoy de la existencia de Dios. El intelectual de izquierda no
    ataca con intrepidez y arrogancia sino las ideas que cree muertas.

- id: 28
  pdf_page: 14
  es: >
    Evidentemente en muchos casos inventamos nuestras ideas, pero no somos los
    primeros, ni los únicos, en inventarlas.

- id: 29
  pdf_page: 15
  print_page: 11
  es: >
    Una revolución es legítima tan sólo cuando el revolucionario siente en sus
    huesos que la sociedad, contra la cual se levanta, es el legítimo reo de
    rebeldía.

- id: 30
  pdf_page: 15
  print_page: 11
  es: >
    Para sofrenar las codicias, al demócrata sólo se le ocurre abolir los bienes
    codiciados.

- id: 31
  pdf_page: 15
  print_page: 11
  es: >
    El historiador completo sería el que analizara con malevolencia y relatara
    con simpatía.

- id: 32
  pdf_page: 15
  print_page: 11
  es: >
    Cualquiera tiene derecho a ser estúpido, pero no a exigir que veneremos sus
    estupideces.

- id: 33
  pdf_page: 15
  print_page: 11
  es: >
    La inteligencia literaria, no la inteligencia filosófica, ni la inteligencia
    científica, es la fase cenital de la inteligencia.

- id: 34
  pdf_page: 15
  print_page: 11
  es: >
    La inteligencia no envejece, pero data.

- id: 35
  pdf_page: 16
  es: >
    Cuando aprende que las pruebas de la existencia de Dios son inválidas, el
    tonto automáticamente cree que las de la existencia del mundo son válidas.

- id: 36
  pdf_page: 17
  print_page: 12
  es: >
    La "historia científica" recela de la verdad personal de las Memorias para
    confiar en la mentira impersonal de los Archivos.

- id: 37
  pdf_page: 17
  print_page: 12
  es: >
    La utilidad pedagógica de las prácticas supersticiosas se debe a la ausencia
    de nexo inteligible entre los medios que emplean y los fines que buscan.
    Sólo la superstición le enseña a la muchedumbre que no hay técnica racional
    de lo importante.

- id: 38
  pdf_page: 17
  print_page: 12
  es: >
    La culpabilidad del mundo moderno es mayor por haber arrasado las
    "chaumières" que por haber incendiado los "chateaux". Lo que se extingue, a
    lo largo del siglo xix, es la dignidad de los humildes.

- id: 39
  pdf_page: 17
  print_page: 12
  es: >
    Para persuadir debemos expresar argumentos sutiles en fórmulas sin sutileza.

- id: 40
  pdf_page: 17
  print_page: 12
  es: >
    En el científico se conjuntan preocupaciones de hombre inteligente con la
    paciencia del imbécil.

- id: 41
  pdf_page: 18
  es: >
    Mi siglo predilecto es el xix. Porque nos enseñó a ver los demás siglos.
    Pero civilización es lo que muere con el xviiii.

- id: 42
  pdf_page: 19
  print_page: 13
  es: >
    El tráfago moderno no dificulta creer en Dios, pero imposibilita sentirlo.

- id: 43
  pdf_page: 19
  print_page: 13
  es: >
    La humanidad es congénitamente reacia a todo propósito noble. Para producir
    algo preclaro es preciso que la historia la acose y la acorrale.

- id: 44
  pdf_page: 19
  print_page: 13
  es: >
    No esperemos que la civilización renazca, mientras el hombre no vuelva a
    sentirse humillado de consagrarse a tareas económicas.

- id: 45
  pdf_page: 19
  print_page: 13
  es: >
    La providencia concede sólo a unos pocos hombres el derecho a ser
    auténticos. Tanto la estética como la ética piden a gritos que los demás se
    apresuren a falsificarse.

- id: 46
  pdf_page: 19
  print_page: 13
  es: >
    El individuo no nace para "descubrir" y "expresar" el embrionario espectro
    de su alma. Sino para enfeudar su persona al amo más noble que encuentre.

- id: 47
  pdf_page: 20
  es: >
    La inteligencia se robustece con los lugares comunes eternos. Y se debilita
    con los de su tiempo y su sitio.

- id: 48
  pdf_page: 21
  print_page: 14
  es: >
    Es fácil simpatizar con cualquier hombre mientras no opina.

- id: 49
  pdf_page: 21
  print_page: 14
  es: >
    Mientras sepamos no atribuirnos, mérito alguno, podemos enorgullecernos de
    lo que somos.

- id: 50
  pdf_page: 21
  print_page: 14
  es: >
    Hay almas que la absolución no limpia, sino que empuercan las absoluciones.

- id: 51
  pdf_page: 21
  print_page: 14
  es: >
    De nada sirve al mediocre emigrar a donde moran los grandes. Todos llevamos
    nuestra mediocridad a cuestas.

- id: 52
  pdf_page: 21
  print_page: 14
  es: >
    La elegancia de cualquier uniforme depende del porte del que lo viste.

- id: 53
  pdf_page: 21
  print_page: 14
  es: >
    Alabar a la juventud es olvidar nuestra pretérita bobería.

- id: 54
  pdf_page: 21
  print_page: 14
  es: >
    La abstracción es la herramienta del poder del hombre, y el amo de su tedio.

- id: 55
  pdf_page: 23
  print_page: 15
  es: >
    Los hechos necesitan al historiador para volverse interesantes. Mientras la
    imaginación no lo acendre, todo acontecimiento es trivial.

- id: 56
  pdf_page: 23
  print_page: 15
  es: >
    Llamamos historia de la literatura la enumeración de las obras que se
    evadieron de la historia.

- id: 57
  pdf_page: 23
  print_page: 15
  es: >
    La historia es el campo donde el número engaña. La precisión aritmética es
    aquí una forma insidiosa de anacronismo. Quienes piensan alcanzar mayor
    veracidad estableciendo guarismos exactos, y comparables entre sí por lo
    tanto, cambian inútilmente por una similitud abstracta lo que existe
    exclusivamente como disimilitud concreta. El número histórico es
    inalterablemente cualitativo.

- id: 58
  pdf_page: 23
  print_page: 15
  es: >
    Rotulando "Justicia" el fardo cerrado, ha sido fácil desde hace siglos
    introducir cualquier contrabando.

- id: 59
  pdf_page: 24
  es: >
    Hay evidencias que desaparecen con quienes merecían percibirlas.

- id: 60
  pdf_page: 25
  print_page: 16
  es: >
    La historia es objetiva mientras se limita a reconstruir la conciencia que
    un determinado pasado tuvo de sí mismo. El historiador, en contra, que
    investiga "causas", "estructuras", "leyes", se encierra en su subjetividad.
    La ambición de trascender las presentaciones empíricas de la conciencia
    ajena transforma la historia en mera proyección del historiador. Más allá de
    la conciencia de los sujetos históricos el historiador no descubre sino su
    propia conciencia.

- id: 61
  pdf_page: 25
  print_page: 16
  es: >
    La historia es la serie de universos presentes a la conciencia de sujetos
    sucesivos.

- id: 62
  pdf_page: 25
  print_page: 16
  es: >
    Historia es lo que reconstruye una imaginación capaz de pensar conciencias
    ajenas. Lo demás es política.

- id: 63
  pdf_page: 25
  print_page: 16
  es: >
    Ni las doctrinas sociales nacen de las circunstancias, ni las hipótesis
    científicas de los hechos. Ambas afirmaciones son aspectos de una
    epistemología fenecida.

- id: 64
  pdf_page: 25
  print_page: 16
  es: >
    Aun cuando nadie ignore que no hay opinión estúpida que no consiga mártires
    y no multiplique víctimas, el número de adeptos de una doctrina inquieta al
    ingenuo. Como si el hecho psicológico de la estupidez fuese criterio lógico
    de verdad.

- id: 65
  pdf_page: 27
  print_page: 17
  es: >
    El éxito de un libro nada prueba en su favor, ni en su contra. Pero cuando
    barruntamos su mediocridad, el éxito confirma automáticamente nuestras
    sospechas.

- id: 66
  pdf_page: 27
  print_page: 17
  es: >
    Vivir entre almas bajas exaspera en pasión nuestro apetito de lo grande.

- id: 67
  pdf_page: 27
  print_page: 17
  es: >
    El individuo, para "perseverar en su ser", puede hacer concesiones, pero la
    idea que las haga se transforma en otra distinta. Si la Iglesia es meramente
    una agrupación de individuos interesados en defender su existencia
    colectiva, las concesiones hábiles le son lícitas; pero si es el vehículo de
    la fe y el cuerpo de Cristo, todo "aggiornamento" la pervierte.

- id: 68
  pdf_page: 27
  print_page: 17
  es: >
    La distancia entre jóvenes y viejos es hoy igual a la de siempre. Hoy se
    habla de "abismo" entre generaciones, porque el adulto actual se niega a
    envejecer y el joven, con el irrespeto debido, le asegura que envejeció.

- id: 69
  pdf_page: 28
  es: >
    Cupo a este siglo el privilegio de inventar el pedantismo de la obscenidad.

- id: 70
  pdf_page: 29
  print_page: 18
  es: >
    A medida que suben las aguas de este siglo, los sentimientos delicados y
    nobles, los gustos voluptuosos y finos, las ideas discretas y profundas, se
    refugian en unas pocas almas señeras, como los sobrevivientes del diluvio
    sobre algunos picos silenciosos.

- id: 71
  pdf_page: 29
  print_page: 18
  es: >
    Lo que menos perdono a este siglo es que me agobie con tal náusea que olvido
    que su abyección no mancha la intacta primavera.

- id: 72
  pdf_page: 29
  print_page: 18
  es: >
    La sabiduría de este siglo se reduce a observar el mundo con la mirada
    amarga y sucia de un adolescente depravado.

- id: 73
  pdf_page: 29
  print_page: 18
  es: >
    El cuerpo, en el siglo xx, no aprisiona al alma meramente, sino además la
    mutila.

- id: 74
  pdf_page: 29
  print_page: 18
  es: >
    Cómo soportar este mundo moderno si no oyéramos ya un lejano rumor de
    agonía?

- id: 75
  pdf_page: 29
  print_page: 18
  es: >
    Lo que la imaginación inventa no es menos real que lo que afecta los
    sentidos. Solamente más frágil.

- id: 76
  pdf_page: 30
  es: >
    El apetito del hombre se exacerba, porque no siempre tuvo hambre.

- id: 77
  pdf_page: 31
  print_page: 19
  es: >
    Nada más aventurado que figurarnos saber en qué momento de la historia nos
    hallamos. El que presume saberlo se arroga, con dogmática insolencia, la
    misión de imponer a los hombres el cumplimiento de su destino. El
    historicismo necesitario corona su petulancia con crímenes inútiles. La
    historia carece de estructura. El hombre sólo tiene la obligación de acatar
    ciertas normas, cualquiera que sea el problemático momento de la historia en
    que se halle. Todo hombre conoce su deber. Nadie conoce la supuesta tarea de
    su tiempo.

- id: 78
  pdf_page: 31
  print_page: 19
  es: >
    Mientras el Aufklärung no haya muerto —sólo hasta ahora se expande sobre la
    tierra entera y se infiltra en los últimos estratos sociales—, la más
    moderna postura del espíritu seguirá siendo el pensamiento alemán entre 1770
    y 1830.

- id: 79
  pdf_page: 31
  print_page: 19
  es: >
    Gastamos una vida en comprender lo que un extraño comprende de un vistazo:
    que somos tan insignificantes como los demás.

- id: 80
  pdf_page: 32
  es: >
    El historiador se distingue del publicista que lo emula porque destaca las
    diferencias y éste las semejanzas entre las épocas.

- id: 81
  pdf_page: 33
  print_page: 20
  es: >
    El determinista se impacienta con sus adversarios, como si tuvieran razón de
    decirse libres. Los deterministas son gente muy irritable.

- id: 82
  pdf_page: 33
  print_page: 20
  es: >
    A fuerza de adaptarse a la "mentalidad moderna", el cristianismo se volvió
    una doctrina que no es difícil acatar, ni es interesante hacerlo.

- id: 83
  pdf_page: 33
  print_page: 20
  es: >
    Quien intenta evadirse de su raza pretende saltar fuera de su sombra. Pero
    ya que la auténtica índole de una raza es siempre misterio, su espíritu no
    sirve de pauta consciente a nuestros actos. El individuo es fiel a su
    sangre, cuando es leal a su más íntima vocación.

- id: 84
  pdf_page: 33
  print_page: 20
  es: >
    Sólo puede ser optimista la inteligencia que ya husmea en la civilización
    moderna un tufillo mortecino.

- id: 85
  pdf_page: 33
  print_page: 20
  es: >
    Las revoluciones latinoamericanas nunca han pretendido más que entregar el
    poder a algún Directoire.

- id: 86
  pdf_page: 34
  es: >
    El cristianismo de una sociedad es directamente proporcional al número de
    abadías que funda.

- id: 87
  pdf_page: 35
  es: >
    Nada irrita tanto a los tontos como el cristianismo. Sobre todo a los tontos
    cristianos.

- id: 88
  pdf_page: 35
  es: >
    El cristianismo no es doctrina para clase media. Ni para clase media
    económica. Ni para clase media intelectual. Carece, pues, de porvenir.

- id: 89
  pdf_page: 35
  es: >
    Recelosos de la implantación de estructuras feudales en América, los Reyes
    Católicos, tanto como Habsburgos y Borbones, hicieron abortar todo embrión
    de feudalismo, logrando así que sólo tres factores tejieran la historia del
    este continente: la pusilanimidad del burócrata, la codicia del tendero, y
    la anarquía del mestizo.

- id: 90
  pdf_page: 35
  es: >
    A Homero, poeta de la aristocracia jónica, y a Dante, poeta del ordo
    medieval, hay que agregar a Shakespeare, "poeta del feudalismo" (según
    Morley). La reacción no anda mal de poetas.

- id: 91
  pdf_page: 35
  es: >
    Muchos creen que el diablo murió; cuando meramente anda hoy disfrazado de
    hombre.

- id: 92
  pdf_page: 36
  es: >
    La literatura resucitará cuando renuncien a "cambiar el mundo".

- id: 93
  pdf_page: 37
  print_page: 22
  es: >
    El castigo del idealista consiste en el triunfo de su causa.

- id: 94
  pdf_page: 37
  print_page: 22
  es: >
    Hoy los textos más herméticos, más experimentales, más gratuitos, así como
    las actitudes religiosas más místicas o más ascéticas, entrañan la ambición
    de "colaborar" y "servir". La gloria literaria, o celeste, es premio hoy
    reservado al servilismo social.

- id: 95
  pdf_page: 37
  print_page: 22
  es: >
    Muchos se arrogan serenidad de sabio porque tienen estolidez de bestia.

- id: 96
  pdf_page: 37
  print_page: 22
  es: >
    Aquellos cuya gratitud por el beneficio recibido se convierte en devoción a
    la persona que lo otorga, en lugar de degenerar en el odio acostumbrado que
    todo benefactor despierta, son aristócratas. Aun cuando caminen en harapos.

- id: 97
  pdf_page: 37
  print_page: 22
  es: >
    Bendita sea la Historia, que nos independizó de la Razón.

- id: 98
  pdf_page: 38
  es: >
    Los escritos serían más breves, si sus autores presumieran menos su
    importancia.

- id: 99
  pdf_page: 39
  print_page: 23
  es: >
