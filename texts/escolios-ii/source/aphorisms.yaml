- id: 626
  pdf_page: 218
  es: >
    La misma estupidez se hace adoptar repetidas veces, si cambia su
    indumentaria cada vez.

- id: 627
  pdf_page: 219
  print_page: 115
  es: >
    Mirada de historiador es la que ve el significado del individuo, sin
    convertir al individuo en su mero significado.

- id: 628
  pdf_page: 219
  print_page: 115
  es: >
    No es cierto que el hombre "no tenga naturaleza, sino historia". La
    naturaleza humana es la suma de todo lo que el hombre, en la historia, no
