- id: 629
  pdf_page: 219
  print_page: 115
  es: >
    En la acción el hombre no se construye: o se expresa meramente, o se
    falsifica.

- id: 630
  pdf_page: 219
  print_page: 115
  es: >
    La erudición no consiste en aducir infinitud de referencias, sino en obligar
    al lector a sentir que podríamos hacerlo.

- id: 631
  pdf_page: 219
  print_page: 115
  es: >
    La razón corrige los errores lógicos, pero los errores espirituales sólo son
    corregibles por una conversión de la persona. Las evidencias presuntas se
    desvanecen en silencio, cuando las contemplamos desde un nivel espiritual
