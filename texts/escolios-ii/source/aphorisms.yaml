- id: 620
  pdf_page: 215
  print_page: 113
  es: >
    Tan sólo el hombre muy inteligente no posee la solución de los problemas
    actuales.

- id: 621
  pdf_page: 216
  es: >
    Todo individuo piensa hoy que el mundo anda mal porque no lo escuchan.

- id: 622
  pdf_page: 217
  print_page: 114
  es: >
    Ciertas cosas sólo son interesantes vividas, otras sólo lo son imaginadas.

- id: 623
  pdf_page: 217
  print_page: 114
  es: >
    Como el valor no obedece a reglas, nunca sabemos anticipadamente si el
