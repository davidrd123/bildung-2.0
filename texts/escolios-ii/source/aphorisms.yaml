- id: 640
  pdf_page: 223
  print_page: 117
  es: >
    Si el universo es sistema, no puede haber evidencias que se contradigan.
    ¿Pero quién nos asegura que lo sea?

- id: 641
  pdf_page: 223
  print_page: 117
  es: >
    Como el intelectual no es inventor de ideas, sino mero usuario, el lucero
    que orienta sus empresas es siempre el de la víspera.

- id: 642
  pdf_page: 223
  print_page: 117
  es: >
    Nada más fácil que engañar la primera vez al alma noble.

- id: 643
  pdf_page: 223
  print_page: 117
  es: >
    Todo lo que le haga sentir al hombre que el misterio lo envuelve lo vuelve
    más inteligente.

- id: 644
  pdf_page: 224
  es: >
    Para lograr su miel más exquisita, la inteligencia no se contenta con las
    flores de una sola primavera.

- id: 645
  pdf_page: 225
  print_page: 118
  es: >
    La caída del poderoso nos parece decreto de la providencia, porque regocija
