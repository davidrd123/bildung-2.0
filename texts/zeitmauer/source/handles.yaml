  - from: "zm:113:faustian-plan"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now turns against the plan from below: geological change and independent measurable processes make property, boundary, and security doubtful from the ground up."
  - from: "zm:114:beyond-the-wall"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis becomes methodological here: geology, history, and freedom are explicitly said to be answered differently on this side and beyond the time wall."
  - from: "zm:115:layer-forming"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now becomes stratigraphic: man is found as layer-forming and layer-determining, and that transition is said to lie at the time wall."
  - from: "zm:116:mass-revolution"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now appears in demography and labor directly: mass increase and mass revolution are treated as epochal symptoms rather than as simple machine-effects."
  - from: "zm:117:urgrund-workman"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now reaches its deepest explanatory register so far: `Urgrund` returns as earth-power, and human work becomes a possible medium of world-spiritualization."
  - from: "zm:118:earth-sense"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now turns from geology into earth-sense directly: man not only forms layers but spiritually penetrates them, and `Urgrund` is preferred to `Weltgeist` as the deeper register."
  - from: "zm:119:new-freedom"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now reaches the freedom problem explicitly: beyond the line and beyond the time wall, compulsion and freedom can invert, and new fields of freedom begin to widen."
  - from: "zm:120:spiritual-sovereignty"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now narrows to the rare individual case: spiritual sovereignty is exacting, non-activist, and bound to inspection, declaration, and rightful allowance."
  - from: "zm:121:volunteers"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now enters voluntariness directly: time-boundaries exact motion, the good cause remains invisible, and spiritual freedom is distinguished from volunteer energy."
  - from: "zm:122:fifth-element"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now appears as flight from the classical elements and as experimental intervention in the geological and cosmic household."
  - from: "zm:123:meteorological-augur"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now becomes a daily planetary science: meteorology revives the augur-function while remaining technical, practical, and earth-assigned."
  - from: "zm:124:lightning-rod"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now enters electrification directly: the lightning rod becomes an earth-historical sign, and electricity opens a new dynamic age through invisible ordering rather than steam's brutal visibility."
  - from: "zm:124:lightning-rod"
    relation: "parallels"
    to: "thread:mumford-bridge"
    note: "The historical-technical bridge widens from clock-time and projected spirit into electrification, invisible democracy, and the technical collective."
  - from: "zm:125:identity-process"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now reaches the seam-point of matter and spirit directly: human self-knowledge and matter's self-liberation are posed together at the time wall."
  - from: "zm:126:franklin"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now appears through weak points, hidden fields, and tragic disproportion: epochal change enters by meager types before history can justify it."
  - from: "zm:127:first-organ"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now grows nerves: the lightning rod becomes first organ, the earth overspins itself with wires, and electricity spiritualizes the technical world through signal and perception."
  - from: "zm:128:invisible-democracy"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now appears politically as invisible democracy, world-opinion, and world-will moving under a world-plan no program can master."
  - from: "zm:128:invisible-democracy"
    relation: "crystallizes"
    to: "thread:predecided-world"
    note: "Political life now arrives under an already organized field of opinion and will rather than through overtly chosen forms alone."
  - from: "zm:129:night-view"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now reaches beneath standards explicitly: the electrical argument is only analogical, while the deeper unrest comes from a mechanized night-view that leaves an active share of reality outside its measure."
  - from: "zm:129:night-view"
    relation: "extends"
    to: "thread:goethe-leibniz-frame"
    note: "The method dossier is sharpened from the Naturphilosophie side: worthy intuition, ensoulment, and the critique of the titanically mechanized life-image are stated directly."
  - from: "zm:129:night-view"
    relation: "crystallizes"
    to: "thread:predecided-world"
    note: "The mechanized life-image is a prior cut on reality, extracting only what fits its standards and leaving the missing share active."
  - from: "zm:130:world-language"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now overtly exceeds world-history: the charged earth-envelope carries a world-language in every transmission, and substance changes alongside knowledge."
  - from: "zm:130:world-language"
    relation: "extends"
    to: "thread:predecided-world"
    note: "Transmission itself becomes part of the prior field, shaping common language and substance before explicit judgment catches up."
  - from: "zm:131:intelligent-ship"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now takes the form of an intelligent ship in a magnetic world, where stronger answers arrive and the earth as `Urgrund` seeks new fertility through the fall of gods."
  - from: "zm:132:mantic-compass"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now shifts into navigation itself: freedom remains while its concept changes, and the compass becomes a mantic device under growing doubt about whether any steering still occurs."
  - from: "zm:133:anthropological-disquiet"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now reaches anthropology directly: historical concepts no longer suffice, the human measure becomes questionable, and the pressure extends toward biology."
  - from: "zm:134:heimdals-horn"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now becomes explicit reconnaissance at the wall: through confusion one listens for signals at the time wall while cosmic catastrophe is set aside in favor of earthly change."
  - from: "zm:135:absolute-time"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now takes the form of earth-revolutionary dating itself: absolute time and earth-time subordinate historical and biological chronistics to a larger earth-historical frame."
  - from: "zm:136:sindbad-fish"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now revises evolutionary time itself: elementary clocks reopen qualitative station-time, and Sindbad's fish-island links human action to cosmic movement."
  - from: "zm:137:extinction-economy"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now appears in extinction directly: monoculture, eradication, and the earth's recalling of its creatures are read as earth-household management and geological page-turning."
  - from: "zm:138:life-movement"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now reaches total theory: the spread of types expresses a movement of life corresponding to the inanimate earth and demands an earth-historical or cosmological grasp beyond mechanism."
  - from: "zm:139:bloy-volcano"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now takes volcanic form: historical memory proves too short for the relevant period, and eruption becomes a first hint against urban security."
  - from: "zm:140:atmospheric-instruments"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now enters everyday orientation directly: solar cycles, atmospheric unrest, carbon release, and high-sensitivity instruments become one practical problem."
  - from: "zm:141:spiral-course"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now reworks continuity itself: Darwinian succession is retained, but periodization, catastrophe-theory, and the spiral recurrence of ideas shift the frame beyond simple linear progress."
  - from: "zm:142:primal-generation"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now reaches beneath catastrophe itself: a new surge of species demands recourse to undifferentiated reserves and primal generation."
  - from: "zm:143:hominisation-crisis"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now becomes explicit collision: hominisation is unfinished, and history and natural history, world-history and earth-history, freedom and determination come into conflict."
  - from: "zm:144:time-wall-revolt"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now becomes mythically explicit: microcosmic horror opens onto godfall, and the time wall appears as the last boundary-mark in an antaean revolt."
  - from: "zm:145:proteus-work"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now returns inside experiment itself: the will is free to act but not to reverse course, and the plan prevails where it collides with the individual."
  - from: "zm:145:proteus-work"
    relation: "extends"
    to: "thread:predecided-world"
    note: "Experiment no longer appears as neutral procedure alone; the plan's victory over the individual and the asymmetry of freedom show a field already pre-structured."
  - from: "zm:146:world-plan-research"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now appears as research-legitimation itself: successful experiment counts as progress in `Weltplan`, and degrading intrusion is moralized by number."
  - from: "zm:146:world-plan-research"
    relation: "crystallizes"
    to: "thread:predecided-world"
    note: "Research is legitimated inside a plan superior to the state plans, so the field of action and judgment is already shaped before explicit political consent."
  - from: "zm:147:method-way"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now reaches beneath argument itself: method is tied back to way, and explicit decision or dialectic only continue a prior yes."
  - from: "zm:147:method-way"
    relation: "crystallizes"
    to: "thread:predecided-world"
    note: "The strongest local form of the thread so far: the direction is affirmed below thought, and science's inviolability rests on that prior assent."
  - from: "zm:148:vorweisung"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now enters general consciousness directly: advance showing, conductivity, and the loss of astonishment accelerate acceptance."
  - from: "zm:148:vorweisung"
    relation: "extends"
    to: "thread:predecided-world"
    note: "What is shown in advance is already being made receivable; the field of acceptance is shaped before explicit deliberation catches up."
  - from: "zm:149:nomos-loss"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now reaches boundary and value directly: the shudder lies in nomos-loss and the fading of divine guardianship over form."
  - from: "zm:149:nomos-loss"
    relation: "extends"
    to: "thread:predecided-world"
    note: "Protean formation is terrifying because boundaries and permissions have already slackened; the world-cut no longer holds where it once did."
  - from: "zm:150:artificial-insemination"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now takes species-technical form: by principle rather than scale, artificial insemination announces a change of fate larger than ordinary historical comparison can hold."
  - from: "zm:150:artificial-insemination"
    relation: "crystallizes"
    to: "thread:predecided-world"
    note: "The exemplary case of pre-shaped acceptance: a procedure long possible becomes epochally receivable and begins altering the species under weakened nomos."
  - from: "zm:151:new-descent"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now reaches legal lag directly: acceptance is already accomplished, while law can only channel a biological novelty it could not foresee."
  - from: "zm:151:new-descent"
    relation: "extends"
    to: "thread:predecided-world"
    note: "The display is no longer awaiting ratification; the new descent is already receivable, and administration is left to manage its aftermath."
  - from: "zm:152:father-claim"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now enters descent and practice directly: debate circles helplessly while the experiment advances into the intermediate field at the time wall."
  - from: "zm:152:father-claim"
    relation: "crystallizes"
    to: "thread:predecided-world"
    note: "The strongest local juridical form of the thread so far: the novelty is a new human category whose invisible share exceeds its visible surface while practice outruns deliberation."
  - from: "zm:153:evolution-responsibility"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now reaches state uptake and evolution itself: registry, monopolization, earth-spiritual differentiation, and guilty freedom belong to one process."
  - from: "zm:153:evolution-responsibility"
    relation: "extends"
    to: "thread:predecided-world"
    note: "The world-cut now takes administrative and biological form: descent is registered, the state trends toward monopoly, and evolution becomes a shaped field rather than a neutral inheritance."
  - from: "zm:154:protean-power"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now reaches beneath experiment itself: the laboratory and its specific intelligence are only auxiliary signs of a deeper protean movement."
  - from: "zm:154:protean-power"
    relation: "extends"
    to: "thread:predecided-world"
    note: "The strongest causal deepening so far: experiment is explicitly treated as assistance rather than origin, and shaping power works through the intelligence that seems to lead."
  - from: "zm:155:new-type"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now generalizes beyond experiment: the `New House` changes the setup itself, a new type forms populations, and potential multiplies."
  - from: "zm:155:new-type"
    relation: "extends"
    to: "thread:predecided-world"
    note: "The world-cut now appears anthropologically: setup, habitus, and type are already changing before any single intervention can account for them."
  - from: "zm:156:decadence-insular"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now changes scale: `décadence` becomes a second-rank, local sign under enlarged view, while barbarism appears as the greater danger."
  - from: "zm:157:progress-in-freedom"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now turns the progress-question against itself: revolutions consume freedom, narrow the track, and end in a constitution other than the one politically intended."
  - from: "zm:157:progress-in-freedom"
    relation: "extends"
    to: "thread:predecided-world"
    note: "The goal is always other than the one intended; deeper intentions than the political ones realize themselves, and the settled constitution steps out of fading constituent forces."
  - from: "zm:158:insect-state"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now threatens human sidelining directly: man can miss the departure or be shunted aside while `ratio` and insect-state solutions reactivate old principles."
  - from: "zm:159:utopian-intention"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now passes through utopian form: Campanella and Fourier prefigure state-regulated life, but utopian happiness fades before state-plan and may return only under altered earth-revolutionary pressure."
  - from: "zm:159:utopian-intention"
    relation: "extends"
    to: "thread:predecided-world"
    note: "World-revolutionary plans do not exhaust the movement; deeper earth-revolutionary powers overtake them and may reactivate only their poetic intention."
  - from: "zm:160:musische-objection"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now gains its literary-prognostic register: dystopian warning and musische objection expose state-plan and pure logical calculus without waiting for factual catastrophe."
  - from: "zm:160:musische-objection"
    relation: "extends"
    to: "thread:goethe-leibniz-frame"
    note: "The split is restated almost programmatically: logical calculus and technical planning are opposed by musische freedom that still makes use of scientific armament."
  - from: "zm:161:will-freedom"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now returns to its human center: intervention in evolution is real and new, yet the real center remains will-freedom rather than scale, planning, or large spaces."
  - from: "zm:161:will-freedom"
    relation: "challenges"
    to: "thread:predecided-world"
    note: "A needed weakening pressure on the dossier: where man is in play, no process runs wholly predetermined, because being thought already alters it."
  - from: "zm:162:iceberg-caput"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now receives a qualitative answer: freedom as higher self-consciousness cannot master the determined mass, but can still introduce meaning and healing force into it."
  - from: "zm:163:representative-freedom"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now restates freedom as representative human dignity and demotes state-formation to a recurrent biological principle rather than the decisive human mark."
  - from: "zm:164:last-man-overman"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now returns to Nietzsche explicitly: the departing train and the Overman/Last Man pair turn the task toward exit from history rather than toward coming lordship."
  - from: "zm:165:state-optical-illusion"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now demotes the state sharply: the shove drives the states, and even the world-state belongs to longer, non-historical rhythms beyond the station's political optics."
  - from: "zm:166:historical-human-inheritance"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now closes the part on the selection-question itself: on this side of the line it must be decided what historical-human inheritance is carried across and what may be left behind."
  - from: "note:journal:mumford-bridge"
    relation: "grounds"
    to: "thread:mumford-bridge"
    note: "The journal entry is the source note for the bridge dossier."
  - from: "note:journal:goethe-leibniz-frame"
    relation: "grounds"
    to: "thread:goethe-leibniz-frame"
    note: "The journal entry is the source note for the method dossier."
  - from: "note:journal:predecided-world"
    relation: "grounds"
    to: "thread:predecided-world"
    note: "The journal entry is the source note for the dossier on worlds cut in advance."
  - from: "thread:mumford-bridge"
    relation: "parallels"
    to: "thread:time-crisis"
    note: "Mumford supplies the historical clock-time diagnosis that runs alongside Jünger's metaphysical one."
  - from: "thread:goethe-leibniz-frame"
    relation: "grounds"
    to: "thread:time-crisis"
    note: "The split between formalism and participatory perception underlies the whole time-crisis problem."
  - from: "thread:predecided-world"
    relation: "extends"
    to: "thread:time-crisis"
    note: "One decisive branch of the time-crisis is that worlds are being cut in advance by plan, naming, and technical mediation."
