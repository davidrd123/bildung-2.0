    to: "thread:mumford-bridge"
    note: "The Titanic and the record make the clock-time problem concrete inside the text itself."
  - from: "zm:20:tragedy"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The tragic is distinguished from mere accident precisely by its belonging to fateful rather than measurable time."
  - from: "zm:25:plan-freedom"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis of measurable order reaches its political edge where the plan tries to contain freedom within techno-economic bookkeeping."
  - from: "zm:28:periodicity"
    relation: "extends"
    to: "thread:time-crisis"
    note: "Flattened rhythms and denied sacrifice do not erase fate's claim; they enlarge catastrophe."
  - from: "zm:31:so-sein-gleichsein"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The part closes where time-crisis becomes a conflict between singular form and mass uniformity rather than between astrology and science alone."
  - from: "note:journal:mumford-bridge"
    relation: "grounds"
    to: "thread:mumford-bridge"
    note: "The journal entry is the source note for the bridge dossier."
  - from: "note:journal:goethe-leibniz-frame"
    relation: "grounds"
    to: "thread:goethe-leibniz-frame"
    note: "The journal entry is the source note for the method dossier."
  - from: "thread:mumford-bridge"
    relation: "parallels"
    to: "thread:time-crisis"
    note: "Mumford supplies the historical clock-time diagnosis that runs alongside Jünger's metaphysical one."
  - from: "thread:goethe-leibniz-frame"
    relation: "grounds"
    to: "thread:time-crisis"
    note: "The split between formalism and participatory perception underlies the whole time-crisis problem."
