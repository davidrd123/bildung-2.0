  - from: "zm:32:spiral"
    relation: "extends"
    to: "thread:time-crisis"
    note: "Part 3 reopens the crisis as a problem of how world-time itself is divided: line, circle, or spiral."
  - from: "zm:36:analogy"
    relation: "extends"
    to: "thread:goethe-leibniz-frame"
    note: "Spengler's analogy-driven physiognomy shows the power and insufficiency of morphology without an inner bond."
  - from: "zm:38:logos-nomos"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The opening cosmological problem of Part 3 is explicitly rejoined to measurable and fateful time through astrology as method."
  - from: "zm:43:two-houses"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "Historical resemblance reaches its limit where fateful time divides two apparently similar worlds at the root."
  - from: "zm:44:zeitfragen"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis widens beyond human history where species-change and defeat in the struggle for existence are referred back to questions of time."
  - from: "zm:48:zeitmauer"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The threshold is named directly: beyond the time wall the future begins to outline itself, and historical language reaches its limit."
  - from: "zm:51:namenlos"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now appears directly as a crisis of naming: future things arrive before historically binding words can catch them."
  - from: "zm:51:namenlos"
    relation: "crystallizes"
    to: "thread:predecided-world"
    note: "The inherited world-cut fails where things become visible before the names able to bind them historically are available."
  - from: "zm:54:lichtfrage"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis is clarified as a light-question: what approaches after history is not simply mythic return, but a new order that old categories cannot yet name."
  - from: "zm:56:bruchstelle"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now reaches discovery itself: the timing of prehistoric visibility becomes a sign that the historical field may already have been left."
  - from: "zm:59:gestaltlehren"
    relation: "extends"
    to: "thread:goethe-leibniz-frame"
    note: "The method pressure is named directly: seeing forms rather than properties, and synoptic readiness rather than mere analytic knowledge."
  - from: "zm:63:erdheimat"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now reaches boundary and earth-order directly: blood-toll, weakened borders, and technique belong to a changing nomos of the earth."
  - from: "zm:67:erdgeistig"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now reaches species-level earth-force directly: earth-spiritual recurrence, technique, and catastrophe exceed merely historical categories."
  - from: "zm:70:projected-spirit"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now reaches technology at the level of the nervous system: technique is no longer mere prosthetic abstraction, but projected spirit still tied to the earth."
  - from: "zm:70:projected-spirit"
    relation: "parallels"
    to: "thread:mumford-bridge"
    note: "The bridge to Mumford now widens from clock-time into technics itself, where central rather than merely peripheral powers begin to be imitated."
  - from: "zm:70:projected-spirit"
    relation: "extends"
    to: "thread:predecided-world"
    note: "Technique ceases to be an external means alone and begins shaping the powers through which a world is met."
  - from: "zm:71:planetary-aura"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now appears at planetary scale: the woven aura of signals and messages belongs to a metahistorical world behind history."
  - from: "zm:73:poetry-abundance"
    relation: "extends"
    to: "thread:goethe-leibniz-frame"
    note: "The method dossier is sharpened from the poetic side: the poet has deeper home-right in the layer science reconstructs, and poetry is treated as a native form of abundance."
  - from: "zm:76:moses-bruchstelle"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The inquiry now names metahistorical time-division openly as a means of judging the present, and binds that method to a great fracture point of revelation."
  - from: "zm:79:kentauren"
    relation: "extends"
    to: "thread:goethe-leibniz-frame"
    note: "The poet's power over the researcher is stated directly here: Guérin's centaur world makes visible connections that research alone cannot recover."
  - from: "zm:82:urgrund"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now reaches fear, state doctrine, and materialism directly: only a descent into `Urgrund` can open a farther view, and Nietzsche's formula announces new powers."
  - from: "zm:85:axis"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now scales outward into cosmology itself: even the image of eternal return demands an axis, a body, and limits to time."
  - from: "zm:87:titanic-model"
    relation: "parallels"
    to: "thread:mumford-bridge"
    note: "The `Titanic` returns as a standing model of technical catastrophe, widening the bridge from clock-time and the record to civilizational plan-failure."
  - from: "zm:88:archimedean-point"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now appears as modern doom tied to human work alone, where moralism circles helplessly without a transcendental point and technocracy becomes thinkable."
  - from: "zm:89:intensive-solution"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis is answered by a shift of scale: what is extensively insoluble may still be intensively solvable when the individual leaves number and statistics for another law."
  - from: "zm:92:burnable-house"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now enters human agency directly: the world becomes a burnable house, catastrophe imaginable as the immediate consequence of human hands."
  - from: "zm:93:world-unity"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now opens into explicit planetary forecasts: unity, overstrain, and positional gain are all read as future forms of one process."
  - from: "zm:94:spaceflight"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now appears as planetary charge and transformed technique: spaceflight becomes an earth-historical sign and a lighter, freer principle of development."
  - from: "zm:96:transhistorical-means"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now becomes explicit as a mismatch of scale: transhistorical means used historically, above all in material war."
  - from: "zm:97:clockwork-hour"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now thickens into atmosphere itself: the world becomes clockwork, fear suspects the hour, and technique appears as scenery or `Gestell`."
  - from: "zm:99:last-man"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now threatens substance directly: metaphysical hunger, freedom, and art may be severed from one another under technical perfection."
  - from: "zm:100:substance-surrender"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now appears as an invested loss: equality penetrates inner `So-Sein`, and substance-surrender becomes the price of concentrated power and representational splendor."
  - from: "zm:102:wechselspiel"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The title-image is defined dynamically here: historical monotony strips away within the world while transhistorical future knocks at the wall, where the unreceipted part of the surrender accumulates."
  - from: "zm:103:through-the-wall"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now becomes explicit passage: the way leads over the line, over the wall, and through it, and initiation cannot be replaced by moral or intellectual illumination."
  - from: "zm:104:astrological-model"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The crisis now presses the method question openly: astrology matters as the model of a synoptic procedure superior to ordinary history and science."
  - from: "zm:105:grossjahre"
    relation: "extends"
    to: "thread:time-crisis"
    note: "The cut now widens into geology and very long measures: catastrophe and development are both valid depending on scale, visibility, and the style of transition."
  - from: "zm:106:new-types"
    relation: "extends"
    to: "thread:time-crisis"
    note: "Catastrophe is now explicitly one-sided: the entry of new types and new world-style has to be thought together with the cuts that open the door."
  - from: "zm:107:geological-disquiet"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now appears as prior unrest rather than only objective finding: the geological apparatuses are feelers, and purified sense matters more than instruments alone."
  - from: "zm:108:cosmic-economy"
    relation: "extends"
    to: "thread:time-crisis"
    note: "Measured climate shifts still do not close the account: gain and loss remain embedded in a wider cosmic economy."
  - from: "zm:109:great-winter"
    relation: "extends"
    to: "thread:time-crisis"
    note: "Geological unrest is now tested against happiness itself: glaciation, hominization, memory, and world-style complicate any simple climatic valuation."
  - from: "zm:110:world-plan"
    relation: "crystallizes"
    to: "thread:time-crisis"
    note: "The crisis now reaches overt plan-metaphysics: harmony stands above death, and human and state plans are corrected within the larger world-plan once they exceed the historical field."
  - from: "zm:110:world-plan"
    relation: "crystallizes"
    to: "thread:predecided-world"
