chunks:
  - handle: "zm:1:seidenschwanz"
    section: "zm:1"
    file: "parts/01-fremde-voegel.md"
    note: "Waxwing passage; natural sign becomes method-statement."
  - handle: "zm:1:bruchstelle"
    section: "zm:1"
    file: "parts/01-fremde-voegel.md"
    note: "The `Bruchstelle` passage; time-break as fund-site rather than endpoint."
  - handle: "zm:7:banking"
    section: "zm:7"
    file: "parts/03-messbare-und-schicksalszeit.md"
    note: "Banking and backing metaphor for meaning and fate."
  - handle: "zm:9:church-year"
    section: "zm:9"
    file: "parts/03-messbare-und-schicksalszeit.md"
    note: "Church year as qualitative, uneven time."
  - handle: "zm:11:schachtgaenge"
    section: "zm:11"
    file: "parts/04-messbare-und-schicksalszeit.md"
    note: "The abandoned mine-shafts image."
  - handle: "zm:13:schicksalsuhr"
    section: "zm:13"
    file: "parts/04-messbare-und-schicksalszeit.md"
    note: "Horoscope as fate-clock."
  - handle: "zm:14:abdichtung"
    section: "zm:14"
    file: "parts/05-messbare-und-schicksalszeit.md"
    note: "Sealing life toward the side of fate."
  - handle: "zm:15:titanic-record"
    section: "zm:15"
    file: "parts/05-messbare-und-schicksalszeit.md"
    note: "The Titanic, the record, and clock-measured performance."
  - handle: "zm:20:tragedy"
    section: "zm:20"
    file: "parts/07-messbare-und-schicksalszeit.md"
    note: "Tragedy as cultic play that weaves fateful time."
  - handle: "zm:25:plan-freedom"
    section: "zm:25"
    file: "parts/08-messbare-und-schicksalszeit.md"
    note: "The plan, plan-accounting, and the immediate language of freedom."
  - handle: "zm:28:periodicity"
    section: "zm:28"
    file: "parts/09-messbare-und-schicksalszeit.md"
    note: "Periodicity, flattened rhythms, raised dikes, and catastrophe."
  - handle: "zm:31:so-sein-gleichsein"
    section: "zm:31"
    file: "parts/10-messbare-und-schicksalszeit.md"
    note: "So-Sein against sameness, mass fate, and the counterpower to Leviathan."
  - handle: "zm:32:spiral"
    section: "zm:32"
    file: "parts/11-humane-einteilungen.md"
    note: "Linear, cyclical, and spiral divisions of world-time at the opening of Part 3."
  - handle: "zm:36:analogy"
    section: "zm:36"
    file: "parts/12-humane-einteilungen.md"
    note: "Analogy, physiognomic method, and the return of the one who comes in addition."
  - handle: "zm:38:logos-nomos"
    section: "zm:38"
    file: "parts/13-humane-einteilungen.md"
    note: "Astrology as method; measurable time and fateful time, `Logos` and `Nomos`, set into relation."
  - handle: "zm:43:two-houses"
    section: "zm:43"
    file: "parts/14-humane-einteilungen.md"
    note: "Two houses can be historically similar yet fundamentally different in fateful time."
  - handle: "zm:44:zeitfragen"
    section: "zm:44"
    file: "parts/15-humane-einteilungen.md"
    note: "Earth-history and species-change: behind questions of power, questions of time are at work."
  - handle: "zm:48:zeitmauer"
    section: "zm:48"
    file: "parts/16-humane-einteilungen.md"
    note: "The first explicit internal naming of the time wall: the future outlines itself beyond it, and naming that zone carries danger."
  - handle: "zm:51:namenlos"
    section: "zm:51"
    file: "parts/17-humane-einteilungen.md"
    note: "Midnight of history: future things are still nameless, and historically valid naming survives only in reservations."
  - handle: "zm:54:lichtfrage"
    section: "zm:54"
    file: "parts/18-humane-einteilungen.md"
    note: "Mythic return is denied as a simple restoration; the issue is a changed light and the approach of a new high degree."
  - handle: "zm:56:bruchstelle"
    section: "zm:56"
    file: "parts/19-humane-einteilungen.md"
    note: "The question `Why precisely now?` leads to the fracture point, where discovery itself becomes a temporal symptom."
  - handle: "zm:59:gestaltlehren"
    section: "zm:59"
    file: "parts/20-humane-einteilungen.md"
    note: "Primal history, synoptic method, and doctrines of form as the last aids of knowledge before more difficult encounters."
  - handle: "zm:63:erdheimat"
    section: "zm:63"
    file: "parts/21-humane-einteilungen.md"
    note: "Boundary and war are primally akin; any deeper reduction of war would require a new conception of earth-home and a changed relation to technology."
  - handle: "zm:67:erdgeistig"
    section: "zm:67"
    file: "parts/22-humane-einteilungen.md"
    note: "Jünger explicitly narrows `magisch` and prefers `erdgeistig`: earth-spiritual force, recurrence, species-level catastrophe, and technique are brought into one field."
  - handle: "zm:68:silver-age"
    section: "zm:68"
    file: "parts/23-humane-einteilungen.md"
    note: "The Silver Age as earth-spiritual recurrence hardened into formula, priesthood, city-form, and magical technique."
  - handle: "zm:70:projected-spirit"
    section: "zm:70"
    file: "parts/23-humane-einteilungen.md"
    note: "Tool-history turns from limb-prostheses to nervous-system apparatus and culminates in the claim that technology is projected spirit, immediately earth-spiritual reality."
  - handle: "zm:71:planetary-aura"
    section: "zm:71"
    file: "parts/24-humane-einteilungen.md"
    note: "The planet's new skin of images, thoughts, signals, and messages is read as a metahistorical stage of earth-spiritualization."
  - handle: "zm:73:poetry-abundance"
    section: "zm:73"
    file: "parts/24-humane-einteilungen.md"
    note: "The poet has the deepest home-right in the Golden Age; poetry is both sign and dispenser of abundance and stands prior to scientific reconstruction."
  - handle: "zm:76:moses-bruchstelle"
    section: "zm:76"
    file: "parts/25-humane-einteilungen.md"
    note: "Moses stands at one of the great fracture points; earth-spirituality condenses into revelation, law, separation, and metahistorical time-division for judging the present."
  - handle: "zm:79:kentauren"
    section: "zm:79"
    file: "parts/26-humane-einteilungen.md"
    note: "The centaurs witness the loss of earth-sight, and Guérin's `Centaur` becomes proof that the poet can make visible more than the researcher."
  - handle: "zm:82:urgrund"
    section: "zm:82"
    file: "parts/27-humane-einteilungen.md"
    note: "The section turns fear and economy into late formations and reaches `Urgrund` through matter, visibility, state discipline, and Nietzsche's `God is dead` as herald of incoming powers."
  - handle: "zm:85:axis"
    section: "zm:85"
    file: "parts/29-siderische-einteilungen.md"
    note: "The endlessly rolling wheel still demands an axis, and the changing fabric of time still demands a body; religions remain indispensable wherever time itself must have limits."
  - handle: "zm:87:titanic-model"
    section: "zm:87"
    file: "parts/29-siderische-einteilungen.md"
    note: "The `Titanic` returns not as one shipwreck among others but as a model of technical catastrophe, plan-failure, and symbolic modern downfall."
  - handle: "zm:88:archimedean-point"
    section: "zm:88"
    file: "parts/30-siderische-einteilungen.md"
    note: "Modern doom is linked materially to human work and slides toward a moralism without an Archimedean point; the darkest prospect is technocracy."
  - handle: "zm:89:intensive-solution"
    section: "zm:89"
    file: "parts/30-siderische-einteilungen.md"
    note: "Problems can be extensively insoluble yet intensively solvable when the individual steps out of number and statistics into another law."
  - handle: "zm:92:burnable-house"
    section: "zm:92"
    file: "parts/31-siderische-einteilungen.md"
    note: "World-downfall placed in human hands becomes imaginable as the world turns into a burnable house and men into children with matches."
  - handle: "zm:93:world-unity"
    section: "zm:93"
    file: "parts/31-siderische-einteilungen.md"
    note: "The fear of cosmic catastrophe shifts into explicit forecasts about political man: world-unity, world-regal force, overstrain, and positional superiority."
  - handle: "zm:94:spaceflight"
    section: "zm:94"
    file: "parts/32-siderische-einteilungen.md"
    note: "Spaceflight becomes practical as the planet equips itself with a new formal idiom; the worker enters the lordly estate and technique becomes elegant, playful, and miniature."
  - handle: "zm:96:transhistorical-means"
    section: "zm:96"
    file: "parts/32-siderische-einteilungen.md"
    note: "The real danger lies in transhistorical means being used historically, above all in material war; limitation comes only when the means find their legitimate sovereign."
  - handle: "zm:97:clockwork-hour"
    section: "zm:97"
    file: "parts/33-siderische-einteilungen.md"
    note: "Fear spreads as recurring world-anxiety; the world fills with clocks, becomes clockwork, and technique appears as scenery or `Gestell` behind which something earth-spiritual is concealed."
  - handle: "zm:99:last-man"
    section: "zm:99"
    file: "parts/33-siderische-einteilungen.md"
    note: "The deepest danger is that metaphysical hunger may die away and the `Last Man` arise as intelligent insect type, with even art technically producible."
  - handle: "zm:100:substance-surrender"
    section: "zm:100"
    file: "parts/34-siderische-einteilungen.md"
    note: "The surrender of substance is not merely lost but invested: equality enters inner `So-Sein`, and homogeneous stocks become conductive, inducible, and magnetizable."
  - handle: "zm:102:wechselspiel"
    section: "zm:102"
    file: "parts/34-siderische-einteilungen.md"
    note: "The terrible interplay at the time wall: monotony robs within the historical space while the transhistorical announces future things and the unreceipted part of the surrender accumulates."
  - handle: "zm:103:through-the-wall"
    section: "zm:103"
    file: "parts/35-siderische-einteilungen.md"
    note: "Initiation, emptying-out, dying, zero point, and explicit passage over the line, over the time wall, and through it."
  - handle: "zm:104:astrological-model"
    section: "zm:104"
    file: "parts/35-siderische-einteilungen.md"
    note: "Astrology reappears not as doctrine but as the model of a procedure that measures while remaining related to metaphysical qualities."
  - handle: "zm:105:grossjahre"
    section: "zm:105"
    file: "parts/35-siderische-einteilungen.md"
    note: "The cut is widened into geological epochs, lost mantic attention, catastrophe and development theories, and the scale of vast great years."
  - handle: "zm:106:new-types"
    section: "zm:106"
    file: "parts/36-siderische-einteilungen.md"
    note: "Catastrophe is rebalanced by the entry of new types, geological framing, and the possibility of a new world-style."
  - handle: "zm:107:geological-disquiet"
    section: "zm:107"
    file: "parts/36-siderische-einteilungen.md"
    note: "Geological unrest precedes its own instruments and findings; the apparatuses are treated as feelers and the earth's meaning as an almost unnoticed gift."
  - handle: "zm:108:cosmic-economy"
    section: "zm:108"
    file: "parts/36-siderische-einteilungen.md"
    note: "Ice and climate shift become a measured case in which gain and loss remain subordinate to a larger cosmic economy."
  - handle: "zm:109:great-winter"
    section: "zm:109"
    file: "parts/37-siderische-einteilungen.md"
    note: "Geological unrest is reversed into the possibility that glaciation itself may be a stroke of luck when judged dynamically and in terms of world-style."
  - handle: "zm:110:world-plan"
    section: "zm:110"
    file: "parts/37-siderische-einteilungen.md"
    note: "Harmony stands above death, and the human and state plans are bounded and redirected within the larger creation-plan and world-plan."
  - handle: "zm:111:angle"
    section: "zm:111"
    file: "parts/37-siderische-einteilungen.md"
    note: "Progression becomes visible as altered earth-color, diminishing wilderness, and above all the spread of angle and serial ordering as signatures of measure-power."
  - handle: "zm:112:right-angle"
    section: "zm:112"
    file: "parts/38-siderische-einteilungen.md"
    note: "The spread of measure-power sharpens into the right angle, the rectangle, the cadastral sheet, and the destruction of nests by the Faustian plan."
  - handle: "zm:113:faustian-plan"
    section: "zm:113"
    file: "parts/38-siderische-einteilungen.md"
    note: "Antaean unrest now turns against the Faustian plan itself: geological changes and independent processes make property, boundary, and security doubtful from the ground up."
  - handle: "zm:114:beyond-the-wall"
    section: "zm:114"
    file: "parts/38-siderische-einteilungen.md"
    note: "The question whether human plan-induced change belongs to geology is said to be answered differently on this side and beyond the time wall."
  - handle: "zm:115:layer-forming"
    section: "zm:115"
    file: "parts/39-siderische-einteilungen.md"
    note: "Man becomes not only found in a layer but a layer-forming, layer-determining being; the transition is named as lying at the time wall."
  - handle: "zm:116:mass-revolution"
    section: "zm:116"
    file: "parts/39-siderische-einteilungen.md"
    note: "Population increase and the beginnings of mass revolution are treated as parallel symptoms of a third common process rather than as simple effects of machine-technology."
  - handle: "zm:117:urgrund-workman"
    section: "zm:117"
    file: "parts/39-siderische-einteilungen.md"
    note: "Two models of spiritualization are offered, culminating in matter as `Urgrund` taking man as its workman and pressing him into service."
  - handle: "zm:118:earth-sense"
    section: "zm:118"
    file: "parts/40-siderische-einteilungen.md"
    note: "The second subquestion is posed as the earth-sense of human activity, and `Urgrund` is explicitly preferred over `Weltgeist` as the deeper register."
  - handle: "zm:119:new-freedom"
    section: "zm:119"
    file: "parts/40-siderische-einteilungen.md"
    note: "At the time wall, compulsion and freedom can invert; new points and surfaces of freedom begin to widen."
  - handle: "zm:120:spiritual-sovereignty"
    section: "zm:120"
    file: "parts/40-siderische-einteilungen.md"
    note: "Spiritual sovereignty is treated as rare independence, visible only in exactness, inspection, and declared passage rather than in activism or moral posture."
  - handle: "zm:121:volunteers"
    section: "zm:121"
    file: "parts/41-siderische-einteilungen.md"
    note: "Voluntariness is split from spiritual freedom; at time-boundaries freedom is exacted and the salmon image makes ascent legible as passage into another freedom."
  - handle: "zm:122:fifth-element"
    section: "zm:122"
    file: "parts/41-siderische-einteilungen.md"
    note: "Acceleration is read as a flight tendency away from the classical elements toward a fifth element, while experiment begins to intervene in the geological and cosmic household."
  - handle: "zm:123:meteorological-augur"
    section: "zm:123"
    file: "parts/41-siderische-einteilungen.md"
    note: "Meteorological unrest becomes the most sensitive daily form of antaean unrest, and weather science returns the augur-function inside a planetary system."
  - handle: "zm:124:lightning-rod"
    section: "zm:124"
    file: "parts/42-siderische-einteilungen.md"
    note: "The first lightning rod is treated as both world-historical and earth-historical, opening the distinction between steam's visible brutality and electricity's finer invisible ordering."
  - handle: "zm:125:identity-process"
    section: "zm:125"
    file: "parts/42-siderische-einteilungen.md"
    note: "Electricity and radiation draw the inquiry into matter itself, where human self-knowledge and matter's self-liberation are said to meet at the time wall."
  - handle: "zm:126:franklin"
    section: "zm:126"
    file: "parts/42-siderische-einteilungen.md"
    note: "Franklin, the city-field, and the tragedy of weak heralds make the new age visible through hidden force rather than visible grandeur."
  - handle: "zm:127:first-organ"
    section: "zm:127"
    file: "parts/43-siderische-einteilungen.md"
    note: "The lightning rod becomes first organ and first stone of a globe-spanning mosaic; electricity is read as kin not to muscles but to nerves and sense organs."
  - handle: "zm:128:invisible-democracy"
    section: "zm:128"
    file: "parts/43-siderische-einteilungen.md"
    note: "Visible democracy hides an invisible, more compelling one, where world-opinion and world-will move under the world-plan and the worker acts as layer-forming species."
  - handle: "zm:129:night-view"
    section: "zm:129"
    file: "parts/43-siderische-einteilungen.md"
    note: "Electricity is retained only as analogy; the deeper complaint is that the present mechanized night-view of nature is provisional and leaves an active share of reality out."
  - handle: "zm:130:world-language"
    section: "zm:130"
    file: "parts/44-siderische-einteilungen.md"
    note: "The charged earth-envelope is said to have both a world-historical and an earth-historical aspect, and every transmission carries hieroglyphs of a world-language that alter substance as well as knowledge."
  - handle: "zm:131:intelligent-ship"
    section: "zm:131"
    file: "parts/44-siderische-einteilungen.md"
    note: "The plan moves on a narrow track, the ship itself becomes intelligent and field-charged, and the earth as `Urgrund` seeks new fertility through godfall."
  - handle: "zm:132:mantic-compass"
    section: "zm:132"
    file: "parts/44-siderische-einteilungen.md"
    note: "Freedom persists while its concept changes; the compass becomes a mantic instrument under growing doubt about whether any steering still takes place."
  - handle: "zm:133:anthropological-disquiet"
    section: "zm:133"
    file: "parts/45-siderische-einteilungen.md"
    note: "The crisis becomes anthropological: historical concepts no longer suffice, the human measure turns questionable, and antaean unrest approaches biological stakes."
  - handle: "zm:134:heimdals-horn"
    section: "zm:134"
    file: "parts/45-siderische-einteilungen.md"
    note: "The walk to the time wall becomes a listening-post: through confusion and the Wild Hunt one listens for signals scarcely distinguishable from Heimdall's horn."
  - handle: "zm:135:absolute-time"
    section: "zm:135"
    file: "parts/45-siderische-einteilungen.md"
    note: "Absolute time and earth-time become earth-revolutionary time-setting: historical and biological chronistics are subordinated to an earth-historical system."
  - handle: "zm:136:sindbad-fish"
    section: "zm:136"
    file: "parts/46-siderische-einteilungen.md"
    note: "Elementary clocks revise phylogenetic time into qualitative station-time, and Sindbad's fish-island binds human action to cosmic movement."
  - handle: "zm:137:extinction-economy"
    section: "zm:137"
    file: "parts/46-siderische-einteilungen.md"
    note: "Extinction is given two faces at once: visible management of the earth-household and the old-age death by which the earth calls its creatures back."
  - handle: "zm:138:life-movement"
    section: "zm:138"
    file: "parts/46-siderische-einteilungen.md"
    note: "The spread of types is treated as a total movement of life corresponding to movement in the inanimate earth and demanding an earth-historical or cosmological grasp."
  - handle: "zm:139:bloy-volcano"
    section: "zm:139"
    file: "parts/47-siderische-einteilungen.md"
    note: "Volcanic period exceeds historical memory, and Bloy reads eruption as `first hint` against the false security of modern cities."
  - handle: "zm:140:atmospheric-instruments"
    section: "zm:140"
    file: "parts/47-siderische-einteilungen.md"
    note: "Solar cycles, atmospheric unrest, carbon release, and high-sensitivity instruments are bound into one frame of ordinary orientation."
  - handle: "zm:141:spiral-course"
    section: "zm:141"
    file: "parts/47-siderische-einteilungen.md"
    note: "Darwin remains intact in essentials while branching, periodization, catastrophe-theory, and the spiral recurrence of ideas are repositioned in one frame."
  - handle: "zm:142:primal-generation"
    section: "zm:142"
    file: "parts/48-siderische-einteilungen.md"
    note: "Catastrophe is made insufficient, and a new surge of species is traced back to undifferentiated reserves and primal generation beyond ordinary experience."
  - handle: "zm:143:hominisation-crisis"
    section: "zm:143"
    file: "parts/48-siderische-einteilungen.md"
    note: "Hominisation is declared unfinished and now in crisis, where history and natural history, world-history and earth-history, freedom and determination collide."
  - handle: "zm:144:time-wall-revolt"
    section: "zm:144"
    file: "parts/48-siderische-einteilungen.md"
    note: "Specific horror leads from factory misbirths to mythic godfall, and the time wall is named as the last boundary-mark in an antaean revolt."
  - handle: "zm:145:proteus-work"
    section: "zm:145"
    file: "parts/49-siderische-einteilungen.md"
    note: "Experimental intervention returns under the sign of Proteus-work: the horror answers phenomena, and where the plan collides with the individual it prevails."
  - handle: "zm:146:world-plan-research"
    section: "zm:146"
    file: "parts/49-siderische-einteilungen.md"
    note: "Research is legitimated as visible progress in `Weltplan`; successful experiment sublimates the power of the age and statistics become the morality of the digit."
  - handle: "zm:147:method-way"
    section: "zm:147"
    file: "parts/49-siderische-einteilungen.md"
    note: "Method is tied back to way: experiment remains inviolable because a deeper assent precedes explicit choice, responsibility, and dialectic."
  - handle: "zm:148:vorweisung"
    section: "zm:148"
    file: "parts/50-siderische-einteilungen.md"
    note: "The researcher appears as `Vorweiser`: what is shown in advance is already becoming receivable by general consciousness, and conductivity replaces astonishment."
  - handle: "zm:149:nomos-loss"
    section: "zm:149"
    file: "parts/50-siderische-einteilungen.md"
    note: "The protean shudder deepens into nomos-loss: horror lies not only in deformity, but in the vanishing of divine boundary-guardianship and the attack from `Urgrund`."
  - handle: "zm:150:artificial-insemination"
    section: "zm:150"
    file: "parts/50-siderische-einteilungen.md"
    note: "Artificial insemination becomes the exemplary `Vorweisung`: small in scale, immense in principle, and potentially a species-level change of fate."
  - handle: "zm:151:new-descent"
    section: "zm:151"
    file: "parts/51-siderische-einteilungen.md"
    note: "A new kind of descent becomes possible, the acceptance of the `Vorweisung` is already accomplished, and law can only channel the stream."
  - handle: "zm:152:father-claim"
    section: "zm:152"
    file: "parts/51-siderische-einteilungen.md"
    note: "The claim to the father precedes the claims upon the father; the novelty appears as a new human category moving in the intermediate field at the time wall."
  - handle: "zm:153:evolution-responsibility"
    section: "zm:153"
    file: "parts/51-siderische-einteilungen.md"
    note: "Concealed descent, compulsory registers, state monopolization, and responsibility for evolution are joined in one process."
  - handle: "zm:154:protean-power"
    section: "zm:154"
    file: "parts/52-siderische-einteilungen.md"
    note: "Experiment and specific intelligence are reduced to assistance and symptom; the deeper motion is a protean power working through them."
  - handle: "zm:155:new-type"
    section: "zm:155"
    file: "parts/52-siderische-einteilungen.md"
    note: "The `New House` changes the setup itself, a new type forms nations and races, and reserves and potential multiply beyond the laboratory."
  - handle: "zm:156:decadence-insular"
    section: "zm:156"
    file: "parts/52-siderische-einteilungen.md"
    note: "`Décadence` becomes second-rank and insular under enlarged scale, while barbarism appears as the graver danger."
  - handle: "zm:157:progress-in-freedom"
    section: "zm:157"
    file: "parts/53-siderische-einteilungen.md"
    note: "Historical progress is reduced to progress in freedom, yet revolutions consume freedom and realize ends other than the political ones they intend."
  - handle: "zm:158:insect-state"
    section: "zm:158"
    file: "parts/53-siderische-einteilungen.md"
    note: "Man can be left behind or shunted aside, while `ratio` and insect-state solutions reactivate old principles as one line of hardening."
  - handle: "zm:159:utopian-intention"
    section: "zm:159"
    file: "parts/53-siderische-einteilungen.md"
    note: "Campanella and Fourier prefigure state-regulated life, but utopian poetic intention may return only in altered relation to state-plan and earth-revolutionary power."
  - handle: "zm:160:musische-objection"
    section: "zm:160"
    file: "parts/54-siderische-einteilungen.md"
    note: "Orwell, Huxley, and Friedrich Georg Jünger become prognostic warnings against state-plan and pure logical calculus from a musische standpoint."
  - handle: "zm:161:will-freedom"
    section: "zm:161"
    file: "parts/54-siderische-einteilungen.md"
    note: "Human intervention in evolution is new, yet where man is in play no process can run wholly predetermined."
  - handle: "zm:162:iceberg-caput"
    section: "zm:162"
    file: "parts/54-siderische-einteilungen.md"
    note: "Freedom as higher self-consciousness in the iceberg's visible cap cannot master the mass, but it can introduce quality and meaning into it."
  - handle: "zm:163:representative-freedom"
    section: "zm:163"
    file: "parts/55-siderische-einteilungen.md"
    note: "Freedom is restated as representative human dignity, while state-formation is reduced to a recurring biological principle rather than the human mark."
  - handle: "zm:164:last-man-overman"
    section: "zm:164"
    file: "parts/55-siderische-einteilungen.md"
    note: "The Overman is read through the departing train and the Last Man: not as coming great lord, but as the type to whom exit from history succeeds."
  - handle: "zm:165:state-optical-illusion"
    section: "zm:165"
    file: "parts/55-siderische-einteilungen.md"
    note: "The state is demoted to an optical illusion on the station; the shove drives the states, and world-state may name only a status or station in longer rhythms."
  - handle: "zm:166:historical-human-inheritance"
    section: "zm:166"
    file: "parts/55-siderische-einteilungen.md"
    note: "On this side of the line the decisive question becomes what of the historical-human inheritance may be carried across and not sacrificed."

notes:
  - handle: "note:zm:1:seidenschwanz"
    section: "zm:1"
    anchor: "zm:1:seidenschwanz"
    file: "parts/01-fremde-voegel.md"
    kind: "translation_note"
    note: "Waxwing retained as the opening image because the analogy becomes the argument."
  - handle: "note:zm:6:hinzutretende"
    section: "zm:6"
    anchor: "zm:6"
    file: "parts/02-messbare-und-schicksalszeit.md"
    kind: "translation_note"
    note: "The concept appears and is kept literal enough to remain structurally visible."
  - handle: "note:zm:9:church-year"
    section: "zm:9"
    anchor: "zm:9:church-year"
    file: "parts/03-messbare-und-schicksalszeit.md"
    kind: "translation_note"
    note: "Qualitative time becomes liturgical and theological, not merely astrological."
  - handle: "note:zm:11:schachtgaenge"
    section: "zm:11"
    anchor: "zm:11:schachtgaenge"
    file: "parts/04-messbare-und-schicksalszeit.md"
    kind: "translation_note"
    note: "The mining image is preserved because `Ausbeute` depends on it."
  - handle: "note:zm:13:schicksalsuhr"
    section: "zm:13"
    anchor: "zm:13:schicksalsuhr"
    file: "parts/04-messbare-und-schicksalszeit.md"
    kind: "translation_note"
    note: "Left as `fate-clock` while the metaphor remains under pressure."
  - handle: "note:zm:14:abdichtung"
    section: "zm:14"
    anchor: "zm:14:abdichtung"
    file: "parts/05-messbare-und-schicksalszeit.md"
    kind: "translation_note"
    note: "The directional metaphor matters more than elegant English."
  - handle: "note:zm:15:titanic-record"
    section: "zm:15"
    anchor: "zm:15:titanic-record"
    file: "parts/05-messbare-und-schicksalszeit.md"
    kind: "translation_note"
    note: "The record language has to keep abstract time visible without flattening the shipwreck into allegory."
  - handle: "note:zm:20:tragedy"
    section: "zm:20"
    anchor: "zm:20:tragedy"
    file: "parts/07-messbare-und-schicksalszeit.md"
    kind: "translation_note"
    note: "The explicit statement that tragedy `weaves` `Schicksalszeit` is a major confirmation of the current fate-language."
  - handle: "note:zm:25:plan-freedom"
    section: "zm:25"
    anchor: "zm:25:plan-freedom"
    file: "parts/08-messbare-und-schicksalszeit.md"
    kind: "translation_note"
    note: "The danger to the plan is not only error but a non-systematic language of freedom that speaks through the musische sphere."
  - handle: "note:zm:28:periodicity"
    section: "zm:28"
    anchor: "zm:28:periodicity"
    file: "parts/09-messbare-und-schicksalszeit.md"
    kind: "translation_note"
    note: "The section links flattened rhythms and denied sacrifice to enlarged catastrophe rather than to liberation from fate."
  - handle: "note:zm:31:so-sein-gleichsein"
    section: "zm:31"
    anchor: "zm:31:so-sein-gleichsein"
    file: "parts/10-messbare-und-schicksalszeit.md"
    kind: "translation_note"
    note: "The part closes by setting `So-Sein` against sameness and by treating astrological inclination as a sign of counterforce rather than a finished effect."
  - handle: "note:zm:32:spiral"
    section: "zm:32"
    anchor: "zm:32:spiral"
    file: "parts/11-humane-einteilungen.md"
    kind: "translation_note"
    note: "The opening of `Humane Einteilungen` carries the time-crisis into explicit models for dividing world-time rather than merely naming linear and cyclical systems in passing."
  - handle: "note:zm:36:analogy"
    section: "zm:36"
    anchor: "zm:36:analogy"
    file: "parts/12-humane-einteilungen.md"
    kind: "translation_note"
    note: "Pure comparison creates relations but not standards; the return of `der Hinzutretende` here turns physiognomic analogy toward prophecy without solving the question of inner unity."
  - handle: "note:zm:38:logos-nomos"
    section: "zm:38"
    anchor: "zm:38:logos-nomos"
    file: "parts/13-humane-einteilungen.md"
    kind: "translation_note"
    note: "Part 3 explicitly reconnects astrology to `Schicksalszeit`: the methodological value lies less in correctness than in reactivating powers of mind that have lain fallow."
  - handle: "note:zm:43:two-houses"
    section: "zm:43"
    anchor: "zm:43:two-houses"
    file: "parts/14-humane-einteilungen.md"
    kind: "translation_note"
    note: "Morphological comparison can catch historical resemblance without perceiving that two formations belong to fundamentally different fateful times."
  - handle: "note:zm:44:zeitfragen"
    section: "zm:44"
    anchor: "zm:44:zeitfragen"
    file: "parts/15-humane-einteilungen.md"
    kind: "translation_note"
    note: "The section presses the time-crisis beyond human history by subordinating the struggle for existence to qualitative changes of time itself."
  - handle: "note:zm:48:zeitmauer"
    section: "zm:48"
    anchor: "zm:48:zeitmauer"
    file: "parts/16-humane-einteilungen.md"
    kind: "translation_note"
    note: "The title-metaphor finally appears inside the text itself, but under an explicit warning that every naming at that threshold is dangerous."
  - handle: "note:zm:51:namenlos"
    section: "zm:51"
    anchor: "zm:51:namenlos"
    file: "parts/17-humane-einteilungen.md"
    kind: "translation_note"
    note: "The section turns the title-metaphor into a naming crisis: future things are dimly visible before they can be forced under historically binding names."
  - handle: "note:zm:54:lichtfrage"
    section: "zm:54"
    anchor: "zm:54:lichtfrage"
    file: "parts/18-humane-einteilungen.md"
    kind: "translation_note"
    note: "The end of the historical world is not read as mythic return; the decisive question is one of light, with a new `Hochgrad` rather than restored ancient figures."
  - handle: "note:zm:56:bruchstelle"
    section: "zm:56"
    anchor: "zm:56:bruchstelle"
    file: "parts/19-humane-einteilungen.md"
    kind: "translation_note"
    note: "The fracture point now names the suspicious timing of discovery itself: why do these prehistoric images become visible to us precisely now?"
  - handle: "note:zm:59:gestaltlehren"
    section: "zm:59"
    anchor: "zm:59:gestaltlehren"
    file: "parts/20-humane-einteilungen.md"
    kind: "translation_note"
    note: "The section turns typology and the seeing of forms into the last valid aid of knowledge before fate-bearing encounters that knowledge alone cannot master."
  - handle: "note:zm:63:erdheimat"
    section: "zm:63"
    anchor: "zm:63:erdheimat"
    file: "parts/21-humane-einteilungen.md"
    kind: "translation_note"
    note: "The section binds border, war, blood-toll, and technique together under a coming reconfiguration of earth-home rather than under simple political negation."
  - handle: "note:zm:67:erdgeistig"
    section: "zm:67"
    anchor: "zm:67:erdgeistig"
    file: "parts/22-humane-einteilungen.md"
    kind: "translation_note"
    note: "The vocabulary itself is disciplined here: `earth-spiritual` is preferred where `magical` would collapse too many unlike phenomena into one occult blur."
  - handle: "note:zm:68:silver-age"
    section: "zm:68"
    anchor: "zm:68:silver-age"
    file: "parts/23-humane-einteilungen.md"
    kind: "translation_note"
    note: "The Silver Age gives `erdgeistig` institutional and technical force rather than leaving it as a merely lexical correction to `magisch`."
  - handle: "note:zm:70:projected-spirit"
    section: "zm:70"
    anchor: "zm:70:projected-spirit"
    file: "parts/23-humane-einteilungen.md"
    kind: "translation_note"
    note: "The decisive turn is from limb-prostheses to nervous-system imitation; `projected spirit` keeps technology inside the earth-spiritual field."
  - handle: "note:zm:71:planetary-aura"
    section: "zm:71"
    anchor: "zm:71:planetary-aura"
    file: "parts/24-humane-einteilungen.md"
    kind: "translation_note"
    note: "The new planetary aura is treated as metahistorical earth-spiritualization rather than as progress or decline in the usual historical sense."
  - handle: "note:zm:73:poetry-abundance"
    section: "zm:73"
    anchor: "zm:73:poetry-abundance"
    file: "parts/24-humane-einteilungen.md"
    kind: "translation_note"
    note: "The poet's priority is methodological: early song still draws from the undivided and therefore reaches the Golden Age more deeply than science can."
  - handle: "note:zm:76:moses-bruchstelle"
    section: "zm:76"
    anchor: "zm:76:moses-bruchstelle"
    file: "parts/25-humane-einteilungen.md"
    kind: "translation_note"
    note: "The section deepens both `Bruchstelle` and the earth-spiritual line: revelation reaches back to the undivided, but immediately hardens into law, separation, and a shepherd/herd relation."
  - handle: "note:zm:79:kentauren"
    section: "zm:79"
    anchor: "zm:79:kentauren"
    file: "parts/26-humane-einteilungen.md"
    kind: "translation_note"
    note: "Guérin's centaur world sharpens the method question: the poet can penetrate relations and issue assignments where the researcher only classifies."
  - handle: "note:zm:82:urgrund"
    section: "zm:82"
    anchor: "zm:82:urgrund"
    file: "parts/27-humane-einteilungen.md"
    kind: "translation_note"
    note: "The move into `Urgrund` matters because the section treats materialism as insufficient until it reaches the deepest ground of matter and thereby opens a farther view."
  - handle: "note:zm:85:axis"
    section: "zm:85"
    anchor: "zm:85:axis"
    file: "parts/29-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The wheel/axis and garment/body figures must stay concrete, because they are what keep cyclical cosmology from becoming self-explanatory."
  - handle: "note:zm:87:titanic-model"
    section: "zm:87"
    anchor: "zm:87:titanic-model"
    file: "parts/29-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The `Titanic` here is not only an example but a standing model; omen-language and technical-catastrophe language have to remain visible at once."
  - handle: "note:zm:88:archimedean-point"
    section: "zm:88"
    anchor: "zm:88:archimedean-point"
    file: "parts/30-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The section's fulcrum is the phrase `Archimedean point`: moral critique without transcendental leverage can only circle in the human and all-too-human."
  - handle: "note:zm:89:intensive-solution"
    section: "zm:89"
    anchor: "zm:89:intensive-solution"
    file: "parts/30-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The extensive/intensive distinction should stay blunt; it is the section's actual answer to doom without counterweight."
  - handle: "note:zm:92:burnable-house"
    section: "zm:92"
    anchor: "zm:92:burnable-house"
    file: "parts/31-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The burnable-house image must stay bare and childish; the section's force depends on catastrophe entering human agency without becoming merely technical."
  - handle: "note:zm:93:world-unity"
    section: "zm:93"
    anchor: "zm:93:world-unity"
    file: "parts/31-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The political forecasts need stiff English in the right places: `world-unity`, `world-regalian monopoly`, and `earth-current` are pressure points, not yet settled terms."
  - handle: "note:zm:94:spaceflight"
    section: "zm:94"
    anchor: "zm:94:spaceflight"
    file: "parts/32-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The section's force depends on keeping the planetary, playful, and lordly aspects of spaceflight together rather than flattening it into Cold War reportage."
  - handle: "note:zm:96:transhistorical-means"
    section: "zm:96"
    anchor: "zm:96:transhistorical-means"
    file: "parts/32-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The key distinction has to stay literal: the danger is not new means alone, but transhistorical means used historically."
  - handle: "note:zm:97:clockwork-hour"
    section: "zm:97"
    anchor: "zm:97:clockwork-hour"
    file: "parts/33-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The section binds fear, monotony, clockwork, and `Gestell` into one atmosphere; `Erdgeistiges` is a real recurrence, not a loose echo."
  - handle: "note:zm:99:last-man"
    section: "zm:99"
    anchor: "zm:99:last-man"
    file: "parts/33-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The warning is not merely against destruction but against perfected technical splendor severed from freedom, metaphysical hunger, and unforced art."
  - handle: "note:zm:100:substance-surrender"
    section: "zm:100"
    anchor: "zm:100:substance-surrender"
    file: "parts/34-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The section has to keep its bookkeeping field visible: `Substanzabgabe`, equivalent, payment, advance payment, currency, and toll all belong to one account of invested loss."
  - handle: "note:zm:102:wechselspiel"
    section: "zm:102"
    anchor: "zm:102:wechselspiel"
    file: "parts/34-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The title-image is defined dynamically here, not merely spatially: the `terrible interplay at the time wall` joins monotony, initiation, fear, and the unreceipted part of the surrender."
  - handle: "note:zm:103:through-the-wall"
    section: "zm:103"
    anchor: "zm:103:through-the-wall"
    file: "parts/35-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The section's force depends on treating crisis as passage rather than reflection alone; the wall is crossed, not merely contemplated."
  - handle: "note:zm:104:astrological-model"
    section: "zm:104"
    anchor: "zm:104:astrological-model"
    file: "parts/35-siderische-einteilungen.md"
    kind: "translation_note"
    note: "Astrology is not being endorsed literally here; it matters as a model of synoptic method that can keep measure and metaphysical quality together."
  - handle: "note:zm:105:grossjahre"
    section: "zm:105"
    anchor: "zm:105:grossjahre"
    file: "parts/35-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The house-metaphor and the scale-language have to stay visible together: vistas, geological beds, Procrustes, and great years all belong to one enlargement of the cut."
  - handle: "note:zm:106:new-types"
    section: "zm:106"
    anchor: "zm:106:new-types"
    file: "parts/36-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The section depends on thinking catastrophe together with its equivalent, `das Eintretende`; the English should keep that counterweight visible."
  - handle: "note:zm:107:geological-disquiet"
    section: "zm:107"
    anchor: "zm:107:geological-disquiet"
    file: "parts/36-siderische-einteilungen.md"
    kind: "translation_note"
    note: "Geological disquiet is prior here, not derivative. Instruments are its organization, and the decisive issue is the purity of human sense."
  - handle: "note:zm:108:cosmic-economy"
    section: "zm:108"
    anchor: "zm:108:cosmic-economy"
    file: "parts/36-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The section has to keep measurable climate gain and hidden offsetting loss in one frame, ending on ice as treasure rather than dead mass."
  - handle: "note:zm:109:great-winter"
    section: "zm:109"
    anchor: "zm:109:great-winter"
    file: "parts/37-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The section depends on keeping `Glück` unstable between happiness and luck while climate, hominization, memory, and world-style are forced into one frame."
  - handle: "note:zm:110:world-plan"
    section: "zm:110"
    anchor: "zm:110:world-plan"
    file: "parts/37-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The passage needs to keep `Schöpfungsplan`, `Weltplan`, correction, judgment, and harmony together without collapsing into pious abstraction."
  - handle: "note:zm:111:angle"
    section: "zm:111"
    anchor: "zm:111:angle"
    file: "parts/37-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The double sense of `Vermessen` and the close pair `Winkelmaß und Reihung` carry the section's actual argument about measurable power and overreach."
  - handle: "note:zm:112:right-angle"
    section: "zm:112"
    anchor: "zm:112:right-angle"
    file: "parts/38-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The right angle, nest, cadastral sheet, and Philemon-Baucis passage must keep the civilizational conflict between inherited form and the Faustian plan visible."
  - handle: "note:zm:113:faustian-plan"
    section: "zm:113"
    anchor: "zm:113:faustian-plan"
    file: "parts/38-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The section depends on keeping antaean unrest distinct from nostalgia: what grows doubtful is the Faustian plan itself, and `von Grund auf` must preserve its ground-pun."
  - handle: "note:zm:114:beyond-the-wall"
    section: "zm:114"
    anchor: "zm:114:beyond-the-wall"
    file: "parts/38-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The title-image becomes methodological here; the inquiry's standpoint, geology's scope, and the freedom of the plan all change depending on which side of the wall one stands."
  - handle: "note:zm:115:layer-forming"
    section: "zm:115"
    anchor: "zm:115:layer-forming"
    file: "parts/39-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The distinction `Ausgrabung / Grabung` and the close rendering of `layer-forming, layer-determining` carry the section's actual hinge at the time wall."
  - handle: "note:zm:116:mass-revolution"
    section: "zm:116"
    anchor: "zm:116:mass-revolution"
    file: "parts/39-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The section depends on reversing the easy machine-causality: mass increase and mass revolution are symptoms of a third common process, not mere aftereffects."
  - handle: "note:zm:117:urgrund-workman"
    section: "zm:117"
    anchor: "zm:117:urgrund-workman"
    file: "parts/39-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The numbering, the weaving image, the kept German `Urgrund,` and the formula `That art thou` all need to stay visible for the section to hold."
  - handle: "note:zm:118:earth-sense"
    section: "zm:118"
    anchor: "zm:118:earth-sense"
    file: "parts/40-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The section depends on keeping `Erdsinn`, `Urgrund`, and `Weltgeist` in live tension; the term-choice is part of the argument, not only a commentary issue."
  - handle: "note:zm:119:new-freedom"
    section: "zm:119"
    anchor: "zm:119:new-freedom"
    file: "parts/40-siderische-einteilungen.md"
    kind: "translation_note"
    note: "The freedom passage has to stay plain and exact: the wall-image, alienation, and new freedom all belong to one transition without rhetorical inflation."
  - handle: "note:zm:120:spiritual-sovereignty"
    section: "zm:120"
    anchor: "zm:120:spiritual-sovereignty"
    file: "parts/40-siderische-einteilungen.md"
