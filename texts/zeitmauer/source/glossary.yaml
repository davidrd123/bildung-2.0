# Working glossary for recurring terms.
# `preferred` can remain null while the term is still unstable.

- term: "An der Zeitmauer"
  handle: "term:an-der-zeitmauer"
  kind: title
  preferred: null
  alternatives:
    - "At the Time Wall"
    - "On the Time Wall"
    - "By the Time Wall"
  status: open
  evidence:
    - "evidence:term:an-der-zeitmauer:zm:48"
    - "evidence:term:an-der-zeitmauer:zm:102"
    - "evidence:term:an-der-zeitmauer:zm:103"
    - "evidence:term:an-der-zeitmauer:zm:114"
    - "evidence:term:an-der-zeitmauer:zm:115"
    - "evidence:term:an-der-zeitmauer:zm:119"
    - "evidence:term:an-der-zeitmauer:zm:125"
    - "evidence:term:an-der-zeitmauer:zm:134"
    - "evidence:term:an-der-zeitmauer:zm:144"
    - "evidence:term:an-der-zeitmauer:zm:152"
  notes: "Keep the German title at project level until the metaphor settles across later sections. §48 is the first explicit internal occurrence and makes the image spatial and dangerous at once: the future outlines itself beyond the time wall, and naming that zone is itself risky. §102 deepens the image by naming the `terrible interplay at the time wall`: monotony robs within historical space while future things knock from the transhistorical, and the unreceipted part of the surrender accumulates there. §103 adds the passage-image directly: the way leads over the line, over the time wall, and through it. §114 makes the title methodological as well as imagistic: the question whether human plan-induced change belongs to geology is said to be answered differently on this side and beyond the time wall. §115 gives the image another strong internal pressure point by locating at the time wall the transition where man becomes not only layered but layer-forming and layer-determining. §119 extends the same image into the freedom problem: beyond the line and beyond the time wall, compulsion and freedom can invert, and new fields of freedom begin to widen. §125 gives the image another strong methodological charge: the seam-point and even identity of man's self-knowledge and matter's self-liberation are named as tasks set us at the time wall. §134 turns the image into an explicit investigative stance: going to the time wall and reconnoitering there becomes an act of listening for signals scarcely distinguishable from Heimdall's horn. §144 gives the image one of its strongest mythic pressures: the time wall is named as the last boundary-mark in an antaean revolt following the fall of the gods. §152 adds a new administrative-experimental register: the experiment is said to move in the intermediate field at the time wall, where the invisible share vastly outweighs the visible."

- term: "Fremde Vögel"
  handle: "term:fremde-voegel"
  kind: section_title
  preferred: "Strange Birds"
  alternatives:
    - "Foreign Birds"
  status: tentative
  notes: "The section treats migratory birds as omens or indicators, not merely exotic species."

- term: "Meßbare und Schicksalszeit"
  handle: "term:messbare-und-schicksalszeit"
  kind: section_title
  preferred: "Measurable Time and Fateful Time"
  alternatives:
    - "Measurable Time and Destinal Time"
    - "Measured Time and Time of Destiny"
  status: tentative
  notes: "Still workable after the full run of §§4-31. By §§9 and 13 the pair clearly names qualitative time against measurable time; by §§14-16 it also begins to organize planning, ceremony, catastrophe, and religion; by §§17-19 it presses into science, medicine, and epistemic modesty; by §§20-22 it extends into character, tragedy, recurrence, and fortune; by §§23-25 it bears directly on happiness-loss, omen-like decision, insurance, and the plan's fear of free musische speech; by §§26-28 it returns to astrology as revolutionary symptom and expands into changed optics, periodicity, flattened rhythms, sacrifice, and catastrophe; by §§29-31 it closes on singular destiny, `So-Sein` versus uniformity, mass fate, and the first stirring of a counterpower to Leviathan without requiring the inflated `destinal`."

- term: "Humane Einteilungen"
  handle: "term:humane-einteilungen"
  kind: section_title
  preferred: "Human Divisions"
  alternatives:
    - "Human Classifications"
    - "Human Orderings"
  status: tentative
  notes: "Working after the complete run of §§32-84. `Humane` here means human rather than ethically `humane`; the part opens with divisions of world-time, history, and natural order, then moves into Spengler, morphology, world-plan, and the limits of pure historical judgment, sharpens the difference between historical time and `Schicksalszeit`, widens into earth-history, prehistory, and the dawning of historical consciousness, reaches the preservation and injury of historical man, turns toward mythic return, naming-crisis, sacrifice, false recurrence, blood-toll, and qualitative summation, presses further into `Urgeschichte`, typology, the last aids of knowledge, carries the Golden Age run into hunting, boundary, earth-home, and the first measured riches, differentiates `erdgeistig` from the looser `magisch`, reworks the Silver Age as a zone of earth-spiritual recurrence and formal hardening, turns tool-history toward prosthesis, nervous system, and projected spirit, pauses to justify its own mixed method of epochs and layers while granting the poet a deeper home-right in the Golden Age than scientific reconstruction can claim, reaches fooldom, transformation, the Golden Calf, and Moses as a figure standing at one of the great fracture points where metahistorical time-division becomes explicit, sharpens the fairy-tale/myth distinction while treating the poet's earth-sight as capable of making visible what research alone cannot, and closes by turning fear, economy, religion, state, and `Urgrund` into tests for judging the present from a metahistorical height."

- term: "Siderische Einteilungen"
  handle: "term:siderische-einteilungen"
  kind: section_title
  preferred: "Sidereal Divisions"
  alternatives:
    - "Sidereal Orderings"
    - "Astral Divisions"
  status: tentative
  notes: "Working after §§85-166. `Siderisch` here begins not as astrology in the narrow sense but as earth-history viewed as the history of a heavenly body, widening at once into cosmogony, apocalypse, technical catastrophe, and the question of whether even cyclical cosmologies still require an axis, a body, and limits to time. By §§88-90 the part also binds modern doom to human work, technocracy, the loss of transcendental counterweight, and the claim that catastrophe can remain collectively unavoidable yet become intensively solvable for the individual. By §§91-93 it adds the martyr standard, the image of the world as a burnable house in human hands, and the first explicit forecasts of political unity, overstrain, and planetary process. By §§94-96 it turns spaceflight into an earth-historical sign, approaches Nietzsche's `wars without powder`, and makes the mismatch between transhistorical means and historical war explicit. By §§97-99 it shifts into atmosphere, monotony, substance-loss, and the possibility that metaphysical hunger itself could die away under technical perfection. By §§100-102 it closes the first substance-account of the part through credit, debt, and countervalue, presses equality into inner `So-Sein`, and binds the whole exchange directly to the title-image at the time wall. By §§103-105 it turns crisis into initiation and passage, reintroduces astrology as the model of a superior synoptic method, and widens the cut into geological epochs, great years, and nearly invisible partial catastrophes. By §§106-108 it rebalances catastrophe by the entry of new types, treats geological disquiet as prior to objective findings, and closes on ice and climate under the sign of a larger cosmic economy. By §§109-111 it tests geological unrest against happiness, reintroduces harmony above death through `Schöpfungsplan` and `Weltplan`, and returns to the measurable field through the geometry of progression: altered earth-color, diminishing wilderness, angle, and row. By §§112-114 it sharpens that progression into the right angle, the nest-versus-plan conflict, the threatened Faustian plan, and finally the methodological claim that geology, history, and freedom are answered differently on this side and beyond the time wall. By §§115-117 it treats humanity itself as layer-forming, reads mass increase and mass revolution as epochal symptoms rather than as mere machine-effects, and reaches `Urgrund` again through two models of world-spiritualization, one artistic and one earth-force. By §§118-120 it turns the same register toward earth-sense, the deliberate preference for `Urgrund` over `Weltgeist`, the possibility of new freedom beyond the wall, and the rare discipline of spiritual sovereignty. By §§121-123 it binds that freedom-problem to voluntariness, invisible cause, antaean mistrust of the elements, technical flight into experiment, and meteorology as a daily planetary science that revives the augur-function inside human knowledge. By §§124-126 it turns the same movement toward electrification: the lightning rod as earth-historical sign, electricity as invisible ordering distinct from steam's brutal visibility, the seam-point of matter and mind at the time wall, and Franklin's city-fields as heralds of a new age entering through weak and meager forms. By §§127-129 it extends electrification into the first organ of antaean unrest, the nerve-like refinement and spiritualization of the technical world, the invisible democracy and world-will moving under `Weltplan`, and finally the explicit admission that the whole electrical argument is analogical and that the present night-view of nature is only a provisional workshop-style awaiting a fuller, ensouled recognition. By §§130-132 it turns the same movement toward the charged earth-envelope and the intelligent ship: the earth-historical aspect overarches the world-historical, transmission becomes world-language and substance-change, the plan enters a magnetic world of stronger answers, and freedom migrates toward the mantic compass under conditions where steering itself becomes doubtful. By §§133-135 it pushes the same movement into anthropology, reconnaissance at the wall, and absolute dating: the unrest becomes biological, going to the time wall becomes listening for signals, and historical and biological chronistics are subordinated to an earth-historical, earth-revolutionary system of time-setting. By §§136-138 it turns the same movement into qualitative station-time, extinction-economy, and total life-movement: elementary clocks revise phylogenetic time, Sindbad's fish-island ties human action to cosmic motion, extinction follows a new management of the earth-household, and the spread of types is treated as a total movement to be grasped earth-historically or even cosmologically. By §§139-141 it turns the same movement toward volcanic and solar periods, atmospheric instrumentation, and spiral catastrophe-theory: historical memory proves too short for the relevant scales, atmospheric unrest becomes part of everyday orientation, and Darwinian continuity is re-read through periodization, Cuvier, and the modern preference for `genes` over `Genesis`. By §§142-144 it turns the same movement toward primal generation, hominisation crisis, and mythic godfall: catastrophe is made insufficient, undifferentiated reserves are reintroduced beneath species-formation, self-conscious layer-work brings freedom and responsibility into collision with earth-history, and the time wall appears as the last boundary-mark in an antaean revolt after the fall of the gods. By §§145-147 it turns the same movement toward experiment, research, and method itself: Proteus-work, mutation-gardens, and the plan's victory over the individual, then research as visible progress in `Weltplan`, and finally method as a way already affirmed beneath thought. By §§148-150 it turns the same movement toward advance showing, nomos-loss, and species-technique: the researcher becomes `Vorweiser`, conductivity and acceptance accelerate, the fading of divine boundary-guardianship deepens the protean shudder, and artificial insemination is judged more consequential by principle than by scale. By §§151-153 it turns the same movement toward descent, registration, and evolutionary responsibility: acceptance is treated as already accomplished, the experiment enters the intermediate field at the time wall, descent becomes a registry and power problem, and the state is drawn toward simplification and monopolization under an earth-spiritual and earth-historical pressure. By §§154-156 it turns the same movement toward deeper causality, new type, and scale correction: experiment and specific intelligence are reduced to auxiliaries of a protean power, the `New House` changes the setup itself and multiplies reserves, and `décadence` becomes insular once the larger formation comes into view. By §§157-159 it turns the same movement toward progress in freedom, revolutionary consumption, insect-state hardening, and utopian return: metaphysical freedom is distinguished from historical freedoms, revolutions are said to realize deeper ends than the political ones they name, insect-state solutions reappear under `ratio`, and older utopian intentions from Campanella and Fourier are reread against state-plan and earth-revolutionary power. By §§160-162 it turns the same movement toward dystopian warning, will-freedom, and iceberg consciousness: literary critiques expose the state-plan from `musische`, metaphysical, and theological standpoints, no humanly considered process is allowed to run wholly predetermined, and freedom enters the determined mass as a qualitative, meaning-giving cap. By §§163-166 it closes the part through representative freedom, the Overman/Last Man pair, the state demoted to a station-illusion, and the final selection-question on this side of the line: what of the historical-human inheritance may be carried across before `Urgrund und Person` begins."

- term: "Urgrund und Person"
  handle: "term:urgrund-und-person"
  kind: section_title
  preferred: "Primal Ground and Person"
  alternatives:
    - "Deep Ground and Person"
    - "Primal Ground and the Person"
  status: tentative
  notes: "Working after §§176-180. The part still does not unfold `Urgrund` directly as a settled body-term; instead it advances through the father-question, the withdrawal of the personal gods, church as institution, metaphysical interregnum, `Great Houses`, and `Second Religiosity`, then through church versus `kosmisch-metaphysische Gesamtlage`, late church as surviving power-station, paternal law as `nachwirkende Macht`, the return of `der Hinzutretende`, and emptiness rather than nothing as the remaining gap in `Weltplan`, before reopening the worker/materialism line and letting `Urgrund` return through the maternal register, anti-paternal transformation, and nihilism as transit. `Primal Ground and Person` therefore remains workable as a title-level choice because the personal pole is under continuous pressure while the `Urgrund` pole is still being approached obliquely rather than unfolded directly."

- term: "Schicksalszeit"
  handle: "term:schicksalszeit"
  kind: concept
  preferred: "fateful time"
  alternatives:
    - "destinal time"
    - "time of destiny"
  status: tentative
  evidence:
    - "evidence:term:schicksalszeit:zm:4"
    - "evidence:term:schicksalszeit:zm:9"
    - "evidence:term:schicksalszeit:zm:13"
    - "evidence:term:schicksalszeit:zm:20"
    - "evidence:term:schicksalszeit:zm:38"
    - "evidence:term:schicksalszeit:zm:43"
  notes: "Sections 4-43 support `fateful time`: the neighboring compounds stay concrete (`Schicksalsweisung`, `Schicksalsdeutung`, `Schicksalsqualitäten`, `Schicksalsuhr`) while retaining metaphysical weight; §20 confirms the choice when tragedy is said to `weave` `Schicksalszeit`, §38 carries it into Part 3 as a methodological relation between measurable astronomical time and the fate-time to be interpreted, and §43 sharpens it further by distinguishing two formations that are historically similar yet fundamentally different in `Schicksalszeit`."

- term: "mantisch"
  handle: "term:mantisch"
  kind: concept
  preferred: "mantic"
  alternatives:
    - "divinatory"
  status: tentative
  notes: "Sections 1, 4, 7, 17, and 132 support the technical feel of `mantic`: the word sits beside augury, omens, oracle practices, geomancy, the role of `divination`, and finally the compass as `mantisches Gerät,` rather than generalized mysticism."

- term: "Urgrund"
  handle: "term:urgrund"
  kind: concept
  preferred: "primal ground"
  alternatives:
    - "ground of being"
    - "deep ground"
  status: open
  evidence:
    - "evidence:term:urgrund:zm:82"
    - "evidence:term:urgrund:zm:117"
    - "evidence:term:urgrund:zm:118"
    - "evidence:term:urgrund:zm:131"
    - "evidence:term:urgrund:zm:179"
  notes: "The final section now sharpens the term without fully settling the English. §82 gives the first real pressure in the translated range by reaching `Urgrund` through matter, visibility, and identity rather than through later overtly theological language. §117 carries the term into direct earth-power and world-spiritualization: matter in its deepest form, as `Urgrund,` seizes man as its workman and presses him into service. §118 is the strongest conceptual pressure yet: the term is chosen explicitly over `Weltgeist`, criticized for progressive and anthropocentric residue, and tied to the claim that being is now widely imagined as dwelling in the `Urgrund` rather than in spirit. §131 extends it into a mythic-cosmogonic register: the earth as `Urgrund,` as chaos, seeks new fertility and a new garment through the downfall of gods. §179 extends it into the maternal register of the final section: the mother embodies `Urgrund` from herself and gives birth out of it, so father-right loses force to matriarchal power."

- term: "erdgeschichtlich"
  handle: "term:erdgeschichtlich"
  kind: concept
  preferred: "earth-historical"
  alternatives:
    - "geo-historical"
  status: tentative
  evidence:
    - "evidence:term:erdgeschichtlich:zm:67"
    - "evidence:term:erdgeschichtlich:zm:124"
    - "evidence:term:erdgeschichtlich:zm:130"
    - "evidence:term:erdgeschichtlich:zm:135"
    - "evidence:term:erdgeschichtlich:zm:138"
    - "evidence:term:erdgeschichtlich:zm:141"
    - "evidence:term:erdgeschichtlich:zm:153"
  notes: "The term needs to remain visibly larger in scale than ordinary history. §67 makes it load-bearing by naming man not only as a world-historical being but as an earth-historical one, that is, as species under catastrophe. §124 gives it a concrete technical-historical datum: the first lightning rod is declared not only world-historical but earth-historical, so electrification itself enters the argument as more than a merely human or civilizational event. §130 makes the relation explicit: the earth-historical aspect overarches the world-historical, and the charged earth-envelope transforms not only knowledge but substance. §135 turns the scale into a system: historical and biological chronistics are subordinated to an earth-historical order, and absolute time is described as an earth-revolutionary setting of time. §138 extends the same scale into theory itself: development beyond zoological or historical courses is said to be graspable only earth-historically or even cosmologically, and every non-mechanistic theory is measured against that demand. §141 sharpens the same demand through Darwin, Spengler, and Cuvier: development beyond ordinary zoological or historical courses is again said to require earth-historical or even cosmological grasp, now under the sign of spiral recurrence rather than regress. §153 gives the term a new ethical-active pressure: the addition of human guilt and freedom is said to do more than merely perceive an earth-historical movement; it has formative and modifying force of its own within it."

- term: "erdgeistig"
  handle: "term:erdgeistig"
  kind: concept
  preferred: "earth-spiritual"
  alternatives:
    - "telluric-spiritual"
    - "earth-spirited"
  status: tentative
  evidence:
    - "evidence:term:erdgeistig:zm:67"
    - "evidence:term:erdgeistig:zm:68"
    - "evidence:term:erdgeistig:zm:70"
    - "evidence:term:erdgeistig:zm:76"
    - "evidence:term:erdgeistig:zm:97"
    - "evidence:term:erdgeistig:zm:153"
  notes: "§67 explicitly qualifies the vocabulary: `magisch` is too loose and should, where possible, give way to `erdgeistig`. §68 then makes the term period-forming in the Silver Age through priesthood, formula, magical city-form, and technique; §70 extends it further by saying that technology is not merely a world of abstractions but immediately earth-spiritual reality; §76 carries the same field into revelation, where `Erdgeistigkeit` condenses once more into creative power but under direction, law, and separation. §97 proves the field continues into Part 4: the measurable objects of fear are called merely the age-style behind which `Erdgeistiges` is concealed. §153 extends the same field into plan, state, and differentiation: reduction of erotic bonds to performance corresponds to an earth-spiritual tendency visible wherever nature approaches state-formation. Keep the English visibly awkward enough to preserve the distinction from generic `magical` while remaining paired with `Erdgeist` as `earth-spirit`."

- term: "Weltplan"
  handle: "term:weltplan"
  kind: concept
  preferred: "world-plan"
  alternatives:
    - "cosmic plan"
    - "plan of the world"
  status: tentative
  evidence:
    - "evidence:term:weltplan:zm:17"
    - "evidence:term:weltplan:zm:37"
    - "evidence:term:weltplan:zm:110"
    - "evidence:term:weltplan:zm:128"
    - "evidence:term:weltplan:zm:146"
    - "evidence:term:weltplan:zm:175"
    - "evidence:term:weltplan:zm:180"
  notes: "Hyphenation keeps the German compound visible. §17 sharpens it by explicit contrast with `Menschenplan`; §37 reactivates it as the missing criterion of unity and direction in Spengler's morphology; §110 carries it into Part 4, where the state-plan leaps beyond the historical field into the world-plan, receives new alignment there, and draws on a hidden share of world-reason within every human plan. §128 extends that pressure into democracy itself: the world-plan is said to be more comprehensive than every social and state plan and to control planning from behind for reasons closed even to sharp insight. §146 sharpens it again in the register of research: the successful experiment counts as visible progress in `Weltplan`, and research gains legitimacy because it works inside a plan superior to the state plans. §175 extends it into the register of emptiness and search: a gap internal to the world-plan remains, one that no thinking and no `Staatsplan` can fill. §180 extends it into the register of nihilism and state-swelling: clearing-away belongs to `Weltplan` only transitively, and the intensification of the state is treated as a final exertion rather than a lasting final form."

- term: "Bruchstelle"
  handle: "term:bruchstelle"
  kind: concept
  preferred: null
  alternatives:
    - "fault line"
    - "fracture point"
    - "break point"
  status: open
  evidence:
    - "evidence:term:bruchstelle:zm:1"
    - "evidence:term:bruchstelle:zm:54"
    - "evidence:term:bruchstelle:zm:56"
    - "evidence:term:bruchstelle:zm:76"
  notes: "Jünger uses it both conceptually and imagistically. By §§54 and 56 the term clearly names not only weak boundaries or wound-edges where other powers press in, but also the suspicious point where discovery itself becomes a temporal symptom. §76 adds a further force: the epochal threshold from which a revelatory figure like Moses protrudes across millennia. The English choice may therefore need to remain context-sensitive across fracture, breach, fault-line, and threshold registers."

- term: "der Hinzutretende"
  handle: "term:hinzutretende"
  kind: concept
  preferred: "the one who comes in addition"
  alternatives:
    - "the one who steps alongside"
    - "the supplementary one"
  status: tentative
  evidence:
    - "evidence:term:hinzutretende:zm:6"
    - "evidence:term:hinzutretende:zm:7"
    - "evidence:term:hinzutretende:zm:9"
    - "evidence:term:hinzutretende:zm:36"
    - "evidence:term:hinzutretende:zm:174"
  notes: "By §§6-9 this is structural as interpreter, guarantor, and priestly figure who adds no new facts but confers assurance and meaning. §36 extends the figure into physiognomic history-reading, where the instinct of the one who comes in addition gains prophetic force. §174 returns the figure in a stronger later register: the man in the street resembles the Pythia, his judgments are deep but require interpretation, and the one who comes in addition is rejoined to faith, method, and relation to being rather than left inside astrology alone."

- term: "Da-Sein / So-Sein"
  handle: "term:da-sein-so-sein"
  kind: concept_pair
  preferred: "that-he-is / what-he-is"
  alternatives:
    - "being-there / being-so"
    - "existence / essence"
  status: tentative
  evidence:
    - "evidence:term:da-sein-so-sein:zm:4"
    - "evidence:term:da-sein-so-sein:zm:11"
    - "evidence:term:da-sein-so-sein:zm:31"
    - "evidence:term:da-sein-so-sein:zm:49"
    - "evidence:term:da-sein-so-sein:zm:100"
  notes: "Keep the pair visibly Germanic. §11 makes `So-Sein` load-bearing; §31 extends it into the contrast with `Gleichsein`, dignity, and resistance to uniform abstraction; §49 extends it further into the nomos and dignity of historical man; §100 gives it a new collective-political pressure, where equality no longer stops at legal form but presses into inner `So-Sein`, producing homogeneous stocks. `Existence / essence` is too Latinate and collapses a distinction Jünger is deliberately not naming that way."
