# Working glossary for recurring terms.
# `preferred` can remain null while the term is still unstable.

- term: "An der Zeitmauer"
  handle: "term:an-der-zeitmauer"
  kind: title
  preferred: null
  alternatives:
    - "At the Time Wall"
    - "On the Time Wall"
    - "By the Time Wall"
  status: open
  evidence:
    - "evidence:term:an-der-zeitmauer:zm:48"
  notes: "Keep the German title at project level until the metaphor settles across later sections. §48 is the first explicit internal occurrence and makes the image spatial and dangerous at once: the future outlines itself beyond the time wall, and naming that zone is itself risky."

- term: "Fremde Vögel"
  handle: "term:fremde-voegel"
  kind: section_title
  preferred: "Strange Birds"
  alternatives:
    - "Foreign Birds"
  status: tentative
  notes: "The section treats migratory birds as omens or indicators, not merely exotic species."

- term: "Meßbare und Schicksalszeit"
  handle: "term:messbare-und-schicksalszeit"
  kind: section_title
  preferred: "Measurable Time and Fateful Time"
  alternatives:
    - "Measurable Time and Destinal Time"
    - "Measured Time and Time of Destiny"
  status: tentative
  notes: "Still workable after the full run of §§4-31. By §§9 and 13 the pair clearly names qualitative time against measurable time; by §§14-16 it also begins to organize planning, ceremony, catastrophe, and religion; by §§17-19 it presses into science, medicine, and epistemic modesty; by §§20-22 it extends into character, tragedy, recurrence, and fortune; by §§23-25 it bears directly on happiness-loss, omen-like decision, insurance, and the plan's fear of free musische speech; by §§26-28 it returns to astrology as revolutionary symptom and expands into changed optics, periodicity, flattened rhythms, sacrifice, and catastrophe; by §§29-31 it closes on singular destiny, `So-Sein` versus uniformity, mass fate, and the first stirring of a counterpower to Leviathan without requiring the inflated `destinal`."

- term: "Humane Einteilungen"
  handle: "term:humane-einteilungen"
  kind: section_title
  preferred: "Human Divisions"
  alternatives:
    - "Human Classifications"
    - "Human Orderings"
  status: tentative
  notes: "Working after §§32-55. `Humane` here means human rather than ethically `humane`; the part opens with divisions of world-time, history, and natural order, then moves into Spengler, morphology, world-plan, and the limits of pure historical judgment, sharpens the difference between historical time and `Schicksalszeit`, widens into earth-history, prehistory, and the dawning of historical consciousness, reaches the preservation and injury of historical man, turns toward mythic return, naming-crisis, sacrifice, and the waning of the hero, and now clarifies false recurrence, blood-toll, and qualitative summation rather than gentleness or moral cultivation."

- term: "Schicksalszeit"
  handle: "term:schicksalszeit"
  kind: concept
  preferred: "fateful time"
  alternatives:
    - "destinal time"
    - "time of destiny"
  status: tentative
  evidence:
    - "evidence:term:schicksalszeit:zm:4"
    - "evidence:term:schicksalszeit:zm:9"
    - "evidence:term:schicksalszeit:zm:13"
    - "evidence:term:schicksalszeit:zm:20"
    - "evidence:term:schicksalszeit:zm:38"
    - "evidence:term:schicksalszeit:zm:43"
  notes: "Sections 4-43 support `fateful time`: the neighboring compounds stay concrete (`Schicksalsweisung`, `Schicksalsdeutung`, `Schicksalsqualitäten`, `Schicksalsuhr`) while retaining metaphysical weight; §20 confirms the choice when tragedy is said to `weave` `Schicksalszeit`, §38 carries it into Part 3 as a methodological relation between measurable astronomical time and the fate-time to be interpreted, and §43 sharpens it further by distinguishing two formations that are historically similar yet fundamentally different in `Schicksalszeit`."

- term: "mantisch"
  handle: "term:mantisch"
  kind: concept
  preferred: "mantic"
  alternatives:
    - "divinatory"
  status: tentative
  notes: "Sections 1, 4, 7, and 17 support the technical feel of `mantic`: the word sits beside augury, omens, oracle practices, geomancy, and later `divination` rather than generalized mysticism."

- term: "Urgrund"
  handle: "term:urgrund"
  kind: concept
  preferred: "primal ground"
  alternatives:
    - "ground of being"
    - "deep ground"
  status: open
  notes: "Needs wider context from the final section before fixing."

- term: "erdgeschichtlich"
  handle: "term:erdgeschichtlich"
  kind: concept
  preferred: "earth-historical"
  alternatives:
    - "geo-historical"
  status: tentative
  notes: "The term needs to remain visibly larger in scale than ordinary history."

- term: "Weltplan"
  handle: "term:weltplan"
  kind: concept
  preferred: "world-plan"
  alternatives:
    - "cosmic plan"
    - "plan of the world"
  status: tentative
  evidence:
    - "evidence:term:weltplan:zm:17"
    - "evidence:term:weltplan:zm:37"
  notes: "Hyphenation keeps the German compound visible. §17 sharpens it by explicit contrast with `Menschenplan`; §37 reactivates it as the missing criterion of unity and direction in Spengler's morphology."

- term: "Bruchstelle"
  handle: "term:bruchstelle"
  kind: concept
  preferred: null
  alternatives:
    - "fault line"
    - "fracture point"
    - "break point"
  status: open
  evidence:
    - "evidence:term:bruchstelle:zm:1"
    - "evidence:term:bruchstelle:zm:54"
  notes: "Jünger uses it both conceptually and imagistically. By §54 the term clearly names weak boundaries or wound-edges where other powers press in, so the English choice may need to remain context-sensitive across fracture, breach, and fault-line registers."

- term: "der Hinzutretende"
  handle: "term:hinzutretende"
  kind: concept
  preferred: "the one who comes in addition"
  alternatives:
    - "the one who steps alongside"
    - "the supplementary one"
  status: tentative
  evidence:
    - "evidence:term:hinzutretende:zm:6"
    - "evidence:term:hinzutretende:zm:7"
    - "evidence:term:hinzutretende:zm:9"
    - "evidence:term:hinzutretende:zm:36"
  notes: "By §§6-9 this is structural as interpreter, guarantor, and priestly figure who adds no new facts but confers assurance and meaning. §36 extends the figure into physiognomic history-reading, where the instinct of the one who comes in addition gains prophetic force."

- term: "Da-Sein / So-Sein"
  handle: "term:da-sein-so-sein"
  kind: concept_pair
  preferred: "that-he-is / what-he-is"
  alternatives:
    - "being-there / being-so"
    - "existence / essence"
  status: tentative
  evidence:
    - "evidence:term:da-sein-so-sein:zm:4"
    - "evidence:term:da-sein-so-sein:zm:11"
    - "evidence:term:da-sein-so-sein:zm:31"
    - "evidence:term:da-sein-so-sein:zm:49"
  notes: "Keep the pair visibly Germanic. §11 makes `So-Sein` load-bearing; §31 extends it into the contrast with `Gleichsein`, dignity, and resistance to uniform abstraction; §49 extends it further into the nomos and dignity of historical man. `Existence / essence` is too Latinate and collapses a distinction Jünger is deliberately not naming that way."
