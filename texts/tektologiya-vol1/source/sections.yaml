  group_title_ru: "Механизм формирующий"
  section_title_ru: "Кризисы"
  ru: |-
    Разрыв тектологической границы между двумя комплексами есть вообще начало их конъюгации, момент, с которого они перестают быть тем, чем они были, — тектологическими от-дельностями и образуют какую-то новую систему, с дальнейшими преобразованиями, возникновением связок, дезингрес-сий частичных или полных, словом, это организационный кризис данных комплексов. Образование тектологической границы, создавая из данной системы новые отдельности, также делает ее в организационном смысле не тем, чем она была; это также ее кризис, только другого типа. Все кризисы, наблюдаемые в жизни и природе, все «перевороты», «революции», «катастрофы» и проч. принадлежат к этим двум типам. Например, революции в обществе обычно представляют разрыв социальной границы между разными классами; кипение воды — разрыв физической границы между жидкостью и атмосферой; размножение живой клетки — образование жизненной границы между ее частями, приобретающими самостоятельность; смерть — разрыв жизненной связи организма и т. д.

    Ради краткости кризисы первого типа мы обозначим как «кризисы С», второго — как «кризисы Д».[109] На основании предыдущего очевидно, что из них первичными являются кризисы С: всякое разделение обусловливается предшествующими конъюгациями. Так, распадение клетки-матери на дочерние клетки есть результат ее роста, ее питания, т. е. конъюгационного включения в нее элементов из внешней среды; смерть — результат вступления в организм внешних активностей: быстрого и необычного — при насильственной смерти или острой инфекции, постепенного и последовательного — при смерти от старости или от болезней обмена веществ и т. п.

- id: "3.a.7"
  label: "§ 7."
  chapter_index: 3
  chapter_slug: "glava-3-osnovnye-organizatsionnye-mekhanizmy"
  chapter_title_ru: "Глава 3. Основные организационные механизмы"
  group_slug: "mekhanizm-formiruiushchii"
  group_label: "А."
  group_title_ru: "Механизм формирующий"
  section_title_ru: "Роль разностей в опыте"
  ru: |-
    Ощущение возникает лишь там, где есть разница напряжений энергии между чувствующим аппаратом и его средой. Объективно что-либо происходит лишь там, где существует разница напряжений энергии между смежными комплексами. Таким образом, разница напряжений есть необходимое условие всякого опыта физического, как и психического. Это точка зрения современного научного мышления, вытекающая из самого понятия энергии. Для современной науки «энергия» есть источник изменений и их количественная мера: активность, воспринимаемая чувственно или принимаемая мысленно, как причина изменения. Что касается ее «напряжения» (температура, потенциал, уровень тяжести и т. п.), то это относительная величина изменений, возможных в зависимости от данного комплекса энергии; например, чем выше температура тела, тем относительно интенсивнее его нагревающее действие на окружающие тела; чем выше уровень воды в бассейне, тем относительно сильнее гидравлическое действие и проч. Понятно, что там, где противостоят одна другой активности, для которых одинакова относительная мера возможных действий, т. е. которые с одинаковой интенсивностью способны производить их, там не получается никакого действия; и только при различии этой интенсивности оно может произойти.

    Легко уловить жизненно-практическое происхождение этой схемы. Понятие «энергия» возникло из идеализированного, обобщенного на всю природу, очищенного от антропоморфизма представления о работе; понятие об ее напряжении находится в такой же связи с представлением об усилии. Там, где противостоят равные усилия, никакого изменения ими не вызывается. То же и при равных напряжениях энергии.

    Но это, очевидно, не что иное, как тектологическая схема «дезингрессии». И та разность напряжений, без которой ничто не может происходить, означает, следовательно, неполную дезингрессию.

    Пусть имеются два смежных комплекса А и В каких угодно. Один из них может быть и живым организмом, с воспринимающими чувственными аппаратами; другой тогда будет из числа комплексов его «среды». Пусть между ними ничего не происходит. Это значит, что они разделены действительной границей, т. е. между ними существует поверхность, или область полной дезингрессии, равенства напряжений энергии, равенства взаимно противостоящих активностей.

    Но вот равенство напряжений нарушается. Это значит, что полной дезингрессии, т. е. действительной границы между ком-плесами А и В, в соответственных пунктах уже нет. Происходит перемещение активностей в направлении от большего напряжения к меньшему, допустим из комплекса А в В. При этом происходят, очевидно, конъюгационные процессы между этими перемещающимися активностями и активностями В, наподобие того, как если бы открыли кран между двумя сосудами и жидкость из того, в котором уровень давления выше, хлынула бы в другой, смешиваясь с его жидкостью или вообще вступая с ней в то или иное непосредственное взаимодействие.

    Результаты конъюгационных процессов могут быть различные — и положительные (новые ингрессии), и отрицательные (новые дезингрессии). Иногда бывает так, что, распространяясь в комплексе В, активности А уравновешиваются дальнейшими сопротивлениями, которые в нем встречают, устанавливается новая область полных дезингрессии — новая действительная граница обоих комплексов. Например, армия значительным усилием прорывает линию обороны неприятельского войска, принуждает его отступить, но на некотором расстоянии, истощенная усилием и ослабленная удлинением коммуникационных путей, оказывается в условиях относительного равенства сил с ним и останавливается перед новой линией его обороны. Повысившееся давление воздуха позволяет ему проникнуть в трубку барометра дальше прежней границы; но давление отступившей в длинное колено ртути возрастает и уравновешивает избыток атмосферного давления, так что устанавливается новый пограничный уровень и т. п. В других случаях процесс идет дальше, и граница обоих комплексов совершенно исчезает, как это бывает при химическом соединении двух тел, при биологической копуляции двух клеток и проч.[110]

    В зависимости от новых ингрессии и дезингрессии происходят изменения структуры находящихся во взаимодействии комплексов: частичные или коренные, в виде деформаций или кризисов, развития, деградации, разрушения.

    Вернемся к тому случаю, когда один из двух смежных комплексов — живой организм, например человеческий. Тогда нарушение равенства напряжений обозначается как «раздражение».

    В очень многих случаях возникающее перемещение актив-ностей быстро находит новую границу на самой периферии организма, уравновешиваясь его местными сопротивлениями, так что процесс не распространяется до нервных центров; это раздражения «неощутимые», не порождающие «впечатлений», не входящие в сферу прямого опыта. В других случаях разность напряжений не может быть нейтрализована на месте и по нервным путям передается центральной системе. Там она обусловливает ряд изменений, перемещений энергии, которые либо затрагивают лишь ограниченную группу клеток какого-нибудь «низшего» центра, либо разливаются шире и захватывают область коры головного мозга; в первом случае не получается «сознательного» опыта, но есть опыт «подсознательный», скрытый; во втором — выступает «акт сознания». И здесь и там возможно, что разность напряжений окончательно нейтрализуется в самих нервных центрах; тогда внешней реакции со стороны организма на полученное впечатление не возникает. Но часто волна разности напряжений не исчерпывается внутри центрального аппарата, а расходится по центробежным путям дальше, в виде иннервации, к двигательным или секреторным органам. Тогда происходит внешняя реакция: «рефлекторная» или «инстинктивная», если ее исходный пункт — низшие центры, и «сознательная», когда в ней участвуют и высшие. Весь процесс вполне завершается, если в результате внешней реакции, или «действия», устраняются условия первичного раздражения, например если рука отдергивается от горячего предмета, к которому прикоснулась.

    В нервных центрах бывают, кроме того, «самопроизвольные» раздражения, не вызванные непосредственным действием извне на органы чувств и не переданные по центростремительным волокнам; психически они выражаются в «представлениях», например в образах воспоминания. Тут центральные разности напряжений являются следствием частью структурных перегруппировок, постепенно развивающихся из прежних внешних раздражений, частью следствием накопления энергии нервных клеток процессами питания, ассимиляцией, из внутренней среды организма. Но и эта ассимиляция сама имеет предпосылкой разность напряжений между нервными клетками и внутренней средой организма, т. е. кровью, лимфой.

    Таким образом, весь мир человеческого опыта, взятого и как система сознания, и как система действия, в каждом звене своей бесконечно развертывающейся цепи обусловлен какой-либо разностью напряжений, какой-либо неполной дезингрессией.

- id: "3.a.8"
  label: "§ 8."
  chapter_index: 3
  chapter_slug: "glava-3-osnovnye-organizatsionnye-mekhanizmy"
  chapter_title_ru: "Глава 3. Основные организационные механизмы"
  group_slug: "mekhanizm-formiruiushchii"
  group_label: "А."
  group_title_ru: "Механизм формирующий"
  section_title_ru: "Познавательные значения ингрессии"
  ru: |-
    Так как без обобщения нет познания, а мы видим, что обобщение основано всегда на ингрессии (обусловленной конъюгацией), то следует признать, что ингрессия дает необходимый базис всякого познания — истинного или ложного, хотя, как будет показано в дальнейшем исследовании, она и не исчерпывает организационных приемов познания. Некоторые из познавательных ее применений позволят нам выяснить ее особенности, оставшиеся пока в тени.

    Известно, каким образом филологи устанавливают генетическую связь слов. В исследовании корней первая задача заключается в том, чтобы получить ингрессивные цепи взаимно родственных слов, восходящие к общему началу; и это начало, и некоторые недостающие звенья цепей могут пополняться гипотетически, но в строгом соответствии с выясненными раньше законами превращения слов и звуков. Надо, конечно, с достоверностью определить достаточное число промежуточных звеньев, чтобы свести, например, слова «земля» и «жена» к общему корню «gen», означающему «рождать» (откуда и греческое — «генезис»), или чтобы объединить немецкое «Meer» — море и «Erde» — земля корнем «mard», выражающим разбивание, дробление, деление на части.

    Возьмем столь распространенные в наше время слова «аэроплан», «моноплан», «биплан» и проч. Какова связь этих слов? Большинство публики, по всей вероятности, полагает, что вторая часть этих слов — «план» — выражает родство их происхождения и значения. На самом деле вовсе не так. В слове «аэроплан» (буквально «блуждающий по воздуху») вторая часть генетически связана с греческим «n^avav» — блуждать; в остальных — с латинским «planum» — равнина, плоскость (моноплан буквально означает аппарат с одной плоскостью, биплан — с двумя плоскостями). Без исследования связь слов кажется близкой и тесной настолько же, насколько фактически родственно их значение; познавательная ингрессия соединяет их с другими и разрывает первоначальную, казалось, столь очевидную связь; «аэроплан» сближается, например, с астрономическим «планета», тогда как «моноплан» с перешедшим в русский язык словом «план», означающим сначала плоскость, потом чертеж на ней, затем вообще проект и проч.

    Аналогичным образом термины «такт» и «тактика», которые у нас часто прямо смешиваются, филология вынуждена ввести в разные ингрессивные цепи: «такт» по точному смыслу — осязание, ощупывание, от латинского «tango» — касаюсь; «тактика» — строительное или организационное дело, от греческого «титтсо» — строю (например, дом или войско — в боевой порядок; отсюда же происходит «техсоу» — архитектор, а равно и «тектология»).

    Таких примеров можно было бы найти гораздо больше. Они показывают, что ингрессия не только есть метод соединения, но может быть и методом разъединения, следовательно, также и дезорганизации.[111] Наша иллюстрация представляет один из простейших случаев критики. Но она типически рисует основной метод всякой «разрушительной» или «опровергающей», т. е. дезорганизующей познавательные комплексы, критики.

    Предположим, что вы встречаете крестьянина, который по древней устной традиции продолжает думать, что кит — рыба, ингрессивно связывая представление о ките определенной, прочной ассоциацией с представлениями об окуне, щуке, карасе и проч. Вы считаете нужным «опровергнуть» заблуждение и повторяете то, что в свое время сделала эмпирически-научная критика. Вы указываете, что кит имеет млечные железы, легкие, теплую кровь и проч., как собаки, коровы, люди и другие млекопитающие; у окуня же, щуки и других рыб бывают жабры, холодная кровь, нет млечных желез и т. д. Другими словами, вы создаете ассоциативную связь между образом кита и образами собаки, кошки, лошади, т. е. ингрессивно объединяете его с иным, чем прежде, рядом представлений; в то же время разъединяете оба ассоциативных ряда, вызываете их расхождение в психике. При этом расхождении образ кита, теснее связанный с новым рядом, отрывается от старого, и цель критики достигнута.

    Подобные же элементарные процессы мы найдем в основе всякой полемической, опровергающей критики, всякого «возражения» в беседе и проч.[112] Схематически они сводятся к тому, что некоторый комплекс, входящий в одну ингрессивную систему, связывается с другой и их расхождением отделяется от первой.

    Но в этом общем виде схема приложима отнюдь не к одним идеологическим явлениям, а к огромной массе также и практических в области техники и социальной организации и, наконец, к бесчисленным стихийным процессам жизни и природы.

    Вы хотите сорвать растение, ингрессивно связанное с почвой своими корнями: вы охватываете его рукой, создавая новое ингрессивное соединение, затем приводите руку в движение, которое удаляет ее от почвы; растение отрывается, оставаясь в ваших руках. Дантист, вырывающий больной зуб, действует аналогично, только новая ингрессивная цепь сложнее: рука — орудие — больной зуб. И когда каменщик ударом молота отбивает кусок гранита, метод остается тот же, потому что в момент удара молот и отбиваемый кусок образуют одну ингрессивно-механическую систему. Отделение золота от горной породы соединением его со ртутью соответствует в точности той же схеме и т. д.

    Аналогичным образом отрывается человек от одной организации — семьи, хозяйства, секты, партии, вступая в другую, с ней расходящуюся в том или ином практическом отношении (пространственно или по интересам, стремлениям, миропониманию и проч.).

    В мертвой природе схема новой ингрессии как условия для разрыва прежней применима не менее широко: и к водному течению, извлекающему камни из их ложа и уносящему их с собой; и к ветру, обрывающему листья деревьев или лепестки цветов; и к притяжению планеты, выделяющему ближайшие к ней тельца из роя метеоритов, и т. д.

    В этом ряде иллюстраций мы взяли за начало одну из познавательных, филологических связей и получили из нее путем отвлечения схему, применимую на всех ступенях бытия. Действуя так, мы имели в виду, между прочим, наглядно показать, насколько свободен тектологический анализ в выборе своего исходного пункта. Очевидно, что этим пунктом мог бы послужить любой из затронутых нами сейчас примеров или им подобных в какой угодно области опыта.

    В математических операциях ингрессией пользуются на каждом шагу. Известная аксиома о равенстве двух величин, порознь равных третьей, есть, как мы говорили, просто элементарная формулировка ингрессивной связи по отношению к величинам: третья величина есть посредствующее звено цепной связи между двумя первыми. В различных доказательствах теорем, решениях задач и проч. введение промежуточных звеньев — не только в смысле равенства, конечно, а в смысле вообще функциональной связи — практикуется постоянно: в геометрических построениях — вспомогательные линии, в интегрировании — вспомогательные новые переменные и т. п.

    Математическое равенство величины двух комплексов, например двух тел, не есть — надо заметить это — непосредственная связь между самими комплексами; оно есть связь их познавательных характеристик, связь понятий о них. Мы можем сказать, что число жителей такого-то города равно числу километров расстояния от Земли до Луны; это значит, что как ни разнородны взятые комплексы: один — социальный, другой — чисто пространственный, но если мы известными, строго определенными методами составляем понятия о них, то в обоих понятиях окажется нечто общее — в данном случае одно и то жр численное выражение. Одна познавательная характеристика будет 385 000 жителей, другая — 385 000 километров; общая часть — численная схема 385 000. Предположим, что оба комплекса — социальный и астрономически-пространственный — изменяются: в город приезжают новые люди; Луна благодаря пертурбационному влиянию планет отдаляется от Земли. Изменения, как видим, также совершенно разнородны и в их конкретности несравнимы; однако и после них число жителей города может оставаться равным числу километров расстояния, например если то и другое возросло на 100 своих счетных единиц. Это случай, выражаемый аксиомой, что если две равные величины подвергнуть одинаковым изменениям, например прибавить к ним поровну, то равенство не исчезнет. Как ни мало общего между сотней туристов и сотней километров пустого эфира, но численная часть познавательных характеристик благодаря тем и другим изменилась для обоих комплексов одинаково и по-прежнему может совпадать: ингрессия не разрушается. То же относится ко всякой ингрессии: то, что служит связкой двух комплексов, остается связкой между ними, если для обоих изменяется одинаково; например, винт и гайка продолжают подходить одно к другому, если их нарезку сделать в одинаковой мере шире или глубже; два куска материи одного цвета не потеряют цветовой общности, если одинаково слиняют, и т. п.

    Всякая познавательная характеристика бывает лишь частична и приблизительна, ибо всякий реальный комплекс, к которому она относится, бесконечно сложен для познания своей конкретности. Частичны и приблизительны всегда поэтому и математические выражения величин комплексов. Если бы они были абсолютно точны, то никогда не получилось бы самой идеи количественного равенства. Мы принимаем расстояние между центрами Земли и Луны в 385 000 км; оно обозначается шестью цифрами. При этом фактически не только доли километра, но и целые километры и десятки километров в счет не идут: они «в пределах возможных ошибок вычисления». Если бы расстояние было определено с точностью до микронов, оно обозначалось бы пятнадцатью цифрами; при абсолютной точности потребовалось бы бесконечное число цифр. Число жителей города может, по-видимому, быть установлено вполне точно; однако это лишь потому, что мы произвольно принимаем за одинаковые единицы для нашего счета комплексы, заведомо не только разнородные, но даже несоизмеримые: личность взрослого человека, безличное существо новорожденного младенца, разложившуюся личность впавшего в детство старика, гениального мыслителя, идиота, атлета, карлика и т. д. Измерение и счет порождены практически-организационными задачами и не имели бы смысла, если бы не были только приблизительными: каждая величина развертывалась бы в бесконечное выражение и оставалась бы индивидуальной, а потому не могла бы служить орудием установления связей — познавательных или практических. Степень приблизительности или точности количественных определений всегда и зависит от конкретных задач, для которых они предпринимаются.

    Так, экономисту, имеющему в виду выяснить размеры производительных сил страны, достаточно знать число жителей большого города в круглых тысячах, пренебрегая даже сотнями; для воинского присутствия, имеющего в виду производить ежегодный набор солдат, требуется учитывать каждую человеческую единицу. Расстояние от Земли до Луны для большинства задач, которые приходится разрешать астрономии, достаточно знать до каких-нибудь сотен километров; но для вопроса, например, об истории взаимоотношений между нашей планетой и ее спутником желательна несравненно большая точность, которая даже еще не достигнута.

    Разумеется, и во взятом нами примере равенство чисел — результат их приблизительности: мы ограничились тысячами, пренебрегая уже сотнями; две математические характеристики имеют связку «385 тысяч», и только. Предположим, что оба комплекса подверглись изменяющим воздействиям: в город прислали несколько новых чиновников, скажем, с их семьями — 50 человек; Луна под влиянием относительной близости какой-нибудь планеты отдалилась от Земли на 100 км. К прежним равным счетным величинам прибавлены неравные. Но мы считаем тысячами, и наша «связка» (или равенство) двух величин образована из тысяч. Очевидно, хотя оба комплекса объективно изменены, и притом математически различно, но на эту связку численно-познавательного характера изменение не простирается: «равенство» остается. Это случай, выражаемый важнейшим положением анализа бесконечно малых: если к двум равным величинам прибавить неравные, но бесконечно малые по отношению к ним, то равенство не нарушится. Бесконечно малые — это те изменения, которые, будучи взяты в отдельности, не могут повлиять на численное выражение в пределах практически принятой нами или практически доступной нам точности. Но это действительные изменения, и вполне понятно, что простым их накоплением получаются изменения «конечные», способные нарушить равенство.

    Другими словами, эта математическая схема является частным случаем чрезвычайно простой и очевидной схемы, относящейся к ингрессии вообще: если два ингрессивно-связан-ных комплекса подвергаются изменяющим воздействиям, недостаточным для того, чтобы в практически уловимой мере изменить их связку, то ингрессия остается в прежнем виде; но, прибавляясь одни к другим, такие воздействия при достаточном их накоплении способны преобразовать или разрушить связку, а с ней и всю данную систему.

    Исчезает также кажущееся противоречие между аксиомой элементарной математики о нарушении равенства прибавлением неравных величин и указанным положением анализа о сохранении равенства в определенном случае прибавления неравных. То и другое вытекает из основных условий ингрес-сивной связи: если в двух комплексах те их части, совпадением которых образуется ингрессия, изменяются неодинаково, то связь преобразуется или нарушается; если воздействия, хотя и неодинаковые для обоих комплексов, недостаточны, чтобы изменить связку, то ингрессия остается в прежнем виде.

    На численных равенствах мы видим, что возможна познавательная ингрессия понятий и там, где между реальными комплексами такой связи нет, где даже установить ее немыслимо: два комплекса бывают в каком-либо отношении «равны», несмотря на полную отдельность существования, а иногда и на полную качественную разнородность. Это общая черта познания: мы, например, знаем, что перчатка «подходит» к руке или гайка к винту, хотя перчатка не надета в данный момент на руку, а гайка на винт; мы принимаем, что звезда Антарес «такого же цвета», как догорающие угли в камине, хотя расстояние и различия этих объектов превосходят всякое воображение. Дело в том, что познание по существу своему есть всеорганизующая функция.

- id: "3.a.9"
  label: "§ 9."
  chapter_index: 3
  chapter_slug: "glava-3-osnovnye-organizatsionnye-mekhanizmy"
  chapter_title_ru: "Глава 3. Основные организационные механизмы"
  group_slug: "mekhanizm-formiruiushchii"
  group_label: "А."
  group_title_ru: "Механизм формирующий"
  section_title_ru: "Социальная и мировая ингрессия"
  ru: |-
    Единство социальной организации слагается из бесчисленных и разнообразных связей между членами общества; среди этих связей основными и преобладающими являются отношения ингрессии. Исследуем в общей форме их содержание и происхождение.

    В нашем обычном представлении о социальной связи людей ее первую предпосылку составляет их взаимное понимание. Без него общество немыслимо; и степень этого понимания мы привыкли — сознательно или бессознательно — делать мерой самой социальной связи. Мы знаем, что между членами общества существуют разные отношения родства, дружбы, общих интересов и проч.; но за подобными связями мы признаем лишь частный, а не общесоциальный характер. Например, наблюдая двух людей, заведомо для нас тесно объединенных какими-либо интересами, мы иногда можем прийти к выводу, что «это люди не одного общества». Этим мы хотим сказать, что они не созданы для полного взаимного понимания. Допустим, один из них аристократ, а другой — финансист; они оказывают друг другу помощь и поддержку в разных делах, может быть, даже питают взаимную дружбу и симпатию; но они «не одного общества»; а между тем этот финансист и другой, его ожесточенный конкурент и враг, — люди «одного общества», потому что в самом деле, способны полнее и точнее понять друг друга.

    В чем же сущность этого взаимного понимания? В общем языке и той сумме понятий, которая им выражается, в том, что называют общей «культурой», или, точнее, идеологией. Так, если вернуться к тому же примеру, относительная социальная разнородность аристократа и банкира заключается в совокупности несходных идеологических элементов, привитых им воспитанием и жизнью в их обычной среде: различны их понятия, резюмирующие для каждого опыт того «общества», или, точнее, социального слоя, к которому он принадлежит; и хотя они говорят на одном языке, но неодинакова и их речь, по крайней мере многие оттенки, понятные и привычные одному, недоступны другому, и наоборот. Современное общество состоит из классов и социальных групп, во многом резко враждебных друг другу; но поскольку они говорят одним языком, поскольку у них есть общие для всех них понятия, постольку это классы и группы одного общества.

    Итак, с той обыденной точки зрения, которую мы сейчас изложили, связкой в социальной ингрессии служит общность идеологических элементов. Но остановиться на этой точке зрения, ограничиться ею для нас невозможно: она привела бы нас к совершенно ложному представлению о генезисе социальной системы. Мы не можем допустить, чтобы общество произошло вследствие образования у отдельных личностей общих идеологических элементов, потому что сама идеология не могла возникнуть иначе, как в обществе, т. е. на почве социальной связи, очевидно, иной, чем она, и более глубокой.

    Основная и первичная форма идеологии — это речь; все другие производны от нее, ибо они сводятся к мышлению или имеют его своей предпосылкой; а для современной науки «мышление есть речь минус звук». Поэтому начало идеологии лежит в происхождении речи; его же согласно гениальной теории Людвига Нуаре следует искать в сфере коллективного труда людей.

    Совместная борьба за жизнь сплотила людей в стадные родовые группы раньше, чем их единение приобрело идеологические формы. Зародышем этих форм явились трудовые крики — непроизвольные звуки, сопровождающие трудовое усилие, результат неизбежной иррадиации нервного возбуждения в центрах мозга. Такие крики служили естественным и для всех членов общины понятным выражением или обозначением тех трудовых актов, с которыми были непосредственно связаны, составляя их физиологически-нераздельную часть.

    Их понятность для всей группы вытекала из коллективного характера самого труда: работая вместе с другими, каждый прямо и воспринимал связь звуков с действиями. Эти крики были «первичными корнями», началом речи, а затем и мышления, и всей идеологии{21}. Ингрессия общих идеологических элементов развилась, как видим, из ингрессии труда: общих усилий, направленных к общей цели. Трудовая ингрессия и представляет действительную основу социальной связи, как бы ни была она усложнена и замаскирована дальнейшей эволюцией общества. Сущность дела не изменилась и теперь; взаимное понимание или общность идеологических элементов есть не что иное, как постоянная возможность координации усилий различных людей для общих целей. В координации усилий лежат объективный жизненный смысл и назначение всей и всякой идеологии; но он не сознается благодаря тому, что сотрудничество для общества в целом не организовано планомерно и переплелось с внутрисоциальной борьбой: конкуренцией рынка, антагонизмом классов.

    Трудовая ингрессия, все равно, сознаваемая или не сознаваемая, в свою очередь предполагает общность среды, против которой направлены усилия людей: труд организационно един, поскольку он направлен против одной и той же совокупности враждебных сил и сопротивлений. Без этого условия не могло бы возникнуть также идеологической связи: только вследствие общности поля зрения каждый член первобытной общины воспринимал определенные трудовые крики как неразрывно соединенные у всех сообщинников с определенными действиями.

    Единство поля зрения представляет, конечно, наиболее элементарное и только частичное выражение общности среды; реально средой коллективного труда является все то, что называют «внешней природой»: вся сумма активностей, которые он встречает, которые так или иначе ему доступны, которые преобразуются усилием человека или «воспринимаются» сопротивлением его органов.

    Но следует ли считать «общую среду» ингрессивной связкой между людьми? Поскольку дело идет о социальной организации людей, постольку среда есть именно то, что этой организации противопоставляется, что лежит вне ее, что, следовательно, связкой социальной ингрессии быть не может; и слово «общая» тут не должно вводить в недоразумение.

    Однако универсальная тенденция труда в техническом процессе заключается в том, что вокруг организации людей и в соответствии с ее потребностями он создает организацию вещей — организует природу для человека. Вырабатываются организационные связи между людьми и комплексами среды, с одной стороны, и между различными комплексами среды — с другой, например отношение между человеком и орудием, отношение между разными частями сложного орудия, как машина. Во всякой организации вещей ингрессия — также основная, первичная форма связи.

    Область практической организации вещей всегда ограничена, но возрастает с расширением и развитием техники. Производной от нее является познавательная организация, но не самих вещей, а их символов — понятий. Она служит орудием организации практической, а в то же время не сталкивается непосредственно со всеми дезорганизующими активностями, со всеми сопротивлениями, с какими имеет дело эта последняя. Символы, организуемые познанием, или понятия, сами принадлежат к социальной природе как идеологические элементы. Поэтому, оперируя с ними, познание может развивать свою организационную функцию несравненно шире, чем это технически удается труду с реальными вещами; и мы уже видели, что многое, не организованное практически, может быть организовано познавательно, т. е. в символах: где нет ингрессии вещей, возможна ингрессия понятий о них. Здесь ингрессия становится универсальной, всеобъемлющей.

    Мировая ингрессия в современной науке выражается как принцип непрерывности. Он определяется различно; тектологическая же его формулировка проста и очевидна:

    Между всякими двумя комплексами вселенной, при достаточном исследовании устанавливаются промежуточные звенья, вводящие их в одну цепь ингрессии.

    Другие формулировки могут быть сведены к этой. Например, определение А. Пуанкаре таково: непрерывность — это ряд, в котором между двумя уже различными звеньями всегда имеется третье, неотличимое ни от того, ни от другого (или математически: А=В, В=С, О А). Ясно, что это схема ингрессии, причем неотличимое промежуточное звено есть связка, сливающаяся с обоими крайними и соединяющая их.

    Применения универсальной ингрессии бесчисленны. Принцип непрерывности господствует во всей пространственной и временной группировке элементов мирового процесса. Тот же самый принцип овладел и причинной связью в ее современном понимании — энергетическом, соединяющем в непрерывный ряд все активности вселенной. В биологии он породил эво-люционно-генетические теории, как и в космологии, и в социальных науках. Все познание продолжает проникаться им полнее и глубже.

    Конъюгация, ингрессия, связка, дезингрессия, граница, кризисы С и кризисы D — все это основные понятия для формирующего тектологического механизма; они послужат нам для исследования различнейших случаев образования организационных форм, комплексов, систем. Но затем выступает вопрос о судьбах возникающих формирований — об их сохранении, закреплении, распространении или их упадке, гибели. Это вопрос о регулирующем тектологическом механизме.

- id: "3.b.1"
  label: "§ 1."
  chapter_index: 3
  chapter_slug: "glava-3-osnovnye-organizatsionnye-mekhanizmy"
  chapter_title_ru: "Глава 3. Основные организационные механизмы"
  group_slug: "mekhanizm-reguliruiushchii"
  group_label: "В."
  group_title_ru: "Механизм регулирующий"
  section_title_ru: "Консервативный подбор"
  ru: |-
    Все что возникает, имеет свою судьбу. Ее первое, простейшее выражение сводится к дилемме: сохранение или уничтожение. То и другое совершается закономерно, так что нередко удается даже предвидеть судьбу форм. Закономерное сохранение или уничтожение — это есть первая схема универсального регулирующего механизма. Обозначать его всего лучше тем именем, которое он давно получил в биологии, — «отбор» или «подбор». Определение же «естественный» мы отбросим, так как для тектологии различие «естественных» и «искусственных» процессов не является принципиальным.

    Понятие подбора, проложившее себе дорогу раньше всего в биологии, тем не менее, как мы сказали, универсально: организационная наука должна применять его ко всем и всяким комплексам, их системам, связям, границам. Чтобы проиллюстрировать эту всеобщность, возьмем ряд примеров самого разнородного характера.

    В стране происходит изменение климата: он становится холоднее. Из животных и растений, там обитающих, одни в состоянии перенести эту перемену обстановки и выживают, другие погибают. В результате — организация жизни на данной территории регулирована новыми условиями.

    Вместо перемены климата подставим вселение человека, раньше там не жившего. Он истребляет одни организмы, отнимает средства питания у других, поддерживает третьих непосредственно, четвертым помогает косвенно, уничтожая их врагов, и т. д. Тектологический случай, вполне однородный с предыдущим: организация жизни регулируется сообразно обстановке. Воздействие человека, планомерное или бессознательное, — для каждой жизненной формы такая же внешняя активность, полезная, или вредная, или разрушительная, как изменение температуры или влажности.

    Город подвергается пожару. Погибают по преимуществу здания деревянные, сохраняются каменные. Тот же город оказывается в области землетрясения: многоэтажные и кирпичные постройки рассыпаются, одноэтажные и деревянные выдерживают.

    В рукав платья идущего человека засунут ячменный колос остями вниз. Колос получает толчки по всевозможным направлениям; но все перемещения книзу уничтожаются сопротивлением остей, а кверху — происходят свободно: колос поднимается по рукаву.

    Здесь подбору подвергается ряд комплексов-событий, следующих друг за другом во времени, тогда как в предыдущих примерах дело шло о комплексах-телах, существующих одновременно. Тектологической схемы это нисколько не меняет.

    Если встряхивать в стороны коробку, в которой лежат, положим, неправильные куски колотого сахара, то куски эти постепенно укладываются так, чтобы центр тяжести всей массы занимал наиболее низкое положение, какое возможно. При разнообразных толчках те движения кусков, которые повышают центр тяжести, уничтожаются в большей мере, чем те, которые понижают, потому что первые встречают сопротивление не только со стороны столь же частых случайных толчков противоположного направления, но и со стороны постоянно действующего земного тяготения — веса кусков.

    Если человек попадает в тяжелую обстановку, то из числа новых переживаний преимущественно удерживаются и закрепляются в его психике, а из прежних преимущественно всплывают в его сознании те, которые имеют мрачный, тягостный характер, соответствующий новой обстановке; аналогично и в противоположном случае: подбор психических комплексов со стороны внешней среды.

    В обществе, в отдельном его классе, во всяком коллективе из числа вновь возникающих человеческих группировок, отношений, идей удерживаются и сохраняются те, которые соответствуют постоянным и общим условиям его жизни; распадаются и исчезают те, которые в противоречии с ними: подбор социальных комплексов.

    Сопоставляя эти различные иллюстрации, легко видеть, что тектологическая схема подбора отличается от «естественного подбора» биологов одним необходимым упрощением или сокращением. Биологический подбор предполагает размножение вместе с наследственностью; общеорганизационная схема включать этого не может, потому что размножение — специальная черта живых организмов. Тектология берет из частных наук исходные пункты для своих построений, но всегда при этом вынуждена изменять заимствованные понятия, приспособляя их к универсальности своих задач. Так это было и в предыдущем с понятием «конъюгация».

    Универсальность же схемы подбора такова, что она очевидным образом применима ко всякому комплексу и ко всякой его части во всякий момент, ибо это в сущности просто определенная точка зрения, с которой можно подходить к любому факту.

    Пусть мы имеем обыкновенный качающийся маятник. Он проходит через ряд различных положений в пространстве; но все эти положения, кроме вертикального, неустойчивы; оно одно устойчиво; после некоторого числа качаний маятник под совместным действием земного тяготения, сопротивления воздуха и трения в точке привеса окончательно устанавливается по вертикали. Для взгляда, непривычного к тектологи-ческой схематизации, совершенно незаметно, что и здесь перед нами случай подбора в том общем и элементарном смысле, какой мы сейчас приняли. Между тем налицо имеется и объект подбора — разные положения маятника, и внешние активности, по отношению к которым происходит подбор. Ни то обстоятельство, что из многих положений может удержаться только одно, ни то, что эти разные положения не существуют одновременно, ничего не изменяют в применимости формулы подбора — они только прибавляются к ней, что и неизбежно, ибо конкретность всегда сложнее абстракции. Если заменить данный объект и данные условия подбора безразличными знаками, то этот пример нельзя будет отличить от подбора каких угодно других комплексов, форм, отношений, вполне подобно тому, как в математике за численным знаком нельзя отличить, идет ли дело об одновременно существующих объектах или, напротив, о сменяющих друг друга во времени, взаимно исключающихся, — о десяти человеках или о десяти последовательных событиях. Здесь с каждым качанием отпадают, т. е. устраняются подбором, некоторые наименее устойчивые (именно крайние) положения маятника; в других случаях будут устраняться иные комплексы, связи, соотношения, пока не останется то, что «устойчиво», т. е. что относительно организованно и удерживается положительным подбором.

    Человек «живет», т. е. сохраняется в своей данной среде; следовательно, между ним и ею существует закономерное соответствие, достаточное для этого; он умирает — следовательно, такого соответствия уже нет; та или иная клетка его тела живет, пока приспособлена к своей среде, т. е. в первую очередь к самому организму в его целом, а через него — и к внешнему миру, и гибнет, когда это соотношение в достаточной мере нарушилось; и так же любой элемент клетки, любая из ее частичных связей и т. д.

    Человечество в своей практике постоянно, на каждом шагу, применяет ту же точку зрения реально, т. е. действует методом подбора. Даже в специально биологическом смысле люди полусознательно выполняли «искусственный подбор» домашних животных и культурных растений, вырабатывая наиболее подходящие для себя формы тех и других, и делали это еще за тысячелетия до того, как был открыт «естественный подбор»: еще одна иллюстрация неизбежного тождества организационных методов человека и природы. А в общеорганизационном смысле все производство, вся социальная борьба, вся работа мышления ведутся непрерывно и неуклонно путем подбора: систематическое поддержание комплексов, соответствующих жизненным целям людей, уничтожение противоречащих этим целям.

    Так, люди во всех странах истребляют хищников и иных «вредителей», разводят домашних животных и охраняют полезных диких животных; истребляют растения ядовитые и «сорные», т. е. бесполезные сами по себе, но конкурирующие с полезными; культивируют растения полезные, удовлетворяющие человеческим потребностям. То же и по отношению к природе неорганической: люди разрушают или устраняют одни комплексы, сохраняют другие; взрывают скалы, срывают иногда целые горы, осушают болота, озера, охраняют, где надо, от размывания берега, специально их укрепляя, и т. п. Добывая минералы и металлы, человек разрушает одни механические и химические связи горных пород, сохраняет другие, уже существовавшие или конъюгационно создаваемые его усилиями. Это относится и вообще к производству всякого продукта: оно необходимо заключает в себе момент подбора, который регулирует весь ход изменений материала на пути к окончательному результату; изменение, соответствующее задаче, сохраняется, не соответствующее устраняется новым воздействием.[113]

    В этом виде принцип подбора весьма еще далек от своей теоретической, т. е. обобщенной, формы. Переходным звеном служат те частные технические применения подбора, которые можно назвать «косвенным трудовым подбором»: обособление полезного от ненужного или вредного для сохранения одного и устранения другого в них выполняется не прямой активностью человека, а иными активностями и сопротивлениями. Один из самых простых примеров — механизм сита. Техническая задача состоит в том, чтобы из смеси, положим, муки с отрубями выделить полезную муку, с одной стороны, и бесполезные или менее полезные отруби — с другой. Частицы муки более мелки, чем отруби; те и другие обладают весом. Если они падают на сито, то частицы муки сохраняют свое движение, проходя через отверстия, движение же отрубей уничтожается сопротивлением сетки. В действительности все это несколько сложнее, но суть именно такова: механизм, в котором сохраняется движение одних комплексов, уничтожает движение других в зависимости от его сопротивлений.

    Промывка золотоносного песка струёй воды — пример вполне аналогичный; но на место сопротивлений сита надо поставить механическую активность текущей воды, на место величины частиц — их удельный вес: вода уносит частицы кварца, глины и другие, также сравнительно легкие; кусочки золота, более тяжелые, остаются; «подбираются» наибольшие сопротивления определенному виду энергии.

    Несколько более сложное применение того же метода представляет в технической химии фракционная перегонка, посредством которой разделяются разнородные части сложных смесей и растворов. Берется, например, сырая нефть, нагревается в перегонном аппарате, положим, до 60°; при этом выделяются и уходят в приемник наиболее легкие углеводороды, кипящие ниже этой температуры, т. е. отличающиеся наименьшим сопротивлением разрушительному действию теплоты на молекулярное сцепление; затем нагревают до 85° — улетучиваются более тяжелые углеводороды; затем до 110° и т. д.; этим способом получаются разные сорта бензина, керосина, вазелина и т. д. Механизм подобен тому, как если бы имелось несколько сит, одно под другим, с более крупными отверстиями вверху, со все более мелкими книзу, и через них пропускалась бы сложная сыпучая смесь: верхнее сито задержало бы самые крупные частицы, следующее — более мелкие и т. д.

    Пример из медицины: химическое действие хинина разрушает малярийных кокцидий, причем сохраняются нормальные элементы крови и других тканей; на такого рода подборе основано лечение большинства инфекционных болезней, лечение некоторых новообразований лучами радия и проч.

    Но не только область техники дает подобные иллюстрации без конца. Тот же метод господствует и в других сферах человеческой практики. Посредством разного рода подбора образуются всевозможные организации людей: экономические, политические, идейные. Например, капиталист организует рабочую силу для своего предприятия, приглашая желающих наняться и ставя им определенные условия: приглашение играет роль толчка, приводящего рабочих на рынке труда в желательное предпринимателю движение — к его предприятию; условия же найма играет роль сита, допускающего в предприятие подходящих капиталисту рабочих, задерживающего остальных. В профессиональных, политических, культурных организациях роль сита выполняют программа и устав. Конкурсные экзамены — типичный образец организационного подбора. В педагогике весь смысл деятельности воспитателя заключается в том, чтобы поддерживать и усиливать одни элементы психики ребенка, разрушать и устранять другие и т. п.

    Борьба классов и групп общества всегда направлена к уничтожению одних социальных форм и отношений, поддержанию и закреплению других сообразно интересам ведущего борьбу коллектива. И не меньшую роль играет подбор в процессе мышления, где две его стороны выражаются понятиями «утверждения» и «отрицания». Размышление, обдумывание, решение вопросов заключаются именно в том, что из множества комбинаций, вступающих в поле мышления, одни принимаются как «удачные» или «истинные», другие отвергаются как «ошибочные» и «ложные».

    Чем сложнее и труднее для людей задача, чем менее подготовлено предыдущим опытом ее планомерное решение, тем в большей мере среди методов его достижения выступает на первый план механизм подбора. Яркие иллюстрации дает вся история научных открытий и изобретений: долгие «поиски», заключающиеся в том, что конъюгационно образуется масса комбинаций, которые отвергаются и устраняются одна за другой, пока не получится одна, вполне соответствующая задаче.

    В знаменитом открытии «606» Эрлиха-Гата механизм подбора является и принципом решения, и методом искания. Первый состоял в том, чтобы найти деятель, в данном случае — химическое вещество, которые был бы гибелен для бледной спирохеты, сифилитического микроба, в значительно большей степени, чем для клеток человеческого организма. Тогда, вводя в кровь хорошо соразмерное количество этого яда, можно произвести подбор, при котором спирохеты погибнут, а клетки организма выживут и причина болезни будет уничтожена. П. Эрлих и С. Гата искали такое вещество, испытывая различные органические соединения мышьяка и отвергая одно за другим как не подходящие, пока шестьсот шестая попытка не дала удовлетворительного результата, а девятьсот четырнадцатая — в некоторых отношениях еще лучшего (теперь есть и еще высшие номера, более совершенные).

    Для тектологических исследований механизм подбора надо отчетливо представлять и в его целом, и в его частях. Он разлагается на три элемента:

    1) объект подбора — то, что ему подвергается как живые организмы в схеме Ч. Дарвина, здания и постройки в примере с землетрясением, перемещения предметов в примерах с колосом и коробкой сахара, связи и соотношения вещей в техническом трудовом подборе, связи и соотношения людей в подборе социальной борьбы и т. д.;

    2) деятель, или фактор подбора, — то, что действует на объект, сохраняя или разрушая его, как жизненная обстановка в схеме Ч. Дарвина, механические сопротивления ткани в примере с колосом, аналогичные сопротивления плюс земное тяготение в примере с коробкой, деятельность людей при производственном подборе и проч.;

    3) основа, или базис подбора, — та сторона объекта, от которой зависит его сохранение или устранение, т. е. полезные приспособления или черты неприспособленности в «естественном» подборе, направление перемещений в примерах с колосом и коробкой, соответствие потребности человека при техническом подборе, соответствие структуре общества в социальном подборе и т. д.

    Теоретическая схема подбора представляет одну интересную особенность: с ее точки зрения и человечество может рассматриваться как объект подбора, деятелем которого является «среда», внешняя природа; т. е. тут формула теоретическая перевертывает первоначальный практический принцип подбора, для которого деятель — активность человека, а объект — разные комплексы среды.

    Теоретический принцип подбора применяется уже теперь в целом ряде различных теорий — научных и философских. Благодаря специализации наук он выступает в разных видах и с неодинаковой отчетливостью, потому что и исходные пункты его открытия и приложения были очень разнообразны.

    Раньше всего принцип этот был сформулирован, по-видимому, Эмпедоклом как философская схема для объяснения целесообразности в природе. По мнению Эмпедокла, творчество природы вполне стихийно и сводится к слепой борьбе двух сил — притяжения и отталкиванья («любви» и «раздора»). В их бесконечно изменяющихся соотношениях возникают бесчисленные, самые разнообразные комбинации элементов вселенной. Но все те из них, которые устроены нецелесообразно, естественным образом разрушаются, исчезают; остаются только те, по существу столь же случайные формы, которые оказались устроенными целесообразно.

    Об Эмпедокле вообще известно так мало, что трудно сказать, откуда взял он свою концепцию подбора — такую общую и неопределенную. Можно только догадываться об этом, основываясь на характере сил, организующих, по его доктрине, вселенную: «любовь «и «раздор» — это перенесенные на всю природу отношения социальной связи и социального антагонизма. Очень вероятно, что картины борьбы разных коллективов, и в частности греческих колоний с варварскими общинами, борьбы военной и экономической, где гибель неприспособленных наступала очень быстро, подсказали наблюдателю Эмпедоклу его идею (он жил в колониях Сицилии).

    Иной вид получил принцип подбора, когда в социальной науке впервые применил его — правда, без ясной формулировки — Роберт Мальтус. Мысль о гибели неприспособленных в конкуренции, происходящей на основе общей недостаточности жизненных средств, является центральной-для его теории. Если принять во внимание, что учение Мальтуса было апологией капитализма, то станет ясно, что для него исходным пунктом схемы была борьба, господствующая на капиталистическом рынке.

    У Ч. Дарвина, преобразовавшего биологию при помощи идеи подбора, она выступает уже в двух видах: естественный и половой подбор, причем основным и научно-важнейшим представляется, конечно, первый. Корни понятия об естественном подборе лежали, с одной стороны, в экономической практике капитализма — Ч. Дарвин находился под влиянием доктрины Мальтуса, а с другой стороны, в технической практике разведения домашних животных и полезных растений: выработка новых разновидностей путем искусственного подбора.

    По воззрениям Ч. Дарвина, объектом подбора служат только целые индивидуумы и через них — виды организмов. В дальнейшем развитии биологических наук такая схема уже стала недостаточной и понятие подбора должно было расшириться. Физиология и патология пользуются идеей «внутреннего подбора» тканей и клеток организма в зависимости от условий самого же организма, являющегося их жизненной средой. Так, интерстициональное перерождение{22} органов при разных отравлениях и других болезненных состояниях объясняется тем, что более нежные специализированные ткани этих органов оказываются неприспособлены к изменившейся их органической среде, тогда как более грубая соединительная ткань гораздо легче переносит вредные влияния: те ткани погибают, а она разрастается на их месте. В том же роде истолковывается генезис некоторых гипертрофии, новообразований и т. д.

    В психологии принцип подбора в неопределенной и общей форме признается многими, систематически же он был применен к изучению развития психики автором этой работы.

    В общественных науках делался за последние десятилетия целый ряд попыток провести точку зрения подбора. Большинство этих попыток было неудачно вследствие смутности самой концепции подбора у их авторов: чаще всего объектом подбора у них являются только личности и группы, что до крайности суживает и затрудняет применение метода; при этом дело обыкновенно еще более затемняется априорным эклектизмом — убеждением, что принцип подбора в социальной жизни допускает разные исключения, ограничения и т. д. И несмотря даже на все такие недоразумения, результаты не всегда бывают отрицательные, а при правильном понимании социального подбора, которое нам не раз приходилось выяснять в других работах, он дает вполне надежную опору для объяснения общественных процессов.

    Особенно широкое поле для идеи подбора представляет вопрос об идеологическом развитии; филологи уже ею пользовались в своей специальной области; некоторые философы, как Г. Зиммель, признавали ее пригодность в исследовании смены понятий и идей. Здесь неясность основной схемы в сильнейшей степени мешала достичь положительных результатов и дело свелось главным образом к принципиальным рассуждениям.

    В физике и химии В. Крукс еще в 70-х годах пытался ввести и идею подбора как способ объяснить происхождение элементов материи. Он рассматривал существующие атомы как наиболее устойчивые и потому сохранившиеся из бесчисленных возникавших комбинаций первоматерии. Теперь, когда сложность атомов и наличность в них концентрированного движения могут считаться несомненными, представления В. Крукса получают новую опору и можно ожидать их дальнейшего развития, с устранением, однако, идеи «первоматерии».

    Так в самых различных специальных отраслях пробивает себе дорогу один и тот же принцип. Но благодаря господству специализации в этом его развитии нет единства; он является во многих вариациях и оттенках, связь и соотношения которых остаются неясными. Общность метода очевидна, но его схема не определена точно, и его перенесение из одних областей в другие происходит без планомерности, более или менее случайно, а оттого результаты часто бывают ничтожны там, где при большей сознательности применения метод был бы очень полезен.

    Здесь и лежит задача тектологии: объединить разрозненное, установить тот общий организационный метод, применениями которого являются все вариации подбора в действительности и в теории. Нашего первого, абстрактного обобщения для этого недостаточно. Исследуем подробнее.

    Первая схема подбора, в которой дело идет только о сохранении организационных форм или их несохранении, может быть обозначена термином «консервативный подбор».

- id: "3.b.2"
  label: "§ 2."
  chapter_index: 3
  chapter_slug: "glava-3-osnovnye-organizatsionnye-mekhanizmy"
  chapter_title_ru: "Глава 3. Основные организационные механизмы"
  group_slug: "mekhanizm-reguliruiushchii"
  group_label: "В."
  group_title_ru: "Механизм регулирующий"
  section_title_ru: "Подвижное равновесие"
  ru: |-
    Тектология имеет дело только с активностями, а активности характеризуются всегда тем, что они производят изменения. С этой точки зрения не может быть речи о простом и чистом «сохранении» форм, таком, которое было бы настоящим отсутствием изменений. Сохранение является всегда лишь результатом того, что каждое из возникающих изменений уравновешивается тут же другим, ему противоположным, — оно есть подвижное равновесие изменений.

    Организм в своей жизнедеятельности постоянно затрачивает, теряет, отдавая окружающей среде, свои активности в виде вещества своих тканей и энергии своих органов. Это не мешает ему оставаться — приблизительно, практически — «тем же самым», т. е. сохраняться. Взамен затраченного он столь же непрерывно берет, усваивает из окружающей среды элементы ее активностей в виде пищи, в виде энергии, получаемых впечатлений и т. п. В течение недель и месяцев совершенно обновляется состав главных, наиболее пластичных тканей нашего организма, в течение нескольких лет — даже состав его скелета. Он сохраняется так же и в том же смысле, как сохраняется форма водопада при постоянно меняющемся материале его воды. Это и есть подвижное равновесие обмена веществ и энергии между живым или неживым комплексом и его средой.

    Оно бесконечно распространено в природе; оно одно дает возможность находить в ней какие бы то ни было устойчивые комплексы, без чего было бы немыслимо вообще познание. И по мере развития науки все чаще и чаще обнаруживалось, что там, где наивному восприятию представлялась одна устойчивость, неизменность, в действительности царит одно движение, что два потока противоположных изменений создают статическую иллюзию. Температура тела сохраняется одинаковой лишь тогда, когда оно отдает среде столько же тепловых колебаний, сколько получает от нее, безразличное электрическое состояние окружающих нас предметов — лишь при таком же обмене электрической энергии. Море живет в круговороте воды, которую отдает атмосфере в виде паров, получает из нее же в виде осадков, а также в виде впадающих рек и ручьев, несущих ему водные осадки с суши; атмосфера имеет такой же круговорот своих газов, в котором поддерживается ее химический состав, и т. д.

    Всякая химическая устойчивость по мере углубления научных исследований все более сводится к равновесию противоположных, обменных реакций; и есть все основания полагать, что то же окажется в дальнейшем с устойчивостью электронно-энергетического состава атомов.

    Прежде подвижное равновесие считалось специальной особенностью живых тел. Биологи дали двум его сторонам, двум образующим его потокам названия ассимиляции — дезассими-ляции, т. е. буквально «уподобления — разуподобления». Первое означает усвоение элементов из внешней среды, при котором они, входя в состав данного комплекса, образуют в нем группировки, «подобные» другим его группировкам, уподобляются им; второе — разусвоение элементов, их потерю в окружающую среду, причем они вступают в новые сочетания, не сходные с прежними, не подобные им. У нас те же термины будут относиться, конечно, ко всяким организованным комплексам, ко всем возможным тектологическим формам.

    Подвижное равновесие никогда не является абсолютно точным: не может быть полного, безусловного равенства противоположных изменений; оно всегда только приблизительное, практическое; другими словами, подвижное равновесие или сохранение формы констатируется в том случае, если разность ассимиляции — дезассимиляции практически достаточно мала, чтобы можно было пренебречь ею и считать комплекс «тем же самым», сохраняющимся в пределах времени, относящегося к данной задаче. Так, если дело идет о человеке как рабочей силе, то его принимать за сохраняющуюся, постоянную величину для хозяйственных расчетов большей частью возможно в пределах недель, месяцев, иногда нескольких лет, но не более; а для точных физиологических исследований это совсем иначе, и в тех же рамках обнаруживаются вполне уловимые, важные при научных расчетах изменения в ту или другую сторону.

    Мы признаем новорожденного младенца и взрослого человека, который через 30 лет из него получится, за одно и то же существо, хотя их различия, объективные и субъективные, неизмеримо больше, чем, например, между двумя такими младенцами; мы признаем это потому, что в каждый данный момент изменения роста для нас незаметны.

    Тектология всякое сохранение форм должна рассматривать как подвижное их равновесие и всякое подвижное равновесие — как практически относительное равенство двух процессов — ассимиляции — дезассимиляции.

- id: "3.b.3"
  label: "§ 3."
  chapter_index: 3
  chapter_slug: "glava-3-osnovnye-organizatsionnye-mekhanizmy"
  chapter_title_ru: "Глава 3. Основные организационные механизмы"
  group_slug: "mekhanizm-reguliruiushchii"
  group_label: "В."
  group_title_ru: "Механизм регулирующий"
  section_title_ru: "Прогрессивный подбор"
  ru: |-
    Итак, точного сохранения не существует, а сохранение приблизительное означает лишь практически малые изменения — в сторону ли перевеса ассимиляции над дезассимиляцией, или наоборот. Уже это делает схему консервативного подбора научно недостаточной. Но не одно это. В нее трудно вообще уложить те случаи, когда форма изменяется, прогрессивно развиваясь; назвать это просто «сохранением» неточно, а разрушением, конечно, нельзя. Так, нам известно, что младенец не просто сохраняется, а развивается и без этого не мог бы выжить под усложняющимися воздействиями среды. Если рост ребенка прекращается, мы не видим ничего хорошего в том, что дитя сохраняется таким, как есть, а, напротив, полагаем, что его жизнеспособность понизилась, что ему угрожает упадок. И легко вообще доказать, что действительное сохранение форм в природе возможно только путем прогрессивного их развития; а без него «сохранение» неминуемо сводится к разрушению, хотя бы и незаметному по своей медленности для обычных способов восприятия и исследования. И большинство «сохраняющихся» комплексов нашей среды находится именно в таком положении: они медленно, неуловимо для нас разрушаются.

    В одной восточной сказке понятие о вечности дается таким сравнением. На краю света есть алмазная гора, час пути в длину, в ширину и в высоту. Раз в сто лет там пролетает маленькая птичка, которая на минуту останавливается на ней и чистит об нее свой клюв. Когда повторением этой операции будет стерта до основания вся гора, тогда минет первая секунда вечности. Вечности этот образ, разумеется, не поясняет: она — понятие отрицательное. Но очевидно, что если алмазная гора не испытывает иных изменений, кроме тех, о которых здесь говорится, то хотя с практической точки зрения она сохранится весьма долго, но в точной теоретической формулировке ее надо признать комплексом разрушающимся. Очерь вероятно, что атомы некоторых химических элементов разрушаются с еще меньшей скоростью, чем эта алмазная гора; но для современной теории строения вещества имеется только количественная разница между распадом таких элементов и какой-нибудь эманации[114] со средним периодом жизни атома в малую долю секунды — есть указание на эманацию с периодом около одной стомиллиардной доли секунды. Разрушение быстрое и медленное имеет на практике весьма различное значение для нас; но в научном анализе это различие только одного коэффициента.

    Предположим, удалось бы констатировать, что комплекс А совсем не разрушается, но и не испытывает изменений в Другую сторону, в смысле перевеса ассимиляции над дезассимиляцией, т. е. увеличения суммы активностей. В таком случае мы имели бы перед собой чистую, идеальную статику; но легко убедиться, что она не могла бы удержаться, а неминуемо свелась бы к упадку. Комплекс А находится в данной, определенной среде, в полном подвижном равновесии с нею; и только пока эта среда остается той же самой, оно гарантировано для него. Но среда отнюдь не может быть столь же безусловно устойчивой: она связана с мировым потоком событий; при строгом анализе она в конечном счете и развертывается на всю вселенную; она, следовательно, необходимо изменяется. Очевидно, что тогда изменяются и отношения комплекса А к его среде. Могут ли эти изменения быть благоприятными для него? Да, но только случайным образом и, значит, только временно. Вообще же изменения среды, идущие независимо от него, неизмеримо чаще неблагоприятны, для него; ибо число возможностей неблагоприятных, как свидетельствует весь опыт человечества, несравненно больше, чем благоприятных; это можно пояснить вероятностью того, что корабль, оставшийся без руля и парусов, принесет бурями и течениями туда, куда ему надо. Следовательно, в изменяющейся среде статическое положение комплекса А неизбежно превращается в неблагоприятное: перевес потерь над усвоением, последовательный упадок.

    Таким образом, для сохранения в изменяющейся, т. е. в конечном счете во всякой, среде недостаточно простого обменного равновесия. Единственное, что может давать относительную гарантию сохранения, — это возрастание суммы активностей, перевес ассимиляции: тогда новые неблагоприятные воздействия встречают не прежнее, а увеличенное сопротивление. Именно этим путем идет природа в деле сохранения жизненных форм и человек в своем коллективном самосохранении: путем роста комплексов, накопления запаса актив-ностей. Каждый шаг в эту сторону увеличивает возможность поддержания жизни при изменяющихся условиях. Иными словами, динамическим элементом сохранения комплекса является возрастание его активностей за счет среды.

    Точно так же динамический элемент разрушения надо представлять в виде уменьшения активностей комплекса, их отнятия окружающей средой. Факт разрушения комплекса, его исчезновения есть результат процесса, иногда весьма сложного, но с количественной стороны выступающего именно как уменьшение суммы активностей-сопротивлений. Разрушение может восприниматься как «мгновенное», например, раздробление глыбы ударом парового молота или прекращение жизни организма разрядом молнии; но это зависит только от несовершенства наших способов восприятия. Теоретически, т. е. научно, каждое такое событие разлагается в непрерывный ряд изменений, последовательно уменьшающих сумму элементов комплекса. Разрывы связей, образующие содержание процесса, возникают, как мы знаем, из дезингрессий, парализующих сопротивления комплекса противоположными им активностями, разрушительными для него, тектологически «внешними».[115]

    Каждая такая дезингрессия развивается путем последовательного вторжения этих внешних активностей, быстрого или медленного — для обобщающей схемы безразлично, вторжения, парализующего, т. е. практически отнимающего, дезассимилирующего собственные элементы-активности комплекса.

    Мы приходим к новому пониманию подбора, основанному на идее подвижного равновесия и отклонений от него. Эта схема шире и глубже; она охватывает и прогрессивное развитие комплексов, и их относительный упадок; она разлагает процессы сохранения и разрушения на их элементы. Ее всего целесообразнее выразить термином «прогрессивный подбор»: положительный при возрастании суммы активностей комплекса, т. е. перевесе ассимиляции над дезассимиляцией, и отрицательный при уменьшении суммы активностей, т. е. преобладании дезас-симиляции.[116]

    Вот один из простейших примеров такого подбора.

    Во впадине листа лежит капля воды. С ее поверхности непрерывно удаляются в воздух, «испаряясь», водяные молекулы (дезассимиляция), и в то же время другие молекулы осаждаются на нее из атмосферы (ассимиляция). В насыщенно-влажной атмосфере оба процесса равны и налицо имеется подвижное равновесие. Когда воздух пересыщается влагой, например вследствие понижения температуры, то получает перевес осаждение паров: капля увеличивается; это прогрессивный подбор в положительной форме. Когда насыщение атмосферы парами становится неполным, то преобладает испарение; оно стремится уничтожить каплю; это отрицательная форма прогрессивного подбора.

    Другие примеры: рост клетки в благоприятной среде, дающей для нее перевес питания над расходом вещества и энергии; постепенное уменьшение состава клетки, ее «исхудание» в среде, бедной пищей. Рост общества как организации человеческих сил, когда производство больше потребления; уменьшение суммы социальных активностей в обратном случае. Повышение количества теплоты в физическом теле, когда оно поглощает ее больше, чем отдает среде; понижение — когда преобладают потери. Усиление тона, издаваемого резонатором, пока до него доходит большее количество энергии в виде волн, соответствующих его периоду и, следовательно ассимилируемых им, чем количество, которое он отдает в виде волн, исходящих от него; ослабление тона при противоположных условиях и т. д.

    Результаты прогрессивного подбора выражаются в первую очередь, конечно, увеличением или уменьшением числа элементов комплекса: увеличение или уменьшение самих элементов сводится к тому же, если элементы в достаточной мере анализировать дальше, разлагая на все меньшие и простейшие. Например, положительный подбор для взрослого организма может не сопровождаться увеличением числа его клеток, а сводиться к росту этих клеток; но последнее означает увеличение суммы химических и физических активностей, входящих в состав клеток, а следовательно, в состав организма как целого. Но эти количественные результаты подбора далеко не исчерпывают дела.

    Капля воды имеет форму слегка сплющенного эллипсоида, близкого к шару. Форма эта зависит от ее общей структуры, в частности от соотношения между тяжестью частиц и их сцеплением: поверхностный слой благодаря сцеплению представляет своего рода натянутую пленку, которая и поддерживает форму капли. В пересыщенном влагой воздухе объем капли возрастает; но при достаточно точном наблюдении легко заметить, что изменяется и форма; она становится все более сплющенной. Это, очевидно, означает, что изменяется само строение капли. Если положительный подбор продолжается, то к сплющиванию эллипсоида присоединяется его постепенное вытягивание по одной оси; и наконец, капля разрывается. Накопляющиеся перемены во внутреннем строении привели к кризису.

    Подбор отрицательный — в нашем примере, постепенное испарение капли — тоже изменяет форму, что свидетельствует об изменяющихся внутренних соотношениях. Форма капли становится все более правильной, все более близкой к точному шару; и наконец, прогрессивное уменьшение капли приводит к тому, что она исчезает: другой кризис.

    То же относится и ко всякому иному случаю прогрессивного подбора: с прибавлением новых или убыванием прежних элементов изменяются внутренние соотношения комплекса, его структура. В живой клетке процессы роста изменяют молекулярные связи, что выражается сначала в некоторых вариациях ее формы, а затем в ее распадении на равные клетки-дочери или в отделении от нее частей «почкованием» и т. п.; при недостаточном притоке вещества и энергии за изменениями формы наблюдается иногда разрушение клетки, иногда образование вокруг нее защитительной оболочки с ослаблением всего жизнеобмена, иногда образованием из нее спор с подобными же оболочками и проч. Перевес усвоения тепловой энергии над потерями вызывает в физических телах также преобразование молекулярных связей, ведущее к кризисам плавления, кипения, а иногда и преобразование атомных связей, ведущее к химическим реакциям. Всюду — нарастающие изменения структуры, которые на известном уровне переходят в кризисы.

    В самой общей форме возможно определить и характер этих структурных изменений. При положительном подборе, — как мы видели, форма капли становится менее правильной и геометрически более сложной. В то же время оказывается, что каплю все легче разделить на части, ее сопротивление разрыву относительно уменьшается; а затем, при достаточном росте, она и сама разрывается силой своей тяжести.[117] Все это очевидно, указывает на возрастающую сложность и неоднородность внутренних отношений комплекса. Это справедливо для всех других подобных случаев, да и понятно a priori: вновь вступающие элементы, врываясь в прежние связи, конечно, усложняют их и нарушают их однородность, поскольку она имелась.

    Под отрицательным подбором форма капли делается геометрически правильнее и проще, а ее сопротивление разрыву относительно возрастает. Это говорит об упрощении внутренней структуры и увеличении ее однородности: тенденция, противоположная предыдущей. И она столь же легко понятна: убывают под воздействием среды в первую очередь элементы, менее прочно связанные с целым, связи которых, тем самым уменьшали однородность этого целого, а уменьшение числа связей и увеличение однородности как раз означают упрощение структуры.

    Эти характеристики действительны в тех пределах, пока подбор не приводит к кризису; а тогда сравнение затрудняется тем, что сама форма признается уже качественно иной, чем прежде; да и направление подбора может резко меняться. Например, промышленно-капиталистическая система производства в условиях положительного подбора — так называемого «процветания» — имеет одни определенные свойства; а с наступлением «промышленного кризиса» эти свойства резко сменяются другими, но и знак подбора делается отрицательным.

    В математическом анализе есть особый символ для выражения прогрессивного подбора «величин», т. е. измеряемых комплексов; это производная. Когда она имеет знак плюс, то означает положительный подбор; знак минус — отрицательный. Когда она обращается в нуль или в бесконечность, прерывается или меняет свой знак, это соответствует кризисам величин. Простейший пример: при движении тела производная расстояния по времени есть скорость. Когда она больше нуля, расстояние возрастает; когда меньше нуля, оно уменьшается; когда равна нулю — это кризис остановки движения и т. д.

    Хотя, как мы видели, консервативная схема подбора менее совершенна, чем прогрессивная, но отсюда не следует, что всегда правильнее и целесообразнее применять вторую. Она связана — ив практике, и в теории — специально с вопросами развития данных, наличных комплексов. Поэтому она особенно важна и полезна там, где практически от наших действий может зависеть такое развитие или где оно теоретически подлежит исследованию. Примером первого может служить педагогика, задача которой состоит именно в том, чтобы овладеть развитием организма будущего члена общества, планомерно управлять этим процессом и направлять его. Пример второго — в психологии теория формирования индивидуальной психики, в социальных науках — теория экономического развития, теория идеологий и т. п.

    В тех же случаях, когда наличные комплексы — по условиям практической задачи в рамках исследования — не развиваются сколько-нибудь ощутимо в ту или другую сторону, а только служат готовым материалом для более сложных формирований, приходится применять схему консервативного подбора. Примерами являются очень многие случаи в практике, когда из наличного материала требуется выделять то, что подходит для поставленной цели: золото из россыпи или руды, работников на определенное дело из массы предлагающих свои услуги, наилучшие пути или методы из числа возможных и т. п. Иллюстрации в области теории — очень многие статистически-массовые случаи, как распространение волн со взаимоуничтожением огромного большинства вибраций и сохранением тех, которые идут по немногим определенным линиям; влияние резких изменений среды на флору и фауну; влияние исторических катастроф на строение общества и т. д.

    Первоначальную схему прогрессивного подбора дала опять-таки человеческая практика, именно технический процесс. В нем происходят постоянная затрата энергии, в виде работы, во внешнюю природу и постоянное из нее усвоение элементов, за счет которого поддерживается и развивается жизнь общества. Здесь также, в изменяющейся среде, простое сохранение жизни такой, как она есть, по существу недостаточно и неизбежным образом переходит в ее разрушение: общество, которое не может расширять и усиливать своего трудового воздействия на природу, потому что усвоение энергии не превосходит ее растраты, обречено на упадок и разложение. Формула «затраты — усвоения» (дезассимиляции — ассимиляции) принимается затем наукой для всех жизненных процессов; это «подвижное равновесие жизни»; перевес ассимиляции есть условие роста, развития, прогресса жизни, а значит, и ее сохранения в изменяющейся среде. Дальше, понятие подвижного равновесия переносится на неорганический мир; например, при изучении тепловых комплексов принимают, что каждое тело одновременно теряет тепловую энергию в окружающую среду и получает ее оттуда; при равенстве обоих потоков перед нами термическое равновесие, при неравенстве — нагревание или охлаждение. Наука все в большей мере обнаруживает стремление каждую устойчивую форму рассматривать как результат относительного равновесия противоположных потоков энергии в материальном или нематериальном виде, т. е. как смену вещества или как обмен собственно «энергий». Вместе с такими представлениями естественно должна приниматься и соответствующая им идея подбора того, который мы назвали «прогрессивным».

    Здесь, между прочим, обнаруживается вся сложность механизма подбора. Благодаря историческому ходу развития науки понятие о подборе вошло в тектологию почти готовым, современному мышлению оно кажется простым и привычным. В действительности, самые элементарные акты подбора разлагаются на различные процессы конъюгации и дезингрессии. Притом те и другие постоянно идут рядом. Например, положительный прогрессивный подбор какой-нибудь системы означает возрастание суммы ее энергий путем их усвоения из среды. Само усвоение, конечно, есть акт конъюгационный; но усвояемые активности должны быть оторваны, для этого от тех комплексов среды, к которым принадлежали; а отрыв предполагает уже дезингрессии. Регулирующий механизм подбора, следовательно, не есть нечто отдельное от формирующих тек-тологических механизмов, а только определенная их комбинация.

- id: "4.1"
  label: "§ 1."
  chapter_index: 4
  chapter_slug: "glava-iv-ustoichivost-i-organizovannost-form"
  chapter_title_ru: "Глава IV. Устойчивость и организованность форм"
  section_title_ru: "Количественная и структурная устойчивость"
  ru: |-
    Капля воды в пересыщенной или в ненасыщенной водяным паром атмосфере послужила для нас примером положительного и отрицательного подбора. Ее же можно взять за иллюстрацию двух основных понятий, относящихся к организационной устойчивости форм.

    Если воздух не насыщен паром, капля подвергается испарению, теряет свои элементы в окружающую среду. За некоторый промежуток времени она при этих условиях должна совсем исчезнуть: кризис разрушения данного комплекса. Предполагая, что степень влажности атмосферы и ее температура не меняются, продолжительность существования капли зависит от ее величины: большая капля сохранится дольше, чем маленькая. Комплекс, охватывающий более значительную сумму элементов, тем самым характеризуется как более устойчивый по отношению к среде, но, очевидно, только в прямом количественном смысле, т. е. как обладающий большей суммой активностей-сопротивлений, противостоящих этой среде.

    Положительный подбор, очевидно, ведет к возрастанию этой «количественной устойчивости», отрицательный — к ее уменьшению; или даже, точнее, положительный подбор тождествен с ее увеличением, отрицательный — с ее убыванием, потому что первый определяется как перевес ассимиляции над дезассимиляцией, т. е. как возрастание суммы элементов комплекса, второй — противоположно этому.

    Но действительная, практическая устойчивость комплекса зависит отнюдь не только от количества сконцентрированных в нем активностей-сопротивлений, а еще от способа их сочетания, от характера их организационной связи. Мы знаем, что при положительном подборе рядом с величиной капли возрастает неоднородность ее строения и, например, механический разрыв капли может достигаться относительно легче и легче, а на известном пределе для него оказывается достаточно тяжести самой капли, так что она распадается на две. Это уменьшение «структурной устойчивости» комплекса. Напротив, отрицательный подбор рядом с убыванием размеров капли обусловливает возрастание однородности ее строения; и поскольку это так, тот же, например, разрыв капли требует приложения относительно большей силы: «структурная устойчивость» возрастает. Разумеется, это только в тех пределах, пока основное строение капли остается прежним, т. е. до кризиса, к которому неизбежно приводит отрицательный подбор, если он продолжается дальше и дальше, — в данном случае до кризиса «исчезновения» капли как жидкого тела.

    Структурная устойчивость сама представляет величину, и всегда может быть выражена количественно. Так, в механике всевозможные коэффициенты сопротивления гнутию, разрыву, кручению и проч. являются именно численным выражением структурной устойчивости разных тел по отношению к определенным внешним воздействиям. Что же касается коэффициентов «массы» и «энергии», то они характеризуют количественную устойчивость.

    Два комплекса одного и того же типа, составлены из однородных элементов-активностей, можно прямо сравнивать по их количественной устойчивости, не считаясь с конкретными воздействиями среды: если в комплексе А сумма элементов больше, чем в В, то эта его устойчивость во всяком случае соответственно больше при одних и тех же воздействиях, какие бы они ни были. Например, поскольку организм растет, постольку его сопротивление отравляющему действию ядов во всяком случае увеличивается; какой бы яд ни применялся, для дезорганизации большего количества тканей его потребуется больше. Напротив, о структурной устойчивости можно говорить всегда только по отношению к тем или иным воздействиям, а не по отношению ко всяким вообще; одному яду организм оказывает более значительное сопротивление, другому — более слабое и т. п.; для каждого разрушающего влияния коэффициент особый.

    Впрочем, нередко понятие структурной устойчивости должно применяться в не столь определенном виде. Если комплекс А находится в более или менее постоянной среде, под некоторой совокупностью воздействий, изменяющихся лишь в известных границах — человек в его социальной среде, животное или растение в его обычной стихийной обстановке и т. п., то можно образовать суммарное представление об устойчивости по отношению ко всей этой системе условий. Так, сравнивая две разные политические или культурные организации, живущие в рамках одного и того же общества, можно найти, что одна из них по своему строению является более приспособленной, чем другая, т. е. структурно более устойчива. Но если общественные условия испытают необычное изменение — вроде революции, войны, экономического кризиса, то соотношение окажется вообще иным, иногда прямо противоположным.

    Нынешние теории строения материи предполагают, что атомы вообще постепенно разрушаются в своей мировой среде, хотя ясного понятия о характере разрушающих влияний еще нет. Но мы знаем, что для радия средняя продолжительность жизни атомов около 2500 лет, для тория — около 40 миллиардов лет, для мезотория — около 8 лет, а для некоторых эманации (изотопов радона. — Ред.) — минуты, секунды, малые доли секунды. Эти цифры и представляют суммарные коэффициенты структурной устойчивости данных форм вещества в тех обычных условиях, при которых нам их приходится наблюдать и из границ которых эксперименты до сих пор еще не могли выйти. Когда удастся выяснить те воздействия, от которых зависит разрушение атомов, и планомерно изменять его скорость для различных тел, тогда не только будет решен теоретический вопрос об условиях их структурной устойчивости, но и практически человечество получит возможность располагать гигантскими количествами активностей «внутриатомной энергии».

    Понятие о структурной устойчивости в пределах ограниченно изменчивой среды имеет огромное значение для тектологической практики. Вся среда жизни на земле, вся среда, в которой действует и развивается человечество, с ее обычной амплитудой колебаний различных ее условий в астрономических, атмосферических и иных циклах может рассматриваться как ограниченно-изменчивая, а это означает именно такую, изменения которой заранее научно учитываются — или в своей совокупности, или в широких суммарных комбинациях.

    В частности, очень важны положения о том, как на структурную устойчивость влияет прогрессивный подбор — положительный и отрицательный. Мы видели на примере капли воды, что при положительном подборе параллельно с возрастанием неоднородности внутренних связей комплекса идет уменьшение этой устойчивости, а при отрицательном — с возрастанием их однородности — ее увеличение. То же самое верно по отношению ко всякому комплексу в среде с неопределенно-изменчивыми и разнообразными воздействиями: в первом случае имеющиеся структурные противоречия сохраняются и к ним присоединяются со вступлением новых элементов еще новые; во втором случае идущее разрушение отрывает от комплекса прежде всего наименее прочно связанные с ним элементы, разрывает связи наиболее противоречивые, наиболее смешанные, с частичными дезингрессиями. Например, рост живой клетки, подобно росту капли воды в пересыщенной атмосфере, ведет к накоплению внутренних дезингрессий, которое и здесь выражается, наконец, в распадении клетки на две; в биологическом развитии это распадение используется как «размножение»; но ведь и капля, распавшаяся в пересыщенной атмосфере, является «размножившейся», потому что ее части, «капли-дочери», продолжают при тех же условиях расти, как и она, до нового распадения; так же и в случаях «размножения» жидких кристаллов и проч.

    Особенно наглядно выступает эта закономерность в жизни организма и общества. Когда, например, человек долго находится в особенно благоприятной обстановке, то, несмотря на количественное накопление энергии, общая сила его сопротивлений среде начинает понижаться, он, как говорят, «изнеживается»; а это и означает понижение структурной устойчивости против неблагоприятных влияний. Напротив, во многих случаях вслед за умеренным голоданием, нечрезмерной потерей крови, а также вслед за острыми лихорадочными заболеваниями наблюдается поздоровение, идущее выше того здоровья, какое имелось до периода отрицательного подбора; а «здоровье» — это обозначение той же структурной устойчивости организма.

    Патология объясняет это следующим образом. При лихорадочных болезнях, голоде, ранениях весь организм бывает потрясен микробным отравлением или недостатком питания, вообще необычной растратой жизненной энергии. Если организм все-таки выживает, то он выживает лишь как целое;

    из числа его элементов некоторая часть погибает; естественно, что погибают именно элементы менее стойкие, менее жизнеспособные. Эта потеря для организма может оказаться выгодной: элементы более жизнеспособные получают простор, и когда вновь устанавливается перевес усвоения над затратами, то они растут и размножаются на месте элементов более слабых: общая жизнеспособность организма оказывается повышенной.

    Физиология и патология под элементами организма подразумевают обычно клетки и только к ним относят схему подбора в таких случаях, как сейчас приведенный нами. Но став на тектологическую точку зрения, мы применяем ту же схему к каким угодно элементам, которые можем практически или мысленно выделять в системе: к клеткам и частицам клеток, будут ли это отдельные белковые молекулы или особые их группировки, и к динамическим соотношениям клеток и их частиц. При этом картина отрицательного подбора с его результатами представится нам полнее и яснее. Так, и помимо гибели наиболее слабых клеток является вполне вероятным повышение жизненной прочности остальных благодаря их внутреннему подбору. В самом деле, когда энергия клетки понижается, то на первых стадиях процесса распадаются те ее частицы, а также те их связи и группировки, которые наименее устойчивы под разрушительными влияниями среды; во всем своем составе и строении клетка приобретает повышенную устойчивость ценой уменьшения своей величины и внутренней сложности, которое, однако, является лишь временным, если затем наступает выздоровление организма. То же относится ко взаимным связям и группировкам целых клеток. На основе порождаемого отрицательным подбором упрощения внутренних отношений системы происходит повышение организационной ее прочности и устойчивости.

    Но такое действие отрицательного подбора на жизненный комплекс есть только возможный, а не постоянный его результат. Во-первых, за известными пределами продолжающееся понижение энергий системы и с ним ее упрощение принимают; неизменно характер деградации, возрастающего упадка. Например, то прогрессивное понижение энергии, которым характеризуется наступление старости, ведет мало-помалу к самому невыгодному для организма упрощению его структуры: наиболее дифференцированные ткани подвергаются вымиранию их клеток, наименее дифференцированные — клетки соединительной ткани — размножаются вместо них, но, конечно, не могут выполнять их специальных функций, и организм в конце концов погибает. Клетки почечной или нервной ткани в некоторых определенных направлениях, т. е. по отношению к известным активностям и внешним сопротивлениям, организованы гораздо выше соединительно-тканных и постольку обладают не меньшей, а большей жизнеспособностью; но для разнообразных разрушительных влияний, возникающих при длительном ослаблении организма, они в силу своей специализации, т. е. приспособления к особым, ограниченным условиям и функциям, представляют меньше сопротивления, чем соединительно-тканные. Эти последние живут в самых различных местах организма, среди всех прочих тканей, следовательно, при весьма различных условиях и потому могут легче выносить изменчивые и множественные вредные воздействия; они соответственно организованы проще и устойчивее других клеток. Отрицательный подбор губит такие клетки последними; тем не менее и они неспособны жить без других элементов организма.

    Во-вторых, важно также и то, какого рода воздействием обусловлен процесс отрицательного подбора. Если это воздействие весьма значительно отличается от тех обычных влияний, под которыми организм складывался и среди которых он живет, то оно будет наиболее разрушительно, вообще говоря, не для тех элементов, которые наименее жизнеспособны. Всякая жизнеспособность относительна; она существует только по отношению к той или иной данной среде; и элементы, в высшей степени приспособленные для одной среды, наиболее устойчивые под ее влияниями, в другой среде или под существенно иными воздействиями могут оказаться и в большинстве случаев окажутся, мало приспособлены и неустойчивы. Например, хотя бы и слабое отравление организма каким-нибудь ядом, не представляющим никакого химического родства с собственными алкалоидами организма и другими обычными его ядами, внутренними и внешними, лишь в совершенно исключительных случаях может оказаться причиной последующего повышения жизнеспособности, а почти всегда будет иметь лишь противоположный результат.

    Возьмем теперь иллюстрацию из области наиболее сложных жизненных систем, а именно социальных. Фаза положительного подбора соответствует экономическому процветанию общества, когда оно берет в производстве и потреблении от окружающей природы больше, чем затрачивает всеми различными способами, когда, выражаясь экономически, «богатство» его возрастает. Нет надобности доказывать, что в это время увеличиваются и сложность общественной жизни, и неоднородность ее элементов. Люди, предприятия, группы, организации расширяют свою деятельность, свои потребности, свой опыт; число человеческих единиц и их группировок возрастает: размножение, устройство новых предприятий, возникновение новых связей. Новое сохраняется и растет, но и старое не разрушается; в этом смысле положительный подбор консервативен; общих, широких преобразований общественной структуры, глубоких реформ экономическое процветание само по себе не порождает; общество, как говорится, живет настоящим, которое его удовлетворяет. Усиливаются различия между людьми и расхождения между их группировками: пользуясь относительным благосостоянием, каждый развивается в направлении своих особых склонностей; экономически более сильные извлекают из процветания больше выгод, чем слабейшие, и неравенство возрастает. Усложнение жизненных отношений, рост их неоднородности уменьшают стройность и устойчивость всей системы. Так, Англия в эпоху своего господства на мировом рынке после целых столетий процветания отличалась и развитием экономических крайностей — гигантских богатств рядом с глубочайшей нищетой, и сохранением отсталых идеологий одновременно с прогрессивными как страна наибольшей религиозности, устаревших политических традиций и т. п.

    Во всех подобных случаях рано или поздно накопление внутренней неустойчивости доходит до кризиса.

    Этот кризис имеет различные формы в зависимости от строения общества и от совокупности условий внешней среды. В организации патриархальной или феодальной, вообще натурально-хозяйственной, он выражается, например, в «перенаселении». Благосостояние приводит к чрезмерному размножению, которое и кладет ему конец. В организации капиталистической кризис принимает вид «перепроизводства»: возрастающий приток материи и энергии из области производства перестает усваиваться обществом благодаря нарушенному равновесию его отношений и стихийно растрачивается вполне бесплодно или даже ко вреду общества. Наконец, в иных случаях, имеющих место для общественных систем самого различного типа, кризис, подготовленный уже внутренними процессами, но не настолько, чтобы проявиться сам собой, разражается под действием внешнего удара. Понижение организационной стройности общества сказывается в его военной слабости, в недостаточном сопротивлении нападающим врагам. Военная организация, концентрирующая огромную сумму специфических сопротивлений, при этом обнаруживает большую «беспорядочность», оказывается глубоко «расстроенной». Пример — разгром и даже гибель разных «изнеженных» долгим процветанием обществ древности, крушение Франции в 1870-м году и т. п. Само собой разумеется, что не всякий военный разгром соответствует этой схеме, а только такой, который генетически связан с долгим процветанием; и историки, весьма далекие от тектологических идей, не раз устанавливали подобную связь.

    Величайшее общество древности — Римская империя — было разрушено военными силами, гораздо меньшими, чем те, которые оно много раз побеждало. И историки сходятся на том, что причиной была внутренняя дезорганизация, вызванная паразитическим вырождением свободных классов, т. е. тех, которые, собственно, и составляли древнее общество; рабов с полным основанием можно не относить к нему, потому что они являлись просто человеческими орудиями, instrumenta vocalia, в руках общества. Паразитическое же вырождение представляет именно результат долгого перевеса усвоения энергии над ее уменьшенными затратами — наиболее неблагоприятный для жизни случай положительного подбора.

    Если же мы рабов отнесем к составу общества, рассматривая их с более современной нам точки зрения как производительный социальный класс, то тем резче для нас обнаружится возрастание неоднородности элементов общества при положительном подборе. В данном случае приток избыточной энергии из сферы производства распределялся настолько неравномерно, что уже весьма рано весь уходил на свободные классы, рабам же давалась только возможность поддерживать свое существование, без всякой возможности развития. А когда этот приток стал уменьшаться, то высшие классы начали пополнять его за счет жизненной энергии рабов, для которых с этого времени затраты стали превосходить ассимиляцию, — длительный отрицательный подбор с вымиранием в конечном результате.

    Кризис военного бессилия был, как известно, лишь внешней стороной хозяйственного кризиса, глубокого и затяжного, который опустошил Римскую империю, начавшись непосредственно вслед за моментом наибольшего ее процветания.

    Те кризисы, которые возникают на основе положительного подбора, — надо помнить, что это далеко не единственный тип кризисов, — обычно соединяются с переменой в самом направлении подбора, который становится тогда отрицательным; на социальных системах это наблюдается особенно легко, и сама функция отрицательного подбора в таких случаях выступает особенно ясно. Она состоит в разрушении тех элементов, связей, группировок, которые наименее устойчивы и жизнеспособны, которые в наибольшей мере нарушают внутреннюю организованность целого. Происходит и упрощение системы, и возрастание ее стройности: поэтому, если отрицательный подбор, не произведя полного или вообще глубокого разрушения системы, вновь сменится положительным, то дальнейший рост и развитие системы приобретают характер большей организованности; жизнеспособность обществавозрастает подобно тому, как это бывает в аналогичных указанных нами случаях с жизнеспособностью организма.

    Так, экономический кризис перепроизводства разрушает множество наиболее слабых или наименее целесообразно организованных предприятий; на других предприятиях он вызывает сокращение работ, соединенное с устранением наименее производительных затрат, с усилением внутренней экономии, часто с удалением малоспособных организаторов — заведующих и инженеров, которые могли держаться при хорошей конъюнктуре, с прекращением непотизма, который так легко развивается до огромных размеров в эпохи процветания, и т. п. Повсюду кризис вызывает тенденцию отбросить устарелые способы производства, устарелые формы организации предприятий в пользу способов и форм более современных, какие только находятся. В результате по окончании кризиса, когда вновь вступает в силу положительный подбор, экономическая система может оказаться — и до сих пор оказывалась — своеобразно оздоровленной и, несмотря на резкое временное юслабление, способной затем достичь нового процветания на |более высоком уровне техники и организации.

    Но тут же легко видеть, насколько стихийно по существу это действие отрицательного подбора, настолько поэтому непоследовательно, несовершенно и неполно он выполняет свою прогрессивную функцию. Вместе с элементами, связями и группировками маложизнеспособными, устарелыми, отживающими, случайными, он губит множество иных, полезных и важных для развития социальной системы, активно-трудовых, жизненная прогрессивность которых непреложно обнаруживается в дальнейшем ходе социального процесса. Стоит только представить себе расточение рабочих сил и жизней вследствие безработицы при промышленном кризисе. Но и целые предприятия, которые гибнут от кризиса, далеко не все бывают из числа технически и экономически более слабых или хуже организованных: общее крушение увлекает и немало передовых предприятий.

    В этом обнаруживается относительный характер всякой жизнеспособности, всякой динамической устойчивости. Обыкновенно, говоря о ней, мы имеем в виду обычные, средние условия среды, в которой протекает существование данных комплексов. Но это есть лишь общая, нормальная высота жизнеспособности или устойчивости, а не ее конкретная величина. Последняя же зависит от конкретных, частных условий и вместе с ними варьирует. Отрицательный подбор уничтожает то, что менее жизнеспособно или неустойчиво в данных условиях. Всякий сложный комплекс, особенно такой, как общество, представляет известное разнообразие, известную неоднородность условий. Поэтому элементы или группировки, в общем или «нормально» обладающие более высокой жизнеспособностью, большей устойчивостью, более совершенной организованностью, оказываясь в менее благоприятных условиях, иногда исключительных, могут погибать, в то самое время как иные элементы или группировки низшей организованности, находясь в условиях особенно благоприятных, сохраняются и продолжают усиливаться.

    Нет надобности специально выяснять и доказывать те же выводы по отношению к таким кризисам, которые выражаются в военном разгроме общества. Слишком известны те случаи, когда военные поражения становились исходным пунктом национального обновления, но еще гораздо большее число случаев, когда ощутимые итоги поражений сводились всецело к огромной растрате сил и длительному ослаблению общества. Упрощение внутренних его связей и соотношений, которое согласно закону отрицательного подбора при этом происходило, иногда было в то же время деградацией общества, его переходом на низшую ступень развития.

    Столь же стихийным двигателем прогресса были для малоподвижных обществ, родовых и феодальных, бедствия перенаселения, угнетавшие их целыми периодами. Тут отрицательный подбор, длительно подрывая социальные связи в пунктах и по линиям их наименьшей прочности, иногда приводил к разрыву самой социальной организации — к распадению родовой или феодальной общины на две, начинавшие жить каждая самостоятельной жизнью, — вроде распадения материнской клетки на две дочерние. Иногда получался разрыв общины с прежней ее территориальной средой, не дававшей для нее достаточного притока жизненно необходимой энергии: община переселялась на новые места. Вообще же происходили в разной мере и степени ослабление и расшатывание всех традиционных форм и связей общинной жизни; и благодаря этому становилось сколько-нибудь возможным развитие наличных зародышей новых технических приемов, новых производственных отношений, новых идей. При условиях же равновесия или положительного подбора консервативная структура таких организаций не оставляла для всего этого почти никакой возможности.

    Итак, по всей линии доступного нам опыта в явлениях прогрессивного подбора выступают одни и те же основные черты. Сопоставляя функции положительного и отрицательного подбора в мировом развитии, можно сказать, что они охватывают вместе всю динамику этого развития. Положительный подбор, усложняя формы, увеличивая разнородность бытия, доставляет для него материал, все более возрастающий;

    отрицательный подбор, упрощая этот материал, устраняя из него все непрочное, нестройное, противоречивое, внося в его связи однородность и согласованность, приводит этот материал в порядок, вносит в него систематизацию. Дополняясь взаимно, оба процесса стихийно организуют мир.

    Человечество всегда тяготело к этим схемам и в своем научном, и в своем философском, и еще раньше в религиозном мышлении. Из научного опыта мы извлекаем их в самом общем, тектологическом их виде; в философии можно найти их зародыши почти повсюду, но особенно в диалектике Гегеля. Религия воплощала их в божествах творческих и разрушительных. Народная тектология не ограничивалась стихийной оценкой положительного и отрицательного подбора как «благоденствия» и «бедствия»: она знала и расслабляющие возможности, скрытые в первом, и организационно-укрепляющую силу второго; недаром в области воспитания она обычно становилась на сторону «закаляющей» суровости против «изнеживающей» мягкости.

