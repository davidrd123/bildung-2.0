    Как и всякий научный закон, закон относительных сопротивлений может являться выражением либо господства природы над людьми, либо власти людей над природой. Постройка рушится, если неумелый архитектор не соразмерил прочности балок с наибольшим давлением на них; плотина, защищающая поля и жилища от наводнения, в ряду лет неизбежно подвергается гибельному для них прорыву, если не принят в расчет наибольший возможный подъем воды вместе с наиболее неблагоприятным сочетанием силы ее течения и силы ветра; предприятие не выживет, если в его организации не были заранее учтены невыгодные конъюнктуры, и т. д. Вся знаменитая троица национальной русской тектологии — «авось, небось и как-нибудь» — выражает не что иное, как игнорирование закона относительных сопротивлений, зависящее от недостаточности организованного опыта и его несвязности, того» что обычно называют «низкой культурой». Напротив, планомерно и систематически пользуясь законом относительных сопротивлений, люди могут достигать наибольшей устойчивости своих собственных организаций, своих технических и идейных построений, освобождаясь от вечной угрозы стихийных сил.

    Задачи, в решении которых этот закон должен систематически, сознательно применяться, бесчисленны и бесконечно разнообразны. К нему сводится целый ряд важнейших методов, давно существующих в практике и в науке, но не обобщенных, разрозненных и потому прилагаемых лишь частично, в той или иной области труда-опыта; за этими пределами они обыкновенно упускаются из виду и вдобавок усваиваются с лишним трудом, неэкономно в смысле умственной энергии, по своей необобщенности, бессистемности.

    В общем все задачи, сюда относящиеся, разделяются на два типа. К первому принадлежат те, в которых требуется преодолевать определенно-изменяющиеся воздействия или сопротивления, ко второму — те, в которых эти преодолеваемые величины являются неопределенно-изменчивыми. Примером первого типа может служить любое здание, любая машина, всякое орудие: разные их части подвергаются разным по силе давлениям, трениям, ударам и проч., но так, что эти различия на основании опыта и теоретического расчета удается в общем выразить определенными коэффициентами. Примеры второго: ребенок, подготовляемый воспитанием к работе и борьбе в неопределенно-изменяющейся, заранее не учитываемой социальной обстановке; армия в оборонительном положении на временно установившейся линии фронта, при отсутствии объективных данных, определяющих тактику неприятеля; научное или художественное произведение, выпускаемое в малоизвестную автору «публику», и т. п. Задачи того и другого типа решаются двумя соответственно различными общими методами.

    Принципиальное решение для первого типа намечается само собой. Если известно, что данный комплекс или система в таких-то своих частях должен выдерживать воздействия или преодолевать противодействия такого-то рода и такой-то величины, то в этих частях и приходится концентрировать активности-сопротивления соответственного характера и в надлежащем количестве. Вся трудность заключается в том, чтобы знать род и величину активностей преодолеваемых и располагать достаточными активностями против них. Первое достигается коллективным опытом, воплощаемым в науке, второе — коллективным трудом, дающим техническую власть над стихийными энергиями природы, возможность их эксплуатировать.

    Планомерная техника производства всегда исходит из той мысли, что новый, организуемый комплекс — «продукт» — за предвидимое время своего существования неизбежно должен подвергаться различным разрушающим воздействиям. Если это» положим, орудие — топор, молот, то по самому своему назначению оно ооречено испытывать со стороны материта, для обработки которого будет служить, деформирующее, дезорганизующее противодействие; помимо того, орудие может ржаветь и портиться от действия влаги, воздуха и проч. Если дело идет о построенном мосте, то он должен, во-первых, подвергаться давлению и толчкам со стороны перемещаемых по нему грузов, во-вторых, разрушительным порывам бурь, наводнений, затем также химическому влиянию атмосферы и т. д. Всем враждебным активностям должно противостоять достаточное сопротивление продукта; по своей относительной величине оно для каждой части, необходимой в системе целого, должно быть постоянно больше единицы. Это, как мы видим, точка зрения «защиты». Из нее исходят и предварительные расчеты, и само выполнение, создающее продукт.

    В пунктах наибольших разрушительных воздействий концентрируются и наибольшие сопротивления. Затем разными способами стараются уменьшить и эти воздействия, особенно те, которые не связаны прямо с назначением продукта. Практикуется тут и метод косвенного уменьшения путем качественной замены сопротивлений. Например, благодаря громадной силе молнии здание, как бы хорошо ни было построено, не может ей представить достаточного относительного сопротивления. Но при помощи громоотвода электрическое напряжение облака может быть уменьшено, а удар молнии будет отведен туда, где его энергия не производит практически важного разрушения. Аналогично этому в военной защите маневрируют так, чтобы огонь неприятельских батарей направлялся на пункты наибольшего сопротивления или же наименее вредного действия.

    Принцип наименьших относительных сопротивлений определяет в той же мере и судьбу человеческих организаций, их сохранение, их частичное или полное разрушение среди столь разнообразных и сложных, столь изменчивых в социальной среде воздействий. Поскольку люди сами планомерно создают свои организации, постольку они всегда считались и считаются с этим принципом, применяя его в форме разнообразных «испытаний», «исследований», «экзаменов». Сущность подобных приемов заключается в том, что элементы для организации подбираются на такой основе, чтобы наибольшим ожидаемым воздействиям враждебной среды они представляли относительное сопротивление не меньше единицы. Подбор выполняется иногда так, что элементы, намеченные для организации, непосредственно ставятся в условия наибольших предполагаемых воздействий; например, некогда всякого подмастерья, желавшего вступить в цех мастеров, заставляли сделать «chef d'oeuvre» (фр. — шедевр) его ремесла, т. е. произведение, соответствующее самым трудным задачам, какие могут быть в будущем поставлены ремесленнику его практикой; в старинных преследуемых тайных обществах новых заговорщиков подвергали жестоким испытаниям одного порядка с теми насилиями, какие к ним применили бы враги, захватившие их в свои руки.

    Эти применения «экзаменационного» метода дают особенно яркие иллюстрации тому, что понятия «активности» и «сопротивления» тектологически вполне взаимно соотносительны и могут постоянно меняться местами. Если заговорщик, которого пытают в застенке, действительно находится под внешним воздействием, то мастер, делающий башмаки, сам, казалось бы, только преодолевает сопротивления. Но сопротивление — это активность объекта, столкнувшаяся с активностью труда. Нет никакой принципиальной разницы метода между тем случаем, когда испытывают вновь выстроенный мост, подвергая его максимальной нагрузке, какую он должен выдерживать, и тем случаем, когда кандидата в инженеры заставляют сделать одно из самых трудных вычислений, какие ему могут впоследствии понадобиться.

    В области наиболее специализированной практики — в деле организации идей — благодаря отсутствию подходящей терминологии, а также хоть каких-нибудь измерительных приемов всего труднее иллюстрировать роль принципа наименьших относительных сопротивлений. Можно, однако, указать на то, как действует автор, вырабатывающий какое-нибудь идеологическое целое — статью, трактат, проект или иное «сочинение» (т. е., по точному смыслу выражения, — «нечто координированное», организованное). Враждебные, дезорганизующие воздействия представляются автору в виде «критики», «полемики», иногда «цензуры». Он исследует каждую главу, каждый параграф, каждую фразу сочинения с точки зрения ударов, которые могут быть на них направлены, укрепляет слабые пункты дополнительными аргументами, по возможности выкидывает спорные и сомнительные места, чтобы уменьшить «поражаемую поверхность», создает новые связи между приводимыми фактами, чтобы увеличить общее сопротивление системы, переодевает в защитительный костюм идеи, которым угрожает цензура… Нагляднее выступают те же расчеты «относительных сопротивлений» тогда, когда произведение создается не индивидуально, а коллективно, не в голове одного автора, а в общении многих, например вырабатывается манифест на конгрессе партии, проекты резолюций в комиссиях и т. п.

    Известно, как старинные организации стремились увеличить до максимума сопротивление своих членов различным опасным для целого побуждения посредством страшных клятв и присяг, а также менее наивного метода — жестокой кары тем, кто не сможет преодолеть антиорганизационных мотивов своей психики. Как ни мало сходства во внешних проявлениях, но по схеме эти приемы укрепления относительно слабых, сильнее угрожаемых пунктов специальными ограждениями не отличаются, например, от бронирования военного корабля, от подковывания копыт у лошадей и т. п.: схеме «добавочных сопротивлений».

    Принцип военного искусства и вообще целесообразности во всякой борьбе заключается в том, чтобы направлять дезорганизующие усилия на место наименьшего сопротивления. Берем случай осады города. Здесь цепь сопротивления представлена весьма сложной системой техническо-социального состава: рядом укреплений с их защитниками. Иногда для быстрого успеха осаждающих бывало достаточно через разведчиков или предателей узнать, где наиболее слабый, наименее защитимый пункт. Чаще осаждающая армия должна подготовить свой приступ, планомерным воздействием уменьшая сопротивление в заранее выбранном пункте. Это делается, например, концентрированным артиллерийским огнем, создающим бреши, убивающим и деморализующим защитников намеченного пункта. К желаемому результату могут приводить и ложные атаки, отвлекающие массу защитников с места, где хотят вести настоящий приступ. Аналогичным образом в полевой войне стараются найти или создать линии пониженного сопротивления, чтобы, оперируя по ним, разорвать связь неприятельской армии, и т. п.

    В тактике защиты уменьшение разрушительных воздействий также применяется чрезвычайно широко, например путем сведения к минимуму количества пунктов, доступных этим воздействиям. В технике, производственной и военной, для этого чаще всего стараются уменьшить поверхность, подверженную враждебной активности, например при постройке жилищ в полярных странах избегают углов и стремятся к закругленным формам — минимум площади охлаждения; на дуэлях противники становятся боком, а не фронтом один к другому — минимум поражаемой поверхности и проч. В организации людей та же тенденция принимает иные разнообразные формы; например, преследуемые секты и партии допускали собрания своих членов лишь в пределах строгой деловой необходимости, ограничивали их личные сношения, переписку, их сведения о самой организации и т. д. Борьба за свободу организации, а также за свободу организационных методов — слова, собраний, печати — есть борьба за уменьшение враждебных, разрушительных для системы с ее активностями воздействий.

    По отношению к задачам на определенные сопротивления можно вообще принять, что люди решать их умеют. Если решение оказывается неудачным, как это все-таки бывает, и нередко, то вина не в методе, а в других моментах дела: или неточны были данные, на которых строились планы, или в расчет вкрались ошибки благодаря несовершенству нервно-психического аппарата людей, его выполнявших, или явились новые обстоятельства, которые раньше не наблюдались и потому не могли быть учтены. Если чего до сих пор не хватало самому методу, так именно сознания его универсальности и соответственно универсальной формулировки.

    Однако и этот недостаток — вещь немаловажная. Он ведет к тому, что люди, которые умело и успешно пользуются данным методом в решении каких-нибудь технических задач, по существу более простых и легких, упускают его совсем или применяют несознательно, а потому и плохо, как раз там, где задачи всего сложнее и труднее, например в социально-организационном деле, в педагогике, в работе над художественным произведением и т. п. Кроме того, самое знание усваивается неэкономно, когда оно недостаточно обобщено: один и тот же метод в разных областях требует каждый раз особых усилий для усвоения, потому что воспринимается как нечто иное, новое.

    Вот, например, правило военной тактики: «наступающий имеет преимущество». Это одно из бесчисленных частных применений принципа относительных сопротивлений. Тот, кто первый наносит удар, выбирает его место и момент и, подразумевается само собой, концентрирует в них свои силы. Когда первый удар нанесен, относительное сопротивление в данном пункте уже оказывается пониженным, и если атака продолжается, ее шансы, конечно, повышены. Французские начальники, любезно предлагавшие в одном сражении англичанам стрелять первыми, были явно неправы хотя бы потому, что убитые этими выстрелами французы уже никак не могли отвечать на них.

    Для того, кто понял правило «оффенсивы» (наступления) как частный вывод универсального принципа, сразу очевидно, что оно применимо и во всякой иной борьбе — экономической, политической, идейной. А между тем очень часто, как показывает опыт, те, кто, создавая нечто новое в этих областях, не могут не предвидеть неизбежности борьбы за него, тем не менее, лишь испытав достаточное количество ударов, усваивают все практическое значение оффенсивы.

    Правило концентрированного действия в других, непохожих по внешности, но тождественных по существу применениях господствует над всей техникой. Так, применение острых орудий имеет тот смысл, что вся сила действия переносится на чрезвычайно малую поверхность, на протяжении которой сумма молекулярных сил сцепления соответственно мала; для тупого ножа или топора эта поверхность больше, чем для острого, а значит, во столько же раз больше и сумма сопротивлений, которые требуется преодолеть. Удар при этом выгоднее простого давления острием потому, что он сосредоточивает действие на очень малый период времени. Допустим, что сопротивление в 10 раз превосходит активности, которыми мы располагаем за одну секунду, чтобы преодолеть его. Достаточно тогда эти же активности приложить не в секунду, а в одну двадцатую секунды, и относительное сопротивление за это время будет не 10, а всего 10/20 — меньше единицы, т. е. будет преодолено, и разрушение, которое намечено, произойдет.

    Таков же смысл применения взрывчатых веществ. Энергия химического действия, заключенная в фунте динамита, вовсе не так огромна, как обыкновенно думают, и не на много превосходит ту, которая скрыта в фунте угля. Но если требуется, например, оторвать и обрушить часть скалы, то, применяя, положим, паровую машину для ее разбивания, надо сжечь, может быть, сотни фунтов угля, чтобы получить такой результат, какой даст сразу взрыв одного фунта динамита. Энергия сгорания угля распределяется на множество отдельных актов и на относительно большой промежуток времени, тогда как вся химическая активность динамита затрачивается в ничтожно малую долю секунды в одном лавинообразно развертывающемся действии; за это время молекулярные связи горных пород оказываются разорваны, а потом они уже сами собой не возобновляются. Но если сконцентрировать энергию угля в один акт подобной же краткости, то и уголь проявляет столь же грозные свойства: так бывает при взрыве паровых котлов.

    Легко понять, насколько важно правило концентрированного действия, например, для всякой идеологической, культурной работы — в педагогике, агитации, пропаганде, в художественном творчестве и проч. Но большей частью работники этих областей отдельно и независимо друг от друга приходят к его пониманию и планомерному применению на своем частном опыте и ценой ряда ошибок, неудач. Неопытный лектор или пропагандист обыкновенно с большой полнотой, стараясь ничего не упустить, рассказывает своей аудитории все, что ей знать надлежит; и ее воспринимающие активности рассеиваются по многим направлениям, причем сколько-нибудь прочно ничто не усваивается, производительность усилий той и другой стороны получается наименьшая. Древнее правило «non multa, sed multum» — не о многом, но основательно — является подходящей здесь частной формулировкой принципа концентрированного действия, а научная специализация своей положительной прогрессивной стороной обязана тому же тектологическому характеру:[123] концентрация активностей на ограниченном поле приложения в познавательной борьбе с природой.

    Второй тип задач — это те, в которых среда, ее воздействия и сопротивления, изменяясь неопределенно, не могут учитываться заранее со стороны их неравномерности. Разумеется, задача может быть и просто неразрешима — именно тогда, когда неопределенные изменения среды не заключаются в каких-нибудь границах, достаточно соизмеримых с наличными средствами решения, т. е. общим запасом активностей-сопротив-лений, какой для него имеется. Например, для муравьев неразрешима задача ограждения муравейника от нападения внешних врагов вообще, когда в числе их возможны такие существа, как люди, но разрешима задача защиты от нападения других муравьев и иных насекомых. Люди же способны коллективно создавать крепости, удовлетворительно противостоящие всяким живым врагам, но еще не в силах оградиться против геологических, а тем более космических кризисов. Мы же должны исследовать вопрос, очевидно, в рамках относительной его разрешимости.

    Если любая часть системы может подвергнуться воздействиям не учитываемой заранее силы, то ясно, что всякая неравномерность концентрации сопротивлений в пользу одних частей, а следовательно, в ущерб другим совершенно бесцельна. В то же время она до крайности опасна, ибо создает вероятность разрушительного результата даже со стороны сравнительно слабых воздействий, раз они придутся против наиболее непрочных частей системы. Максимум относительной устойчивости здесь достигается равномерным распределением активностей-сопротивлений между всеми угрожаемыми звеньями целого.

    В таком смысле задача вообще и решается стихийно природой, более или менее сознательно и планомерно — человеческой практикой. Какая-нибудь раковина моллюска представляет приблизительно равномерную защиту поверхности его тела от механических и иных воздействий; если местами имеются отклонения от этой равномерности, то уже в зависимости от решения других специальных задач, потому что жизненные задачи организма по необходимости решаются все сразу, причем эти решения, естественно, отчасти ограничиваются одни другими. Аналогичным образом угрожаемую поверхность, положим, крепости ее строители стараются оградить равномерно, не оставляя слабых пунктов, поскольку это допускается другими жизненными условиями системы; например, когда города укреплялись стенами, в стенах все-таки приходилось делать и ворота для сношений с внешним миром; но вынужденное ослабление защитительной оболочки в этих местах восполнялось усилением стражи и т. п. То же и во временной цепи организационных отношений: если шансы нападения не учитываются заранее, — дело идет хотя бы об отряде исследователей, проходящем через незнакомую страну, населенную дикими племенами, — то необходима непрерывная и равномерная охрана; ее ослабление хотя бы на короткое время могло оказаться роковым, а усиление без достаточных оснований означало бы бесплодную растрату энергии, сбережение которой столь важно в этих условиях. Когда становятся недоступными учету на неопределенное время возможности продовольственного снабжения, все члены коллектива переводятся на равномерный минимальный паек и т. п.

    Очевидно, что задачи подобного рода возникают вообще тогда, когда в наличной системе уже есть определенное неравномерное распределение активностей-сопротивлений между ее частями или звеньями, которое вредно для устойчивости системы в среде неопределенно-изменчивой. Типически такое положение создается в тех, очень частых, случаях, когда система, которая формировалась в одной обстановке, в соответствии с ее разнородными, определенными воздействиями попадает в другую обстановку, где соотношения иные. Например, культурный европеец, выросший в городе, занимавший известное социальное положение, сообразно с которым и развились его «способности», т. е. распределение активностей его организма, попадает в девственные степи или дикие леса. Там, среди бесчисленных незнакомых ему возможностей и опасностей, его специальное знание, положим текстильного дела, математики, литературы или административной техники, оказывается не только бесполезным для него, но гораздо более: будучи достигнуто путем особенной концентрации активностей на определенных функциях определенных органов, оно основано на понижении энергии других функций, других органов; оно связано с большой неравномерностью развития, какая была возможна и удобна в культурной социальной среде, но может оказаться гибельна на лоне стихийной природы, от слепых активностей которой он теперь не защищен культурно-техническим аппаратом общества. Задача выступает в виде необходимости напряженной работы самых различных органов, причем активности организма должны перераспределяться от наиболее гипертрофированных функций к менее развитым.

    В дальнейшем, по мере того как он будет справляться с положением, уже и эта среда из неопределенно-изменчивой будет превращаться для него все более в определенно-изменяющуюся: стоит ему устроить хижину, и отпадет неопределенная изменчивость условий температуры и влажности; когда он возделает кусок земли, более определенный характер приобретут условия питания и т. д. Тогда и организационная задача его жизни меняет свою форму, переходя шаг за шагом к первому рассмотренному нами типу. Из этого видно, что между обоими типами есть все промежуточные ступени; вернее, они постоянно комбинируются — в одних отношениях, в проявлениях одной группы активностей среда выступает как определенно-изменяющаяся, в других отношениях — как неопределенно-изменчивая.

    Пусть две армии стоят друг против друга. Та, которая захватит в свои руки инициативу, первая перейдет в наступление, должна будет решать задачу на определенно-изменяющиеся сопротивления. Район наступления должен явиться, естественно, районом наибольшего противодействия: выгиб фронта сам по себе увеличивает поверхность соприкосновения наступающих частей с неприятелем: притом эти части выходят из-за прикрытий, что увеличивает относительную силу неприятельского воздействия, а враждебная армия, конечно, начнет сосредоточивать, какие для нее возможно, новые части к пунктам атаки. Следовательно, первая армия должна концентрировать достаточную сумму своих сил в этом районе, а в других поддерживать такое их количество, какое может потребоваться для сопротивления возможным контрманеврам, для развития результатов прорыва и проч. Если все это рассчитано хорошо и относительное противодействие оказалось, где надо, меньше единицы, то задача решена, неприятель частично или вполне побежден.

    Если неприятель только оттеснен и держится прочно на своих позициях, при относительном сопротивлении, равном единице, то задача выступает в новом виде. При этом может быть два случая. Либо силы достаточны для попытки повторного удара, тогда следует заново, в изменившейся обстановке, организовать решение того же типа, как и первое; либо силы истощены, резервов мало, приходится на время отказаться от оффенсивы, тогда, пока она не наметится со стороны неприятеля, задача будет вторичного типа — равномерное закрепление фронта, перераспределение сил в пользу более слабых частей фронта.

    Из этих примеров ясно, что, во-первых, решение задач на определенно-изменяющиеся сопротивления тектологически выгоднее, соответствует большей планомерности; во-вторых, переход к этому типу от другого может зависеть отнюдь не только от среды, воздействия которой из менее определенных становились бы более определенными, но и от активного отношения самой системы к этой среде: воздействуя на среду, данная система тем самым как бы выбирает ее сопротивления.

    Воспитание ребенка представляет чрезвычайно важную социально-организационную задачу. Большинству людей приходится в той или иной мере заниматься этим делом, не будучи в нем специалистами; но и специалисты-педагоги пока еще не имеют права утверждать, чтобы их работа в целом опиралась на бесспорные научные требования. Посмотрим, как тек-тологически представляется здесь принципиальная постановка задачи.

    Обыкновенно цель воспитания определяют как «развитие физических и духовных способностей личности». Понятие «способности» вообще смутно по своей абстрактности, а главное — в нем отсутствует мысль о том, что развиваемые активности соотносительны внешней и внутренней среде общества, членом которого личность является. Таким образом, в самих основах нынешнего воспитания много неясного, а потому также много инстинктивно-традиционного, т. е. уже не соответствующего усложнившимся, изменчивым социальным условиям настоящего, новым формам и соотношениям общественных и внеобщественных активностей. При этом принцип относительных сопротивлений неизбежно, а порой грубо нарушается.

    Объект воспитания — личность; но его факторы и задачи лежат в ингрессивном социальном целом — обществе, классе, группе. Воспитание личности объективно есть не что иное, как частичное самовоспитание коллектива. Это в сущности процесс введения нового члена в общественную систему. Оно приготовляет человека к той жизненной функции, вернее — к той сумме функций, которая ему в обществе предстоит. Эти функции, обстановка, в которой они будут выполняться, сопротивления, с которыми они должны будут иметь дело, частью могут быть предопределены заранее, частью лежат вне предвидения воспитателей. Следовательно, условия задачи двойственны:

    с одной стороны, среда определенно-изменяющаяся, с другой — неопределенно-изменчивая. Соотношения двух сторон задачи в разных исторических системах различны.

    Более древние типы социальной организации отличаются консерватизмом быта; таковы первобытно-родовые общины, развившиеся из них авторитарно-родовые, а затем феодальные общества; в значительной мере ту же особенность сохраняют первые феодально-меновые формации — рабовладельческие разных видов, крепостные и даже ремесленно-городские. Бытовой консерватизм закрепляет за детьми социальное положение и функции родителей: сын военного организатора — феодала должен стать таким же вождем дружин; сын зависимого крестьянина — таким же несвободным земледельцем; сын кузнеца — кузнецом. Общественная роль предопределена в наибольшей доле, и соответственно определена задача воспитания: оно развивает активности ребенка по образу и подобию отца или матери, в домашнем, иногда в корпоративном обучении. Педагогические принципы очень просты: все сводится к подражанию или механическому заучиванию, а затем специальным практическим упражнениям; особого воспитательного аппарата либо вовсе нет, либо он находится в зачаточном состоянии. Пока социальная обстановка устойчива, этого вполне достаточно: жизнь стереотипно повторяет от поколения к поколению те же технические и социально-организаторские воздействия, которыми преодолеваются те же сопротивления стихийной или человеческой природы. Зато если человек попадает в непредусмотренное положение, он оказывается в огромном большинстве случаев бессилен и беспомощен. Если же меняется общая природная или социальная обстановка, неприспособленность широко охватывает всю жизнь консервативного коллектива. Так, при вынужденных переселениях диких и варварских племен обычным являлось вымирание их в значительной доле, на первых по крайней мере порах. А вымирание отсталых народов при самом даже мирном соприкосновении с цивилизованными выступает часто еще резче, причем иногда трудно улавливаются его ближайшие причины. Но основная и общая причина одна: консервативно сформированные организмы устойчивы только в консервативной среде; когда она становится изменчивой, тогда неизбежно в тех или иных частях, в тех или иных функциях этих организмов относительные сопротивления должны время от времени оказываться ниже единицы.

    Смена консервативных социальных структур иными, носящими в себе условия прогрессивного развития на основе противоречий, — структур авторитарных меновыми, капиталистическими, — в корне изменяет условия и задачи воспитания. Тенденция к сохранению за детьми социального положения и роли их родителей все более и более ограничивается, все чаще и чаще практически парализуется стихийными силами общественной жизни; но даже и в тех случаях, где она реально проявляется, детям приходится выполнять свои функции в изменившейся и продолжающей изменяться социальной обстановке, т. е. иметь дело с сопротивлениями иной величины, а частью и иного характера; стереотипное воспитание по образцу прошлого тогда оказывается недостаточным. Следовательно, задача воспитания в наибольшей доле неизбежно должна решаться в расчете на неопределенно-изменяющиеся условия.

    Но она не может вся сводиться к этому, и вот по какой причине. Поскольку само общество противоречиво-прогрессивного типа лишено цельности и анархично, поскольку в отношениях его элементов значительное место принадлежит борьбе, дезингрессиям, поскольку человек в нем удерживает за собой социальное положение и функцию лишь на основе какого-нибудь определенного и устойчивого преимущества перед другими. А такое преимущество является, конечно, лишь в результате решения задачи на определенно-изменяющиеся сопротивления. Значит, необходимо, чтобы и это давалось воспитанием. Но каким путем?

    На одной из предыдущих иллюстраций мы видели, что переход от первого, тектологически менее выгодного типа задачи ко второму зависит не только от среды, но и от активного отношения к ней самого противостоящего ей комплекса, в данном случае — человека: возможен с его стороны выбор ее сопротивлений, разумеется, лишь до известной степени, в ограниченном масштабе. Это выбор воспитание может предопределить в форме специализации.

    Действительно, специализация на той или иной работе, с ее особыми материалами и орудиями, предрешает и характер, и величины тех сопротивлений, с которыми человеку придется иметь дело, позволяет наиболее точно и определенно соразмерять затраты его активностей с противодействиями объектов труда, планомерно достигая рассчитанных результатов. Всего очевиднее это в технике организации вещей;

    но таково же значение специализирующей стороны воспитания в деле организации людей и идей. Развертывая возрастающую сумму энергии в борьбе с избранными и все более доступными его расчету сопротивлениями, человек-специалист достигает возрастающих результатов; это и образует основное и устойчивое преимущество, на которое он опирается в поддержании своей социальной роли и позиции. Кузнец в своей трудовой сфере имеет дело с определенно-изменяющимися сопротивлениями металлов, огня и проч.; в этом он превосходит других людей: те, поскольку они сталкиваются с такими же сопротивлениями, например пользуясь металлическими вещами, которые ломаются, гнутся, портятся, так или иначе нарушая их ожидания, вынуждены относиться к ним как к комплексам сопротивлений неопределенно-изменчивых. Но моряк обладает вполне аналогичным превосходством в деле решения другой группы задач, связанных с сопротивлениями водной среды, которые для кузнеца и прочих людей являются неопределенно-изменчивыми и т. д.

    Однако это только одна сторона воспитательной проблемы; за пределами своей специальности, во всей остальной своей среде, социальной и природной, человек все-таки должен считаться с общей задачей на неопределенно-изменчивые условия. Ей соответствует другая сторона воспитания, направленная к развитию органов и функций «вообще», безотносительно к каким-либо заранее намеченным специальным обстановкам и частным целям. Сюда входит большая часть того, что называют «физическим воспитанием», и так называемое «общее образование».

    Физическое воспитание существовало, конечно, и в консервативных системах; но поскольку оно не относилось к заранее предопределенной социальной функции человека, например укрепление мускулов будущего воина и закаливание его тела против непогоды и походных невзгод, оно не ставилось как воспитательная задача: оно проводилось стихийно, «само собой», в детских играх и детском труде, семейной и между семейной жизни. Общество же нового типа, противоречиво-прогрессивного, вынуждено было все более сознательно выдвигать эту сторону общего воспитания как особую и важную цель именно потому, что «сама собой» она достигается все меньше и все хуже при возрастающей социальной дифференциации с неизбежным ее последствием — сужением воспитательной среды. Стоит только представить себе, насколько исключено стихийно-воспитывающее влияние природы из обстановки городских детей, даже господствующих классов, в какой мере страдает их физическое здоровье от одних миазмов и пыли воздуха новейших крупных центров, до какой степени односторонне развивается тело детей и подростков, работающих на фабриках, и т. д. И этим ослабленным во многих частях и функциях, нестройно сформированным организмам могут предстоять неопределенные колебания среды: от привычной обстановки мастерской до прихотливейших комбинаций новейшей войны — сухопутной, морской и воздушной! Вопрос о равномерном, на всевозможные случаи, укреплении этих организмов все настойчивее выдвигался самой жизнью перед социальной педагогией, и она уже давно разрабатывает методы его решения — гигиенические, спортивные и иные.

    Вполне подобное значение имеет вопрос об «общем образовании», т. е. воспитании нервно-психической системы для не определяемых заранее возможностей. Человек положим, родился, жил и вырос в столице, где сопротивления для пространственной и временной ориентировки сведены к ничтожно малой величине надписями на улицах, номерами на домах, электрическими часами и проч.; и вот ему приходится в военных условиях пробираться с отрядом по незнакомым местам, в лесах и болотах, среди опасностей от людей и стихий; определять направление он вынужден по карманному компасу и карте, а если и того нет, — по Солнцу и звездам, по ним же соображать время; без некоторых знаний в географии, астрономии он был бы обречен на гибель, а с ним и его спутники. Или, например, из безмятежно-сонной провинциальной жизни человек попадает в ураган социальных стихий революционной эпохи с ее неожиданно меняющимися потоками разрушительных активностей; как устоять, куда направить свои усилия, не находящие привычных объектов? Счастье его, если он сможет опереться на достаточное общее знакомство с историей и социальными науками. Это иллюстрации на сравнительно крайних случаях; но в меньшем масштабе подобные вещи происходят на каждом шагу; да и эти крайние случаи хоть раз встречаются в жизни большинства людей, а погибнуть один раз довольно для всякого.

    Развитие педагогической задачи не оканчивается на этой двойной ее постановке, подчиненной принципу относительных сопротивлений; но для понимания следующего этапа нам понадобится сделать еще один шаг в изучении тектологи-ческих закономерностей. А пока остановимся на том, в какой же мере достигается реальное решение задачи обществом, не осознавшим эту задачу как организационную, его педагогикой, лишь смутно учитывающей тектологический опыт.

    Прежде всего тут обнаруживается постоянное запаздывание воспитательного материала и методов по отношению к меняющимся условиям социального бытия. Так, много времени спустя после крушения авторитарно-консервативных основ экономического быта мещанская семья и даже школа продолжают вести детей в духе строгой авторитарной дисциплины, убивающей инициативу и критику. Между тем такое воспитание, вполне подходящее для общества, в котором человеку всю жизнь приходилось идти по предопределенным другими путям, приносит большой вред в мире анархической борьбы всех против всех, с его изменчивыми направлениями и сочетаниями человеческих сил, при необходимости то и дело производить объективную переоценку условий и самостоятельно действовать, не упуская момента. Жизнь требует непрерывного решения новой задачи второго типа, а подготовка дается для решения устаревшей задачи первого типа.[124]

    Другая иллюстрация — долгое, упорное сохранение древних языков в средней и высшей буржуазной школе. Значение той и другой — подготовка организаторов социальной практики в разном масштабе. Для известной эпохи классицизм был хотя частичным, но важным моментом в решении задачи на организаторскую специализацию, поскольку она лежала в рамках определенности. Латынь была языком международного общения и вообще коллективного обобщенного опыта, опыта «научного», как его называют, по преимуществу организаторского. Развитие новых общественных отношений, меновых и торгово-капиталистических, на каждом шагу ставило организаторские классы, как старые, так и выдвигавшиеся им на смену, перед новыми положениями, новыми противоречиями и трудностями. Чтобы успешно преодолевать их, приходилось опираться на весь социальный опыт прошлого, — тут всего больше давала греко-римская древность, — и настоящего, научные приобретения которого публиковались тоже на латинском языке. Поэтому от знания древних языков зависело преодоление огромной массы жизненных сопротивлений в организаторской работе. Но в развитом буржуазном мире эти условия исчезли; и громадная масса труда, которая затрачивалась в колледжах, гимназиях, лицеях, университетах и т. д. на изучение древних языков, перестала служить средством решения реальных жизненных задач; вся эта масса энергии отвлекалась от линии действительных сопротивлений, с которыми людям предстояло сталкиваться.[125]

    Очень часто также нарушается принцип относительных сопротивлений и в деле учебной постановки новых языков. Дети образованных классов очень часто с раннего детства обучаются — еще в семье, а потом и в школе — двум-трем иностранным языкам. Это отнимает поистине огромную долю свободных сил их психики. Много ли таких профессий, в которых столь же большое место занимают соответственные жизненные сопротивления? Очень немного: дипломаты, переводчики коммерческие и литературные, отчасти моряки, некоторые группы ученых. Но родители и воспитатели обычно и не ставят вопроса таким образом; для них дело идет вовсе не о подготовке к предстоящим реальным сопротивлениям, а просто традиционно-условной «образованности».

    Подобное же отсутствие организационной точки зрения обычно и в деле физического воспитания. Постановка гимнастики, детских игр и теперь еще редко исходит из вопроса, для каких реальных процессов жизненной борьбы могут служить подготовкой те или иные применяемые приемы; а выбор их в этом смысле бывает зачастую очень нецелесообразный.

    А «закаливание» детского организма, этот случай, казалось бы, наиболее сознательного приложения принципа относительных сопротивлений… Иные родители, считающие необходимым закалять детей против холода, одевают их в холодную погоду гораздо легче, чем одеваются сами. Но если, как естественно предположить, дети, выросши, будут одеваться так же тепло, как теперь их родители, то к чему будет им эта повышенная степень закалки? А она чего-нибудь стоит организму, отвлекая значительное количество крови к кожным покровам и ведя к гипертрофии их сосудов. Характерен широко распространенный в Европе обычай или упорная мода — заставлять детей гулять с обнаженными икрами, тогда как у взрослых эти части тела всегда хорошо укрыты.

    Каждому ребенку предстоит в эпоху наступления половой зрелости преодолевать жестокие бури психофизиологической стихийности его собственного организма, имеющие глубокое влияние на всю дальнейшую жизнь. Но до сих пор далеко не часто встречаются воспитатели, которые заранее считались бы с этим, заботились бы о подготовке юного существа к неизбежным потрясениям.

    Самую любопытную иллюстрацию игнорирования закона относительных сопротивлений представляют семьи многих интеллигентов-идеалистов: воспитание в духе крайней «гуманности», чрезвычайной мягкости и заботливости, отстраняющей от детей по возможности всякое страдание, всю грубость и жестокость жизни. Что противопоставят эти тепличные растения суровым ударам подлинной действительности? Это — почти заранее обреченные на гибель.

    Как видим, уже одна область воспитания дает сколько угодно примеров практической важности изучаемого принципа, того, как он тягостно господствует над людьми, когда они не владеют им сознательно.

    Другие, не менее наглядные и убедительные образцы практического нарушения того же принципа и с еще более вредными последствиями мы найдем в жизни общественных организаций.

    Роль стихийности и планомерности (или «сознательности») в развитии таких организаций бывает весьма различна. Одни из них, как, например, первоначальные родовые общины и большинство последующих экономических группировок, зарождались вполне стихийно, а затем жили и изменялись, подчиняясь давлению объективной необходимости, смутно воспринимаемой, познавательно для них непредвидимой. Их судьба определялась, конечно, принципом наименьших относительных сопротивлений, но именно в том смысле, что он господствовал над ней как закон природы, т. е. они сохранялись, пока и поскольку относительные сопротивления их частей держались выше единицы; а затем они разрушались, частично или вполне, когда с возрастанием дезорганизующих активностей эти сопротивления падали ниже необходимого уровня. Они подчинялись этому закону, но не пользовались им в своей деятельности как орудием, не предусматривали заранее вероятных соотношений и не изменяли их, подготовляясь к будущему на основе предвидения.

    Впрочем, не надо понимать этого слишком категорично и безусловно. Всякая хозяйственная организация предполагает по крайней мере известную степень предвидения и заботы о будущем. Но там это предвидение было чисто традиционным и относилось только к периодически повторяющимся изменениям среды, таким, как, положим, ночь, зима с их враждебными силами, к борьбе с которыми готовились заранее, и т. п. Новые, необычные изменения среды, внешней или социальной, вытекавшие, например, из самого развития общества, были недоступны расчету и стихийно властвовали над судьбой этих коллективов.

    Но уже давно существуют и организации более высокого типа. Современное капиталистическое предприятие организуется сознательно и планомерно; учитываются с большой точностью, научными методами, соотношения трудовых активностей и технических сопротивлений; поскольку возможно, при нынешней структуре общества и нынешнем уровне ее познания, ведется учет также относительных сопротивлений предприятия воздействиям его социальной среды (вероятная рыночная конъюнктура, вероятные обострения классовой борьбы и т. п.). Аналогичную, но меньшую степень сознательной планомерности представляют современные партии, культурные союзы и проч. Мы остановимся немного на условиях жизни и работы нынешних политических партий.

    Общественная среда, с которой они имеют дело, постоянно изменяется, а с ней — все соотношения активностей и сопротивлений; это основная особенность капиталистического общества благодаря его стремительному техническому прогрессу и непрерывной внутренней борьбе. Из этого необходимо должны исходить в своей деятельности всякие партии, становясь в то или иное отношение к совершающимся переменам сообразно своим задачам. Предвидение изменяющихся внешних воздействий и подготовка к ним тут являются вопросом не только успеха, но самого существования.

    Принцип относительных сопротивлений при этом выступает как важнейшее тектологическое орудие; руководясь им в своих расчетах, партия должна целесообразно распределять наличные силы: увеличивать работу по одним направлениям, уменьшать по другим, укреплять одни пункты, ослаблять ради этого другие. Там, где относительно понижается или должно понизиться в предвидимом будущем сопротивление среды, надо развивать или подготавливать наступательную тактику (нападение на врагов организации, завоевание для нее новых позиций или новых сил). Там, где соотношение наблюдается или ожидается обратное, следует усиливать защиту, чтобы возрастание враждебных активностей не могло привести к частичной или полной дезорганизации.

    Все это вещи, которые могут казаться сами собой разумеющимися, так что о них и говорить как будто нет надобности. Но действительность далеко не вполне соответствует им. Чрезвычайно часто в истории наблюдалось и наблюдается, что к моменту кризиса, в неизбежности которого не сомневались и общий характер которого предвиделся, организация оказывается совершенно не подготовленной к возникающему резкому колебанию сил. Факты подобного рода достаточно объективно устанавливаются признаниями, иногда покаянными, иногда негодующими официальных и компетентных деятелей самих организаций.[126]

    Если оставить в стороне ту долю неподготовленности, которая, как это все же бывает, зависит от объективной невозможности подготовиться, даже при величайших усилиях, например вследствие недостатка сил, то нарушение элементарного тектологического принципа объясняется так. Организация в своей практике живет гораздо более стихийно, чем в сознании своих деятелей. Она развивает свою работу по линии наименьших сопротивлений в настоящем, подчиняясь указанному закону, но не по линии наибольших воздействий в предвидимом будущем, что она должна была бы делать, пользуясь этим законом как орудием для своих интересов. Эта стихийно идущая практика обыкновенно подавляет и сознание руководителей, а если раздаются предостережения со стороны тех, чей опыт шире и зрение яснее, то они бессильны перед инерцией целого. Указания могут даже встречать общее согласие — необходимость укрепиться против тех или иных опасностей и потрясений признается, но дело идет по прежним путям.

    Мы видим, как широко и огромно практическое значение изучаемого закона. Но для нашей эпохи, может быть, больше, чем для всякой другой, драгоценно и его объяснительное значение. Он один способен разрешить целый ряд мучительных культурных загадок времени, подрывающих как будто всякую веру в развитие социальности человечества — основной смысл цивилизации.

    Многомиллионные стада людей, принадлежащих к самым культурным нациям и самым передовым их классам, на наших глазах бросались истреблять друг друга с тем же зоологическим ожесточением, как их далекие звероподобные предки. Лондон и Париж, великие центры мировой культуры, устраивали такие же дикие патриотические погромы, как полуазиатская Москва. Войска самых передовых наций совершали такие же чудовищные жестокости, как курды или казаки, ингуши или марокканцы. Джентельмены-офицеры свободной Англии расстреливали военнопленных русских революционеров сообща с генералами царско-деспотической России. Не только жрецы отживших религий, но и высшая интеллигенция, поэты, артисты, даже люди науки гордо шли во главе всеобщего озверения и т. д. Не значит ли это, что существует только прогресс техники и внешних форм жизни, но нет прогресса человеческой природы, — достаточно вихрю истории сорвать с европейца бумажный плащ гуманной цивилизации, чтобы под ним обнаружился извечный троглодит?

    В действительности это не так, и объяснение поражающих глаз противоречий дает закон наименее благоприятных условий.

    Новейшее капиталистическое общество в высшей степени разнородно по составу и представляет, по выражению одного немецкого профессора, «градацию самых различных существований». При этом ступени, низшие по развитию социальности, различаются в разных странах гораздо меньше, чем средние и высшие: разности малых величин, естественно, не могут быть велики — лондонский хулиган из буржуазных классов и темный дикарь их глухих кварталов по способностям и склонности к разрушительным действиям приблизительно сходны с соответственными типами русских столиц. Предположим, что в Лондоне из 6 миллионов жителей всего один процент, т. е. 60 тысяч, подобных элементов; когда какая-нибудь общественная катастрофа даст им лозунг и возможность объединения на один момент, этого вполне достаточно, чтобы произвести жестокий погром, например против всех лондонских немцев. Возможно, что в Москве из 2 миллионов было 90 процентов людей, стоявших на этом уровне, т. е. миллион восемьсот тысяч;

    при аналогичных условиях они производят такой же погром, причем величина разрушения не больше, потому что объект его не значительнее, чем там. Огромное неравенство культуры будет замаскировано равенством низших комплексов культурной системы.

    Этого мало. Современный культурный человек, взятый в отдельности, также не есть однородное целое. Его психомоторная система заключает также градацию наслоений — от низших до высших, от звериных инстинктов пещерного предка до чистого социального идеализма в разных его формах, свойственных разным классам. И опять-таки, когда внешнее воздействие достаточной силы, направленное на низшие комплексы психомоторной системы, преодолеет их инерцию и выведет их из равновесия, два человека могут проявить себя одинаковым стихийным разрушением, хотя в психике одного низшая группа реакций образует, может быть, одну десятую, а в психике другого — девять десятых.

    Такое «равнение по низшему» особенно ярко выступает в стадных действиях и эмоциях толпы. Толпа есть собрание индивидуумов, связанных на основе физической близости непосредственным подражанием. А его действие концентрируется на тех группах психических реакций, которые являются наиболее одинаковыми для всех; но таковы именно низшие группы, высшие — с их сложной дифференциацией — расходятся гораздо больше. Поэтому в толпе человек, сохранивший только небольшие остатки зоологического наследия в своей психике, может совершать такие же зверства, как другой, в котором это наследие преобладает над социальностью; и человек мужественный, при нормальном возбуждении высших комплексов своей психики бесстрашно смотрящий в глаза смерти, может поддаться паническому страху наряду со слабыми трусами и т. д.

    Закон наименее благоприятных условий сурово властвует над человечеством, пока оно не овладеет им. Здесь для текто-логии возникает вопрос: как овладеть им в культурной сфере, чтобы не получалось такого равнения по низшему, которое подчиняет цивилизацию пережиткам дикости, хотя бы они были количественно гораздо слабее накопленных ею активностей. Это вопрос об организационном переходе от низших величин к средним; его принципиальное решение требует еще одного шага в тектологическом исследовании — формулы наименьших тут недостаточно.

- id: "4.4"
  label: "§ 4."
  chapter_index: 4
  chapter_slug: "glava-iv-ustoichivost-i-organizovannost-form"
  chapter_title_ru: "Глава IV. Устойчивость и организованность форм"
  section_title_ru: "Структура слитная и «четочная»"
  ru: |-
    Структурную устойчивость любой системы можно рассматривать еще с одной точки зрения. Ее среда воздействует на нее, как и она на свою среду, непосредственно лишь там, где обе они соприкасаются, в пограничной области, понимая это слово тектологически, а не только пространственно. Величина пограничной области, т. е. количество соприкосновений, может возрастать или уменьшаться. Например, когда черепаха втягивает голову и лапы или человек «съеживается», количество это становится меньше; когда политическая организация рассылает агентов и агитаторов в такие пункты или социальные круги, где раньше не работала, оно увеличивается; так же и в том случае, если научная теория распространяется на новые группы фактов, и т. п. Два комплекса, две системы, подобные и равные в прочих отношениях, могут различаться именно в этом. Возникает вопрос, как такие изменения или различия отражаются на структурной устойчивости.

    Вот простейший случай. Из двух равных количеств одинакового металла сделаны два стержня равной длины, положим в метр, но один равной толщины на всем протяжении, а другой — «четочной формы», с попеременными сужениями и расширениями. Свойства того и другого окажутся в целом ряде случаев различны. Сопротивление излому меньше у чет-ковидного; если среда такова, что окисляет их, то и проржавеет он скорее. В среде холодной он будет быстрее терять теплоту; зато в теплой быстрее будет и приобретать ее. Его статическая электроемкость больше, сопротивление току значительнее и т. д. Все это следствия увеличенной поверхности, большей суммы соприкосновений со средой.

    Очевидно, что идет ли дело о физической поверхности, как в данном случае, или об иных соприкосновениях со средой, все равно; чем их больше, тем меньше концентрация актив-ностей-сопротивлений, приходящаяся в среднем на единицу такой пограничной области; и притом в «четочных формах» эта концентрация еще неравномерна, представляет от пункта к пункту больше колебаний. Следовательно, по закону относительных сопротивлений разрушение связи этих форм, их дезорганизация совершается легче.

    В более общей форме можно выразить это так: отрицательный подбор интенсивнее проявляется для «форм четоч-ных». Например, охлаждение стержня есть отрицательный подбор его тепловых активностей; оно и происходит быстрее для четковидного стержня, чем для ровного.

    Строение более «ровное», менее разветвляющееся, вообще противоположное «четочному», мы обозначим термином «слитность».

    То же разграничение можно относить к психическим ассоциациям, с одной стороны, и идейным системам — с другой. Например, в примитивном сознании ребенка группа психических образов, относящихся к четвероногим животным, другая группа их, относящаяся к птицам, и третья, относящаяся к людям, представляют каждая по отдельности слитное целое. Но все они связываются разными, более или менее случайными сходствами: сова похожа на кошку, лягушка — на голого человека, медведь на задних лапах похож на человека в вывернутой шубе и т. д. Эти слабые связи образуют из трех групп одну «четочную» систему. Научная классификация построена так же, только связи групп менее случайны, более устойчивы. Например, видовые концепции для класса млекопитающих, класса птиц, класса рептилий и проч. представляют по отдельности сравнительно слитные комплексы; между собой же они слабее связаны абстракциями их общих признаков в «четочную» цепь родов, еще более «четочный» ряд семейств и т. д.

    Разница заключается повсюду именно в том, что в формах более слитных больше связей между собственными их элементами, чем в «четочных», так что меньше простора для проникновения между ними элементов или комплексов внешней среды, как море проникает заливами и бухтами в выемки материков; «четочные» таких «выемок» представляют больше.

    Итак, для комплексов более слитных отрицательный подбор менее интенсивен. А положительный? Но очевидно, что и он тоже. Там, где происходит нагревание, т. е. тепловая энергия больше ассимилируется, чем дезассимилируется, четковид-ный стержень в равное время приобретает больше тепловой энергии. Чем больше количество соприкосновений со средой, тем ассимиляции из нее соотносительно больше.

    Отсюда общее решение вопроса о том, какая структура благоприятнее для сохранения и развития комплексов: под отрицательным подбором благоприятнее «слитная», под положительным — «неточная».

    Это знает и черепаха, которая втягивается при всяких отрицательных, с ее точки зрения, условиях, и человек, который съеживается от холода'. Но научная, тектологическая формулировка дает возможность простого и легкого решения многих организационных задач, представляющихся сложными и трудными в обычной постановке. Примером может послужить вопрос о преимуществах «централистического» или «федеративного» типа организации при различных условиях.

    Из этих двух типов «централистический», как его обыкновенно понимают, т. е. характеризующийся наличностью центра, к которому тяготеют и с которым тесно связаны, подчиняясь ему, все прочие части системы, является более слитным; «федеративный» с более слабой связью частей, относительно автономных, представляет случай «четочных форм». Например, царская Россия, бюрократически-республиканская Франция были централистичны; довоенная Англия, Соединенные Штаты, Швейцария были по сравнению с ними федеративны; в партии усиление власти руководящего центра выражает тенденцию к слитности, усиление автономии местных и специальных организаций — к четочности; религиозная секта с определенной и строгой, всеми разделяемой догмой более слит-на, чем научная или философская школа, включающая разные оттенки или течения, и т. п. Этих характеристик и нашей общей формулы достаточно, чтобы убедиться, что «федеративная» структура выгоднее при благоприятных жизненных условиях, под действием положительного подбора, «централистическая» — при неблагоприятных, когда подбор отрицательный. В первом случае автономия частей позволяет им лучше развернуться, свободнее развиться, полнее использовать приток энергии, доставляемой средой — социальной и природной; во втором их связи, более прочные и тесные, дольше удерживаются против разрушительных влияний. Это можно проиллюстрировать на бесчисленных примерах.

    Государственный строй Швейцарии, Соединенных Штатов, Англии с ее широким местным самоуправлением внутри и с ее колониально-федеративными связями был возможен только благодаря исключительно благоприятным жизненным условиям, в какие их поставила историческая судьба. Наоборот, государства, развившиеся в долгих жестоких войнах, окруженные врагами, могли держаться только на централистических основах; таковы были восточные деспотии, Россия, Франция. Для политических партий обнаруживаются такие же соотношения: тяжелые внешние условия легче переносятся при более слитном строении, например разделение на фракции тогда особенно вредно, о чем свидетельствует и опыт российских партий за времена реакции. При особенном ухудшении обстановки связи центральных и местных организаций, выражающие «четочную» сторону партийного строения, неизбежно рвались и партия превращалась в ряд практически разрозненных групп. Если единство удерживалось, то лишь как единство программы или догмы, которое тогда было тем строже; это тоже слитный тип, но другого рода, именно идейно-слитный.

    Иллюстрацию из психологии дают те состояния, которые Аристотель называл «макропсихией» и «микропсихией», расширением и сужением души. Приятные, радостные ощущения, соответствующие повышенному притоку энергии в нервно-психическую систему, располагают к развертыванию во все стороны общения со средой — к усилению деятельности внешних чувств, увеличению подвижности, повышению «симпатических» тенденций и т. п. Напротив, тягостные, болезненные ощущения, выражающие отрицательный подбор, вызывают как бы свертывание души, ослабление внимания к окружающему, ослабление всей воспринимающей деятельности, пониженное общение с другими людьми, стремление к покою и проч. Так организм, приспособляясь, переходит от более «четочных» соотношений к более слитным, и обратно, — психика человека по тому же закону, как тело черепахи.

    Термины «четочная» и «слитная» форма приняты нами только условно, потому что не нашлось лучших. Их недостатки не ограничиваются тем, что они внушают представление о физическом строении, тогда как дело идет о каких угодно организационных сочетаниях. Но и для физических комплексов «неточность» и «слитность» вовсе не обязательно соответствуют тем конкретным образам, которые этими словами невольно вызываются. Дело идет, надо помнить, об относительном количестве соприкосновений со средой, и только об этом. Если сравнивать два цилиндрических стержня одинакового объема и одинаково ровных на всем протяжении, без всяких расширений и сужений, то между ними может все-таки быть та же разница. Один короче и толще, другой длиннее и тоньше: тогда у первого поверхность меньше, у второго — больше, и второй обнаружит сравнительно с первым все «четочные» свойства: легче ломается, быстрее нагревается и охлаждается, скорее ржавеет и проч. Но если укорачивать и утолщать первый цилиндр до того, что он примет вид диска, то у него тоже выступят «четочные» свойства. Наиболее высокую «слитность» представляет однородный по внутреннему строению шар. Но если материал не однороден по разным направлениям, как многие кристаллические тела, то наиболее слитной формой явится эллипсоид с определенным соотношением осей и т. д.[127]

    Значит, «четочность» характеризуется вообще неравномерными связями в разных частях комплекса или в разных направлениях; чем выше их равномерность, тем больше «слитность».

    Интересно и важно, что эти понятия вполне применимы не только в пространственных, но и во временных структурных отношениях.

    Так, многие комплексы активностей изменяются во времени волнообразно, как бы расширяясь и сжимаясь. Все колебательные процессы — психические и вообще органические, молекулярные, эфирные — можно представить в виде потоков, то расширяющихся, то суживающихся на своем пути; изображая это графически, получим, очевидно, «четочные формы». И все выводы об этих формах тут остаются в силе. Например, если сравнивать волны одинаковой природы, положим эфирные, световые, то из них «четочный» характер резче выражен, очевидно, в более коротких. Раз возникши в мировой среде, все — волны так или иначе поглощаются разными ее комплексами — веществом, рассеянным в ней, а может быть, и самим эфиром, следовательно, находятся под отрицательным подбором. А отсюда следует, что для их устойчивости более благоприятны формы менее «четочные», т. е. такие, в которых длина волны больше. И действительно, чем короче вибрации, тем легче они поглощаются мельчайшими непрозрачными частицами; более длинные не поглощаются, как бы огибая эти частицы, по законам так называемой дифракции. Поскольку происходит частичное поглощение энергии лучей от неполной прозрачности среды, постольку лучи фиолетовые — из всех видимых отличающиеся наиболее короткой длины волны — должны ослабляться по сравнению с другими, особенно красными. Так это и принимается физической теорией; спектральный анализ, по-видимому, это подтверждает: в спектре наиболее отдаленных звезд фиолетовые лучи соотносительно ослаблены, как показывает его сопоставление со спектром более близких звёзд того же типа.[128]

    По типу вибраций идет и жизнь нашего организма: днем он развивает больше активностей, чем ночью, летом больше, чем зимой, — ряд расширений и сужений. В жизни человечества в целом преобладает вообще положительный подбор: оно растет, силы его увеличиваются. При таких условиях «четочность» во времени должна быть выгодна для него; и действительно, ценой ночного понижения работы организма достигается дневное увеличение интенсивности ее; чем значительнее размах этого колебания, чем выше, следовательно, дневная интенсивность работы, тем легче люди преодолевают сопротивления природы. Но если организм окажется в условиях отрицательного подбора, например хронического недоедания, то соотношение будет иное: чем больше размах суточного колебания, т. е. чем интенсивнее дневная жизнь организма, тем меньше он сможет выдержать: и русский крестьянин, у которого этот размах меньше, выдержит при прочих условиях дольше, чем английский рабочий.

    Здесь, как и во многих других случаях, организационные свойства времени не отличаются от тех, которые обнаруживает пространство.

    Надо заметить, что вопрос о значении «четочной» и «слитной» структуры мы рассматривали применительно к неопределенной среде, к условиям положительного и отрицательного подбора вообще, принимая разнообразные и изменчивые влияния, не сосредоточенные специально на тех или иных частях комплекса. Там же, где имеется такая устойчивая концентрация внешних активностей или сопротивлений, получается, конечно, задача на определенно-изменяющиеся условия, и вопрос уже не сводится просто к большему или меньшему количеству соприкосновений. Если, например, отрицательный подбор наиболее сильно проявляется для одной части системы, тогда для сохранения целого выгодно, чтобы эта часть была значительнее развита; т. е. и при отрицательном подборе благоприятнее оказывается определенная неравномерность связей. Так, во всех машинах части, подвергающиеся усиленному трению, давлению, кручению, растягиванию, делаются или массивнее, или из более прочного, т. е. тектологически более связного, материала; а это, конечно, придает всему комплексу более «четочный» характер; равномерность же была бы невыгодна. Но это только означает, что определенные и частные соотношения всегда ограничивают, видоизменяют применение схем общих, выражающих неопределенные соотношения.

- id: "4.5"
  label: "§ 5."
  chapter_index: 4
  chapter_slug: "glava-iv-ustoichivost-i-organizovannost-form"
  chapter_title_ru: "Глава IV. Устойчивость и организованность форм"
  section_title_ru: "Системы равновесия"
  ru: |-
    Выражением структурной устойчивости является «закон равновесия», формулированный А. Л. Ле-Шателье для физических и химических систем, но в действительности тектологический, т. е. универсальный.

    Системой равновесия можно назвать такую, которая сохраняет свое данное строение в данной среде. Обычная иллюстрация — весы в их спокойном состоянии. Если на одну чашку их произведено давление, например положена гирька, то эта чашка начинает опускаться, другая — поднимается, а коромысло из горизонтального становится наклонным: структурное изменение. Но по мере того, как оно происходит, в самой системе возникает противодействие ему: чашка с гирькой падает с замедлением и только до известного предела, за которым начинается даже обратное движение, а после колебаний устанавливается новое, измененное равновесие, определяемое простыми механическими условиями.

    Иллюстрация более сложная: вода и лед в одном сосуде при 0 °C, т. е. при температуре замерзания и таяния. Если нагревать сосуд, то часть льда поглощает притекающую тепловую энергию, переходя в воду, и этим противодействует нагреванию: температура смеси поддерживается прежняя, пока не растает весь лед. А если, вместо нагревания ту же смесь подвергнуть повышенному давлению, то часть льда, переходя опять-таки в воду, объем которой меньше, тем самым противодействует повышению давления внутри смеси. Смесь жидкой и твердой ртути в случае нагревания реагирует также таянием, противодействующим изменению температуры; но на повышенное давление реакция противоположная — часть ртути замерзает. Почему? Потому что ртуть, как и огромное большинство тел, в твердом виде занимает объем меньший, чем в жидком, и следовательно, росту давления в смеси противодействует не таяние, а замерзание ртути; оно и происходит; вода, по исключению, представляет противоположные отношения объема, поэтому то же противодействие достигается обратным путем.[129] Если в насыщенном растворе какой-нибудь соли находятся ее кристаллы, то, нагревая систему, или охлаждая ее, или варьируя давление, мы получим дальнейшее растворение и осаждение с поглощением, выделением теплоты, изменением объема и давления в сторону, обратную нашему воздействию. Электрон, движущийся с постоянной скоростью в эфире, при всяком изменении этой скорости получает «дополнительную массу» в соответственном направлении; т. е. в системе «эфир — электрон» возникает противодействие изменению скорости. Если в электрическом проводнике циркулирует постоянный ток, то всякое изменение этого тока вызывает так называемую самоиндукцию, которая направлена противоположно этому изменению, уменьшает его и т. п.

    Закон Ле-Шателье формулируется так: если система равновесия подвергается воздействию, изменяющему какое-либо из условий равновесия, то в ней возникают процессы, направленные так, чтобы противодействовать этому изменению.

    Уже давно из опыта известно, что закон этот действителен не только для физических и химических систем, но и для многих других. Так, живые организмы в обычных условиях относятся к внешним воздействиям подобным же образом. Если человеческое тело подвергать охлаждению, в нем немедленно начинают усиливаться окислительные и другие химические процессы, развивающие теплоту; если же нагревать его извне, то повышается потоотделение с испарением, поглощающим теплоту. Таков же смысл «съеживания» от холода, причем уменьшается поверхность охлаждения; и когда черепаха прячется при всяких неблагоприятных влияниях в свой щиток, это опять-таки уменьшение поверхности внешнего воздействия. Согласно закону Вебера — Фехнера по мере роста внешнего раздражения ощущение растет не в такой же мере, а только пропорционально его логарифму, т. е. сравнительно все медленнее;[130] это означает, что вместе с силой внешнего раздражения возрастает все быстрее сопротивление ему, так что до нервных центров энергия наиболее сильных раздражений доходит в наименьшей доле, иначе эти центры с их тонкой чувствительностью, зависящей от нежного строения, быстро разрушались бы. Так, наше зрение еще воспринимает свет звезды 6-й величины; но световое раздражение от солнечного диска приблизительно в десять миллионов триллионов (1013) раз значительнее: какой мозг был бы способен выдерживать непосредственно такие различия силы воздействий?

    Можно путем простого анализа показать, что закон равновесия применим ко всякой системе, сохраняющей данное строение в данной среде. Начнем со сравнительно простого и весьма типичного примера — системы «вода и лед при 0 °C». Пусть она подвергается нагреванию. Согласно современной научной символике это значит, что колебания молекул в окружающей среде становятся более энергичными, а их удары, передающиеся молекулам воды и льда, — более сильными. Эта энергия движения частиц, выражающаяся в их «температуре», есть активность одного порядка с их сцеплением, способна с ним конъюгировать, парализуя его. Так здесь и происходит.

    Нагревшиеся молекулы воды своими усилившимися ударами передают избыток своей энергии движения пограничным молекулам льда. Избыток этот парализуется активностями сцепления льда, пока не уравняется с ними; а тогда получается полная дезингрессия, которая, как мы знаем, вызывает разрыв связи: поверхностная частица льда отрывается, переходит в массу жидкой воды. Вся избыточная тепловая энергия, приобретенная частицей до того момента, ушла на борьбу с активностями сцепления, на то, чтобы парализовать их: поэтому кинетическая энергия самой частицы оказывается не больше, чем была, и по-прежнему измеряется температурой 0 °C. То же происходит и со следующими частицами льда. Таким образом, при нагревании общей массы воды в пограничной со льдом области поддерживается прежний уровень 0 °C, противодействуя этому нагреванию, пока не исчезнет весь лед.

    Если дело идет не о нагревании, а о повышающемся давлении, то это означает, что кинетическая энергия частиц окружающей среды в среднем для каждой частицы не увеличивается, но увеличивается число их ударов, действующих на пограничную область данной системы. И здесь от частиц к частицам прибавляющиеся активности давления передаются внутрь ее. Они увеличивают частоту столкновений между частицами, стремясь тем самым уменьшить размах их движений. И опять-таки эти вливающиеся активности способны конъюгировать и вступать в дезингрессию с сцеплением молекул льда; при дезингрессии они отрывают их и присоединяют к жидкости, а так как объем воды меньше, чем объем льда, то давление тем самым уменьшается.

    Но, как уже упоминалось, вода — исключение. Если взять другую подобную систему, например «твердая ртуть — жидкая ртуть», то наблюдается прямо противоположное. Добавочные активности давления вступают в дезингрессию не со сцеплением частиц твердого тела системы, а с активностями, противодействующими сцеплению в жидкости. Давление уменьшает амплитуду (размах) движения частиц жидкости, так что эта амплитуда становится меньше расстояния между частицами, и они колеблются, уже не заходя друг за друга, не перемешиваясь свободно, а удерживаясь около одного среднего положения: так именно движутся частицы твердого тела. Происходит замерзание некоторой доли жидкости; при этом объем ее, однако, уменьшается, что, как в предыдущем случае таяния льда, уменьшает давление.

    Почему же активности одного рода — сила давления — парализуют путем дезингрессии в двух разных случаях не одинаковые, а прямо противоположные активности, как бы выбирая те, которые надо, по закону Ле-Шателье? Дело именно в выборе и есть, только не в сознательном, разумеется, а в стихийном подборе.

    Молекулярные движения научная теория представляет в виде бесчисленных и разнообразно направленных «бесконечно малых» активностей. Если в систему вступают извне новые такие активности, то, очевидно, следует принять всевозможные их сочетания с прежними, всевозможные элементарные их столкновения, их конъюгации, дезингрессии. Но из этих сочетаний одни будут устойчивы, другие — неустойчивы; первые будут удерживаться, вторые — устраняться подбором.

    Так, в системе «вода — лед» активности внешнего давления должны вступать в дезингрессии частью с движением молекул жидкости, переводя их в твердое состояние, частью со сцеплением молекул льда, расплавляя его. Но так как лед занимает больше объема, чем вода, из которой он получился, то в случаях первого рода от этого давление будет возрастать, в случаях же второго рода оно будет уменьшаться. Спрашивается, какие из этих изменений окажутся устойчивее?

    Ответ зависит от строения системы, в которой эти процессы происходят; пока оно неизвестно, не исключена ни та, ни другая возможность. Но надо вспомнить, что такие же точно процессы шли в системе и раньше, до вступления новых активностей: отдельные частицы воды переходили в лед, увеличивая внутреннее давление, отдельные частицы льда — в воду, уменьшая давление. Если бы те и другие из этих изменений были более устойчивыми, то вся система отнюдь не явилась бы системой равновесия, ее структура непрерывно преобразовывалась бы: в первом случае в одну сторону, во втором — в другую. Этого не было: те изменения, которые переходили известную границу, немедленно оказывались менее устойчивыми и устранялись подбором. Структура систем равновесия для современного научного мышления тем и характеризуется, что они заключают в себе противоположные процессы, взаимно нейтрализующиеся на некотором уровне. Дело представляют таким образом, что на этом уровне напряжения противоположно направленных актив-ностей равны; когда же один из двух процессов, усиливаясь, поднимается над этим уровнем, то напряжение соответственных активностей становится более значительным и поток их направляется в обратную сторону, как вода, поднявшись выше своего среднего уровня, падает вниз. Так поддерживается равновесие, а с ним и устойчивость системы в обычных условиях.

    Теперь можно судить заранее о том, что получится, когда вступающие извне активности давления в различных конъюга-циях и дезингрессиях обусловливают превращение некоторых частиц воды в лед, некоторых частиц льда в воду. Изменения первого рода, еще увеличивая давление, создают новую разность напряжений, которая направляет поток активностей в обратную сторону; следовательно, эти изменения неустойчивы, подбором устраняются. Изменения второго рода, уменьшая давление, которое уже повышено над средним уровнем, уменьшают и разность напряжений и обратного потока активностей не вызывают; а потому они устойчивее первых, подбор для них благоприятнее. Результат именно тот, какой соответствует закону Ле-Шателье: обнаруживается процесс, уменьшающий эффект внешнего воздействия, как бы противодействующий ему.

    В примере с ртутью, напротив, переход твердых частиц в жидкое состояние повышает давление, переход жидких в твердое — понижает. Поэтому при внешнем давлении процессы первого рода как увеличивающие разность напряжений будут менее устойчивы, процессы же второго рода как ее уменьшающие — более устойчивы. Общий результат подбора — обратный предыдущему, опять в согласии с законом Ле-Шателье. И то же, очевидно, должно иметь место для всякой системы равновесия, какие бы активности ее ни составляли, какие бы противоположные процессы в ней ни нейтрализовали друг друга. Например, в нашем организме постоянно происходят процессы, освобождающие и поглощающие теплоту, в приблизительном равновесии по отношению к данной среде; если она изменяется в сторону нагревания, усиливаются процессы, поглощающие теплоту; если в сторону охлаждения, то противоположные — теплообразующие.

    Но все это относится именно к системам равновесия. С неуравновешенными системами дело обстоит совершенно иначе. В них если и идут изменения одновременно в двух противоположных направлениях, то одна из двух групп их устойчивее, а потому целое преобразовывается шаг за шагом в ее сторону. Какие же результаты получаются при внешнем воздействии на такого рода комплексы?

    Иллюстрацией может послужить смесь водорода и кислорода, называемая также гремучим газом. При обыкновенной температуре она кажется вполне уравновешенной системой, никакими нынешними методами нельзя непосредственно обнаружить в ней происходящего химического изменения. На деле оно, однако, происходит: смесь превращается в водяной пар, т. е. процессы соединения водорода с кислородом преобладают над обратным. Но реакция здесь идет так медленно, что нужны, по приблизительному расчету, основанному на наблюдении хода ее при высоких температурах и на формуле изменения скорости реакций Вант-Гоффа, сотни миллиардов лет, чтобы она завершилась. Это система ложного равновесия, как ее обозначают; она не уравновешена химически, а также в смысле температуры, потому что при реакции выделяется теплота и смесь должна, хотя неуловимо, самонагреваться.

    Пусть к ней прилагается внешнее воздействие — нагревание. Внутренние изменения комплекса в эту сторону уже были устойчивее противоположных, то же относится и к вновь присоединяющимся. Не только не возникает противодействия им, но ход соединения водорода с кислородом ускоряется, обусловливая еще прибавочное нагревание смеси, как раз обратное тому, что бывает с системами равновесия. При температурах, близких к обычным, это опять-таки ничтожная, неуловимая величина; но чем выше температура, тем более она возрастает; на уровне около 600 °C она становится так велика, что ускоряет процесс до степени взрыва, в свою очередь дающего нагревание в несколько тысяч градусов.[131] Этот взрыв, однако, не есть нечто новое тектологически — он продолжение того процесса, который шел раньше; изменен только его темп.

    Таково «ложное равновесие». Под этими словами подразумеваются, следовательно, два факта: во-первых, равновесие непрерывно нарушается в определенную сторону, комплекс находится в процессе преобразования; во-вторых, мы непосредственно не замечаем этого благодаря несовершенству наших органов восприятия и методов наблюдения. Когда же мы говорим об «истинном равновесии», то и это отнюдь не означает точного, полного равновесия, а только тенденцию к нему в двухсторонних колебаниях. Если кристалл соли находится в ее насыщенном растворе, то это «истинное равновесие», совершенно так же, как вода и лед при 0 °C. Между растворением частиц кристалла и осаждением других из раствора, между таянием льда и замерзанием воды нет точного равенства во всякий данный момент; но если сейчас перевешивает первый процесс и уклонение от уровня получается в одну сторону, то в следующий момент преобладание перейдет ко второму, колебание направится в другую сторону и т. д.

    Различие между системами равновесия в этом смысле и неуравновешенными, а особенно системами «ложного равновесия», имеет огромное значение не только в познании, но и в практике жизни. Чрезвычайно важно распознавать тот и другой тип, чтобы правильно предвидеть возможности, существующие для той или иной системы. И особенно это важно там, где закон равновесия до сих пор точно не формулировался и планомерно не применялся, в области сложнейших явлений — жизненных, психических и социальных. Проиллюстрируем это на примерах.

    Если травоядной греческой черепахе нанести легкий удар, она немедленно прячет в коробку свою голову, лапы и хвост. Этим уменьшается доступная враждебным силам поверхность, а следовательно, и их непосредственное действие, что вполне соответствует закону Ле-Шателье. Значит, по характеру своих психодвигательных реакций организм черепахи соответствует системам равновесия, тяготеет к устойчивости, консервативен. От черепахи нельзя поэтому ожидать, например, прогрессивного развития деятельности, активного завоевания окружающей среды, к чему способны организмы иного типа.

    Предположим, что черепаха вела бы себя иначе — на внешнее насилие отвечала бы ударами лап и челюстей. По обычному словоупотреблению, это и есть настоящее «противодействие»; но было бы величайшей ошибкой видеть в этом соответствие закону равновесия: это нечто прямо противоположное, и тут надо с самого начала устранить словесную путаницу. Своими «противодействующими» встречными движениями черепаха непосредственно не уменьшала бы, а увеличивала бы ту разность механических напряжений, от которой зависит прямой результат внешнего воздействия; только по дальнейшим последствиям — уничтожению или бегству врага — это могло бы повести к реальному уменьшению вредной активности; но могло бы также — когда враг сильнее — повести и к обратному эффекту. На этом основана известная грубая западня на медведя — бревно, привешенное так, чтобы оно мешало ему добраться до улья и могло качаться, как маятник. Медведь отталкивает его один раз за другим и получает удары все большей силы, т. е. возрастание механической разности сохраняется и накопляется. В законе Ле-Шателье дело идет о внутренних процессах системы, о внутренних перегруппировках ее активностей, непосредственно уменьшающих результат внешнего воздействия. Акты борьбы против причины или носителя этого воздействия отнюдь не таковы; и потому они указывают на то, что дело идет не о системе равновесия.

    Как упоминалось, человеческий организм на усиленное нагревание извне отвечает усиленным испарением воды, при котором теплота поглощается; это вполне согласно с принципом Ле-Шателье и показывает, что в прямых термических отношениях со своей средой организм является системой равновесия. Но часто одновременно с такой реакцией выступают иные, нервно-мускульные: человек начинает обмахиваться веером, открывать окна и т. д. Эти движения сопровождаются переходом химической и механической энергии в тепловую, а следовательно, сами по себе, т. е. взятые независимо от дальнейших результатов, ведут к еще большему нагреванию тканей тела. Отсюда ясно, что по отношению к двигательным нервно-мускульным активностям организм есть комплекс неуравновешенный. И надо помнить, что вообще одна и та же система всегда может со стороны одних входящих в ее состав активностей быть системой равновесия, со стороны других — явно или скрыто неуравновешенной. Так, тот же гремучий газ, химически представляющий при низких температурах ложное равновесие, в смысле механическом может рассматриваться как находящийся в истинном равновесии: на повышенное давление он реагирует увеличением плотности, и наоборот.

    Система равновесия может слагаться из комплексов неуравновешенных, и наоборот. Например, черепаха по типу реакций — система равновесия; но каждая отдельная двигательная реакция есть нарушение равновесия нервно-мускульного аппарата. Неуравновешенный организм состоит из тяготеющих обычно к равновесию клеток и т. п. Да в сущности и вообще тенденция равновесия возникает из бесчисленных частичных нарушений равновесия.

    Огромно значение схем равновесия и неуравновешенности в практической жизни людей. Рассмотрим такой случай: человека преследуют неблагоприятные воздействия среды — обиды, угнетение, потери, разные удары судьбы. Как он будет реагировать на все это? Здесь наблюдаются два основных типа.

    В одних натурах обнаруживаются тенденции к самоограничению: терпение, покорность, смирение; часто еще сокращение потребностей — «аскетизм» и даже сношений с другими людьми — «отшельничество». Каков смысл этих реакций? Внешняя среда своими враждебными силами уменьшает жизненные активности психической системы; а она суживает свои активные проявления, область своих соприкосновений с внешней средой; этим непосредственно уменьшается сумма неблагоприятных воздействий среды, как в нашем примере с черепахой. Очевидно, здесь выступает принцип Ле-Шателье; это тип систем равновесия.

    Другие натуры становятся в боевое отношение к среде, энергично борются против ее враждебных сил, расширяя свои активные проявления, увеличивая их напряженность. Потери энергии, вызванные отрицательными воздействиями извне, еще увеличиваются новыми ее затратами на борьбу, а сумма соприкосновений с внешней средой, глубина проникновения в нее, вообще то, что можно назвать «уязвимой поверхностью», еще возрастают. Это как раз противоположно принципу Ле-Ша-телье и указывает на комплекс неуравновешенного типа.

    Ясно, что натуры первого рода неспособны к практическому прогрессу, развитию своей силы, к победе над средой; натуры второго рода способны или к развитию, к прогрессивным победам над внешними силами, или к деградации через поражения; часто и то и другое смешивается в разных соотношениях, например нередкое среди артистов творческое развитие, соединенное с разрушительным прожиганием жизни; еще чаще одно сменяется другим, неуравновешенность подъема неуравновешенностью регресса, когда, например, среда меняется в резко неблагоприятную сторону; но 'возможна и обратная смена. А натуры, тяготеющие к равновесию, будучи неспособны развивать свое сопротивление среде, по мере его исчерпывания естественно переходят к деградации.

    Но опять-таки надо помнить, что все тектологические определения относительны. Человек, тяготеющий к равновесию в одних областях своей жизни, может являться положительно или отрицательно неуравновешенным в других: «гражданин», даже «революционер» в политической жизни, «обыватель» в семейных отношениях или, например, «обыватель»-во всех соприкосновениях с обществом, «самодур» внутри своего хозяйства и т. п.

    Преобладание тех или иных психических типов зависит от социальных условий — от строения общества, от направления и темпа его развития, в целом и в отдельных группах или классах. Таким образом, и в социальных идеологиях отражаются тенденции, соответствующие этим типам. И так как завершением каждой идеологии, высшей ее характеристикой служит жизненный идеал, то в нем особенно ярко выступает тенденция того или другого типа. Тяготение коллектива к равновесию воплощается в идеалах пассивности и безразличия; самый чистый и законченный из них — это «нирвана» буддистов, абсолютное равновесие души, ее полное успокоение в ничем не возмущаемом созерцании вечности. Сюда же относятся идеалы — мечты; таков христианский идеал с его представлением о справедливости на том свете, о награде страдающим, смиренным и покорным, о наказании злым и гордым, причем и награда, и наказание осуществляются не усилиями самих людей, а божеством, высшей мировой активностью, восстанавливающей нарушенное в земной жизни равновесие. Подобные приятные мечты — одна из психических реакций на враждебные воздействия среды, реакция «самоутешения», вполне соответствующая принципу Ле-Шателье: внутреннее противодействие психики той боли, которая причиняется разрушительными силами извне.

    Другая группа — идеалы социально-практические, активно-организационные. Таков в наивысшей степени идеал трудового коллективизма.

    Первые — свойственны обществам, группам, классам, жизненно-застывающим в сложившихся формах или уже теряющим свою позицию, не способным успешно ее отстаивать; вторые — коллективам растущим, побеждающим стихийные и социальные сопротивления.

    Системы равновесия путем структурных изменений, часто не заметных для прямого наблюдения, могут переходить в неуравновешенные, и обратно. Эти переходы практически очень важны; их чаще всего возможно уловить по изменению реакций системы. Во взаимоотношениях людей и организаций правильные оценки тенденций того или другого рода, особенно в их смене, могут спасать от величайших и непоправимых ошибок. Такие оценки на каждом шагу и делаются людьми на основе «житейской мудрости», т. е. обыденной, обывательской тектологии. Из нескольких наблюдений того, как человек реагирует на те или иные толчки извне, выводят заключение об его общем складе: застойном, тяготеющем к равновесию, или же, напротив, инициативном, порывистом, боевом, — и с этим сообразуются в дальнейших отношениях к нему.[132] Подмечала народная тектология и типы ложного равновесия, о чем свидетельствуют пословицы вроде «в тихом омуте черти водятся». Научной же обработке этот смутный, неточный и неустойчивый опыт не подвергался, и каждый должен был за свой счет его усваивать и оформлять.

    Еще важнее распознавание обоих типов в отношениях между организациями — государственными, партийными, экономическими, культурными, военными, в создании сотрудничества между ними и в расчетах на победу в случае борьбы. Здесь недостаток «практической мудрости» организаций или их руководителей может иметь роковое значение для них.

    Вот, положим, армия, которая на неприятельское наступление отвечает сокращением фронта и переходом на более защищенные позиции, а не наступательными контрманеврами: она имеет вид системы, тяготеющей к равновесию. Но это может и не быть ее действительной тенденцией, а только маскировкой; тогда ее подлинное состояние может быть уловлено на мелких проявлениях ее «духа», по характеру частичных взрывов ее «активности». Но если она на самом деле не способна к инициативе и прогрессивному развертыванию боевого действия, то, выиграв время для перегруппировки, накопления и концентрации сил, она все-таки может вновь превратиться в систему противоположного типа, а противник, потерявший это время, проиграть все там, где имелись условия для полного выигрыша.

    Другой пример. В отсталой стране — сильное прогрессивное движение, складываются и растут демократические организации. Затем надвигается реакция — ряд стеснений, репрессий, ударов, вообще внешних инсультов (враждебных толчков) для этих организаций. Как они отвечают на инсульты? Допустим, расширением и обострением своей деятельности, углублением лозунгов, переходом к более радикальным формам борьбы. Это характеризует данные организации как системы второго типа, т. е. указывает, что возможность их развертывания и победы не исключена.

    Но в идущей борьбе истощаются накопленные силы. И вот наступает время, когда жизненный характер этих организаций как будто меняется. На растущее давление они начинают реагировать уже ограничением своей работы, отказом от более острых форм борьбы, сужением лозунгов. Эти процессы суть внутренние изменения, ослабляющие частично эффект внешних воздействий, т. е. соответствуют типу Ле-Шателье, выражают тенденцию к равновесию. Тогда вопрос решен, дальнейшее торжество враждебных им сил обеспечено: исчезает сама возможность успешной борьбы впредь до новых структурных изменений социальной среды в ее целом.

    Пусть в этом случае какой-нибудь чуткий, опытный политик уловил сущность положения по аналогиям с тем, что он знает лично из жизни или истории. Но ни этого знания в целом, ни жизненной чуткости он не в состоянии передать другим, и потому его выводы неубедительны для других. И, может быть, как раз наиболее живые элементы продолжают затрату сил в ошибочном направлении, против совершающегося поворота колеса истории. Только научная организация опыта допускает настоящее доказательство подобных выводов.

    При всей своей широте и важности принцип равновесия не является особым, самостоятельным тектологическим законом. Он есть частное применение в определенных условиях уже выясненного нами принципа — «аналитической суммы».

    В комплексах равновесия всегда имеются антагонистические активности, взаимно нейтрализующиеся на некотором уровне, как, например, в системе «вода — лед» молекулярное сцепление и тепловое движение частиц, в организме — физико-химические процессы, развивающие и поглощающие теплоту, в обывательской психике — противоположные, взаимно обуздывающиеся группы стремлений и т. п. Если такой комплекс подвергается воздействию, это значит, что в него из внешней среды вступают новые активности, соответствующие той или другой из этих антагонистических групп. Пусть эти группы А и В, внешнее воздействие Bi, однородно со второй из них. Может ли оно полностью и без потери, без частичной дезингрессии, с нею слиться, следовательно, произвести прямые, непосредственные изменения системы в своем направлении на всю свою величину? Как мы знаем, этого быть не может, идеально гармоничное сочетание прежней и новой группы активностей не наблюдается, в том или ином масштабе дезингрессия неизбежна. Следовательно, действующая сумма этой группы активностей будет не B+Bi, а меньше на некоторую величину Вч, т. е. B+Bi—Bs. К первоначальному В реально прибавилось Bi—Bi, что и выражает произведенное изменение в системе. Оно, как видим, меньше действовавшей активности, т. е. дело обстоит именно так, как если бы в системе произошли процессы, «направленные к противодействию», этому нарушающему влиянию, о чем говорит закон Ле-Шателье. Сущность же явления просто в том, что «аналитическая сумма всегда меньше арифметической», как мы знаем из предыдущего.

    К неуравновешенным комплексам этот расчет не относится, потому что новое воздействие там изменяет ход уже идущего структурного преобразования.

    Так вещи, самые отдаленные друг от друга в обыденном опыте, могут объединяться тектологическими законами, охватывающими все действительные и возможные преобразования форм.

