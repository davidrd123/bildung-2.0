  section_title_ru: "Отношение тектологии к частным наукам и к философии"
  ru: |-
    I

    Организационная наука характеризуется прежде всего и больше всего своей точкой зрения. Отсюда вытекают все особенности ее задач, ее методов и результатов. Различие с другими науками в их современном виде выступает уже начиная с самой постановки вопроса.

    Здесь следует установить два существенных момента. Во-первых, всякий научный вопрос возможно ставить и решать с организационной точки зрения, чего специальные науки либо не делают, либо делают несистематически, полусознательно и лишь в виде исключения.

    Во-вторых, организационная точка зрения вынуждает ставить и новые научные вопросы, каких не способны наметить и определить, а тем более решить нынешние специальные науки.

    Всего ближе организационная точка зрения, казалось бы, должна быть наукам биологическим и общественным, которые трактуют об организмах и организациях. Однако она там имеется в далеко не осознанном виде, применяется не целостно и не планомерно. Поэтому во многих случаях достаточно ее решительного и ясного применения к той или иной задаче, чтобы сразу получилось новое освещение всех раньше известных фактов, а затем и новые выводы, иногда глубоко отличающиеся от прежних решений.

    Так, например, весь огромный вопрос об идеологиях, т. е. о формах речи, мышления, права, морали и проч., вопрос, охватывающий обширную область социальных наук, обычно рассматривался вне представления о социальной организации как целом, части которого связаны необходимой жизненной связью. Марксизм впервые определенно выяснил эту связь, но не полностью, а лишь частично, одну ее сторону — зависимость идеологии от отношений производства как форм вторичных или производных от форм основных. Он оставил без выяснения объективную роль идеологии в обществе, ее необходимую социальную функцию: в организованной системе каждая часть или сторона дополняет собой другие части или стороны и в этом смысле нужна для них как орган целого, имеющий особое назначение. В отдельных случаях марксизм подходил к такой задаче, устанавливая, что та или иная идеология служит интересам того или иного класса, закрепляет условия его господства или является его оружием в борьбе против других классов. Но он не ставил вопроса в общей форме и для многих важных случаев брал без критики старые, донаучные формулировки, например искусство считал простым украшением жизни, науки математические и естественные — внеклассовыми, высшие научные истины — чистыми, не зависящими от общественных отношений. Организационная точка зрения сразу изменила эти понятия, устранила их пестроту и неопределенность, указала действительное и необходимое место идеологии в жизни общества. Это организующие формы для всей практики общества, или, что то же, ее организационные орудия. Они действительно определяются в своем развитии условиями и отношениями производства, но не только как их надстройки, а именно так, как формы, организующие некоторое содержание, определяются этим содержанием, приспособляются к нему. Вся идеологическая сторона жизни представляется в новом свете, и целый ряд ее загадок разъясняется сравнительно легко.[98]

    Частная иллюстрация из этой же области — вопрос о происхождении анимизма, т. е. дробления человека и других живых существ, а первоначально и всех вообще объектов природы на «душу» и «тело». Прежние теории анимизма{19} даже не касались того факта, что связь «души» и «тела» имеет вполне ясный социально-организационный характер, именно соответствует той форме сотрудничества, которую я назвал «авторитарной»: отношение активно-властного элемента и пассивно-подчиненного, руководящего и исполнительского. Между тем как только вводится в исследование эта сторона дела, сам собою намечается новый путь к решению задачи. Анимизм оказывается перенесенной в мышление организационной формой трудового бытия людей. При этом является возможность до конца объяснить и все исторические судьбы анимизма: почему его не было, как это теперь признается, в самых первых фазах жизни человечества, до развития авторитарного сотрудничества, почему он усиливается в одни эпохи истории и ослабевает в другие — вслед за ростом или упадком этой социальной формы и т. д.[99]

    В политической экономии многие важные вопросы решаются неверно или остаются нерешенными благодаря неспособности специалистов стать на организационную точку зрения. Яркий пример — теории, касающиеся законов обмена. Господствующая в старой официальной науке школа «предельной полезности» исходит из принципов, которые можно назвать прямо-таки «антиорганизационными»: она берет за основу субъективное отношение отдельного человека к его личным потребностям, индивидуальную психику с ее колеблющимися оценками полезных вещей. Между тем обмен товаров есть выражение организационной связи между людьми в обществе как системе производства; и деятельность отдельной психики с ее субъективными оценками сводится к тому, чтобы приспособлять данное лицо с его хозяйством к объективным, от него не зависящим условиям социальной организации. Никакие субъективные оценки не могут изменить для индивидуума даже той цены товара, которую он находит в данный момент на рынке, а тем более технических условий производства этого товара, являющихся наиболее постоянным моментом в образовании цен.

    Теория трудовой стоимости, напротив, исходит из понятия об общественной организации производства и в этом смысле стоит на организационной точке зрения. Но и она до сих пор проводила ее не вполне законченно; между тем полное и формальное доказательство ее правильности достигается только при дальнейших шагах на этом пути. Оно состоит в исследовании того, при каких условиях взаимного обмена отдельные капиталистические предприятия способны поддерживать и развивать свою долю работы в общей системе производства. Оказывается, что именно при обмене на основе трудовой нормы, со строго определенными и косвенно от нее же зависящими отклонениями.

    На деле всего полнее организационная точка зрения, проводилась до сих пор именно в науках, которые не употребляют самого термина «организация» — в физико-химических. Она только иначе там обозначается — именно как «механическая» точка зрения. Она исследует всякую систему со стороны как отношений внутри ее — между всеми ее частями, так и отношений между нею как целым и ее средой, т. е. всеми внешними системами. Как уже выяснилось, «механизмами» называются сначала те организованные системы, которые планомерно устраиваются самими людьми, а затем все те системы, строение которых удалось познать и сделать понятным в такой же мере, как познается и понято строение этих технически создаваемых систем.

    Однако и в науках физико-химических вполне осознанное и потому до конца последовательное применение организационной идеи может дать новые постановки вопросов. Так, например, в современной физике огромный интерес вызывают споры о «принципе относительности», а его формулировка и исследование всецело основываются на соотношениях между наблюдателями, улавливающими те или иные события, и на условиях сигнализации, позволяющих согласовать их наблюдения. Ясно, что здесь расширяется в организационном смысле понятие физической среды, в него вносятся элементы, прежде не принимавшиеся в расчет, существа исследующие и их взаимоотношения.[100]

    В общих чертах такое доказательство было дано мною сначала в статье «Обмен и техника» в сборнике «Очерки реалистического мировоззрения» (1-е изд. Спб., 1904. С. 279–343). Подробнее и точнее оно развито в первых главах книги: Богданов А. А., Степанов И. И. Курс политической экономии.

    В общем для нас должно быть очевидно, что организационная точка зрения способна давать новую и ведущую к новым результатам постановку самых различных вопросов познания, какие ставились до сих пор.

    II

    Организационная точка зрения порождает также постановку вопросов, которые не могли ставиться отдельными, специализированными науками и которые, однако, должны быть признаны вполне научными вопросами. Это как раз те, которые относятся к единству организационных методов в природе, во всякой практике и всяком познании.

    Имеются, положим, такие научные факты. Глаза каракатицы или восьминога представляют величайшее сходство строения с глазами высших позвоночных, например человека. Те и другие — аппараты гигантской сложности, с сотнями миллионов элементов, высокодифференцированных и стройно связанных между собой. Однако можно считать несомненным, что те и другие развивались совершенно независимо, на двух далеко разошедшихся ветвях генеалогического древа жизни; у общих предков человека и спрута не могло быть глаз в нашем смысле слова, самое большее — пигментные пятнышки в наружном слое тела для усиленного поглощения лучей. Независимость происхождения как бы специально подчеркивается тем обстоятельством, что слои воспринимающей свет сетчатки расположены у высших моллюсков в порядке, обратном расположению однородных с ними слоев у высших позвоночных. Это одно из самых чудесных совпадений в природе.

    Может ли биология как специальная наука поставить и решать вопрос о причинах такого совпадения и такой степени совпадения? Имеется общее положение о том, что сходные функции ведут к развитию аналогичных органов. Но понятие об «аналогии» ничего не говорит о возможности такого поразительного совпадения; «аналогичны», например, роговая верхняя кожица человека, хитинная оболочка насекомого, известковая раковина моллюска и т. п. Биология может проследить две линии исторического развития, ряды переходов, приведшие от простого скопления пигмента независимыми путями к архи-тектурно-тождественным оптическим аппаратам, в миллионы раз более сложным, чем наши микроскопы и телескопы; но сама обособленность обеих линий исключает возможность ответа относительно причин совпадения их предельных результатов.

    Биология на самом деле и не ставила вопроса в такой форме, хотя прошло уже более шестидесяти лет со времени исследований А. И. Бабухина над глазами головоногих. Но с организационной точки зрения он должен быть поставлен. Это частный случай вопроса об единстве организационных методов в природе. И его научное решение должно быть достигнуто на основе анализа и обобщения организационного опыта.

    В физико-химических науках существует «закон равновесия», сформулированный А. Л. Ле-Шателье. Он говорит о том, что системы, находящиеся в определенном равновесии, обнаруживают тенденцию сохранять его, оказывают внутреннее противодействие силам, его изменяющим. Например, пусть в сосуде находятся в равновесии вода и лед при 0 °C и нормальном давлении атмосферы. Если сосуд нагревать, то часть льда тает, поглощая теплоту и продолжая таким образом поддерживать прежнюю температуру смеси. Если увеличить внешнее давление, то часть льда опять-таки превращается в воду, занимающую меньше объема, что ослабляет повышающееся давление. Другие жидкости в противоположность воде при замерзании не увеличиваются в объеме, а уменьшаются; они при тех же условиях смеси, при повышающемся давлении проявляют обратное изменение: часть жидкости замерзает; давление, очевидно, так же ослабляется этим, как и в предыдущем случае. К растворам, химическим реакциям, движениям тел принцип Ле-Шателье применяется на каждом шагу, позволяя в самых различных случаях предвидеть системные изменения.

    Но тот же закон, как показывают многие наблюдения, применим и к находящимся в равновесии системам биологическим, психическим, социальным. Например, человеческое тело на внешнее охлаждение отвечает тем, что усиливает внутренние окислительные и иные процессы, вырабатывающие его теплоту; на перегревание — тем, что повышает процессы испарения, отнимающие теплоту. Нормальная психика, когда в силу внешних условий для нее уменьшается количество ощущений, например когда человек попадает в тюрьму, как бы возмещает этот недостаток, усиливая работу фантазии, а также развивая внимание к мелочам; напротив, при перегрузке впечатлениями понижается внимание, направленное на частности, ослабевает деятельность фантазии и т. п.

    Ясно, что вопрос о всеобщности закона Ле-Шателье не может быть поставлен и систематически исследован никакой из специальных наук: физикохимии нет дела до психических систем, биологии — до неорганических, психологии — до материальных. Но с общеорганизационной точки зрения вопрос, очевидно, не только вполне возможен, а совершенно неизбежен.

    Обычно такие вопросы называют «философскими». В этом названии скрываются две идеи. Первая — именно та, что эти вопросы не подлежат ведению специализированных наук; она вполне правильна. Вторая — та, что эти вопросы не имеют строго научного характера, не исследуются всецело научными методами, а какими-то особыми, «философскими». Она должна быть отвергнута.

    Как было выяснено, и вопросы специальных наук могут ставиться с общеорганизационной точки зрения, т. е. «тектологически». Эта точка зрения всегда шире и потому способна, по крайней мере в некоторых, а может быть, и во всех случаях, приводить к результатам более полным или более точным. Опыт всех наук показывает, что решение частных вопросов обычно достигается лишь тогда, когда их предварительно преобразуют в обобщенные формы; и при этом вместе с первоначально поставленным решается масса других, однородных вопросов. Основное значение тектологии — в самой общей постановке вопросов.

    Отсюда легко устанавливается отношение тектологии к специальным наукам — объединяющее и контролирующее. Весь их материал и все добытые ими результаты законно принадлежат ей как основа ее работы; все их обобщения и выводы подлежат ее проверке со стороны своей точности и полноты, поскольку на той и другой может отразиться относительная узость точки зрения.

    Методы всех наук для тектологии — только способы организации материала, доставляемого опытом; и она исследует их в этом смысле, как и всевозможные методы практики. Ее собственные методы не составляют исключения: они для нее такой же точно предмет исследования, тоже организационные приемы, не более. Так называемую «гносеологию», или философскую теорию познания, которая стремится исследовать условия и способы познания не как жизненного и организационного процесса в ряду других, а отвлеченно, как процесса, по существу отличающегося от практики, тектология, конечно, отбрасывает, признавая это бесплодной схоластикой.

    Тектологию не следует смешивать с философией. Философия при своем зарождении была просто совокупностью тогда еще не разъединенного по специальностям научного знания, связанного наивными обобщающими гипотезами. В эпоху специализации наук она является надстройкой над научным знанием, выражающей стремление человеческой мысли к единству. Но она тем меньше могла его достигать на деле, что сама распалась соответственно основному разрыву социальной жизни на теоретическую и практическую ветви. И та и другая коренным образом отличается от тектологии.

    Практическая философия имеет в виду общее моральное руководство поведением людей. Для тектологии мораль — только предмет исследования, как организационная форма в ряду других; моральные связи людей она рассматривает с той же точки зрения, как связи клеток организма, частей машины, электронов в атоме и т. п. Она так же чужда морали, как математика.

    Философия теоретическая стремилась найти единство опыта, а именно в форме какого-нибудь универсального объяснения. Она хотела дать картину мира, гармонически-целостную и во всем понятную. Ее тенденция — созерцательная. Для тектологии единство опыта не «находится», а создается активно-организационным путем: «Философы хотели объяснить мир, а суть дела заключается в том, чтобы изменять его», — сказал великий предшественник организационной науки К. Маркс.[101] Объяснение организационных форм и методов тектологией направлено не к созерцанию их единства, а к практическому овладению ими.

    Философские идеи отличаются от научных тем, что не подлежат опытной проверке; например, «философский эксперимент» есть совершенно неестественное сочетание понятий. Для тектологии постоянная проверка ее выводов на опыте обязательна: организационные законы нужны прежде всего для того, чтобы их применять; и тектологические эксперименты не только возможны, но, как мы видели, уже существуют. Здесь коренное различие особенно ясно.

    В своей объединительной работе философия не раз предвосхищала широкие научные обобщения; самый яркий пример — идея неуничтожаемости материи и энергии. В этом смысле философия является и предтечей тектологии. Такие философские концепции, как диалектика или как учение Спенсера об эволюции, имеют скрытый и неосознанный, но несомненный тектологический характер. Поскольку они будут исследованы, проверены и организационно истолкованы, они войдут в новую науку, а вместе с тем потеряют свой философский характер. Вообще, по мере своего развития тектология должна делать излишней философию, и уже с самого начала стоит над нею, соединяя с ее универсальностью научный и практический характер. Философские идеи и схемы для тектологии — предмет исследования, как всякие иные организационные формы опыта.

    Тектология — всеобщая естественная наука. Она еще только зарождается; но так как ей принадлежит весь организационный опыт человечества, то ее развитие должно стать стремительно-быстрым, революционным, как она сама революционна по своей природе. Полный расцвет ее будет выражать сознательное господство людей как над природой внешней, так и над природой социальной. Ибо всякая задача практики и теории сводится к тектологическому вопросу: как наиболее целесообразно организовать некоторую совокупность элементов — реальных или идеальных.

