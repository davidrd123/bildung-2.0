    1. Организационная точка зрения в первобытном и религиозном мышлении

    Хотя этой науки до сих пор не существовало, но ее основная точка зрения зародилась на первых же шагах жизни человечества — вместе с началом речи и мышления.

    Первые слова-понятия были обозначением человеческих трудовых действий — обозначением вполне естественным, потому что это были крики усилия, трудовые междометия. Когда они воспроизводились в отсутствие такого усилия, они выражали стремление, призыв к нему или живое представление о нем. Их вызывало, следовательно, все, что достаточно живо о нем напоминало. Вот, например, первичный корень «rhag», или «vrag», имеющий в индоевропейских языках значение «разбивать»; от него происходит и греческое Q'r\ykv[ia — «ломаю», и латинское frango — того же значения, и немецкое brechen, и французское rage — «бешенство», и наши слова «враг», «развить», «раз», и частица «раз» в глаголах; корень этот первоначально представлял, вероятно, просто рычание, которое вырывалось при нанесении удара; он мог выступать на сцену не только при этом акте или как выражение призыва к нему, но и в самых различных условиях, имеющих с ним связь: при виде врага или при мысли о нем, при виде оружия, которым наносится удар, или результатов удара, т. е. чего-нибудь разбитого, сломанного и т. п. Все это непроизвольно обозначалось, вернее отмечалось, тем же звуком: первоначальная неопределенность значения слов-корней, благодаря которой каждое из них могло стать исходным пунктом развития в дальнейшем тысяч других слов, со все более разветвляющимися, но и все более определенными значениями.

    Из этой же самой неопределенности возникло основное условие человеческого мышления о природе: основная метафора. Метафорой, т. е. буквально «перенесением», называется вообще применение слова, обозначающего одно явление, к другому явлению, имеющему с первым нечто общее, например когда поэт называет зарю «кровавой», весну «ласковой», море «грозным». Далекий предок арийских народов не знал, что такое метафора, но самым естественным образом применял тот же корень «par», когда наблюдал или представлял какое-нибудь сокрушительное действие стихийных сил: скалы, все разбивающей и дробящей в своем падении, бури, ломающей деревья, и т. п. Действие стихийное обозначалось тем же словом, что и человеческое. Это и есть основная метафора. Без нее люди не могли бы говорить о внешней природе, а следовательно, и вырабатывать понятий о ней: мышление о мире было бы невозможно{4}.

    В основной метафоре человечество перешагнуло через самую глубокую пропасть своего опыта: через границу между собой и своим извечным врагом — стихиями. Основная метафора — первый зародыш и прообраз единства организационной точки зрения на вселенную. Слово было орудием организации социально-человеческих активностей; между тем оно стало применяться в объединении опыта по отношению к активностям внешней природы: те и другие принципиально обобщались в организационном смысле.

    Первобытное мышление не было системой, не являлось «мировоззрением»: слова-понятия слишком тесно еще связывались с непосредственными действиями и не мыслились в своей особой связи, не группировались специально между собой в одно целое. Эта особая их организация начала создаваться на более высокой ступени развития, а именно тогда, когда в самой жизни мысль уже стала отделяться от физически-трудового усилия: когда появилось разделение людей на руководителей и исполнителей, на организаторов и организуемых. Где один обдумывает, решает и приказывает, а другой выполняет, там образуются как бы два полюса: полюс мысли и слова, с одной стороны, полюс мускульной работы — с другой. Руководителю, например патриарху или военному вождю, приходилось складывать в своей голове план часто очень сложного и обширного дела, состоящего из массы действий, которые будут выполнены другими, подчиненными ему людьми; в этом плане, естественно, мысленные образы или понятия соединялись уже между собой, а не с действиями, которые потом осуществлялись отдельно, хотя и в зависимости от них. Таким путем зарождалась самостоятельная организация мыслей, мышление как система, то, что не вполне точно называют мировоззрением, более правильно — миропониманием.

    При этом начальное единство организационной точки зрения не только сохраняется, но и усиливается. Организация мышления определялась, конечно, организацией труда, средством для которой служила. А для области труда типичным было именно сочетание организаторского и исполнительского действия в их неразрывной связи. По такому типу и мыслились все вообще действия — не только социально-трудовые, но и человеческие индивидуальные, и даже все стихийные. Там, где поступок человека не был обусловлен указанием другого лица — организатора, там принималось, что он сам себе указал, сам для себя явился организатором; таким путем в нем оказывалось две стороны — организаторская, или руководящая, и исполнительская, или пассивная; первая называлась «душой», вторая — «телом». То же относилось ко всякому комплексу внешней природы: животное, растение, камень, поток, небесное тело, все, что воспринималось как нечто действенное, — а ничто иное для примитивного мышления вовсе не существовало, — все это мысленно организовалось по схеме «дух — тело». Непосредственно и наивно признавалось, следовательно, всеобщее единство организационного метода. А сам метод мышления, как видим, взят готовым оттуда же, откуда оно произошло, т. е. из социальной практики, из сферы производства.

    На такой основе становятся вполне понятны и естественны многие заблуждения и «суеверия» наших далеких предков и современных дикарей. Такова, например, вера в заклинания, в силу волшебных слов, и их способность действовать на предметы внешней природы, изменять ход стихийных явлений. Человеческие действия определяются словами, а именно указаниями или приказаниями организатора; если принимается, что такова же сама по себе организация действий стихийных, то очевидно, что и они подчиняются словам, но, конечно, словам компетентного организатора и сказанным надлежащим образом, вразумительно для того предмета или стихии, на которые требуется повлиять. Недаром на русском языке «мир» означает, собственно, общину: для наивного сознания как в общине, так и во всем мире —,связи те же, отношения, те же. Это неизбежная ступень в развитии организационного сознания.

    Первоначальное единство организационной точки зрения сохраняется на всем протяжении эпох авторитарного быта. Мировоззрение их имеет форму «религий», и эти религии представляют устройство мира либо по типу патриархально-родовому, либо по феодальному: в более ранних религиях — отдельные родовые боги, затем объединяющие их племенные; в более развитых — многозвенная цепь богов, из которых более мелкие являются вассалами, более крупные — их сюзеренами, а во главе стоит объединяющий бог-суверен, причем боги подчиненные нередко даже платят дань или приносят жертвы высшим богам. Практическое значение связи людей с богами заключается именно в том, что боги одинаково управляют людьми и вещами и могут в пределах своей области предписывать вещам действия, желательные и выгодные для людей. Мышление все глубоко проникнуто основным, наивным единством метода. И законы природы, и законы жизни людей рассматриваются как совершенно однородные организационные предписания божественной власти; а все знание о них — как ее «откровение», т. е. просто сообщение или опубликование этих предписаний. Нет и мысли о том, что процессы природы, жизни стихийной и социальной могут иметь свои собственные законы, различные для разных областей опыта, что подчинение фактов известным закономерностям и повиновение людей власти — вещи не одного порядка.

    Здесь растущий, кристаллизирующийся опыт все время, как бы автоматически, дополняется по одной схеме: солнце ежедневно совершает путь от востока к западу, потому что так ему указано; болезнь развивается в определенной последовательности, потому что выполняет соответственное веление, и т. п. Самые широкие, наиболее постоянные правильности в опыте — это непреложные предписания высшего божества. На их непреложности основана вся уверенность людей в трудовых расчетах, в планомерных усилиях. Конечно, божество, как и всякий властитель, может в отдельном случае приостановить или отменить действие им же установленного закона; но это будет исключение, «чудо», специальное вмешательство, которое, разумеется, бывает очень редко. Под это понятие подводятся кажущиеся нарушения привычных правильностей жизни, например землетрясения, невиданные эпидемии, разрушительные наводнения и т. п. Таким образом, сама идея закономерности не подрывается ими; понятие «чуда» служит как бы охраной для ее развития, отстраняя от нее все, чего не в силах уложить в нее слишком еще слабое познание.

    Формой, в которой систематизировался тогда опыт, была авторитарная или религиозная традиция. От поколения к поколению передавались «заветы предков; а так как уже весьма рано отношение к отдаленным предкам приняло характер культа и придало мировоззрению тип религиозный, то их заветы воспринимались и усваивались как священные или божественные предания. В них организационный опыт концентрировался в виде обычаев или правил, относившихся и к практике, и к мышлению людей. Все определялось, все регулировалось этими правилами: организация общины и труда ее членов, технические приемы организации вещей, миропонимание, т. е. организация идей. Авторитет, воплощавший в себе опыт прошлого, указывал, как должно жить, как должно работать, как мыслить, даже чувствовать; он систематизировал стихийно выработанные прежними поколениями организационные схемы и методы, облекая их в свои непреложные повеления.

    Сначала авторитарная традиция была всецело устной. Затем ее фиксировало также религиозное искусство; а когда возникли письмена, то ее основное содержание было оформлено в «священных книгах», своеобразных энциклопедиях религиозного мышления. По ним и теперь легко установить особенности этого типа систематизации, резко его отличающие от позднейших типов.

    Главные особенности здесь две: крайний консерватизм форм и отсутствие логического порядка, основанного на разграничении специальных областей опыта. Первая черта вытекает из существа священной традиции: в ней все непреложно, все есть откровение высшего авторитета, которое не может быть изменено человеком. На самом же деле, конечно, и эта традиция изменялась по мере накопления нового организационного опыта, но с такой медленностью, которая делала перемены неуловимыми для тогдашнего сознания людей.

    Вторая черта — отсутствие логического порядка в распределении материала — обусловливалась прежде всего самим способом накопления опыта. Оно происходило стихийно, без определенной связи и последовательности; новое содержание прибавлялось то в одной, то в другой области жизни или мышления и в таком же, более или менее случайном хронологическом порядке переходило в традицию, присоединяясь к откровениям, сгруппированным вокруг того или иного религиозного авторитета. Поэтому в «священных книгах» разных народов можно видеть часто весьма странное для нас нагромождение самых разнородных элементов: подряд правила культа и гигиены, юридические и технические, экономические обычаи и политические доктрины и т. д. Законы о постройке зданий перемешиваются с указаниями из области земледелия и скотоводства, предписаниями относительно костюма и даже ассенизационными (например, в известной книге Левит); теория мировой организации или космогонии — с этическими нормами, этнографией, географией (например, в книге Бытия{5}); гимны о богах — с техникой производства опьяняющих напитков (в индусских Ведах{6}) и т. п. Порядок в этом есть, но не логический, а скорее стихийно-живописный, похожий на обычный путь ассоциации мыслей в нашем сознании.

    2. Организация опыта в обобщающих науках

    Примитивно-беспорядочная систематизация была возможна и жизненно-достаточна лишь вследствие тогдашней бедности организационного опыта: если и не было еще выработано более удобных, более совершенных форм его связи, то все же и в менее экономной группировке он мог, насколько требовалось, быть усвоен людьми, особенно теми, которые специально себя этому посвящали как руководители общественной жизни; а таковыми являлись обыкновенно жрецы. Но с накоплением более широкого опыта прежний метод систематизации неизбежно должен был оказаться неудовлетворительным.

    С одной стороны, консерватизм авторитарной традиции мешал войти в нее возрастающей массе новых, ценных для жизни приобретений; и чем быстрее, чем заметнее и ощутимее для самих людей становится ход прогресса, тем меньше допускала его старая форма, тем меньше все новое могло укладываться в рамки религиозно-непреложного. С другой стороны, само количество материала уже требовало более стройной, более экономной его группировки; иначе его усвоение становилось чересчур трудным, а затем и прямо невозможным. Тогда в системе опыта стал быстро приобретать господство принцип специализации.

    Его основой послужило практическое разделение труда; сущность же заключается в том, что человеческая деятельность раздробляется на отрасли, из которых каждая имеет дело с особым типом объектов природы, развивает свои особые методы и собирает свой специальный опыт. Так, земледелец, сосредоточивая все в большей мере свою работу на возделывании почвы, хранил, совершенствовал, дополнял и передавал своим преемникам ^совокупность технически-организационных приемов и знаний, сюда относящихся; а в прочих областях опыта он довольствовался некоторым минимумом, необходимым для успешности его хозяйства и для поддержания связи с другими членами общества; аналогично поступал в своей сфере труда и мышления каждый ремесленник, купец, солдат и т. д. Разделением функций поле активности для каждого суживалось, но зато успешность усилий возрастала. Во всех отраслях труд становился производительнее, а опыт расширялся с большей скоростью.

    Разделение труда легло в основу преобразования социальной жизни людей вообще, и мышления в частности. Специализация суживала поле работы для отдельной личности, но зато повышала производительность этой работы и облегчала, ускоряла накопление опыта. Кузнец, портной, земледелец, каждый в своей сфере с наибольшей полнотой усваивал приемы и условия производства, завещенные предками, но и сам мало-помалу, вначале незаметно для себя, а потом и сознательно совершенствовал, дополнял методы. Еще легче и чаще подобный прогресс происходил путем заимствования при тех сношениях между жителями разных областей и стран, которые развертывались в обмене товаров, порождаемом тем же разделением труда. В обоих случаях старая организационная точка зрения не могла удержаться: усовершенствованные приемы, новые технически организационные правила уже не были предписаниями и откровениями богов: если они вырабатывались самостоятельно, это было очевидно само собой; если они заимствовались извне, то подчиняться им как велениям чужих богов являлось недопустимым и возможно было принимать их только как полезные знания, не более.

    Так возникло рядом с прежним — религиозным священно-заветным и консервативным — иное знание, не религиозное, «светское» и прогрессивное. Оно естественным образом собиралось и накапливалось по отраслям труда, к которым относилось: знание земледельческое, кузнечное и т. д. Оно передавалось устно и практически от родителей к детям, от мастеров к ученикам: но по мере возрастания его массы это делалось недостаточным, — оно записывалось и вместе с тем приводилось в систему теперь уже совсем нового рода: оно организовывалось так, чтобы затрачивалось как можно меньше труда нашего усвоение и запоминание — по принципу «экономии сил». Это и есть научный принцип: опыт начал организовываться в «науку» или, точнее, в отдельные науки. Знания земледельческие стали материалом агрономии, науки о сельском хозяйстве; знания кузнечные — металлургии; рудокопные — науки горноделия и т. п. Это, как видим, технические науки. Число их возрастало с разветвлением общественного труда и собиранием опыта во всех отраслях; к нашему времени их можно считать сотнями.

    Научная форма систематизации характеризуется методичностью и логической связью в обработке и расположении материала: стремлением к последовательному применению определенных, точно установленных методов, к объединению того, что наиболее сходно, и разъединению того, что наиболее различно. Здесь невозможны такие сочетания разнородного, как в авторитарной традиции, где методичность и логическая связь если не отсутствовали вполне, то были весьма далеки от господства,

    Итак, специализация породила разные технические науки. Но мы знаем, что систематизация опыта отнюдь не ограничивается ими: существуют науки математические, естественные, логические, социальные. Что же они такое?

    Их возникновение связано с фактом или законом величайшей важности: в самых различных областях труда, имея дело с самыми разнородными элементами вселенной, человек на каждом шагу применяет одни и те же приемы и методы, общие для них, наряду, конечно, с приемами и методами специализированными.

    Например, нельзя указать ни одной отрасли труда, где не приходилось бы время от времени прибегать к счету или счислению материалов, орудий, рабочих сил и т. п. В одних отраслях методы счета употребляются особенно часто и нуждаются в особенной практической точности, как, положим, в строительном деле, в торговле; для других они требуются реже, их применения менее сложны, как в скотоводстве, во многих ремеслах. Но всюду они остаются одни и те же; нет особых способов счисления, которые годились бы в одной сфере жизни и были бы непригодны для другой. Поэтому счисление и не могло войти в какую-нибудь отдельную техническую науку или образовать такую науку со своим особым, конкретным объектом в природе. Оно составило науку отвлеченную, т. е. независимую от всякой частной, всякой отдельной практической задачи, — арифметику, а в дальнейшем развитии — алгебру и проч. Ее функция — также организационная, как и функция технических наук, но в несравненно более широком масштабе, для самых разнообразных сторон человеческой деятельности.

    Возьмем другой метод — пространственное измерение и соизмерение; такова сущность отвлеченной науки геометрии. Эти приемы применял уже в первобытную эпоху истории человечества бродячий охотник, рассчитывая расстояния при своих передвижениях, выбирая кратчайшие пути, находя полусознательным расчетом угол, под которым надо бежать наперерез преследуемому зверю, и т. п. С переходом к оседлому земледелию стало необходимым более систематичное и точное применение тех же методов, именно, как приемов землемерия (буквальное значение слова «геометрия»): мир и вся судьба земледельческих общин зависели от правильного распределения земли между ними и внутри их между соседями. Особенно важным являлось усовершенствование этих приемов в странах древнейших цивилизаций, в заливных долинах великих рек Нила, Евфрата и Тигра, Янцзы, Ганга и др. Там при разливах все материальные границы участков то и дело сглаживались, смывались, и надо было восстанавливать их на основании строгих измерений. Еще дальше геометрические приемы необходимо должны были развиваться в строительном и инженерном деле:

    в постройке домов, дворцов, храмов, пирамид, плотин, бассейнов для регулирования уровня рек и пр. Затем те же методы нашли применение при топографических съемках — в военном деле, торговых путешествиях и т. д. Так же существенна их роль в ювелирном деле (шлифовка дорогих камней), а еще более — в приготовлении оптических инструментов; далее — в орнаментике, в живописи (перспектива)… Объекты их всюду самые разнообразные. И опять-таки трудно указать такую область «организации вещей», где геометрия не была бы в той или иной мере руководительницей.

    С астрономией обычно соединяется мысль об отрешенности от всего земного, о чисто познавательном, чисто идеальном интересе. Трудно впасть в ошибку более грубую и наивную: нет науки более непосредственно-практической.

    Еще в эпохи бродячего и кочевого быта донаучные астрономические приемы служили способом ориентировки в пространстве и времени, без чего невозможны никакая техника и организация труда; уже тогда люди отыскивали свой путь среди лесных дебрей и необозримых степей по солнцу и звездам и по ним же определяли время: всякая координация усилий требует их совпадения в тех или иных рамках — пространственных и временных. Это же свое первоначальное значение астрономические методы сохранили и во всем дальнейшем развитии.

    При земледельческом оседлом быте потребовалось усовершенствование этих методов, преимущественно для ориентировки во времени: определение сроков полевых работ, а следовательно, точное разделение годового астрономического цикла процессов природы. Особенно необходимо было строгое вычисление времени в странах древних речных цивилизаций для предвидения и регулирования колебаний водного уровня, от которых зависели плодородие почвы и вся судьба общества. Там и выработалась высокоразвитая жреческая астрономия, еще в религиозно-мистических формах. Дальние торговые путешествия, сухопутные и еще более морские с их насущнейшей потребностью в пространственной ориентировке дали следующий толчок развитию астрономии, которая тогда же освободилась от религиозной оболочки. Великий переворот астрономии в начале Нового времени — система Коперника — был в сущности вызван океаническим мореплаванием, дальними колонизационными и торговыми путешествиями: чтобы облегчить мореплавание, и были составлены коллективной работой нескольких десятков астрономов по повелению короля Альфонса Мудрого те новые небесные таблицы, из которых исходил Коперник в создании своей теории.

    Еще больше развилась организационная роль астрономии в современной научно-технической практике, поскольку она нуждается в значительной точности распределения рабочего времени и пространственных отношений труда. Главный и универсальный астрономический инструмент, часы, регулируют всю организацию жизни общества. Без них не были бы возможны не только, например, железнодорожные расписания, но и все расчеты необходимого времени каждой трудовой операции на фабриках, темпа работы машин и т. д. При этом точная проверка и согласование бесчисленных часов, по которым организуются жизнь и работа людей, достигаются лишь астрономическим путем; это одна из функций в непрерывной деятельности обсерваторий. Далее, только благодаря астрономически-угломерным методам возможно такое точное изучение земных рельефов, какое необходимо для проведения железных дорог, гигантских туннелей через горы, каналов и т. д.; эти же методы применяются в устройстве точных инструментов, постройке высочайших зданий и пр. Вся нынешняя мировая система мер — метрическая — получена с помощью астрономических измерений; ее основная единица — метр — есть сорокамиллионная часть дуги меридиана, которую можно было измерить только методами астрономии и геометрии.

    Легко уловить причину, по которой наблюдение небесных тел легло в основу организационного опыта, относящегося к пространственной и временной ориентировке. Для такой ориентировки надо было найти систему особенно устойчивых и прочных взаимоотношений в пространстве и времени. Их удалось найти в астрономических телах: в положении этих тел и их движениях сколько-нибудь заметная роль случайных и мелких влияний совершенно исключается их колоссальными массами и расстояниями.

    И в алгебре, и в геометрии, и в астрономии, несомненно, имеются такие данные или выводы, которые непосредственно не служат для организационных функций, составляющих сущность этих наук. Каждая из них развилась как особая система, которая живет и функционирует в своем целом; а живое целое всегда заключает в себе и части, нужные специально для связи, поддержания, усиления системы, не относясь прямо к ее функциям как целого. Например, всякий трудовой акт, выполняемый человеком, кроме движений, связанных непосредственно с его целью, заключает и множество иных: одни служат для усиления дыхания, для повышения притока крови к работающим центрам мозга и мускулам, для поддержания механического равновесия тела и т. д.; другие даже просто являются неизбежными, хотя бесполезными рефлексами вследствие иррадиации — перехода возбуждения с работающих центров на другие, близко связанные с ними. Или, положим, в машине, кроме генератора силы и рабочего инструмента, прямо воплощающих ее техническое назначение, есть много частей, которые служат для связи механизма, для уменьшения трений и т. п.; а есть и такие элементы, которые сами по себе ни для чего не нужны, но неотделимы от остальных, или которые еще не удалось устранить. То же можно констатировать и для всякого организма, для всякого органа и пр. Науки не представляют исключения. Сущность астрономии не меняется от того, что движения спутников Марса не использованы для определения долгот, как движения спутников Юпитера. Раз небесные тела сделаны орудиями ориентировки, то всякое, самое бескорыстное изучение их означает не что иное, как стремление лучше овладеть этими орудиями, т. е. усовершенствовать организационную функцию данной науки; это объективный смысл усилий познающего, хотя бы тот и не сознавал его.

    Мы не будем останавливаться на механике, физике, химии, которыми организуется, как известно, вся научная техника нашего времени в самых различных ее отраслях. Относительно биологии укажем, что она систематизирует организационный опыт для многочисленных видов человеческой деятельности, направленных к сохранению, к развитию какой-либо жизни или, напротив, к ее разрушению: земледелие, скотоводство, медицина, педагогика, общественная гигиена и проч. пользуются широко биологическими методами. Экономическая наука систематизирует опыт по организации труда и распределения во всем их объеме; ее схемы сотрудничества и присвоения охватывают, следовательно, всевозможные области практики.

    Мы закончим свой ряд иллюстраций на такой абстрактной науке, как логика. Ее организующая функция раскрывается не менее наглядно, если вспомнить ее происхождение. В Древней Греции в период резкого обострения борьбы индивидуальных и групповых интересов выступила школа софистов, которая, стоя на почве этой борьбы, проповедовала крайний субъективизм. Софисты утверждали, что нет общей истины моральной, политической, научной, что эта истина у каждого человека своя и что противоположные утверждения можно доказывать с одинаковым основанием. Взгляд этот в своем последовательном применении означал невозможность для людей взаимно убеждать друг друга и даже вообще столковываться. Между тем планомерная организация всякого практического дела достигается именно таким образом, что участники его прежде всего столковываются — относительно цели, средств, порядка исполнения и т. д.: организационный процесс, выполняемый посредством речи и мышления, в форме «обсуждения». Школа Сократа, боровшаяся против софистов, и выработала формальную логику, систематизированную Аристотелем, чтобы дать нормы. и способы взаимного убеждения людей, обсуждения, ведущего к согласию, т. е. именно взаимного столковывания. Логика оформляет относящиеся сюда организационные методы, имеющие силу не для какой-нибудь одной, а для всех специальных отраслей жизни.[87]

    Итак, мы видим, что науки отвлеченные охватывают ту долю организационного опыта, которая не ограничена рамками отдельной технической специальности, — ряд общих методов, которые применимы во всех или по крайней мере во многих из них. Если это верно для таких крайних по абстрактности наук, как математика, астрономия, логика, то тем более оно несомненно для других наук — естественных и социальных.

    Но господство принципа специализации не было поколеблено развитием этих наук: они сами подчинились ему и стали особыми специальностями, самостоятельными настолько же, как любая специализированная отрасль труда. Их прогресс был облегчен и ускорен этим, но их жизненный смысл был затемнен. Понимание их практической сущности, их общеорганизующей функции стало невозможным для их представителей, ученых специалистов, у которых поле труда — мышления оказалось соответственно суженным, а организационная роль их наук в ее социальном масштабе — недоступной восприятию. Создалась идея о «чистой истине», истине самой по себе, независимой от какой бы то ни было практики, тогда как в действительности истины отвлеченных наук независимы лишь от узкой, специализированной практики той или иной отдельной отрасли труда, но относятся ко всей трудовой практике в ее социально-историческом целом. Идея «чистой истины» преобладает и в мировоззрении нынешних людей науки.

    Разумеется, и они не могут не видеть, по крайней мере некоторых, практических применений «чистой истины»; но они их рассматривают как нечто случайное для истины, не входящее в ее сущность, не необходимое для нее; истина представляется им принадлежащей к особому, логическому миру, который выше жизни, почему истина и способна при случае руководить жизнью.

    Насколько сужен кругозор специализированного мышления, особенно ярко показывает пример астрономии. Многие ученые и мыслители писали об ее полезности, о тех реальных услугах, которые она оказывает технике; указывались ее применения в земледелии, мореплавании и пр. Но насколько я знаю, ни один не заметил того непреложного факта, что астрономия координирует и регулирует всю нашу социально-трудовую жизнь, ежедневное общение людей и связь их действий во времени и пространстве. Ни один не заметил, что всякое применение часов подчиняет нас астрономическому опыту, которым они произведены и который непрерывно их контролирует, и что это же можно сказать о всяком случае сколько-нибудь точной ориентировки в направлениях.

    3. Народная тектология

    Никакой специалист не может жить всецело и исключительно в своей специальности: его знания и опыт неизбежно выходят за ее пределы в силу связей и общения с другими людьми. Например, как потребитель, он должен иметь понятие о самых различных продуктах других отраслей труда; как отец и муж — о потребительном семейном хозяйстве и воспитании детей; как гражданин — о государственной связи и т. д. Но между тем как в своей специальности он стремится к точному оформлению опыта, к его определенности, полноте и стройности, к его научной организации, во всех других областях он довольствуется минимальными, отрывочными знаниями, неопределенным и смутным «обывательским» или «житейским» опытом.

    Этот житейский опыт играет огромную роль в жизни и служит прочным цементом для разрозненного, анархичного по своей форме коллектива. И притом этот опыт сравнительно однороден и однообразен у всех живущих в одной социальной среде. При всей своей ненаучности он отличается огромной широтой и общностью своего содержания. Он относится к самым различным сторонам жизни: к организации вещей, по крайней мере в домашней обстановке; людей — в семье, в обыденных соседских и иных отношениях; к организации идей — в так называемом «общественном мнении».

    В этом житейском опыте — не полном, но разностороннем, не научно-оформленном, но практически-жизненном — продолжает удерживаться наивное единство организационной точки зрения, стихийная, но глубокая тенденция к единству организационных методов.

    Основным его хранилищем служит общенародный язык. Правда, и в его области на почве специализации обособляются, как ветви от одного дерева, отдельные частичные отрасли — технический язык той или иной профессии, терминология той или иной науки; а классовое расчленение общества порождает и более обширное расхождение диалекта господствующих классов и диалекта подчиненных масс. Но остается значительное общее ядро языка — необходимая связь социальных групп и классов, условие их достаточного взаимного понимания при их практическом общении. В нем-то и кристаллизованы, элементарно оформлены традиции прошлого, опыт тысячелетий.

    Общенародный язык во всей широте сохраняет основную метафору. В нем суждения или «предложения», относящиеся к человеческим и социальным активностям, организуются совершенно одинаково с теми, которые относятся к активностям стихийным; например, подлежащим может являться предмет живой или неодушевленный, конкретный или отвлеченный, символ тела, или процесса, или действия; один и тот же глагол, одно и то же прилагательное может выступать как сказуемое при всех этих разнородных подлежащих, т. е. как их прямая характеристика. Соответственно расчленению семьи, этой до сих пор основной социальной ячейки, все комплексы внешней природы, все абстракции идеального мира в большинстве языков разделяются на мужчин, женщин и сексуально неоформившихся детей, ибо никакого иного смысла не имеет деление существительных на роды: мужской, женский и средний. Этот своеобразный монизм легко проследить по всей линии грамматики.

    Не менее сильна и еще более глубока та же тенденция в «лексиконе» языка, т. е. в его словесном материале. От любого из первичных корней, означавших коллективно-трудовые действия, расходится потомство в целые тысячи слов-понятий; оно распространяется по всем областям опыта — физического и психического. Из одного индогерманского корня «шага», общий смысл которого — разбивать, дробить, через массу переходов и промежуточных оттенков вышли такие слова, как в русском «молот» и «малый», «смерть» и «море», «молодой» и «медленный»; в немецком «теег» (море) и «erde» (земля), «mord» (убийство) и «mild» (мягкий, нежный), «mal» (раз) и «schwarz» (черный) и т. п.{7}. Во всех них при достаточном исследовании обнаруживается одна и та же идея, имеющая огромное значение для всего организационного опыта, — идея деления на части в разных видах и приложениях.[88] С русским глаголом «крыть» связано множество слов: «кора», «корень», «короб», «корабль», «череп» — «черепаха» и проч.; в других родственных языках таких слов тоже много, например немецкое «korb», французское «corbeille» корзина, французское «ёсогсе» — кора, «сгой-te» — корка и пр. Во всех них скрыта идея одного и того же организационного приема, в технике и стихийной природе: соединение менее устойчивого, более нежного содержания с более прочной оболочкой, защищающей его от разрушительных внешних воздействий. В греческом от корня «rdj», опять-таки распространенного и в других родственных языках, происходят слова «таттейн» — строить, «тектон» — строитель, «таксис» — боевой строй и вообще порядок, «технэ» — ремесло, искусство, «текнон» — дитя и масса других аналогичных. При величайшей разнородности этих понятий во всех них заключена общая идея организационного процесса.[89]

    Нередко слово сохраняет организационную идею там, где раздробленное мышление личности уже совершенно утратило ее. Например, организующая роль религии в социальной жизни вполне ускользает от обыденного среднего сознания нашей эпохи.

    Между тем само слово вполне ясно указывает на эту роль, происходит ли оно от «religare» (латинское — связывать) или от «relegere» (собирать). Аналогичным образом если не состав, то употребление слова «душа» в русском и других родственных языках, если его внимательно проследить, дает разгадку одной из наиболее темных тайн науки и философии. Оно часто применяется в смысле «организатор» или «организующее начало», например такое-то лицо — «душа» такого-то дела или общества, т. е. активный организатор хода работ или жизни организации; «любовь — душа христианства», т. е. его организующее начало, и т. п. Из этого ясно, что «душа» противополагается телу именно как его организатор или организующее начало, т. е. что тут «простое перенесение на человека или на другие предметы понятия об определенной форме сотрудничества», разделения организатора и исполнителя, или авторитарной трудовой связи. А это и есть действительное решение вопроса о том, как произошла идея «души». Коллективный гений языка в этом случае, как и во многих других, оказался выше индивидуальных усилий ученых-специалистов, детей разрозненного, анархичного общества{8}.

    Далее, житейский опыт сохраняется и в более сложных формах так называемой народной мудрости: в пословицах, притчах, баснях, сказках и т. п. Многие из них являются выражением самых широких законов организации в обществе и природе. Например, пословица «где тонко, там и рвется» есть образное, не научное, но верное выражение самого общего закона, по которому происходит дезорганизация на всех ступенях вселенной; какое бы то ни было целое начинает дезорганизовываться, если только в одном его пункте сопротивление окажется недостаточным сравнительно с действующей извне силой: ткань — там, где она всего тоньше; цепь — там, где есть непрочное или проржавевшее звено; организация людей — там, где связь ее слабее; живой организм — там, где его ткани менее защищены; научная или философская доктрина — там, где соединение понятий уязвимее для критики, и т. п. Пословица «куй железо, пока горячо» есть отнюдь не только техническое правило для кузнечного дела; она — принцип всякой практики, всякого организационного и дезорганизационного дела; она указывает на необходимость использования благоприятных его условий ввиду их ограниченной длительности и безвозвратного значения их потери. Правило это одинаково важно и для земледельца — по отношению к условиям посева или жатвы; и для политика или стратега — по отношению к изменяющимся комбинациям сил общественных или боевых; и для художника или исследователя — в смысле счастливого для работы сочетания внешних условий или психофизиологического состояния, так называемого вдохновения; и для влюбленного, и т. д. Притча о прутиках, которые легко ломает ребенок, и о составленном из них венике, которого не может сломать сильный человек, есть народно-образное выражение всеобщей идеи организации; оно также равно применимо и к людям, и к вещам, и к идеям. Конечно, не все воплощения народной мудрости так широко и глубоко охватывают организационный опыт; но они все относятся к нему не в узкоспециальном масштабе, а тяготеют к распространению через рамки отдельных отраслей жизненной практики и мысли.

    Однако этот монизм народной тектологии не в силах сам по себе бороться с духом специализации и все в большей мере уступает ему господство над общественным сознанием параллельно ходу технического и идейного прогресса. Дело в том, что житейская мудрость не только ненаучна по форме, но и глубоко застойна по своей основной тенденции, принадлежит прошлому и стремится сохранить его; по отношению к ней специализация выступает как прогрессивная линия жизни. Однако, разбивая монизм наивный и консервативный, она же вызывает зарождение иного монизма, научного и прогрессивного, который жизненно выше ее настолько же, насколько она сама выше народной тектологии.

    4. Расхождение и перенесение методов

    Специализация — необходимый этап в прогрессе форм организационного опыта. Благодаря ей в каждой отрасли труда и познания было собрано огромное количество материала и методы совершенствовались несравненно быстрее, чем это было раньше. Но она имеет и другую сторону, которая с ее развитием выступает все сильнее и резче.

    Специализация ведет к расхождению методов. Развиваясь самостоятельно, каждая отрасль, практическая или научная, идет своими особыми путями и все более отдаляется от других. Вследствие этого их общение между собой уменьшается, а это ведет к их еще большему взаимному отдалению. Методы одной не подвергаются влиянию методов другой, между ними не происходит заимствований. В каждой создается свой особенный язык, так что даже вполне сходные соотношения в них выражаются различно, и этим маскируется само сходство; а в то же время одинаковые слова получают совершенно разное значение, чем взаимодействие отраслей еще более затрудняется. И это особенно относится к тому, что больше всего повторяется в опыте и, значит, чаще всего выступает в речи. Так, в нашем языке о людях говорится «умереть», о животных же — «издохнуть», а о домашних чаще — «околеть»; о рыбах рыболовы говорят «уснуть», о раках еще «перешептаться», т. е. прекратить свойственное им шуршание, и т. п. То же и в науке. Так, в современной биологии понятие «приспособления» — одно из основных, на нем построена вся эволюционная теория. В политической экономии даже термин «приспособление» не встречается или встречается очень редко, причем обычно принимается за метафору. Между тем по существу своему все экономические процессы суть именно процессы приспособления людей и коллективов к их среде — природной и социальной. Напротив, термин «конкуренция» употребляется и здесь, и там, но в разнородном значении. Конкуренция растений из-за питательных соков почвы, заставляющая их тянуться корнями как можно дальше, во многом отличается от конкуренции торговцев из-за покупателя, побуждающей их уменьшать цены. Это тождество термина породило путаницу понятий и некоторые ошибки так называемого «дарвинизма в социологии».

    Самый типичный и важный для нас пример множественных обозначений, порожденных специализацией и скрывающих принципиальное единство соотношений, — это понятие организационного процесса. Для него в каждой почти отрасли имеется свое особое выражение, и все их обыденное мышление принимает столько же разных понятий. Так, в технике, т. е. в области организации вещей, самый обычный термин — «произвести» тот или иной продукт; это значит сорганизовать определенные элементы внешней среды в заранее намеченную комбинацию. Но относительно здания или корабля говорится «построить», относительно железной дороги — «провести», относительно укреплений — «возвести» и т. д. Основной смысл один и тот же; оттенки же, которые заключены в этих понятиях, всецело зависят от объекта технической деятельности и, следовательно, внедрены в них без всякой пользы, потому что вполне выражаются обозначением этого объекта. К тому же ряду организационных синонимов принадлежат слова «сделать», «изготовить» и другие.

    В области познания, когда дело идет о мысленной организации элементов в планомерное целое, говорится «изобрести», например аппарат, машину; заметим, что это сочетание слов неточно: машину «строят», изобретается же мысленная система связей, которая служит организующим моментом в деле постройки машины. Другой термин — «открыть» (также «установить»), например новую закономерность, означает тоже целесообразную мысленную организацию некоторой суммы элементов, а синонимический оттенок и здесь зависит от объекта. В искусстве — «создать» художественное произведение, «сочинить» роман или поэму (слово «сочинить» по своему построению представляет как бы буквальный перевод для термина «координировать»).

    Очень часто понятие «организовать» выражается посредством слов, означающих главную или наиболее типичную техническую операцию данной отрасли: «сшить» платье или обувь, «выковать» оружие, «нарисовать» картину, «написать» книгу, причем подразумевается вместе с этой операцией весь организационный процесс, часть которого она составляет. А иногда обозначение берется и из области понятий противоположного характера, относящихся к дезорганизации: «разбить» лагерь, «разбить» сад в смысле именно организовать с надлежащим распределением в пространстве. Самый общий термин человеческой практики — «делать» — означает одновременно и «организовать», и «дезорганизовать»{9}.

    Стихийные организационные процессы также в разных науках получают разное название. В биологии чаще всего употребляются для этого термины «приспособление» и «развитие»: первое там, где процесс протекает между жизненной формой и ее средой (например, «приспособление вида к его естественной обстановке»), второе — там, где он идет в самой жизненной форме (например, «развитие организма»), В психологии наиболее обычный термин — «ассоциирование», в социальных науках — «организация». В механике, физике, химии — «образование» (например, механических систем, оптических изображений, химических соединений).

    Все это — лишь очень малая часть имеющихся специальных обозначений одной и той же принципиальной концепции. Как мы видели, каждое из них обладает своим особым оттенком, но взятым всецело от объекта, к которому относится идея организации, следовательно, совершенно ненужным, раз этот объект указан. Однако такова сила тысячелетиями выработанной привычки, что для нас весьма несносно звучали бы выражения: «организовать» здание, корабль, платье, картину, книгу, а они передавали бы идею не только вполне достаточно, но много точнее, чем обычные формулы: «сшить платье», «написать книгу», сводящие сложную систему организационных актов к одной ее части и далеко не самой важной.

    Выработка специального языка не только закрепляла расхождение методов разных отраслей, но и создавала видимость расхождения там, где его на самом деле не было. Даже поскольку общие методы сохранились или независимо возникали в них, специальный язык скрывал это от сознания людей, заставляя усваивать одно и то же под разными именами. Этим исключались общение и сотрудничество отраслей в развитии их методов: каждая была предоставлена себе самой, своим ограниченным ресурсам. Отсюда вытекала бедность комбинаций, замедлявшая и затруднявшая развитие. Часто бывало так, что одна отрасль техники или познания бесплодно билась в рамках своих старых, неуклюжих и уже исчерпанных методов, тогда как в другой отрасли рядом с нею давно существовали, но оставались неизвестными или непонятными для нее приемы, которыми легко разрешались бы непосильные для нее задачи.

    Располагая по отдельности лишь ничтожной частью накопленных в обществе приемов и точек зрения, не имея возможности выбирать из них и комбинировать их наилучшим образом, специалисты не справляются с непрерывно накопляемым материалом, не в силах стройно и целостно организовать его. Получается нагромождение материала во все более сыром виде, нередко подавляющее количеством. Усвоение делается все труднее и вынуждает дальнейшее дробление отраслей на еще более мелкие, с новым сужением кругозора и т. д. Это давно было замечено передовыми учеными и мыслителями, которые и вели борьбу против «цеховой узости», главным образом в области науки.

    Но дробление не было абсолютным; с самого начала имелась и иная тенденция, которая долго не была заметна благодаря сравнительной слабости, но все время пробивала себе путь, и особенно усилилась с прошлого века. Общение между отраслями все-таки было, и методы одних проникали в другие, часто вызывая в них целые революции. И в технике, и в науке ряд величайших открытий, едва ли не большинство их, сводился именно к перенесению методов за пределы тех областей, где они первоначально были выработаны.

    Так, пользование паровыми двигателями переходило из одних отраслей производства в другие, всюду порождая огромный рост производительности труда; в транспорте, например, оно стало широко применяться лишь через десятки лет после того, как преобразовало значительную часть индустрии. Затем в развитии паровых машин большим шагом вперед явилось применение турбинного устройства, давно известного в водяной технике (простейшая турбина — это игрушка, называемая Сегнеровым колесом).

    Дальнейший, еще более крупный шаг был сделан введением «взрывного» принципа, сотни лет уже владевшего техникой войны и разрушения. Двигатели, построенные на этой основе, отличаются большой силой при малом объеме и весе; они завоевали для человечества воздушный океан.

    В технике добывания благородных металлов, ювелирного дела и приготовления лекарств развивались методы точного взвешивания. А. Лавуазье, применив их последовательно в химии, произвел в ней огромный научный переворот. Практические принципы машинного производства, научно оформленные физиками, превратились в термодинамику и затем в общую энергетику; на ней основано все новейшее объединение физико-химических наук. Астрономия была преобразована принципами механики; физиологию сделали точной наукой методы физики и химии. Психология глубоко изменяет свой характер благодаря методам физиологии и общей биологии, тоже вносящим в нее научную точность.

    Перенесение методов вполне объективно и непреложно доказывает возможность их развития к единству, к монизму организационного опыта. Но этот вывод не укладывается в сознании специалиста, как и вообще в обыденном сознании нашей эпохи. Всякий шаг, приближающий к такому единству, встречает сначала ожесточенное сопротивление большинства специалистов, — история науки дает тому массу примеров; и затем, когда объединительная идея одерживает победу, принимается массою специалистов, то они в свою очередь с энергией и успехом разрабатывают ее, но это нисколько не уменьшает их сопротивления следующему шагу. Оно вытекает из самого механизма мысли, порождаемого специализацией; механизм этот таков, что специалист невольно стремится отграничить свое поле работы, знакомое и привычное, от остального опыта, ему чуждого и порождающего в нем чувство неуверенности; там, где границы разрываются, где происходит сближение областей и приемов работы, специалист ощущает это как вторжение чего-то постороннего, даже враждебного, в его личное хозяйство; и усваивать это новое для него несравненно труднее, чем идти по старому, протоптанному пути. Оттого, например, самая широкая и глубокая из объединяющих науки идей XIX века — закон сохранения энергии — так долго должна была пробиваться, пока ее признали.

    Статья Роберта Майера, впервые отчетливо выразившая и обосновавшая этот закон, была отвергнута специальным журналом физики. Дарвинизму пришлось вынести не меньше борьбы с враждебностью научной среды. А раньше Ч. Дарвина известна судьба идей Ж.-Б. А. Ламарка, известна официальная победа противника эволюционной точки зрения Ж. Кювье над ее защитником Э. Жоффруа Сент-Илером. Когда физик Э. Юз открыл случайно электрические волны при помощи своего микрофона, который передал ему на улице, через воздух и стену, колебания электрических разрядов, происходивших в его лаборатории, то друзьям удалось убедить его не опубликовывать этого факта и своего вывода: они говорили, что он «научно скомпрометировал бы себя». И это открытие, сливавшее области явлений света и электричества, пришлось вновь делать Г. Герцу четверть века спустя.

    Даже такие практические, по существу простые идеи, как применение силы пара к водному и сухопутному транспорту, когда она применялась уже как двигатель в промышленности, вызывали недоверие и насмешки авторитетных людей, вроде заявлений: «Это так же вероятно, как путешествие на Конгре-вовской ракете». Для человека, воспитанного в духе специализации, было само собой очевидно, что методы, пригодные для фабрики, не могут быть пригодны для корабля или экипажа. Подобные факты можно приводить без конца.

    5. Современное мышление и идея всеобщего единства организационных методов

    Единство организационных методов, пробиваясь через узкие рамки специализации, так сказать, навязывается новейшим развитием техники и науки. Характерны те способы, которыми современное мышление, обывательское и ученое, избавляет себя от этой неприятно-чуждой ему точки зрения. Прежде всего само понятие «организация» прилагается только к живым существам и их группировкам. Даже технические процессы производства не признаются организационными. Этому сознанию не-цоступен, как бы невидим тот простейший факт, что всякий продукт есть система, организованная из материальных элементов через присоединение к ним элементов человеческой трудовой энергии, что, следовательно, вся техника есть организация вещей человеческими усилиями в человеческих интересах.

    Что же касается продуктов стихийных сил природы, то здесь живой «организации» противопоставляется мертвый «механизм» как нечто по существу иное, отделенное непереходимой пропастью. Между тем если внимательно исследовать, как применяется в самой же науке понятие «механизм», то пропасть немедленно исчезает. Всякий раз, как в живом организме удается объяснить какую-нибудь его функцию, она уже рассматривается как «механическая». Например, дыхание, деятельность сердца долго считались самыми таинственными явлениями жизни; когда удалось понять их, они стали для физиологии просто «механизмами». То же случилось и с передачей нервных возбуждений от органов чувств к мозгу и от мозга к мускулам, когда выяснился электрический характер нервного тока. Между тем разве все эти функции перестали быть частью организационного процесса жизни, его необходимыми и существенными моментами? Конечно, нет. «Механическая сторона жизни» — это просто все то, что в ней объяснено. «Механизм» — понятая организация, и только. Машина потому «не более как механизм», что ее организация выполнена людьми и, значит, принципиально им известна. И собственное тело -х-«не простой механизм» для современного человека по той же самой причине, по которой часы для дикаря или младенца — не мертвая машина, а живое существо. «Механическая точка зрения» и есть единая организационная точка зрения — в ее развитии, в ее победах над разрозненностью науки.

    Как ни забронировано против этой точки зрения мышление современного специалиста, но и его не может не поражать возрастающее применение однородных методов и схем в самых различных отраслях научного опыта. Возникает потребность как-нибудь понять это единство, загадочное для специализированного сознания, воспитанного на разрозненности, ищущего границ, рамок, перегородок, но несомненное и неустранимое. Понять его желательно именно таким образом, чтобы как можно более смягчить его, ослабить его значение, найти, что мнимое, или кажущееся, или субъективное, или искусственное, что оно вовсе не коренится в самой природе вещей, в действительном бытии. В этом желательном направлении работала мысль тех философов, которые были проникнуты духом специализации, т. е. большинства их. Им удалось создать две подходящие к задаче и их настроению теории.

    Первая, кантианская, принимает, что все единство схем и методов зависит исключительно от познающего субъекта, вполне «субъективно». Человек может мыслить только в определенных формах, которые изначально свойственны самой природе его познавательной способности. Эти формы он и навязывает фактам, а потом относит к самой действительности, к природе изучаемого мира, что является заблуждением; он, говоря словами И. Канта, «предписывает природе законы», но только в том смысле, что это законы его собственного познания, от которых он не может уклониться, из рамок которых не может выйти; он укладывает в них опыт, потому что ими он сам ограничен, иных не имеет. Все ему представляется происходящим во времени, в пространстве, в причинной связи и т. п., но это только так «кажется», только «феномен» (видимость, явление); эти «формы» заключаются в нем, субъекте, а не в вещах «самих по себе», не в объекте. Такова основная идея старой «гносеологии», теории познания.

    Вот, например, как применяется эта точка зрения к атомистической теории в физико-химических науках и к родственным с нею понятиям в других областях: «Атомистическая гипотеза является психологически необходимою. Непрерывности мы не можем постигнуть, не расчленяя ее на части; отсюда понятие о времени, о пространстве, о прямой линии, как элементе кривой, об атоме, о клетке, как биологическом атоме, о человеке, как социальном атоме, и т. д. Атомистическая гипотеза выражает не строение тел, а скорее строение нашей познавательной способности.[90]

    По поводу гипотезы В. Крукса о первичном веществе, или «протиле», который, «агрегируясь», т. е. уплотняясь, путем группировки в более тесные сочетания должен был образовать химические элементы (по современным воззрениям, этим «про-тилом», оказались атомы электричества — отрицательные и положительные), тот же автор говорит: «Не протил, — если бы даже он и существовал, — имел стремление к агрегации, а В. Крукс имел такое стремление агрегировать протил, чтобы как-нибудь представить картину… происхождения материи из первовещества»{10}.

    Натяжки в таких рассуждениях обнаруживаются весьма легко. Неправильно уже в понятиях времени и пространства усматривать атомистичность. Атомом называется именно то, чего нельзя расчленить на части, т. е. либо абсолютно невозможно, либо невозможно без изменения самой природы разделяемого. А время и пространство в современном научном мышлении как раз и характеризуются тем, что их можно делить неограниченно, т. е. что они не «атомистичны». Но не это главное.

    Пусть живая клетка — биологический атом, поэтому «психологически необходимо» было признать ее отдельность. Но разве для этого не надо было еще увидать ее в микроскоп? И разве ее увидали в силу этой «психологической необходимости»? Однако пока клетка не была открыта и не были прослежены ее изменения, трансформации, до тех пор не было и мысли о клеточном строении живых тел. Конечно, они представлялись состоящими из тех или иных элементов, но объединяющей схемы клеточной организации не было и быть не могло.

    Выберем иллюстрацию сами. В исследовании электрических и магнитных сил широко применяется схема «притяжение — отталкивание». Она же имеется в массе представлений из других областей науки и жизни: от молекулярных теорий до взаимных отношений между животными разных полов, которые «притягиваются», и одного пола, которые «отталкиваются», или человеческих характеров, или психических образов в сознании и т. п. Очевидно, она тоже «выражает не строение вещей, а строение нашей познавательной способности», тоже «субъективна», т. е. зависит от познающего субъекта. Но если она не зависит от «строения вещей», то она должна бы быть всюду применима: где есть «феномен» притяжения, там в соответственных условиях должен быть и «феномен» отталкивания. К сожалению, этого нет как раз для планетного притяжения, того самого, которое неприятным образом приковывает нас к земле. «Строение нашей познавательной способности», которая «стремится» дополнить притяжение отталкиванием, бессильно дать нам самое важное — факт, который требуется. Ясно, что тут замешано и «строение вещей», что «предписывать законы природе» можно только по соглашению с нею — в борьбе с ее стихийностью и с ее тайнами.

    Верно то, что существуют определенные формы мышления, в которые люди стараются укладывать свой опыт; но это вовсе не какое-то извечное «строение познавательной способности», а просто способы организации опыта; они развиваются и изменяются с ростом самого опыта и сменой его содержания. У дикаря-анимиста «строение познавательной способности» требует, чтобы каждый движущийся предмет — человек, животное, солнце, ручей, часы, — а то и всякий предмет вообще, — имел свою «душу»; у нас эта форма мышления отмирает. Для нас время и пространство бесконечны; но не так это было еще в исторической древности. «Атомизм» возник в античном мышлении тогда, когда в обществе развился индивидуализм — обособление человека от человека; люди привыкли мыслить себя и других обособленными единицами; эту привычку они перенесли и на представление о природе: «атом» ведь означает по-гречески то же, что «индивидуум» по-латыни, а именно «неделимое».

    У одного философа-гносеолога мне случилось видеть ребенка, его сына, который обозначал большой стол и табуретку словами «стол-папа» и «стол-детка». Гносеологу следовало бы понять на этом примере, что такое «формы» или «категории» мышления. Узкий опыт семьи дал ребенку привычную связь подобных предметов разного размера; эта связь и вошла в «строение его познавательной способности», и он старался с ее помощью организовать дальнейший опыт. Так и дикарь, живя в общине, организованной на властном руководстве и пассивном подчинении, мыслит, т. е. организует в своем сознании, весь мир по тому же способу — властный «бог» и подчиненные ему люди и вещи; а также и человека и другие предметы он мысленно организует из властной, руководящей «души» и пассивного «тела».

    Подобным же образом индивидуалистическая разрозненность жизни дала философам схему атомной разрозненности элементов мира и т. д.

    Сущность дела проста. Все эти объединяющие схемы являются средствами организации опыта, ее орудием или «формами». Но орудие организации зависит, конечно, и от того, кто организует, кто, следовательно, это орудие вырабатывает и им пользуется, и от того, что организуется, — от материала опыта. Так ведь и орудие труда должно соответствовать по своему устройству, с одной стороны, руке и силе работника, с другой — свойствам предмета, который этим орудием обрабатывается:

    для дикаря бесполезно тонкое орудие, пригодное для обученного европейского работника, а для обтачивания железа негоден инструмент, подходящий для дерева. В этом нет принципиальной разницы между орудиями материальными и идеальными, как нет разницы и по отношению к исторической изменчивости тех и других.

    Другую точку зрения на объединяющие схемы можно назвать «филологической» или «символистической»{11}. Она очень родственна первой и сводит происхождение этих схем к языку, к словам, и выработке сходных обозначений или символов для разных областей опыта. Вот пример такого истолкования:

    «Одно и то же уравнение — Лапласовское — встречается в теории Ньютоновского тяготения, в теории движения жидкостей, в учении об электрическом потенциале, учении о магнетизме, о распространении теплоты и многих других. Что из этого следует? Эти теории кажутся точно скопированными одна с другой, они взаимно освещаются и поясняются, они заимствуют друг у друга свой язык. Спросите у специалистов по электричеству, какие услуги оказало им изобретение термина „поток силы“, внушенное гидродинамикой и теорией теплоты…» и т. д.[91]

    Здесь главное заключается, пожалуй, в недоговоренности, в том, что не ставится вопрос, почему же одна отрасль опыта может заимствовать у другой ее язык и почему «термины» приобретают такую силу. Внушается мысль, что эта сила присуща символам самим по себе, что «общий язык» и есть достаточное объяснение. На деле вовсе не так. Применение общих терминов иногда только вредит пониманию и ясности, как мы это видели на примере понятия «конкуренции» в общем учении о жизни и в политической экономии. Так же мало принесло пользы науке и создало много путаницы употребление для социального строения и жизни школою «органицистов»{12} того же языка, который применялся для отдельного организма: получилось отыскивание в обществе разных органов и тканей, подобных тканям и органам живого тела, причем создавались искусственные сближения, затемняющие натяжки вместо действительно общих организационных схем.

    В действительности общий язык вынуждается единством организационных методов или форм и выражает его. Он вырабатывается повсюду лишь позже, чем обнаруживается это единство.

    Во многих случаях, где оно уже бросается в глаза, общих терминов все еще нет — они остаются различными благодаря специализированному языку.

    Так, обычное строение растительного семени и яйца может служить ярким примером совпадения независимо сложившихся организационных форм. В обоих случаях имеется зародыш, который окружен питательными слоями, затем более грубой, «скелетного» типа оболочкой. Часто даже аналогичны по химическому составу питательные слои: один с преобладанием азотистых веществ, именно белков и близких к ним тел, другой с преобладанием безазотистых — жировых и сахаристых в яйце, маслянистых и крахмалистых в семени; причем расположение слоев бывает различно. Единство схемы строения замечено здесь весьма давно; но общие термины создаются лишь постепенно, главным образом благодаря развитию органической и физиологической химии.

    Другая иллюстрация. В женском цветке центральное место занимает канал, который является путем для оплодотворения. Спереди он окружен сначала складками более нежного строения тканей, затем более грубого («лепестки венчика» и «чашечка»). В глубине же его заключается орган более или менее грушевидной формы, в котором происходит развитие зародыша («пестик»). Совершенно то же описание архитектуры, за исключением ботанических терминов, может быть применение к женским органам, например обезьяны или человека. Но ясно, что «единство языка» и здесь ведет только к постановке вопроса об единстве схемы строения, а отнюдь его не объясняет и не исчерпывает.

    Несмотря на бесчисленные параллели и совпадения в самых различных сферах опыта, старый мир, анархически-дробный в своей социальной основе, не мог прийти к идее всеобщего единства организационных методов — к задаче всеобщей организационной науки.

    6. Историческая необходимость и объективные предпосылки тектологии

    В первом издании этой книги, за два года до мировой войны и за пять лет до революции, было написано: «Жизненное несовершенство или противоречие специализации, состоящее в том, что она овладевает организационным опытом лишь ценою его возрастающего дробления, которое подрывает его связь в целом, — это противоречие целые века не ощущалось человечеством, потому что не сказывалось в существенных практических неудобствах. Те организационные задачи, которые ставились жизнью, успешно разрешались на основе специализации, потому что это и были задачи частичного характера.

    Общество, построенное на разделении труда и на обмене, не представляющее организованной системы труда в своем целом, и не может ставить свои задачи в ином масштабе, как частичном. Это само собой понятно по отношению к каждому из миллионов отдельных хозяйств или предприятий, образующих такое общество. Существует, правда, и организация государственная, задачи которой формально относятся к обществу в целом. Но и они всегда ставятся в специализированном виде, как военная, финансовая, полицейская и т. д., при всей широте вполне частичные по своему содержанию. Конечно, и науки, систематизирующие организационный опыт общества, не могут при таких условиях понимать своих задач в универсальном масштабе.

    Но чем больше общество растет и развивается, тем сильнее и болезненнее для него сказывается его неорганизованность в целом. Гигантская масса живых активностей, в нем непрерывно накопляемая, все труднее и все менее совершенно сохраняет свое равновесие. Острые и хронические болезни социальной системы — бедствия ожесточенной конкуренции, кризисы местные и мировые, возрастающая напряженность борьбы между нациями из-за рынков, безработица, беспощадные классовые конфликты — все это вместе образует грандиозное расточение общественных сил и создает атмосферу всеобщей неуверенности в будущем. Это грозные проявления общих дезор-ганизационных процессов, и борьба с ними при помощи методов частичного характера, какими располагает специализация, по самому существу дела обречена на безуспешность.

    Таким образом сам ход жизни все настоятельнее и неуклоннее выдвигает организационные задачи в новом виде — не как специализированные и частичные, а как интегральные. И вот теперь человечество переживает промежуточную, переходную эпоху: оно еще не в силах приняться за прямое разрешение задач универсальных, но частичные, ему доступные, оно ставит и разрешает во все более широком, по сравнению с прежним — поистине грандиозном масштабе.

    Практически этот процесс выражается в колоссальном росте предприятий, с одной стороны, и классовых организаций — с другой. Из массы предприятий индивидуальных наиболее устойчивыми среди общей социальной неуравновешенности оказываются наиболее крупные; они поглощают другие предприятия и расширяются еще более. Акционерная система, а затем синдикаты и тресты продолжают эту тенденцию гораздо дальше. Существуют предприятия с сотнями тысяч работников и служащих, как акционерные заводы Круппа или американские тресты стальной, нефтяной и другие, — предприятия, из которых каждое охватывает целую отрасль промышленности огромной страны или даже несколько таких отраслей, прежде отдельных. Организации же разных общественных классов — политические, культурные и иные — развиваются еще быстрее, частью уже выходя из государственно-национальных границ и становясь международными, мировыми.

    Но так как неорганизованность социальной системы в целом тем не менее остается, то остается также и коренная неуравновешенность, ее угнетающая, со всеми своими последствиями: и они еще продолжают обостряться благодаря ускоряющемуся росту и усложнению общественного процесса. Представление о необходимости перехода к интегральной его организации завоевывает шаг за шагом почву в сознании мыслящих элементов, специально же — экономистов, социологов и политиков, и не одного только, как было раньше, а самых различных общественных классов. Их радикальное расхождение в смысле интересов, стремлений и понимания путей социального прогресса при этом сохраняется в полной силе: одни полагают, что всеобщую социальную организацию сможет осуществить только, финансово-промышленный капитал, уже создавший картели и тресты; другие возлагают эту роль на государство с интеллигенцией — чиновничьей, ученой и профессионально-технической; третьи находят такую силу в развивающейся организации рабочего класса. Нам нет надобности в данный момент разбирать, какие воззрения правильнее. Достаточно взять то, что в них есть общего, и, основываясь на этом, определить размеры и характер выступающей перед человечеством организационной задачи: они не зависят от того, какая общественная сила вынесет на себе тяжесть этого дела.

    Легко видеть, насколько новая задача несоизмерима со всеми, какие до сих пор ставились и разрешались. Всю сумму рабочих сил общества — десятки и сотни миллионов разнообразно дифференцированных единиц — придется стройно связать в один коллектив и точно координировать со всей наличной суммой средств производства — совокупностью вещей, находящихся в распоряжении общества; причем в соответствии с этой исполинской системой должна находиться и сумма идей, господствующих в социальной среде, иначе целое оказалось бы неустойчивым, механическое единение перешло бы во внутреннюю борьбу. Эта ^триединая организация — вещей, людей и идей — очевидно, не может быть построена иначе, как на основе строгой научной планомерности, а именно всего организационного опыта, накопленного человечеством. Но ясно также, что в своем нынешнем виде, раздробленном, разорванном на специальные науки, он недостаточен для этого. Необходимо, чтобы сам он был организован целостно и стройно, иначе его применение не способно выйти за пределы. дробных, частичных задач. Необходима, следовательно, универсальная организационная наука.

    Было бы величайшей, поистине детской наивностью думать, что единая общественно-трудовая система может быть устроена обыденно-эмпирическим путем, наподобие того, как большинство людей устраивают теперь свое частное хозяйство, или путем простого сговора, парламентского обсуждения и решения и т. п. А между тем это до сих пор довольно распространенное представление. Из трех моментов или сторон общественной активности организация вещей по самому своему объекту, без сомнения, отличается наименьшей сложностью; и, однако, разве была бы мыслима техника машинного производств без точных специальных наук? Когда же дело идет и об организации двух других, гораздо более сложных сторон общественного процесса, и об одновременном их — всех трех — координировании, взаимоприспособлении, то необходимость науки, всех их охватывающей вместе и параллельно, становится наглядно-бесспорной.

    Но такая наука не может возникнуть сразу, без исторической подготовки: организационный опыт развивается непрерывно, его новые формы складываются последовательно, шаг за шагом, Было бы совершенно бесплодно говорить о всеобщей организационной науке, если бы сама действительность не давала ее элементов, если бы не обнаруживалась живая реальная тенденция к ее возникновению.

    С тех пор ход вещей наглядно для всех поставил организационные задачи человечества в мировом масштабе и обнаружил бессилие по отношению к ним старых точек зрения, старых способов мышления. Человечеству нужна принципиально новая точка зрения, новый способ мышления. Но они являются в истории только тогда, когда либо развивается новая организация всего общества, либо выступает новый социальный класс. В XIX в. именно и сложился такой класс — индустриальный пролетариат.

    В его жизненных отношениях, в обстановке его труда и борьбы заключались условия, порождавшие тот способ мышления, которого не было, ту точку зрения, которой не хватало. Требовалось время, чтобы она сложилась, чтобы она была осознана и выражена. Но теперь она достаточно ясна, и очевидны ее основы.

    Препятствием к развитию монистического научно-организационного мышления были специализация и анархическое дробление системы труда. Пролетариат машинного производства в главных и постоянных условиях своей социальной жизни имел исходный пункт для преодоления духа специализации, духа анархии.

    По мере совершенствования машин роль работника при них меняла свой характер. Самое глубокое разъединение в рамках сотрудничества было то, которое обособило организатора от исполнителя, усилие умственное от усилия физического. В научной технике труд рабочего совмещает. оба типа. Работа организатора есть управление и контроль над исполнителем; работа исполнителя — физическое воздействие на объекты труда. В машинном производстве деятельность рабочего есть управление и контроль над «железным рабом» — машиною — путем физического воздействия на нее. Элементы рабочей силы здесь и те, которые прежде требовались только для организаторской функции, — техническая сознательность, соображение, инициатива при нарушении нормального хода дела; и те, которые характеризовали исполнительскую функцию, — ловкость, быстрота, умелость движений. Это совмещение типов весьма слабо выражено в самом начале развития машинной техники, когда рабочий является живым придатком машины, механической сноровкою своих рук восполняющим ее грубые, несложные движения. Совмещение типов выступает резче и определеннее по мере того, как машина совершенствуется, усложняется, приближаясь все более к типу «автоматического», самодействующего механизма, при котором сущность работы — живой контроль, инициативное вмешательство, постоянно активное внимание. Совмещение завершится вполне тогда, когда выработается еще более высокая форма машин — саморегулирующиеся механизмы. Это, конечно, дело будущего; но и теперь объединяющая тенденция выступает достаточно резко, чтоб парализовать в мышлении работника влияние прежнего разрыва «умственного» и «физического» труда.

    Преодолевается также шаг за шагом и другое разъединение работников — их техническая специализация. «Психологическое содержание различных трудовых процессов становится все более однородным: специализация переносится на машину, на рабочий инструмент; а что касается различий в опыте и в переживаниях самих работников, имеющих дело с разными машинами, то эти различия все более уменьшаются, а при высшей технике делаются практически ничтожны по сравнению с той суммой сходного опыта, одинаковых переживаний, которые входят в содержание труда, — наблюдения, контроля, управления машиною. Специализация при этом, собственно, не уничтожается, — отрасли производства фактически не смешиваются между собою, каждая имеет свою технику, — а именно преодолевается, теряет свои вредные стороны, перестает быть сетью перегородок между людьми, перестает суживать их кругозор и ограничивать их общение, их взаимное понимание».[92]

    Что касается возникшей из разделения труда общественной анархии, конкуренции, борьбы человека против человека, то и она по мере развития рабочего класса утрачивает свое разъединяющее влияние на него, потому что в его среде она на деле устраняется. Товарищеская связь в работе, общность интересов по отношению к капиталу порождают сплочение пролетариата в различные классовые организации, которые шаг за шагом, с колебаниями, но неизбежно ведут его к объединению в мировой коллектив.

    Рабочий класс осуществляет дело организации вещей в своем труде, организации своих коллективно-человеческих сил в своей социальной борьбе. Опыт той и другой области ему приходится связывать в свою особую идеологию — организацию идей.

    Таким образом сама жизнь делает его организатором универсального типа, а всеорганизационную точку зрения — естественной и даже необходимой для него тенденцией.

    Это сказывается и в том, как легко освобождается рабочий-специалист от цеховых предрассудков профессии, и в том, как жадно стремятся передовые пролетарии к знанию энциклопедическому, а не узкоспециальному, и в том, как охотно они усваивают во всех областях наиболее монистические идеи и теории. Но это не значит, чтобы новая точка зрения, выступая в массе частных проявлений, могла во всем ее гигантском захвате легко и быстро осознаться, оформиться до конца. Сам индустриальный пролетариат лишь постепенно складывается в новый социальный тип, перевоспитываясь силой жизненных отношений, в которые попал сравнительно недавно. Идеология — вооб-ще самая консервативная сторона социальной природы; выработка нового быта, нового миропонимания, новой культуры — наиболее трудное дело в жизни класса.

    Великий социальный кризис последних лет должен явиться самым мощным толчком к осознанию и оформлению всеоргани-зационной точки зрения. Обе части кризиса — мировая война и вышедшая из нее мировая революция — различными путями ведут рабочий класс в этом направлении.

    Мировая война сама по себе явилась величайшей организационной школой, вызвала беспримерное напряжение организационных способностей всякой личности, всякого коллектива, прямо или косвенно в ней участвовавшего, дала им невиданный по богатству организационный опыт. Этот опыт отличается и исключительно строгой постановкой задачи, которую приходится решать во что бы то ни стало или погибать, и всесторонностью задачи.[93] Единство организационной точки зрения навязывается с величайшей силой и вызывает острую потребность в единстве организационных методов.

    Война была первой фазой великого организационного кризиса; она вызвала вторую фазу — революцию. Рабочий класс революция не только заставила спешно и напряженно организовать свои силы — она поставила его в небывалое положение: по крайней мере в некоторых странах она принудила его взять в свои руки организацию общественной жизни в ее целом. Это положение, безразлично — временное оно или окончательное, изменило для рабочего класса масштаб организационной задачи из ограниченного в универсальный. Чем резче противоречие между характером задачи и неоформленностью организационного опыта, его навыков и методов у рабочего класса, тем ярче выступает необходимость оформления всего этого, тем насущнее потребность во всеобщей организационной науке.

    Так создались все жизненные предпосылки этой науки. Долгим и трудным путем шло к ней человечество. Она есть наука общечеловеческая в высшем и самом полном значении этого слова.

    Ее идея исключалась для старых классов дробностью их бытия, разрозненностью и односторонностью их опыта. Когда силы истории выдвинули новый класс в новой, объединительной позиции, тогда для этой идеи настало время воплощения в жизнь, где она явится предтечей и могучим орудием реальной организации человечества в единый коллектив.

- id: "1.4"
  label: "§ 4."
  chapter_index: 1
  chapter_slug: "glava-1-vvedenie"
  chapter_title_ru: "Глава 1. Введение"
  chapter_subtitle_ru: "Историческая необходимость и научная возможность тектологии"
  section_title_ru: "Прообразы тектологии"
  ru: |-
    Тектология должна научно систематизировать в целом организационный опыт человечества. Каждый человек в отдельности, как мы знаем, обладает некоторой долей этого опыта, не только в своей специальной отрасли, но также — клочками и обрывками — в очень многих других. Эту долю он так или иначе систематизирует, сознательно, а еще больше — бессознательно, и руководится ею в самых разнообразных случаях жизни. Другими словами, у каждого человека есть своя, маленькая и несовершенная, стихийно построенная «тектология». В практике и в мышлении он оперирует «тектологически», сам того не подозревая, подобно тому, как обыватель говорит прозой или, взглянув на часы, устанавливает астрономическую величину, помимо своего ведома и намерения.

    Но и эту обыденную тектологию отнюдь не следует считать просто индивидуальной. Человек получает из своей социальной среды, через общение с другими людьми, наибольшую долю своего опыта, и особенно методов его организации, долю настолько большую, что его личный вклад по сравнению с этим представляет величину несоизмеримо малую и к тому же величину зависимую. Таким образом, и в обыденной тектологии существуют элементы, общие для массы людей, если даже не для всех, элементы, так сказать, общепринятые. Из них мы часто будем исходить в своем анализе; теперь же укажем на основной и важнейший из них. Это — язык. Речь.

    Речь по существу своему есть процесс организационный, и притом универсального характера. Посредством нее организуется всякая практика людей в их сотрудничестве: при помощи слова устанавливаются общие цели и общие средства, определяются место и функция каждого сотрудника, намечается последовательность действий и т. д. Но посредством речи организуется и все познание, все мышление людей: при помощи слов опыт передается между людьми, собирается, концентрируется; его «логическая» обработка имеет дело с словесными знаками. Речь — это первичный тектологический метод, выработанный жизнью человечества; она, поэтому, живое доказательство возможности тектологии.

    Возьмем основной факт развития речи: одни и те же корни в бесчисленных исторически сложившихся вариациях служат для обозначения различнейших явлений и соотношений. Каким путем это могло получиться? Ответ филологов известен: вследствие реальных аналогий между различными явлениями или соотношениями. Но многие корни разветвляются решительно по всем областям опыта. Значит, и цепь аналогий охватывает все эти области. Мы приводили уже примеры таких разветвлений.[94]

    Не надо, разумеется, смешивать филологию с тектологией; не надо думать, что язык и теперь может служить руководителем в исследовании организационных связей. Нет, путь аналогий, которым он идет, часто извилист и сложен, творчество языка стихийно; и то, что очень близко между собой лингвистически, часто бывает очень далеким с точки зрения тектологии, также и обратно. Более того, именно со стороны современного языка — с его специализацией, с его отсутствием общих терминов часто для вполне однородных соотношений в разных областях — тектология встретит величайшие технические препятствия. Но мы должны были указать, что тектологическая тенденция возникла вместе с речью, т. е. с тех пор, как человек стал мыслящим существом.

    Приближение этой тенденции к научным формам выразилось в возникновении философии. Философия стремилась связать в одну научно-стройную систему человеческий опыт, разорванный силой специализации; но она не сознавала своей зависимости от практики жизни и потому не понимала, что решение задачи возможно только на основе объективного преодоления специализации. Решение было до последнего времени объективно невозможным; но философия верила в него и старалась найти его. Она думала представить мир как стройно-единую систему — «объяснить» его посредством какого-нибудь универсального принципа. В действительности требовалось превратить мир опыта в организованное целое, каким он реально не был; а этого не только философия, но и вообще мышление само по себе, своими исключительно силами, сделать не может. Это понял величайший мыслитель XIX в. и философской задаче — «объяснить» мир — противопоставил реальную задачу — изменить его{13}.

    Со времен А. Локка, Д. Юма и И. Канта философия стала превращаться в общую методологию познания, в «гносеологию». Характер задачи был понят уже правильнее; но объем ее был сужен, в чем опять-таки сказалось влияние специализации. Вне своей связи с методами живой практики методы познания не могут быть объяснены и целостно сорганизованы. На этом пути философия ушла в пустые абстракции и выродилась в новую схоластику{14}.

    Первая попытка универсальной методологии принадлежит Гегелю. В своей диалектике он думал найти всеобщий мировой метод, причем понимал его не как метод организации, а более неопределенно и абстрактно — как метод «развития». Уже этой неясностью и отвлеченностью исключался объективный успех попытки; но помимо того, как метод, взятый из специальной, идеологической области, из сферы мышления, диалектика и по существу не была достаточно универсальна. Тем не менее систематизация опыта, выполненная Гегелем с помощью диалектики, превосходила своей грандиозностью все когда-либо сделанное философией и имела огромное влияние на дальнейший прогресс организующей мысли. Универсально-эволюционные схемы Г. Спенсера и особенно материалистическая диалектика были следующими приближениями к нынешней постановке вопроса.

    Эта последняя постановка вопроса отличается, во-первых, тем, что основана на выяснении его организационной сущности, во-вторых, тем, что в полной мере универсальна, охватывая и практические, и теоретические методы, и сознательные человеческие, и стихийные методы природы. Одни другими освещаются и поясняются; вне же такой интегральной постановки вопроса его решение невозможно, ибо часть, вырванная из целого, не может быть сделана целым или быть понята помимо целого. Всеобщую организационную науку мы будем называть «тектологией». В буквальном переводе с греческого это означает «учение о строительстве». «Строительство» — наиболее широкий, наиболее подходящий синоним для современного понятия «организация».

- id: "2.a.1"
  label: "§ 1."
  chapter_index: 2
  chapter_slug: "glava-2"
  chapter_title_ru: "Глава 2"
  group_slug: "organizovannost-i-dezorganizovannost"
  group_label: "А."
  group_title_ru: "Организованность и дезорганизованность"
  section_title_ru: "Организованные комплексы"
  ru: |-
    Первые попытки точно определить, что такое организация, привели к идее целесообразности. Понятие организации относилось тогда, конечно, только к живым существам, и исходным пунктом исследования брался отдельный организм. Целесообразное устройство разных его частей и целесообразная их связь не только были очевидны, но при дальнейшем исследовании этот их характер выступал все полнее и глубже, поражал своим совершенством.

    Идея целесообразности заключает в себе идею цели. Организм, организация имеют свою «цель» и «сообразно» ей устроены. Но цель предполагают кого-то, кто ее ставит и реализует, существо сознательно-активное, устроителя, организатора. Кто же именно поставил организму человека, животного, растения те цели, которые достигаются в его жизненных функциях? Кто устроил органы и ткани сообразно этим функциям? Эта вполне естественная для обыденного мышления постановка вопроса немедленно лишала исследование всякой научности, направляла усилия мысли в области метафизики и религии, приводила к принятию личного творца, бога. И до сих пор жрецы всех религий, христианских и нехристианских, в основу «апологетики», т. е. теоретической защиты религий, кладут «целесообразность» устройства живых существ.

    С развитием науки, однако, выяснилось, что те соотношения, которые выражаются словом «целесообразность», могут возникать и развиваться вполне естественным путем, при отсутствии всякого «субъекта», сознательно ставящего цели, — что в природе существует объективная целесообразность. Она — результат мировой борьбы организационных форм, в которой формы «целесообразные» или «менее целесообразные» разрушаются и исчезают, «более целесообразные» сохраняются: процесс естественного подбора. И само понятие целесообразности оказывается при этом в сущности только аналогией или, вернее, метафорой, способной вводить в заблуждение. Ясно, что оно не годится для научного определения организованности.

    Попытки формально определить организованность как гармонию, или соответствие частей между собой и с целым, также не решают вопроса; это просто замена слова «организованность» его синонимами. Надо именно выяснить, в чем заключается это соответствие, или гармония, а иначе нет пользы ставить одно обозначение на место другого.

    Биологи уже давно характеризовали организм как «целое, которое больше суммы своих частей». Хотя, употребляя эту формулу, они сами вряд ли смотрели на нее как на точное определение, особенно ввиду ее внешней парадоксальности; но в ней есть черты, заслуживающие особого внимания. Она не включает фетиша — ставящего цели субъекта, и не сводится к тавтологии — к повторению того же другими словами. А ее кажущееся или действительное противоречие с формальной логикой само по себе еще ничего не решает: ограниченность значений формальной логики, вполне установлена научно-философской мыслью.

    Что, собственно, подразумевалось под словами «организм есть целое, которое больше суммы своих частей»? В каком смысле или отношении он больше этой суммы? Дело идет, очевидно, об его жизнеспособности, об его силе в борьбе с окружающей средой. В разъединенном состоянии части сколько-нибудь сложного организма обладают жизнеспособностью либо бесконечно малой, либо настолько пониженной, что сумма ее величин, если бы ее удалось численно выразить, была бы, конечно, гораздо меньше величины, соответствующей живому целому: тело, лишенное руки, и рука, от него отрезанная, — достаточный пример. Но исследовать вопрос на таких сложных системах, как организм, и на таких относительных, трудно измеряемых величинах, как жизнеспособность, всего менее удобно; лучше начать с комбинаций более простых.

    Таково, например, элементарное сотрудничество. Уже соединение одинаковых рабочих сил на какой-нибудь механической работе может вести к возрастанию практических_результа-тов в большей пропорции, чем количество этих рабочих сил. Если дело идет, положим, о расчистке поля от камней, кустарников и корней и если один человек расчищает в день 1 десятину, то два вместе выполнят за день не двойную работу, а больше: 2/4—2/2 десятины. При 3, 4 работниках отношение может оказаться еще более благоприятным — до известного предела, разумеется. Но не исключена и та возможность, что 2, 3, 4 работника совместно выполняют менее чем двойную, тройную, четверную работу. Оба случая всецело зависят от способа сочетания данных сил. В первом случае вполне законно утверждение, что целое оказалось практически больше простой суммы своих частей, во втором — что оно практически ее меньше. Первое и обозначается как организованность, второе — как дезорганизованностъ.

    Итак, сущность этих понятий сводится к сочетанию активностей, взятому с его практической стороны; и для полной ясности формулы о целом, которое больше или меньше суммы своих частей, ее надо дополнить этим словом «практически». Тогда она становится простым выражением несомненного, бесспорного факта. И все-таки с логической стороны некоторая парадоксальность в ней остается, по крайней мере для среднего современного мышления. Оно легко представляет себе, каким образом соединение активностей может уменьшить их практическую сумму: это происходит тогда, когда они друг другу противодействуют, вполне или отчасти друг друга парализуют, уничтожают, словом, взаимно «дезорганизуются». Но каким образом величины могут соединяться так, чтобы это увеличивало их практическую сумму? С первого взгляда, здесь получается какое-то создание из ничего.

    В действительности загадка решается просто — надо только представить организуемые активности вместе с теми сопротивлениями, которые они преодолевают. Почему два работника совместно выполняют расчистку поля не в 2, а, например, в 2/2 раза быстрее, чем один? Экономист в ответ на это укажет такие моменты: во-первых, сама совместность работы действует на нервную систему работника оживляющим, ободряющим образом и тем повышает интенсивность труда; во-вторых, соединение двух сил позволяет преодолевать препятствия, каждую из них в отдельности превышающие, а многие препятствия, ее не превышющие, но для нее значительные, осиливать гораздо быстрее. Исследуем оба эти момента, начиная со второго, легче поддающегося анализу.

    Пусть мускульная сила каждого работника в отдельности позволяет ему поднять и перетащить камень весом в 5 пудов, но не больше. Двое могут справиться с камнем, конечно, не в 10 пудов, а меньше, потому что комбинировать усилия нельзя без потери, т. е. без некоторой взаимной помехи: эта сумма всегда окажется меньше, чем результат простого сложения; допустим, она равна 9 пудам. В таком случае камень в 8 пудов для одного работника представляет сопротивление либо вообще непреодолимое, либо вынуждающее к изменению метода работы, значит, во всяком случае к значительной лишней затрате энергии и потере времени, например на раскалывание камня молотом или на устройство рычага для его передвижения. Координация сил двух работников устраняет непреодолимость или надобность в изменении методов. Если же камень меньше 5 пудов, но близок к этому пределу, то отдельный работник вынужден применять к нему наибольшее напряжение, причем он резко истощает свои силы и затрачивает гораздо больше времени, тогда как для двоих этот вес много ниже предельного, они убирают его со средним напряжением и быстро.

    Здесь сопротивления постоянны. Но они могут и изменяться в зависимости от условий самого сотрудничества. Например, пусть два работника должны поднять самих себя из колодца, на дне которого они находятся. Для подъема служит большая бадья, веревка которой перекинута через простой блок и концом доходит до дна, где лежит и сама бадья. Вес этой последней 40 кг, вес каждого работника 70 кг, а сила, с которой он может тянуть веревку, 100 кг. Значит, отдельно ни тот, ни другой поднять себя данным аппаратом не может: специфическая активность равна 100 кг, а сопротивление 40+70=110 кг. Но вместе они в силах поднимать, допустим, несколько меньше 200, а именно хотя бы 180 кг. В таком случае при сотрудничестве они в состоянии поднять себя, потому что вся тяжесть будет 40+70+70, т. е. тоже 180 кг. Сопротивления складываются, но только отчасти, часть же их остается неизменной общей величиной; и хотя суммирование активностей несовершенно, оно все-таки превосходит это частичное суммирование сопротивлений (в одном случае эмпирическая сумма больше 1 ОП каждого из двух слагаемых в 1,8 раза, в другом — 180, т. е. приблизительно в 1,64 раза).

    Что касается «психического» влияния сотрудничества, то оно относится к внутренним сопротивлениям организма. При труде в одиночку работник все действия предпринимает и выполняет за счет собственной инициативы и собственных стимулов; для каждого нового акта ему приходится вполне самостоятельно настраивать соответственным образом свой нервно-мускульный аппарат. В совместной же работе значительная доля этого процесса приспособления идет за счет подражания, т. е. гораздо более механическим, более автоматическим путем, при котором для подражающего внутренние сопротивления организма значительно меньше. Возбуждающее действие видимой успешности работы также сводится к уменьшению внутренних сопротивлений и т. п.

    В общем, как видим, дело сводится к отношению между организуемыми активностями и теми сопротивлениями, на которые они направлены. Организуемые активности складываются не без потери, так что взятая сама по себе их практическая сумма меньше, чем была бы при точном численном их сложении: 5 пудов и 5 пудов дали у нас в результате 9 пудов. Но сопротивления либо совсем не складываются — восьмипудовый камень для одного и для двух работников остается того же веса, либо если складываются, то менее совершенно, чем организуемые активности; здесь это видно на внутренних сопротивлениях организма, связанных с переменами в направлении усилий: если для каждого при самостоятельном переходе от одного действия к другому такое сопротивление равно а, то для двух вместе оно не 2а, потому что на сцену выступает подражание, и для одного из двух, того, который следует примеру другого, эта величина значительно уменьшается: а-\-а дает практическую сумму, например, I'/za.[95]

    Впрочем, дело не только в том, какое сложение совершеннее, какая из двух сумм ближе к математической. Возможен случай, когда специфические сопротивления складываются полностью, а специфические активности — лишь отчасти, и тем не менее организованность налицо. Предположим, что для матери и младенца требуется перемещение из одного пункта в другой. Младенец еще не умеет ходить, следовательно, его специфическая активность по отношению к поставленной задаче равна нулю; сопротивление же — масса его тела — представляет реальную величину. Для матери величина специфической активности реальна и превосходит величину сопротивления; например, первую можно выразить коэффициентом 100, тогда как вторую — 60; т. е. если вес тела матери 60 кг, то это значит, что она могла бы еще пройти требуемое расстояние и в том случае, если бы ее вес увеличился до 100 кг; вес же ее ребенка, допустим, 10 кг. Итак, она берет ребенка на руки и отправляется с ним вместе. Объективный результат больше суммы тех, какие получились бы при отсутствии связи между двумя существами: перемещение их обоих, а не только одной матери, какое произошло бы тогда. А что дают наши суммирования? Специфические активности 100+0 — в сумме даже не 100, а несколько меньше, потому что ребенок не только весом увеличивает работу матери, но, кроме того, стесняет ее движения, препятствуя нормальному положению тела при ходьбе и отвлекая внимание; пусть, поэтому, сумма здесь будет 95. Напротив, специфические сопротивления — вес или масса — складываются без потери: 60+10=70. Но 95 все-таки больше 70, и соотношение обнаруживает характер организованности.

    Итак, организованное целое оказалось на самом деле практически больше простой суммы своих частей, но не потому, что в нем создавались из ничего новые активности, а потому, что его наличные активности соединяются более успешно, чем противостоящие им сопротивления. Наш мир есть вообще мир разностей; только разности напряжений энергии проявляются в действии, только эти разности имеют практическое значение. Там, где сталкиваются активности и сопротивления, практическая сумма, воплощенная в реальных результатах, зависит от способа сочетания тех и других; и для целого эта сумма увеличивается на той стороне, на которой соединение более стройно или «гармонично», заключает меньше «противоречий». Это и означает более высокую организованность.

    Иллюстрация из иной области — симбиоз сувойки и зоохлореллы, одноклеточной инфузории с одноклеточной водорослью, которая в ней живет. Первая принадлежит к простейшим животным, потребляет кислород и выделяет углекислоту; вторая — из простейших растений, заключает в себе зеленые зерна хлорофилла, за счет энергии солнечных лучей разлагает углекислоту, пользуясь ею как материалом для своих тканей, и выделяет кислород. Таким образом, известная доля активностей в материальной форме того или иного вещества, теряемая одним участником симбиоза по непригодности для него, приобретается непосредственно другим, и обратно, а следовательно, сохраняется в симбиотическом целом. Понятно, что это целое практически располагает большей суммой активностей, чем если бы его части существовали отдельно: образец бесконечно распространенного типа организационных связей.

    Элементарная иллюстрация из неорганического мира: миллион мелких кристаллических частиц, вместе весящих 1 грамм, развеивается в пространстве легким дуновением ветра; а связанные в целый кристалл, они испытали бы от такого же воздействия разве лишь легкую вибрацию.

- id: "2.a.2"
  label: "§ 2."
  chapter_index: 2
  chapter_slug: "glava-2"
  chapter_title_ru: "Глава 2"
  group_slug: "organizovannost-i-dezorganizovannost"
  group_label: "А."
  group_title_ru: "Организованность и дезорганизованность"
  section_title_ru: "Активности-сопротивления и типы их сочетаний"
  ru: |-
    Как видим, организационнное исследование совершенно одинаково оперирует и с активностями человеческими, и с иными активностями или «энергиями», свойственными другим живым существам и, наконец, процессам неорганической природы. Понятие «активности вообще» или «энергии» генетически имеет своей основой именно активность человека; она впервые и стала объектов мышления: слова первобытного языка, а значит, и первичные понятия были выражением трудовых действий. К животным понятие «активности» мы относим постольку, поскольку представляем их по образцу людей. К стихийным явлениям идея «работы», а затем более общая и отвлеченная идея «энергии» применяется вследствие того, что в нашем опыте они оказывают на различные комплексы такое же изменяющее действие, разлагающее или комбинирующее, какое достигается человеческими усилиями.

    Этого не надо, конечно, принимать в том смысле, чтобы стихийная активность отождествлялась с нашей, как бывает в наивном мышлении дикарей. Научное познание всегда имеет в виду глубокие различия между той и другой. Но и оно — сознательно или бессознательно — исходным пунктом для выработки понятия энергии вообще брало и варьировало понятие трудового усилия. В русском языке термин «работа» представляет промежуточный оттенок: «трудится» только человек, «работает» и домашний скот, и машина, и сила ветра, причем имеются в виду постоянно механические действия. «Энергия» же охватывает и механическую работу, и все процессы, способные переходить в нее или из нее получаться, следовательно, ей эквивалентные, как тепловые, химические и проч.

    Когда какая бы то ни было активность, разлагающая или комбинирующая, направляется на определенные комплексы, она неизбежно встречает в них сопротивление, более значительное или слабое. Сопротивление это измеряется той суммой усилий или вообще той суммой энергии, которая затрачивается на то, чтобы его преодолеть. Оно дает нам некоторую характеристику самих комплексов: оно зависит от их состава, т. е. от элементов, из которых они образованы, и от строения, т. е. взаимоотношений между этими элементами. Так, сопротивление, которое оказывает организм животного или растения нашему воздействию, определяется и свойствами его органов, тканей, и той связью, которая существует между ними. Сопротивление психических ассоциаций работе познавательного анализа или синтеза обусловливается и материалом представлений, из которого ассоциации образованы, и характером их ассоциативного соединения, формой и степенью прочности их связей.

    Но понятие «сопротивления», не является чем-либо особым и самостоятельным. Это та же активность, но взятая с иной точки зрения — как противопоставленная, другой активности. Когда два человека борются, активность одного есть сопротивление для другого, и обратно. Также если две армии, два класса борются между собою, то активности каждой стороны являются сопротивлениями для другой, дело лишь в точке зрения того, кто обозначает. С точки зрения охотника или наблюдателя, который берет его за центр наблюдаемых фактов, усилия этого охотника представляют активности, а усилия всех животных, на которых он охотится, — сопротивления; но если в центре описания поставить борющееся за свою жизнь животное, то его усилия воплощают активности его организма. Раньше существовала концепция сопротивления абсолютно пассивного или «инерции», которая сама не есть активность, но противостоит активности. Но эта идея разрушена прогрессом науки. Инерция материи, воплощающаяся в ее «массе», оказалась проявлением концентрированной в ней энергии, а именно электрической{15}; «инертные» атомы рассматриваются теперь как поле самых интенсивных процессов вселенной. Таким образом, категории «активность» — «сопротивление» не только вполне соотносительны, но и обратимы: всякая активность есть сопротивление для других активностей, которым она противостоит, а также и наоборот.

    В этом смысле опять-таки нет принципиальных различий в природе; между живым и неживым, сознательным и стихийным и проч.; элементы всякой организации, всякого комплекса, изучаемого с организационной точки зрения, сводятся к: активностям-сопротивлениям.

    Само понятие «элементов» для организационнной науки всецело относительное и условное: это просто те части, на которые сообразно задаче исследования понадобилось разложить его объект; они могут быть как угодно велики или малы, могут делиться дальше или не делиться — никаких рамок анализу здесь поставить нельзя. Элементами звездных систем приходится брать гигантские солнца и туманности, элементами общества — предприятия или отдельных людей, элементами организма — клетки; физического тела — молекулы, или атомы, или электроны — в зависимости от поставленной задачи;

    элементами теоретической системы — идеи, понятия; психической ассоциации — представления, волевые импульсы и т. д. Но как только в ходе исследования любой из этих элементов потребуется практически или мысленно разлагать дальше, он начинает рассматриваться в качестве «комплекса», т. е. сочетания, соединения каких-либо элементов следующего порядка, и т. д.

    Всякое разложение на элементы, реально выполняемое или только мыслимое, есть, разумеется, дезорганизация. Оно для того ведь и делается, чтобы уменьшить сопротивление вещей нашим усилиям, посредством которых мы затем организуем элементы в новые, желательные для нас сочетания. Дезорганизованное целое практически меньше суммы своих частей — это определение само собой вытекает из предыдущего.

    По поводу примера из области сотрудничества уже упоминалось, что общая рабочая сила двух сотрудников может оказаться и меньше суммы их отдельных рабочих сил. Это и есть случай дезорганизации: два работника не помогают, а мешают друг другу. В известной комбинации силы их могут совершенно парализоваться, когда, например, они тянут за одну веревку в противоположные стороны: тогда толчок ребенка приведет в движение всю эту систему. Если же силы тянущих выражаются, положим, 10 и 9 пудами, то практическая сумма, определяющая движение системы, равняется 1 пуду вместо 19.

    Надо заметить, что полной, идеальной организованности в природе не бывает: к ней всегда примешана, в той или иной мере, дезорганизация. Так, даже наилучше устроенное сотрудничество не может быть свободно от всяких, хотя бы минимальных, внутренних помех и несогласованностей, а наилучше сконструированная машина — от вредных трений и т. п. Иногда на одной и той же системе удается фактически наблюдать все переходные ступени от высшей организованности до глубочайшей дезорганизации, как это бывает, например, при постепенно развертывающейся ссоре между близкими сотрудниками или между супругами.

    Естественный магнит, — это, как известно, кусок особой руды, магнитного железняка, — можно значительно усилить, присоединив к нему оправу из мягкого железа, хотя оно само по себе не магнит, или, вернее, активный магнетизм в нем практически бесконечно мал. Этот яркий пример «неорганической» организованности научная теория объясняет таким образом. Частицы железа сами по себе магниты; но в мягком железе они расположены совершенно беспорядочно, повернуты по всем возможным направлениям, и их магнитные действия взаимно уничтожаются в этом хаосе. Но когда они попадают в достаточно сильное магнитное поле, т. е. в сферу значительного магнитного действия, имеющего одно определенное направление, то они в большей или меньшей степени поворачиваются, «ориентируются» по линии этого притяжения, и их собственные действия уже отчасти не уничтожают друг друга, а складываются: оправа становится сама активно-магнитной в целом и усиливает таким образом основной магнит. И здесь дело сводится к более совершенному сложению активностей, при котором они перестают быть взаимными сопротивлениями. Если же сложить два вполне равносильных прямых магнита противоположными полюсами вместе, то их магнитные действия взаимно парализуются, практическая сумма будет близка к нулю; это дезорганизованная магнитная система.

    Третий тип: комплекс, составленный из нескольких человек, не связанных никаким сотрудничеством, но и не враждебных друг другу, из людей «взаимно нейтральных», обладает, в общем, именно таким количеством сил или активностей-сопротивлений, которое равно сумме сил этих отдельных лиц. Газы воздуха при обычных условиях взаимно нейтральны физически; чтобы преодолеть их общее давление, требуется в барометре столб ртути, равный как раз сумме столбов ртути, соответствующих в отдельности давлению кислорода, азота, углекислоты, водяного пара, аргона и проч. Вес мешка с картофелем, или его сопротивление усилиям поднимающего, есть точная сумма веса отдельных картофелин и мешка.

    Первый тип комплексов мы будем обозначать как организованные, второй — как дезорганизованные, третий — как нейтральные.

    Понятие «дезорганизованности», как и «организованности», достаточно выяснено. Но как понимать третий тип — «нейтральные комплексы»? Если в них не наблюдается ни взаимного усиления, ни такого же ослабления активностей, то всего проще, по-видимому, принять, что в них и нет никакого взаимодействия между элементами. Но такой взгляд противоречил бы всем основам современного научного мировоззрения, для которого все связано, все влияет, все действует одно на другое.

    Можно, затем, допустить, что в нейтральном комплексе действия элементов друг на друга слишком незначительны для наших способов восприятия и измерения. Например, согласно закону тяготения вес мешка с картофелем не абсолютно точно должен равняться сумме измеренных отдельно величин веса каждой картофелины и мешка: их взаимное притяжение в зависимости от их расположения в пространстве изменяет эту сумму; но разница неуловима, разумеется, для нынешней научной техники.

    Однако такая точка зрения никоим образом не исчерпывает вопроса; иногда она даже неприменима. Например, если в насыщенный раствор какой-нибудь соли положить кристалл той же соли, то весь комплекс представляется химически и физически нейтральным: обе его части — жидкая и твердая — сохраняют свои свойства, а следовательно, по отношению к этим свойствам целое является простой суммой своих частей. Но нельзя сказать, чтобы между кристаллом и раствором взаимодействие было ничтожным, неуловимо-малым; оно значительно и может быть обнаружено существующими методами; но оно имеет двусторонний характер: раствор разъедает кристалл, отнимая его частицы, и в то же время, становясь благодаря этому пересыщенным, в свою очередь отлагает на него равное количество частиц. Таким образом, кристалл испытывает со стороны раствора параллельно действие дезорганизующее и организующее, а раствор в свою очередь то и другое со стороны кристалла. Равенство организующего и дезорганизующего действия дает нейтральную связь комплекса.

    Это применение к тектологии обычной во всех точных науках идеи подвижного равновесия: там, где нет видимых изменений, принимается наличность двух равных и противоположных тенденций, взаимно маскирующих одна другую. Например, сохранение живого организма — результат равенства ассимиляции с дезассимиляцией в обмене веществ и энергии; сохранение формы водопада — результат равенства непрерывного притока и оттока воды и т. п.

    Яркую научную иллюстрацию трех основных соотношений дает интерференция волн — электрических или световых, воздушных и всяких иных. Накладываясь одна на другую, они могут усиливать или ослаблять друг друга. Пусть две равные световые волны идут таким образом, что подъем одной в точности совпадает с подъемом другой и, следовательно, долина с долиной тоже. Тогда общая сила света, от них воспринимаемого, окажется не двойная, а четверная: 1+1 равняется 4. Если же, напротив, подъем одной вполне сливается с долиной другой, и обратно, то свет и свет вместе дают темноту: 1+1 равняется нулю. Между этими двумя пределами организованности и дезорганизации лежат все промежуточные, и в числе их та идеально-средняя, при которой сила света точно соответствует арифметике: 1+1=2. Это именно тот случай, когда подъем одной волны наполовину совпадает с подъемом, наполовину — с долиной другой. Здесь соотношения организованности и дезорганизации взаимно уравновешиваются, и получается нейтральное сочетание.

    Как видим, только при равновесии противоположных тектологических тенденций священная формула здравого смысла — «дважды два четыре» — осуществляется в самой действительности. Это не мешает ей быть приблизительно верной в массе случаев, потому что организующие и дезорганизующие процессы постоянно сплетаются в нашем опыте, но именно приблизительно. Она вполне точна лишь в предельной, в идеальной комбинации; чем совершеннее способы исследования, тем неизбежнее обнаруживаются уклонения от нее; при достаточной точности анализа никакой случай не оказался бы строго ей соответствующим.

    Разумеется, можно сказать, что два человека и два других человека всегда составляют ровно четыре человека, не больше и не меньше. Но тогда коренная неточность и условность заключаются в том, что реально различные и неравные комплексы — отдельные люди — берутся как идеально равные математические единицы, т. е. в самом обозначении заранее отброшены все неравенства и различия. Произвольность этого приема станет сразу ясна, если мы спросим, составляют ли две женщины и два одноклеточных человеческих эмбриона, начинающие развиваться внутри их организмов, действительно четыре человека.

    Теория служит для практики, счет существует для реального расчета. И хотя, например, для армии подбираются человеческие единицы, сравнительно однородные по силе и выносливости, однако их число есть весьма недостаточное само по себе, данное для военных расчетов, хотя бы и приблизительных. Опыт французских колониальных войн в Северной Африке показал, что при равном вооружении средний арабский солдат в столкновении один на один не хуже среднего французского; но отряд в 200 французских солдат уже фактически сильнее арабской дружины в 300–400 человек; а войско из 10 тысяч французов разбивает армию туземцев в 30–40 тысяч человек. Европейская тактика дает более совершенное суммирование человеческих боевых сил, и математический счет опровергается на деле. Но как первое приближение для практического расчета, он, конечно, остается полезен и необходим.

    В других случаях это первое приближение бывает уже достаточным для обычных потребностей жизни или даже вообще довольно точным. Во всех случаях, где его удается установить и применить, его практически-организационное значение огромное. Таков жизненный смысл математики; без нее невозможна была бы ни научная техника, ни вся современная система производства и рынка, ни планомерное ведение современной войны.

    Легко заметить, что между математикой и тектологией имеется какое-то особенное соотношение, какое-то глубокое родство. Законы математики не относятся к той или иной области явлений природы, как законы других специальных наук, а ко всем и всяким явлениям, лишь взятым со стороны их величины; она по-своему универсальна, как тектология.

    Для сознания, воспитанного на специализации, самое сильное возражение против возможности всеобщей организационной науки есть именно эта ее универсальность: разве допустимо, чтобы одни и те же законы были применимы к сочетаниям астрономических миров и биологических клеток, живых людей и эфирных волн, научных идей и атомов энергии?.. Математика дает решительный и неопровержимый ответ: да, это вполне допустимо, потому что это уже есть на деле, — два и два однородных отдельных элемента составляют четыре таких элемента, будут ли это астрономические системы или образы сознания, электроны или работники; для численных схем все элементы безразличны, никакой специфичности здесь нет места.

    В то же время математика — не тектология, и само понятие организации в ней не встречается. Если так, что она такое?

    Ее определяют как «науку о величинах». Величина же есть результат измерения; а измерение означает последовательное прикладывание, к измеряемому объекту некоторой мерки и, очевидно, исходит из той предпосылки, что целое равно сумме частей. Измерять явление или рассматривать его как величину, т. е. математически, это и значит брать его как целое, равное сумме частей, как нейтральный комплекс. А мы установили, что нейтральный комплекс есть такой, в котором организующие и дезорганизующие процессы взаимно уравновешены.

    Итак, математика есть просто тектология нейтральных комплексов, определенная, раньше других развившаяся часть всеобщей организационной науки. Она обходилась до сих пор без понятий организации-дезорганизации потому, что ее исходным пунктом являются сочетания, в которых то и другое взаимно уничтожается, или, вернее, парализуется.

    Во всех естественных науках различаются два отдела: «статика» — учение о тех или иных формах, взятых в равновесии; «динамика» — исследование тех же форм и их движения в их изменениях. Например, анатомия и гистология организма — это его статика, физиология — его динамика. Статика повсюду развилась раньше динамики, а затем сама преобразовывалась под ее влиянием. Между математикой и тектологией, как видим, аналогичная связь: одна выражает организационно-статическую точку зрения, другая — организационно-динамическую. Эта вторая точка зрения есть и наиболее общая: равновесие всегда только частный случай движения, и притом в сущности, лишь идеальный, — результат вполне равных и вполне противоположно направленных изменений.

    Разумеется, математика исследует и изменение величин, но не касаясь организационной формы тех процессов, к которым они относятся: эта форма предполагается статической, неизменной, а результат всякого такого изменения — новая величина — остается по-прежнему нейтральным комплексом, равным простой сумме своих частей. В математический анализ входят и те случаи, когда величины взаимно уничтожают друг друга, вполне или отчасти, т. е. соединяются в смысле дезорганизации, как положительные и отрицательные величины или же как «векторы»; но это взаимная дезорганизация, величин, и приводящая лишь к новым величинам, — от нейтральных комплексов к нейтральным.[96] Следовательно, эта математическая динамика не есть динамика организационная, не относится к преобразованию организационных форм.

    Итак, для тектологии первые, основные понятия — это понятия об элементах и об их сочетаниях. Элементами являются активности-сопротивления всех возможных родов. Сочетания сводятся к трем типам: комплексы организованные, дезорганизованные и нейтральные. Они различаются по величине практической суммы их элементов.

- id: "2.a.3"
  label: "§ 3."
  chapter_index: 2
  chapter_slug: "glava-2"
