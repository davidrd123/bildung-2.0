  group_title_ru: "Механизм формирующий"
  section_title_ru: "Дезингрессия"
  ru: |-
    Как мы видели, научное определение дезорганизации сводится к тому, что она противоположна организации: там целое практически больше суммы своих частей, тут оно меньше этой суммы.

    Но обычно, когда употребляют слово «дезорганизация» или один из его многочисленных синонимов: «разрушение», «распад», «разложение» и т. п., то мыслится не столько взаимоуничтожение противоположно направленных действий, сколько нечто иное: разрыв каких-либо связей, разделение какого-нибудь целого, обособление его частей. Насколько правильно и точно это понятие?

    Свободно живущая клетка выросла до предельного размера и распадается на две. «Дезорганизация» ли это? Нет, это «размножение», один из процессов, которыми организуется жизнь в природе. Путем подобного прогрессивного разделения клеток идет развитие всякого сложного организма. Следовательно, дело не в простом разрыве связей.

    Вот случай, по внешности вполне аналогичный: капля росы распадается на две или больше. Это «разрушение» гораздо легче, однако воспринимается как дезорганизация. Почему? Из предыдущего опыта известно, что разбившаяся на части капля исчезает быстрее, т. е. сумма ее сопротивлений среде уменьшена; тогда как относительно клетки, разделившейся для размножения, опыт говорит иное. Очевидно, и в обыденном понятии «дезорганизация» по крайней мере скрыто подразумевается уменьшение практической суммы активностей самим способом их сочетания. А оно мыслимо только в таком виде, что некоторая часть их становится сопротивлениями для некоторой другой их части: то соотношение, которое и соответствует нашей научной характеристике дезорганизации.

    По молекулярно-кинетической теории пример с распадением капли можно представить так. В жидкости принимаются две группы молекулярных активностей: «сцепление», т. е. взаимное притяжение частиц, и «тепловое движение», т. е. их кинетическая энергия. Внутри жидкости те и другие активности, если взять их статически, в общей массе, между собою не антагонистичны: движение, удаляющее молекулу от одних ей смежных частиц против линии сцепления, в то же время приближает к другим по линиям сцепления; с одной стороны, активности взаимно вычитаются, с другой — складываются; в суммарном результате — соотношение «нейтральное». Но в одной части капли оно совсем иное: в ее поверхностном слое. Там, если движение молекулы отдаляет ее от других, лежащих глубже частиц воды, то это действие направлено всецело против сцепления жидкости. Следовательно, тут оба типа активно-стей в самом деле антагонистичны, в той или иной мере практически уничтожают друг друга. А разрыв капли означает именно увеличение поверхности, т. е. области этого взаимоуничтожения, дезорганизации.

    Такая схема, впрочем еще недостаточно полна. Следует рассматривать комплексы не только в их внутреннем строении, но и в их отношениях к среде. Для капли росы средою является прежде всего и главным образом атмосфера с заключающимся в ней водяным паром. Частицы этого пара, как и других газов воздуха, согласно кинетической теории находятся в непрерывном движении по неправильным, изменчивым путям, зигзагообразным благодаря частым столкновениям молекул. Ударяясь извне о поверхностный слой жидкости, частицы атмосферного пара действуют по линиям сцепления и при достаточной силе этого действия вступают в состав капли: процесс «осаждения». Он прямо противоположен процессу испарения, разрушающему каплю. Взятые вместе, они выражают борьбу организационных форм, воплощаемых в капле и в ее газообразной среде.

    Таким образом, «граница» капли и атмосферы есть область не только дезорганизации капли, но в то же время ее созидания («дезассимиляция» и «ассимиляция»). Если преобладают процессы первого рода, то увеличение поверхности, а следовательно, и разделение капли на две ускоряют исчезание капли; к этому сводится «дезорганизационный» характер факта. Но может случиться, что процессы второго рода идут сильнее, именно когда атмосфера «пересыщена» паром; тогда капля «растет» за счет среды, и увеличение поверхности усиливает этот рост, а распадение капли тогда приобретает характер «размножения», потому что капли-дочери могут достичь тех же предельных размеров.

    В аналогичном положении находится живая клетка, размножающаяся делением: она росла за счет среды, и в той же среде могут дальше расти клетки-дочери. Наоборот, если клетка окружена неблагоприятной средой, ее разрушающей, то разделение на две только ускорило бы ее гибель и было бы дезорганизацией.[104]

    Реально явления дезорганизации так тесно переплетаются с организационными, что и та и другая характеристики очень часто оказываются равно применимы, смотря по тому, какие активности изучаемых комплексов принимаются в расчет. Например, по отношению к «боевой силе» против внешних врагов клетки-дочери, конечно, слабее той, из которой произошли: их может поочередно захватить и поглотить враг, который не был бы способен справиться с нею; следовательно, практическая сумма тут меньше первоначальной; и с этой стороны акт размножения заключает в себе дезорганизацию подобно какому-нибудь разрыву связи между частями армии. Далее, с точки зрения активностей «химического сродства» и «тяготения» разделение клетки — акт приблизительно нейтральный: их практическая сумма остается прежнею.

    Основной тип организационной связи есть ингрессия. Соответственно ему основную форму дезорганизации удобно обозначить как «дезингрессию», т. е. как отрицательную ингрес-сию; она и получается тем же способом; например, при интерференции волн имеется или частичная «конъюгация», или даже полная, но с разрушительным результатом.

    Теперь исследуем, в каком соотношении находится дезингрессия с разрывом связей.

    На укрепленной одним концом шелковой нити висит гирька; такую систему называют «физическим маятником». Нить натянута: вес гирьки вместе с ничтожным ее собственным весом представляет определенную сумму активностей, направленных к центру земли. Гирька, однако, висит, а не падает, потому что имеется другая группа активностей — «сцепление», которая, противодействуя натяжению и превосходя его своей величиной, более чем парализует его, не позволяет перейти в реальное падение.

    Теперь мы конъюгируем с этой системою новый комплекс: навешиваем еще гирьку. Сумма активностей натяжения, следовательно, возрастает. Если она все-таки остается меньше активностей сцепления во всякой части нити, то маятник продолжает висеть, как прежде. Но, допустим, получилось иное соотношение: в одном пункте, или, точнее, в одном из поперечных сечений нити, в таком месте, где нить, например, всего тоньше, сумма активностей натяжения оказалась в точности равна сумме активностей сцепления. Что тогда там произойдет?

    С первого взгляда кажется, что не должно случиться ничего особенного: и те и другие активности взаимно парализуются, ни те ни другие, следовательно, не проявляются в реальных изменениях. Но это не так.

    В том месте, где собственные активности комплекса вполне нейтрализованы, исчезает, очевидно, всякое сопротивление ак-тивностям внешним. А они всегда имеются. Нет и не может быть комплексов, изолированных в самих себе: каждый окружен средою, иначе организованными комплексами, иными активностями. Они тектологически ему «враждебны», т. е., развертываясь по своим направлениям, они могут нарушать его форму, разрушать его; и этого нет именно постольку, поскольку он представляет сопротивление. А раз только в каком-либо его пункте или области сопротивление исчезло, стало равно нулю, внешние активности вступают туда — и связь комплекса оказывается разорванной. В данном случае это будут, например, молекулярные удары частиц окружающего воздуха; при спокойном его состоянии они представляют для нормального сцепления нити бесконечно малую величину; но когда сцепление вполне парализовано, то и бесконечно малых воздействий достаточно, чтобы началось развитие эффекта, который раньше был невозможен: частицы воздуха вступают между частицами нити, они разъединяются, комплекс распался. Через него прошла тектологическая граница.

    Как видим, она прошла там, где совершилась полная нейтрализация активностей, то, что мы назовем «полной дезингрессией».[105]

    Если натяжение еще не вполне равно силе сцепления, а меньше, то и воздействие среды требуется не бесконечно малое, а конечное, соответственной величины: может оказаться достаточным какое-нибудь звуковое колебание, дуновение ветра или иной механический толчок. Но и здесь внешнюю активность целесообразно разложить на две части: одну, которая уничтожает остаточное сцепление, и другую, которая действует при сопротивлении, равном нулю. Например, если ножом режут кусок дерева, то ход процесса следующий. Давление лезвия парализует сцепление молекул дерева противоположно действующими натяжениями: как только это достигнуто, лезвие получает возможность продвигаться в ткани дерева.

    Встречается еще до сих пор представление о «пустом пространстве» как об отсутствии всякой среды. Но оно совершенно ошибочно, противоречит всему смыслу современной науки. В каждом пункте этой «пустоты» — межзвездного эфира — всякое помещенное там тело испытывает действие сил электрических, магнитных, тяготения, — тех же, которые в иных, более сложных комбинациях характеризуют и всякую до сих пор нам известную «материальную» среду. Если сопротивление эфирной среды наименьшее, то это означает, что она слагается из комплексов, наименее организованных. Сопротивление, однако, существует; хотя для движущегося, например, тела оно при обычных скоростях бесконечно мало, но с их возрастанием и оно увеличивается; а когда скорость приближается к скорости света, оно растет до бесконечно большой величины, т. е. становится практически непреодолимым. Следовательно, среда всегда налицо; а потому полная дезингрессия всегда обусловливает внедрение элементов-активностей среды по линиям уничтоженных сопротивлений, — образование тектологи-ческой границы.

    Яркая иллюстрация тектологической границы, а также ее изменений — линия фронта. Она проходит там, где враждебные усилия двух армий взаимно уравновешиваются, и до тех пор, пока они уравновешиваются. Когда равновесие нарушается, как это бывает при наступлении одной стороны, линия фронта исчезает: идут конъюгационные процессы — бои, схватки, в которых элементы обеих сторон перемешиваются в разнообразных сочетаниях и взаимодействиях. Затем боевые активности могут вновь прийти к равновесию на новой линии фронта или же конъюгация развертывается дальше и дальше и завершается образованием связки, воплощающейся в мирном договоре, в отношениях господства, подчинения и т. п. Другая иллюстрация — граница между «северной» и «южной» половиной магнита; она также обусловлена взаимной нейтрализацией противоположных активностей и также может перемещаться, когда изменяется их соотношение, например благодаря приближению магнитных масс или электрических токов. Еще пример — узловые точки стоячих волн в вибрирующем теле: это пункты, где взаимно парализуются противоположные колебательные движения. Всюду организационные границы имеют одну и ту же основу: полные дезингрессии. Таким образом, всякий, разрыв связи можно представлять как внедрение элементов среды в систему по линиям уничтоженных сопротивлений, т. е. полных дезингрессии.

    Может показаться излишней тонкостью проводимое здесь постоянное разграничение двух функций, образующих акт разрыва связи: с одной стороны, полной дезингрессии, в которой уничтожается сопротивление системы по определенным линиям, с другой — последующего воздействия по этим линиям. Но это разграничение обусловлено требованием не только удобства анализа и обобщения — оно имеет основание в самой практике. Обе функции могут осуществляться отдельно, притом активностями различного рода; и например, техника в массе случаев пользуется этим для своих целей.

    Чтобы разрубить или разрезать на части железную полосу, требуется в обычных условиях огромная механическая сила, какой у простого кузнеца в распоряжении не найдется. Но сцепление частиц железа может уничтожаться также и тепловой энергией, которая легко производится с помощью угля в горне. Эта дезингрессия делается или почти полной — плавление железа, или неполной, но настолько значительной, что размягченное накаливанием железо разделяется на куски от нескольких ударов умеренной силы.

    Пример с другого полюса бытия. Чтобы разорвать, разрушить сплоченную организацию — трудовую, политическую, культурную — прямым насильственным путем, могут быть нужны воздействия такой энергии, какой враги ее и не располагают. Но если найдутся средства поселить между членами или частями организации недоверие, рознь интересов, т. е. создать дезингрессии внутренних ее активностей, то затем вызвать ее распадение окажется делом сравнительно более легким, иногда неизмеримо более легким. При этом оно может быть выполнено уже иными методами.

    Разрыв связи всегда заключает в себе момент дезингрессии как первую свою фазу. В таком случае, почему он не всегда должен рассматриваться как явление дезорганизации?

    Разрыв связи всегда увеличивает «пограничную» область комплекса, понимая под этим всю сумму соприкосновений комплекса с его средою, а не только пространственную границу. Для организованного комплекса среда есть мир внешних или «враждебных» активностей, а «граница», следовательно, характеризуется цепью дезингрессии с ними.

    Пусть имелась трудовая организация людей, которая распадается на две или несколько более мелких. Это разрыв ряда ингрессивных связей между рабочими силами: в таких пунктах, где раньше трудовая активность одного человека соединялась с усиливающей ее трудовой активностью другого, теперь она встречает направленную против нее энергию внешней природы. Возрастает сфера столкновений человеческих действий с противодействиями стихий.

    Но предположим, что внутри организации раньше имелись противоречия и раздоры, шла глухая борьба, другими словами, существовали внутренние дезингрессии и что по их линии произошло распадение. Тогда дело сводится к замене ряда внутренних дезингрессий внешними. Очевидно, если сумма вторых менее значительна, чем была сумма первых, то акт разделения, даже взятый непосредственно, независимо от последующих результатов, не есть дезорганизационный. А в дальнейшем при этом нередко на месте обессиленной, шедшей к упадку организации развиваются жизнеспособные и полные активностей — подобно тому, как бывает при размножении делением.[106]

    Брак — маленькая организация из двух лиц — иногда приходит в такой вид, что обе стороны «отравляют жизнь» друг другу, т. е. их энергия растрачивается во взаимных противодействиях. Тогда развод, или вообще разрыв, выступает как прекращение дезорганизации двух личных жизней. Но так как в этом случае первоначальная связь представляет ингрессию необратимую или разнородную, то здесь есть еще иная возможность, а именно что результат распадения тектологически различен для обеих частей: для одного супруга — «освобождение», устранение разрушительных дезингрессий, для другого — «полное крушение».

    Еще резче иллюстрируется подобное соотношение медицинским приемом — ампутацией. Хирургический нож разрывает связь между больным органом и остальным телом; для отрезанной части это немедленная гибель, для организма — спасение от полной дезорганизации. Для одной стороны прежние, устраненные дезингрессий заменяются меньшими, для другой — большими; и это естественно, потому что их строение различно.

    В практической жизни, особенно социальной, подобные «асимметричные» случаи нередко порождают важные и трудные вопросы, смысл которых такой: считать ли разрыв связи в общем его итоге актом организационным или дезорганиза-ционным? Далеко не всегда это решается так просто, как в примере с ампутацией. Относительно человеческих личностей, связанных какими-нибудь узами при наличности противоречий, дело может оказаться несравненно сложнее. Вопрос иногда просто неразрешим, если рассматривать его всецело в рамках данного комплекса: «освобождение» от брака одного лица вместе с «крушением жизни» другого и т. п. Он решается определенно лишь тогда, когда распадающая группировка берется как часть системы более сложной и значительной, например семья как часть общества или коллектива сословного, классового.

    В обыденном сознании постановка вопроса бывает такова: «что лучше?» (сохранение или разрыв связи). Несознаваемый тектологический смысл этого выражения: в каком из двух случаев организованность выше? Определенность придается пояснением: для кого, для чего лучше; т. е. указывается та организационная единица, которая принимается при этом в расчет; одна ли сторона, другая ли, или еще более широкий, включающий их комплекс. И решение может оказаться совершенно различным.? зависимости от выбора точки зрения., Например, развод для обеих сторон будет избавлением от тяжелых противоречий, но для общества, если его организация мещан-ско-консервативная, — подрывом его основ или устоев, источником новых и более широких противоречий. Или, положим, раскол политической организации является желанным и непосредственно выгодным для обеих разделяющихся частей, но для классового коллектива, органом которого она была, окажется нарушением единства его сознания и действий.[107]

    Вот иллюстрация еще из другой области — психических ассоциаций. В душе человека «борются» две группы стремлений: допустим, служить богу или мамоне. Встречаясь в одном поле сознания, т. е. в одном ассоциативном комплексе, они образуют ряд дезингрессий, в которых взаимно парализуется часть психических активностей. Решения возникающей таким образом организационной задачи могут быть различные в зависимости от всей суммы условий. В числе их бывает и такое, которое основано на разрыве непосредственной ассоциативной связи между обеими группировками. По линиям наиболее полных дезингрессий происходит внедрение элементов окружающей психической среды, которые и разъединяют оба комплекса, подобно тому как элементы физической среды разъединяют по линиям дезингрессий части распадающегося материального тела. Две системы стремлений все более отдаляются друг от друга и не сходятся в общем поле сознания: в одни моменты, часы, дни человек служит богу, «не думая» о мамоне, в другие — наоборот. Несомненно, что обе группировки непосредственно выигрывают от такого решения: их организованность повышается. Но связность психики в целом может и понизиться благодаря этой двуполярной организации.

    Народная тектология с ее символикой пословиц, притч и проч. много занималась вопросами разрыва связи. Ей, между прочим, не чужда и идея о том, что этот разрыв определяется внедрением между сторонами связи каких-то чуждых элементов; о начале распадения дружбы, брака говорится: «пробежала черная кошка» между такими-то лицами. Но в общем, конечно, народная тектология ищет не объяснений фактов, а практических шаблонов, директив, которые могли бы однообразно, так сказать механически, руководить действиями и мыслями людей.

    С научно-тектологической точки зрения задача в такой постановке, очевидно, не может быть разрешена; существуют слишком различные комбинации организационных условий и соотношений. Поэтому научная тектология и должна установить только методы для исследования всяких подобных комбинаций и для конкретного решения вопроса в каждом данном случае, а не готовые универсальные решения. Как же справлялась народная тектология со своей постановкой задачи? Она вырабатывала шаблоны, пригодные для возможно большего числа из возникающих в жизни общества случаев. И так как она складывалась главным образом в эпохи консервативных общественных организаций, враждебных всяким изменениям сложившихся отношений, то ее обычная тенденция — против разрыва связи: например, «худой мир лучше доброй ссоры», «вместе тесно, а врозь скучно»; или специально по отношению к браку: «стерпится—слюбится» и т. п. Несовершенство и недостаточность подобных формул для более развитых и сложных общественных форм не требуют особых доказательств.

