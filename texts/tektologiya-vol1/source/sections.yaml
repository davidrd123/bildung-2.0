  group_title_ru: "Механизм формирующий"
  section_title_ru: "Ингрессия"
  ru: |-
    Все задачи практики, познания, художественного творчества сводятся к тому, что требуется организовать какие-либо наличные элементы или комплексы в группировки, более сложные и соответствующие определенным целям. Простейший тип разрешения этих задач есть именно установление — реальное или мысленное, смотря по характеру задачи, — цепной связи между объединяемыми элементами или комплексами. При этом могут представиться различные случаи.

    Положим, что у нас имеются всего два комплекса — человеческие личности и что нам надо сорганизовать воедино их усилия по отношению к определенным сопротивлениям. Из самой постановки задачи видно, что общего звена пока еще не имеется, т. е, конечно, именно такого, которое связывало бы их соответственно поставленной задаче: иные общие звенья могут быть налицо, но не такие, которые организуют в данном смысле, чтобы преодолевать данное сопротивление. Необходимым звеном здесь явится сознание общей цели, входящее в психику обеих личностей, и в достаточной мере совпадающее по содержанию. Каким путем совершится вхождение этого нового элемента, на данной стадии анализа для нас безразлично; но только оно дает ту организованность, какая требуется. Сущность дела сводится к изменению обоих организуемых комплексов — обогащению двух психик новыми ассоциациями.

    Возможно, что общая и одинаково понимаемая цель уже налицо, но ее сознание возникло независимо у каждой из обеих личностей. Тогда остается привести это их сознание ко взаимному совпадению, присоединив к нему представление о самой общности цели, знание об ее наличности у другого, стремление к координации усилий. Следовательно, и тут задача решается внесением некоторого нового содержания в оба комплекса, только меньшего, чем там.

    В деле организации вещей, или техническом процессе, простейший метод тот же. Если две соединяемые вещи не имеют общих элементов, то их строение надо изменить так, чтобы общие элементы оказались налицо; если элементы, способные к слиянию и совпадению, уже имеются, то надо привести обе вещи в такое соотношение, чтобы эти элементы стали общими. Так, из острого камня и палки каменный топор приготовлялся при помощи получения общих поверхностей: либо в камне просверливалось отверстие, в которое забивалась палка, либо камень одной стороной вколачивался в ткань палки; в том и другом случае совпадение известной части поверхностей достигалось настолько тесное, что неровности одной, входя в соответственные неровности другой, обеспечивали огромное трение, практически соединявшее два тела в одно.

    Предположим, что технически требуется прочно соединить два куска металла, или дерева, или веревки. Связка создается вхождением элементов одного комплекса в другой. Осуществить такое вхождение непосредственно бывает не всегда легко, а иногда и невозможно. Для двух веревок оно достигается просто, например сплетением волокон той и другой или же «связыванием» их концов. Эта простота и легкость зависят от большой относительной подвижности их частей. Не то с кусками металла: их элементы в наших обычных условиях весьма малоподвижны одни по отношению к другим; и если сама форма кусков не является исключительно удобной для их соединения, как, положим, форма винта и гайки, то непосредственно выполнить его нельзя. Но техника знает способы изменения молекулярной подвижности: куски металла можно или совсем расплавить, что позволит слить их в один, или оплавить каждый с одной стороны, что позволит непосредственно спаять их, или, наконец, не доводя до плавления, увеличить все-таки нагреванием эту подвижность до такой степени, которая допускает «сваривание» при помощи сильного механического воздействия. Кусков дерева, однако, подобными приемами соединить нельзя: они бесповоротно разрушаются при нагревании раньше, чем могли бы приобрести надлежащую пластичность.

    В таких случаях обычно применяется метод ингрессии, т. е. метод «вводных» или «посредствующих» комплексов. Эту роль может сыграть, например, клей, в жидком виде легко конъюгирующий с поверхностью дерева, а затем твердеющий, не теряя приобретенной связи.

    Этим приемам вполне параллельны, с них как бы скопированы познавательные приемы объединения разных комплексов.

    Там, где возможно, познание непосредственно находит и сливает общие элементы данных комплексов, что и называется «обобщением». Если, например, в одном поле мышления имеются психические образы воды в реке, воды в ручье, воды в одном, в другом сосуде и т. д., то связка между ними всеми получается как бы путем наложения их друг на друга, при котором единство создается само собой в виде массы совпадающих элементов. Это основная, примитивная фаза познания. Но и здесь часто требуется изменить отчасти состав и строение комплексов, гипотетически дополнить их некоторыми недостающими элементами, на чем основаны почти все научные теории. Так, звезды и планеты до сих пор в нашем опыте — только зрительные комплексы; чтобы познавательно связать их со знакомыми нам земными телами, надо к оптическим элементам присоединить, например, элементы твердости и веса, которых опыт отнюдь не дает, но без которых невозможно «обобщить» небесные и земные объекты. Подобные преобразования нередко даже не замечаются нами — они настолько для нас естественны и необходимы, что выполняются бессознательно.

    В области познания, там, где прямое обобщение не удается, ближайший способ, как и в практике, заключается в повышении пластичности комплексов. Для этого основное средство— «анализ»: мышление, разлагая комплексы на их элементы, т. е. разрывая мысленно связи этих элементов, придает им «относительную подвижность». Например, образы человека, рыбы, насекомого весьма трудно непосредственно объединять в поле сознания, и если они налагаются друг на друга, то сочетание получается смутное, немедленно распадающееся. Но когда биология разложила эти комплексы, надо заметить, и тут сначала практически, на их составные части — органы, ткани, клетки, то создалась полная возможность такого сопоставления, т. е. мысленной конъюгации, в котором общие элементы прочно объединяются и получается устойчивая научная ингрессия. Наконец, в решении еще более сложных конъюгационных задач познание прибегает к методу «вводных» или «посредствующих» комплексов. Например, между человеком и обезьяной оно вводит образ их общего предка, между пространственно удаленными, но взаимно зависимыми телами — эфир с различными натяжениями и колебаниями в нем и т. п.

    Итак, говорят вообще, для цепного соединения двух комплексов требуется их изменить так, чтобы в них получились общие элементы, соответствующие задаче, для которой служит данный организационный процесс. Но далеко не всякие комплексы удается всячески изменять по мере надобности, и особенно не при всяких условиях возможно именно такое изменение, которое позволило бы прямо связать их. Тогда разрешение задачи, как мы сказали, требует введения «посредствующих» комплексов. Исследуем это ближе.

    Предположим, что двум лицам надо объединить свои усилия для одного дела. Полная координация достигается только тогда, когда у обоих имеется в сознании один и тот же план действий. Им надо «столковаться» — тектологический процесс, орудием которого является речь. Но они говорят на разных языках и не могут понимать друг друга. Успешное разрешение задачи в пределах этих двух комплексов невозможно: цепная связь прямо не устанавливается. Между двумя лицами надо подставить подходящее третье, в данном случае просто переводчика.

    В чем заключаются особенные свойства этого промежуточного звена? В том, что оно обладает общими элементами, соответствующими поставленной задаче, с каждым из крайних звеньев, в обоих случаях разными: с одним общая система сигналов — один язык, с другим — другой. Таковы бывают при создании цепной связи организующие комплексы, которые «входят» между организуемыми. Отсюда и название самого метода — ингрессия, т. е. «вхождение».

    Путем ингрессии возможно связывать даже такие комплексы, которые при непосредственном соединении взаимно разрушались бы. Пример из социальной жизни — примирительное посредничество между двумя враждующими или воюющими сторонами. Посредником выступает третье лицо или организация, связанные какими-нибудь общими интересами — материальными или моральными, с той и другой стороной. Когда римляне и сабиняне сошлись, чтобы вступить в бой, похищенные сабинянки, для которых первые уже стали мужьями, а вторые были родственниками, успешно вмешались между ними.

    Бесконечно разнообразные применения того же метода представляет техника. Лезвие ножа нельзя держать руками; но ручка, форма которой соответствует ладонной поверхности сжатой руки, а вещество которой либо сливается с лезвием, либо охватывает его продолжение совпадающей поверхностью, ингрессивно соединяет руку с лезвием в одну систему. Два колеса, связанные бесконечным ремнем, образуют организованную систему для технических целей: опять совпадение поверхностей промежуточного звена и двух крайних, совпадение до мельчайших неровностей, от которых зависит трение. Еще пример — два телеграфных аппарата и проводник, связанный с каждым из них своим электрическим состоянием. Беспроволочное телеграфирование показывает, что эфир может выполнять ингрессивную роль. С точки зрения электромагнитной теории света всякий оптический образ на сетчатке есть частный вид беспроволочной телеграммы, исходящей от предмета, так что для лучистой энергии вообще эфир есть универсальная ингрессивная среда.

    Сложные передаточные механизмы в машинном производстве дают картину ингрессии со многими промежуточными звеньями, связь которых меняется от одного к другому. Нужна длинная цепь ингрессии, чтобы получить систему, в которой водопад прядет хлопок или освещает жилища.

    Создавать ингрессии практически человек может только в поле своих коллективно-трудовых мускульных усилий, следовательно, в ограниченных рамках. Но эти рамки постоянно расширяются с прогрессом труда. Притом опыт показывает, что посредством вводных звеньев, целесообразно выбранных, одного, или нескольких, или многих, возможно установить реальную связь между любыми комплексами, как бы ни были они взаимно удалены в поле труда или взаимно несовместимы по направлению активностей. Можно координировать усилия работников, находящихся на противоположных сторонах земного шара, — надо только ввести между ними достаточное число телеграфных станций и проводов; можно устроить переговоры между ожесточенно бьющимися врагами — надо только найти подходящих посредников; можно добиться взаимного понимания и точного согласования действий между эскимосом и папуасом, между английским рабочим и русским крестьянином — нужны только знающие и толковые переводчики; можно соединить огонь и воду для приготовления пищи, нежные клетки мозговых центров и стальное орудие — для производства или разрушения и т. д.

    В области познания прежде всего всякая классификация стремится расположить те явления, которые она охватывает, в непрерывный ряд, где каждое последующее звено имело бы как можно больше общего с предшествующим; этим создается ингрессивная связь между самыми различными объектами. Затем, без ингрессии, а чаще даже — без нескольких ингрессии, не обходится ни одна объяснительная теория. Благодаря этой общей черте классификаций с объяснительными теориями некоторые мыслители ошибочно рассматривали вторые как частный случай первых.

    Возьмем самый обычный пример — теорию планетного тяготения. Можно расположить явления в такой ряд: 1) эллиптические пути планет; 2) эллиптические пути комет; 3) параболические пути комет; 4) параболическая траектория брошенного камня; 5) прямолинейное падение оставленного без опоры камня. Тут каждое следующее звено имеет так много общего с предыдущим, что мысль об единстве причины кажется очень естественной: ингрессия, следовательно, дает основу для теории. Однако проведенный ряд еще не составляет самой теории. Ингрессия — лишь необходимый элемент в образовании таких сложных комплексов, как научные теории; но в них она действительно всегда есть налицо.

    Обыкновенные математические задачи представляют не что иное, как нахождение промежуточных звеньев для связывания данных величин. Такое звено, например, величина X, реализующая математическую связь уравнения. Равным образом, нахождение промежуточных звеньев между какими-нибудь крайними образует основное содержание математического доказательства теорем, построений, которые служат для него, и т. п. То же относится к другим наукам, которые практикуют схематизацию в виде «доказательства» своих положений. Постоянно применяемая в построении геометрии аксиома — «две величины, равные порознь третьей, равны между собою» — выражает простейший математический случай ингрессии. В анализе играет огромную роль аксиома более общая — «две величины, являющиеся функциями третьей, функционально связаны между собою». Для тектологии, однако, и это частный случай схемы — «два комплекса, из которых каждый имеет общие элементы с третьим, ингрессивно им связываются между собою».

    Научные термины «решить» и «доказать» имеют объективное значение — организовать ту или иную совокупность данных. «Доказать» какую-либо теорему — значит установить определенно-организационную связь между указанными в йей величинами; обыкновенно это делается при помощи вводимых между ними целесообразно выбранных промежуточных комбинаций. Например, теорема «сумма углов треугольника равна двум прямым» доказывается следующим образом. Между математическими комплексами, суммой двух прямых углов и суммой углов треугольника, вставляются два соединительных звена: 1) сумма одного из углов треугольника с его смежным; 2) та же сумма, но в которой внешний смежный угол разделен на две части прямой, параллельной противолежащей стороне. Посредством этой двойной ингрессии обе величины, к которым относится теорема, организуются в познавательную группировку равенства.

    Познание оперирует с комплексами гораздо более пластичными, а его поле, имеющее своей основой то же самое поле физического труда, расширяется гораздо быстрее и легче. Поэтому соответственно быстрее и легче оно развертывает свою цепь ингрессии. Устанавливая новые и новые связи там, где их раньше не было, переходя в своей объединяющей работе всякие данные границы во все более короткое время, оно уже давно пришло к идее непрерывной связи всего существующего, к идее «мировой ингрессии».

    Мы рассматривали сейчас метод «ингрессии» как частный прием создания цепной связи. Но мы имеем право в своем организационном анализе разлагать комплексы, как нам требуется. В любой связи двух комплексов мы можем выделить «связку», как особое, третье звено между ними. Тогда и эта вся комбинация оказывается ингрессией. Следовательно, ингрессия есть всеобщая форма цепной связи.

