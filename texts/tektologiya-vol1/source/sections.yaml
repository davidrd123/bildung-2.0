  chapter_title_ru: "Приложения"
  section_title_ru: "Труд и потребности работника[133]"
  ru: |-
    I

    Вопрос о взаимной связи труда и потребностей работника можно рассматривать с двух точек зрения — физиологической и социальной.

    Первая такова. Труд есть затрата энергии работника, главным образом нервно-мускульной. Затрата же означает необходимость восстановления, без которого рабочая сила разрушается. Восстановление происходит путем удовлетворения потребностей работника. Поэтому работа и потребности жизненно соотносительны: изменяется одно, изменяется и другое.

    Вторая точка зрения такова. Труд есть общественная функция работника — затрата энергии коллектива, для поддержания и развития жизни коллектива эта затрата возмещается, т. е. потребности работника удовлетворяются за счет общественного продукта, его доли, которую получает работник в системе распределения.

    Решение вопроса об этой доле работника должно, очевидно, охватить обе точки зрения. Ключ к решению дает идея организационного равновесия. Она чрезвычайно проста, — до такой степени, что в формулировке она кажется вещью само собой разумеющейся. Всякая организованная система, в том числе и организм работника, и организация коллектива, общества, сохраняется постольку, поскольку ее затраты и потери энергии уравновешиваются усвоением энергии извне; а расти и развиваться может, естественно, лишь постольку, поскольку первые перевешиваются вторыми.

    Применительно к социальной экономике эта мысль была сформулирована четверть века назад В. А. Базаровым.[134]

    Каждый элемент общества, следовательно, в частности, каждый работник должен получать из общественного продукта столько, чтобы это давало ему возможность нормально выполнять свою общественную функцию, свою роль в системе производства. Это абстрактный закон распределения. Как всякий абстрактный закон, он вовсе не есть простое описание фактов, он не означает, что явления именно так вот на деле всегда и происходят. Нет, он выражает норму явлений. Действительность почти никогда точно не соответствует этой норме, чаще всего колеблется около нее в ту и другую сторону, иногда же резко отклоняется от нее. Предприятие может не получать от хозяйственного центра или через покупку на рынке достаточного количества сырья, орудий и проч., чтобы выполнять свои производственные задачи; но тогда оно и не может их выполнять, само расстраивается, а вместе с тем нарушаются функции других, связанных с ним предприятий, которые так или иначе должны применять его продукты: в системе происходит частичное разрушение, дезорганизация. Рабочий так же нередко не получает в виде заработной платы необходимого количества средств потребления, чтобы поддерживать свою работоспособность и жизнь членов своей семьи,[135] но тогда происходят растрата, частичное или полное разрушение рабочей силы, потеря общественно-трудовой энергии, ослабление общества в его борьбе с природой.

    В учении Маркса о ценности рабочей силы, как определяемой стоимостью нормальных средств потребления работника, очевидно, подразумевается именно этот закон равновесия. Одно из главных противоречий капитализма заключается в том, что благодаря анархичности его общей организации элемецты наиболее трудовые часто не имеют возможности вполне восстанавливать свои жизненные затраты, между тем как другие пользуются несоответствующими затратам излишками, которые только ведут к их вырождению в сторону паразитизма: невознаграждаемая для общества, частичная растрата рабочих сил и общественного продукта. В других эксплуататорских системах бывало и так, что дезорганизация на этой основе не оставалась частичной, а переходила в распад и крушение всего общества. Таковы были восточные деспотии древности, античный рабовладельческий мир, где постоянно возраставшее и усложнявшееся потребление высших классов шло рядом с уменьшением и прекращением их социально-производственной функции, сводясь к бесплодной растрате общественного продукта, между тем как доля трудовых низов становилась все более недостаточной для поддержания их жизненной энергии, так что они вырождались и гибли от истощения. Организационный закон, закон равновесия, обнаруживается в том, что его практическое нарушение несовместимо с сохранением системы, равносильно ее частичной или полной дезорганизации.

    При капитализме, в обычных его условиях, закон этот, как показывает опыт, практически соблюдается с точностью до нескольких процентов путем стихийных колебаний в ту и другую сторону от нормы. Поскольку эти нарушения, оставаясь частичными, более чем покрываются общим прогрессом производительных сил, постольку, несмотря на них, капиталистическое общество способно к развитию.

    В маленьком организованном обществе прошлого, авторитарно-родовой общине, тот же закон выполнялся относительно планомерно: руководитель производства, патриарх, из общих запасов давал каждой группе работников, назначаемых на специальное дело, как технические средства для его выполнения, так и необходимые средства потребления для поддержания их рабочей силы. В обществе будущего то же будет делаться в гигантском масштабе, с научной планомерностью.

    II

    Затраты трудовой энергии работника можно рассматривать с двух точек зрения:

    1) со стороны количественной, когда дело идет о сумме выполняемого труда вообще, в «абстрактном» смысле по Марксу, когда, следовательно, учитываются только продолжительность и напряженность труда;

    2) со стороны качественной, когда дело идет об особом, конкретном характере данной работы, как работы слесаря, наборщика, шахтера, носильщика и т. п., когда учитывается специальная форма затрат энергии в разделении трудовых функций среди общества. Ясно, что удовлетворение потребностей работника должно соответствовать его затратам и с той, и с другой стороны, определяясь обоими одновременно.

    Сумму потребностей работника учесть не так просто, они сложны и многообразны: питание в разных его видах, одежда, жилище, культурные потребности и проч. Проследить связь их с работой в количественном смысле всего легче на основной их группе, относящейся к питанию. Начать всего удобнее с собственно мускульной работы. Она происходит за счет энергии окисления, «сгорания» в организме углеродистых веществ, усваиваемых из пищи. Поэтому здесь роль пищи вполне подобна роли топлива для паровой машины; и совершенно так же, как это делается по отношению к топливу, значение пищи как источника энергии для работы измеряется калориями, т. е. еди-ницами тепловой энергии.[136]

    Года два назад проф. В. Г. Громан иллюстрировал связь между пищей как топливом и работой на очень живом и очень близком для нас примере. По данным Наркомата путей сообщения оказывалось, что на одинаковую сумму работы вместо одного довоенного работника в 1920–1921 гг. требовалось в среднем четыре человека. Значит ли это, что рабочие стали бездельниками, лентяями? Нет, отвечает Громан. А дело вот в чем. До войны средний работник индустриально-физического труда потреблял у нас в пище 3600 больших калорий в день. Разруха свела эту величину к 2700–2800 калориям. Но надо иметь в виду, что из того и другого числа 2200 калорий представляют только необходимый «балласт»: они служат лишь для поддержания жизни организма, помимо производительной работы. Значит, собственно на нее остается в первом случае 1400 калорий, во втором — 500–600, т. е. раза в два с половиной меньше. Но сумма полезной работы упадет не во столько же раз, а еще больше. При пониженном питании большие напряжения становятся невозможны; а при малых напряжениях производительность еще уменьшается; всякий знает, что, например, при раскалывании дров три слабых удара не заменят одного втрое более сильного. При такой работе на низшем уровне напряжения общий эффект и получался вполне нормально меньше в целых четыре раза.

    Тут выступает очень важный закон: уклонение вниз от нормы дает не пропорциональное, а большее, притом все возрастающее, понижение рабочей силы: «рабочая ценность» человека падает гораздо быстрее, чем уровень удовлетворения потребностей.

    Отсюда вытекают практические выводы, которые можно пояснить таким примерно расчетом. Пусть у нас имеются продовольствие на 22 тысячи калорий в день и восемь наличных работников. Распределим это количество между всеми поровну, каждый получит 2750 калорий и будет, как мы видели, работать в четверть нормы; вместе они дадут тогда восемь четвертей, т. е. две единицы довоенной нормы. Теперь попробуем другое распределение того же самого продовольствия: трем работникам дадим полное, нормальное количество по 3600 калорий, и пусть они работают; а пять остальных освободим от работы и поделим между ними остаток: на каждого придется по 2200 калорий с небольшим, т. е. как раз то, что надо для поддержания жизни, достаточное «социальное обеспечение».

    Тогда первые трое могут работать по довоенной норме, и получится не две, а три полные единицы труда: явный выигрыш на 50 % благодаря лишь иной организации распределения. А если бы еще удалось человек четырех из восьми сбыть в деревню, где они поначалу найдут хотя и недостаточный заработок, но такой, что поддержку им можно оказывать в половину нормы обеспечения, то остальные четыре могли бы все получать по настоящей рабочей норме и выполнять работу в четыре довоенные единицы — выигрыш еще на одну единицу.

    Приблизительно по таким путям, хотя, может быть, часть планомерно, а отчасти ощупью, и пошла новая экономическая политика, сокращающая во многих случаях число занятых рабочих вместе с повышением их заработка.[137] Планомерность же тут особенно нужна для того, чтобы не растерять навсегда рабочие силы, которые приходится временно, по недостатку средств, отстранять от активной роли в производстве. Растрата сил происходит и в чрезмерном труде, и в долгом безделье.

    III

    Надо заметить, что питание отнюдь не сводится всецело к калориям, т. е. к одному топливу как источнику мускульной энергии организма. Для него требуются еще разные другие материалы: вещества «пластические», которые служат для восстановления изнашивающихся тканей, для ремонта органов; таковы, особенно, белковые вещества, но также некоторые жировые, жироподобные и др.; затем вещества «передаточные», как вода — общий растворитель, без которого не могут идти почти все химические реакции жизни, или как железо для гемоглобина — передатчика кислорода в крови; наконец, разные «катализаторы», которые необходимы для ускорения химических процессов, как некоторые соли, ферменты и проч. Все это нужно и все это должно быть в достаточном количестве. Иначе что получится?

    Допустим, что в питании налицо большой избыток калорий, например много картофеля, в котором преобладают «горючие» углеводы; но не хватает «пластических» материалов — нет мяса и молока с их белками, мало и хлеба, в котором белков хотя меньше, все же они имеются. Как тогда способен организм работать, в меру ли избытка одних элементов или в меру недостатка других? Не требуется долгого размышления, чтобы сообразить, что определяющим явится именно недостаток, а не избыток; ибо если работа будет превосходить восстановление изнашивающихся тканей, то организм явно должен непрерывно разрушаться. Это роковой закон наименьших. Во всякой системе, состоящей из ряда взаимно необходимых звеньев, решающее значение принадлежит наиболее слабому звену. Например, если в экономике общества все отрасли нуждаются в железе, а производство железа упало ниже нормы, то все они вместе могут работать лишь в таком масштабе, на какой хватает добываемого железа, не более того.[138]

    Очевидно, что этот же закон относится не только к питанию, но и ко всем другим насущным, нормальным для работника потребностям. Пусть у него есть все, и в избытке, но нет обуви; как он будет зимой работать, сколько будет пропускать рабочих дней по болезни, это легко себе представить. Вообще, раз есть нехватка в каком-либо необходимом и незаменимом условии, вся рабочая сила человека падает соответственно наличности этого условия.

    Разные «искусственные» и «культурные» потребности работника приобретают такой же насущный характер; а тогда рабочая сила зависит также и от них. Без чая, а для курильщика без табака работа совсем не та. И если грамотный, мыслящий рабочий лишается привычной уже для него газеты, чтения брошюр, книг, то падает его «настроение» и опять понижается рабочая сила. Поэтому даже малые уменьшения заработка, вынуждающие к сокращению таких потребностей, могут иметь серьезное значение для работоспособности. Следовательно, основная хозяйственная задача состоит в том, чтобы довести удовлетворение потребностей всех занятых работников до полной нормы. Тогда и работа может идти с нормальной, наилучшей нагрузкой. А всякое сокращение здесь неэкономно.

    IV

    Специальное качество труда может быть связано со специальными потребностями, например работа на холоде требует повышенного калорийного питания, а также особой одежды. Работа по преимуществу умственная связана с усиленным фосфорным питанием (молоко, мясо, рыба); работа монотонная и скучная означает усиленную потребность в культурных развлечениях и т. п. Полное удовлетворение таких потребностей является столь же необходимым, как и общих, основных; его недостаточность повлечет уже известные нам результаты по закону наименьших и окажется неэкономной.

    Здесь выступает на сцену трудный вопрос о «сложном» или «квалифицированном» труде. Согласно Марксу, он в социальной экономике учитывается как «умноженный простой труд», как увеличенная затрата энергии. Легко убедиться, что он на самом деле и является такой увеличенной, умноженной затратой энергии.

    Труд есть функция всего организма как целого; но основной момент здесь — работа нервных центров, роль которых приблизительно такова, как роль машиниста при сложном механизме. и вот при усложнении труда возрастает, усиливается в особенности затрата энергии нервных центров.

    Центральный нервный аппарат, состоящий из головного и спинного мозга и нервных узлов, заключает несколько сот миллиардов «нейронов», нервных клеток с их нервными волокнами; эти нейроны группируются во многие тысячи, если не миллионы частичных механизмов для специальных «двигательных реакций», рефлексов; каждый такой механизм есть сочетание нейронов «чувствительных», воспринимающих внешние раздражения определенных органов чувств, и нейронов «моторных», которые, получая импульсы от первых, посылают к определенным мускульным волокнам нервный ток, вызывающий их сокращение.

    При труде простом действует небольшое число таких элементарных механизмов; при сложном работает гораздо большее их количество, во взаимной связи и под непрерывным взаимным контролем: каждый должен вступать в дело на определенной ступени трудового акта, при наличности определенных, устанавливаемых внешними чувствами условий, и так же должен при известном, происходящем от самого же труда изменением этих условий приостанавливаться, уступая место другим, сменяющим его механизмам, чтобы потом в соответственный момент опять прийти в действие, и т. д. Затраты энергии увеличиваются не только потому, что в работе участвует больше механизмов, но еще и потому, что между ними все время идет общение, взаимодействие, что они, посылая друг другу импульсы, в разной мере возбуждают и задерживают друг друга; эти процессы, обозначаемые обычно как «внимание», «соображение», «инициатива», «регулирование», представляют при сложных формах труда, вероятно, наибольшую долю затрат. В общем же совершенно понятно, что величина этих затрат может значительно превосходить ту, какая требуется в простом труде; и если бы мы знали, во сколько раз, это и был бы точный коэффициент психофизиологической сложности, «квалификации» труда.

    Больше и сложнее затраты энергии — больше и сложнее должно быть ее возмещение. Именно в этом основа повышенного заработка квалифицированных рабочих, это простое и очевидное условие необходимого равновесия их жизненного баланса, без соблюдения которого рабочая сила начинает немедленно разрушаться.[139]

    С этой точки зрения нет ничего непонятного в странных на первый взгляд фактах, отмеченных историей, например, английского рабочего движения: рабочие квалифицированного труда при уменьшении платы иногда предпочитали переход к простому труду чернорабочих, где плата, однако, еще меньше. Да, но и затрата нервной энергии зато гораздо меньше, так что баланс не нарушается.

    У нас пока нет еще способов измерять, во сколько раз затраты энергии при таком-то сложном труде, физически квалифицированном или умственном, больше затрат при среднем «простом» труде. Но задача распределения как социально-практическая, к счастью, так и не ставится. Ее постановка иная, а именно вот какая. Такой-то вид сложного труда нужен обществу; для поддержания (а в обществе экономически прогрессивном — и развития) соответственной рабочей силы в полном размере требуются такие-то предметы потребления в таком-то количестве; они стоят обществу в 2, 3, 5, 8 раз больше его трудовой энергии, чем сумма предметов потребления, достаточная для поддержания (и нормального, среднего развития) простой рабочей силы. Итак, стоимость этой сложной рабочей силы для общества в 2, 3, 5, 8 раз больше, чем стоимость простой; а следовательно, соответственный сложный труд социально равен во столько же раз умноженному простому труду; общество должно учитывать его как таковой. Оно, вообще говоря, это и делает. Но при капитализме такое учитывание производится стихийно, через рынок рабочей силы, с массой нарушений, а следовательно, жизненных противоречий, страданий, жертв. А при планомерной организации хозяйства это должно делаться социально сознательным путем, на основе точных физиологических и статистических данных о потребительных бюджетах разного рода рабочих сил.

    V

    Из всего изложенного ясно, насколько в основе своей ошибочны идеи механически-уравнительного распределения, наивные формы коммунизма по схеме «всем поровну». Дело в том, что действительной, жизненной уравнительности в них и нет. Если один тратит больше трудовой энергии, другой меньше, а получают они для ее восстановления поровну, то ясно, что равенства реального тут нет: один из двух сравнительно эксплуатируется. Экономически-уравнительным можно считать только такое распределение, при котором уравнивается не величина самой платы, а отношение между затратами и усвоением энергии для каждого работника. К этому и должна стремиться всякая нормировка заработков.

    Механическое уравнительство, однако, еще нередко у нас встречается, и исходит оно не из научной, а из морально-аскетической точки зрения. Откуда оно? Чья это точка зрения? Пролетарий сознательный не может стоять на иной точке зрения, как объективно-экономическая; однако мы знаем, многие из рабочих еще стоят за простое поравнение. Наш пролетариат вышел из среды крестьянства и частью мелкого городского мещанства. В этих слоях усложнение, квалификация труда выражены и теперь еще слабо, а особенно были незначительны в прежние времена. Там поэтому идеология «поравнения» была вполне естественной; и вот теперь с ее пережитками в рабочей среде часто приходится иметь дело.

    Как иллюстрацию приведу реформу, проведенную в Орехове-Зуеве в самом конце 1920 года: перевод всех ответственных работников-коммунистов из их квартир в рабочие казармы. Один из горячих сторонников этой меры разъяснял ее так:

    «…В силу целого ряда причин: необходимости нести непосильно тяжелую работу, стремления сохранить силы ответственных работников, отчасти же и в силу неизжитой еще обывательщины ответственные работники-коммунисты отделились от обычных условий жизни рабочих, выселившись в более удобные помещения — домики и квартиры, и тем самым оторвались от широких рабочих масс и от рядовых работников партии… Именно на почве такого отрыва пышно расцветает бюрократизм…»

    Переходя, далее, к оценке принятого решения, автор говорит: «Мы, ореховцы, ни на минуту не закрывали глаза на последствия сделанного шага и знаем, что в условиях казарменной жизни товарищам самим придется затратить много лишних сил, а для некоторых такие условия окажутся, может быть, и смертельными. Но мы глубоко уверены, что выбывшие из строя будут скоро заменены, и наша цель будет достигнута. Нам думается, что Центр. Комитету необходимо потребовать обязательного проведения нашего решения во Всероссийском масштабе».

    Иногда, разумеется, бывает, что политические потребности вынуждают поступать так или иначе, не считаясь с экономической целесообразностью. Поэтому не будем судить о том, правильно или ошибочно было мероприятие в тех конкретных условиях, при каких оно было выполнено. Нас теперь занимает только вопрос об условиях равновесия между трудом и удовлетворением жизненных потребностей. Как представляется дело с этой точки зрения?

    Труд ответственных работников является не только сложным, но отчасти даже творческим, требует особенного нервного напряжения. Поэтому для его успешности необходимы такие специальные условия, как возможность сосредоточиваться в самом процессе работы, с одной стороны, и полный отдых нервной системы в промежутках — с другой. То и другое исключается в казарменно-каморочной обстановке. Тут опять выступает закон наименьших. Во всяком общежитии условия труда и отдыха «равняются по наихудшему». Все нарушения мира и порядка действуют на каждого обитателя: один нервный и беспокойный или больной человек лишает спокойствия и отдыха также всех прочих; один работающий по ночам подрывает дневную трудоспособность многих других и т. д. Жилищный «индивидуализм» англичан и американцев, которые строят дома так, чтобы каждая семья, каждый, даже комнатный, квартирант жили достаточно изолированно, — этот жилищный «индивидуализм», есть несомненно, одна из причин их особенно высокой работоспособности.

    Не надо упускать из виду глубокого различия между процессами производства и распределения, с одной стороны, и потребления — с другой. Во-первых, коллективизм, коммунизм, социальное единение и регулирование означают увеличение силы, представляют путь к победе над природой; во-вторых, этого вовсе нет: потребление по самой природе своей индивидуально, тут один человек не может реально помогать другому. Правда, в старые времена совместный стол, пиршества, собутЫльничество играли немалую роль в укреплении социальной связи между людьми; это зависело от того, что на низших ступенях развития удовлетворение таких потребностей являлось высшим наслаждением в жизни и объединение на его почве служило средством сближать людей, создавать у них взаимное расположение. На этом принципе и теперь основываются дипломатические банкеты и всякие официальные обеды, которыми открываются совещания дельцов. Но для современного трудового человека, мало сведущего в гастрономических наслаждениях, подобные пиры, которые тянутся часами, потому что все должны ждать каждого и каждый всех, только несносно скучны, а то и противны как пережитки варварства. А грядущим поколениям с их коллективно-трудовой эстетикой станет даже нелегко понимать, как это могли люди собираться вместе для выполнения таких неизящных и, пожалуй, неопрятных действий, как жевание, глотание и проч., которые все равно каждый выполняет только индивидуально. Это будет восприниматься Приблизительно так, как уже мы воспринимаем грубый коммунизм уборных, столь еще распространенный, к сожалению, в нашей стране, но почти исчезнувший на Западе.

    Коллективизм труда и коммунизм распределения не только не связаны с коммунизмом в удовлетворении личных потребностей, но скорее противоположны ему.

    VI

    Нам пришлось уже упоминать об «ответственной» работе. Что это за особый тип труда и какие специальные потребности ему соответствуют?

    Это может быть труд сложный, квалифицированный, как чаще всего и бывает, но может быть и сравнительно простой, даже самый простой. Он социально характеризуется тем, что от его нормального хода зависят большие возможности общественной пользы или вреда. Успех или неуспех обширного предприятия, а с ним судьба тысяч работников и т. д. зависят от действий его директора-руководителя: целесообразное функционирование большого административного механизма или бесплодная волокита с огромной растратой времени и сил лежит на «ответственности» заведующего этим механизмом; жизнь или гибель многих людей — на ответственности военного командира, но также и на ответственности часового при пороховом складе или даже стрелочника на железной дороге.

    Ясно, что всякая ответственная работа требует прежде всего полного, ничем не отвлекаемого в стороны и непрерывного внимания к ней: достаточно, чтобы оно ослабело или рассеялось на самое короткое время, и этот момент по закону наименьших может определить неудачу важного дела, большое бедствие и т. п. Поэтому здесь всякое урезывание заработка, всякое стеснение условий жизни, способное создавать для работника мелкие материальные заботы и тем ослаблять сосредоточение сил его на основном, является грубой организационной ошибкой. Соответственно большим или меньшим потребностям, смотря по уровню сложности труда, здесь должен проводиться принцип обеспеченности работника, достатка, освобождающего от мелочей и зацепок. Всякое отклонение от этого принципа неэкономно, скажется рано или поздно непропорционально большими потерями. Стоит сопоставить грошовые экономии на жалованье стрелочников с несколькими лишними крушениями поездов, которые от этого получатся, или хотя бы сокращение жалованья кассиров с опасностью вовлечь их в растраты и в расхищение доверенных им средств. Это один из случаев, где экономия широкоделовая, следовательно, и коллективная прямо противоположна экономии мелкосберегательской, индивидуалистически-мещанской.

    VII

    Работа «творческая» представляет особый, сверхквалифицированный тип сложного труда. Она выражается в «созидательной инициативе», «строительстве», «изобретательстве», «исследованиях», вообще в решении переменных задач — технических, художественных, научных, политических; тип самой работы остается всюду один и тот же. Психофизически она характеризуется тем, что в ней не только совместно участвует особенно большое число элементов нервной системы, но и должны постоянно вовлекаться еще новые и новые, образуя не встречавшиеся раньше изменчивые комбинации.

    Это не делается само собой. Требуются психофизические стимулы, которые выводили бы мозг из обычных равновесий его частичных механизмов. Такую роль играют новые и новые воздействия извне, вариации впечатлений, нарушающие шаблонный ход жизни. Чем сильнее и сложнее внешнее возбуждение, тем большее число чувствительно-двигательных механизмов оно затронет, создавая тем самым общение между ними; чем менее привычно это возбуждение, тем более необычные, оригинальные комбинации в мозгу в результате его могут получиться. Понятно, что такие стимулы должны входить в норму потребностей работников творческого типа.

    Откуда же берутся эти стимулы? Первично человеку дает их общение с природой, с ее непрерывно-переменными стихийными комбинациями. Лес, поле, река, воздух, горы, небо — природа никогда не повторяет в точности раз возникшего сочетания своих условий. Живая связь с ней — это естественный источник творческих возбуждений, источник наиболее драгоценный и даровой.

    Но город, нынешний центр культуры, где люди живут и работают в разгороженных каменных ящиках, оторван от жизни природы, чужд ее могучих стимулов творчества и вынужден заменять их иными, искусственными. Таковы театры, музеи, книги, собрания, игра личных чувств и смена личных связей, а также временная перемена обстановки путешествиями и проч. Эти замены обходятся большей частью дорого; а иные из них, как употребление алкоголя, наркотиков, азартные игры, разврат дорого стоят к самой рабочей силе как разрушители организма. Но для творческой работы нужны такие или иные возбудители, и часто простая случайность определяет их выбор: для большинства даже образованных людей чужда мысль регулировать свою жизнь психофизиологическими знаниями. А поскольку большинство подобных стимулов дорого стоят в смысле их трудовой ценности, они при капитализме требуют высокой оплаты творческой рабочей силы. И капитализм действительно весьма высоко, иногда даже колоссально, ее оплачивает, но, конечно, только там, где рыночный спрос ее признал и оценил.

    Мы, однако, знаем, что это бывает далеко не всегда, что в целой массе случаев «непризнанные» творческие работники бьются в тяжелой борьбе за существование на минимальных заработках, а то и без работы, но все же делают свое дело и нередко после своей гибели обогащают капиталистов, эксплуатирующих сделанные ими изобретения, издающих написанные ими книги и т. п. Да, это бывает, и здесь выступает еще третий тип творческих стимулов — процессы разрушения как таковые. Когда организм теряет свое жизненное равновесие под ударами судьбы и в разных его частях происходят крушения сложившихся механизмов, то при этом также возникают новые и новые комбинации, на которых может основываться творческая работа. Разумеется, она тогда непродолжительна и не может достичь той наибольшей широты, какая свойственна творчеству в условиях роста и расцвета жизни. Машина работает на скорейшее изнашивание без ремонта происходящего в ней стирания частей, всякой порчи и поломок. Это один из случаев хищнического расточения капитализмом живых производительных сил. Неэкономность здесь огромная. Один какой-нибудь счастливец вроде Гете, в течение долгой жизни работающий при благоприятной обстановке в достаточных внешних творческих стимулах, создает больше, чем десятки бедствующих гениев и талантов, из которых иные, может быть, от природы были не менее одаренны.

    В общем же творческая ценность человека может очень резко изменяться при малых изменениях уровня жизни, еще более резко, чем обычная рабочая сила. Это легко показать на примерно-численном расчете, цифры которого, конечно, будут произвольны, но тенденцию явлений выразят достаточно верно. Пусть организм работника при полном удовлетворении как обычных потребностей, так и полной потребности в творческих стимулах способен развернуть активность в 1000 единиц энергии. Из них, положим, 500 идет на простое поддержание организма — жизненный «балласт». Далее, так как творческая работа не состоит из сплошного «творчества», а имеет свою шаблонно-техническую сторону, соответствующую обычным видам труда, то на это пойдет еще известная доля, скажем 300 единиц. Собственно на творческую сторону дела тратится, значит 200 единиц. Сократим теперь возможность удовлетворения потребностей на одну десятую: общая сумма активности падает до 900. Балласт прежний, и обычно — техническая функция тоже — на творчество остается всего 100 единиц, половина прежнего. Но это будет творчество уже на низшем уровне напряжения, оно упадет, следовательно, не в два раза, а больше, например в 4 раза. Сократим еще на десятую часть от уменьшенной общей величины — вместо 900 единиц будет 810, из них на творчество уже только 10, понижение еще в 10 раз. Но падение ценности будет, наверное, раз во 100, ибо в творчестве самое главное — именно максимум напряжения. Ничтожная экономия приводит к уменьшению творческой производительности в сотни раз.

    В мировой борьбе и конкуренции нашей эпохи прямо безнадежно было бы дело той страны, где проводилась бы мелочная экономия подобного рода на заработках инициативных руководителей производства, изобретателей, научных исследователей, писателей, организаторов мыслей и чувства масс, вообще квалифицированных строителей жизни.

    Общество же грядущее позаботится о том, чтобы всем своим работникам дать естественные стимулы творчества — живую связь с матерью Природой.

    Наш общий вывод таков. Работа и удовлетворение потребностей образуют организационный баланс жизни работника. Вопрос об этом балансе должен решаться и теоретически, и практически как задача научно-организационная.

