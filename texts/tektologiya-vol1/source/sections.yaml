  chapter_title_ru: "Приложения"
  section_title_ru: "О критиках «Тектологии»"
  ru: |-
    До сих пор «Тектология» вызвала очень немного критических откликов; я не буду говорить теперь о двух-трех более или менее объективных рецензиях; а собственно полемическая литератуpa против нее за эти 11 лет умещается, насколько я знаю, на десятке страниц, если не меньше. Дело, однако, не в количестве:

    можно и немногими словами сказать многое. Поэтому я должен отозваться на известные мне образцы этой литературы.

    Во-первых, тектологии посвящена часть статьи В. И. Невского «Диалектический материализм и философия мертвой реакции» (в приложении кжниге «Материализм и эмпириокритицизм», 1920). Здесь выдвигаются три основных обвинения. Вот первое: «В чем заключаются законы ингрессии, знает, вероятно, только А. Богданов; но из двух частей его «Тектологии», кроме абстрактных, голых, ничего не говорящих схем, читатель выудить ничего не может» (стр. 379).

    Возражать ли? Я думаю, читатель, хотя бы просмотревший эту книгу, уже может судить, насколько для него лестно утверждение В. И. Невского о неспособности его, читателя, «выудить» что-либо, кроме «голых» схем. Верно или неверно то, к чему привело мое исследование, но анализ способа решения множества задач, практических и познавательных, частью, притом, раньше нерешенных, пожалуй, покажется читателю менее «голым», чем заявление В. И. Невского.

    Далее «…Впрочем, кроме этих схем в обеих книгах многое множество новых терминов, запутывающих и без того темное изложение метафизической системы. А. Богданов, любящий протестовать против варварской терминологии буржуазной науки, сам нагромождает десятки новых терминов. Каких только названий у него нет, откуда они только взяты: тут и копуляция, и конъюгация (термины, взятые из биологии), и ингрессия, и эгрессия, дегрессия и дезингрессия, и системная дифференциация, и каких только комбинаций всех этих символов, комплексов и элементов у него нет» (стр. 379–380).

    «Метафизическая система»! По обычному философскому словоупотреблению это означает систему, оперирующую за пределами опыта, вне возможной проверки; по гегелевско-диалектическому — систему, чуждую идеи развития, исходящую из неподвижного, неизменного, абсолютного. Читатель сам оценит то…хладнокровие или, может быть, то незнакомство с терминологией, какие требуются, чтобы назвать так работу, которая вся посвящена методам решения практических и научно-теоретических задач.

    «Многое множество терминов»… Приведено семь, и это около половины всех, на самом деле введенных мною. Что же, В. И. Невский полагает, что возможно было бы создать новую науку всеобъемлющего масштаба, общую методологию всякой практики и теории, не прибегая к новым терминам? Да как же тогда выражать новые понятия — новые настолько, что сам В. И. Невский не мог их уразуметь и что-либо из них «выудить»? Любая из частных наук насчитывает специальные термины сотнями и тысячами. Я не сомневаюсь, что с развитием тектологии в ней выработается немало еще новых терминов, но зато ее приемы позволят отбросить тысячи старых терминов разных наук, потому что ее задача — устанавливать то общее, что скрыто под многообразием «специальных» оболочек.

    Третье главное обвинение — это «идеализм».

    Чем оно обосновывается? Тем, что — страшно сказать — в «Тектологии» дело идет о «различных комплексах, составленных из разного рода элементов» (стр. 378, ссылка на «Тектологию»), А у Маха тоже «комплексы» и «элементы»! А Мах по всем декретам — идеалист! Надо ли еще доказывать?

    Увы, до сих пор нет и не было такой науки, которая изучаемые явления не разлагала бы на те или иные элементы и не переходила бы затем к сочетаниям этих элементов, т. е. к их комплексам. У химии элементы одни, скажем, атомы простых тел, у биологии — другие, скажем клетки, у социологии — третьи — человеческие существа и т. д.; но все науки свои простейшие объекты называют «элементами»; их сочетания носят много разных названий; в химии — соединения, в биологии — организмы, колонии, виды и проч. В социологии — группы, классы и т. д. Я употребил общий и нейтральный, понятный всякому европейцу термин «комплексы». И Мах тут ни при чем: у него дело идет о специальном разложении опыта на его чувственные элементы и о комплексах, соотносительных этим специальным элементам. Если В. И. Невский знает такую науку, у которой нет своих «элементов» и их «комплексов», пусть он ее назовет, это в высшей степени интересно.

    В. И. Невский цитирует из моей статьи в «Социализме науки» положение: «Организующая деятельность всегда направлена к образованию каких-нибудь систем из каких-нибудь частей и элементов» и затем замечает: «Как видим, без этих знаменитых богдановских элементов шагу сделать нельзя» (стр. 381). Я думал, что это только констатация непреложного факта. Но, очевидно, В. И. Невскому известна и такая организующая деятельность, которая обходится без всяких элементов. Это опять-таки страшно интересно, и такое открытие В. И. Невский не имеет права держать под спудом, он должен опубликовать его со всей поспешностью!

    Но есть еще другая улика «идеализма».

    Элементами, которые организуются, служат, как я указываю, всегда активности-сопротивления. И при этом я не объясняю, что является их «основой» — материя или дух. Дело идет здесь, надо заметить, не о той материи, которую изучают физика и химия и которая есть только явление: дело идет о материи как субстрате явлений, о материи как «вещи в себе». И если в «Тектологии», говоря об элементах-активно-стях, я не говорю о ней, то ясно, что я под ними подразумеваю «дух» и только скрываю это, чтобы уклониться от ответственности.

    Я говорю в своей книге о материи-явлении, той, которую раньше представляли состоящей из твердых кусочков — атомов, а теперь физика разлагает на электрические заряды и их силовые поля, и не говорю о материи — вещи в себе, а также о духе.

    Мой читатель, я думаю, уже успел понять, почему это так. Просто для них, тут не было и нет места. Наука ограничена научными рамками; а «вещи в себе» — понятия философские. Прав ли я, полагая, что тектология между прочим ликвидирует философию вообще, — это вопрос другой; но ясно, что если тектология есть наука, то она обязана изучать только явления, их связь и закономерность, а прочее предоставить философии. Она даже не опровергает этих философских понятий; но в решении ее задач их некуда поместить.

    И я не понимаю, кто или что мешает В. И. Невскому или всякому желающему сказать: «А за элементами-активностями скрывается вещь в себе, которая есть материя и которая, действуя на наши органы чувств, вызывает ощущения, относящиеся к этим активностям», — все, как полагается. Если это для вас что-нибудь прибавляет и вы находите, что так лучше, — пожалуйста. Но тектологии как учения об организационных закономерностях это просто не касается.

    Такова критика В. И. Невского. Гораздо конкретнее таковая у П. М. Керженцева. Вот что он обо мне писал («Правда». 1923 г. № 81). «Его реакционность в области организационных проблем достаточно иллюстрируется одним из наиболее излюбленных положений «организационной науки», которое гласит: «где тонко, там и рвется, — пункты наименьших сопротивлений определяют судьбу всякой системы как целого»» (см. доклад А. Богданова на I конференции НОТ).

    «Этот «закон» А. Богданов берет из механики («прочность цепи определяется наиболее слабым из ее звеньев») и переносит его целиком в область общественных наук, исходя из своей недоказанной теории, согласно которой существуют универсальные организационные принципы, одинаково правильные и в области техники, и в области экономики, и в области других научных дисциплин.»

    «Таким образом, произвольно применив один из законов механики к общественным отношениям, Богданов возводит в непреложный закон один из реакционнейших принципов, по которому человеческое общество призывается равняться по наиболее отсталому, слабому, неразвитому своему звену. Перенося это учение в область политики, мы должны будем, например, нашу экономическую работу строить, исходя из интересов наиболее отсталых крестьянских хозяйств, нашу партийную работу подчинять желаниям наименее выдержанных и устойчивых элементов партии и т. д.»

    А вот что я по этому поводу писал в не напечатанном до сих пор письме в редакцию: «Я подчеркнул в цитате слово «призывается» потому, что именно в нем сущность невероятного недоразумения: мне приписывается точка зрения, диаметрально противоположная действительной. И все же, я должен признаться, не понимаю, как это недоразумение могло возникнуть. Разве кто-нибудь когда-нибудь считал пословицу «где тонко, там и рвется» — реакционной? Разве она — призыв выравнивать целое по наиболее тонкому, наиболее слабому его месту? Она констатирует факты, сводя бесчисленное их множество к одному образному обобщению. А ее приложением, выводом из нее может быть только «призыв» выравнивать тонкое по прочному, слабое по крепкому, чтобы, не порвалось.

    Я оперирую не пословицами, не образами, а формулами; но точная формула того, как происходят факты, конечно, еще менее может быть «призывом» выравнивать эти факты по худшему. Либих открыл тот же «закон минимума» для агрономии: урожайность зависит от наиболее недостаточного из факторов, определяющих развитие растений. Что же это — призыв уравнивать все факторы урожая по наименьшему? К счастью, никто из агрономов так не понял Либиха, и его закон остается одной из основ агрономии — за последнее время он получил еще новое развитие, вылился в более точные формулы Митчерлиха — Бауле. Если я, например, указываю, что прорыв фронта происходит на участке «наименьшего относительного сопротивления» (наименьшего по отношению к противостоящим силам врага), это значит — армия «призывается» выравнивать весь фронт по слабому пункту?

    Если я напоминаю, что у нас иногда целые фабрики работали половинное время из-за недостатка ламповых стекол, — это «призыв» поддерживать такое положение?

    В том самом докладе I конференции НОТ, о которой упоминает П. М. Керженцев, я ставил вопрос о том, какие отрасли производства должны считаться «ударными», т. е. стоять на первой очереди в деле восстановления из разрухи, и отвечал так: отрасли, относительно наиболее подорванные, наиболее отстающие, неизбежно задерживают все прочие, а потому и подлежат наиболее энергичной поддержке. Это «призыв» равнять все отрасли по отсталым?»

    Теперь я боюсь, что напрасно задерживаю внимание читателя. Надо ли, собственно, опровергать то понимание закона наименьших и пословицы «где тонко, там и рвется», какое обнаружил П. М. Керженцев? Не было ли вполне достаточно констатировать?

    Перехожу к третьему критику — И. Вайнштейну (Тектология и тактика//Под знаменем марксизма. 1924. № 6–7).

    Но тут я нахожусь, должен сознаться, в гораздо более затруднительном положении. Дело в том, что… стыдно сознаться, но… я этой статьи не понял.

    Она написана тем необыкновенно ученым стилем, который можно иногда встретить разве только в семинарских докладах студентов первых курсов и который, будучи недостаточно популярен для самих профессоров, заставляет их недоуменно вопрошать: «Да что вы, собственно, хотели сказать?» Не имея официального права задать такой вопрос почтенному автору, я, разумеется, усиленно старался понять. То, что мне удалось уловить, сводится приблизительно к следующему.

    Тектология реакционна. Почему? Потому что она мешает революционной тактике пролетариата. Чем? Каким образом? Тем, что она «гносеологически приводит к отрицанию политического переворота, провозглашая его тектологическое безразличие» (стр. 91–92).

    Где? Когда? Как? Откуда почтенный автор это вычитал? Как может тектология «гносеологически» приводить не только к такому безобразию, как «отрицание политического переворота», но к чему бы то ни было, когда она всякую «гносеологию» отрицает как схоластику? Где «провозглашается тектологическое безразличие переворота»? Непостижимо! Совершенно для меня ново! Или, может быть слишком непопулярно…

    Тектология, далее, реакционна потому, что «тактика, вытекающая из организационной философии Богданова, не есть тактика революции. Тактика, вытекающая из организационных принципов теории Богданова, есть выработка «единства познавательных методов, разрывающего рамки специализации, дающего целостную, гармонически-стройную организацию общественного опыта»… Тактика пролетариата для Богданова заключается в выработке «мировой методологии», которая должна «охватить человеческую и мировую активность» (стр. 92, passium).

    Разбери, господи! До сих пор я думал, что знаю, что значит слово «тактика». Очевидно, я ошибался. Согласно со всеми словарями я полагал, что тактика — это приемы текущей борьбы: тактика, например, парламентская, экономически-забастовочная, террористическая, военно-боевая и т. д. Я думал, что выработка мировой методологии может представлять программу, огромную научно-культурную программу. Оказывается, это тактика, конкурирующая с забастовочной, партизанской и т. п.

    Ясно, что у нас с почтенным автором расхождение глубоко принципиальное. Из каких принципов я исхожу, читателю известно; почтенный же автор в своей критике исходит, по-видимому, из того принципа, который народная мудрость оформила пословицей: «В огороде бузина, а в Киеве дядя». О принципах не спорят. Воздержусь и я.

    Критика тектологии, вероятно, нужна.

    Если она должна быть, то ей необходимо прежде всего решить вопрос: возможна ли всеобщая организационная наука? Т. е. возможно ли научно исследовать и установить закономерность организационных процессов?

    Если нет, то почему? Такой вывод, глубоко печальный для человечества, лишаемого им надежды научно организовать жизнь в целом, надо строго и точно обосновать.

    Если да, то, конечно, можно поставить вопрос: хорошб ли выполняется дело закладки основ этой науки мною, его инициатором.

    Если плохо, — критика должна указать, как же сделать это дело лучше.
