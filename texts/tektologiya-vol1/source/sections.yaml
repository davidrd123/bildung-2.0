  chapter_title_ru: "Приложения"
  section_title_ru: "Организационные принципы единого хозяйственного плана[140]"
  ru: |-
    Вопрос о планомерности общественного хозяйства был с величайшей яркостью и глубиной поставлен Марксом в его критике капитализма. Маркс показал, что все противоречия капитализма, все неразлучные с ним бедствия и растрата сил с их жестокими обострениями в виде кризисов имеют одну общую основу: анархию производства, отсутствие планомерной организации производства и всего общественного хозяйства.

    С тех пор эта анархия привела человечество к величайшему крушению, какое знает история. И в нашей стране оно проявилось всего сильнее. Теперь для нас вопрос о хозяйственной планомерности выступает как самый острый жизненный вопрос, от которого зависит наша историческая судьба.

    Какое хозяйство может быть названо планомерным? Такое, в котором все части стройно согласованы на основе единого, методически выработанного хозяйственного плана.

    Как же следует приступить к решению этой задачи, беспримерной и по масштабу, и по своим трудностям? Принципы решения могут быть установлены лишь с научно-организационной точки зрения. Сущность ее может быть сведена к следующим двум положениям:

    1) Всякое организованное целое есть система активностей, развертывающихся в определенной среде в непрерывном взаимодействии с нею. Так, общество представляет систему человеческих активностей в природной среде в борьбе с ее сопротивлениями.

    2) Каждая часть организованной системы находится в определенном функциональном отношении к целому. Так, в обществе каждая отрасль его хозяйства, каждое предприятие, каждый работник выполняют свою определенную функцию.

    Таковы два основных момента научно-организационной точки зрения, из которых надо обязательно исходить во всяком исследовании, во всяком построении, относящемся к вопросам организационного равновесия и развития.

    Равновесия, конечно, в первую очередь, развития — во вторую.

    Первый из вопросов организации общественного хозяйства касается закономерности, связывающей производство и распределение. Рассматривая то и другое как функционально-необходимые части хозяйственного процесса и зная, что производство дает все продукты для распределения, а распределение служит в свою очередь для поддержания производства, легко установить следующее условие равновесия: равновесие общественного хозяйства возможно тогда, когда каждый его элемент путем распределения получает все необходимые средства для выполнения своей социально-производительной функции. Так, работнику должны даваться средства потребления, достаточные для поддержания его нормальной рабочей силы, предприятию — материалы, топливо, орудия в надлежащем количестве для дальнейшего производства и т. д.

    Приложим организационную точку зрения в вопросе о соотношении отраслей производства. Они функционально связаны между собой цепной связью: одни для других дают необходимые средства производства, в том числе и те, которые производят предметы потребления и тем самым доставляют для всех других средства восстановления рабочей силы. Конечно, это не простая линейная цепь: если, например, металлургическая промышленность дает железо, сталь и проч. для машиностроительной и других отраслей, обрабатывающих металлы, то сама от них же получает машины и инструменты; угольная питает все другие топливом, а сама у многих из них берет орудия и материалы. Таким образом, цепная связь не раз переплетается возвратными ветвями; но, очевидно, это только делает ее еще более тесной.

    Из цепной связи прямо вытекает определенная пропорциональность отраслей как необходимое условие равновесия хозяйственной системы: все они должны быть взаимно достаточны, иначе равновесие нарушается и происходит в той или иной мере дезорганизация целого. Перед нами единый цепной механизм, первое звено которого — производство основных средств производства, а последнее — производство предметов потребления, поддерживающих жизнь и трудовую энергию общества; при данной определенной технике соотношения всех звеньев этого механизма должны быть вполне определенны.

    По тем же основаниям объективная возможность расширения разных отраслей связана опять-таки пропорциональностью, конечно, поскольку не меняется техника и с ней само строение системы. Если, например, производство железа расширяется на 5 %, то все отрасли, зависящие от него по цепной связи, вместе могут расшириться не более как на 5 %, иначе для них не хватит потребляемого ими железа; а если они расширяются меньше этого, то часть производимого железа остается излишней, неиспользованной. Равным образом отрасли, дающие средства для производства железа, очевидно, должны были доставить их на 5 % больше прежнего, т. е. должны были сами расшириться на 5 %.

    Вследствие такой зависимости расширение хозяйственного процесса в целом, организован ли он стихийно-анархически или планомерно подчиняется закону наименьших; и ясно, что расширение хозяйственного целого зависит от наиболее отстающих его частей. Так, предположим, что для нового цикла производства какой-нибудь из необходимых его элементов может быть получен в количестве, увеличенном против прежнего только на 2 %, между тем как другие элементы могли бы возрасти на 4, на 6, на 9 % и т. д. В таком случае и расширение других отраслей будет реально успешным лишь в пределах 2 %; а если оно и пойдет дальше этого, то окажется бесплодным, или сменится соответственной задержкой.

    Та же скрытая предпосылка составляет основу Марксовой теории кризисов. Именно Маркс установил, что одно звено общественного хозяйства — потребление рабочих масс — не может при рыночной системе капитализма расширяться с такой скоростью, как другие производственные звенья: рабочий может покупать только на свою заработную плату; а число занятых, и следовательно, покупающих рабочих растет благодаря техническому прогрессу не так быстро, как производство.

    Между этим звеном и остальными получается противоречие; вследствие большой длины цепной связи отраслей и отсутствия общего планомерного учета оно долго, остается скрытым и накопляется, пока не разразится кризисом.

    Теперь выступает вопрос, какова должна быть постановка задачи в фазе перехода к научной планомерности общественного хозяйства?

    Для распределения производительных сил требуется прежде всего научно-статистический расчет пропорций разных звеньев экономического целого, который соответствовал бы его равновесию. Если бы переход совершался в спокойных условиях, без общей катастрофы хозяйства, то расчет мог бы исходить из фактических отношений, какие наблюдались в производственной системе до переворота. Но при наличности катастрофы, глубоко изменяющей и сам состав общества, и его внутренние тенденции, а следовательно, также и характер, и сумму его потребностей, расчет по необходимости должен делаться наново.

    Так как цель общественного хозяйства есть в первую очередь удовлетворение человеческих потребностей (а затем, конечно, и их развитие), то исходным пунктом расчета должны явиться именно эти потребности — конечное звено цепного механизма, к которому должны приспособляться все прочие звенья.

    Путь расчета схематически таков. Налицо такое-то количество населения, а именно столько-то таких-то рабочих сил определенных степеней квалификации плюс такие-то нетрудоспособные элементы. На основе прежнего опыта, физиологии, статистики выясняются их нормальные жизненные бюджеты, устанавливается, что для намеченного периода производства восстановление всех этих рабочих сил и поддержание нерабочих элементов, считая тут и подготовку будущих работников, требуют в общей сумме таких-то и таких количеств определенных предметов потребления. Производство этих предметов предполагает такую-то вычисленную техниками затрату определенных материалов, топлива, орудий, вообще средств производства; а для их производства требуется в свою очередь наличность таких-то средств и т. д. Подведение итогов дает в результате цепную схему типа А—В—С—D—Е… причем А обозначает, например, производство 100 миллионов тонн угля, В — производство 10 миллионов тонн чугуна, Е — производство 200 миллионов гектолитров зерна и проч. Элементы, способные заменять друг друга, как, например, разные виды топлива, должны при этом рассматриваться как одно звено. Так будет определена норма равновесия, исходный пункт всех дальнейших научно-практических построений.

    С ней надо тогда сравнить наличное состояние элементов производства. Если они более чем достаточны для выполнения схемы, то остается внести в нее расчет возможного и желательного расширения, развития производства.

    Но если переход к планомерной организации совершается после глубокой хозяйственной катастрофы, тогда фактическая наличность условий производства может оказаться во многих частях ниже схемы и реальный ее вид будет, положим, такой:

    0.2А — 0,3В — 0,5С — 0,70 —… и т. д.

    Тогда дело идет, очевидно, прежде всего о восстановлении производства. Согласно закону наименьших наиболее задерживающую роль в деле восстановления будут играть отрасли наиболее отстающие, например в нашей схеме отрасль А. Это будут «ударные» отрасли по нынешней терминологии, их надо усиливать в первую очередь, направляя туда рабочие силы и подходящие средства труда из отраслей наименее отстающих. Так придется повышать одну за другой, в порядке их минимальности величины, стоящие ниже нормы, пока не удастся достичь ее по всей линии. Это порядок целесообразности; ибо, например, было бы ошибочно стараться поднять транспорт сразу до нормальной величины, если ему благодаря слабости других отраслей еще долго не приходилось бы использовать всю свою провозоспособность.

    Исключения из такой последовательности представляют, конечно, случаи, когда над задачей восстановления производства общество вынуждено поставить задачу своего непосредственного спасения; например, недопроизводство хлеба, хотя бы здесь и не было самого низкого минимума, угрожало бы скорой гибелью части рабочих сил общества, или, положим, стратегическая необходимость заставляет во что бы то ни стало поднимать транспорт и отрасли, связанные с войной, и т. п. Но это и будет уже вынужденным нарушением экономической планомерности.

    Планомерная организация производства, пока она не станет мировой, может быть вынуждена прибегать к товарообмену с другими обществами, хотя бы еще капиталистического типа. В фазе восстановления подорванного катастрофой хозяйства товарообмен может практически облегчить задачу. Но ее теоретическая, т. е. плановая, сторона усложняется. Для товарообмена нужен относительный излишек в некоторых отраслях, чтобы было чем расплачиваться; например, коэффициент С должен быть повышен, допустим, в полтора раза, Е — в два раза. Очевидно, что тогда по цепной связи придется соответственно изменить и другие коэффициенты. При крайней разрухе получение относительного излишка в некоторых отраслях может оказаться недостижимым; тогда возможна его замена временной распродажей некоторой доли неэксплуатируемых естественных богатств — их отдача иностранному капиталу в аренду, на концессию и т. п.

    Специальную трудность в построении хозяйственного плана Советской России представляет связь ее единого государственного, почти всецело промышленного хозяйства, с 20 миллионами мелких крестьянских хозяйств. Связь эта имеет характер частью реквизиции, а главным образом обмена. Вполне включить всю эту массу в хозяйственный план, т. е. полностью учесть и урегулировать ее, очевидно, немыслимо. Но и рассматривать ее как нечто внешнее, как «иностранную» державу, с которой ведется товарообмен, тоже невозможно: из нее огосу-дарственное хозяйство черпает важнейшие жизненные соки — продовольствие, в значительной мере топливо, частью даже рабочую силу; и между тем крестьянское хозяйство также подорвано и тоже нуждается в восстановлении, ему необходимо давать нужные средства, чтобы могла поддерживаться его производительность. В этих пределах его насущные потребности должны быть учтены и включены в систему общего плана; иначе все расчеты могут быть на деле разрушены.

    Здесь нам не приходится идти дальше самых общих, принципиальных соображений о методах научно-планомерной организации хозяйства. Но очевидно, что задача при всей ее сложности и трудности тектологически вполне разрешима. И, очевидно, только тектологически.

- id: "5.3"
  label: "3."
  chapter_index: 5
  chapter_slug: "prilozheniia"
  chapter_title_ru: "Приложения"
  section_title_ru: "Учение об аналогиях"
  ru: |-
    Michel Petrovitch — Mecanismes Communs aux phenomenes disparates. Nouwelle Collection Scientifique. Paris, 1921

    Тектологическая, всеорганизационная точка зрения выражает определенный способ мышления; а различные способы мышления соответствуют различным социальным типам, в нашу эпоху — типам классовым. Всеорганизационная тенденция в мышлении, следовательно, имеет свою социальную базу в том классе, которому присуща всеорганизационная тенденция в развитии его жизни. Таков трудовой пролетариат, осуществляющий организацию вещей в производстве, людей и идей в своей коллективной борьбе за изменение условий и форм общественной жизни. Классам с частично-организаторскими тенденциями, классам, воспитанным на анархии производственных отношений, тектологическая точка зрения чужда. Однако организационные закономерности существуют, конечно, в их опыте и не могут вполне ускользать от исследования их ученых и мыслителей. Но их мышление не может понимать эти закономерности как структурно-организационные, а воспринимает их только как аналогии соотношений, формул, механизмов в разных областях явлений. Оно способно создать не тектологию, а только учение об аналогиях. Это учение теперь на самом деле и создается.

    За последнее время начинается систематическое изучение аналогий как таковых в масштабе частичном или универсальном. Первое сосредоточивается главным образом на электромеханических параллелях; примером может служить книга J. В. Pomey «Analogies mecaniques de 1'electricite».

    Представителем второй, специально нас интересующей постановки задачи, является пока в европейской науке, насколько я знаю, профессор Михаил Петрович, сербский ученый, пишущий по-французски. Об его книге «Механизмы, общие для разнородных явлений» я постараюсь дать понятие русскому читателю: это не первая работа Петровича в данном направлении, но работы более ранние — «Механика явлений, основанная на аналогиях» и «Элементы математической феноменологии» — до нас еще, к сожалению, не дошли. Но есть все основания полагать, что позднейшая книга представляет и более законченное выражение идей этого, несомненно, интересного и самостоятельного мыслителя.

    Рецензия академической Revue Scientifique характеризует эту книгу как «очень интересную, очень богатую идеями, пожалуй, даже слишком богатую идеями, что делает ее несколько тяжеловесной» и обращает внимание на «энциклопедическую культуру» ее автора, «очень редкую в нашу эпоху крайней специализации» (1922, № 12). Действительно, нелегко среди современных европейских ученых указать другого, настолько же разностороннего. Его основной материал лежит в области физико-математических наук и математики. Иллюстрации, взятые из биологии, а также медицины, не очень многочисленны, но хорошо выбраны и корректно формулированы, вообще обнаруживают серьезное ознакомление с этими науками. Приблизительно то же можно сказать о материале из психологии. Хуже обстоит дело с политической экономией и вообще с социальными науками: автор и здесь проявляет известную образованность, но лишь в европейско-буржуазном смысле; с научным социализмом он явно не знаком. Трудно также предположить обстоятельную философскую подготовку: слишком неопределенно и частью некритически употребляет он термины вроде «силы», «причины» и т. п.; например, в роли причин у него рядом выступают то реальные активности, то научные законы, или в классификации причин оказываются такие типы, как «causes brusques», «causes intantanees» причины, действующие внезапно, резко, причины мгновенные — без всякой попытки хотя бы пояснить эти явно не точные понятия. Терминология, в общем, скорее материалистическая, но ни с каким определенным философским направлением автор себя в этой работе прямо не связывает, что едва ли вредит делу. Своим идеалом он выставляет «универсальную механику», но считает этот идеал «мечтой, никогда не достижимой», к которой только должны направляться все усилия человеческого ума; а свою задачу понимает как выработку своего рода «качественной феноменологии» (Phenomenologie Qualitative) как «первого предматематического этапа» к идеалу всеобъемлющих и всеопределяющих математических формул.

    Исходным пунктом своего изложения автор взял известное положение Вильяма Томсона: «Понять явление, это значит быть в состоянии установить его механическую модель». Автор поясняет этот афоризм так: «…Великий физик имел в виду главным образом физические явления. Под механической моделью он понимал такую механическую систему, функционирование которой управлялось бы теми же математическими законами, как и самое явление, или, по крайней мере, такую, посредством которой можно было бы пояснить ход явлений, его механизм, сравнивая его с более знакомыми фактами равновесия или движения. Роли различных физических факторов изучаемого явления тогда как бы выполняются, «олицетворяются» ролью того или иного механического фактора в соответственной системе равновесия или движения: равным образом, и особенности первого явления, вытекающие из данного сочетания факторов и условий, поясняются параллельными особенностями второго. Например, действие гальванической батареи сравнивается с действием вращательного насоса, выходное отверстие которого было бы соединено с входным посредством трубы, которая выполняет роль проводника для тока, между тем как интенсивность самого тока изображается скоростью течения жидкости, а разность электрических потенциалов — разностью уровня двух бассейнов, связанных проводной трубой… Аналогично этому разряд электрического конденсатора поясняется движением маятника в сопротивляющейся среде… явление намагничивания — явлениями упругости и специально кручения…» и т. д. (стр. 1–2).

    Далеко не всегда возможно такое точное количественное сопоставление, как в этих иллюстрациях; напротив, оно удается только в меньшинстве случаев; тем не менее идею В. Томсона при надлежащем истолковании можно распространить на неограниченно широкие круги явлений. «Существуют, — говорит Петрович, — способы достигнуть понимания явлений и помимо безусловной необходимости знать их точные математические законы» (стр. 4). Основываясь на этом, он идет следующим путем.

    Прежде всего можно констатировать, что «среди бесконечного разнообразия естественных процессов встречаются явления различного порядка, которые представляют поразительное сходство между собою». Обычно это дает повод к метафорам, которыми пользуются не только в разговорном языке, но и в специально-научном. Так, самые разнообразные процессы — механические, физические, физиологические, социальные, имеющие характер колебаний между двумя пределами, часто сравниваются с ритмическим движением маятника, с приливом и отливом, с перистальтическими движениями в организме; неопределенные движения среди широких народных масс уподобляются процессам брожения; вспышки темперамента — взрывам, электрическим разрядам; часто говорится о приливе и отливе страстей, о силе инерции народов и т. д. Среди бесчисленных подобных сходств очень многие далеко не так поверхностны и случайны, чтобы иметь только разговорное, литературное или субъективное значение; очень многие «вскрывают действительную аналогию, существование общих особенностей в ходе разнообразных явлений» (стр. 6).

    Эти общие особенности Петрович группирует в два класса: с одной стороны, сходства самого течения разнородных процессов (ressemblances d'allure), с другой — сходства роли, которую играют самые различные факторы в этих процессах (ressemblances des roles). Систематизация, обобщение первых даст определенные «типы хода явлений» (types d'allure), вторых — «типы ролей» (types des roles). Например, колебательный характер бесчисленных процессов природы есть установленный type d'allure; разница уровней жидкости в гидродинамике, температур для тепловых явлений, потенциалов для электрических выполняет одну и ту же функцию определяющей причины перемещения энергии, что и представляет особый type de role.

    Изучение тех и других типов составляет главное содержание книги.

    Автор начинает со «схематического описания» явлений. Те стороны, черты, особенности явления, которые в ходе его изменяются, он обозначает как «описательные элементы» явления (elements descriptifs), их совокупность — как «описательную систему». В процессах, например, движения описательные элементы — расстояния, углы, скорости, ускорения; в тепловых — температуры, количество теплоты, разные термические коэффициенты; в химических — скорости реакций, количество продуктов реакций, степени кислотности, щелочности и т. п. Каждый описательный элемент выражается определенным, соответственно изменяющимся параметром; этим способом изображается весь ход явлений.

    Графически можно представить изменения определенного элемента посредством кривой на плоскости в прямоугольной системе координат, относя к одной из двух ее осей меры времени, к другой — величины параметра данного элемента. Таковы, например, для описания климата кривые температуры, влажности, облачности и проч.; для описания болезней — кривая также температуры, кривая пульса, кривые разных сторон обмена веществ.

    Конечно, далеко не все описательные элементы поддаются точному измерению и могут быть выражены строго количественно; но и тогда, по мнению М. Петровича, их изменения допускают «качественное» описание. Под этим неточным термином автор, гораздо больше математик, чем философ, понимает неопределенно-количественные сравнительные характеристики. Сила чувства увеличивается или уменьшается, скорость развития общества бывает больше или меньше, течение болезни более или менее острое, важность одного события значительней, чем другого, уровень чувствительности одного организма к свету выше, чем другого, ощущение растет медленнее, чем вызывающее его раздражение, и т. п. Таким образом можно «качественно» описать ход изменений всякого элемента, приблизительно определить даже форму соответствующей кривой, как, положим, колебательную или циклическую, как резко поднимающуюся или резко падающую в такой-то фазе, как представляющую какие-то максимум и минимум и т. д.

    Математически схематизировать ход сложного явления в целом, когда описательных элементов принимается несколько или много, возможно следующим способом: строится прямоугольная система координат в воображаемом пространстве соответственно большого числа измерений; при двух описательных элементах достаточно нашего пространства трех измерений, но при десяти элементах понадобилось бы 11 измерений, одно лишнее требуется для оси времени; и затем все явления символизируют одной точкой, координаты которой выражают параметры всех описываемых элементов; движение такой точки (point figuratif) в этом «сверхпространстве» (hyper-espace) представит тогда весь ход явления. Конечно, эта фикция может облегчить анализ только для человека со специально-математическим мышлением, связывая воедино ряд уравнений. Реальный же образ явления в целом должен затем быть восстановлен путем расшифровки каждого из этих уравнений, с конкретным указанием той стороны или черты явления, которая символизируется тем или иным отдельным параметром.

    Пусть имеется для большого числа явлений достаточно выясненный количественно или «качественно» ход изменений как отдельных описательных элементов (images individuelles), так и их совокупности для каждого в целом (что Петрович называет images collectives). Тогда, сопоставляя эти «образы», мы можем найти общие особенности для нескольких или многих, иногда весьма разнородных, явлений — ressemblances d'allure, сходства частичные или интегральные. Это будут те «аналогии, которые послужат базой для учения об общих механизмах». Степень подобия может быть весьма различна; например, если три явления — электрическое, термическое, механическое — выражаются уравнением одной и той же формы, то в случае равенства и фактических коэффициентов каждое из них будет как бы математическим двойником обоих других. Но это, очевидно, частный случай; вообще же математическая аналогия выражается одинаковой формой уравнений или одинаковым типом графически символизирующих кривых. Когда же тип не одинаков, а только достаточно сходен, то аналогия будет только «качественная». Например, она очень значительна для всевозможных периодических и ритмических процессов. Она весьма заметна, положим, в ходе таких двух явлений, как прогрессивное намагничивание полосы железа и при одномолекулярной химической реакции накопление продукта этой реакции: в обоих случаях соответственная величина — интенсивность намагничивания и количество продукта — начинается с нуля, растет сначала относительно быстро, потом все более медленно и тяготеет к предельной постоянной величине (стр. 39–44).

    Сходства ролей, которые играют в ходе явлений самые различные факторы или факты, автор пытается воплотить в общей классификации, не гарантируя, впрочем, ее полноты. Намечаемые им главные типы таковы:

    Роль описательного элемента.

    Роль причины.

    Роль связи, которую могут играть и материальные элементы, например нить маятника, удерживающая его движение на определенной дуге круга, как связь с точкой привеса, и разные закономерности, например «факт существования закона Мариотта», связывающего изменения объема и плотности совершенных газов, разные законы сохранения — материи, энергии; вообще всевозможные моменты, определяющие необходимую зависимость между изменениями разных сторон явления.

    Роль препятствия, какую играют, например, непроницаемая стена для движения снаряда, непрозрачный экран для лучей, стенки сосуда для распространения жидкости, барьеры географические и физиологические для распространения видов и т. п.

    Роль почвы, (terrain) — факторы, от которых зависит меньшая или большая «чувствительность» данного явления к определенным действующим на него причинам, например общее состояние организма, определяющее степень иммунитета или восприимчивости к заражению; характер поля битвы, определяющий легкость или трудность атаки, обороны; социальная среда как благоприятная или неблагоприятная почва для внедрения новых экономических форм, идей и пр.

    Роль действующих причин Петрович анализирует подробнее, разделяя этот тип на такие виды: причины прямые, причины косвенные.

    Затем еще более частные подразделения.

    Причины «импульсивные», обусловливающие прогрессивное нарастание какого-нибудь момента в явлении, как сила тяжести в падении тел, ядовитость бактерий в инфекционной болезни, сила сокращений сердца в кровообращении, имеющая тенденцию увеличивать скорость и давление крови, и т. д.

    Причины «депрессивные», имеющие тенденцию к уменьшению своего объекта, как сила тяжести в восходящем движении брошенного тела; пара сил, направленная в сторону, противоположную вращению, фагоцитарная роль микрофагов или макрофагов в развитии заразной болезни; подавляющее влияние света на развитие бацилл и пр.

    Причины, для которых известен количественный закон действия, как неизменная величина силы тяжести, трения определенной среды или периодически изменяющаяся величина электродвижущих сил в явлении переменного тока и т. п.

    Причины, для которых известны «качественные» особенности их действия, т. е. приблизительные закономерности, например возрастание разрушительной силы микробов в организме по мере их размножения, уменьшение задерживающего влияния света на развитие микробов с убыванием интенсивности этого света и т. д.

    Причины противодействующие, возникающие при изменениях системы от других воздействий и исчезающие, когда прекращаются эти изменения. Такую роль играет, например, трение и вообще сопротивления среды при движениях материальных тел, электронов и т. п.

    Причины реактивные — противодействия, возникающие из самих видоизменений системы, как индуктивные электродвижущие силы в электрических процессах, разные «реакции» в социальной жизни и т. д.

    Причины внезапные (brusques) как грозы, катаклизмы и прочие.

    Причины мгновенные (instantanees).

    Агенты-возбудители (role excitateur ou provocateur); мы бы назвали их «поводами»: искра, ведущая к взрыву; мелкий casus belli, мотивирующий объявление войны, и т. д.

    Агенты регулирующие (role regulateur ou compensateur), имеющие тенденцию удерживать явления в определенных рамках: роль разных регуляторов в машинах, роль минеральных солей по отношению к уровню осмотического давления в тканях организма, роль спроса-предложения по отношению к ценам и пр.

    Агенты координативные, вносящие в явление определенную ориентировку, координацию разных сторон или частей процесса в одном направлении, — как магнитное поле дает ориентировку системе магнитных стрелок или массе железных опилок, как власть координированно направляет ряды человеческих действий — индивидуальных или коллективных…

    Инерция в разных ее видах: механическая инерция масс в перемещениях, роль центробежной силы при вращении, роль некоторых электромагнитных сил в явлениях индукции, роль сложившихся привычек в социальных процессах и в обыденной жизни… (стр. 55–70).

    Подобным же образом ближе рассматриваются и классифицируются типы «связи»: устойчивая, деформирующаяся, «цепная» (par enchainement), односторонняя; и к ним же присоединяется «роль препятствия», упомянутая раньше, как особый тип.

    Слабость этих классификаций несомненна: неустойчивость и неопределенность принципов подразделения, случайность некоторых группировок, переплетение других, неразличимость третьих (например, причины «противодействующие» и «реактивные», также «инерция»). Но автор и дает эту классификацию скорее как примерную, иллюстративную, чем как окончательную. Она нужна ему, чтобы перейти к вопросу о механизмах явлений.

    Объяснить явление или установить его механизм — это для автора одно и то же. Вопрос сводится к совокупности фактов и условий явления, к характеру роли каждого из его слагаемых и к знанию того, каким образом такая комбинация их ролей необходимо определяет особенности явления. Например, механизм интерференции известен, когда мы знаем, что она зависит от «наложения» одних колебаний на другие, причем колебания обусловлены силами упругости, изменяющимися прямо пропорционально расстоянию, и когда выяснено, каким способом это наложение ведет то к усилению феномена, то к его ослаблению и исчезновению.

    Механизм уменьшения количества красного клевера в стране за данный период времени известен, когда мы знаем, что в эту эпоху эпидемия истребила много кошек, в результате чего увеличилось число полевых мышей, которые, уничтожая гнезда шмелей, необходимых для оплодотворение цветов красного клевера, тем самым обусловили его убыль. Весь механизм сводится к действию депрессивной причины и связи по сцеплению.

    Знание механизма процессов лишь редко бывает полным и точным — слишком много факторов и условий принимают участие в конкретном^ ходе любого явления. Гораздо чаще это знание бывает приблизительным. Приходится выделять основу явления, отбрасывая второстепенные, усложняющие моменты; так получается упрощенное понятие о механизме; затем, вводя устраненные сначала факторы один за другим и исследуя их влияние, можно получать все более точную картину механизма.

    Так, феномены приливов-отливов зависят реально от совместного действия многих факторов: сил притяжения Солнца и Луны, местных и случайных условий, как, положим, конфигурация морского дна, сдавливание потока воды рельефом береговой суши, направление ветров и проч. Однако лишь первые два фактора дают явлению его типическую форму и достаточны, чтобы объяснить то, что в нем существенно. Здесь Петрович, сам того, вероятно, не подозревая, говорит об абстрактном методе, посредством которого Рикардо и Маркс преодолевали сложность механизмов экономических явлений и который действительно свойствен не одним социальным, но всем общим наукам.

    Сопоставление выясненных механизмов часто обнаруживает их сходство для самых разнородных явлений, причем глубоко несходные факторы и условия играют одинаковые роли в одинаковых сочетаниях. Вот один из очень многих примеров у Петровича. Постепенное охлаждение твердого тела в спокойной среде через обмен теплоты с ней, потеря электричества на поверхности электризованной жидкости через испарение, постепенное изменение состава химической смеси, в которой определенное соединение преобразуется действием постоянного физического агента или фермента: все эти три процесса имеют общий механизм, который можно выразить и одним уравнением; гомологичные роли в них играют, с одной стороны, столь несходные описательные элементы, как относительная температура, электрический заряд, остаточное количество преобразующегося соединения, с другой стороны — депрессивные причины (т. е. уменьшающие агенты), которые сами непрерывно уменьшаются, будучи пропорциональны величинам первых трех элементов (стр. 86–87).

    С каждым типом механизма неизменно связываются вполне определенные особенности хода явлений. Поэтому, полагает Петрович, одна из основных задач «общей феноменологии» заключается в том, чтобы, «располагая количественными или качественными данными о механизме явления, предвидеть соответствующие им особенности его хода» (стр. 95). И он дает целый ряд теоретических анализов такого рода связи — 15 схем, которых нам здесь приводить не приходится.

    Затем он выясняет, что обратная связь вовсе не обязательна: по определенной особенности хода процесса нельзя еще с уверенностью заключить об определенном механизме. Так, например, одинаковые движения могут быть порождены силами, имеющими разные законы изменений. Однако и тут создается возможность гипотетических заключений, которые затем допускают проверку. Дополнительные данные решают вопрос: из числа возможных механизмов отбрасываются те, которые им не соответствуют. Автор дает иллюстрации того, как можно исследовать механизмы, зная те или иные особенности хода процессов. Интересна одна из иллюстраций: «Форма кривых, выступающая в разрезах различных частей растения — корня, ствола, зерна — указывает на распределение клеток, соответствующих одной и той же эпохе роста растения. Поскольку они представляют также формы линий силы и сечений поверхностей равного потенциала, характерных для поля действия центральных сил (вроде электрических или магнитных. — А. Б.), постольку они указывали на участие подобных сил в развитии клеточных полей в процессе роста растения» (стр. 116).

    Вообще автор успешно выясняет научно-эвристическое значение исследования аналогий в особенностях хода явлений. При этом он обращает внимание на то, до какой степени могут быть разнородными, по внешности несравнимыми проявления этих особенностей. Например, уменьшение «описательного элемента» может выступить то как замедление в механическом движении, то как охлаждение тела, то как ослабление электрического тока, то как переход света в направлении от фиолетового к красному (уменьшение числа колебаний), то как замедление химической реакции и т. д. Переход процесса через нулевую величину выражается в остановке движущегося тела, в прекращении тока, в черных линиях или в полосах интерференции и т. п. Надо уметь отвлечься от разнообразия этих внешних форм, чтобы найти за ними ядро научной аналогии.

    Следующая глава — в чтении одна из наиболее интересных, рисует специфические формы механизмов и хода для некоторых конкретных групп явлений: механических, электрических, фотохимических, коллоидных, химических, физиологических, социальных. Мы можем, конечно, лишь бегло коснуться немногих.

    В коллоидной смеси жидкого масла со щелочной водой капельки масла минимальных размеров остаются отдельными, несмотря на очень большую при столь же малых расстояниях силу молекулярного притяжения между ними. Перрен объяснил механизм явления: при разбалтывании масла с жидкостью его капельки все электризуются от трения, притом одинаково; отталкивание одинаковых зарядов уравновешивает силы, направленные к слипанию капелек. Равновесие может быть нарушено, например, электрическим разрядом, резко уменьшающим заряд капелек; тогда они сразу сливаются в более крупные, коллоид «коагулирует»… Из этого механизма можно сделать практические выводы: во-первых, общий метод «электрокоагуляции» коллоидов; затем например, обнаружив тот же механизм в явлениях тумана, где мельчайшие капельки воды взвешены среди воздуха, газово-жидкого тела, можно приложить тот же общий метод и посредством разряда противоположного электричества рассеивать туман. Такая машина' для рассеивания тумана была устроена в Лондоне в 1905 году.

    Интересен механизм изменения возбудимости нервных центров, который оказывается одинаков с «методом глушения сигналов» (methode des signaux brides) В. Томсона, применяемым в телеграфии кабелей для ускорения передачи, а также в гальва-нометрии для успокоения стрелки, без которого нельзя начать нового измерения. Автор указывает на возможные использования того же механизма или метода в лечении вакцинацией при некоторых заразных болезнях путем изучения кривой изменений действительности прививок в разных фазах болезни.

    Интересен, далее, пример периодичности жизненных функций у прибрежных улиток, живущих в зоне морских приливов, с периодами 13 часов (промежуток для обычных приливов) и 15 дней (промежуток для наибольших приливов). От себя замечу, что прежние попытки объяснения биологического механизма сна животных не удавались именно потому, что не брали за основу его астрономическую периодичность, суточную или годовую.

    Иллюстрации, взятые из социальной жизни, слабы, так как автор обладает лишь односторонне-буржуазным образованием в этой области. Берется, например, теория У. Джевонса, сопоставляющая цикл солнечных пятен с циклом сельскохозяйственных кризисов. Общие экономические кризисы сводятся к действию спекуляции, с одной стороны, и накоплению долговых обязательств — с другой, т. е. всецело поверхностных моментов сферы обращения, а не глубоких процессов сферы производства (стр. 172–181).

    У нас нет, к сожалению, возможности остановиться на интересных научно и практически механизмах синхронизации колебаний и их усиления под влиянием разнообразных факторов периодического характера. Здесь особенно важно то, как из неправильных воздействий могут получаться устойчиво правильные эффекты, а из минимальных, но правильных воздействий — неограниченно возрастающие эффекты (стр. 192–198).

    Общие механизмы в разнородных явлениях приводят к понятию об аналогиях целых групп явлений. Общие черты в каждой такой группе образуют ее «аналогическое» ядро, или просто «ядро группы». По отношению к этому ядру можно говорить о полном равенстве диспаратных явлений: например, уравнение одного из них может прямо прилагаться к другому лишь через замену описательных элементов одного соответственными («гомологичными») элементами другого. Обширные ряды явлений электрических, тепловых, механических объединяются в такие группы, подчиненные одним и тем же закономерностям — количественным и «качественным» (в том смысле, какой придает этому слову проф. Петрович). Так, в группе аналогий У. Липпманна, относящейся к принципам сохранения материи, сохранения электричества и принципу Карно со всеми их аналитическими последствиями, гомологичные элементы, играющие одну и ту же роль в уравнениях, таковы:

    1) потенциал Ньютоновского тяготения, потенциал электрический, абсолютная температура;

    2) количество вещества, количество электричества, энтропия;

    3) энергия тяготения, энергия электрическая, количество теплоты (стр. 204).

    Среди множества интересных аналогий подобного рода автор приводит одну, которая вызывает у нас невольную улыбку:

    «По некоторым экономическим теориям существует будто бы (il у aurait) математическая аналогия между явлениями экономики и тепловыми явлениями в газах… Гомологичные элементы многочисленны; вот главные из них:…давлению газов соответствует предложение,

    температуре — спрос,

    объему — ценность,

    количеству теплоты — капитал,

    энергии — богатство,

    механической работе — экономическая» (стр. 205).

    Зато автор подробно останавливается на интереснейших аналогиях К. А. Бьеркнеса, который создал точные, в смысле свойств притяжения и отталкивания, модели электрических и магнитных полюсов из эластических шариков, наполненных воздухом и пульсирующих или колеблющихся, а также гидродинамические модели электрических токов; К. А. Бьеркнесу удалось показать полную аналогию расположения силовых линий гидродинамического поля его моделей с магнитными «спектрами» из железных опилок. Так же интересны аналогии, идущие вплоть до мелких деталей, между процессами намагничивания и эластическими изменениями в процессах кручения — поражающий параллелизм, указанный Г. Видеманом. Еще больше, быть может, значения для будущего развития науки имеют многочисленные аналогии «возбудимости» и «утомляемости» неорганических веществ и организованных тканей, излагаемые автором по исследованиям Дж. Ч. Бозе. Отмечу еще те широкие аналогии, неоднократно подчеркнутые в прежних работах и мною, которые вытекают-из распространения «закона равновесия» Гиббса и Ле-Шателье на процессы биологические и социальные (стр. 231–233).

    Меньше научного значения при нынешнем уровне психологии приходится придавать аналогиям борьбы мотивов в сознании с правильным сражением (стр. 242–246). Здесь не может быть научной точности до тех пор, пока волевые процессы не сведены аналитически к сочетаниям рефлексов первичных и условных. Равным образом и аналогии бесчисленных явлений с «борьбой» вообще требовали бы научного исследования реальных фактов борьбы, которые привели бы к надлежащему оформлению самого понятия «борьбы».

    Тут автор от научных иллюстраций переходит к бесчисленным аналогиям, выражаемым сравнениями, уподоблениями и метафорами в обыкновенной речи и в литературе. Из десятков его примеров приведем один, довольно банальный, но хорошо иллюстрирующий родство этих «образных» аналогий с научными: «Жизнь есть не что иное, как непрерывная борьба тенденций, импульсов, решений, которые сталкиваются в противоречиях, взаимно уничтожаются или смешиваются, сливаются, слагаются, координируются, порождая отзвуки одни в других». (стр. 251).

    «Подобные сравнения, — говорит автор, — помимо возможного поэтического интереса и силы выражения, могут представлять также и положительный интерес на реальной основе — существования определенной суммы особенностей, образующих ядро групповой аналогии». В этом случае они способны стать исходным пунктом и для научного исследования. Нет надобности пояснять, что большинство таких «аналогий донауч-ного мышления», как я бы их назвал, в своей наивной поверхностности обречены оставаться разговорными и поэтическими. Но надо помнить, что и всякая научная аналогия зарождается в исследующем сознании первоначально лишь в виде донаучно-го сравнения, сопоставления, догадки, а потом уже развивается до высшего познавательного типа.

    Вся философия по существу сводится к систематизированным догадкам — сопоставлениям подобного типа, которые могут тяготеть к переходу в научные аналогии — обобщения и схемы закономерностей, но не являются таковыми, пока не могут быть проверены в точном применении на практике.

    Здесь граница. И учение об аналогиях может стать наукою постольку, поскольку оно перейдет в живую практику исследования для творчески-трудового применения.

    Петрович на ряде фактов из истории науки иллюстрирует реально-творческое значение аналогий, которые вели и к открытию новых фактов, и к объяснению прежних. Но если до сих пор применение аналогий было делом стихийно-случайных сопоставлений того, что по внешней разнородности раньше не сопоставлялось в мышлении людей, то теперь оно должно стать сознательно-планомерным. Надо, чтобы ньютонам не требовалось ждать падения яблок.

    Петрович улавливает в общем и научно-эвристическое, и научно-монистическое значение теории аналогий. Но ее развитие представляется ему всего только как накопление новых и новых аналогических групп и ядер плюс детальный их анализ до пределов возможного. Из этого должна получиться «общая феноменология» как особая отрасль «натурфилософии» (philosophic Naturelle). Чересчур скромная в сущности оценка всей задачи. И зависит она от того, что мысль ученого остановилась на полдороге.

    Петрович потому и думает уместить учение об аналогиях в рамки «философии», да еще всего только одной ее отрасли, что в его представлении оно не вполне наука, а какая-то полунаука. Он не дошел до идеи необходимости научного объяснения аналогий. Мало их собирать и анализировать, даже применять и проверять, — надо найти их основания.

    Жизненные функции человека и микроба представляют огромные аналогии. Но эти аналогии не только констатируются и проверяются, они объясняются. Чем именно? Определенным строением живой протоплазмы, образующей основу тех или других функций, следовательно, основу и самой их аналогии. И если аналогиями связываются сами «диспаратные» явления, это указывает на единство строения самых различных объектов бытия. Научная теория аналогий ведет к постановке вопроса об универсальных типах и закономерностях строения, о структурном единстве вселенной. И эта постановка вопроса должна быть научно-опытной, а не философски-гадательной. Выясненные закономерности строения должны давать возможность предвидения дальнейших аналогий, а предвидение подлежит проверке, и когда оно практически подтверждается, его основа становится прочным приобретением науки.

    От частных аналогий к универсальным, от универсальных аналогий к общим законам мирового строения — такова эта линия научного монизма, начальные этапы которой намечает работа сербского профессора. Поставить задачу шире он не мог благодаря буржуазно-научному воспитанию, так ярко сказавшемуся на его иллюстрациях из социальной области. Мышление, воспитанное на анархичности социальных процессов капитализма, не может быть последовательно-организационным.

