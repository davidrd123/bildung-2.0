# Working glossary for recurring terms.
# `preferred` can remain null while the term is still unstable.

- term: "Тектология"
  kind: title_term
  preferred: "Tektology"
  alternatives:
    - "Tektologiya"
    - "Universal Organizational Science"
    - "Organizational Science"
  status: open
  notes: "Keep the English title pressure visible at the project level. The known English `Tektology` is strong, but the full title keeps pressing toward something broader than a bare transliteration. By `2.b-2.c` Bogdanov explicitly frames it both as the `completion of the cycle of the sciences` and as a `universal natural science`, which makes the scope claim harder to soften."

- term: "организационная точка зрения"
  kind: concept
  preferred: "organizational point of view"
  alternatives:
    - "organizational viewpoint"
    - "organizational perspective"
  status: tentative
  notes: "The opening section treats this as the governing methodological claim, not a passing phrase. `Point of view` stays closest to the explicit polemical broadening of the term. By `2.c` it is no longer just a way of rereading existing material: it is also what allows Bogdanov to claim that any scientific question can be reposited organizationally and that wholly new cross-domain questions can be generated from that stance."

- term: "комплекс"
  kind: concept
  preferred: "complex"
  alternatives:
    - "formation"
    - "configuration"
  status: tentative
  notes: "By `2.a.1-2.a.3` the term is structurally unavoidable. `Complex` is still the least distortive starting point, but it must be watched for overly psychological or casual English overtones."

- term: "конъюгация"
  kind: concept
  preferred: "conjugation"
  alternatives:
    - "combination"
    - "conjoining"
  status: tentative
  notes: "By `3.a.1` this becomes the primary formative tektological mechanism: the joining of complexes from which separation appears only as a derivative result. `Conjugation` is preferable because the term has to remain fully formal, applying equally to cooperation, war, chemical combination, perception, and other cases."

- term: "ингрессия"
  kind: concept
  preferred: "ingression"
  alternatives:
    - "mediated linkage"
    - "intermediary linkage"
  status: tentative
  notes: "By `3.a.3-3.a.9` this names the basic organizational linkage achieved through common elements or, when direct linkage is impossible, through intermediary complexes; then it expands into a basis of cognition, criticism, social coordination, and finally the continuity-principle of the world. The borrowed technical form is preferable to paraphrase because Bogdanov is naming a general mechanism."

- term: "дезингрессия"
  kind: concept
  preferred: "deingression"
  alternatives:
    - "negative ingression"
    - "disingression"
  status: tentative
  notes: "By `3.a.4-3.b.3` this names the basic form of disorganization corresponding to ingression, then the mechanism through which Bogdanov derives separateness, crisis, and incomplete boundary-conditions of experience, and finally the operative negative side of progressive selection, where external activities invade and deassimilate a complex. The English is awkward, but that awkwardness is methodological: Bogdanov is introducing a formal counter-mechanism rather than a familiar process-name."

- term: "отдельность"
  kind: concept
  preferred: "separateness"
  alternatives:
    - "distinctness"
    - "separate form"
  status: tentative
  notes: "By `3.a.5` Bogdanov treats this not as a primitive metaphysical fact but as the practical interruption of activities-resistances, and therefore as something derivable from deingression. `Separateness` is slightly hard in English, but `distinctness` would make the category too purely epistemic."

- term: "кризис"
  kind: concept
  preferred: "crisis"
  alternatives:
    - "organizational crisis"
    - "critical transformation"
  status: tentative
  notes: "By `3.a.6` and `3.b.3` Bogdanov gives this ordinary-looking word a strict technical role: first rupture or formation of tektological boundary, then the threshold at which cumulative structural changes under progressive selection pass into qualitative transformation. Keep the plain English term, but guard against reading it only as catastrophe."

- term: "связка"
  kind: concept
  preferred: "bond"
  alternatives:
    - "link"
    - "tie"
  status: tentative
  notes: "By `3.a.8-3.a.9` this has become structurally real rather than merely local. It names the coinciding or mediating part through which an ingressive relation holds. `Bond` works if kept formal and structural rather than psychological or sentimental."

- term: "цепная связь"
  kind: concept
  preferred: "chain connection"
  alternatives:
    - "chain linkage"
    - "linked connection"
  status: tentative
  notes: "By `3.a.2` this becomes the structural bridge term between `conjugation` and `ingression`: the organized form produced through common links. `Chain connection` is slightly hard in English, but it preserves both the linked-image and the formal generality Bogdanov wants."

- term: "организованность / дезорганизованность"
  kind: concept_pair
  preferred: "organizedness / disorganizedness"
  alternatives:
    - "organization / disorganization"
    - "organized character / disorganized character"
  status: tentative
  notes: "By `2.a.1-2.a.3` this pair governs the whole local argument. The main risk is collapsing a property of structured combination into a looser sociological or managerial register. The harder `organizedness / disorganizedness` currently looks preferable because it keeps the conceptual pressure visible."

- term: "активности-сопротивления"
  kind: concept
  preferred: "activities-resistances"
  alternatives:
    - "activity-resistances"
    - "activities and resistances"
  status: tentative
  notes: "Introduced structurally in `2.a.2` as the reducible elements of organizational analysis. The hyphen matters because Bogdanov is not merely naming two classes of things but insisting on their reversibility."

- term: "нейтральные комплексы"
  kind: concept
  preferred: "neutral complexes"
  alternatives:
    - "neutral combinations"
    - "neutral systems"
  status: tentative
  notes: "Introduced in `2.a.2` as the third basic type beside organized and disorganized complexes. The term becomes philosophically weighty when mathematics is defined as the `tektology of neutral complexes`."

- term: "подбор"
  kind: concept
  preferred: "selection"
  alternatives:
    - "sorting"
    - "selective filtering"
  status: tentative
  notes: "By `3.b.1-3.b.3` Bogdanov has generalized the biologically inherited term into the universal name of the regulating mechanism. The opening pair `отбор / подбор` cannot be cleanly preserved in English without false nuance, so the working draft collapses them into `selection`. The main discipline is to keep the term broader than Darwinian natural selection or mere screening."

- term: "консервативный подбор"
  kind: concept
  preferred: "conservative selection"
  alternatives:
    - "preservative selection"
    - "selection of preservation"
  status: tentative
  notes: "Introduced at the close of `3.b.1` as the first, abstract schema in which only preservation or non-preservation is at issue. `3.b.2-3.b.3` show it to be insufficient once preservation is reinterpreted as mobile equilibrium and development, but not obsolete: it still governs cases where complexes are treated as available material rather than as developing formations."

- term: "подвижное равновесие"
  kind: concept
  preferred: "mobile equilibrium"
  alternatives:
    - "dynamic equilibrium"
    - "moving equilibrium"
  status: tentative
  notes: "By `3.b.2-3.b.3` this replaces any notion of pure preservation: a form persists only through opposed changes balancing one another. `Mobile equilibrium` is preferable because Bogdanov is naming not mere motion but a preserved relation of changes."

- term: "ассимиляция / дезассимиляция"
  kind: concept_pair
  preferred: "assimilation / deassimilation"
  alternatives:
    - "assimilation / disassimilation"
    - "appropriation / loss"
  status: tentative
  notes: "In `3.b.2-3.b.3` the biological pair is generalized to all tektological forms as the two opposed streams of mobile equilibrium and its deviations. `Deassimilation` is slightly hard in English, but it preserves the formal relation to `assimilation` and fits the deliberate technicality of the Russian."

- term: "прогрессивный подбор"
  kind: concept
  preferred: "progressive selection"
  alternatives:
    - "developmental selection"
    - "progressive regulation"
  status: tentative
  notes: "By `3.b.3` this names the deeper schema in which preservation in a changing environment requires growth of activities, decline is expressed as the predominance of deassimilation, and both positive and negative selection alter structure until they pass into crisis. The term should stay formally organizational rather than being moralized as `progress`."

- term: "количественная устойчивость"
  kind: concept
  preferred: "quantitative stability"
  alternatives:
    - "quantitative persistence"
    - "stability in quantity"
  status: tentative
  notes: "By `4.1` this names stability in the direct sense of the summed quantity of activities-resistances concentrated in a complex. Positive selection is identified with its increase, negative selection with its decrease. The term is comparatively straightforward, but it matters because Bogdanov now explicitly separates it from structural stability."

- term: "структурная устойчивость"
  kind: concept
  preferred: "structural stability"
  alternatives:
    - "organizational stability"
    - "stability of structure"
  status: tentative
  notes: "By `4.1` this becomes the more delicate and important counterpart to quantitative stability. It depends on the character of the organizational connection and is always relative to definite impacts or to a bounded environment. The central pressure of the section is that positive selection can reduce it while negative selection can, within limits, increase it."

- term: "относительное сопротивление"
  kind: concept
  preferred: "relative resistance"
  alternatives:
    - "relative resilience"
    - "resistance ratio"
  status: tentative
  notes: "By `4.2-4.3` this becomes the operational term through which Bogdanov states when a whole holds or fails and then how it must be organized in practice. The key threshold is `1`: at that level full deingression occurs between the opposed terms, and below it destructive breakdown follows. `4.3` also shows the two main practical uses that grow out of the term: concentration of resistances where impacts can be foreseen, and equalization across threatened links where they cannot."

- term: "закон наименьших"
  kind: concept
  preferred: "law of leasts"
  alternatives:
    - "law of least favorable conditions"
    - "law of the minimum"
  status: tentative
  notes: "By `4.2-4.3` Bogdanov presents this as the looser, more usable formula of the law of relative resistances, especially for social-organizational practice. `4.3` makes it into a practical schema across technique, pedagogy, politics, and cultural explanation: under determinate impacts it yields concentration and shielding, under indeterminate ones equalization. `Law of the minimum` remains necessary for Liebig's agronomic case, but `law of leasts` better preserves Bogdanov's own generalized, slightly hard wording. The section also marks a limit: explaining `leveling to the lowest` is not yet the same as solving it."

- term: "слитность / четочность"
  kind: concept_pair
  preferred: "fusedness / beadedness"
  alternatives:
    - "fused / beaded structure"
    - "compactness / beadedness"
  status: tentative
  notes: "By `4.4` this pair becomes structurally real. Bogdanov himself says the terms are only provisional and should not be taken as literal physical imagery: what they name is the relative quantity and evenness of a complex's contacts with its environment. `Fusedness` is favored under negative selection, `beadedness` under positive selection, so long as the environment is treated as indeterminate in the sense clarified at the end of the section."
