# Working glossary for recurring terms.
# `preferred` can remain null while the term is still unstable.

- term: "Тектология"
  kind: title_term
  preferred: "Tektology"
  alternatives:
    - "Tektologiya"
    - "Universal Organizational Science"
    - "Organizational Science"
  status: open
  notes: "Keep the English title pressure visible at the project level. The known English `Tektology` is strong, but the full title keeps pressing toward something broader than a bare transliteration. By `2.b-2.c` Bogdanov explicitly frames it both as the `completion of the cycle of the sciences` and as a `universal natural science`, which makes the scope claim harder to soften."

- term: "организационная точка зрения"
  kind: concept
  preferred: "organizational point of view"
  alternatives:
    - "organizational viewpoint"
    - "organizational perspective"
  status: tentative
  notes: "The opening section treats this as the governing methodological claim, not a passing phrase. `Point of view` stays closest to the explicit polemical broadening of the term. By `2.c` it is no longer just a way of rereading existing material: it is also what allows Bogdanov to claim that any scientific question can be reposited organizationally and that wholly new cross-domain questions can be generated from that stance."

- term: "комплекс"
  kind: concept
  preferred: "complex"
  alternatives:
    - "formation"
    - "configuration"
  status: tentative
  notes: "By `2.a.1-2.a.3` the term is structurally unavoidable. `Complex` is still the least distortive starting point, but it must be watched for overly psychological or casual English overtones."

- term: "конъюгация"
  kind: concept
  preferred: "conjugation"
  alternatives:
    - "combination"
    - "conjoining"
  status: tentative
  notes: "By `3.a.1` this becomes the primary formative tektological mechanism: the joining of complexes from which separation appears only as a derivative result. `Conjugation` is preferable because the term has to remain fully formal, applying equally to cooperation, war, chemical combination, perception, and other cases."

- term: "ингрессия"
  kind: concept
  preferred: "ingression"
  alternatives:
    - "mediated linkage"
    - "intermediary linkage"
  status: tentative
  notes: "By `3.a.3-3.a.9` this names the basic organizational linkage achieved through common elements or, when direct linkage is impossible, through intermediary complexes; then it expands into a basis of cognition, criticism, social coordination, and finally the continuity-principle of the world. The borrowed technical form is preferable to paraphrase because Bogdanov is naming a general mechanism."

- term: "дезингрессия"
  kind: concept
  preferred: "deingression"
  alternatives:
    - "negative ingression"
    - "disingression"
  status: tentative
  notes: "By `3.a.4-3.a.7` this names the basic form of disorganization corresponding to ingression, and then the mechanism through which Bogdanov derives separateness, crisis, and incomplete boundary-conditions of experience. The English is awkward, but that awkwardness is methodological: Bogdanov is introducing a formal counter-mechanism rather than a familiar process-name."

- term: "отдельность"
  kind: concept
  preferred: "separateness"
  alternatives:
    - "distinctness"
    - "separate form"
  status: tentative
  notes: "By `3.a.5` Bogdanov treats this not as a primitive metaphysical fact but as the practical interruption of activities-resistances, and therefore as something derivable from deingression. `Separateness` is slightly hard in English, but `distinctness` would make the category too purely epistemic."

- term: "кризис"
  kind: concept
  preferred: "crisis"
  alternatives:
    - "organizational crisis"
    - "critical transformation"
  status: open
  notes: "By `3.a.6` Bogdanov gives this ordinary-looking word a strict technical role: rupture or formation of tektological boundary. Keep the plain English term, but guard against reading it only as catastrophe."

- term: "связка"
  kind: concept
  preferred: "bond"
  alternatives:
    - "link"
    - "tie"
  status: tentative
  notes: "By `3.a.8-3.a.9` this has become structurally real rather than merely local. It names the coinciding or mediating part through which an ingressive relation holds. `Bond` works if kept formal and structural rather than psychological or sentimental."

- term: "цепная связь"
  kind: concept
  preferred: "chain connection"
  alternatives:
    - "chain linkage"
    - "linked connection"
  status: tentative
  notes: "By `3.a.2` this becomes the structural bridge term between `conjugation` and `ingression`: the organized form produced through common links. `Chain connection` is slightly hard in English, but it preserves both the linked-image and the formal generality Bogdanov wants."

- term: "организованность / дезорганизованность"
  kind: concept_pair
  preferred: "organizedness / disorganizedness"
  alternatives:
    - "organization / disorganization"
    - "organized character / disorganized character"
  status: tentative
  notes: "By `2.a.1-2.a.3` this pair governs the whole local argument. The main risk is collapsing a property of structured combination into a looser sociological or managerial register. The harder `organizedness / disorganizedness` currently looks preferable because it keeps the conceptual pressure visible."

- term: "активности-сопротивления"
  kind: concept
  preferred: "activities-resistances"
  alternatives:
    - "activity-resistances"
    - "activities and resistances"
  status: tentative
  notes: "Introduced structurally in `2.a.2` as the reducible elements of organizational analysis. The hyphen matters because Bogdanov is not merely naming two classes of things but insisting on their reversibility."

- term: "нейтральные комплексы"
  kind: concept
  preferred: "neutral complexes"
  alternatives:
    - "neutral combinations"
    - "neutral systems"
  status: tentative
  notes: "Introduced in `2.a.2` as the third basic type beside organized and disorganized complexes. The term becomes philosophically weighty when mathematics is defined as the `tektology of neutral complexes`."

- term: "подбор"
  kind: concept
  preferred: "selection"
  alternatives:
    - "sorting"
    - "selective filtering"
  status: tentative
  notes: "By `3.b.1-3.b.3` Bogdanov has generalized the biologically inherited term into the universal name of the regulating mechanism. The opening pair `отбор / подбор` cannot be cleanly preserved in English without false nuance, so the working draft collapses them into `selection`. The main discipline is to keep the term broader than Darwinian natural selection or mere screening."

- term: "консервативный подбор"
  kind: concept
  preferred: "conservative selection"
  alternatives:
    - "preservative selection"
    - "selection of preservation"
  status: tentative
  notes: "Introduced at the close of `3.b.1` as the first, abstract schema in which only preservation or non-preservation is at issue. The term matters because `3.b.2-3.b.3` immediately show it to be insufficient once preservation is reinterpreted as mobile equilibrium and development."

- term: "подвижное равновесие"
  kind: concept
  preferred: "mobile equilibrium"
  alternatives:
    - "dynamic equilibrium"
    - "moving equilibrium"
  status: tentative
  notes: "By `3.b.2-3.b.3` this replaces any notion of pure preservation: a form persists only through opposed changes balancing one another. `Mobile equilibrium` is preferable because Bogdanov is naming not mere motion but a preserved relation of changes."

- term: "ассимиляция / дезассимиляция"
  kind: concept_pair
  preferred: "assimilation / deassimilation"
  alternatives:
    - "assimilation / disassimilation"
    - "appropriation / loss"
  status: tentative
  notes: "In `3.b.2-3.b.3` the biological pair is generalized to all tektological forms as the two opposed streams of mobile equilibrium and its deviations. `Deassimilation` is slightly hard in English, but it preserves the formal relation to `assimilation` and fits the deliberate technicality of the Russian."

- term: "прогрессивный подбор"
  kind: concept
  preferred: "progressive selection"
  alternatives:
    - "developmental selection"
    - "progressive regulation"
  status: tentative
  notes: "By the opening of `3.b.3` this names the deeper schema in which preservation in a changing environment requires growth of activities and decline is expressed as the predominance of deassimilation. The term should stay formally organizational rather than being moralized as `progress`."
