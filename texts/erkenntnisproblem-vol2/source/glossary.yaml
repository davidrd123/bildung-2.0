# Working glossary for recurring Vol. 2 terms.
#
# Intentionally empty at preflight.
#
# Candidate pressures belong in `reading/preflight-audit.md` until repeated
# local Vol. 2 evidence earns a glossary entry. This keeps the glossary as a
# truth surface rather than a prediction surface.

- term: "Erfahrung"
  handle: "term:erfahrung"
  kind: concept
  preferred: "experience"
  alternatives:
    - "empirical experience"
  status: open
  notes: "Parts 002-003 make this structurally double. Bacon's positive gain is methodically ordered experience rather than passive groping, but the forms doctrine then narrows experience toward a finite, exhaustible stock of observations. Part 007 shifts the chapter frame: modern empiricism attaches to the `Erfahrungsbegriff der neueren Physik`, so `Erfahrung` now needs testing beyond the Bacon-local method problem. Part 011 turns experience from solution into ground-riddle: Gassendi wants experience to explain knowledge, but his model has to explain the transition from an absolute external object into an independent `Ich`. Part 012 explicitly compares Bacon's, Gassendi's, and Hobbes's `Erfahrungsbegriff`; in Hobbes the progress lies in the philosophical reception of exact physics, not in sense-certainty or the accumulation of observations. Part 014 sharpens the contrast: sense and memory yield knowledge of fact, while science is knowledge of consequences; Hobbes defines knowledge away from immediate empirical existence in order to preserve deductive and universal validity. Part 016 closes the Hobbes chapter by making `innere Erfahrung` and memory the only witnesses inside phantasms, then showing Hobbes pushed back toward matter as absolute source. Part 017 places `Erfahrung` low in Spinoza's `Short Treatise`: knowledge by hearsay / experience familiarizes us only with individual facts, below true belief and the clear and distinct intuition of the universal in the individual. Part 028 adds Spinoza's rejection of experience as a ground for the attributes: where essence and existence coincide, being follows from definition and must be won through rational analysis rather than empirical appeal. Part 029 tests the cost of that rejection: inaccessible attributes cannot be recovered by experience, so absolute knowledge risks shrinking to a limited excerpt of the All. Part 032 makes experience subordinate to rational grounding in Leibniz: induction and truths of fact are valid only insofar as they rest on the a priori postulate of lawfulness and can be progressively analyzed into rational grounds. Part 037 sharpens the Leibnizian limit: experience and experiments can confirm mechanical principles and determine cases, but the concept of force must account for experience rather than arise from sense-observation alone; without a common conceptual measure such as work, sensory contents remain heterogeneous sequences. Part 038 gives experience a confirming and material role rather than a grounding role: experience may confirm truths derived from ideas, and facts are the material for eternal truths' activity, but eternal truths do not take their evidence from facts. Part 039 defines what experience needs from the appearance-world: not metaphysical originals behind phenomena, but an inner connection sufficient for the purposes of experience. Part 041 gives the Tschirnhaus turn: the highest goal of rational method is experience itself and its lawful structure; experience determines the concept and helps select among rational construction-plans without replacing the concept. Part 042 shows the limit of that turn: scientific experience is raised to the central problem, but because the factual cannot be logically resolved, Tschirnhaus grounds deduction back in inner experience and leaves the reason/experience harmony as postulate. Part 043 gives Herbert's English-rationalist variant: `notitiae communes` are not experiences but conditions without which nothing can be experienced; natural instinct is an anticipation of experience rather than an abstraction from it. Part 046 opens Locke by making `reine Erfahrung` the construction material for knowledge only after metaphysical soul theory and innate explanatory grounds have been excluded; experience is not yet sensation alone but the field in which direct observation and genetic analysis can operate. Part 047 splits Locke's experience internally into sensation and reflection: experience is no unitary stock but two source-moments that cooperate in the appearance-world while remaining distinct in kind. Part 048 shows the limit of immediate experience: finite stretches can be experienced or observed, but the infinite requires a rule-governed consciousness of possible advance that cannot be justified by empirical observation alone. Part 049 closes section I by making empirical physics the pressure point: experience forces Locke to distinguish empty space from body and to admit pure space for motion, yet simple sensation still carries a metaphysical warrant for external things. Part 050 makes Lockean empiricism a resigned experience doctrine: experience cannot become strict science because natural bodies are known only through probable facts, and the logical critique of experience begins where experience is measured against the ideal of intuition. Part 051 closes the Locke chapter by distinguishing empirical objectivity from metaphysical transcendence: experience needs objective validity, but Locke refers that validity to unknowable things instead of relating empirical judgments systematically to rational form. Part 052 gives the Berkeley turn: experience supplies constant togetherness and habit by which visible and tangible fields are associated, but this association is not logical necessity; experience regulates suggestion rather than grounding objectivity by itself. Part 053 gives the positive Berkeley reality criterion: pure experience excludes absolute matter and defines reality by constancy, lawful connection, and possible perceptions under empirical conditions, while natural science describes regular coexistence and sequence rather than deriving phenomena from metaphysical causes. Part 054 shows the limit of that Berkeley criterion: empirical association can create expected groupings, but cannot by itself warrant the timeless constancy of a common appearance-world; experience becomes creator of outer actuality without yet having a logical ground for that creation. Part 055 makes pure experience's limit explicit in Berkeley: experience can be judge against abstract metaphysics, but it cannot by itself justify a simple identical substrate of consciousness or the necessary connection needed for metaphysics and theology. Part 056 rebuilds experience as divine sign-language: the manifold of sensations can be read as one text only because a highest intelligence orders it, but this theological grounding is precisely what keeps Berkeley from Kant's critical grounding of empirical truth. Part 057 closes the Berkeley/Collier sequence by removing absolute matter through antinomy rather than sign-language; Hume must now test what regularity and lawful connection experience can claim without Berkeley's divine ground or Collier's merely negative proof. Part 058 opens that test: experience can transform impressions into objects only under a postulate of uniform recurrence, but Hume strips away Berkeley's divine guarantee and demands that connections be warranted from within experience itself."

- term: "Experiment"
  handle: "term:experiment"
  kind: concept
  preferred: "experiment"
  alternatives:
    - "experimental procedure"
  status: open
  notes: "Part 001 split experiment between lawful mediation and coercive interrogation; Part 002 made it the place where sense and understanding correct one another. Keep open while the forms doctrine shows how Bacon's method is pulled back toward substantial qualities. Part 041 reopens experiment under Tschirnhaus as an aid and regulative for concept-formation: experiments become fruitful only when guided by reason and used to determine among abstractly considered possibilities of generation. Part 050 gives the Locke contrast: experiment is a useful aid to judgment in natural philosophy, but remains a makeshift rather than the ground of scientifical knowledge."

- term: "Form"
  handle: "term:form"
  kind: concept
  preferred: "form"
  alternatives:
    - "essential form"
  status: open
  notes: "In the Bacon chapter, `Form` does not mean mathematical structure. Cassirer reads Baconian forms as self-subsisting qualities or simple natures, apparently called laws but still opposed to modern relation- and function-concepts. Part 004 sharpens this: the form-concept is also an idolic projection of logical commonality into the object."

- term: "Induktion"
  handle: "term:induktion"
  kind: concept
  preferred: "induction"
  alternatives:
    - "Baconian induction"
  status: open
  notes: "Part 003 distinguishes Baconian induction from modern empirical science: it seeks final essences by enumerating a finite field of things and abstracting common marks, rather than letting theory determine what counts as a fact. Part 041 broadens the entry beyond Bacon: in Tschirnhaus, `Induktion` and `Deduktion` are correlative paths of grounding, with methodical observation limiting and selecting among rational concept-plans."

- term: "Idole / Ideen"
  handle: "term:idole-ideen"
  kind: concept-pair
  preferred: "idols / ideas"
  alternatives:
    - "idols and ideas"
    - "idola / ideas"
  status: open
  notes: "Part 004 makes the contrast structural. Bacon wants `Idole` to be arbitrary products of the human mind and `Ideen` to be divine seals in things, but Cassirer argues that Bacon's own form-concepts become idols of the mind projected into the object. Do not confuse this Bacon entry with Gassendi's Epicurean `Idola seu Simulacra` in Part 007, where `idola` are material image-effluxes in a theory of perception."

- term: "Bewegung"
  handle: "term:bewegung"
  kind: concept
  preferred: "motion"
  alternatives:
    - "movement"
    - "change of place"
  status: open
  notes: "Part 006 makes motion the closing pressure of the Bacon chapter. Bacon wants physics to grasp things in their becoming rather than their static being, but he still treats motion as an inward qualitative appetite of bodies rather than as mathematically determinable `Ortsveränderung`. Part 007 confirms that `Bewegung` crosses into Gassendi, but as local motion and motion-state within perceptual mediation rather than as Bacon's inward appetite of bodies. Part 010 makes Gassendi's motion atomistic: continuity and different speeds are explained through indivisible motion moments and inserted pauses of rest. Part 012 makes Hobbes the sharpest turn so far: motion is a pure mathematical relation that thought can construct and therefore fully comprehend. Part 013 makes motion the `Mittelbegriff` between natural reality and logical method: body is philosophy's subject because only body has exact more/less, and body must ultimately be traced back to motion. Part 015 destabilizes this bridge: time is a phantasm of motion and space/time are formations of mind, so it becomes obscure how motion can also be independent absolute being. Part 016 makes motion the explanatory substrate of sensation itself: sensory perception is the reflex of motions in bodily organs, but this pushes Hobbes beyond the internal standpoint of phantasms. Part 017 reopens motion in Spinoza's `Short Treatise` as part of all-nature's causal order: the soul cannot create new bodily motions, but can redirect existing motion. Part 021 makes the nature of motion one of the mediating fixed-eternal structures: individual motion-appearances are not gathered empirically but derived from the common, constant nature and laws of motion. Part 035 turns motion into the first pressure point of Leibniz's continuum problem: transcreation treats motion as repeated annihilation and recreation rather than continuous passage, but Cassirer presents this as a metaphysical detour that must yield to a logical account of continuity. Part 036 makes `Bewegung` an ideal rational basic concept rather than an empirical datum: it is the principle through which thought constructively lets the composite arise from the simple, and the continuity of movement is grounded in rational order rather than in a direct metaphysical proof from motion's essence. Part 037 shows that motion alone still lacks actual existence as a whole; physical dynamics needs force to express the present state as tending toward the following state and to make motion intelligible as continuous temporal occurrence. Part 039 turns relative motion into an example of truth-as-intelligibility: the Copernican system is true because it explains the greatest range of appearances from the simplest assumptions, not because it alone copies an absolute corporeal order. Part 040 closes the Leibniz chapter by reducing motion, with space and time, to grounded `modi considerandi`: not things, but valid ways of considering appearances inside the harmonic system. Part 049 gives the Locke contrast: motion is the phenomenon that forces Locke away from a purely relational/empiricist space doctrine, because empirical physics needs pure space distinct from body to make motion intelligible and to save it. Part 053 gives the Berkeley/De motu pressure: colors and sounds may be reduced to figure and motion for scientific articulation, but forces in mathematical natural philosophy are only methodical auxiliaries for grouping phenomena, not real powers producing them. Part 054 turns Berkeley against the scientific objectification of motion: by treating motion as change among sensory qualities inside sensory intuition, he dissolves absolute motion but cannot explain exact lawfulness of motion within experience. Part 057 adds Collier's unrealized motion-pressure: antinomies of motion are said not to affect a sensible world, but Cassirer stresses that Collier never gives the positive resolution he promises."

- term: "Ursache / Bedingung / Erzeugung"
  handle: "term:ursache-bedingung-erzeugung"
  kind: concept-cluster
  preferred: "cause / condition / generation"
  alternatives:
    - "causal definition"
    - "generating condition"
    - "construction"
  status: open
  notes: "Parts 012-013 earn this as a Hobbes-method entry. Part 012 changes cause from inner force or substantial form into the complete aggregate of conditions whose positing makes an effect necessary. Part 013 generalizes the point: to understand a content is to let it arise from its generating conditions; geometry is demonstrable because we generate its figures, and physics must imitate this method by deriving appearances from possible causes. Part 014 adds the `Willkür` pressure: demonstrative science is granted only where generation depends on human arbitrium, but Cassirer reads this as methodical freedom rather than mere caprice. Part 020 brings the cluster under Spinoza pressure: generating conditions are no longer primarily Hobbesian conditions of human construction but the real grounds from which the particular is deduced, closing in the equation of `Realgrund / Erkenntnisgrund`, `causa / ratio`. Part 021 sharpens this: mathematics does not dissolve physical cause into function; mathematics takes cause into itself, and deduction proceeds through fixed-eternal grounds rather than empirical causal sequences. Part 022 makes the Hobbes/Spinoza limit explicit: Hobbes can know what is generated, while Spinoza lets causal definition culminate in `causa sui`, where the ungenerated is understood through essence alone. Part 023 turns the limit into the substance/mode problem: every finite mode leads causally only to another finite mode of the same kind, so causal sequence alone cannot attach the chain of the finite directly to infinite being. Part 024 defines divine action as necessary natural order: no gap, intervention, or alternate course of occurrence can be admitted without positing another God. Part 027 makes `causa` and `ratio` interpenetrate: mathematical law is not merely an expression of real relations but has its own efficacy. Part 028 makes the logical reduction explicit: cause and effect become a pure conceptual relation in which the cause conditions the effect as premises condition a conclusion; a twofold causality would mean a twofold logic. Part 037 gives the Leibnizian dynamics version: causes are taken not from real influx but from the rendering of a reason, and cause/effect equality becomes a postulate by which temporal becoming is made rationally accountable. Part 041 gives the Tschirnhaus method version: explanation of an individual thing must include its nearest cause and ascend to the totality of its nearer and farther conditions, but this causal insight is aimed at empirical physics rather than Leibnizian harmony. Part 042 sharpens the limit: real or physical things are supposed to be thinkable from one cause and one single way of arising, but this causal criterion pushes empirico-physical being outside Tschirnhaus's logical circle rather than turning it into Leibniz's infinite method-task. Part 055 adds the Berkeley variant: the critique of causes in empirical natural science concerns the application of the causal principle, not the principle itself; genuine cause returns as rational inference from phenomena to spiritual powers and divine substance."

- term: "Definition / Konstruktion"
  handle: "term:definition-konstruktion"
  kind: concept-cluster
  preferred: "definition / construction"
  alternatives:
    - "genetic definition"
    - "rule of construction"
    - "constructive definition"
  status: open
  notes: "Parts 019-020 earn this as a Spinoza entry. Part 019 uses the sphere example to show that true cognition depends on the law by which an object is thought as arising. Part 020 names the doctrine explicitly: genuine scientific definition is genetic, not a description of marks or a scholastic generic abstraction. It lets the object arise before the mind in lawful sequence. Part 021 confirms the metaphysical reach of the doctrine: mathematics takes cause into itself, and the laws of motion become the route from changing particulars to fixed and eternal structures. Part 022 identifies Hobbes as the historical mediator of this method while also marking the limit Hobbes cannot cross: causal definition in Spinoza closes in `causa sui`, not merely in generated empirical objects. Part 023 makes geometry constitutive for substance metaphysics: the geometrical method is not an external proof aid, but the means by which Spinoza's concept of being is first set and grounded. Part 024 confirms this as an order-concept: objectivity means lawful connection, not the aggregation of individual things. Part 025 returns to the definition problem from the negative side: abstract existence is not a true definition, because Spinoza requires a particular affirmative essence rather than a common predicate smuggled in as positive content. Part 026 gives the positive answer as order: particular things are known in a rational structure that the mind can reproduce through premises and conclusions. Part 027 distinguishes mathematical `sequi` from dynamic `operari` without separating them completely; mathematical natural explanation itself becomes animated in Spinoza. Part 028 identifies analytic geometry as the model of construction across attributes: one functional connection appears as order of objects and necessary sequence in thought, so methodical construction becomes substance doctrine. Part 030 gives the limit of this geometry norm: making geometry the sole norm means explaining being from space-intuition and logical inference, the two attributes given to us. Part 031 shifts the cluster into Leibniz: genetic construction and real definition remain central, but causal definition now requires preparatory analysis, nominal definitions, and the critical examination of truth's own presuppositions before first concepts can be claimed. Part 032 makes definition the ground of general judgment: the generality of a concept is not quantitative extension but qualitative structure, so whatever follows from the concept's ideal sense applies distributively to each member of its range. Part 033 makes the early universal science an element-construction program: complex concepts are to be assigned to basic classes and characteristic numbers before their compatibility can be calculated. Part 034 transforms this construction program: the basic element is no longer presupposed simple content, but is deduced through rule-governed thought-movement in function and position-calculus. Part 035 gives genetic definition its mathematical fulfillment in the infinitesimal calculus: the true element is now the rule of generation, differential calculus secures the conditions of a magnitude-content, and integral calculus constructs that content from the totality of conditions. Part 036 explicitly roots the infinitesimal calculus in the doctrine of the conditions of definition and deductive proof; mathematical discovery is an execution of the analysis of concepts, not an isolated technical invention. Part 041 brings the cluster through Tschirnhaus: to comprehend a thing is to let it arise before the mind, and every legitimate definition must include generation; the novelty is that this genetic definition is immediately yoked to experiment and experience as regulatives for the particular sciences. Part 042 shows the limit of that narrowing: real or physical things are supposed to have one generation and one cause, but Tschirnhaus does not transform truths of fact into an infinite task of method as Leibniz did. Distinguish this from the Hobbes construction entry: Hobbes emphasizes what thought can generate or institute; Spinoza makes genetic definition the route by which real order and necessary acts of thought coincide; Leibniz turns the same pressure toward analysis of possibility, definition, judgment, function, symbolic construction, infinitesimal generation, and continuity; Tschirnhaus narrows the same inheritance toward methodical physics and experiential determination, then exposes the unresolved reality gap this narrowing leaves."

- term: "feste und ewige Dinge"
  handle: "term:feste-ewige-dinge"
  kind: concept
  preferred: "fixed and eternal things"
  alternatives:
    - "fixed and eternal structures"
    - "stable and eternal things"
  status: open
  notes: "Part 021 earns this as the mediating doctrine inside Spinoza's `Tractatus de intellectus emendatione`. Cassirer reads the phrase neither as an immediately settled equivalent of Baconian forms nor as simply the later attributes or infinite modes, but as the route by which mutable particulars are derived from the laws and basic natures without following empirical sequences one by one. The concrete examples are the nature/laws of motion and the essence of understanding. Part 022 identifies Hobbes's `Universalia` as the closest historical-methodical parallel and limits the Bacon-forms comparison: Bacon matters polemically, while Hobbes's Galilean reinterpretation mediates the positive method. Part 023 tests the bridge into substance metaphysics by showing that the finite causal chain cannot itself reach infinite being; the fixed-eternal mediation now has to face the old pantheism riddle of the All and its parts. Part 026 rephrases the mediating answer as the order of individual beings: the material remains particular things, but they are grasped in a necessary mathematical dependence."

- term: "Begriff / Wort / Zeichen"
  handle: "term:begriff-wort-zeichen"
  kind: concept-cluster
  preferred: "concept / word / sign"
  alternatives:
    - "concept and word"
    - "word and sign"
    - "naming"
  status: open
  notes: "Part 014 earns this as the second major Hobbes-method entry. Hobbes's nominalism first threatens to dissolve truth into arbitrary names and practical conventions, but Cassirer reads the deeper motive as rationalist: the word fixes active judgment, lets number and calculation become repeatable, and carries a particular insight into universal validity. Part 014's `veritas in dicto` is best kept as truth in what is said / assertion-content, not merely spoken sound, because later proposition-structure questions may need `dictum` more precisely. Part 016 generalizes the pattern: self-created principles become binding powers in logic, politics, and nature. Parts 019-020 give the Spinoza contrast: idea is `conceptus` rather than `perceptio`, and definition is not naming or sign-fixing but lawful generation of the object in thought. Part 022 sharpens the nominalism split: Spinoza rejects the move from thought-product to arbitrary convention because the true idea directly guarantees objective necessity. Part 032 brings the sign layer into Leibniz through `allgemeine Charakteristik`: symbolic cognition and lawful sign-combinations are aids for unfolding composite concepts toward primitive intuitive truths. Part 033 gives the first concrete sign-model: a thought alphabet and characteristic numbers by which concept-compatibility and true judgment can be calculated. Part 034 changes the sign layer from characteristic numbers to adequate symbolic cognition: abbreviated signs in the analysis of position reproduce relations that sensible images cannot display. Part 038 opens the broader symbol problem: words and arbitrary signs matter only as one class of expressions, while scientifically grounded signs are valid because they preserve relations rather than copy things. Part 039 confirms that scientific hypotheses themselves are not copies but ways of working up observational material so that unity appears in manifoldness. Part 040 closes the Leibniz sign arc by saying concepts themselves are more or less perfect signs through which we seek insight into the universe's structure. Part 043 gives a Herbert layer: objects, words, and signs awaken common notions but do not carry them into the mind; this keeps sign-contact subordinate to an inward common-notion possession. Part 044 gives the Digby layer: nothing can be expressed in speech without the designation of being, so word/sign is subordinated to the concept of being and to judgment's `Ineinssetzen`. Part 046 shifts the concept-problem into Locke's genetic method: every concept must be resolved into the process of its genesis before its content and meaning can be decided, but this genesis serves logical analysis rather than mere chronology. Part 047 adds the Locke idea/representation pressure: simple ideas and mixed modes are not yet signs but fixed representational elements, so concept-formation is initially reduced to grouping, comparing, connecting, and separating sensory material. Part 048 strains that reduction: the infinite cannot remain a blurred individual idea or representational image, because its content depends on a rule of possible continuation. Part 049 adds two Locke layers: speech can illegitimately reify empty space by singling it out with a word, while the alphabet-of-thoughts analogy shows Locke sharing rationalism's combinatorial schema but grounding it in material simple sensations rather than forms. Part 050 adds the truth-section split from Hobbes: mathematical signs aid memory but do not ground generality, because necessary idea-relations carry the warrant. Keep open so the Hobbes sign problem, Spinoza concept/definition problem, Leibniz expression-symbol problem, Herbert common-notion problem, Digby being/designation problem, and Locke genetic-analysis problem do not collapse into one entry. Part 051 makes the word-problem explicit in the substance critique: substance becomes a mere word when it is sought as an isolated content, yet the word marks a function that Locke cannot place in the system of knowledge. Part 052 makes sensory signs central in Berkeley: the visible does not copy the tangible but signifies it through learned correlation, so sign-function enters the perception problem before any explicit theory of language. Part 053 extends the sign/concept problem into abstract concepts and words: abstract generality is a representative function of an individual case, and the veil of words helps sustain the false abstraction of existence as thing-like being. Part 054 makes the concept-problem explicit: Berkeley can reject abstract generic images, but representative function cannot be reduced to associative awakening; comparison, definition, and identity-setting require a general standpoint and a formal sense that mere signs or grouped ideas cannot supply. Part 055 makes Berkeley's `idea` / `notion` correction explicit: `idea` cannot name spirits and relations, so the concept/sign entry now has to track a Berkeley distinction between sensory idea, notion, and the broader object of knowledge. Part 056 gives Berkeley's mature sign-theory: science works immediately with signs, but signs neither create ideal relations nor reduce them to names; they fix for consciousness the lawful meanings that thought connects with them. Part 058 gives the Hume radicalization: Berkeley's `general idea` is rejected with abstract generic images, and generality is assigned to the word's indeterminacy rather than to a representative relation among ideas."

- term: "Bild / Symbol / Ausdruck"
  handle: "term:bild-symbol-ausdruck"
  kind: concept-cluster
  preferred: "image / symbol / expression"
  alternatives:
    - "copy theory"
    - "symbolic expression"
    - "expression"
    - "Abbildtheorie"
    - "likeness"
  status: open
  notes: "Part 038 earns this as a Leibniz entry. Leibniz rejects the view that cognition is a faithful image or copy of an actuality existing for itself: ideas, characters, differentials, work-magnitudes, and even appearances are valid when they express relations under a lawful correspondence. `Ausdruck` is not mere representation but relation-preserving expression; `Symbol` is not arbitrary subjectivity but the form in which intelligible truth-content becomes usable without requiring likeness. Part 039 shows the same model governing scientific hypotheses and the idea/appearance relation: appearances strive toward pure ideas without becoming direct copies of them. Part 040 makes symbols the graded route to genuine actuality: being cannot be grasped and imaged at once, so each cognitive level supplies a more adequate symbol, and concepts/signs themselves become the way into the universe's structure. Part 044 supplies English-rationalist contrast evidence: Digby rejects species/images as inadequate because cognition is not mere copying, but the intellect's light and unity-function through which the thing becomes knowable. Part 045 gives the Cambridge Platonist form of the anti-copy argument: Cudworth makes it atheism's theoretical assumption that objects first exist materially and only afterward receive a copy in consciousness. Part 047 gives Locke's initial mirror form: sensation copies outer things and reflection copies inner acts, leaving both kinds of ideas on the same passive image-level before the later analysis strains the schema. Part 049 shows the limit of the Locke image model: the critique of secondary qualities still assumes true cognition aims at copying an absolute existence, so simple ideas are treated as guaranteed images of external originals rather than as symbolic functions. Part 050 distinguishes sign and image more sharply: the sensory image is not the mathematical object, and mathematical signs serve memory rather than grounding truth. Part 051 gives the chapter-close Locke version of the image problem: because Locke tries to image intellectual operations and substance as representational contents, he retains only residues and treats simple sensations as adequate copies of external causes. Part 052 gives the Berkeley turn from copy to sign inside perception itself: visual impressions are symbols for tactile-spatial relations, and objectivity begins as interpretation of signs rather than as resemblance. Part 053 generalizes this into anti-copy idealism: present perceptions are incomplete symbols of actuality, but what they symbolize is not absolute things outside mind; it is the regulated total context of possible empirical experience. Part 054 shows the limit of Berkeleyan representation as associative standing-in: one content can suggest or symbolize another, but this does not yet explain the formal differentiation by which a representation becomes conceptually general or objectively valid. Part 056 transforms the sign problem: symbols are no longer arbitrary marks or latent images but the condition of objective experience, because an individual image can stand for a general lawful connection. Part 058 marks the Hume break: the sign no longer belongs to a divine text of nature, and generality is carried by words that recall similar particulars rather than by symbolic expression of ideal relations."

- term: "Phänomen / Erscheinung"
  handle: "term:phaenomen-erscheinung"
  kind: concept-cluster
  preferred: "phenomenon / appearance"
  alternatives:
    - "world of appearances"
    - "appearance-world"
    - "phenomena"
    - "sense-things"
    - "logical truth of appearances"
  status: open
  notes: "Part 039 earns this as a Leibniz entry. The appearance-world is real not because it corresponds to thing-like originals behind phenomena, but because it forms a systematic unity under rational rules. Its proper question is logical truth, not metaphysical actuality outside every consciousness. Skepticism is blocked by the inner connection of appearances and their agreement with eternal orders, while the individual appearance remains inexhaustible and never collapses fully into pure rational principles. Part 040 gives the monadological grounding: subjective images make one universe of appearances because the representing subjects are functionally attuned and ordered under harmony, not because they copy one external object. Part 053 gives the Berkeley contrast and partial convergence: reality of appearances lies in constancy, order, and lawful recurrence rather than corporeal originals, but Berkeley grounds this appearance-reality in empirical association and possible perceptions rather than Leibnizian rational rules. Part 054 makes the Berkeley appearance-reality problem unstable: if lawful constancy is grounded only in association and divine will, the common world of phenomena lacks the objective-conceptual ground that Leibniz supplied through rational rules. Part 057 adds Collier's negative version: the sensible world is not denied, but absolute external matter is shown to be contradictory; the positive account of how the sensible world remains valid from the new standpoint is promised rather than supplied. Part 058 turns this into the Hume problem: without a rule of recurrence, the cryptogram of nature is unreadable, but that rule now has to be justified from experience rather than from intelligible order."

- term: "Scientia generalis / Charakteristik / Kombinatorik"
  handle: "term:scientia-generalis-charakteristik-kombinatorik"
  kind: concept-cluster
  preferred: "general science / characteristic / combinatorics"
  alternatives:
    - "alphabet of thoughts"
    - "thought alphabet"
    - "characteristic number"
    - "combinatorics"
    - "art of combinations"
  status: open
  notes: "Part 032 held `Scientia generalis`, `allgemeine Charakteristik`, and `Logik / Kombinatorik` as ledger pressures until section II could test whether they became structurally central. Part 033 earns the entry: the section opens with the demand for an alphabet of thoughts, takes number as the first analogue of adequate cognition, assigns composite concepts to characteristic numbers, and makes combinatorics appear as a finished schema for all questions actuality can pose. Part 034 immediately transforms the cluster: `De Arte combinatoria` is only a programmatic design, and the universal science turns from element-determination to forms of connection, higher logical forms, function, and geometric characteristic. Part 035 tests the transformation against the continuum: the discrete manifold and analysis of position cannot by themselves handle space, time, and continuous change, so the universal science has to become an analysis of the infinite. Part 036 shows why the historical priority question belongs inside this cluster: the new calculus is derived from the `inner source` of Leibniz's philosophy and from the analysis of concepts, not from a merely local mathematical technique. Part 037 makes natural philosophy the next field for this method: in a higher characteristic, given a body's state as a formula, all following states would be readable from it, so dynamics becomes the test of whether the general science can handle temporal occurrence. Part 038 clarifies why characteristic signs are not arbitrary conventions: characters sensibly present intelligible truth-content by preserving object-relations, allowing work on the signs to stand in for work on the objects. Part 039 marks the logical limit: the individual fact remains an inexhaustible task even though a rule of progress can bring predicate and subject ever closer. Part 040 makes that limit explicit as the natural boundary of finite `Scientia generalis`; the system then turns toward primitive force, monadology, and harmony rather than a completed finite analysis of the individual. Part 041 gives the Tschirnhaus contrast: Tschirnhaus refuses Leibniz's universal extension of method and subordinates combinatorics to number-theory, narrowing the Cartesian-language ideal toward algebraic treatment of physics rather than a full universal science. Part 042 makes the cost explicit: without Leibniz's thought that truths of fact are the infinite task of general method, the factual becomes a domain outside logic rather than the field of its endless application."

- term: "Funktion / Funktionsbegriff"
  handle: "term:funktion-funktionsbegriff"
  kind: concept-cluster
