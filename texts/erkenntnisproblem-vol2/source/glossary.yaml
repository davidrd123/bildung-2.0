    - "forms of connection"
  status: open
  notes: "Part 034 earns this as a Leibniz entry. Cassirer says the function concept now takes the place of the number concept as the proper ground and content of mathematics. This does not merely add a mathematical term; it transforms the universal science from a search for simple elements into an inquiry into forms of connection, rule-governed transitions from concept to concept, and symbolic reconstruction of relations. Part 035 confirms that continuity and infinitesimal analysis are the first major test of the function turn: a fixed law of coordination retains full sense and validity even when the magnitudes that first presented it vanish for intuition. The function concept is now the deepest instrument for number- and magnitude-determination themselves. Part 036 restates this as the principle of continuity: if a continuous transition ends in a limiting term, a common rational consideration must include that limit, even where intuitive likeness disappears. Part 040 closes the chapter by showing the function concept expand into the harmony concept of ethics and metaphysics: function is not left behind by monadology but becomes the logical basis for the system's ideal agreement of viewpoints."

- term: "Kontinuum / Stetigkeit / Infinitesimal"
  handle: "term:kontinuum-stetigkeit-infinitesimal"
  kind: concept-cluster
  preferred: "continuum / continuity / infinitesimal"
  alternatives:
    - "the continuous"
    - "infinitely small"
    - "infinitesimal calculus"
    - "analysis of the infinite"
    - "ideal grounds"
    - "methodical fiction"
  status: open
  notes: "Part 035 earns this as a Leibniz entry. The spatial and temporal continuum cannot be composed from final units: points of space and moments of time are limits set within a finished totality, not parts or constitutive factors. Leibniz's early `transcreatio` treats continuous motion as repeated annihilation and recreation, but Cassirer presents this as a metaphysical detour that leaves a `constant miracle` where logical clarification is needed. The infinitesimal answer is conceptual, not realistic: the infinitely small is a requisite or ideal ground of magnitude, a methodical fiction with full validity as a ground but no actual separate existence in matter. Part 036 makes continuity a logical postulate for concept-formation and connection: the rule must be broad enough to include its limiting case, such as rest as a corollary of movement. Its validity is ideal, but not merely subjective, because reality itself is governed by rational order. Part 037 carries continuity into temporal occurrence: the force concept lets the present state tend toward and pre-involve the next one, while conservation of living force makes apparent new emergence a transformation of persistent magnitude rather than a breach in the continuous order. Part 038 makes continuity part of the symbolic law of appearance: actual natural phenomena never perfectly image mathematical ideas, but no actual event may violate the law of continuity or the other exact rules of mathematics. Part 039 applies the infinitesimal model to truth itself: contingent truth is secured when a rule of progress shows that the difference between subject and predicate can sink below any assigned magnitude. Part 048 gives Locke contrast evidence: the infinity problem reveals the need for a rule that lets thought survey an unfinishable series conceptually, but Locke reaches this through pressure on reflection rather than through Leibniz's infinitesimal/function apparatus. Part 054 adds Berkeley as negative contrast: because the infinitely small and the continuum lack immediate sensory images, Berkeley rejects infinitesimal mathematics and reduces the line to perceptible point-atoms, attempting the same mereological derivation that the Leibniz entry had already overcome."

- term: "Kraft / Arbeit / lebendige Kraft"
  handle: "term:kraft-arbeit-lebendige-kraft"
  kind: concept-cluster
  preferred: "force / work / living force"
  alternatives:
    - "derivative force"
    - "vis viva"
    - "living force"
    - "work"
    - "conservation of living force"
  status: open
  notes: "Part 037 earns this as a Leibniz dynamics entry. `Derivative force` is the present state as tending toward and pre-involving the following one; force is not a hidden substantial influx but the rational expression of mathematical-logical determination of future becoming by present conditions. Cause is taken from rendering a reason, not from real influx. `Arbeit` supplies the common measurable standpoint by which heterogeneous processes can be treated as magnitudes, and conservation of living force turns apparent new creation into transformation of one persistent real content. Part 038 reinterprets work-magnitude semiotically: heterogeneous sensory processes become knowable only when translated into another language as quantitative equalization and conversion of living force. Part 040 distinguishes derivative force from primitive force: derivative force names a state tending toward other states, while primitive force is the rule of the whole developmental series and therefore belongs with monadology and the individual substance. Part 055 gives Berkeley contrast evidence: force is expelled from natural science as a false metaphor for body-relations, but retained in the spiritual domain as will, efficacy, and genuine causality. Part 056 confirms the split through `De motu` and `Siris`: physics may track appearing effects and secondary corporeal causes, while true active causes belong to first philosophy and pure rational consideration."

- term: "Substanz / Monade / primitive Kraft"
  handle: "term:substanz-monade-primitive-kraft"
  kind: concept-cluster
  preferred: "substance / monad / primitive force"
  alternatives:
    - "monadology"
    - "individual substance"
    - "primitive force"
    - "organism"
    - "entelechy"
  status: open
  notes: "Part 040 earns this as the Leibniz-specific substance entry. The individual is not a thing-like remainder outside analysis but a unique law of development: a subject whose changes spring from its own nature and are logically preformed in its sequence. Primitive force names the rule of the whole developmental series, distinct from derivative mechanical force. Monadology then follows as an order of independent representing subjects whose subjective images form one universe of appearances through constant correspondence. This absorbs the `Einzelnes / Individualität` pressure for now; do not split it unless later chapters make individuality a cross-thinker problem separate from the monad/primitive-force structure."

- term: "Harmonie / Vollkommenheit"
  handle: "term:harmonie-vollkommenheit"
  kind: concept-cluster
  preferred: "harmony / perfection"
  alternatives:
    - "system of harmony"
    - "harmonic agreement"
    - "universal harmony"
    - "realm of nature / realm of ends"
  status: open
  notes: "Part 040 earns this at the Leibniz chapter close. Harmony is not merely body/soul agreement or the coordination of monadic representation sequences. In Cassirer's reading, its basic sense is the accord among different, mutually conditioning ideal ways of considering being. The function concept of mathematics expands into the harmony concept of ethics and metaphysics; teleology is not inserted as an external force into causal occurrence, but the same real connection is interpreted as the symbol of a higher spiritual order. Part 042 confirms the contrast: in Tschirnhaus, the harmony between reason and experience remains merely a postulate. This keeps Leibniz's harmony solution specific rather than making it the whole rationalist method by default."

- term: "Realität / Entia Realia / Gedankendinge"
  handle: "term:realitaet-entia-realia-gedankendinge"
  kind: concept-cluster
  preferred: "reality / real entities / things of thought"
  alternatives:
    - "Entia Realia seu Physica"
    - "real or physical things"
    - "things of thought"
    - "physical or real things"
  status: open
  notes: "Part 042 earns this as the Tschirnhaus chapter-close entry. The critical doctrine of experience fails to fulfill itself because the concept of reality remains ambiguous. Tschirnhaus divides the thinkable into sensory-intuitive things, rational/mathematical things, and physical/real things. Mathematical things are generated by mind and admit multiple equivalent constructions; real or physical things are supposed to be thinkable as arising in only one way and from one cause. But this turns the methodological distinction between intellect and imagination into a metaphysical opposition of kinds of being, leaving empirico-physical reality outside the circle of logic. Part 044 shifts the English-rationalist test: Digby does not classify real physical things as Tschirnhaus does, but makes actuality intelligible through the mind's basic concept of existence and through judgment's unity-function. Part 045 gives the Norris pressure: material-world actuality cannot be secured demonstratively from concepts or empirically by sense alone, while intelligible objects appear as the firmer possession. Keep open until Locke tests whether reality becomes theological, physical, psychological, logical, or idea-centered."

- term: "Existenz / Sein / Ding"
  handle: "term:existenz-sein-ding"
  kind: concept-cluster
  preferred: "existence / being / thing"
  alternatives:
    - "concept of the thing"
    - "Dingbegriff"
    - "existent"
    - "ens"
    - "Grundstamm des Seins"
    - "Ineinssetzen"
  status: open
  notes: "Part 044 earns this as Digby's distinct English-rationalist contribution. The analysis of truth is supplemented by analysis of the thing: existence is the final irresolvable concept, the deepest and most general means of thought, and every content must be grafted into the basic trunk of being before it can become knowledge. The thing is existence plus what possesses existence, while judgment binds separated determinations through the copula and sets them into one. Part 045 broadens the entry through Norris: the being of the copula in judgment is distinguished from concrete existence, but Norris still treats eternal truths as requiring objective intelligible being; sense cannot perceive that a thing exists because that would be to perceive a judgment. Keep open until Locke tests whether the thing/existence problem is handled through ideas, sensation, reflection, or judgment. Part 049 gives the Locke counter-pressure: simple ideas are treated as immediately warranting the objective existence of external thing-like originals, so existence/thing returns not through judgment's unity-function but as a metaphysical guarantee attached to sensation. Part 050 turns existence into the limit of knowledge: all existence-knowledge is confined to present perception, so constant things cannot be recovered from sensation alone. Part 051 makes this the Locke chapter close: being first appears as the substance-bearer and then as one of Locke's four idea-relations, but the relation to actual existence outside the mind cannot be justified by Locke's own logic of ideas. Part 052 opens Berkeley by making `Dingbegriff` the immediate target: the external thing is not psychology's presupposition but its first question, a result to be derived from perception, judgment, and suggested sensory correlations. Part 053 makes `Dasein` the fatal abstraction: existence no longer means thing-like being outside consciousness, but the lawful constancy of possible perceptions within experience. Part 054 shows the Berkeley cost: dissolving thing-like existence outside consciousness also destabilizes the empirical object itself, because identity across changing perceptions becomes a practical naming economy rather than an objective logical ground. Part 055 shifts Berkeley from empirical thinghood to the existence of spirits: the I and other spiritual beings are not known as sensory things, yet Berkeley still calls spirit a thing distinct from ideas and makes divine substance the common ground. Part 057 gives Collier's negative proof: an object detached from all relation to cognition carries the burden of proof, and absolute external matter becomes a self-contradictory impossible thing rather than a hidden support for existence."

- term: "intelligible Welt / ewige Wahrheiten"
  handle: "term:intelligible-welt-ewige-wahrheiten"
  kind: concept-cluster
  preferred: "intelligible world / eternal truths"
  alternatives:
    - "intelligible beings"
    - "intelligible natures"
    - "eternal essences"
    - "intellectual world"
    - "eternal truths"
    - "nunc stans"
    - "Noemata and Ideas"
  status: open
  notes: "Part 045 earns this at the English-rationalism chapter close. Cudworth and Norris defend science against sensualism by arguing that mathematical and logical truths cannot be derived from singular bodies, sensory reports, or the actual performance of thoughts. Eternal truths require an intelligible support: for Cudworth, an eternal mind containing intelligible natures; for Norris, objective ideal essences or correlates without which eternal relations would hang on nothing. Part 046 confirms the entry as Locke's immediate foil, but shifts the issue: Locke fights innate ideas not simply as a doctrine of intellectual contents, but as a fictive explanatory ground that blocks direct experience, observation, and free rational examination. Part 056 gives Berkeley's late Platonic layer: ideas are causes and principles, not inert thought-objects, and pure concepts such as being, good, equality, and similarity are defended against Locke as original spiritual acts. This entry absorbs `Platonismus`, `Cudworth`, `Norris`, `Malebranche`, and `nunc stans` for now. Keep open while Locke, Berkeley, and Hume test whether eternal-truth and innate-idea problems remain linked or separate."

- term: "Sensation / Reflexion"
  handle: "term:sensation-reflexion"
  kind: concept-pair
  preferred: "sensation / reflection"
  alternatives:
    - "sense-perception / self-perception"
    - "Sinneswahrnehmung / Selbstwahrnehmung"
    - "simple ideas"
    - "mixed modes"
  status: open
  notes: "Part 047 earns this as the first Locke-specific glossary entry. Cassirer presents sensation and reflection as the two source-moments into which experience splits for initial analysis. Reflection does not yet mean active self-grounding; in its first form it is an optical mirroring of inner processes, parallel to sensation's mirroring of outer things. This blocks a flat sensualist reading because sense- and self-perception are equally indispensable, but it also exposes Locke's starting schema as passive and element-like. Part 048 transforms the entry without splitting it: the infinity problem forces reflection beyond passive imprint into necessary mental activity, because the infinite requires a rule of continuation rather than an observed or mirrored content. The entry should absorb `Idee / Vorstellung`, `einfache Ideen`, `mixed modes`, and `Verbindung` for now until the space, time, number, and force analyses decide whether those pressures need separate surfaces. Part 049 closes the first section by showing the same transformation across space, time, number, and simple ideas: reflection becomes criterion/control and formative activity, but sensation is finally given a metaphysical guarantee through simple ideas' immediate agreement with external things. Part 050 shows the rupture: once intuition supplies truth, sensation/reflection cannot define the whole of cognition; outer and inner experience alike fall into probability if stripped of thought functions. Part 051 confirms the section-II rupture: sensation and reflection cannot legitimate substance, the I, or existence outside the mind, yet Locke still uses them as if they could provide access to true being through simple sensation. Part 052 shows Berkeley rejecting Locke's schematic distribution of sensation to outer existence and reflection to inner states; perception itself already requires judgment, correlation, and suggestion before an object can appear. Part 053 shifts beyond the Locke pair: perception is neither bare sensation nor reflection's mirror, but a critically corrected function that carries associative relations, possible perceptions, and the empirical context it represents. Part 055 redefines Berkeleyan reflection away from Locke's passive self-perception: it is not discursive and not a mirrored inner idea, but the intuitive act or inward feeling by which the I grasps itself and its essence. Part 056 subordinates the early sensation/reflection frame to a later ascent from sense to intellect, where sense alone never gives knowledge and pure understanding is restored only metaphysically. Part 058 introduces Hume's criterion of `reine Empfindung`: connection has to authenticate itself beside an immediate impression, so the Locke pair is re-entered from the side of impression-warrant rather than reflective form."

- term: "Wahrnehmung / Perzeption / Suggestion"
  handle: "term:wahrnehmung-perzeption-suggestion"
  kind: concept-cluster
  preferred: "perception / suggestion"
  alternatives:
    - "perception"
    - "Perzeption"
    - "suggestion"
    - "suggested"
    - "esse = percipi"
    - "pure perception"
  status: open
  notes: "Parts 052-053 earn this as the Berkeley-specific perception entry. Part 052 makes perception a problem rather than a given: sight supplies light and color, while distance, spatial order, and thinghood arise through judgment, learned correlation, habit, and Berkeley's term `suggested`. Part 053 generalizes that result into idealism: `Perzeption` in its critically corrected meaning is not an isolated sensory datum but a content plus its associative relations and its function of representing a regulated empirical context. The equation `esse = percipi` is therefore not the reduction of being to momentary sensation, but the claim that existence means possible perception under determinate conditions within the lawful order of experience. Keep open through Berkeley section III, which should test whether this perception/suggestion account can ground concept, judgment, and nature-law validity. Part 054 answers that test negatively for section III: suggestion can explain associative transition and possible perception, but it cannot ground concept-function, mathematical continuity, empirical object-identity, or the necessity of a common nature-order. Part 055 shows the limit of the Berkeley perception/suggestion surface: perceived ideas and associative signs do not contain the perceiving active being, so section IV moves from passive perception toward spirit, notion, will, and causal inference. Part 056 transforms suggestion into sign-language: perception is meaningful because it symbolically reproduces an original intelligible connection ordered by divine intelligence. Part 057 gives the Collier variant: quasi-externality is not denied, but it is explained through the natural and necessary condition of visibility and through the function of perception, not through external matter. Part 058 gives the Hume opening: perceptions must be connected to form empirical being, but that connection loses Berkeley's divine sign-guarantee and must be accounted for through experience's own repeated sequences."


- term: "Sinn / Sinneswahrnehmung"
  handle: "term:sinn-sinneswahrnehmung"
  kind: concept-cluster
  preferred: "sense / sense-perception"
  alternatives:
    - "sensory perception"
    - "sensation"
  status: open
  notes: "Parts 007-008 make this Gassendi's foundation and criterion: sense is the basis of knowledge and sense-perception is unerring because it registers a real effect. Part 008 exposes the limit of this criterion: mathematical atomism requires concepts of scientific reason for which perception is the object to be satisfied, not the origin or principle of genuine knowledge. Part 009 sharpens the limit: pure space and pure time do not act on sensory organs, so the sensory criterion cannot by itself secure their objective validity. Part 011 adds that completed sensationalism would indirectly make consciousness the judge of nature, a move Gassendi does not reach. Part 016 reopens the sensory problem under Hobbes: sensation is the `principle of principles` because phenomena must be investigated from within memory and inner experience, yet Hobbes immediately explains sensation through material pressure and organ-motion. Part 045 gives the rationalist counter-position that Locke will react against: for Norris, sense can report only the subject's modification and cannot judge the existence of objects without reason's concurrence. Part 046 sets the Locke test without yet resolving it: Locke excludes innate ideas and speculative soul theory, but Cassirer delays the actual sensation/reflection analysis to the next section. Part 047 makes sense one of two source-moments: sense supplies individual representations and mirrors outer things, but Cassirer immediately pairs it with self-perception and rejects the simple label `sensualism` for Locke. Part 050 makes sense the lower validity case: sensory impression is certain only while presently lived, and natural bodies remain known only through probable experience rather than science. Part 052 makes sight the Berkeley test case: vision gives light and color, not external things, distance, or spatial order; sense becomes the material for interpretation rather than direct object-witness. Part 053 removes the last sensory privilege: touch has no independent access to real extension outside consciousness, and all sense-fields become equal materials for constructing an objective order of appearances. Part 056 records Berkeley's late self-criticism of the sensory criterion: sense and actuality are identical only for the common view, while genuine philosophy assigns knowledge to understanding and reason. Part 057 gives Collier's leveling of primary and secondary qualities: extension, shape, and motion are sensibly mediated too, so their more complicated origin cannot create a metaphysical difference of being. Part 058 makes Hume's reversal explicit: the facts that drove Berkeley beyond mere sense now bind Hume within sense, because pure sensation becomes the criterion for judging every conceptual connection."

- term: "Raum / Zeit"
  handle: "term:raum-zeit"
  kind: concept-pair
  preferred: "space / time"
  alternatives:
    - "pure space / pure time"
    - "place / time"
  status: open
  notes: "Part 009 opens this as a decisive Gassendi pressure. Pure space and pure time are not bodies, properties, substances, or accidents, but Gassendi still treats them as true entities because they are unconditionally necessary for thinking motion and building mathematical physics. Their objective validity forces an expansion beyond the sensory criterion. Part 010 adds that Gassendi thinks space and time atomistically as composed of ultimate simple parts, which shapes his account of motion as passage to the next simple space-point in an indivisible time-moment. Part 015 changes the frame under Hobbes: after the thought-destruction of the external world, space is the phantasm of an existing thing as external, time the phantasm of motion/order, and division/composition are acts of intellect rather than properties lodged in things. Part 035 gives the Leibniz contrast: points of space and moments of time are not parts from which the continuum is assembled, but limits set within the finished totality. Part 040 gives the chapter-close formulation: space and time are ideal orders of appearances and grounded ways of considering, not absolute realities or transcendent objects. Part 048 reopens the pair under Locke from the infinity side: finite stretches of space and time can be experienced, but the infinite advance beyond them requires logical rule rather than sensory observation. Part 049 makes the pair a central Locke pressure: space shifts from sensory place and relation to pure space required by motion and empirical physics; time shifts from inner train of ideas to the criterion by which sensation is measured, while both expose the insufficiency of passive sensation/reflection. Part 052 gives Berkeley's perception-theory pressure: space and distance are necessary members of the finished representation-world but are not immediately perceived; spatial order arises through learned correlation between sight and touch. Part 053 carries this into Berkeley's Newton critique: absolute space and absolute time are not needed for scientific objectivity once reality is defined through lawful empirical connection rather than through an existence outside every consciousness. Part 054 extends the Berkeley critique to motion and the infinite: pure space and absolute motion are dissolved as sensory abstractions, but Berkeley thereby also loses the conceptual means for exact mathematical and physical objectification. Part 056 makes the Kant contrast explicit: Berkeley treats space as empirically given and therefore cannot supply an a priori criterion of truth for experience, while Kant makes space and time forms that legislate possible experience. Part 057 gives Collier's space/God argument: independent matter entails independent space, but absolute space would either stand outside God as an infinite necessary being or become a divine attribute that collapses God and world into pantheistic all-unity."

- term: "Körper / Materie / Substanz"
  handle: "term:koerper-materie-substanz"
  kind: concept-cluster
  preferred: "body / matter / substance"
  alternatives:
    - "corporeal substance"
    - "matter"
    - "body"
  status: open
  notes: "Part 015 earns this as a Hobbes nature-philosophy entry. Body is first introduced as a rational postulate: a bounded part of extension taken as independent of our imagination, grasped by reason rather than sense. But once this has been rationally introduced, Hobbes treats body and real motion as first and absolute, letting the mediating construction recede. Part 016 confirms the hardening: matter's independence begins as a logical requirement of judgment, but Hobbes tries to free it from that condition and set it absolutely as the source behind sensation. Part 017 immediately puts `Substanz` under Spinoza pressure: substance is no longer Hobbesian body/matter but the substantial unity of the world-whole and the actuality of infinite being. Part 022 makes the split imminent: Hobbes remains tied to the natural and political `body`, while Spinoza's next section turns to substance, modes, and attributes. Part 023 performs the split: keep this entry for the Hobbes body/matter hardening problem, and track Spinoza's substance/mode antinomies in `Substanz / Modi`. Part 049 reopens the body/matter side under Locke: empty space is distinguished from matter through density and resistance, but section I closes by leaving corporeally extended things, substances, and their real effects as the uncomprehended real ground behind sensation/reflection. Part 050 shows why body/nature cannot become strict science for Locke: the inner structure of bodies and lawful bond of properties remains inaccessible to sensation and experiment. Part 051 completes the Locke substance pressure: substance is exposed as an empty bearer when sought as a sensory or psychical image, but Locke still treats substances and inner bodily natures as the ideal object of perfect knowledge. Part 053 gives Berkeley's dissolution of the matter/substance remainder: the idol of absolute matter falls with the idol of absolute representation, and corporeal substances can no longer ground the reality of appearances. Part 055 adds Berkeley's spiritual-substance contrast: matter remains rejected as the cause deducible from phenomena, but substance re-enters as spirit and as all-embracing divine substance, not as body. Part 056 turns this into the religious-metaphysical frame: absolute matter would force God into an external beyond, while Berkeley's idealism binds empirical being directly to infinite consciousness. Part 057 gives the Collier proof-form: matter, body, and extension exist only in dependence on mind, thought, or perception; absolute matter is rejected as logically impossible and as the presupposition of the absolute-space idol."

- term: "Substanz / Modi / Attribute"
  handle: "term:substanz-modi"
  kind: concept-cluster
  preferred: "substance / modes / attributes"
  alternatives:
    - "substance and modes"
    - "substance / finite modes"
    - "doctrine of attributes"
    - "attributes"
  status: open
  notes: "Part 023 earns this as the Spinoza-specific split from the Hobbes `Körper / Materie / Substanz` entry. Cassirer opens section III by showing the antinomies that arise when the finished `Ethics` is read without its development: finite things are both negations rooted in imagination and necessary moments grounded in God, while each mode's causal origin leads only to another finite mode and never directly to infinite being. Part 024 sharpens the solution direction: `Deus sive natura` does not identify God with the sum of things or with a thing-like whole, but with the lawful connection of things and the unity/necessity of the rule of occurrence. Part 025 explains why the `Ethics` presentation obscures this: Spinoza takes over the scholastic opposition of substance and mode without criticizing the substance category itself, then has to supply a positive content different from Aristotle's. Part 026 gives the positive content: substance is immanent cause as the necessary mathematical connection of individual things, not a separated thing behind them and not their mere sum. Part 027 adds that substance is not numerically one and cannot be parsed through whole/part; its unity is qualitative and order-like, while a dynamic force-image remains as a residual motive. Part 028 expands the entry to attributes: the attributes cannot be merely subjective standpoints, because understanding only reproduces what is really present in things; but their positive motive is analytic-geometrical order identity, where the same rule of connection appears under different attributes. Part 029 exposes the remaining fracture: the infinity of attributes belongs to the early all-nature doctrine of qualitative perfection and resists the later purification of substance into lawful world-order, leaving Spinozism split between universal rule and `Ens realissimum`. Part 030 closes the chapter by showing that thought cannot be a merely coordinate attribute: it is the common exponent required for any unified actuality, and this privilege makes the substance concept itself depend on a mode of thinking. Part 031 gives the Leibniz contrast: early Leibniz still uses Spinozistic language of primitive concept, highest substance, God, and absolute attributes, but Cassirer stresses the restriction that human analysis cannot simply reach those divine first determinations; the chapter turns from substance/God as fixed point toward truth."

- term: "Atombegriff / Atomistik"
  handle: "term:atombegriff-atomistik"
  kind: concept-cluster
  preferred: "atom concept / atomism"
  alternatives:
    - "atomistic theory"
    - "atomistic explanation"
  status: open
  notes: "Parts 008-010 make atomism the first explicit test of Gassendi's sensory criterion. The atom concept springs from scientific reason against naive sensory intuition; its necessary correlate is empty space; and Gassendi's physics extends atomistic decomposition to body, space, time, and motion. Part 033 adds early Leibniz contrast evidence: atomism appears as the natural-philosophical correlate of a combinatorial logic that still imagines being as built from simple elements, not primarily as sensory physics. Keep open while the chapter tests whether Leibniz's later function/continuity work breaks this early correlate."

- term: "Selbstbewußtsein / Ich / innere Erfahrung"
  handle: "term:selbstbewusstsein-ich-innere-erfahrung"
  kind: concept-cluster
  preferred: "self-consciousness / I / inner experience"
  alternatives:
    - "self-consciousness"
    - "the I"
    - "inner experience"
  status: open
  notes: "Part 011 makes this the Gassendi chapter close. Cassirer argues that the fact of self-consciousness is unintelligible if treated as a derivative result; it is the beginning and condition of objective knowledge. Gassendi must reject Descartes's `Ich` because no image of the self can arise in his image theory, so he measures inner experience by a fixed metaphysical standard. Part 017 contrasts Descartes's `Selbstbewußtsein` with Spinoza's `Gottesbewußtsein`: the `Ich` is not the starting condition of certainty but is seized by the object/infinite being that effects knowledge in it. Part 030 returns to self-consciousness inside Spinoza: the soul shifts from Cartesian independent unity to `idea corporis`, but Spinoza must add `idea mentis` and infinite reflection to explain thinking as activity conscious of itself. This raises thought out of the coordinate attribute series. Part 031 marks the Leibniz contrast explicitly: the starting point is not the psychological fact of self-consciousness, but the definition and general nature of truth. Part 032 reintroduces the `Ich` from the side of innate conditions: no experience can create content in the I that cannot be made intelligible from conditions the mind already harbors. It also makes `Bewußtsein` active through the `Scientia generalis`, which presupposes the Leibnizian concept of consciousness and brings it to concrete fulfillment. Part 042 gives the Tschirnhaus reversal: when the factual cannot be logically resolved, the principles of deduction themselves are grounded back in `inner experience` and four facts of self-observation, threatening to make truth depend on the empirical constitution of the faculty of thought. Part 043 shifts the English-rationalist pressure to `Vermögen`: truth must cite the testimony of a spiritual faculty, and common notions belong to the mind as a closed book opened by objects rather than written by them. Part 044 adds Digby's unity-function of soul/consciousness: the knowing I receives the thing only through an active spiritual apprehension that binds manifold sensory content into unity. Part 045 closes the rationalist setup for Locke by showing that Cudworth/Norris keep the epistemological problem entangled with speculative soul/God doctrine: eternal truths need an eternal mind, and sense is reduced to subjective modification without judgment. Part 046 makes Locke's first separation explicit: the objective value of knowledge must be treated before every metaphysical or natural-scientific theory of the soul and its faculties, while the psychological method studies mental functions without reducing them to a physical or metaphysical primal ground. Part 047 narrows inner experience into reflection/self-perception: inner acts are initially known only through a passive mirroring that gives fixed contents, not through an active self-grounding of knowledge. Part 051 adds the I-side of the substance critique: inner experience gives only successive states of consciousness and does not lay bare the I to which they adhere, so self-knowledge shares the same limit as outer substance. Part 054 prepares the next Berkeley turn: objective order is finally guaranteed by a divine understanding of the same nature as mind, so the perception-analysis begins to shift from passive ideas toward spirit, self, and reason. Part 055 makes the Berkeley I explicit: the self cannot be secured as a congeries of perceptions, so Berkeley moves from theoretical consciousness to will and inner seeing as the non-discursive evidence of an active individual mind. Part 056 shows the cost of the late solution: consciousness is freed from absolute matter but finally stripped of independent content and bound to a higher divine being from which truth and cognition flow."

- term: "Intuition / Anschauung"
  handle: "term:intuition-anschauung"
  kind: concept-cluster
  preferred: "intuition / intuitive seeing"
  alternatives:
    - "intuitive knowledge"
    - "intuitive cognition"
    - "beholding"
  status: open
  notes: "Parts 017-018 earn this as the first major Spinoza entry. Part 017 made immediate intuition the ground of mediated cognition and the highest level of knowledge, where the universal is seen in the individual. Part 018 makes the term structurally double: Cartesian `Intuition` is mathematical insight into geometrical and arithmetical axioms, while early Spinozan `Intuition` is mystical becoming-one with infinite being, the feeling and enjoyment of the thing itself. Later Campanella source contact confirms Cassirer's leaf-906 `intrinsecatio` and leaf-444 `saporem` anchors, but qualifies their reuse: bodily taste, altered sensory entry, exterior object-intellection, hidden self-intellection, finite `mensura sui`, and divine immanence remain distinct registers. Part 019 transforms the visual/mystical register without erasing it: `Schauen Gottes` is no longer immediate possession but a vision to be acquired methodically through knowledge, and the closing `hingegebene Anschauung der Natur` marks the passive orientation now surpassed by reflection on knowledge's own procedures. Part 020 adds a geometrical-construction use of `anschaulich möglich`: intuitive possibility here means constructible/presentable in thought, not mystical union. Part 021 restates intuition as highest self-activity: the mind no longer gives itself over to alien being but becomes transparent to its own essence and views particulars in the `light of the eternal`. Part 023 gives `Anschauung` its metaphysical-methodical register: geometry raises the mind to the intuition of the absolute order of being, while finite things as mere negations block the intuition of divine nature. Part 025 contrasts imagination and intuitive cognition directly: imagination sees the whole from the standpoint of a part, while intuitive cognition proceeds from the perfect intuition of the whole to the parts. Part 026 keeps that material unchanged but shifts its form: intuitive insight sees the same particular things in a new form of connection. Part 027 ties the early intuition/Renaissance register to `intellektuelle Liebe zu Gott`, where the affective orientation toward living nature passes onto the exact-scientific form of being. Part 028 distinguishes lower-register `Anschauung der Wirklichkeit` as view of actuality from geometrical intuition, then uses `anschauen` for the pure apprehension of the same rule of connection within each attribute. Part 029 renders `Grundanschauung` as basic view because the infinity of attributes is now a doctrinal picture from the early system rather than an act of intuitive cognition. Part 030 identifies the limit of geometry's `Anschauung des Raumes`: the same intuitive-space condition that lets geometry escape subjective relativity also makes geometry an unavoidable anthropomorphism. Part 031 reopens `Intuition` under Leibniz: adequate definitions contain primitive truths of reason and intuitive cognitions when their possibility appears at once, but Leibniz also refuses to treat immediate intuition as a self-evident possession of first elements. Part 032 defines the Leibnizian ladder: symbolic cognition uses signs for composites, while intuitive cognition belongs properly to primitive distinct representations; empirical concepts remain in principle unfinishable. Part 034 sharpens the Leibniz side by opposing `Anschauung` and symbolic construction: analytic geometry still borrows elements from geometrical intuition, while analysis of position aims at adequate symbolic cognition beyond the clear but confused image. Part 038 uses `unmittelbare Anschauung` for the world-picture of sensory immediacy that physics does not simply dismiss as illusion but translates into symbolic-mathematical terms. Part 040 gives `Intuition` its divine-limit form: God sees the completed resolution of truths of fact `infallibili visione`, while finite human cognition moves through symbols and successive analysis. Keep `Schau` / `Schauen` visible as seeing or beholding where the Renaissance/Campanella register matters. Render lower-register `Anschauung` as view, doctrine, or contemplation when it names a shared position or passive orientation rather than the technical act of intuition; do not collapse the whole cluster into later Kantian `Anschauung`. Part 050 adds the Lockean fourth-book intuition: immediate perception of relations among ideas, the foundation of certainty in mathematics and morals, and the point that ruptures the sensation/reflection schema. Part 051 uses the Lockean intuition layer to contrast mathematical archetypes with sensory copies: in mathematics the archetype is given in thought, while sensory ideas require a comparison with actual things that Locke cannot perform. Part 055 adds Berkeley's inner `Schauen`: the I is known immediately or intuitively, not by syllogism and not as an empirical thing; render this as inner seeing where possible to keep it distinct from mathematical intuition. Part 056 adds the late-Berkeley distinction: `Anschauung` remains a lower-register view/contemplation term, while the decisive ascent goes from sense to intellect and Platonic ideas rather than to mathematical intuition."

- term: "Wahrheit / Urteil"
  handle: "term:wahrheit-urteil"
  kind: concept-cluster
  preferred: "truth / judgment"
  alternatives:
    - "concept of truth"
    - "truths of reason / truths of fact"
    - "predicate-in-subject"
    - "necessary and contingent truths"
  status: open
  notes: "Part 031 held `Wahrheit / Wahrheitsbegriff` as a chapter-opening pressure rather than opening it from the preface alone. Part 032 earns the entry: valid judgment requires the predicate to be included in the subject, and empirical coexistence or induction cannot by itself secure necessary truth. Truths of reason and truths of fact differ by the degree to which analysis can be completed, not by belonging to two unrelated standards of truth. Part 033 translates this judgment theory into the first characteristic model: subject and predicate must share a basic determination, like numbers with a common factor. Part 034 shifts the truth problem into forms of deductive advance from truth to truth; arithmetic is only one special form under higher logical forms. Part 037 reactivates the entry under temporal occurrence: truths of fact must be progressively resolved into truths of reason, and the present moment must already contain the following one if real becoming is to remain intelligible. Part 038 gives eternal truths their double position toward facts: they do not derive evidence from facts, but facts are the material of their activity, and the order of appearances must point toward them. Part 039 completes the contingent-truth side: the predicate need not actually dissolve into the subject without remainder; a truth of fact is valid when a rule of progressive analysis guarantees ever closer approximation. Part 040 gives the metaphysical limit-case: finite analysis cannot complete the resolution of individual truths of fact, but divine infallible vision sees that completed connection, and empirical truth is recast as harmonic agreement among rational rules, observations, and representing subjects. Part 042 gives the Tschirnhaus problem: if logical rules become laws of our comprehending and truth rests on inner psychological compulsion, truth is relativized to the empirical constitution of the faculty of thought unless a metaphysical axiom of common reason is smuggled in. Part 043 opens the English-rationalist variant: Herbert's truth-concept begins in the demand for universal religious and moral validity, then grounds that universality in common truths and the testimony of mental faculties rather than in definition, physics, or harmony. Part 044 makes Digby the judgment turn inside the same chapter: truth as agreement is sharpened into the unity-function by which the copula `is` binds separated determinations and makes them one for knowledge. Part 045 makes the chapter-close pressure explicit: Cudworth and Norris treat eternal truths and scientific judgments as requiring intelligible being beyond sensory fact, while Norris argues that even the existence of the material world rests on rational judgment because sense itself does not judge. Part 046 opens the Locke pressure by naming the objective value and limits of knowledge as the critical question; Locke does not deny principles of universal and necessary validity, but requires insight into their acquisition before certainty in possession can be claimed. Part 048 confirms the pressure: infinity forces the difference between psychological possibility and logical necessity, because the number series is not merely something the mind can continue but something the concept of number itself sets and requires. Part 049 carries this into section I close: number reveals logical functions where Locke still speaks of representational images, and simple ideas claim real knowledge by immediate agreement with things rather than by an analyzed judgment of validity. Part 050 becomes the major Locke truth-section update: universal relations among ideas and intuition ground certainty, but existence and natural science fall back to probability, splitting truth from empirical actuality. Part 051 closes the Locke truth problem by separating two standards of reality: universal rule-governed objectivity among ideas and empirical reference to unknowable things. Locke fails because he separates rational and empirical knowledge without reconnecting them systematically. Part 052 gives Berkeley's judgment-pressure: location, size, distance, and empirical objecthood are performances of judgment and interpretation rather than deliverances of sense, but Berkeley explains their formation through suggestion and habit rather than through logical necessity. Part 053 gives the idealist truth-pressure: truth cannot mean agreement with things in themselves or absolute originals, because comparison itself is an act inside consciousness; empirical truth becomes constancy, lawful connection, and the distinction of realities from chimeras within experience. Part 054 gives the concept-theory critique: Berkeley needs judgment to notice similarity as similarity, to set identity, and to secure empirical objectivity, but he explains these operations through association and divine guarantee rather than through an analyzed logical ground. Part 055 sharpens Berkeley's split between suggestion and inference: sense suggests and perceives, but judgment and the inference of understanding are required where necessary connection and spiritual cause are claimed. Part 056 adds the chapter's Kantian pressure: Berkeley can make reason the guide to truth above sense, but because he grounds empirical order in divine sign-language rather than a priori conditions, experience lacks an immanent criterion of truth. Part 057 gives Collier's antinomy proof: contradictory consequences about absolute extension do not refute logic but expose a false subject, so judgment must deny absolute external matter rather than abandon reason. Part 058 opens Hume by giving `reine Empfindung` the role of criterion: it is not logical in content, but it still functions as a methodical measure for assigning concepts their rank and relative truth."
