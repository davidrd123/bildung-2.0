# Trusted PDF-to-printed-page and PDF-to-JP2 anchors for volume 2.
# Keep this conservative. The PDF has 856 pages, while the JP2 folder has 860
# files and skips `_0857.jp2`, so scan alignment must be verified by anchors.

source_pdf: "source/pdf/daserkenntnispro02cassuoft.pdf"
source_page_images: "source/page-images/jp2/"

counts:
  pdf_pages: 856
  jp2_files: 860
  jp2_missing_sequence_numbers:
    - "0857"
  note: "The local scan set and PDF do not have the same simple count. Verified anchors show direct filename/PDF-page alignment at the Book IV opening, but later pages still need spot checks."

calculated_offsets:
  - slug: "main-arabic-pagination"
    rule: "pdf_page = printed_page + 20"
    applies_to: "main text and index, pending later spot checks"
    verified_printed_pages: [3, 4, 5, 6]
    verified_pdf_pages: [23, 24, 25, 26]
    trust: "medium"
    note: "The body opening verifies the offset. Treat chapter starts calculated from this rule as work aids until individually checked."

ranges:
  - slug: "inhalts-verzeichnis"
    label: "Contents"
    pdf_pages: [5, 18]
    printed_pages: ["V", "XV"]
    scan_files:
      - "daserkenntnispro02cassuoft_0005.jp2"
      - "daserkenntnispro02cassuoft_0018.jp2"
    trust: "medium"
    note: "PDF text layer is noisy but gives the full contents. Scan endpoints not yet visually checked."

  - slug: "book-iv-divider"
    label: "Book IV divider: Die Anfänge des Empirismus"
    pdf_pages: [21, 21]
    printed_pages: ["divider"]
    scan_files:
      - "daserkenntnispro02cassuoft_0021.jp2"
    trust: "high"
    note: "Tesseract on the JP2 confirms `Viertes Buch / Die Anfänge des Empirismus`."

