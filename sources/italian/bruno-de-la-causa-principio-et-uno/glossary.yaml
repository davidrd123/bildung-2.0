# Working glossary for Bruno, De la causa, principio et uno.
# All entries are open until they recur across batches with enough evidence.
causa:
  status: open
  preferred: cause
  notes: "Title term. Do not settle its relation to principio yet."
principio:
  status: open
  preferred: principle
  notes: "Title term. Can mean principle, beginning, or origin; keep under pressure."
uno:
  status: open
  preferred: one
  notes: "Title term. Avoid prematurely smoothing into unity."
contemplazion_reale:
  source: contemplazion reale
  status: open
  preferred: real contemplation
  notes: "Appears near the end of the proemial epistle; likely names the work's natural-philosophical register."
longanimita:
  source: longanimità
  status: open
  preferred: longanimity
  notes: "Opening dedication term; forbearance and endurance are possible, but longanimity preserves the register."
divisa:
  status: open
  preferred: device
  notes: "Heraldic or emblematic term in the proemial opening."
cimiero:
  status: open
  preferred: crest
  notes: "Heraldic term in `terribil cimiero`."
liquido_umore:
  source: liquido umore
  status: open
  preferred: liquid humor
  notes: "Part of the water/drop emblem; avoid flattening immediately to plain water."
stilla:
  status: open
  preferred: drop
  notes: "Part of the water/stone emblem."
sasso:
  status: open
  preferred: stone
  notes: "Part of the device: persistent drops soften and hollow hard stone."
sustanza:
  source: sustanza
  status: open
  preferred: substance
  notes: "Central term in the argomenti. Must be tracked against accident and matter."
materia:
  status: open
  preferred: matter
  notes: "Central term. Bruno will press matter as principle, potency, subject, and something divine."
forma:
  status: open
  preferred: form
  notes: "Track formal cause, formal principle, and the relation to matter."
anima:
  status: open
  preferred: soul
  notes: "Appears as anima de l'universo and as a distributed formal/living principle."
contemplazione:
  status: open
  preferred: contemplation
  notes: "Do not reduce to observation or theory; tied to real contemplation and natural/divine knowledge."
atto:
  status: open
  preferred: act
  notes: "Metaphysical correlate of potenza; later coincides with potency in the infinite."
potenza:
  status: open
  preferred: potency
  notes: "Can also mean power. Use potency where paired with atto."
ente:
  status: open
  preferred: being
  notes: "Track carefully where it means being as such rather than a particular entity."
soggetto:
  status: open
  preferred: subject
  notes: "May sometimes need substrate; keep open through the matter dialogues."
accidente:
  status: open
  preferred: accident
  notes: "Set against substance in the argomenti."
efficiente:
  status: open
  preferred: efficient
  notes: "Occurs in efficient cause and efficient nature; do not detach from causa too quickly."
formale:
  status: open
  preferred: formal
  notes: "Occurs in formal cause and formal principle."
finale:
  status: open
  preferred: final
  notes: "Occurs in the causal triad efficient/formal/final."
principiato:
  status: open
  preferred: principiated
  notes: "Awkward but useful where Bruno pairs causato and principiato."
isagogia:
  status: open
  preferred: isagogy
  notes: "Introductory route into the knowledge of things; appears at the end of the argomenti."
supposito:
  status: open
  preferred: supposit
  notes: "Appears socially and metaphysically; keep distinct from soggetto for now."
coincidenza:
  status: open
  preferred: coincidence
  notes: "First dialogue names coincidence of contraries in principles and proximate subjects."
contrarii:
  status: open
  preferred: contraries
  notes: "Track with coincidence, opposition, and unity."
lume:
  status: open
  preferred: light
  notes: "Vision/light imagery structures the threshold and first dialogue."
correzione:
  status: open
  preferred: correction
  notes: "Filoteo distinguishes correction from revenge in the apology for the Cena."
pedante:
  status: open
  preferred: pedant
  notes: "Not merely insult; marks word-centered authority opposed to inquiry into things."
intelletto_universale:
  source: intelletto universale
  status: open
  preferred: universal intellect
  notes: "Introduced in Dialogo secondo as universal physical efficient and faculty of the world-soul."
anima_del_mondo:
  source: anima del mondo
  status: open
  preferred: soul of the world
  notes: "Formal constitutive principle of the universe; also linked to universal intellect."
spirto:
  source: spirto
  status: open
  preferred: spirit
  notes: "Appears with anima and vita as penetrating and moving all matter."
vita:
  status: open
  preferred: life
  notes: "All things have life according to substance, not necessarily according to recognizable act or operation."
animato:
  status: open
  preferred: animated
  notes: "Keep distinct from having soul/life and from being called animal."
animale:
  status: open
  preferred: animal
  notes: "Bruno uses animal broadly for living wholes, including stars and worlds."
forma_materiale:
  source: forma materiale
  status: open
  preferred: material form
  notes: "First of the three forms distinguished in Dialogo secondo; informs, extends, and depends."
vestigio:
  status: open
  preferred: vestige
  notes: "Mode by which natural philosophy approaches the first principle and cause."
materia_prima:
  source: materia prima
  status: open
  preferred: prime matter
  notes: "Appears in the critique of Peripatetic substantial form; distinguish from Bruno's richer matter."
occhio_della_raggione:
  source: occhio della raggione
  status: open
  preferred: eye of reason
  notes: "Matter of nature is known by this eye, not by the sensitive eye."
complicato:
  status: open
  preferred: complicated
  notes: "Technical Cusan/Latin-root usage: folded or enfolded into unity, not ordinary English 'confusing'. Keep in the source-local draft; reconsider for public/TTS rendering."
esplicato:
  status: open
  preferred: explicated
  notes: "Unfolded, expressed, or distributed into determinate finite modes. Pair with complicato; do not silently replace passage by passage."
possibilita:
  source: possibilità
  status: open
  preferred: possibility
  notes: "Closely linked to potenza; can rise to absolute possibility in the first principle."
massimo_minimo:
  source: massimo/minimo
  status: open
  preferred: maximum/minimum
  notes: "Coincidence pressure in Dialogo terzo; likely Cusan resonance."
contrazione:
  status: open
  preferred: contraction
  notes: "Difference arises by contraction to corporeal or incorporeal being."
prope_nihil:
  source: prope nihil
  status: open
  preferred: prope nihil
  notes: "Rejected description of matter as almost nothing."
appetito:
  status: open
  preferred: appetite
  notes: "Matter's appetite for forms is rejected or radically reinterpreted in Dialogo quarto."
implicazione:
  status: open
  preferred: implication
  notes: "Forms are held implicatedly in matter before explication; watch whether public English needs 'enfolded' rather than implication-language."
fonte_delle_forme:
  source: fonte de le forme
  status: open
  preferred: fountain of forms
  notes: "Matter/world-soul pressure point; forms are not imported from outside."
infinito:
  status: open
  preferred: infinite
  notes: "Central in Dialogo quinto; infinite has no proportional parts and is one."
immobile:
  status: open
  preferred: immobile
  notes: "Universe/one is immobile because there is no outside into which it moves."
unimodamente:
  status: open
  preferred: in one mode
  notes: "All is in all, but not totally or in one mode in each thing."
ubique:
  status: open
  preferred: everywhere
  notes: "Same everywhere; track with whole-in-each-part and voice analogy."
cusano:
  source: Cusano
  status: open
  preferred: Cusanus
  notes: "Explicitly cited in Dialogo quinto on geometrical coincidence of contraries."
complicante:
  status: open
  preferred: complicating
  notes: "Unity is complicating and comprehending: it enfolds/comprehends many into one, not isolated numerical singularity."
