status: cassirer-snell-substrate
source_quality: TEI XML from PerseusDL and OpenGreekAndLatin/First1KGreek
purpose: Mythic Greek source shelf pressured by PSF II and Snell, for Homeric, Hesiodic, lyric,
  tragic, comic, and Hellenistic poetic search.
generated_plain_text:
  tool: ../../tools/tei_to_plain.py
  output_dir: source/plain
known_gaps:
- Early Greek lyric fragments beyond Pindar are pressured by Snell but not yet represented
  by a clean local TEI shelf.
- Greek mystery-religion materials are pressured by PSF II through modern scholarship but
  are not yet represented as Greek primary text surfaces here.
- Callimachus is included where curlable TEI is available; this is a search shelf, not a complete
  Hellenistic campaign.
