    notes: |
      Only one digital witness is currently in scope. The IA package ships three
      derived artifacts of decreasing lossiness: ABBYY XML (preferred), hOCR flat
      text (lossy), embedded-PDF text (lossiest). All three trace to the same
      ABBYY FineReader Engine 11 OCR pass, so they share the same long-s and
      marginalia-bleed errors.

      Normalized title/citation form used for this campaign:
      "Universalis philosophiae seu Metaphysicarum rerum, iuxta propria
      dogmata, partes tres, libri 18."

      ABBYY title-page extraction on leaf 0005 is not clean enough to carry
      that normalized title as a literal witness quote. The local ABBYY extract
      reads:
      "THOMÆ CAMPANELLÆ STYLENSIS ORD[INIS] PRÆD[ICATORUM] UNIVERSALIS
      PHILOSOPHIÆ; METAPHYSICARVM RERVM, IVXTA PROPRIA DOGMATA, PARTES TRES,
      Libri m. ... DUCE DEO. SV1&RVM QPERVM TOMVS Q.VARTVS ... M. DC.
      XXXVIII. CUM PRIVILEGIO REGIS."

      The hOCR flat text likewise gives the title line as `PARTES TRES, Libri
      m.` and separately gives an approbation-text line resembling `libri
      o61o`/`octo`; these are witness/OCR facts, not normalized bibliographic
      title forms. Dedication on leaf 0007 is to Claudio de Bullion,
      Surintendant des Finances under Richelieu.

