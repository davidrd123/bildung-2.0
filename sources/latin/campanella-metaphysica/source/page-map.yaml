witness:
  id: "ia-1638-burellius"
  jp2_prefix: "thomcampanellsty00camp"
  jp2_dir: "source/page-images/jp2/"
  jp2_files: 972
  abbyy_xml_gz: "source/local/thomcampanellsty00camp_abbyy.gz"

leaf_numbering:
  note: |
    IA JP2 indexing is 0-based on physical leaves (front cover, front matter,
    title page, plates, body). Printed page numbering begins in the main body.
    Map jp2 leaf ↔ printed page on a per-anchor basis; do not assume a fixed
    offset across the volume.
  known_alignments:
    - jp2_leaf: 5
      content: "title page (M.DC.XXXVIII; Universalis Philosophiae...Partes Tres)"
    - jp2_leaf: 7
      content: "dedication to Claudio de Bullion"
    - jp2_leaf: 23
      content: |
        Liber I, Caput I, Dubitatio III. Taste/sapientia argument:
        `Sapientia enim dicitur a sapore...`; taste alone
        `intrinsecatur obiecto`, but its variability blocks sensory
        wisdom. Printed page number not yet securely read. See leaf-23
        pilot slice.
    - jp2_leaf: 28
      content: |
        Running page appears to be 16. Top continuation before Dubitatio VII:
        tangible qualities are altered by flesh, air, and accidents; pepper
        becomes hot in the mouth because `rei natura nobis intrinsecatur`,
        yet even this entry is altered. Also extends mediation upward to God,
        angels, stars, altered images, Paul, Plato, and Augustine. See leaf-28
        pilot slice.
    - jp2_leaf: 85
      printed_page: 73
      content: |
        Liber I, Caput IX, Responsio ad nonam dubitationem. Self-knowledge,
        `notitia` superadded vs. innate/hidden, pupil/stone-color example,
        and `Sapientia est primalitas sicut potestas...`. Ernst cites
        Metaphysica part I, p. 73a/b for the abdita/addita knowledge node.
        Cassirer cites the same page as `P. I, Lib. I, Cap. IX, Art. IX`
        (T. I, S. 73) in Vol. 1's divine-ideas section.
    - jp2_leaf: 86
      printed_page: 74
      content: |
        Top of page completes Liber I, Caput IX, Articulus IX, the response
        to the ninth dubitation: wisdom is not formally affliction, the
        sophistical fantasy is total knowledge of God's works, and wisdom is
        `sanitas orbis terrarum`. Lower page begins the response to the tenth
        dubitation on innate/illata science.
    - jp2_leaf: 114
      printed_page: 102
      content: "Metaphysica body; running header METAPH. CAMPANELLÆ, two-column"
    - jp2_leaf: 617
      printed_page: 549
      content: |
        Pars II, Liber X, Caput I. Description of the four-worlds concentric-
        circles diagram (Material / Mathematical / Mental / Archetypal) and
        contemplative-ascent pedagogy through the four registers. Contains
        the only `intrinsecatur & extrinsecatur` coordinate pair in the
        volume - God's mode of relation to all things at the Mathematical
        register. See encounter 002.
    - jp2_leaf: 906
      printed_page: 244
      content: |
        Pars III, Liber XVII, Caput II, Articulus I. Body of cognition
        chapter; intrinsecatio passage. Page top continues previous
        discussion; italic banner between body and chapter heading "CAP. II.
        ARTIC. I." gives the section's argument-summary. ABBYY
        false-segmented the trailing "rem cognitam" of one body line as
        right-margin blocks. See encounter 001.

anchors:
  - id: "campanella-pilot-gustus-intrinsecatio"
    status: "opened"
    purpose: "Gassendi-style source substrate for the leaf-23 taste argument that grounds the later intrinsecatio doctrine."
    location:
      jp2_leaf: 23
      jp2_file: "source/page-images/jp2/thomcampanellsty00camp_0023.jp2"
      printed_page: null
      section: "Liber I, Caput I, Dubitatio III; Tertium argument on gustus"
      raw_extract: "source/raw/leaf-0023-gustus-intrinsecatio-abbyy.txt"
      normalized_extract: "source/normalized/leaf-0023-gustus-intrinsecatio-abbyy.normalized.txt"
      part: "parts/pilot-gustus-sapientia-and-intrinsecatio.md"
    latin_signal_phrase: "Sapientia enim dicitur a sapore... solus hic sensus intrinsecatur obiecto"
    content_note: |
      Taste gives `sapientia` its name because it reaches intrinsic,
      hidden, and weak natures, but Campanella places the claim inside a
      skeptical argument: taste varies by person, age, illness, temperament,
      and animal nature, so wisdom is not given through sense even in part.
    caveat: |
      ABBYY and Tesseract agree on the key reading `obiectum illi totum`,
      but the syntax is elliptical and wants direct high-resolution image
      collation before being treated as settled.

  - id: "campanella-pilot-pepper-heat-intrinsecatio"
    status: "opened"
    purpose: "Source substrate for the leaf-28 pepper/heat example where the thing's nature is intrinsecated into us but altered by organs and media."
    location:
      jp2_leaf: 28
      jp2_file: "source/page-images/jp2/thomcampanellsty00camp_0028.jp2"
      printed_page: null
      section: "Continuation before Liber I, Caput I, Dubitatio VII"
      raw_extract: "source/raw/leaf-0028-pepper-heat-intrinsecatio-abbyy.txt"
      normalized_extract: "source/normalized/leaf-0028-pepper-heat-intrinsecatio-abbyy.normalized.txt"
      part: "parts/pilot-pepper-heat-and-altered-intrinsecatio.md"
    latin_signal_phrase: "rei natura nobis intrinsecatur"
    content_note: |
      Pepper is cold to touch but hot in the mouth because it is broken up
      and the thing's nature is intrinsecated into us. Yet that same entry is
      altered by saliva, tongue, flesh, intervening air, and accidents. The
      passage therefore confirms intrinsecation as bodily real while denying
      that sensory contact gives the thing as it is.
    caveat: |
      The star-image line `quasdam imaginarias [ef]fulsiones` remains
      unsettled and needs page-image collation.

  - id: "ernst-part-i-page-73-self-knowledge"
    status: "opened"
    purpose: "Ernst- and Cassirer-guided source substrate for self-knowledge, abdita/addita knowledge, and wisdom as primality."
    secondary_guide: "reading/ernst-ch10-metaphysica-map.md"
    cassirer_guide: "reading/cassirer-campanella-latin-citation-map.md"
    location:
      jp2_leaf: 85
      jp2_file: "source/page-images/jp2/thomcampanellsty00camp_0085.jp2"
      printed_page: 73
      section: "Liber I, Caput IX, Responsio ad nonam dubitationem"
      raw_extract: "source/raw/leaf-0085-self-knowledge-primality-abbyy.txt"
      normalized_extract: "source/normalized/leaf-0085-self-knowledge-primality-abbyy.normalized.txt"
      continuation_raw_extract: "source/raw/leaf-0086-self-knowledge-primality-continuation-abbyy.txt"
      continuation_normalized_extract: "source/normalized/leaf-0086-self-knowledge-primality-continuation-abbyy.normalized.txt"
      part: "parts/pilot-self-knowledge-abdita-and-primality.md"
    latin_signal_phrases:
      - "sapientiam formaliter non esse passionem"
      - "notitia superaddita"
      - "innata & abdita"
      - "scientia non acquiritur, sed scibilia acquiruntur"
      - "Sapientia est primalitas sicut potestas"
      - "Sapientia autem est sanitas orbis terrarum"
    content_note: |
      Campanella accepts that knowing is a kind of alienation, but restricts
      madness to total alienation where judgment is lost. Passion supplies
      not the active cause of science but the specifying occasion through
      which innate wisdom is directed toward knowables. The continuation
      distinguishes wisdom from affliction and vanity: only the totalizing
      sophistical desire to know all God's works is condemned; wisdom itself
      is the health of the world.
    caveat: |
      Opened as a lower-leaf and next-leaf-continuation working pilot from
      ABBYY extraction and normalization. Targeted crops corrected `in 2.
      Parte`, `insanus`, `divina res`, and the leaf-86 continuation ending
      at `vt in 3. Parte`; full page-image collation remains open.

  - id: "erk-v2-part018-intrinsecatio"
    status: "located"
    cassirer_file: "texts/erkenntnisproblem-vol2/parts/018-spinoza-intuition-renaissance-and-the-short-treatise.md"
    cassirer_passage: |
      "Die Schau der Seele - so beschreibt Campanellas Metaphysik den Akt der
      hoechsten Erkenntnis - ist mit dem Schauen des Auges nicht einerlei: denn
      waehrend das Auge die Dinge durch Bilder erkennt, die ihm von aussen
      zugefuehrt werden, so erblickt die Seele ihren Gegenstand, indem sie sich
      in ihn und ihn in sich innerlich verwandelt. Das intuitive Erkennen ist
      somit das innerliche Einswerden, durch welches das eine zum andern wird
      (intrinsecatio, per quam unum fit aliud)."
    latin_signal_phrase: "intrinsecatio per quam unum fit aliud"
    location:
      jp2_leaf: 906
      jp2_file: "source/page-images/jp2/thomcampanellsty00camp_0906.jp2"
      printed_page: 244
      section: "Pars III, Liber XVII, Caput II, Articulus I (on the modality of beatitude)"
      raw_extract: "source/raw/intrinsecatio-jp2-0906-abbyy.txt"
      normalized_extract: "source/normalized/intrinsecatio-jp2-0906-abbyy.normalized.txt"
      encounter: "encounters/001-intrinsecatio-cap-ii-art-i.md"
    latin_summary_phrase: |
      "Ergo intelligere intuitivum est intrinsecatio, per quam unum fit aliud.
      Cognoscere enim est fieri rem cognitam."
    latin_substantive_passage: |
      "Sed intuitus animae non est, sicuti intuitus oculi, qui videt res per
      species delatas a luce tinctas rebus: sed videt per intrinsecationem
      rei in se, & sui in illam, sicuti per essentiam videt lucem, quantam
      potest tolerare: & per lucem rebus tinctam videt res..."
      [transcribed with long-s normalized; ligatures and hyphen-breaks
      reassembled; not yet against the page image]
    latin_continuation: |
      "Sic Anima, quoniam in hac vita non fit Deus, sed res, quae ipsum
      defective repraesentant, non potest beari..."
      [verified by direct inspection of the JP2 crop; this is the
      theological payoff Cassirer does not quote: the soul in this life
      intrinsecates only the defective representatives of God, not God
      himself, so beatitude must await the future state.]
    cassirer_correspondence_note: |
      Cassirer's German paraphrase compresses Campanella's two sentences
      ("intelligere intuitivum est intrinsecatio" + "cognoscere est fieri
      rem cognitam") into a single move and Germanizes the technical term
      'intrinsecatio' as 'inneres Einswerden'. The substantive passage on
      lines 81-87 of the raw extract is the more direct correspondent to
      Cassirer's gloss about "die Seele... in ihn und ihn in sich
      innerlich verwandelt".
    abbyy_segmentation_caveat: |
      ABBYY split the trailing "rem cognitam" of the body-line into two
      narrow blocks at the right edge of the right column. Our extractor's
      marginalia heuristic mis-tagged them as MARGINALIA. JP2 inspection
      confirms they are part of the same body-line as "Cognoscere enim
      est fieri" - not marginalia. This is a known ABBYY behavior on
      tightly-set lines near the column edge; manual fixup is currently
      required when the extractor mis-tags such fragments.

  - id: "page-102-pilot"
    status: "located"
    purpose: "extraction-pipeline test page; not yet anchored to a Cassirer reference"
    location:
      jp2_leaf: 114
      jp2_file: "source/page-images/jp2/thomcampanellsty00camp_0114.jp2"
      printed_page: 102
    content_signal: "in hoc laudat Anaxagoram, qui præficit Mentem..."
    layout: "two-column with right-margin marginalia and running header"

candidate_guides:
  - id: "ernst-ch10-metaphysica-map"
    source: "sources/modern/ernst-campanella-book-and-body-of-nature/source/raw/019-the-new-encyclopedia-of-knowledge.txt"
    local_note: "reading/ernst-ch10-metaphysica-map.md"
    status: "secondary-triage-guide"
    use: |
      Use Ernst's four-zone map to prioritize candidate source contact, not
      as an authority for Campanella's structure. Primary Latin work remains
      the deciding evidence.
  - id: "cassirer-campanella-latin-citation-map"
    source: "texts/erkenntnisproblem-vol1 and texts/erkenntnisproblem-vol2"
    local_note: "reading/cassirer-campanella-latin-citation-map.md"
    status: "primary-citation-ledger"
    use: |
      Use Cassirer's citations to find the Campanella pages behind the
      Erkenntnisproblem claims. Damaged Cassirer OCR citations must be checked
      against raw OCR and the Campanella witness before being regularized.

