leaf_numbering:
  note: |
    IA JP2 indexing is 0-based on physical leaves (front cover, front matter,
    title page, plates, body). Printed page numbering begins in the main body.
    Map jp2 leaf ↔ printed page on a per-anchor basis; do not assume a fixed
    offset across the volume.
  known_alignments:
    - jp2_leaf: 5
      content: "title page (M.DC.XXXVIII; Universalis Philosophiae...Partes Tres)"
    - jp2_leaf: 7
      content: "dedication to Claudio de Bullion"
    - jp2_leaf: 23
      content: |
        Liber I, Caput I, Dubitatio III. Taste/sapientia argument:
        `Sapientia enim dicitur a sapore...`; taste alone
        `intrinsecatur obiecto`, but its variability blocks sensory
        wisdom. Printed page number not yet securely read. See leaf-23
        pilot slice.
    - jp2_leaf: 24
      printed_page: null
      content: |
        Continuation of Liber I, Caput I, Dubitatio III, Articulus III.
        Completes the weight/tangible section begun on leaf 23 and then
        continues into hearing and vision. First numeric page-order trial
        uses the upper-left continuation through the end of the weight
        argument.
    - jp2_leaf: 28
      content: |
        Running page appears to be 16. Top continuation before Dubitatio VII:
        tangible qualities are altered by flesh, air, and accidents; pepper
        becomes hot in the mouth because `rei natura nobis intrinsecatur`,
        yet even this entry is altered. Also extends mediation upward to God,
        angels, stars, altered images, Paul, Plato, and Augustine. See leaf-28
        pilot slice.
    - jp2_leaf: 85
      printed_page: 73
      content: |
        Liber I, Caput IX, Responsio ad nonam dubitationem. Self-knowledge,
        `notitia` superadded vs. innate/hidden, pupil/stone-color example,
        and `Sapientia est primalitas sicut potestas...`. Ernst cites
        Metaphysica part I, p. 73a/b for the abdita/addita knowledge node.
        Cassirer cites the same page as `P. I, Lib. I, Cap. IX, Art. IX`
        (T. I, S. 73) in Vol. 1's divine-ideas section.
    - jp2_leaf: 86
      printed_page: 74
      content: |
        Top of page completes Liber I, Caput IX, Articulus IX, the response
        to the ninth dubitation: wisdom is not formally affliction, the
        sophistical fantasy is total knowledge of God's works, and wisdom is
        `sanitas orbis terrarum`. Lower page begins the response to the tenth
        dubitation on innate/illata science.
    - jp2_leaf: 87
      printed_page: 75
      content: |
        Continues and completes the response to the tenth dubitation:
        ordinary waking science, dream/revelation distinction, sleepwalking,
        sickness, hidden passions, divine matters, and the closing rule that
        `spiritualis omnia iudicat`. Lower page begins the response to the
        eleventh dubitation on the deliria of philosophers.
    - jp2_leaf: 114
      printed_page: 102
      content: "Metaphysica body; running header METAPH. CAMPANELLÆ, two-column"
    - jp2_leaf: 402
      printed_page: 36
      content: |
        Pars II, Liber VI, Caput VI, Articulus IX. Cassirer's direct
        self-consciousness locus: `Unaquaeque res intelligit se ipsam
        intellectione abdita per suam essentiam`. The opened slice begins at
        `Ad postremam respondeo` and ends before the italic response summary
        and `ART. X`.
      caveat: |
        Page-image check confirms printed page 36 and the article boundary,
        but the slice is not fully page-image collated. Neighboring leaves
        401 and 403 confirm the Pars II / Liber VI / Caput VI sequence.
    - jp2_leaf: 438
      printed_page: null
      printed_page_inferred: 72
      printed_page_basis: "Damaged ABBYY header on leaf 438 plus neighboring leaf 439 header `73`; local sequence before leaf 449's inferred page 83."
      caput: null
      caput_inferred: 9
      caput_basis: "Probable Caput IX from the current normalized slice and damaged neighboring running headers; not verified against a clean page image, and the local sequence before leaf 449's Caput XI remains to be rechecked."
      content: |
        Pars II, Liber VI, probably Caput IX, Articulus V. `Sapientiam
        non doceri...`: wisdom is not simply taught or transfused, but
        contracted from Fate, Necessity, and Harmony under God; the wisest
        know by acknowledging that they receive diminished species and, even
        if intrinsecated, would know `non mensura entis, & veri, sed mensura
        sui`. See the leaf-438 pilot slice.
      caveat: "Chapter number and page number remain inferred from damaged running headers; page-image collation remains open."
    - jp2_leaf: 444
      printed_page: 78
      content: |
        Pars II, Liber VI, Caput X, Articulus IV. Cassirer's exact Vol. 2
        p. 78 sapor anchor: `Amor, quo Deum amamus, non est accidentalis,
        sed essentialis` and `Divinitas participata talem saporem habet`.
        The page also links hidden love and hidden sense: `Amor abditus`
        and `sensus abditus`.
      caveat: |
        Page-image check confirms printed page 78 and the target quote.
        Adjacent leaf 443 confirms Caput X / Articulus IV; leaf 444 itself
        begins Articulus V after the target passage.
    - jp2_leaf: 449
      printed_page: null
      printed_page_inferred: 83
      printed_page_basis: "Damaged ABBYY header reads `Sj`, interpreted as printed page 83 by local sequence around Part II, Liber VI."
      content: |
        Pars II, Liber VI, Caput XI, Articulus I. Reassumption that all
        true beings are essentiated by three primalities: `Potentia,
        Sapientia, & Amor`. Opens the internally warranted Part II
        primalities target generated by leaf 87.
      caveat: "Page-image collation remains open."
    - jp2_leaf: 450
      printed_page: null
      printed_page_inferred: 84
      printed_page_basis: "Damaged ABBYY header reads `g4`, interpreted as printed page 84 by local sequence around Part II, Liber VI."
      content: |
        Continuation and close of Pars II, Liber VI, Caput XI, Articulus I,
        down to the distinction between primalities, principles, and causes.
        The lower page begins Articulus II on accidents and essence.
      caveat: "Page-image collation remains open."
    - jp2_leaf: 617
      printed_page: 549
      content: |
        Pars II, Liber X, Caput I. Description of the four-worlds concentric-
        circles diagram (Material / Mathematical / Mental / Archetypal) and
        contemplative-ascent pedagogy through the four registers. Contains
        the only `intrinsecatur & extrinsecatur` coordinate pair in the
        volume - God's mode of relation to all things at the Mathematical
        register. See encounter 002.
    - jp2_leaf: 663
      printed_page: null
      content: |
        Pars III begins: Liber XI opens the applied Part III sequence with
        the world, its origin/destruction, mutation, and cosmological
