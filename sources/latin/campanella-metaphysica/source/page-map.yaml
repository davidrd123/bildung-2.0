        Part III structural survey.
      caveat: "Book opening verified from ABBYY extraction; printed page and full chapter map remain uncollated. Range to leaf 740 is inferred from the next verified book opening."
    - jp2_leaf: 741
      printed_page: null
      content: |
        Pars III, Liber XII opening. Structural-survey marker for the
