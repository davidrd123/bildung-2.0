      only far enough to complete the weight/tangible subsection.
    caveat: |
      Working page-order trial from ABBYY normalization, not page-image
      collation. Several damaged readings remain bracketed in the part file,
      including age/odor wording, `laudatum`, `sestertia`, `dragma`, and
      `Puer puero durus`.

  - id: "campanella-pilot-pepper-heat-intrinsecatio"
    status: "opened"
    purpose: "Source substrate for the leaf-28 pepper/heat example where the thing's nature is intrinsecated into us but altered by organs and media."
    location:
      jp2_leaf: 28
      jp2_file: "source/page-images/jp2/thomcampanellsty00camp_0028.jp2"
      printed_page: null
      section: "Continuation before Liber I, Caput I, Dubitatio VII"
      raw_extract: "source/raw/leaf-0028-pepper-heat-intrinsecatio-abbyy.txt"
      normalized_extract: "source/normalized/leaf-0028-pepper-heat-intrinsecatio-abbyy.normalized.txt"
      part: "parts/pilot-pepper-heat-and-altered-intrinsecatio.md"
    latin_signal_phrase: "rei natura nobis intrinsecatur"
    content_note: |
      Pepper is cold to touch but hot in the mouth because it is broken up
      and the thing's nature is intrinsecated into us. Yet that same entry is
      altered by saliva, tongue, flesh, intervening air, and accidents. The
      passage therefore confirms intrinsecation as bodily real while denying
      that sensory contact gives the thing as it is.
    caveat: |
      The star-image line `quasdam imaginarias [ef]fulsiones` remains
      unsettled and needs page-image collation.

  - id: "ernst-part-i-page-73-self-knowledge"
    status: "opened"
    purpose: "Ernst- and Cassirer-guided source substrate for self-knowledge, abdita/addita knowledge, and wisdom as primality."
    secondary_guide: "reading/ernst-ch10-metaphysica-map.md"
    cassirer_guide: "reading/cassirer-campanella-latin-citation-map.md"
    location:
      jp2_leaf: 85
      jp2_file: "source/page-images/jp2/thomcampanellsty00camp_0085.jp2"
      printed_page: 73
      section: "Liber I, Caput IX, Responsio ad nonam dubitationem"
      raw_extract: "source/raw/leaf-0085-self-knowledge-primality-abbyy.txt"
      normalized_extract: "source/normalized/leaf-0085-self-knowledge-primality-abbyy.normalized.txt"
      continuation_raw_extract: "source/raw/leaf-0086-self-knowledge-primality-continuation-abbyy.txt"
      continuation_normalized_extract: "source/normalized/leaf-0086-self-knowledge-primality-continuation-abbyy.normalized.txt"
      part: "parts/pilot-self-knowledge-abdita-and-primality.md"
    latin_signal_phrases:
      - "sapientiam formaliter non esse passionem"
      - "notitia superaddita"
      - "innata & abdita"
      - "scientia non acquiritur, sed scibilia acquiruntur"
      - "Sapientia est primalitas sicut potestas"
      - "Sapientia autem est sanitas orbis terrarum"
    content_note: |
      Campanella accepts that knowing is a kind of alienation, but restricts
      madness to total alienation where judgment is lost. Passion supplies
      not the active cause of science but the specifying occasion through
      which innate wisdom is directed toward knowables. The continuation
      distinguishes wisdom from affliction and vanity: only the totalizing
      sophistical desire to know all God's works is condemned; wisdom itself
      is the health of the world.
    caveat: |
      Opened as a lower-leaf and next-leaf-continuation working pilot from
      ABBYY extraction and normalization. Targeted crops corrected `in 2.
      Parte`, `insanus`, `divina res`, and the leaf-86 continuation ending
      at `vt in 3. Parte`; full page-image collation remains open.

  - id: "campanella-pilot-innate-illata-science"
    status: "opened"
    purpose: "Dependency slice generated by the leaf-85/86 self-knowledge pilot: follows the next dubitation response into innate versus introduced knowledge, dream, ecstasy, sickness, and ordinary waking judgment."
    location:
      jp2_leaf: 86
      jp2_file: "source/page-images/jp2/thomcampanellsty00camp_0086.jp2"
      printed_page: 74
      section: "Liber I, Caput IX, Responsio ad decimam dubitationem, Articulus V"
      raw_extract: "source/raw/leaf-0086-self-knowledge-primality-continuation-abbyy.txt"
      normalized_extract: "source/normalized/leaf-0086-self-knowledge-primality-continuation-abbyy.normalized.txt"
      continuation_jp2_leaf: 87
      continuation_jp2_file: "source/page-images/jp2/thomcampanellsty00camp_0087.jp2"
      continuation_printed_page: 75
      continuation_raw_extract: "source/raw/leaf-0087-tenth-dubitation-continuation-abbyy.txt"
      continuation_normalized_extract: "source/normalized/leaf-0087-tenth-dubitation-continuation-abbyy.normalized.txt"
      part: "parts/pilot-innate-illata-science-dream-and-ecstasy.md"
    latin_signal_phrases:
      - "scientia innata, & illata"
      - "religio ... reversio ad suum principium"
      - "sagacitas enim est innatae notitiae scintilla"
      - "uti per Primalitates suas ad superiora"
      - "differentia inter somniantem & vigilantem"
      - "spiritualis omnia iudicat"
    content_note: |
      The soul never loses innate knowledge of its origin, but introduced
      passions can interrupt its use. Campanella distinguishes ordinary
      waking evidence for corporeal matters from dream-revelation, sickness,
      hidden passions, and divine matters, where subtler or higher affection
      can make non-ordinary witnesses epistemically relevant. The leaf also
      points forward to the Part II primalities discussion: the soul is turned
      toward higher things `per Primalitates suas`, with the issue deferred
      by Campanella himself to `2. Parte`.
    caveat: |
      Opened as a working pilot with targeted image checks. The `CAP. IX. /
      ART. V.` heading is a verified split heading line across the columns,
      not a delayed article break at `Discrepantia opinionum`. Several dense
      scholastic and miracle/revelation references, especially the bilocation
      paragraph, remain lightly contextualized.

  - id: "campanella-pilot-part-ii-intellectione-abdita"
    status: "opened"
    purpose: "Direct Cassirer Part II self-consciousness locus generated by the Vol. 1 crosswalk; tests leaf 85's hidden self-knowledge doctrine against `intellectione abdita per suam essentiam`."
    location:
      jp2_leaf: 402
      jp2_file: "source/page-images/jp2/thomcampanellsty00camp_0402.jp2"
      printed_page: 36
      section: "Pars II, Liber VI, Caput VI, Articulus IX"
      raw_extract: "source/raw/leaf-0402-part-ii-self-intellection-abdita-abbyy.txt"
      normalized_extract: "source/normalized/leaf-0402-part-ii-self-intellection-abdita-abbyy.normalized.txt"
      part: "parts/pilot-part-ii-intellectione-abdita-per-essentiam.md"
    latin_signal_phrases:
      - "Unaquaeque res intelligit se ipsam intellectione abdita per suam essentiam"
      - "intelligere exteriora est pati ab illis, & fieri illa"
      - "intelligens enim fit ipsum intelligibile"
      - "intellectione essentiali, & originali sui ipsius"
      - "Repraesentant creaturae Deum intelligentem"
    content_note: |
      The direct Part II locus confirms that self-knowledge is hidden,
      essential, original, and not reflexive or introduced. External knowing
      is passive and alienating because the knower becomes the intelligible;
      essential self-intellection does not require becoming because the knower
      already is itself. Creaturely self-intellection represents divine
      intellection finitely and impedibly, while divine intellection alone is
      infinite and causative.
    caveat: |
      Opened from ABBYY extraction with page-image checks of printed page,
      target sentence, and boundary before Art. X. Full page collation remains
      open, especially for `primordiali innata`, `limitatae intellectionis`,
      `se se conservet intelligens essentia`, and `chere`.

  - id: "campanella-pilot-part-ii-essential-love-sapor"
    status: "opened"
    purpose: "Exact Vol. 2 Part 018 Campanella target from Cassirer's `Teil II, S. 78` footnote; opens essential love of God and participated divinity having `saporem`."
    location:
      jp2_leaf: 444
      jp2_file: "source/page-images/jp2/thomcampanellsty00camp_0444.jp2"
      printed_page: 78
      printed_page_basis: "Verified by page image; printed page number `78` is visible in the upper-left running header."
      section: "Pars II, Liber VI, Caput X, Articulus IV"
      section_basis: "Adjacent leaf 443 extraction confirms `PARS II. LIB. VI. CAP. X.` and `ART. IV`; leaf 444 continues Art. IV and then begins `ART. V.`"
      raw_extract: "source/raw/leaf-0444-part-ii-essential-love-sapor-abbyy.txt"
      normalized_extract: "source/normalized/leaf-0444-part-ii-essential-love-sapor-abbyy.normalized.txt"
      part: "parts/pilot-part-ii-essential-love-sapor.md"
    latin_signal_phrases:
      - "Amor, quo Deum amamus, non est accidentalis, sed essentialis"
      - "Amor abditus, quo se cuncta amant"
      - "sensus abditus, quo sese cuncta sapiunt"
      - "Divinitas participata talem saporem habet"
      - "omne ens seipsum esse amando, magis amat Deum quam se"
    content_note: |
      Cassirer's Vol. 2 p. 78 quotation is confirmed against the 1638
      witness. The passage argues that love of God is essential because
      self-love is love of being, and God is being simply; participated
      divinity has `saporem` because each finite being is a participation in
      divine entity. The page also joins hidden love and hidden sense:
      all things love themselves by hidden love and `sapiunt` themselves by
      hidden sense.
    caveat: |
      Target quote, printed page, and Art. V boundary have been checked
      against the page image. The file remains a working transcription from
      ABBYY extraction and normalization; before encounter-grade use revisit
      `adscititiusque`, `quod nobis amamus`, and the closing Scotus
      paragraph. The page witnesses `Potentia, Sapientia, & Essentia`; do
      not silently harmonize this local finite-being phrase to the later
      `Potentia, Sapientia, & Amor` triad.

