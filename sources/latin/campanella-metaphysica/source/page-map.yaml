      caveat: "Book opening verified from ABBYY extraction; range to leaf 790 is inferred from the next verified book opening."
    - jp2_leaf: 791
      printed_page: null
      content: |
        Pars III, Liber XIV, Caput I, Articulus I. Opening of the human-soul
        book: the soul asks after itself, knows itself `cognitione quadam
