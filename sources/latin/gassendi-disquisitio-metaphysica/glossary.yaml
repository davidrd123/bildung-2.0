# Working glossary for the Gassendi Disquisitio source campaign.
# Keep entries open until repeated passages earn firmer English.

- term: "idea"
  handle: "term:gassendi-idea"
  kind: concept
  preferred: "idea"
  alternatives:
    - "image"
    - "representation"
  status: open
  notes: "In the sun passage Gassendi contests Descartes' use of idea by tying even the vast astronomical idea back to a sensory idea enlarged by experience and reason. Watch whether `idea` remains image-bound or broadens under Cartesian pressure."

- term: "notio"
  handle: "term:gassendi-notio"
  kind: concept
  preferred: "notion"
  alternatives:
    - "concept"
  status: open
  notes: "The sun passage denies that the idea is elicited `ex innata quadam notione`. Keep pressure on the relation between `notio`, `idea`, and Cassirer's `eingeborene Begriffe`."

- term: "innatus / adventitius"
  handle: "term:gassendi-innatus-adventitius"
  kind: concept_pair
  preferred: null
  alternatives:
    - "innate / adventitious"
    - "inborn / coming from outside"
  status: open
  notes: "The section title names `adventitia Idearum origine`; the sun passage denies an `innata quaedam notio`. Keep the pair visible because it is the explicit Cartesian pressure point."

- term: "incurrere / incidentia"
  handle: "term:gassendi-incurrere"
  kind: process
  preferred: null
  alternatives:
    - "run into"
    - "enter"
    - "occur through"
    - "impinge"
  status: open
  notes: "Part 011 makes `incurrit` structurally important for Gassendi's image theory. The sun passage has the sensory idea `per sensum incurrit`; the Canon I passage cited by Cassirer uses `incursione` / `incidentia`. Do not settle this into one smooth English verb yet."

- term: "experientia / ratio"
  handle: "term:gassendi-experientia-ratio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "experience / reason"
    - "experience / reasoning"
  status: open
  notes: "The sun passage makes experience prove and reason confirm while both remain anchored in sensory incursion. This pair is the local hinge for Cassirer's criticism that the active formation of the object remains unexplained."

- term: "mens"
  handle: "term:gassendi-mens"
  kind: concept
  preferred: "mind"
  alternatives:
    - "understanding"
  status: open
  notes: "In the sun passage the idea is amplified `ipsa vi mentis`. This is exactly where Cassirer applies pressure: the mind's power is invoked but not grounded by Gassendi's sensory theory."

- term: "species / imago / phantasia"
  handle: "term:gassendi-species-imago-phantasia"
  kind: concept_cluster
  preferred: null
  alternatives:
    - "species / image / phantasy"
    - "sensible species / image / imagination"
  status: open
  notes: "The surrounding passage says the mind returns to the `species` received through the eye, and Descartes replies that Gassendi restricts `idea` to images painted in `phantasia`. This cluster is the local source of Cassirer's `Bildertheorie` pressure."

- term: "consecutio / analogia"
  handle: "term:gassendi-consecutio-analogia"
  kind: concept_pair
  preferred: null
  alternatives:
    - "consequence / analogy"
    - "inference / analogy"
  status: open
  notes: "Part 003 names the alternative to true idea/image. We can know the masked face, sea-bottom, distant tower, substance, and God through consequence or analogy, but not as a proper image."

- term: "realitas objectiva / realitas formalis"
  handle: "term:gassendi-realitas-objectiva-formalis"
  kind: concept_pair
  preferred: null
  alternatives:
    - "objective reality / formal reality"
  status: open
  notes: "Gassendi accepts the vocabulary provisionally but measures objective reality by what the intellect actually knows of the thing, not by the whole formal reality of the thing itself. Part 006 sharpens the demotion: objective reality is representation, likeness, symmetry, relation, or mode, and is almost nothing in comparison with the formal reality of the external cause. Part 012 turns the inseparability of objective and formal reality against Descartes: if an idea's formal reality depends only on thought, its objective reality cannot require an external cause without further explanation."

- term: "causa efficiens / causa materialis"
  handle: "term:gassendi-causa-efficiens-materialis"
  kind: concept_pair
  preferred: null
  alternatives:
    - "efficient cause / material cause"
  status: open
  notes: "Part 006 redirects the dictum `nihil est in effectu, quod non sit in caussa` toward material rather than efficient causality. The efficient cause is external and often different in kind from the effect; it contains the effect only insofar as it can sketch and complete it from definite matter."

- term: "formaliter / eminenter contineri"
  handle: "term:gassendi-formaliter-eminenter"
  kind: concept_pair
  preferred: null
  alternatives:
    - "contained formally / eminently"
    - "formal / eminent containment"
  status: open
  notes: "Part 006 treats formal and eminent containment as no proof that an efficient cause gives part of its own being to the effect. The terms can mark likeness or superiority of form, but not transfer of substance."

- term: "res / realitas / modalitas"
  handle: "term:gassendi-res-realitas-modalitas"
  kind: concept_cluster
  preferred: null
  alternatives:
    - "thing / reality / modality"
    - "thinghood / reality / modality"
  status: open
  notes: "Part 007 makes Descartes' `realitas objectiva` answer to `res`. If only substance is strictly `res`, an idea as a mode of an operation is better called modal than real; `modalitas` is the proper name Gassendi wants in place of objective reality. Part 012 intensifies the sequence: the idea is not a thing but a mode of a thing, a mode of a mode, and a part of a mode."

- term: "via regia"
  handle: "term:gassendi-via-regia"
  kind: method
  preferred: "royal road"
  alternatives:
    - "public road"
    - "clear road"
  status: open
  notes: "Part 012 names the public cosmological route through the universe as the `regia, plana, perspicua via` to knowledge of God's existence, power, wisdom, goodness, and other attributes. Keep this as Gassendi's positive counter-route to Descartes' private enclosed idea."

- term: "relatio / non ens"
  handle: "term:gassendi-relatio-non-ens"
  kind: concept_pair
  preferred: null
  alternatives:
    - "relation / non-being"
    - "mere relation / not a being"
  status: open
  notes: "Part 012 pushes objective reality beyond modal thinness into relation and non-being. The likeness or representation in wax or mind is not a thing in itself but a mere relation, and therefore `non ens`."

- term: "repraesentativitas / repraesentabilitas"
  handle: "term:gassendi-repraesentativitas-repraesentabilitas"
  kind: concept_pair
  preferred: null
  alternatives:
    - "representativeness / representability"
  status: open
  notes: "Part 007 translates Descartes' objective/formal reality distinction into image-language. The impressed figure has representativeness; the seal or cause has representability. Part 012 asks whether the cause's reality means its substance, its representability through an idea, or something else, showing that the causal comparison is not yet evident."

- term: "impressio / sigillum / figura"
  handle: "term:gassendi-impressio-sigillum-figura"
  kind: image_model
  preferred: null
  alternatives:
    - "impression / seal / figure"
    - "seal-and-wax impression"
  status: open
  notes: "Part 007 develops a seal/wax model for idea-causality. If ideas do not flow in as painted species retaining formal reality, Gassendi says Descartes is left with impression: an idea as figure impressed in wax by a seal."

- term: "idea sui / cognitio reflexa"
  handle: "term:gassendi-idea-sui-cognitio-reflexa"
  kind: concept_pair
  preferred: null
  alternatives:
    - "self-idea / reflected cognition"
    - "idea of oneself / reflective knowledge"
  status: open
  notes: "Part 008 denies direct self-idea on the species model. A faculty cannot send its own species into itself; self-knowledge would require a mirror-like return and so would be `cognitio reflexa`, not direct self-presence."

- term: "substantia incorporea / substantia corporea"
  handle: "term:gassendi-substantia-incorporea-corporea"
  kind: concept_pair
  preferred: null
  alternatives:
    - "incorporeal substance / corporeal substance"
  status: open
  notes: "Part 008 challenges the passage from an incorporeal self-idea to ideas of corporeal substance. A common notion such as being apt to exist presupposes prior understanding of both particulars."

- term: "voces / significatus"
  handle: "term:gassendi-voces-significatus"
  kind: concept_pair
  preferred: null
  alternatives:
    - "words / meanings"
    - "words / significations"
  status: open
  notes: "Part 013 makes divine ideas socially and linguistically mediated. Before Descartes reasons from his idea of God, he has already received words and their meanings from others, through which notions or ideas were formed in the mind."

- term: "imago in phantasia / imago in mente"
  handle: "term:gassendi-imago-phantasia-mente"
  kind: concept_pair
  preferred: null
  alternatives:
    - "image in phantasy / image in mind"
    - "phantasy-image / mental image"
  status: open
  notes: "Part 009 says Descartes avoids the real issue by saying `idea` extends to everything thought rather than to images painted in the mind. For Gassendi, every object of thought still stands before the mind under some image, at least a mental one."

- term: "agere in seipsum"
  handle: "term:gassendi-agere-in-seipsum"
  kind: problem
  preferred: null
  alternatives:
    - "act on itself"
    - "self-action"
  status: open
  notes: "Parts 008-009 deny that a faculty or body acts on itself strictly. Action and passion require distinct termini; the mirror and spinning-top examples are treated as part-to-part or agent-patient relations, not genuine self-action."

- term: "idea infiniti / incomprehensibilitas"
  handle: "term:gassendi-idea-infiniti-incomprehensibilitas"
  kind: concept_pair
  preferred: null
  alternatives:
    - "idea of the infinite / incomprehensibility"
  status: open
  notes: "Part 010 sharpens the dispute over whether a true idea of the infinite must comprehend the infinite. Gassendi says a finite grasp gives only a finite or partial idea; Descartes replies that incomprehensibility belongs to the formal notion of the infinite. Part 013 adds the cave/mountain analogy: `infinite` signifies the limit we have not found or penetrated, not a positive comprehension of the whole. Part 015 accepts Descartes' incomprehensibility premise but denies that a human idea can therefore represent the whole infinite."

- term: "comprehensio / repraesentatio"
  handle: "term:gassendi-comprehensio-repraesentatio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "comprehension / representation"
  status: open
  notes: "Part 015 makes this the hinge of the reply to Descartes. Gassendi says Descartes shifts from comprehension on the side of the intellect to representation on the side of the idea, but the truth of the idea cannot be secured if what it represents is not comprehended."

- term: "totum infinitum"
  handle: "term:gassendi-totum-infinitum"
  kind: problem
  preferred: "whole infinite"
  alternatives:
    - "the whole infinite"
  status: open
  notes: "Part 015 treats `totum infinitum` as unstable in a human idea. To represent the whole is to leave nothing hidden; to leave nothing hidden is to comprehend; but Descartes says the comprehended cannot be infinite."

- term: "infiniti mundi"
  handle: "term:gassendi-infiniti-mundi"
  kind: analogy
  preferred: "infinite worlds"
  alternatives:
    - "infinitely many worlds"
  status: open
  notes: "Part 010 uses ancient ideas of infinite worlds, an infinite universe, and infinite principles as a reductive parallel to Descartes' idea of infinite substance. If amplification proves God, Gassendi argues, it would also prove infinite worlds. Part 014 restates the objection as a formal parody syllogism and says Descartes closed his eyes to its consequence. Part 016 uses the same case to distinguish what is actual in an idea from what is actual in reality."

- term: "defectus / comparatio"
  handle: "term:gassendi-defectus-comparatio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "defect / comparison"
    - "lack / comparison"
  status: open
  notes: "Part 016 treats awareness of defect as a comparison operation, not as direct evidence of infinite perfection. Defects can be recognized by comparison with the universe as whole or with other finite persons and parts. Part 017 says Descartes' move from more-perfect to infinite skips intermediate finite degrees."

- term: "actu in idea / actu in re"
  handle: "term:gassendi-actu-idea-re"
  kind: concept_pair
  preferred: null
  alternatives:
    - "actual in the idea / actual in the thing"
    - "actual in idea / actual in reality"
  status: open
  notes: "Part 016 separates what is actual in an idea from what is actual in the represented thing. The architect's house and the philosophers' infinite worlds can be actual in thought without actually existing. Part 017 extends this against objective being: actual representation does not license actual existence unless the causal premise has already been proved."

- term: "vera idea"
  handle: "term:gassendi-vera-idea"
  kind: concept
  preferred: "true idea"
  alternatives:
    - "genuine idea"
    - "adequate idea"
  status: open
  notes: "Part 017 splits `vera idea` into two senses: a genuine and adequate idea representing God as he is, and a limited representation of something true that may be affirmed according to our measure. Gassendi says Descartes answers in the weaker sense while the dispute concerns the stronger one."

- term: "metabasis eis allo genos"
  handle: "term:gassendi-metabasis"
  kind: fallacy
  preferred: "transition to another genus"
  alternatives:
    - "change to another genus"
  status: open
  notes: "Part 017 uses the Greek logical charge for Descartes' move from `more perfect than me` to `infinite being`. The term marks an illicit leap across intermediate finite degrees."

- term: "diallelus / circulus"
  handle: "term:gassendi-diallelus-circulus"
  kind: problem
  preferred: null
  alternatives:
    - "diallelus / circle"
    - "Cartesian circle"
  status: open
  notes: "Part 011 explicitly accuses Descartes' proof of circularity: clear and distinct perception is used to prove God, while God's existence and veracity are needed to guarantee clear and distinct perception. Part 014 catches the same structure inside the sub-assumption when clear and distinct perception is assumed before its truth has been secured. Part 017 restates a circle in objective-being terms: actual infinite being is proved from representation as actual, while representation as actual is grounded in actual existence."

- term: "paralogismus"
  handle: "term:gassendi-paralogismus"
  kind: problem
  preferred: "paralogism"
  alternatives:
    - "fallacious inference"
  status: open
  notes: "Part 014 names Descartes' infinite-substance inference a `paralogismus`. The error begins when the negative word `infinitum` is treated as positive comprehension and when the same inference is not allowed to the ancient philosophers' infinite universe, worlds, and principles."

- term: "demonstratio / authoritas"
  handle: "term:gassendi-demonstratio-authoritas"
  kind: concept_pair
  preferred: null
  alternatives:
    - "demonstration / authority"
  status: open
  notes: "Part 011 distinguishes public demonstration from private authority. A proof based on Descartes' report about his own idea may persuade by personal authority, but does not have the force of a general demonstration."

- term: "substantia / accidens"
  handle: "term:gassendi-substantia-accidens"
  kind: concept_pair
  preferred: null
  alternatives:
    - "substance / accident"
  status: open
  notes: "Dubitatio IV denies that substance has a proper idea. It is conceived through accidents, or after their manner, as something extended, figured, and colored."

- term: "supersubstantia"
  handle: "term:gassendi-supersubstantia"
  kind: concept
  preferred: "super-substance"
  alternatives:
    - "beyond-substance"
  status: open
  notes: "Part 013 uses `supersubstantia` to mark the apophatic pressure on divine substance. God is not substance in the ordinary sense, does not stand under accidents, and exceeds whatever we understand by substance."

- term: "infinitum"
  handle: "term:gassendi-infinitum"
  kind: concept
  preferred: "infinite"
  alternatives:
    - "unbounded"
  status: open
  notes: "In Part 003 Gassendi says the human intellect is not capable of conceiving infinity; `infinite` names a thing beyond grasp with a name not understood by a bounded intellect. Part 013 makes the word negative and reflexive: after advancing as far as we can and failing to recognize an end, we return to ourselves and call the thing infinite. Part 014 says this negative word deceives Descartes when he treats it as positive amplitude."

- term: "intellectio / imaginatio"
  handle: "term:gassendi-intellectio-imaginatio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "intellection / imagination"
    - "understanding / imagination"
  status: open
  notes: "Part 004 makes this the explicit dispute. Descartes says Gassendi confuses intellection with imagination; Gassendi demands a criterion and argues that if ideas in the intellect are images, intellect cannot understand bodies or substance without imagining."

- term: "abstractio / deductio"
  handle: "term:gassendi-abstractio-deductio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "abstraction / deduction"
  status: open
  notes: "Part 004 allows that substance is conceived by intellect through abstraction and deduction from consequence, but denies that this yields a proper clear idea."

- term: "notitia Dei"
  handle: "term:gassendi-notitia-dei"
  kind: concept
  preferred: "knowledge of God"
  alternatives:
    - "notion of God"
  status: open
  notes: "Part 005 distinguishes knowledge of God by revelation, by faith, and by natural light. This lets Gassendi preserve divine origin while denying innateness. Part 013 routes the idea of God through words, meanings, parents, teachers, priests, society, stars, and the ordered universe before it can be treated as an inner idea."

- term: "modulus"
  handle: "term:gassendi-modulus"
  kind: concept
  preferred: null
  alternatives:
    - "measure"
    - "small measure"
    - "limited measure"
  status: open
  notes: "Part 005 accepts Descartes' distinction between adequate concept and understanding proportioned to our measure, but Gassendi says he recognizes nothing except such measure, not even for a mite, much less for infinite being."

- term: "ampliatio"
  handle: "term:gassendi-ampliatio"
  kind: process
  preferred: "enlargement"
  alternatives:
    - "amplification"
    - "dilation"
  status: open
  notes: "Recurring from the sun passage into Part 005. Enlargement of finite ideas or perfections yields greater dilation and usually greater confusion; it does not by itself add objective reality or prove innateness. Part 014 gives the positive operation more detail: created perfections are stripped of imperfections and finitude, then promoted toward infinity without the mind attaining true infinite magnitude, duration, knowledge, power, or happiness. Part 018 adds composite ideals such as Pandora, the perfect republic, and the perfect orator. Part 019 shows Descartes accepting amplification but treating the power to amplify beyond the human as evidence of divine making."

- term: "conservatio / creatio"
  handle: "term:gassendi-conservatio-creatio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "conservation / creation"
    - "preservation / creation"
  status: open
  notes: "Part 018 rejects Descartes' claim that conservation differs from creation only by reason. Gassendi separates a thing's first production from its later persistence and says not every persisting thing is newly created at each moment. Part 019 gives Descartes' counter: creatures need continuous first-cause influx to be conserved."

- term: "causa secundum fieri / causa secundum esse"
  handle: "term:gassendi-causa-fieri-esse"
  kind: concept_pair
  preferred: null
  alternatives:
    - "cause according to becoming / cause according to being"
    - "cause in becoming / cause in being"
  status: open
  notes: "Part 019 makes Descartes' Scholastic distinction explicit. Architect and father are causes `secundum fieri`; God is cause of creatures both `secundum fieri` and `secundum esse`, hence must continuously conserve them."

- term: "regressus in infinitum"
  handle: "term:gassendi-regressus-in-infinitum"
  kind: problem
  preferred: "infinite regress"
  alternatives:
    - "progression to infinity"
  status: open
  notes: "Part 018 allows an infinite regress in generated causes such as parentage unless Descartes first proves that the world began. The regress is absurd only in subordinated causes where the lower cannot act without a present higher mover. Part 019 responds by classing the relevant causes as causes in being, not parent-like causes in becoming."

- term: "nativa mentis vis"
  handle: "term:gassendi-nativa-mentis-vis"
  kind: process
  preferred: "native force of the mind"
  alternatives:
    - "mind's native power"
  status: open
  notes: "Part 014 gives a compact formula for idea-formation: things perceived by sight or hearing are thought by the mind and by its native force compared, joined, and amplified. This is a positive Gassendi alternative to innate objective reality, though still dependent on received materials."
