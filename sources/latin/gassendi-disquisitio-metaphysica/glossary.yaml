# Working glossary for the Gassendi Disquisitio source campaign.
# Keep entries open until repeated passages earn firmer English.

- term: "idea"
  handle: "term:gassendi-idea"
  kind: concept
  preferred: "idea"
  alternatives:
    - "image"
    - "representation"
  status: open
  notes: "In the sun passage Gassendi contests Descartes' use of idea by tying even the vast astronomical idea back to a sensory idea enlarged by experience and reason. Watch whether `idea` remains image-bound or broadens under Cartesian pressure. Part 070 presses the image-bound side again: if the chiliagon idea distinctly represents the figure's angles, it belongs to imagination; if it does not represent them, Gassendi says it is not an image in the strict sense. Part 071 qualifies the image theory: the idea under which God, angel, or mind is thought is an accommodated finite form, not an adequate measure of the nature itself."

- term: "notio"
  handle: "term:gassendi-notio"
  kind: concept
  preferred: "notion"
  alternatives:
    - "concept"
  status: open
  notes: "The sun passage denies that the idea is elicited `ex innata quadam notione`. Keep pressure on the relation between `notio`, `idea`, and Cassirer's `eingeborene Begriffe`. Part 050 pairs `apprehensiones, seu notiones` as the corrigible presentations through which intellect judges rightly or wrongly and will follows apparent good."

- term: "innatus / adventitius"
  handle: "term:gassendi-innatus-adventitius"
  kind: concept_pair
  preferred: null
  alternatives:
    - "innate / adventitious"
    - "inborn / coming from outside"
  status: open
  notes: "The section title names `adventitia Idearum origine`; the sun passage denies an `innata quaedam notio`. Keep the pair visible because it is the explicit Cartesian pressure point. Part 039 returns to the pair directly: if later God-knowledge comes through hearing or teaching, the idea appears adventitious rather than divinely impressed. Part 060 gives the sharp reduction: what is innate is not stored ideas of things, but the faculty or power for knowing things once singulars are seen, heard, described, compared, and generalized."

- term: "incurrere / incidentia"
  handle: "term:gassendi-incurrere"
  kind: process
  preferred: null
  alternatives:
    - "run into"
    - "enter"
    - "occur through"
    - "impinge"
  status: open
  notes: "Part 011 makes `incurrit` structurally important for Gassendi's image theory. The sun passage has the sensory idea `per sensum incurrit`; the Canon I passage cited by Cassirer uses `incursione` / `incidentia`. Do not settle this into one smooth English verb yet."

- term: "experientia / ratio"
  handle: "term:gassendi-experientia-ratio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "experience / reason"
    - "experience / reasoning"
  status: open
  notes: "The sun passage makes experience prove and reason confirm while both remain anchored in sensory incursion. This pair is the local hinge for Cassirer's criticism that the active formation of the object remains unexplained. Part 064 makes experience the criterion in the real state for whether an idea conforms to an extra-mental thing."

- term: "mens"
  handle: "term:gassendi-mens"
  kind: concept
  preferred: "mind"
  alternatives:
    - "understanding"
  status: open
  notes: "In the sun passage the idea is amplified `ipsa vi mentis`. This is exactly where Cassirer applies pressure: the mind's power is invoked but not grounded by Gassendi's sensory theory. Part 069 records Descartes' counterpressure: in the true idea of mind, only thought and its non-corporeal attributes are contained. Part 071 gives Gassendi's reply: mind may not be able to turn to itself or to a non-corporeal idea without imagination, and finite mind thinks divine or immaterial natures only under accommodated corporeal forms. Part 074 shifts the mind-body issue from gross-body separation to the unproved claim that mind is purely incorporeal rather than a subtle body. Part 075 gives Descartes' answer: mind can be understood as an existing substance even when no wind, fire, vapor, breath, or subtle body is understood to exist. Part 077 answers that mind considered precisely as thinking thing or substance still leaves open whether it is subtle body or incorporeal. Part 083 asks where mind is if it is unextended: diffused through the whole body, in the brain, or in a point, each option creating pressure on extension and embodiment. Part 084 gives Descartes' immediate answer: mind may be united to the whole body and move body without being extended or corporeal. Part 085 uses separated mind to test the answer: if mind without brain can still understand bodies, Gassendi asks where the species of body is present. Part 086 argues that knowing mind as `res cogitans` gives only the operation of thinking, not the nature or substance of mind. Part 087 concedes common knowledge of thinking, doubting, affirming, denying, imagining, willing, and sensing, while denying that this exhausts mind's hidden nature. Part 088 returns to non-extension as a negative marker and argues that whole-body union keeps the extension problem alive unless Descartes can say more than that extension is not of mind's `ratio`. Part 089 uses pain, hunger, and thirst to test whether an unextended, indivisible mind can be quasi-mixed with body or receive differentiated bodily affections. Part 091 makes the same pressure methodological: mind's alleged non-extension does not explain how it is present to many bodily parts or how an idea/species in mind represents extended parts."

- term: "species / imago / phantasia"
  handle: "term:gassendi-species-imago-phantasia"
  kind: concept_cluster
  preferred: null
  alternatives:
    - "species / image / phantasy"
    - "sensible species / image / imagination"
  status: open
  notes: "The surrounding passage says the mind returns to the `species` received through the eye, and Descartes replies that Gassendi restricts `idea` to images painted in `phantasia`. This cluster is the local source of Cassirer's `Bildertheorie` pressure. Part 035 makes optical species central again: microscope, telescope, and near/far viewing show that a more distinct species or idea can also be larger because more parts are represented. Part 083 makes the species problem explicit in Meditation VI: a corporeal species or idea representing an extended body seems itself to need parts, extension, figure, position, and variety, and so appears hard to receive in an unextended mind. Part 084 gives Descartes' reply: no corporeal species is received in mind; only imagination requires a bodily species to which mind applies itself. Part 085 answers that Descartes has not settled whether intellect knows body through an incorporeal species or no species, then argues from the paper example and separated mind that some species of extension, figure, and color must still be present to intellect. Part 091 answers Descartes' earth-magnitude reductio by distinguishing representative/objective presence from real containment, while preserving the pressure that a species representing parts cannot simply be partless. Part 092 supplies the optical model: retinal image, brain species, and separated-mind species need not have the object's size or part-count, but must have some extension if they represent extended parts."

- term: "consecutio / analogia"
  handle: "term:gassendi-consecutio-analogia"
  kind: concept_pair
  preferred: null
  alternatives:
    - "consequence / analogy"
    - "inference / analogy"
  status: open
  notes: "Part 003 names the alternative to true idea/image. We can know the masked face, sea-bottom, distant tower, substance, and God through consequence or analogy, but not as a proper image."

- term: "realitas objectiva / realitas formalis"
  handle: "term:gassendi-realitas-objectiva-formalis"
  kind: concept_pair
  preferred: null
  alternatives:
    - "objective reality / formal reality"
  status: open
  notes: "Gassendi accepts the vocabulary provisionally but measures objective reality by what the intellect actually knows of the thing, not by the whole formal reality of the thing itself. Part 006 sharpens the demotion: objective reality is representation, likeness, symmetry, relation, or mode, and is almost nothing in comparison with the formal reality of the external cause. Part 012 turns the inseparability of objective and formal reality against Descartes: if an idea's formal reality depends only on thought, its objective reality cannot require an external cause without further explanation."

- term: "causa efficiens / causa materialis"
  handle: "term:gassendi-causa-efficiens-materialis"
  kind: concept_pair
  preferred: null
  alternatives:
    - "efficient cause / material cause"
  status: open
  notes: "Part 006 redirects the dictum `nihil est in effectu, quod non sit in caussa` toward material rather than efficient causality. The efficient cause is external and often different in kind from the effect; it contains the effect only insofar as it can sketch and complete it from definite matter."

- term: "corpuscula / principia"
  handle: "term:gassendi-corpuscula-principia"
  kind: concept_pair
  preferred: null
  alternatives:
    - "corpuscles / principles"
    - "corpuscular principles"
  status: open
  notes: "Part 058 names the physical alternative to a thin account of material essence: explain the nature, power, property, and action of material things through magnitude, figure, motion, position, and a few other joined or added features of the corpuscles or principles from which each material thing is composed."

- term: "formaliter / eminenter contineri"
  handle: "term:gassendi-formaliter-eminenter"
  kind: concept_pair
  preferred: null
  alternatives:
    - "contained formally / eminently"
    - "formal / eminent containment"
  status: open
  notes: "Part 006 treats formal and eminent containment as no proof that an efficient cause gives part of its own being to the effect. The terms can mark likeness or superiority of form, but not transfer of substance."

- term: "res / realitas / modalitas"
  handle: "term:gassendi-res-realitas-modalitas"
  kind: concept_cluster
  preferred: null
  alternatives:
    - "thing / reality / modality"
    - "thinghood / reality / modality"
  status: open
  notes: "Part 007 makes Descartes' `realitas objectiva` answer to `res`. If only substance is strictly `res`, an idea as a mode of an operation is better called modal than real; `modalitas` is the proper name Gassendi wants in place of objective reality. Part 012 intensifies the sequence: the idea is not a thing but a mode of a thing, a mode of a mode, and a part of a mode."

- term: "via regia"
  handle: "term:gassendi-via-regia"
  kind: method
  preferred: "royal road"
  alternatives:
    - "public road"
    - "clear road"
  status: open
  notes: "Part 012 names the public cosmological route through the universe as the `regia, plana, perspicua via` to knowledge of God's existence, power, wisdom, goodness, and other attributes. Keep this as Gassendi's positive counter-route to Descartes' private enclosed idea. Part 034 recasts the same route as a posteriori movement through effects, actions, properties, and perfections, like rivulets leading toward the shore of an immense ocean."

- term: "relatio / non ens"
  handle: "term:gassendi-relatio-non-ens"
  kind: concept_pair
  preferred: null
  alternatives:
    - "relation / non-being"
    - "mere relation / not a being"
  status: open
  notes: "Part 012 pushes objective reality beyond modal thinness into relation and non-being. The likeness or representation in wax or mind is not a thing in itself but a mere relation, and therefore `non ens`."

- term: "repraesentativitas / repraesentabilitas"
  handle: "term:gassendi-repraesentativitas-repraesentabilitas"
  kind: concept_pair
  preferred: null
  alternatives:
    - "representativeness / representability"
  status: open
  notes: "Part 007 translates Descartes' objective/formal reality distinction into image-language. The impressed figure has representativeness; the seal or cause has representability. Part 012 asks whether the cause's reality means its substance, its representability through an idea, or something else, showing that the causal comparison is not yet evident."

- term: "impressio / sigillum / figura"
  handle: "term:gassendi-impressio-sigillum-figura"
  kind: image_model
  preferred: null
  alternatives:
    - "impression / seal / figure"
    - "seal-and-wax impression"
  status: open
  notes: "Part 007 develops a seal/wax model for idea-causality. If ideas do not flow in as painted species retaining formal reality, Gassendi says Descartes is left with impression: an idea as figure impressed in wax by a seal. Part 028 reopens impression through Descartes' artisan-mark analogy and asks for the mode of impression, the form of the mark, and how the mark is discerned. Part 035 turns the seal analogy against Descartes: a fully impressed seal would already yield a complete, distinct, explicit image; if later distinctness occurs, something was missing and can be added. Part 039 says a divine impression of one simple nature should be uniform across minds, as one seal yields the same figure in many waxes."

- term: "idea sui / cognitio reflexa"
  handle: "term:gassendi-idea-sui-cognitio-reflexa"
  kind: concept_pair
  preferred: null
  alternatives:
    - "self-idea / reflected cognition"
    - "idea of oneself / reflective knowledge"
  status: open
  notes: "Part 008 denies direct self-idea on the species model. A faculty cannot send its own species into itself; self-knowledge would require a mirror-like return and so would be `cognitio reflexa`, not direct self-presence. Part 083 renews the pressure from the side of self-knowledge: knowing that one thinks reveals an operation, not the substance that operates, and saying that one is non-extended gives a negation rather than a positive idea. Part 086 gives the same pressure its blind-man form: to know mind only as thinking thing is like knowing the sun only as heating thing."

- term: "res cogitans / res calefaciens"
  handle: "term:gassendi-res-cogitans-calefaciens"
  kind: concept_pair
  preferred: null
  alternatives:
    - "thinking thing / heating thing"
  status: open
  notes: "Part 086 makes the pair structurally explicit. Gassendi treats `res cogitans` as an aspectual predicate parallel to the blind man's `res calefaciens`: each names an operation through which the thing is known, while the nature or substance covered by `res` remains obscure. Part 087 concedes that Gassendi knows mind under the same operations Descartes names, but denies that Descartes may infer there is nothing in mind beyond them."

- term: "substantia incorporea / substantia corporea"
  handle: "term:gassendi-substantia-incorporea-corporea"
  kind: concept_pair
  preferred: null
  alternatives:
    - "incorporeal substance / corporeal substance"
  status: open
  notes: "Part 008 challenges the passage from an incorporeal self-idea to ideas of corporeal substance. A common notion such as being apt to exist presupposes prior understanding of both particulars. Part 074 repeats the challenge in Meditation VI: Descartes has shown at most distinction from the gross body, not that mind is not wind, fire, vapor, breath, or some subtle body. Part 075 records Descartes' denial: the proof concerns every body, however subtle, and the Sixth Meditation has demonstrated real difference from all body. Part 077 replies that precise consideration as substance abstracts from both corporeal and incorporeal differences, so incorporeality has not yet been proved. Part 081 narrows the proof to the disputed human case: the question is not thinking or extension in general, but whether human mind has a special extension as the same subtle body. Part 083 grants possible separation from the gross body for argument, but says that still leaves mind as a very subtle corporeal substance rather than proving incorporeality. Part 084 records Descartes' counter: using an extended body, being united to it, and moving it do not make mind extended or body. Part 085 introduces angels and separated mind as test cases: separated substances should understand bodies without brains, which reopens the species-location problem. Part 088 presses the contact and motion version: saying that mind need not be body even if it moves body still leaves unexplained how an incorporeal, unextended soul can touch, impel, and move body. Part 089 presses the affective version: pain appears to require part-distraction, continuity-break, alteration, and differentiated reception, all of which strain a plainly incorporeal and indivisible mind. Part 091 states the disputed alternative directly: the question is whether mind is a subtle body or wholly incorporeal, so `toto genere diversa` cannot be used as an answer without begging the point."

- term: "unio / conjunctio / commixtio"
  handle: "term:gassendi-unio-conjunctio-commixtio"
  kind: concept_cluster
  preferred: null
  alternatives:
    - "union / conjunction / commixture"
    - "joining / quasi-mixture / confusion"
  status: open
  notes: "Part 089 makes this cluster explicit through Descartes' sailor-in-ship contrast. Gassendi accepts the reported phenomenon of close union and quasi-mixture as the point to be explained, then asks how conjunction, mixture, composition, or confusion can occur without parts and without some proportion between corporeal and incorporeal. Part 090 gives Descartes' answer: mind-body union and body-body mixture are `toto genere diversa`, so no comparison should be established between them. Part 091 answers that this is not a solution but the disputed question repeated; if the cases are wholly different, Descartes still owes an account of what quasi-mixture on the side of mind means."

- term: "sensus doloris / fames / sitis"
  handle: "term:gassendi-sensus-doloris-fames-sitis"
  kind: concept_cluster
  preferred: null
  alternatives:
    - "sense of pain / hunger / thirst"
    - "pain, hunger, and thirst"
  status: open
  notes: "Part 089 treats pain, hunger, and thirst as Descartes' own evidence for mind-body union. Gassendi then turns pain into a structural test: pain seems to involve disruption of parts, break in continuity, alteration, and differentiated reception from bodily parts such as foot and arm."

- term: "voces / significatus"
  handle: "term:gassendi-voces-significatus"
  kind: concept_pair
  preferred: null
  alternatives:
    - "words / meanings"
    - "words / significations"
  status: open
  notes: "Part 013 makes divine ideas socially and linguistically mediated. Before Descartes reasons from his idea of God, he has already received words and their meanings from others, through which notions or ideas were formed in the mind."

- term: "imago in phantasia / imago in mente"
  handle: "term:gassendi-imago-phantasia-mente"
  kind: concept_pair
  preferred: null
  alternatives:
    - "image in phantasy / image in mind"
    - "phantasy-image / mental image"
  status: open
  notes: "Part 009 says Descartes avoids the real issue by saying `idea` extends to everything thought rather than to images painted in the mind. For Gassendi, every object of thought still stands before the mind under some image, at least a mental one."

- term: "agere in seipsum"
  handle: "term:gassendi-agere-in-seipsum"
  kind: problem
  preferred: null
  alternatives:
    - "act on itself"
    - "self-action"
  status: open
  notes: "Parts 008-009 deny that a faculty or body acts on itself strictly. Action and passion require distinct termini; the mirror and spinning-top examples are treated as part-to-part or agent-patient relations, not genuine self-action."

- term: "idea infiniti / incomprehensibilitas"
  handle: "term:gassendi-idea-infiniti-incomprehensibilitas"
  kind: concept_pair
  preferred: null
  alternatives:
    - "idea of the infinite / incomprehensibility"
  status: open
  notes: "Part 010 sharpens the dispute over whether a true idea of the infinite must comprehend the infinite. Gassendi says a finite grasp gives only a finite or partial idea; Descartes replies that incomprehensibility belongs to the formal notion of the infinite. Part 013 adds the cave/mountain analogy: `infinite` signifies the limit we have not found or penetrated, not a positive comprehension of the whole. Part 015 accepts Descartes' incomprehensibility premise but denies that a human idea can therefore represent the whole infinite. Part 031 turns Descartes' non-comprehending `touch` of divine perfections into renewed evidence that the mind has only partial and finite cognition, not a true idea of infinite being. Part 034 adds the ocean/drop scale: even divine attributes are known finitely, analogically, confusedly, obscurely, and in a riddle."

- term: "comprehensio / repraesentatio"
  handle: "term:gassendi-comprehensio-repraesentatio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "comprehension / representation"
  status: open
  notes: "Part 015 makes this the hinge of the reply to Descartes. Gassendi says Descartes shifts from comprehension on the side of the intellect to representation on the side of the idea, but the truth of the idea cannot be secured if what it represents is not comprehended. Part 031 sharpens the same hinge: what is only touched by thought is not comprehended as a whole and cannot ground the represented infinity or defectlessness of God."

- term: "attingere cogitatione"
  handle: "term:gassendi-attingere-cogitatione"
  kind: method
  preferred: "touch by thought"
  alternatives:
    - "reach by thought"
    - "attain by thought"
  status: open
  notes: "Part 031 uses Descartes' concession that divine perfections are not comprehended but only touched by thought. Gassendi turns this into partial cognition: what is only touched is not known as a whole and therefore is not known as infinite."

- term: "totum infinitum"
  handle: "term:gassendi-totum-infinitum"
  kind: problem
  preferred: "whole infinite"
  alternatives:
    - "the whole infinite"
  status: open
  notes: "Part 015 treats `totum infinitum` as unstable in a human idea. To represent the whole is to leave nothing hidden; to leave nothing hidden is to comprehend; but Descartes says the comprehended cannot be infinite. Part 031 restates the problem from the side of enumeration: a finite number of partially known perfections cannot amount to the whole infinite. Part 036 says pronouncing a negative name is not thinking a whole positive infinite being; even the finite world with all its parts and properties exceeds any promised complete thought."

- term: "infiniti mundi"
  handle: "term:gassendi-infiniti-mundi"
  kind: analogy
  preferred: "infinite worlds"
  alternatives:
    - "infinitely many worlds"
  status: open
  notes: "Part 010 uses ancient ideas of infinite worlds, an infinite universe, and infinite principles as a reductive parallel to Descartes' idea of infinite substance. If amplification proves God, Gassendi argues, it would also prove infinite worlds. Part 014 restates the objection as a formal parody syllogism and says Descartes closed his eyes to its consequence. Part 016 uses the same case to distinguish what is actual in an idea from what is actual in reality."

- term: "defectus / comparatio"
  handle: "term:gassendi-defectus-comparatio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "defect / comparison"
    - "lack / comparison"
  status: open
  notes: "Part 016 treats awareness of defect as a comparison operation, not as direct evidence of infinite perfection. Defects can be recognized by comparison with the universe as whole or with other finite persons and parts. Part 017 says Descartes' move from more-perfect to infinite skips intermediate finite degrees. Part 032 returns defect as the premise for divine non-deception: fraud and deception imply defect, but defectlessness has not yet been demonstrated from the idea of God."

- term: "fallacia / deceptio"
  handle: "term:gassendi-fallacia-deceptio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "fraud / deception"
    - "deceit / deception"
  status: open
  notes: "Part 032 isolates Descartes' conclusion that God cannot be deceptive. Gassendi treats the conclusion as strategically stored for later use, because the defectlessness premise has not yet been demonstrated. Part 072 shifts sensory fallacy away from passive sense and into judgment or mind, while still allowing that deception sometimes occurs. Part 073 refuses the slide from sometimes deceived to always deceived, and treats dream, deceiving-God, and malicious-Genius arguments as insufficient against corrected sensory evidence. Part 093 summarizes Descartes' final use of divine non-deception to secure such matters and records Gassendi's passing approval before the following `Instantia` reopens the point. Part 094 reopens it by reconstructing waking certainty as depending only now on the prior proof that God exists and is not deceptive."

- term: "sensus / judicium"
  handle: "term:gassendi-sensus-judicium"
  kind: concept_pair
  preferred: null
  alternatives:
    - "sense / judgment"
    - "sensation / judgment"
  status: open
  notes: "Part 072 introduces the Sixth Meditation sensory-truth dispute by separating passive sense from judgment. Sense reports appearances as they appear from their causes; falsity belongs to judgment or mind when it fails to handle distance, conditions, or other causes circumspectly. Part 073 tests the distinction through corrected tower evidence: nearness, touch, measured faces, and counted angles can remove the cause of distant error. Part 093 summarizes the later Cartesian reassurance: in matters concerning bodily convenience, the senses indicate truth much more often than falsehood."

- term: "praejudicium / verisimilitudo"
  handle: "term:gassendi-praejudicium-verisimilitudo"
  kind: concept_pair
  preferred: null
  alternatives:
    - "prejudice / probability"
    - "prejudice / truthlikeness"
  status: open
  notes: "Part 073 gives Gassendi's methodological self-description. In natural matters he tries to shed prejudices without leaping into new ones; since he does not claim to extract truth itself, he follows what appears truthlike or more truthlike while remaining ready to abandon any probability for a stronger one."

- term: "actu in idea / actu in re"
  handle: "term:gassendi-actu-idea-re"
  kind: concept_pair
  preferred: null
  alternatives:
    - "actual in the idea / actual in the thing"
    - "actual in idea / actual in reality"
  status: open
  notes: "Part 016 separates what is actual in an idea from what is actual in the represented thing. The architect's house and the philosophers' infinite worlds can be actual in thought without actually existing. Part 017 extends this against objective being: actual representation does not license actual existence unless the causal premise has already been proved."

- term: "vera idea"
  handle: "term:gassendi-vera-idea"
  kind: concept
  preferred: "true idea"
  alternatives:
    - "genuine idea"
    - "adequate idea"
  status: open
  notes: "Part 017 splits `vera idea` into two senses: a genuine and adequate idea representing God as he is, and a limited representation of something true that may be affirmed according to our measure. Gassendi says Descartes answers in the weaker sense while the dispute concerns the stronger one."

- term: "metabasis eis allo genos"
  handle: "term:gassendi-metabasis"
  kind: fallacy
  preferred: "transition to another genus"
  alternatives:
    - "change to another genus"
  status: open
  notes: "Part 017 uses the Greek logical charge for Descartes' move from `more perfect than me` to `infinite being`. The term marks an illicit leap across intermediate finite degrees."

- term: "diallelus / circulus"
  handle: "term:gassendi-diallelus-circulus"
  kind: problem
  preferred: null
  alternatives:
    - "diallelus / circle"
    - "Cartesian circle"
  status: open
  notes: "Part 011 explicitly accuses Descartes' proof of circularity: clear and distinct perception is used to prove God, while God's existence and veracity are needed to guarantee clear and distinct perception. Part 014 catches the same structure inside the sub-assumption when clear and distinct perception is assumed before its truth has been secured. Part 017 restates a circle in objective-being terms: actual infinite being is proved from representation as actual, while representation as actual is grounded in actual existence. Part 041 gives the Meditation IV form: clear and distinct cognition is assumed as true to prove God, although its non-fallaciousness is to be secured only later by God as non-deceptive author. Part 054 restates the circle syllogistically and adds the criterion problem: even if genuine clarity is God-authored, apparent clarity still has to be distinguished from genuine clarity."

- term: "paralogismus"
  handle: "term:gassendi-paralogismus"
  kind: problem
  preferred: "paralogism"
  alternatives:
    - "fallacious inference"
  status: open
  notes: "Part 014 names Descartes' infinite-substance inference a `paralogismus`. The error begins when the negative word `infinitum` is treated as positive comprehension and when the same inference is not allowed to the ancient philosophers' infinite universe, worlds, and principles. Parts 021-022 extend the paralogism charge to the temporal conservation argument, where an obscure nature of time is made to carry a heterogeneous deduction. Part 076 applies the charge to the mind-body proof: separate concepts do not by themselves entail real separation. Part 082 exposes the paralogism by parody: the same form can be used to prove that mind is not incorporeal."

- term: "demonstratio / authoritas"
  handle: "term:gassendi-demonstratio-authoritas"
  kind: concept_pair
  preferred: null
  alternatives:
    - "demonstration / authority"
  status: open
  notes: "Part 011 distinguishes public demonstration from private authority. A proof based on Descartes' report about his own idea may persuade by personal authority, but does not have the force of a general demonstration. Part 076 repeats the structure for divine possibility: if Descartes' own distinct perception is the rule, the reasons may demonstrate something to Descartes but not to others. Part 078 makes the methodological standard explicit: legitimate method addresses another person by exposing principles simply, not by turning the author's self-persuasion into authority. Part 088 gives the mind-body version: Descartes' clear idea of himself as thinking and non-extended is recast as a private fixed principle that all mortals are then supposed to accept as a principle of demonstration. Part 091 makes the review rule explicit: doubts against conclusions remain objections against reasons, and answering by restating the question or one's authority is not satisfaction. Part 097 closes the campaign by separating truth of conclusions from demonstrative force: Gassendi says the dispute concerns the energy of the reasoning Descartes calls demonstration, not the truth of God or soul-immortality."

- term: "substantia / accidens"
  handle: "term:gassendi-substantia-accidens"
  kind: concept_pair
  preferred: null
  alternatives:
    - "substance / accident"
  status: open
  notes: "Dubitatio IV denies that substance has a proper idea. It is conceived through accidents, or after their manner, as something extended, figured, and colored. Part 033 turns this into a general account of distinct ideas: inner essence or substance remains hidden, while accidents, properties, effects, and circumstances are what the mind distinctly represents. Part 077 allows, for argument, mind considered as substance or even per-se existing substance, but says that precision still does not determine whether it is corporeal or incorporeal. Part 079 records Descartes' complete-entity restriction: real distinction applies to complete entities, not to properties such as the geometrical predicates of a triangle."

- term: "praecisio"
  handle: "term:gassendi-praecisio"
  kind: operation
  preferred: "precision"
  alternatives:
    - "precise consideration"
    - "abstraction under one aspect"
  status: open
  notes: "Part 077 makes `praecisio` the hinge of the subtle-body reply. To consider a human being precisely as rational does not prove he is not animal; likewise, to consider mind precisely as thinking thing or substance does not prove that it is not subtle body or that it is incorporeal. Part 082 turns precision into a parity argument: mind can be precisely understood without corporeality or without incorporeality, so precision alone cannot establish either exclusion."

- term: "punctum physicum / punctum mathematicum"
  handle: "term:gassendi-punctum-physicum-mathematicum"
  kind: concept_pair
  preferred: null
  alternatives:
    - "physical point / mathematical point"
  status: open
  notes: "Part 083 uses the distinction to test whether an unextended mind could be located in a brain-point. A physical point remains extended and partite; a mathematical point exists only in imagination and cannot receive bodily nerves, spirits, directions, or contact. Part 088 repeats the location problem as an unresolved union question: whole body, whole brain, sensible brain part, physical point, or mathematical point. Part 089 makes the point-pressure affective: if mind is no larger than a point, or even more indivisible than a point, Gassendi asks how it can be joined to a whole body or altered by pain. Part 092 extends the pressure to representation: a species that represents parts and extension must be at least more extended than a mathematical point."

- term: "distinctio formalis / distinctio realis"
  handle: "term:gassendi-distinctio-formalis-realis"
  kind: concept_pair
  preferred: null
  alternatives:
    - "formal distinction / real distinction"
    - "modal distinction / real distinction"
  status: open
  notes: "Part 079 introduces Descartes' distinction between formal or modal distinction among incomplete entities and real distinction among complete entities. Gassendi stages this as the answer to his triangle-property counterexample and prepares to test whether the mind-body proof assumes the complete-entity status it must prove. Part 080 presses that charge directly: Descartes uses real distinction or complete-substance status as the middle term in a proof meant to establish it. Part 081 applies the formal-distinction examples to same-subject cases: motion and figure in one rolling globe, divine justice and mercy in one God, and triangle properties in one triangle do not license a move to real distinction."

- term: "cognitio adaequata / inadaequata"
  handle: "term:gassendi-cognitio-adaequata-inadaequata"
  kind: concept_pair
  preferred: null
  alternatives:
    - "adequate cognition / inadequate cognition"
  status: open
  notes: "Part 080 attacks Descartes' attempt to avoid requiring adequate cognition for real distinction. If adequate cognition contains all properties in the known thing, Gassendi says only God has it, or we know it only by revelation; all human cognition abstracts and remains inadequate. Part 081 puts the point to work locally: a complete or adequate notion of the disputed subtle body would have to include the thinking that may be in it, and a complete notion of mind would have to include the extension that may be in it. Part 087 returns to the same standard through instrument and access examples: lack of a witness, telescope, or doorkeeper does not prove that God placed nothing more in a thing than what we know."

- term: "idea rei / accidentia"
  handle: "term:gassendi-idea-rei-accidentia"
  kind: concept_pair
  preferred: null
  alternatives:
    - "idea of a thing / accidents"
    - "thing idea / accidental representation"
  status: open
  notes: "Part 033 says ideas are of things only insofar as they are known. Since we distinctly know accidents, properties, effects, and circumstances rather than inner essence, a distinct idea represents accidents while essence is only confusedly suspected beneath them."

- term: "idea / essentia"
  handle: "term:gassendi-idea-essentia"
  kind: concept_pair
  preferred: null
  alternatives:
    - "idea / essence"
    - "thing as known / thing in itself"
  status: open
  notes: "Part 034 makes this the direct charge against Descartes: he has not distinguished the idea from the essence, or a thing's being in itself from its being known by someone."

- term: "idea mensura notitiae"
  handle: "term:gassendi-idea-mensura-notitiae"
  kind: principle
  preferred: "idea as measure of knowledge"
  alternatives:
    - "idea measures knowledge, not the thing"
  status: open
  notes: "Part 035 states the rule directly: `idea mensura est non rei, sed notitiae, quae habetur de re`. This blocks the inference from what is in God or in the thing itself to what is already represented in the idea."

- term: "supersubstantia"
  handle: "term:gassendi-supersubstantia"
  kind: concept
  preferred: "super-substance"
  alternatives:
    - "beyond-substance"
  status: open
  notes: "Part 013 uses `supersubstantia` to mark the apophatic pressure on divine substance. God is not substance in the ordinary sense, does not stand under accidents, and exceeds whatever we understand by substance."

- term: "infinitum"
  handle: "term:gassendi-infinitum"
  kind: concept
  preferred: "infinite"
  alternatives:
    - "unbounded"
  status: open
  notes: "In Part 003 Gassendi says the human intellect is not capable of conceiving infinity; `infinite` names a thing beyond grasp with a name not understood by a bounded intellect. Part 013 makes the word negative and reflexive: after advancing as far as we can and failing to recognize an end, we return to ourselves and call the thing infinite. Part 014 says this negative word deceives Descartes when he treats it as positive amplitude."

- term: "intellectio / imaginatio"
  handle: "term:gassendi-intellectio-imaginatio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "intellection / imagination"
    - "understanding / imagination"
  status: open
  notes: "Part 004 makes this the explicit dispute. Descartes says Gassendi confuses intellection with imagination; Gassendi demands a criterion and argues that if ideas in the intellect are images, intellect cannot understand bodies or substance without imagining. Part 068 reopens the dispute in Meditation VI: Gassendi treats intellection and imagination as one cognitive power varying by degrees of distinctness, exertion, confusion, and slackening, and argues that even ideas of immaterial things are corporeal or quasi-corporeal. Part 069 gives Descartes' answer: the chiliagon can be clearly understood without being wholly imagined, because intellection and imagination are two modes of operation, not degrees of one operation. Part 070 answers by demanding a definition of distinct perception and by reducing clear chiliagon-understanding to clarity of the name unless the figure's parts can be grasped one by one. Part 071 attacks the unproved premise that mind can understand by turning to itself or to non-corporeal ideas without imagination intervening. Part 084 states the distinction in its species form: pure intellection needs no corporeal species, while imagination needs an extended bodily species to which mind applies itself. Part 085 says the criterion remains missing: when the same paper is both imagined and understood, Gassendi sees no supplied mark by which the species before intellect differs from the species before imagination. Part 090 uses the distinction defensively: Descartes says Gassendi's doubts arise from calling things that do not fall under imagination back before imagination's examination. Part 091 rejects that defense unless intellection yields clear knowledge of what mind is; if it only says there is something beyond what is imagined, the distinction gives words rather than satisfaction."

- term: "abstractio / deductio"
  handle: "term:gassendi-abstractio-deductio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "abstraction / deduction"
  status: open
  notes: "Part 004 allows that substance is conceived by intellect through abstraction and deduction from consequence, but denies that this yields a proper clear idea. Part 081 gives abstraction a concrete role in the mind-body proof: the general notion of body contains only what is common to bodies, while complete notions of special bodies include specific differences; Descartes therefore argues illicitly from abstracts to concretes."

- term: "notitia Dei"
  handle: "term:gassendi-notitia-dei"
  kind: concept
  preferred: "knowledge of God"
  alternatives:
    - "notion of God"
  status: open
  notes: "Part 005 distinguishes knowledge of God by revelation, by faith, and by natural light. This lets Gassendi preserve divine origin while denying innateness. Part 013 routes the idea of God through words, meanings, parents, teachers, priests, society, stars, and the ordered universe before it can be treated as an inner idea. Part 039 adds negative evidence from reports of people and nations without knowledge or suspicion of God, and treats later instruction as compatible with adventitious acquisition. Part 043 gives corporeal images a positive role: visible perfections can serve as occasions and steps for ascent toward divine perfections, even though taking such images literally would misrepresent God."

- term: "potentia Dei"
  handle: "term:gassendi-potentia-dei"
  kind: concept
  preferred: "power of God"
  alternatives:
    - "divine power"
  status: open
  notes: "Part 076 opens pressure on Descartes' appeal to divine power in the separability proof. Gassendi says the scope of God's power has not been demonstrated, and if divine possibility is measured by Descartes' own distinct perception, the proof becomes private assurance rather than public demonstration. Part 078 splits the appeal: absolute power belongs to supernatural theology rather than natural demonstration, while ordinary power adds nothing beyond the natural separability or inseparability of the things."

- term: "modulus"
  handle: "term:gassendi-modulus"
  kind: concept
  preferred: null
  alternatives:
    - "measure"
    - "small measure"
    - "limited measure"
  status: open
  notes: "Part 005 accepts Descartes' distinction between adequate concept and understanding proportioned to our measure, but Gassendi says he recognizes nothing except such measure, not even for a mite, much less for infinite being."

- term: "ampliatio"
  handle: "term:gassendi-ampliatio"
  kind: process
  preferred: "enlargement"
  alternatives:
    - "amplification"
    - "dilation"
  status: open
  notes: "Recurring from the sun passage into Part 005. Enlargement of finite ideas or perfections yields greater dilation and usually greater confusion; it does not by itself add objective reality or prove innateness. Part 014 gives the positive operation more detail: created perfections are stripped of imperfections and finitude, then promoted toward infinity without the mind attaining true infinite magnitude, duration, knowledge, power, or happiness. Part 018 adds composite ideals such as Pandora, the perfect republic, and the perfect orator. Part 019 shows Descartes accepting amplification but treating the power to amplify beyond the human as evidence of divine making. Part 027 rejects the hidden principle that whatever the mind understands and conceives by amplification exists in reality. Part 029 gives Descartes' counter: the idea of God is not formed successively from amplified creaturely perfections but grasped all at once as infinite being incapable of amplification. Part 036 answers that this all-at-once claim either conflicts with divine impression or simply begs the disputed point."

- term: "conservatio / creatio"
  handle: "term:gassendi-conservatio-creatio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "conservation / creation"
    - "preservation / creation"
  status: open
  notes: "Part 018 rejects Descartes' claim that conservation differs from creation only by reason. Gassendi separates a thing's first production from its later persistence and says not every persisting thing is newly created at each moment. Part 019 gives Descartes' counter: creatures need continuous first-cause influx to be conserved. Part 020 presses the unintelligibility of continued production: what is made must not be, but what is supposedly made continuously is found continuously to be. Part 023 challenges the claim that conservation uses the same force and action as new creation and rejects the move from Scholastic/supernatural doctrine to natural-light manifestness."

- term: "causa secundum fieri / causa secundum esse"
  handle: "term:gassendi-causa-fieri-esse"
  kind: concept_pair
  preferred: null
  alternatives:
    - "cause according to becoming / cause according to being"
    - "cause in becoming / cause in being"
  status: open
  notes: "Part 019 makes Descartes' Scholastic distinction explicit. Architect and father are causes `secundum fieri`; God is cause of creatures both `secundum fieri` and `secundum esse`, hence must continuously conserve them. Part 020 treats this as Scholastic renaming of Gassendi's prior two cause-effect types and asks for the missing demonstration that God is first creator before he can be assigned as conserving cause in being. Part 025 reopens parents as producing causes and insists that Descartes has not shown why thinking parent-minds with the idea of God cannot satisfy the causal maxim."

- term: "regressus in infinitum"
  handle: "term:gassendi-regressus-in-infinitum"
  kind: problem
  preferred: "infinite regress"
  alternatives:
    - "progression to infinity"
  status: open
  notes: "Part 018 allows an infinite regress in generated causes such as parentage unless Descartes first proves that the world began. The regress is absurd only in subordinated causes where the lower cannot act without a present higher mover. Part 019 responds by classing the relevant causes as causes in being, not parent-like causes in becoming. Part 026 clarifies Gassendi's reply: the disputed series is accidentally subordinated causes in becoming, where descendants can act after ancestors are gone, not essentially subordinated causes in being."

- term: "nativa mentis vis"
  handle: "term:gassendi-nativa-mentis-vis"
  kind: process
  preferred: "native force of the mind"
  alternatives:
    - "mind's native power"
  status: open
  notes: "Part 014 gives a compact formula for idea-formation: things perceived by sight or hearing are thought by the mind and by its native force compared, joined, and amplified. This is a positive Gassendi alternative to innate objective reality, though still dependent on received materials. Part 060 applies the same structure to geometry: intellect composes, divides, subtracts, deduces, and otherwise handles ideas once drawn from singular things."

- term: "idem numero / individuum"
  handle: "term:gassendi-idem-numero-individuum"
  kind: concept_pair
  preferred: null
  alternatives:
    - "numerically the same / individual"
    - "same in number / individual"
  status: open
  notes: "Part 020 makes numerical identity the pressure against Descartes' sunlight analogy. The sun produces continually new light, like a river supplies new water; this does not explain conservation of one and the same individual thing, especially a partless mind."

- term: "influxus"
  handle: "term:gassendi-influxus"
  kind: process
  preferred: "influx"
  alternatives:
    - "continuous influx"
  status: open
  notes: "Part 019 uses Descartes' continuous first-cause influx for conservation. Part 020 clarifies that Gassendi does not deny sound metaphysical or theological claims about first-cause influx, only Descartes' inference from that doctrine. Part 024 states the exact disputed thesis: whether things are preserved by continuous divine influx such that, when the influx is withdrawn, they cannot be preserved but cease to be."

- term: "tempus / duratio"
  handle: "term:gassendi-tempus-duratio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "time / duration"
    - "common duration"
  status: open
  notes: "Part 021 attacks Descartes' appeal to the nature of time as clear by natural light. Gassendi calls time obscure, gives only a tentative account of it as an invariant common flux or duration, and denies that motion's speed changes time itself."

- term: "momenta temporis"
  handle: "term:gassendi-momenta-temporis"
  kind: problem
  preferred: null
  alternatives:
    - "moments of time"
    - "parts of time"
  status: open
  notes: "Part 021 rejects the move from a thing's power to cease at any common moment to private separable moments belonging to that thing. Co-enduring things share one duration; their possible ceasing does not multiply time into internal time-parts. Part 022 says Descartes takes the power of ceasing at moments for the moments of time themselves and thereby confuses the enduring thing with duration."

- term: "petitio principii"
  handle: "term:gassendi-petitio-principii"
  kind: problem
  preferred: "begging the question"
  alternatives:
    - "assuming the principle"
  status: open
  notes: "Part 022 names a petitio principii in the time-conservation proof. To say the mind is created again or as if created assumes prior creation by God, God as creator, and God's existence, while the argument is supposed to prove those very claims. Part 061 applies the same charge to the essence/existence proof: listing existence among God's perfections in order to conclude that God exists assumes the contested conclusion as a principle. Part 064 locates the root paralogism in the transition from what belongs to a thing's nature in the idea to what belongs to the thing outside intellect. Part 065 compresses the charge: Descartes assumes existence in order to prove existence."

- term: "status idealis / status realis"
  handle: "term:gassendi-status-idealis-realis"
  kind: concept_pair
  preferred: null
  alternatives:
    - "ideal state / real state"
    - "state in idea / state in reality"
  status: open
  notes: "Part 064 names the difference between remaining in the idea-state and going out into the real-state. In the ideal state, golden mountain and rational animal both carry true immutable predicates within their ideas; the difference appears only in the real state, where experience becomes the criterion. Part 065 applies the distinction to divine nature: existence in the idea of God is not existence in God in himself. Part 082 redeploys the distinction against the mind-body proof: moving from what is cut off in thought to what is really separated repeats the illicit passage from ideal state to real state."

- term: "syllogistica forma"
  handle: "term:gassendi-syllogistica-forma"
  kind: method
  preferred: "syllogistic form"
  alternatives:
    - "syllogistic reconstruction"
  status: open
  notes: "Part 030 begins Gassendi's Instantia after Dubitatio X by recasting Descartes' closing meditation into syllogistic form. The method exposes whether Descartes has supplied a genuine inference or merely repeated the assertion to be proved. Part 031 uses the form to isolate the third argument from having the idea of God to God's existence, then tests the content of that idea."

- term: "creatio ex nihilo / praejacens materia"
  handle: "term:gassendi-creatio-ex-nihilo-praejacens-materia"
  kind: concept_pair
  preferred: null
  alternatives:
    - "creation from nothing / preexisting matter"
    - "creation ex nihilo / preexistent matter"
  status: open
  notes: "Part 023 says Descartes has not proved that the first cause's action is creation from nothing rather than production from eternally preexisting matter or simple administration of an eternal world."

- term: "lumen naturale / lumen supernaturale"
  handle: "term:gassendi-lumen-naturale-supernaturale"
  kind: concept_pair
  preferred: null
  alternatives:
    - "natural light / supernatural light"
  status: open
  notes: "Part 023 attacks Descartes' claim that conservation's difference from creation by reason alone is manifest by natural light. Gassendi says Scholastics refer creation and conservation chiefly to supernatural light, while philosophers using natural light denied creation from nothing. Part 032 records a less directly contested natural-light premise, that fraud and deception depend on defect, but Gassendi denies that Descartes has the demonstrated defectlessness needed to use it."

- term: "negatio concursus / actio positiva"
  handle: "term:gassendi-negatio-concursus-actio-positiva"
  kind: concept_pair
  preferred: null
  alternatives:
    - "negation of concurrence / positive action"
    - "withdrawal of concurrence / positive action"
  status: open
  notes: "Part 024 asks why it would count as an imperfection if God destroyed something not only by withdrawing concurrence but also by positive action. The bull example tests whether mediated divine concurrence in destruction differs from immediate divine positive action."

- term: "parentes / mens parentum"
  handle: "term:gassendi-parentes-mens-parentum"
  kind: concept_pair
  preferred: null
  alternatives:
    - "parents / minds of parents"
    - "parental producing causes"
  status: open
  notes: "Part 025 returns to parents as obvious producing causes. Gassendi argues that if Descartes appeals to the mind as thinking and having the idea of God, the parents or their minds were also thinking things with the idea of God, unless Descartes denies their minds, thought, God-idea, or sufficient objective reality."

- term: "nota artificis"
  handle: "term:gassendi-nota-artificis"
  kind: image_model
  preferred: "artisan's mark"
  alternatives:
    - "mark of the artisan"
    - "maker's mark"
  status: open
  notes: "Part 028 takes up Descartes' claim that the idea of God is like an artisan's mark impressed on the work. Gassendi presses the analogy for mechanism: what is the mark's form, how is it impressed, and how is it distinguished if it is not distinct from the work itself? Part 029 answers through Apelles: inimitable artistry can function as a maker's mark without being a separate mark-shape. Part 037 separates a workmanship-mark from an image-mark: a painting may reveal Apelles' skill without representing Apelles' person."

- term: "imago / similitudo Dei"
  handle: "term:gassendi-imago-similitudo-dei"
  kind: concept_pair
  preferred: null
  alternatives:
    - "image / likeness of God"
  status: open
  notes: "Part 028 distinguishes religious credibility from natural proof. Gassendi says divine likeness is credible by faith, but natural reason cannot infer likeness from creation unless God is made human-shaped; likeness follows from generation through communication of nature, not from created workmanship. Part 029 gives Descartes' reply: an image need imitate only in some respects, and imperfect human thinking can represent perfect divine thinking. Part 037 sharpens Gassendi's distinction: the disputed mark must be an image or likeness, not merely a sign of the maker's expertise. Part 038 grants image-of-God by faith but requires, for natural demonstration, enough conformity for God to be recognized through the image."

- term: "prototypum / ectypum"
  handle: "term:gassendi-prototypum-ectypum"
  kind: concept_pair
  preferred: null
  alternatives:
    - "prototype / copy"
    - "prototype / image"
  status: open
  notes: "Part 038 introduces prototype/copy conformity to clarify image-likeness. An image need not share all inner perfections, but it must reciprocally conform enough for the prototype to be recognized and distinguished."

- term: "essentiae rerum indivisibiles"
  handle: "term:gassendi-essentiae-rerum-indivisibiles"
  kind: concept
  preferred: "indivisible essences"
  alternatives:
    - "essences of things are indivisible"
  status: open
  notes: "Part 029 introduces Descartes' reply that an idea represents a thing's essence, and if anything is added or subtracted it becomes the idea of another thing. Newly noticed divine perfections make the idea clearer, not larger. Part 033 answers that if essence and idea are indivisible, one known attribute would already contain the whole; if not, essence has a breadth of attributes and the idea admits additions. Part 034 rejects point-like indivisibility for divine essence and treats indivisibility instead as an inseparable nexus of essential attributes."

- term: "essentia / existentia"
  handle: "term:gassendi-essentia-existentia"
  kind: concept_pair
  preferred: null
  alternatives:
    - "essence / existence"
  status: open
  notes: "Part 056 challenges the Scholastic distinction when used to make essences eternal apart from God. If essence is the chief thing in things, then God's production of existence risks becoming only the addition of a garment; Gassendi instead presses essences back toward singular things and intellect's abstraction. Part 057 gives Descartes' reply: immutable essences are not existing things independent of God, but they are eternal because God willed and disposed them so. Part 059 answers by dilemma: if natures are unproduced, they are independent of God; if produced, they pass from non-being to being, become effects, terminate in existence, and cannot serve as non-existing eternal natures. Part 061 reopens the pair in the ontological proof: essence and existence can be separated in thought for God as for Plato or triangle, and pairing God's existence with the triangle's angle-property is an illicit comparison. Part 062 gives Descartes' answer: God is his own being, unlike triangle, so divine essence and existence cannot be thought apart in the same way."

- term: "existentia / perfectio"
  handle: "term:gassendi-existentia-perfectio"
  kind: concept_pair
  preferred: null
  alternatives:
    - "existence / perfection"
    - "existence as condition of perfections"
  status: open
  notes: "Part 061 denies that existence is a perfection in God or in any other thing. Existence is that without which neither a thing nor its perfections are; if a thing lacks existence, it is not so much imperfect as nothing. Part 062 replies by distinguishing possible existence as a perfection in the idea of triangle from necessary existence as a perfection in the idea of God. Part 063 restates the objection under property-language: a property can be removed while a subject remains, but removed existence leaves nothing to call imperfect or deprived. Part 065 closes the attack by saying Descartes counts existence among perfections and then uses existence to prove existence."

- term: "proprietas / attributum"
  handle: "term:gassendi-proprietas-attributum"
  kind: concept_pair
  preferred: null
  alternatives:
    - "property / attribute"
    - "physical property / logical attribute"
  status: open
  notes: "Part 063 distinguishes `proprietas` as physical and independent of intellectual operation from `attributum` as logical and dependent on the intellect that attributes or predicates. Every property can become an attribute, but not every attribute is a property; this lets Gassendi reject Descartes' broad property-language for existence."

- term: "veritates mathematicae"
  handle: "term:gassendi-veritates-mathematicae"
  kind: concept
  preferred: "mathematical truths"
  alternatives:
    - "geometrical truths"
  status: open
  notes: "Part 057 records Descartes' defense that mathematical truths and essences are not independent of God, but are immutable and eternal because God so willed and disposed them. Their nonconformity to atomist or Gassendist physical nature is only an extrinsic denomination unless one rejects geometry wholesale. Part 059 prepares Gassendi's answer by restating Descartes' argument as a syllogism: ideas of non-sensed figures with demonstrable properties are supposed to prove immutable, eternal, non-abstracted natures."

- term: "universale / singulare"
  handle: "term:gassendi-universale-singulare"
  kind: concept_pair
  preferred: null
  alternatives:
    - "universal / singular"
    - "common nature / singular nature"
  status: open
  notes: "Part 056 says nothing in Plato is universal, only singular. Universal human nature is a common concept abstracted by intellect from similar singular natures such as Plato and Socrates; it cannot be explained as universal before singulars existed and before intellect abstracted. Part 059 makes the positive route explicit: universal natures depend on God through the singulars from which they are formed and through the God-authored intellect whose consideration makes them universal."

- term: "possibilitas / actus"
  handle: "term:gassendi-possibilitas-actus"
  kind: concept_pair
  preferred: null
  alternatives:
    - "possibility / act"
    - "possible / actual"
  status: open
  notes: "Part 059 denies present reality or truth to uncreated, non-existing possibles. If a nature is produced, it passes from possibility to act and becomes an effect terminating in existence; if it remains merely possible, any reality or truth attributed to it must be understood as future, not presently possessed."

- term: "idea trianguli"
  handle: "term:gassendi-idea-trianguli"
  kind: analogy
  preferred: "idea of a triangle"
  alternatives:
    - "triangle analogy"
  status: open
  notes: "Part 029 uses the triangle analogy for Descartes' defense of innate idea-content: a shared idea can have properties not yet noticed by everyone, and noticing them does not increase the idea's essence. Part 036 blocks the analogy until Descartes can show that divine essence and all essential attributes are as explored and ready-to-hand as the three lines constituting a triangle. Part 039 rejects the analogy again because disagreement about God concerns basic nature, not merely unnoticed properties. Part 056 moves the triangle into abstraction: the mental or ideal triangle is a rule for judging material triangles, formed by intellect from seen material figures, not a real nature outside intellect from which material triangles borrow their properties. Part 057 gives Descartes' answer: a painted triangle is only an occasion for recognizing the prior idea of the true triangle, since sensed lines are never truly straight under scrutiny. Part 060 answers that the geometrical triangle comes through instruction, Euclid, study, or reasoning from sensed figures while abstracting from width and depth; the paper triangle does not contain the indivisible triangle as rough wood contains Mercury."

- term: "facultas cognoscendarum rerum"
  handle: "term:gassendi-facultas-cognoscendarum-rerum"
  kind: concept
  preferred: "faculty for knowing things"
  alternatives:
    - "cognitive power for things"
    - "innate knowing faculty"
  status: open
  notes: "Part 060 reduces talk of innate ideas to an innate faculty or cognitive power for knowing things. Alleged innate ideas do no explanatory work unless attending to them yields cognition; real cognition begins with things outside intellect, seen or described singulars, and later generalization."

- term: "subordinatio accidentaria / essentialis"
  handle: "term:gassendi-subordinatio-accidentaria-essentialis"
  kind: concept_pair
  preferred: null
  alternatives:
    - "accidental subordination / essential subordination"
    - "accidentally subordinated causes / essentially subordinated causes"
  status: open
  notes: "Part 026 uses the distinction to defend parentage against Descartes' regress reply. Essential subordination applies where the lower cannot act without the higher; accidental subordination applies to generative sequences such as father, grandfather, and descendants, where later causes can act after prior causes are gone."

- term: "facultas judicandi"
  handle: "term:gassendi-facultas-judicandi"
  kind: concept
  preferred: "faculty of judgment"
  alternatives:
    - "judging faculty"
  status: open
  notes: "Part 040 opens the Fourth Meditation exchange by asking why a God-created finite faculty of judgment had to be liable to error. Gassendi's alternative is not an infinite human faculty but a finite faculty that assents only where it clearly knows and withholds judgment otherwise. Part 044 sharpens the point: the issue is not why the faculty is not greater or infinite, but why it is errant, unequal, entangled, and uncertain in the few matters God wants humans to judge. Part 045 states the distinction as defect versus smallness: the question is why a finite faculty was not made perfect in its own kind."

- term: "imperfectio positiva / negatio majoris perfectionis"
  handle: "term:gassendi-imperfectio-positiva-negatio-majoris-perfectionis"
  kind: concept_pair
  preferred: null
  alternatives:
    - "positive imperfection / negation of greater perfection"
    - "positive defect / lack of greater perfection"
  status: open
  notes: "Part 044 records Descartes' response that liability to error is not a positive imperfection but only, especially with respect to God, a negation of greater perfection in creatures. Gassendi's `Dubitatio II` presses the opposite side by treating error-liability as a real defect in the judging faculty considered in its own office, not mere smallness within the universe. Part 045 attacks the category shift directly: imperfection as imperfection is privative, but that does not make an erring power perfect qua erring; wickedness and error can be called privative in parallel."

- term: "concursus Dei"
  handle: "term:gassendi-concursus-dei"
  kind: concept
  preferred: "divine concurrence"
  alternatives:
    - "God's concurrence"
    - "concurrence of God"
  status: open
  notes: "Part 044 records Descartes' distinction: God concurs with the act of erring insofar as every act depending on God is true and good, but not with the privation in which falsity and fault formally consist. Gassendi answers that God still concurs with the act without which the privation would not be, and authored the fallible power itself."

- term: "voluntas / intellectus"
  handle: "term:gassendi-voluntas-intellectus"
  kind: concept_pair
  preferred: null
  alternatives:
    - "will / intellect"
    - "will / understanding"
  status: open
  notes: "Part 046 opens the will/intellect dispute over error. Gassendi temporarily accepts Descartes' vocabulary but denies that will or judgment extends beyond intellect: will judges nothing not first presented by intellect, and intellect may even range more widely through obscure apprehensions left unjudged. Descartes replies that will reaches into cases where we judge more than we understand. Part 047 withdraws the concession and restores the common cognitive/appetitive split: cognition belongs to intellect, appetite to will. Part 048 applies the distinction to Descartes' examples: if will means judging intellect, it cannot outrun simple apprehension; if it means appetite, it cannot will error as error. Part 049 roots will's flexibility in intellect's flexibility: appetite changes only when the apprehended good changes, just as judgment changes only when the apprehended truth changes. Part 050 answers Descartes' non-perseverance argument by assigning the corrective move to intellect again, now through a reflexive judgment that first notions should be examined."

- term: "simplex apprehensio / judicium / ratiocinatio"
  handle: "term:gassendi-simplex-apprehensio-judicium-ratiocinatio"
  kind: concept_sequence
  preferred: null
  alternatives:
    - "simple apprehension / judgment / reasoning"
    - "apprehension / enunciation / ratiocination"
  status: open
  notes: "Part 047 gives Gassendi's three intellectual operations: simple apprehension without affirmation or negation; judgment or enunciation, affirming or denying; and reasoning or illative judgment, inferring one thing from another. This sequence lets him place judgment and reasoning under intellect rather than will."

- term: "potentia caeca"
  handle: "term:gassendi-potentia-caeca"
  kind: image_model
  preferred: "blind power"
  alternatives:
    - "blind faculty"
    - "blind will"
  status: open
  notes: "Part 047 calls will a blind power: it tends toward nothing and flees nothing unless intellect carries the torch. The formula supports Gassendi's claim that willing, avoiding, commanding, and abstaining follow intellectual presentation and judgment."

- term: "esse in re / intelligi esse in re"
  handle: "term:gassendi-esse-in-re-intelligi-esse-in-re"
  kind: concept_pair
  preferred: null
  alternatives:
    - "being in the thing / being understood as in the thing"
    - "to be in the thing / to be understood to be in the thing"
  status: open
  notes: "Part 048 distinguishes the truth-maker side of judgment from the cognition side. Whether something is or is not in the thing belongs to the truth or falsity of judgment; that it is understood as being in the thing belongs to making a judgment at all. False judgment is not understanding what is not understood, but understanding something as in the thing when it is not in the thing."

- term: "falsitas / conformitas"
  handle: "term:gassendi-falsitas-conformitas"
  kind: concept_pair
  preferred: null
  alternatives:
    - "falsity / conformity"
    - "privation of conformity"
  status: open
  notes: "Part 051 locates falsity properly in intellect and especially in judgment as a lack or privation of conformity between judgment and thing. Outside intellect, things are transcendentally true as what they are; a thing is called false only by extrinsic denomination, as orichalcum is called false gold when intellect takes its yellow species for gold."

- term: "indifferentia voluntatis"
  handle: "term:gassendi-indifferentia-voluntatis"
  kind: concept
  preferred: "indifference of the will"
  alternatives:
    - "will's indifference"
  status: open
  notes: "Part 046 tests whether the will can determine itself where intellect supplies no stronger reason. Gassendi treats indifference as suspension until greater likelihood appears; mere knowledge that conjectures are conjectures can produce hesitation, not contrary assent. Descartes answers that indifference is known by inner experience, and that avoiding perseverance in error already shows will can move without intellectual determination. Part 049 accepts indifference in will but denies independent self-determination: will's indifference follows intellect's presentation of apparent goods and better-seeming goods."

- term: "indifferentia / libertas / libentia"
  handle: "term:gassendi-indifferentia-libertas-libentia"
  kind: concept_cluster
  preferred: null
  alternatives:
    - "indifference / freedom / willing gladness"
    - "indifference / liberty / libentia"
  status: open
  notes: "Part 049 separates `indifferentia` from `libertas`: indifference is wider than freedom and can belong to a board, water, the sun, and intellect, while freedom belongs properly to will. The blessed will's necessary adherence to the supreme good is not coercion but fullest consent, which Gassendi says is better called `libentia` or supreme `libentia` than freedom in the indifferent sense."

- term: "causae finales / causae efficientes"
  handle: "term:gassendi-causae-finales-efficientes"
  kind: concept_pair
  preferred: null
  alternatives:
    - "final causes / efficient causes"
    - "ends / efficient causes"
  status: open
  notes: "Part 040 contests Descartes' rejection of final causes in physics. Gassendi treats visible use, anatomical fittedness, and especially the valves of the heart as natural-light evidence for divine wisdom, providence, power, and existence. Descartes replies that whatever Gassendi adduces for final causes must be referred to efficient causes in physics, while conjecture about divine ends belongs, at most, to ethics. Part 042 turns this into a distinction: if final-cause praise is referred to the maker, Gassendi agrees; if final causes are dismissed from physics, the route to efficient cause is lost. Final order is the step by which the world's maker is recognized."

- term: "idea nihili / idea negativa"
  handle: "term:gassendi-idea-nihili-negativa"
  kind: concept_pair
  preferred: null
  alternatives:
    - "idea of nothing / negative idea"
    - "idea of non-being / negative idea"
  status: open
  notes: "Part 040 introduces the pressure around Descartes' account of error through participation in nothingness. Gassendi says the idea of nothing and participation in non-being remain unexplained; Descartes answers that the idea is negative and signifies only that we are not the supreme being and lack many things. Part 041 sharpens the pressure: an idea without an object is an image of no thing, and participation in non-being seems to divide the self into something and nothing."

- term: "clara et distincta notitia"
  handle: "term:gassendi-clara-distincta-notitia"
  kind: concept
  preferred: "clear and distinct cognition"
  alternatives:
    - "clear and distinct knowledge"
    - "clear and distinct perception"
  status: open
  notes: "Part 041 isolates the circular burden on clear and distinct cognition. Descartes has not yet proved that it is non-fallacious, because that proof depends on God as non-deceptive author; nevertheless he assumes it as true in order to prove God and God's authorship of the cognition itself. This gathers earlier circle-pressure from Parts 011, 014, and 017 under the Meditation IV vocabulary. Part 052 shifts the pressure from the truth of clear and distinct cognition to the method for recognizing when cognition is genuinely clear and distinct rather than only apparently so. Part 054 sharpens the counterfeit case: many think they have clear and distinct cognition and are deceived, so the name alone cannot serve as its own mark. Part 066 shifts the issue to memory and science: Descartes says remembered clear and distinct demonstrations require knowledge of a non-deceptive God, while Gassendi treats geometry as self-compelling. Part 067 reuses the `ego cogito; igitur exsisto` as a prior clear and distinct foundation on which Descartes built the God proof, not a certainty later grounded by it. Part 070 turns distinctness into a part-by-part criterion: a universal or lumped grasp of the chiliagon is not distinct unless Descartes can define distinct perception otherwise and apply it to the figure. Part 074 adds that separate clear and distinct conception does not by itself license real separability: triangle properties can be conceived apart without being separated in reality. Part 075 gives Descartes' countercharge that Gassendi confuses the question of what can be understood with the question of what really is. Part 076 presses the public-rule problem: if divine possibility is ruled by Descartes' own distinct perception, clear and distinct cognition is private assurance rather than demonstration for others. Part 078 recasts the proof as a syllogism whose force still depends on the move from distinct concepts to real distinction. Part 079 frames the next criterion problem: clear-and-distinct separability works only if the things are already complete entities rather than merely formally distinct properties. Part 080 adds that finite clear and distinct cognition cannot rule out an unknown indivisible nexus unless it becomes exhaustive or divinely revealed cognition. Part 081 adds the species-level objection: clear and distinct understanding of thought without extension and extension without thought is incomplete if the question concerns those features in the same disputed subject. Part 082 shows the separability rule is reversible: an opponent can use the same clear-and-distinct form to prove mind is not incorporeal. Part 083 says clear distinctness cannot be supplied by a negation: to know that mind is not extended is not yet to know positively what mind is. Part 084 records Descartes' reply that non-extension was not meant to define mind positively, and that aspectual clear cognition, as in the blind man's sun as heating, can still be legitimate. Part 086 rejects that aspectual move: clear cognition of a thing under one predicate, such as heating or thinking, need not be clear cognition of the thing's nature. Part 087 adds that absence of a superior human witness or instrument does not make aspectual cognition exhaustive. Part 088 reconstructs the separability proof as resting on Descartes' own clear and distinct idea treated as a fixed private principle, again pressing the gap between self-certainty and public demonstration. Part 091 says the imagination/intellection distinction would matter little if either route yielded clear and distinct cognition; the problem is that Descartes' intellection only points beyond imagination without clearly showing what mind is."

- term: "certitudo / scientia vera"
  handle: "term:gassendi-certitudo-scientia-vera"
  kind: concept_pair
  preferred: null
  alternatives:
    - "certainty / true science"
    - "certainty and truth of science"
  status: open
  notes: "Part 066 introduces Descartes' claim that no certainty or true science can be had without cognition of the true God. Gassendi answers that geometrical demonstrations compel assent by themselves and do not appear to borrow certainty from the theological proof. Part 067 states the stronger rule: natural certainty depends on evidence, so mathematical certainty does not depend on divine certainty. Part 094 gives the Sixth Meditation version: certainty that one is awake rather than dreaming appears to arrive only after the preceding chain has established that God exists and is not deceptive."

- term: "apparentia / hypothesis"
  handle: "term:gassendi-apparentia-hypothesis"
  kind: concept_pair
  preferred: null
  alternatives:
    - "appearances / hypotheses"
    - "apparent things / hypotheses"
  status: open
  notes: "Part 067 distinguishes skeptical acceptance of apparent and life-useful things from skeptical attack on hypotheses. In astronomy, hypotheses may preserve appearances without being natural mechanisms; in geometry, demonstrated results count as apparent while indivisible points, lines, and surfaces remain hypothetically vulnerable. Part 072 adds the sensory version: even where external truth is disputed, it remains true that things appear as they appear."

- term: "methodus discernendi"
  handle: "term:gassendi-methodus-discernendi"
  kind: method
  preferred: "method of discernment"
  alternatives:
    - "art or method"
    - "method for distinguishing clear perception"
  status: open
  notes: "Part 052 names the still-desired method: not the rule that one should attend to what is clearly and distinctly understood, but the art by which genuine clear and distinct understanding is distinguished from what merely seems clear and distinct. Part 053 presses Descartes to identify where and when this method was actually delivered, treating the Fourth Meditation formula as a possible epitome to be tested. Part 054 makes the method necessary even after granting God as author, because subjects can mistake merely apparent clarity for genuine clarity. Part 055 extends the demand to exhaustive survey and method rules: the needed method must show that nothing has been omitted and that each rule has been satisfied."

- term: "regulae methodi"
  handle: "term:gassendi-regulae-methodi"
  kind: method
  preferred: "rules of method"
  alternatives:
    - "four method rules"
    - "rules from the Discourse on Method"
  status: open
  notes: "Part 055 tests Descartes' four rules: admit only clear and distinct cognition, divide difficulties, proceed from simpler and better known things to composites, and enumerate completely. Gassendi's objection is meta-methodological: none of the rules says how to recognize that clarity, division, ordering, or enumeration has been achieved sufficiently."

- term: "usus / finis"
  handle: "term:gassendi-usus-finis"
  kind: concept_pair
  preferred: null
  alternatives:
    - "use / end"
    - "function / end"
  status: open
  notes: "Part 042 identifies `usus` and `finis` in the final-cause argument. To admire God from the use of parts is already to admire him as author of the end; the bridge analogy shows ordered use turning a structure into evidence of an artisan, intention, design, and power."

- term: "causa prima / causa secunda"
  handle: "term:gassendi-causa-prima-secunda"
  kind: concept_pair
  preferred: null
  alternatives:
    - "first cause / secondary cause"
    - "universal cause / particular cause"
    - "remote cause / proximate cause"
  status: open
  notes: "Part 042 distinguishes naming God as first and universal cause from identifying the secondary, particular, singular, and proximate natural cause. Gassendi says the former is pious and generic; the latter is the real labor of physics, and philosophers usually fall back to probability or silence when asked for it."

- term: "imagines corporeae"
  handle: "term:gassendi-imagines-corporeae"
  kind: image_model
  preferred: "corporeal images"
  alternatives:
    - "images of corporeal things"
    - "bodily images"
  status: open
  notes: "Part 043 denies Descartes' claim that senses and corporeal images do not help at all in perceiving the ideas of God and mind. Corporeal images can mislead if taken literally as representations of God, but they also serve as occasions and quasi-steps by which the mind ascends from visible perfections to divine perfections."
