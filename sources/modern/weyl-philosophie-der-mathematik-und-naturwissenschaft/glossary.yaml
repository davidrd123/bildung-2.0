  preferred: "theory of the continuum"
  alternatives:
    - "doctrine of the continuum"
  status: seed
  notes: "Contrasted with number theory: the object of continuum theory is the possible sets or infinite sequences of natural numbers."
  evidence:
    - "parts/008-math-02-07-das-irrationale-und-das-unendlichkleine.md"

- term: "Unendlichkleines"
