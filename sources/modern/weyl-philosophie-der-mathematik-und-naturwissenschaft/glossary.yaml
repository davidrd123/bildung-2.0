- term: "finitistisch"
  kind: term
  preferred: "finitistic"
  alternatives:
    - "finitary"
  status: seed
  notes: "The strict evidence level Hilbert wanted for consistency proofs. Weyl treats Gentzen's proof as ingenious but not finitistic in Hilbert's sense, because it relies on induction reaching into Cantor's second number class."
  evidence:
    - "parts/025-appendix-a-struktur-der-mathematik.md"

- term: "Diagonalverfahren"
  kind: concept
  preferred: "diagonal procedure"
  alternatives:
    - "diagonal argument"
    - "diagonal method"
  status: open
  notes: "The Cantorian construction that forms a new sequence by differing from each member of an alleged enumeration at the corresponding place. Appendix A follows its transformation through Richard's paradox into Gödel's controlled arithmetical self-reference."
