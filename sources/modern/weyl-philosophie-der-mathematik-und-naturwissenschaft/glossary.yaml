- term: "Wahrscheinlichkeit"
  kind: concept
  preferred: "probability"
  alternatives: []
  status: open
  notes: "Probability begins as subjective expectation and calculation of chances, then becomes objective through Bernoulli, statistical physics, entropy, and quantum mechanics. Appendix C states the final pressure directly: primary probability is a fundamental property of nature, not observer ignorance."
  evidence:
    - "parts/024-science-03-23-kausalitaet-gesetz-zufall-freiheit.md"
    - "parts/027-appendix-c-quantenphysik-und-kausalitaet.md"

- term: "Wahrscheinlichkeitsurteil"
  kind: concept
  preferred: "probability judgment"
  alternatives:
    - "probabilistic judgment"
  status: seed
  notes: "The site where the arrow of time enters: reversible elementary laws do not distinguish past and future, but probability judgments choose a direction under the causal orientation that the earlier is the given ground of the later."
  evidence:
    - "parts/024-science-03-23-kausalitaet-gesetz-zufall-freiheit.md"

- term: "Einsinnigkeit der Zeit"
  kind: concept
  preferred: "one-directionality of time"
  alternatives:
    - "unidirectionality of time"
    - "arrow of time"
  status: open
  notes: "Weyl's section title. Entropy explains it only after probability judgments impose a privileged direction; Appendix C confirms that the future direction of spontaneous emission is rooted in thermodynamic-statistical principles, not elementary laws."
  evidence:
    - "parts/024-science-03-23-kausalitaet-gesetz-zufall-freiheit.md"
    - "parts/027-appendix-c-quantenphysik-und-kausalitaet.md"

- term: "Schöpfung"
  kind: concept
  preferred: "creation"
  alternatives: []
  status: open
  notes: "In section 23 this is not a theological conclusion but a structural name for the improbable past required by forward-directed probability judgment. Keep the theological resonance visible without over-reading it."
  evidence:
    - "parts/024-science-03-23-kausalitaet-gesetz-zufall-freiheit.md"

- term: "Freiheit"
  kind: concept
  preferred: "freedom"
  alternatives: []
  status: open
  notes: "Freedom is not arbitrary law-breaking or merely internal natural causation. Weyl locates it where being is open to sense in the I, while denying that living beings simply violate exact physical laws. Appendix E adds that quantum mutation and few-photon perception open a door but do not suffice; vital, psychic, and spiritual factors would need symbolic representation inside a theory of reality."
  evidence:
    - "parts/024-science-03-23-kausalitaet-gesetz-zufall-freiheit.md"
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "Zweckmäßigkeit"
  kind: concept
  preferred: "purposiveness"
  alternatives:
    - "teleological fitness"
    - "purposefulness"
  status: open
  notes: "A problem-setting category for organisms. Weyl rejects dismissing it as human projection but also refuses to treat it as a completed explanation; Darwinian and biological explanation must first recognize the purposive structures it tries to explain."
  evidence:
    - "parts/024-science-03-23-kausalitaet-gesetz-zufall-freiheit.md"

- term: "Ganzheit"
  kind: concept
  preferred: "wholeness"
  alternatives:
    - "whole"
  status: open
  notes: "The biological and psychological replacement for older purposiveness in Schelling, Driesch, and holism. Weyl grants its problem-setting force while rejecting a principled block on theoretical-symbolic construction. Appendix E makes this explicit: living wholeness must be recognized phenomenologically, but biology still proceeds from physics and chemistry toward complex organization rather than from holism downward."
  evidence:
    - "parts/024-science-03-23-kausalitaet-gesetz-zufall-freiheit.md"
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "Gesetze spezifischer Komplikation"
  kind: concept
  preferred: "laws of specific complication"
  alternatives: []
  status: seed
  notes: "Weyl's M. Hartmann-backed phrase for biological laws: biology is not applied physics or chemistry, but its autonomy is law-like and methodological rather than anti-scientific."
  evidence:
    - "parts/024-science-03-23-kausalitaet-gesetz-zufall-freiheit.md"

- term: "Doppelstellung des Ich"
  kind: concept
  preferred: "double position of the I"
  alternatives:
    - "dual position of the I"
  status: open
  notes: "The real boundary in section 23. The I is both an existent individual performing real psychic acts and `Gesicht`, meaning-giving consciousness or vision open to reason."
  evidence:
    - "parts/024-science-03-23-kausalitaet-gesetz-zufall-freiheit.md"

- term: "Beweistheorie"
  kind: concept
  preferred: "proof theory"
  alternatives:
    - "Hilbertian proof theory"
  status: open
  notes: "Hilbert's program for treating mathematics as a formal proof game whose consistency could be secured by finitistic metamathematics. Appendix A marks Gödel's theorems as the collapse of the hope that proof theory could settle the foundations once and for all."
