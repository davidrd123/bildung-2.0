- term: "Arithmetisierung"
  kind: concept
  preferred: "arithmetization"
  alternatives:
    - "arithmetization of syntax"
  status: open
  notes: "Gödel's encoding of symbols, formulas, and deductions as natural numbers. Weyl draws the philosophical consequence that the natural numbers are wide enough to map any fully formalized theory."
  evidence:
    - "parts/025-appendix-a-struktur-der-mathematik.md"

- term: "Charakteristik"
  kind: concept
  preferred: "characteristic number"
  alternatives:
    - "characteristic"
  status: seed
  notes: "The Gödel-numbering value assigned to a formula or proof tree by prime-power products. Preserve `characteristic number` to distinguish the technical code from ordinary character or property."
  evidence:
    - "parts/025-appendix-a-struktur-der-mathematik.md"

- term: "Lügnerparadoxon"
  kind: concept
  preferred: "liar paradox"
  alternatives:
    - "liar"
  status: seed
  notes: "Appendix A uses the ancient liar tradition to explain the shape of Gödelian self-reference, while stressing that Gödel replaces demonstrative semantic looseness with definite arithmetical numbers and functions."
  evidence:
    - "parts/025-appendix-a-struktur-der-mathematik.md"

- term: "Auswahlaxiom"
  kind: concept
  preferred: "selection axiom"
  alternatives:
    - "axiom of selection"
    - "axiom of choice"
  status: open
  notes: "In Weyl's Zermelo discussion this names the subset-carving principle that selects from a given set by a well-defined property. Keep a caution against collapsing every occurrence into the modern Axiom of Choice without checking context."
