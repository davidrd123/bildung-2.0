- term: "Individuation"
  kind: concept
  preferred: "individuation"
  alternatives: []
  status: open
  notes: "The problem of when two elements are merely alike and when they are numerically identical. Appendix B connects Leibniz's principle, the identity of the I, probability counting, quantum particles, and genetics through this pressure."
  evidence:
