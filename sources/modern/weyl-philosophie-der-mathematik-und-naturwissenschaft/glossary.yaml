  status: seed
  notes: "The paired genetic operations that map Weyl's aggregate combinatorics into heredity: syngamy unites gametes into a zygote, while meiosis divides a zygote into complementary gametes. Appendix F treats their combinatorial play as the modern genetic replacement for Darwin's continuous hereditary variation."
