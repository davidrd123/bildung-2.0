  preferred: "hierarchy of structures"
  alternatives:
    - "structural hierarchy"
  status: open
  notes: "Appendix D's alpha-beta-gamma hierarchy: quantum mechanics at `α`, binary invariant manifolds at `β`, and valence diagrams at `γ`. History descends from diagrams toward foundations; explanation rises from foundations to diagrams."
