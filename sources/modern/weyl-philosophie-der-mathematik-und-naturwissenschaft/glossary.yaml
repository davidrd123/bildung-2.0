  notes: "Weyl's classification of set-theoretic foundation: it fails to become conscious of the passage from the given to the transcendent."
  evidence:
    - "parts/012-math-02-11-ueber-das-wesen-der-mathematischen-erkenntnis.md"

- term: "Idealismus"
  kind: concept
  preferred: "idealism"
  alternatives: []
  status: open
  notes: "Weyl's classification of Brouwer's position: the reduction of all truth to what is given in intuition. Section 17 gives idealism a methodological role inside natural science: the objective world-picture may admit no difference that cannot in principle break open into possible perceptual difference."
  evidence:
    - "parts/012-math-02-11-ueber-das-wesen-der-mathematischen-erkenntnis.md"
    - "parts/018-science-01-17-subjekt-und-objekt.md"

- term: "axiomatischer Formalismus"
  kind: concept
  preferred: "axiomatic formalism"
  alternatives: []
  status: open
  notes: "Weyl's classification of Hilbert's position: consciousness tries to leave the material of the given behind and represent the transcendent, but only in symbol."
  evidence:
    - "parts/012-math-02-11-ueber-das-wesen-der-mathematischen-erkenntnis.md"

- term: "theoretisches Bedürfnis"
  kind: concept
  preferred: "theoretical need"
  alternatives:
    - "theoretical drive"
  status: open
  notes: "A need pressing toward totality that is unintelligible from a merely phenomenal standpoint. Weyl affirms it while insisting that it must be satisfied in symbol rather than mystical direct sight."
  evidence:
    - "parts/012-math-02-11-ueber-das-wesen-der-mathematischen-erkenntnis.md"

- term: "Lichtkreis unserer schauenden Einsicht"
  kind: phrase
  preferred: "circle of light of our intuitive insight"
  alternatives:
    - "light-circle of our seeing insight"
  status: open
  notes: "Weyl's warning against the mystical error that the transcendent could fall within direct intuitive insight. The phrase anchors his symbolic discipline."
  evidence:
    - "parts/012-math-02-11-ueber-das-wesen-der-mathematischen-erkenntnis.md"

- term: "Wissenschaft vom Unendlichen"
  kind: concept
  preferred: "science of the infinite"
  alternatives:
    - "science of infinity"
  status: open
  notes: "The closing formula for mathematics in chapter II. It names the finite-infinite tension as mathematics' living center and as the Greek achievement made fruitful for theoretical knowledge."
  evidence:
    - "parts/012-math-02-11-ueber-das-wesen-der-mathematischen-erkenntnis.md"

- term: "Raum"
  kind: concept
  preferred: "space"
  alternatives: []
  status: open
  notes: "Chapter III opens by naming the problem of space as the place where mathematics, natural science, and philosophy most intimately interpenetrate. Section 12 immediately complicates naive space by moving through non-Euclidean, projective, affine, and color-space geometries."
  evidence:
    - "parts/013-math-03-12-projektive-geometrie-farbraum.md"

- term: "nicht-euklidische Geometrie"
  kind: concept
  preferred: "non-Euclidean geometry"
  alternatives: []
  status: seed
  notes: "Section 12 treats non-Euclidean geometry through the three Klein cases and presents elliptic geometry by modifying congruence and incorporating points at infinity."
  evidence:
    - "parts/013-math-03-12-projektive-geometrie-farbraum.md"

- term: "projektive Geometrie"
  kind: concept
  preferred: "projective geometry"
  alternatives: []
  status: open
  notes: "The organizing geometry for section 12. Weyl presents metric geometries as arising by building a Cayleyan determination of measure into measure-free projective space, then extends projective geometry to color qualities."
  evidence:
    - "parts/013-math-03-12-projektive-geometrie-farbraum.md"

- term: "Cayleysche Maßbestimmung"
  kind: concept
  preferred: "Cayleyan determination of measure"
  alternatives:
    - "Cayleyan metric determination"
  status: open
  notes: "The construction by which a metric geometry is built into measure-free projective space according to the character of the absolute conic section. Keep open because the standard mathematical phrasing may want harmonization."
  evidence:
    - "parts/013-math-03-12-projektive-geometrie-farbraum.md"

- term: "analytische Geometrie"
  kind: concept
  preferred: "analytic geometry"
  alternatives: []
  status: seed
  notes: "Weyl defines it by reducing every geometrical problem to an algebraic one, made possible by the enlarged number concept and Descartes' subjection of the science of space to algebraic calculus."
  evidence:
    - "parts/013-math-03-12-projektive-geometrie-farbraum.md"

- term: "Vektorbegriff"
  kind: concept
  preferred: "concept of vector"
  alternatives:
    - "vector concept"
  status: open
  notes: "Section 12 uses vectors as translations or parallel displacements of space. This is the bridge from number and group composition into affine geometry and linear algebra."
  evidence:
    - "parts/013-math-03-12-projektive-geometrie-farbraum.md"

- term: "affine Geometrie"
  kind: concept
  preferred: "affine geometry"
  alternatives: []
  status: seed
  notes: "The geometry obtained through points, vectors, vector addition, scalar multiplication, and point-vector application; Weyl stresses that only parallel segments can be measured against one another in this setting."
  evidence:
    - "parts/013-math-03-12-projektive-geometrie-farbraum.md"

- term: "Operationsfeld der linearen Algebra"
  kind: concept
  preferred: "field of operations of linear algebra"
  alternatives:
    - "operational field of linear algebra"
  status: open
  notes: "Weyl says the axioms for point/vector operations fix nothing other than this field. The phrase marks geometry's formal transparency after the real-number continuum has already been presupposed."
  evidence:
    - "parts/013-math-03-12-projektive-geometrie-farbraum.md"

- term: "Dimensionsbegriff"
  kind: concept
  preferred: "concept of dimension"
  alternatives: []
  status: open
  notes: "Section 12 says dimension appears only after the formal vector/affine construction. Formalization makes n-dimensional geometry compulsory and thereby turns actual three-dimensionality into a problem rather than an immediate given."
  evidence:
    - "parts/013-math-03-12-projektive-geometrie-farbraum.md"

- term: "Farbraum"
  kind: concept
  preferred: "color space"
  alternatives:
    - "colour space"
  status: open
  notes: "Section 12's decisive non-spatial geometry example. Color qualities form a two-dimensional projective continuum even though objective physical colors have infinitely many dimensions."
  evidence:
    - "parts/013-math-03-12-projektive-geometrie-farbraum.md"

- term: "Farbqualitäten"
  kind: concept
  preferred: "color qualities"
  alternatives:
    - "colour qualities"
  status: open
  notes: "The elements of the intuitive color continuum. Weyl distinguishes them from intensity-bearing colors, whose intensities behave like vectors under mixing."
  evidence:
    - "parts/013-math-03-12-projektive-geometrie-farbraum.md"

- term: "anschauliche Gegebenheiten"
  kind: concept
  preferred: "intuitive givens"
  alternatives:
    - "intuitively given contents"
    - "intuitive data"
  status: open
  notes: "The color-space passage shows that geometrical treatment can apply to a region of intuitive givens other than space. This keeps `anschaulich` tied to givenness without reducing it to visuality alone."
  evidence:
    - "parts/013-math-03-12-projektive-geometrie-farbraum.md"

- term: "Relativitätsproblem"
  kind: concept
  preferred: "relativity problem"
  alternatives:
    - "problem of relativity"
  status: open
  notes: "Section 13 uses the term before the physics discussion in the narrow Einsteinian sense. The problem is how to formulate objectivity by varying away contingent and individually exhibited factors and retaining invariant relations."
  evidence:
    - "parts/014-math-03-13-relativitaetsproblem.md"

- term: "Objektivität"
  kind: concept
  preferred: "objectivity"
  alternatives: []
  status: open
  notes: "Section 13 begins with objectivity as a norm of knowledge and makes it experience-dependent: an assertion earns objective significance only if omitted contingent factors can be freely varied without changing its truth. Mathematically, this becomes invariance under the relevant automorphism group. Section 14 applies the same pressure to congruence/similarity: Δ-equivalence is objective exactly when Δ is invariant under Γ. Section 17 adds that objectivity is necessarily relative to symbolic representation and coordinate choice; the invariant relation, not coordinate absoluteness, carries objective force."
  evidence:
    - "parts/014-math-03-13-relativitaetsproblem.md"
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"
    - "parts/018-science-01-17-subjekt-und-objekt.md"

- term: "Zufallsfaktor"
  kind: concept
  preferred: "contingent factor"
  alternatives:
    - "accidental factor"
  status: open
  notes: "Not a stochastic random variable here. Weyl's examples are the gravitational field and an individually indicated point P: factors omitted from an elliptical statement only when their variation does not affect truth."
  evidence:
    - "parts/014-math-03-13-relativitaetsproblem.md"

- term: "Automorphismus"
  kind: concept
  preferred: "automorphism"
  alternatives: []
  status: seed
  notes: "A one-to-one mapping of a point-field onto itself that leaves the basic relations undisturbed. Section 13 makes automorphisms the exact tool for defining objective equality, similarity, and objective relations. Section 14 splits geometrical automorphisms from physical automorphisms: geometry takes the normalizer, while physics is constrained to the orthogonal group Δ."
  evidence:
    - "parts/014-math-03-13-relativitaetsproblem.md"
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"

- term: "Sachbereich"
  kind: concept
  preferred: "subject-domain"
  alternatives:
    - "object-domain"
    - "domain of things"
  status: open
  notes: "Weyl uses the term in section 13 for the domain whose axioms treat basic relations, before deciding what the things in that domain are. The point is methodological neutrality before the elements are called points."
  evidence:
    - "parts/014-math-03-13-relativitaetsproblem.md"

- term: "Punktfeld"
  kind: concept
  preferred: "point-field"
  alternatives:
    - "field of points"
  status: open
  notes: "The neutral field of elements called points for the purposes of the automorphism and transformation-group analysis. In a continuum, its points cannot be conceptually fixed one by one without a reference frame."
  evidence:
    - "parts/014-math-03-13-relativitaetsproblem.md"

- term: "Transformationsgruppe"
  kind: concept
  preferred: "transformation group"
  alternatives: []
  status: open
  notes: "Weyl's Klein/Erlangen criterion: a geometry is determined by a transformation group. The group states the degree of homogeneity of a point-field and defines which relations count as objective. Section 14 adds the normalizer as the way one group determines a wider group of similarities."
  evidence:
    - "parts/014-math-03-13-relativitaetsproblem.md"
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"

- term: "invariant"
  kind: concept
  preferred: "invariant"
  alternatives: []
  status: open
  notes: "The operative mathematical form of objectivity in section 13: a point-relation is objective when it is invariant with respect to all automorphisms of the relevant group. Section 14 uses invariant subgroups to make Δ-equivalence an objective relation under Γ."
  evidence:
    - "parts/014-math-03-13-relativitaetsproblem.md"
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"

- term: "Bezugsrahmen"
  kind: concept
  preferred: "reference frame"
  alternatives:
    - "frame"
  status: open
  notes: "The frame is necessary for assigning reproducible symbols to points in an infinite continuum. Weyl later allows the frame itself to be treated logically as the coordinate assignment p -> x = f(p)."
  evidence:
    - "parts/014-math-03-13-relativitaetsproblem.md"

- term: "Koordinatensystem"
  kind: concept
  preferred: "coordinate system"
  alternatives: []
  status: open
  notes: "In section 13 the coordinate system is the necessary residue of objectification: it enables conceptual fixation of continuum-points but must itself be exhibited by an individual demonstrative act. Section 17 makes it the objective analogue of the I: the coordinate system is the condition under which the symbolic objective world appears, but invariant theory prevents any one system from becoming metaphysically absolute."
  evidence:
    - "parts/014-math-03-13-relativitaetsproblem.md"
    - "parts/018-science-01-17-subjekt-und-objekt.md"

- term: "symbolische Konstruktion"
  kind: concept
  preferred: "symbolic construction"
  alternatives: []
  status: open
  notes: "Section 13 states that all knowledge, even when it begins from intuitive description, tends toward symbolic construction. Objectivity is satisfied by constructing a symbolic picture of the world and considering invariant relations in the symbol field. Section 17 shows the natural-scientific form: the objective world is constructed in symbols and then mapped back to possible givens of consciousness. Section 21 ties symbolic construction to experiment and theory-level correction rather than free formal invention."
  evidence:
    - "parts/011-math-02-10-symbolische-mathematik.md"
    - "parts/012-math-02-11-ueber-das-wesen-der-mathematischen-erkenntnis.md"
    - "parts/014-math-03-13-relativitaetsproblem.md"
    - "parts/018-science-01-17-subjekt-und-objekt.md"
    - "parts/022-science-02-21-theorienbildung.md"

- term: "Ich-Vernichtung"
  kind: concept
  preferred: "annihilation of the I"
  alternatives:
    - "I-destruction"
    - "elimination of the I"
  status: open
  notes: "Weyl's deliberately stark name for objectification by eliminating the I and its immediate intuitive life. Section 13 says this does not succeed without remainder: the coordinate system remains as residue."
  evidence:
    - "parts/014-math-03-13-relativitaetsproblem.md"

- term: "Topologie"
  kind: concept
  preferred: "topology"
  alternatives: []
  status: open
  notes: "Introduced in section 13 as the geometry corresponding to the most comprehensive automorphism group possible for a continuum: all continuous transformations. Section 15 puts the heavier load on combinatorial topology: topology frees geometry from differentiability by replacing global numerical coordinates with topological skeletons and can decide exact questions about vague continua."
  evidence:
    - "parts/014-math-03-13-relativitaetsproblem.md"
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "Kongruenz"
  kind: concept
  preferred: "congruence"
  alternatives: []
  status: seed
  notes: "Section 14 starts from rigid bodies and measurement: congruence is first a pointwise mapping between pieces of space occupied by the same rigid body in different positions, then is formalized by the Euclidean motion group Δ⁺."
  evidence:
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"

- term: "Ähnlichkeit"
  kind: concept
  preferred: "similarity"
  alternatives:
    - "resemblance"
  status: seed
  notes: "In section 14, similarity is not generic resemblance. It is governed by the automorphism group Γ, identified as the normalizer of the congruence/motion group Δ⁺."
  evidence:
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"

- term: "Normalisator"
  kind: concept
  preferred: "normalizer"
  alternatives: []
  status: seed
  notes: "Section 14's main group-theoretic device: the transformations commuting with Δ by conjugation form the normalizer. It explains why congruence implies similarity and when similarity exceeds congruence."
  evidence:
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"

- term: "invariante Untergruppe"
  kind: concept
  preferred: "invariant subgroup"
  alternatives:
    - "normal subgroup"
  status: open
  notes: "Weyl uses `invariante Untergruppe` for the subgroup condition under which Δ-equivalence has objective meaning relative to Γ. Keep the wording `invariant subgroup` for now because it is Weyl's local phrasing in the normalizer discussion."
  evidence:
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"

- term: "Starrheit"
  kind: concept
  preferred: "rigidity"
  alternatives:
    - "stiffness"
  status: seed
  notes: "Section 14 treats rigidity as physically approximate but geometrically norm-forming: geometry is abstracted from actual rigid bodies and then judges how well a body realizes the ideal."
  evidence:
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"

- term: "physikalische Automorphismen"
  kind: concept
  preferred: "physical automorphisms"
  alternatives: []
  status: open
  notes: "Section 14 identifies the physical automorphism group in space with the orthogonal group Δ, not the full geometrical normalizer Γ′. Atomism and absolute length block dilation as physical invariance. Section 15 then shows general relativity decomposing Δ into translations and rotations: translations become arbitrary coordinate transformations Ω, while rotations become point-dependent local Δ₀."
  evidence:
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "Sinn"
  kind: concept
  preferred: "sense"
  alternatives:
    - "orientation"
  status: open
  notes: "In the left/right paragraph, `Sinn` is the orientation-like sense of an ordered basis, determined by even permutations and reversed by odd permutations. Section 15 extends this from affine vector geometry to differentiable manifolds through the sign of the Jacobian. Keep `sense` visible in translation while noting the orientation pressure."
  evidence:
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "Vorzeichen"
  kind: concept
  preferred: "sign"
  alternatives: []
  status: seed
  notes: "Section 14 uses determinant sign to separate the two components of the orthogonal group and to tie left/right to orientation: positive sign preserves the sense, negative sign reverses it."
  evidence:
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"

- term: "Raumanschauung"
  kind: concept
  preferred: "intuition of space"
  alternatives:
    - "spatial intuition"
  status: open
  notes: "In the Kant passage, Weyl grants that congruence and similarity are grounded in Raumanschauung, but denies that this blocks their clarification by group-theoretic concepts."
  evidence:
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"

- term: "Dilatation"
  kind: concept
  preferred: "dilation"
  alternatives: []
  status: seed
  notes: "Section 14 uses dilations `xᵢ′ = axᵢ` to mark the divergence between geometrical automorphisms Γ′ and physical automorphisms Δ; this is the explicit anti-Cartesian point that physics cannot be reduced to geometry."
  evidence:
    - "parts/015-math-03-14-kongruenz-aehnlichkeit-links-rechts.md"

- term: "Mannigfaltigkeit"
  kind: concept
  preferred: "manifold"
  alternatives:
    - "multiplicity"
  status: seed
  notes: "Section 15 follows Riemann in defining an n-dimensional continuous manifold by local one-to-one continuous coordinate representation in n-dimensional number-space. `Multiplicity` would be too literal for the mathematical register here."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "differenzierbare Mannigfaltigkeit"
  kind: concept
  preferred: "differentiable manifold"
  alternatives: []
  status: seed
  notes: "Section 15 restricts Ω to differentiable coordinate transformations with nonzero Jacobian. Weyl says topology has mastered continuity, but the inner meaning of differentiability remains unclear and may someday be dispensed with by physics."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "Jacobische Determinante"
  kind: concept
  preferred: "Jacobian determinant"
  alternatives: []
  status: seed
  notes: "The nonzero determinant of the coordinate differential matrix. Its sign gives the signature of the transformation and lets a sense/orientation be fixed over a region. Section 16 adds the topological signature of coordinate transformations by this sign."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Maßfeld"
  kind: concept
  preferred: "metric field"
  alternatives:
    - "measure field"
  status: open
  notes: "Section 15 makes the Riemannian metric physical: its components gᵢₖ transform under coordinate changes, it acts on bodies/light/natural processes, and in Einstein's theory matter acts back on it. Section 16 identifies the metric field with the state of the ether/guiding field in reciprocal action with matter."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Nahewirkungsgesetze"
  kind: concept
  preferred: "laws of near-action"
  alternatives:
    - "laws of action by proximity"
    - "local action laws"
  status: open
  notes: "Weyl invokes Leibniz's continuity principle: true natural lawfulness links values of physical magnitudes only in immediately neighboring space-time points. This supports `Nahgeometrie` against `Ferngeometrie`."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "Nahgeometrie"
  kind: concept
  preferred: "near-geometry"
  alternatives:
    - "local geometry"
  status: open
  notes: "Contrasted with `Ferngeometrie`: the basic relations of geometry should refer to infinitely near neighboring points. `Local geometry` is idiomatic, but `near-geometry` preserves Weyl's explicit contrast."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "allgemeine Relativität"
  kind: concept
  preferred: "general relativity"
  alternatives: []
  status: seed
  notes: "Section 15 accepts the principle only after the metric field is incorporated among physical magnitudes that act on matter and receive reaction from matter. Section 16 recasts the world as a four-dimensional Riemannian space with indefinite metric form and a matter-coupled metric/guiding field."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "örtliches kartesisches Bezugssystem"
  kind: concept
  preferred: "local Cartesian reference frame"
  alternatives:
    - "local Cartesian frame"
  status: seed
  notes: "The point-dependent frame 𝔣(P) in the tangent vector space. It brings in Δ₀ and enables numerical representation of physical magnitudes in the Riemannian/general-relativistic setting."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "Δ₀"
  kind: concept
  preferred: "Δ₀"
  alternatives:
    - "group of Euclidean rotations"
  status: open
  notes: "The group of Euclidean rotations expressing the arbitrariness of the local Cartesian frame 𝔣(P). Weyl treats it as point-dependent in general relativity and as a possible abstract group with vector, tensor, and spinor representations. Section 16 says Δ₀ is replaced in space-time physics by the Lorentz group, with temporal and spatial signatures."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Darstellung"
  kind: concept
  preferred: "representation"
  alternatives:
    - "presentation"
  status: open
  notes: "In section 15, `Darstellung` has the group-representation sense: different physical magnitudes are characterized by different linear representations of Δ₀, including tensor and spinor representations."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "topologisches Gerüst"
  kind: concept
  preferred: "topological skeleton"
  alternatives:
    - "topological framework"
  status: seed
  notes: "The combinatorial schema of elementary pieces and their boundary/adjacency relations. It determines the large-scale connectedness relations of a manifold without reducing the manifold to global numerical coordinates."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "Zusammenhangsverhältnisse"
  kind: concept
  preferred: "connectedness relations"
  alternatives:
    - "connectivity relations"
  status: open
  notes: "The global relations determined by the topological skeleton. Weyl uses the term for what can differ in actual space once the Riemannian standpoint frees geometry from Euclidean topology."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "Vergewaltigung"
  kind: concept
  preferred: "forcible imposition"
  alternatives:
    - "violation"
    - "violence"
  status: open
  notes: "Weyl's strong term for imposing numerical coordinates from the special one-dimensional number continuum onto a general continuum. `Forcible imposition` preserves the pressure without overdramatizing in English."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "sinnlich-kategoriale Doppelantlitz"
  kind: concept
  preferred: "sensuous-categorial double face"
  alternatives:
    - "sensuous-categorial double aspect"
  status: open
  notes: "Section 15's closing philosophical diagnosis of geometry: it stands between Ideas and sensible things, with morphology, topology, and idealizing geometry marking the ascent."
  evidence:
    - "parts/016-math-03-15-riemann-standpoint-topology.md"

- term: "Raum-Zeit-Stelle"
  kind: concept
  preferred: "space-time position"
  alternatives:
    - "space-time place"
  status: seed
  notes: "Section 16 begins physics from possible space-time positions or `Weltpunkte`; only coincidence and immediate neighborhood are directly intuitively exhibitible before extra structure is imposed."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Weltpunkt"
  kind: concept
  preferred: "world-point"
  alternatives:
    - "world point"
  status: seed
  notes: "The point of the four-dimensional space-time continuum. Weyl uses world-points to define fibers, strata, light cones, and the split between active future and passive past."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Schichtung"
  kind: concept
  preferred: "stratification"
  alternatives:
    - "layering"
  status: open
  notes: "The old absolute-time structure: simultaneous world-points form three-dimensional strata transverse to same-place fibers. Section 16 replaces its naive simultaneity role with light-cone causal structure."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Faserung"
  kind: concept
  preferred: "fibration"
  alternatives:
    - "fibering"
  status: open
  notes: "The old absolute-space structure: same-place world-points form one-dimensional fibers. Newton's absolute program fixes the world's fibration metaphysically, then tries to recover its actual course from effects."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Maßstruktur"
  kind: concept
  preferred: "metric structure"
  alternatives:
    - "measure-structure"
  status: open
  notes: "In section 16, equality of time intervals and congruence of spatial figures become physically testable through clocks, rigid bodies, light signals, and force-free mass-points. This is the physical uptake of chapter III's geometry."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Relativität der Bewegung"
  kind: concept
  preferred: "relativity of motion"
  alternatives: []
  status: seed
  notes: "Weyl uses Aristotle, Descartes, Locke, Galileo, and Leibniz against absolute place. The Copernican system is then better because the laws simplify relative to the sun, not because absolute rest has been found."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Trägheitsstruktur"
  kind: concept
  preferred: "inertial structure"
  alternatives:
    - "inertia-structure"
  status: seed
  notes: "Newton dynamically distinguishes inertial motion from acceleration but cannot single out rest. Weyl keeps objective inertial structure while rejecting absolute space and later identifies it with the mutable guiding field."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Kausalstruktur"
  kind: concept
  preferred: "causal structure"
  alternatives: []
  status: seed
  notes: "The modern correction to simultaneity: light cones, not horizontal simultaneity strata, separate active future from passive past. Section 23 returns to this as a factual physical component of causality: relativity makes distant effects actually later than their causes and breaks Kant's third analogy of simultaneous community."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"
    - "parts/024-science-03-23-kausalitaet-gesetz-zufall-freiheit.md"

- term: "Lichtkegel"
  kind: concept
  preferred: "light cone"
  alternatives: []
  status: seed
  notes: "The cone determined by a light signal from a world-point O. It replaces the old simultaneity plane as the causal divider between active future and passive past."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "aktive Zukunft"
  kind: concept
  preferred: "active future"
  alternatives: []
  status: seed
  notes: "The region of world-points on which one's action at O can have influence. Its pairing with `passive Vergangenheit` prepares the next section's subject/object problem."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "passive Vergangenheit"
  kind: concept
  preferred: "passive past"
  alternatives: []
  status: seed
  notes: "The region of events that may have influenced the subject at O, whether bodily lived through or received by report. It is not simply all geometrical past under the old simultaneity picture."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Eigenzeit"
  kind: concept
  preferred: "proper time"
  alternatives:
    - "own-time"
  status: seed
  notes: "The time measured along a clock's worldline by a cyclic return to state Z under the causality principle. `Proper time` is the standard physical term; `own-time` would preserve the literal construction but is less useful here."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Führungsfeld"
  kind: concept
  preferred: "guiding field"
  alternatives:
    - "guidance field"
    - "directing field"
  status: open
  notes: "Weyl's preferred name for the unified inertial field whose changeability appears in gravitation. Do not reduce it to an ordinary force field; it replaces geometrical rigidity with a real field that acts on and is acted on by matter."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Lorentzgruppe"
  kind: concept
  preferred: "Lorentz group"
  alternatives: []
  status: seed
  notes: "The replacement for Δ₀ in space-time physics: homogeneous linear transformations preserving `−z₀² + z₁² + z₂² + z₃²`, with temporal and spatial signatures."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Äther"
  kind: concept
  preferred: "ether"
  alternatives:
    - "aether"
  status: open
  notes: "Weyl retains `Äther` for the guiding/metric field as an independent power in reciprocal action with matter, not as a mechanical medium of older ether theories. Section 22 reconstructs its history: substantial bearer of light/gravity, absolute space-medium of field states, abolished as substantial ether by special relativity, and then revived by general relativity as field/structural field."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"
    - "parts/023-science-03-22-die-materie.md"

- term: "kosmologischer Term"
  kind: concept
  preferred: "cosmological term"
  alternatives: []
  status: seed
  notes: "Einstein's static universe Uₐ requires a cosmological term introducing a universal distance constant `a` of world-radius magnitude."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "geschlossener und offener Raum"
  kind: concept
  preferred: "closed and open space"
  alternatives: []
  status: seed
  notes: "Section 16 insists this is a topological, not merely metric, distinction. Under dimension reduction, Uₐ has two separate rims while U∞ has one connected rim."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "ewige Wiederkunft"
  kind: concept
  preferred: "eternal recurrence"
  alternatives:
    - "eternal return"
  status: seed
  notes: "Weyl uses Nietzsche's phrase for how an objectively unique world-course would appear in a world closed both spatially and temporally; the context is causal/topological, not only existential."
  evidence:
    - "parts/017-science-01-16-struktur-raum-und-zeit-physische-wirksamkeit.md"

- term: "Sinnesqualitäten"
  kind: concept
  preferred: "sensory qualities"
  alternatives:
    - "sense qualities"
  status: open
  notes: "Section 17 begins from the classical doctrine of the subjectivity of sensory qualities. Weyl keeps both grounds: philosophically, such qualities can be given only in consciousness; scientifically, they depend on physical circumstances and psychophysical organization."
  evidence:
    - "parts/018-science-01-17-subjekt-und-objekt.md"

- term: "Bewußtseinsgegebenheiten"
  kind: concept
  preferred: "givens of consciousness"
  alternatives:
    - "data of consciousness"
  status: open
  notes: "The immediate subjective side to which objective science must reconnect. Section 17 distinguishes actual momentary givens from possible, remembered, or expected perceptions of an I."
  evidence:
    - "parts/018-science-01-17-subjekt-und-objekt.md"

- term: "subjektiv-absolut / objektiv-relativ"
  kind: distinction
  preferred: "subjective-absolute / objective-relative"
  alternatives: []
  status: open
  notes: "Section 17's central epistemological pair. Immediate lived givenness is absolute in being just this given; objective world-knowledge is relative because it is symbolically represented only through an arbitrarily introduced coordinate system."
  evidence:
    - "parts/018-science-01-17-subjekt-und-objekt.md"

- term: "überflüssige Bestandteile"
  kind: concept
  preferred: "superfluous components"
  alternatives:
    - "surplus components"
  status: open
  notes: "Section 17's anti-surplus principle for physical theory: no theoretical component should remain if its difference from alternatives has no possible perceptual consequence. The Schwarzschild corrections and Bohr orbital period supply the test cases."
  evidence:
    - "parts/018-science-01-17-subjekt-und-objekt.md"

- term: "Konszentialismus"
  kind: concept
  preferred: "conscientialism"
  alternatives:
    - "consciousness-immanent standpoint"
  status: seed
  notes: "Weyl's name for the standpoint on which the absolute subject remains epistemically distinguished. Section 17 says it cannot be refuted on purely cognitive grounds, but the recognition of the Thou is demanded absolutely rather than only by the abstract norm of objectivity."
  evidence:
    - "parts/018-science-01-17-subjekt-und-objekt.md"

- term: "Licht-Ich"
  kind: concept
  preferred: "light-I"
  alternatives: []
  status: seed
  notes: "Late section-17 term for the transparent sense-giving I of consciousness. Weyl contrasts it with the dark, erring individual human being thrown into a particular fate."
  evidence:
    - "parts/018-science-01-17-subjekt-und-objekt.md"

- term: "Sinn und Sein"
  kind: distinction
  preferred: "sense and being"
  alternatives: []
  status: seed
  notes: "Section 17's closing polarity. The light of consciousness grasps itself as split and stretched between subject and object, sense and being; the phrase marks the metaphysical limit of the section's epistemology."
  evidence:
    - "parts/018-science-01-17-subjekt-und-objekt.md"

- term: "Raumvorstellung"
  kind: concept
  preferred: "spatial representation"
  alternatives:
    - "representation of space"
  status: seed
  notes: "Section 18 treats the psychological origin of space through visual and tactile impressions, movement sensations, and muscular feelings. `Spatial representation` is compact, but the German keeps the constructive/genetic pressure visible."
  evidence:
    - "parts/019-science-01-18-das-raumproblem.md"

- term: "Gesichtsfeld"
  kind: concept
  preferred: "visual field"
  alternatives: []
  status: seed
  notes: "The starting field for section 18's constitution of space: a two-dimensional field of qualities already possessing extension and a primitive metric structure before eye movements refine it."
  evidence:
    - "parts/019-science-01-18-das-raumproblem.md"

- term: "Lokalzeichen"
  kind: concept
  preferred: "local signs"
  alternatives:
    - "place signs"
  status: open
  notes: "Lotze's proposed sensations for explaining localization in the visual field. Weyl rejects them as turning what is founded into the foundation; the resting eye already has an extended visual field."
  evidence:
    - "parts/019-science-01-18-das-raumproblem.md"

- term: "Leib-Ich"
  kind: concept
  preferred: "body-I"
  alternatives:
    - "embodied I"
  status: seed
  notes: "The I as bodily center in constituted three-dimensional space. Weyl says no such body-I is present on the earlier pure visual-field and eye-movement stages."
  evidence:
    - "parts/019-science-01-18-das-raumproblem.md"

- term: "zentrierter Raum"
  kind: concept
  preferred: "centered space"
  alternatives: []
  status: open
  notes: "The three-dimensional space constituted from the two-dimensional sense-field and eye-movement field, with the body of the I occupying the privileged center."
  evidence:
    - "parts/019-science-01-18-das-raumproblem.md"

- term: "homogener Raum"
  kind: concept
  preferred: "homogeneous space"
  alternatives: []
  status: open
  notes: "Built on centered space through bodily movement into the distant horizon. This is the stage at which the body becomes an object among objects and intersubjective space becomes possible."
  evidence:
    - "parts/019-science-01-18-das-raumproblem.md"

- term: "Anschauungsraum"
  kind: concept
  preferred: "intuitive space"
  alternatives:
    - "space of intuition"
  status: open
  notes: "Section 18 distinguishes intuitive space from mathematical and physical space. It may be locally clear and Euclidean around the I-center, but it is not authoritative for global physical geometry."
  evidence:
    - "parts/019-science-01-18-das-raumproblem.md"

- term: "Wesensgesetze"
  kind: concept
  preferred: "essence-laws"
  alternatives:
    - "laws of essence"
  status: open
  notes: "One branch of the post-Kantian split of the a priori: Husserlian founding relations among givens of consciousness, not factual claims about physical reality."
  evidence:
    - "parts/019-science-01-18-das-raumproblem.md"

- term: "Eichinvarianz"
  kind: concept
  preferred: "gauge invariance"
  alternatives: []
  status: seed
  notes: "Weyl's dimensionality argument in section 18: the principle linking the electric field organically with the metric field holds only in a four-dimensional world."
  evidence:
    - "parts/019-science-01-18-das-raumproblem.md"

- term: "gerade-Fortschreiten"
  kind: concept
  preferred: "straight-progressing"
  alternatives:
    - "straight continuation"
    - "straight progress"
  status: open
  notes: "Weyl's postulate-like phrase for uniquely determined rotation-free infinitesimal parallel displacement from one point into the world. Kept awkward in English to preserve its technical pressure."
  evidence:
    - "parts/019-science-01-18-das-raumproblem.md"

- term: "träge Masse"
  kind: concept
  preferred: "inertial mass"
  alternatives: []
  status: seed
  notes: "Section 19's opening example for measurement: equal inertial mass is defined by a collision procedure, then tested for equality-character and independence from incidental conditions."
  evidence:
    - "parts/020-science-02-19-das-messen.md"

- term: "addierbare Größen / intensive Größen"
  kind: distinction
  preferred: "additive magnitudes / intensive magnitudes"
  alternatives:
    - "addable magnitudes / intensive magnitudes"
  status: open
  notes: "Helmholtz's measurement distinction in section 19. Additive magnitudes admit equality, order, and addition directly; intensive magnitudes such as temperature require implicit law-involving definitions."
  evidence:
    - "parts/020-science-02-19-das-messen.md"

- term: "mechanische Ähnlichkeit"
  kind: concept
  preferred: "mechanical similarity"
  alternatives: []
  status: seed
  notes: "Galilean scale-model reasoning grounded in arbitrary unit choice. Section 19 uses it to show both the power and the limits of similarity once special relativity and absolute constants enter."
  evidence:
    - "parts/020-science-02-19-das-messen.md"

- term: "Meßfundamente"
  kind: concept
  preferred: "measurement-foundations"
  alternatives:
    - "measurement bases"
  status: seed
  notes: "The assumed foundations relative to which measurement can give things conceptually and symbolically. Do not flatten this into instruments only; it includes theory, units, coordinates, and admissible coincidence procedures."
  evidence:
    - "parts/020-science-02-19-das-messen.md"

- term: "Zahlmarken"
  kind: concept
  preferred: "number-marks"
  alternatives:
    - "numerical marks"
  status: seed
  notes: "Section 19's example for how coordinate measurement can extend beyond a material basis: engraved axes on a plate let one project numerical marks into the empty plane beyond the material island."
  evidence:
    - "parts/020-science-02-19-das-messen.md"

- term: "raumzeitliche Koinzidenzen"
  kind: concept
  preferred: "space-time coincidences"
  alternatives:
    - "spatiotemporal coincidences"
  status: open
  notes: "The ultimate target of measurement's reduction of sensory findings: a mark on one scale coinciding with a mark on another, or in astronomy the light-mediated covering of star and crosshair."
  evidence:
    - "parts/020-science-02-19-das-messen.md"

- term: "Begriffsbildung"
  kind: concept
  preferred: "concept-formation"
  alternatives:
    - "formation of concepts"
  status: seed
  notes: "Section 20 makes concept-formation a law-bound and experiment-bound activity, not a mere naming or classifying procedure. The right physical concepts arise only through analysis of nature and remain tied to facts and laws."
  evidence:
    - "parts/021-science-02-20-die-begriffsbildung.md"

- term: "Analysis der Natur"
  kind: concept
  preferred: "analysis of nature"
  alternatives:
    - "analysis of natural reality"
  status: seed
  notes: "Dilthey's formula for the Galilean turn: isolate simple recurring processes within the complexity of occurrence rather than designing a complete system of nature at once."
  evidence:
    - "parts/021-science-02-20-die-begriffsbildung.md"

- term: "Zerlegung"
  kind: concept
  preferred: "decomposition"
  alternatives:
    - "analysis into elements"
  status: open
  notes: "Section 20 uses decomposition for the methodological cutting of reality into bodies, events, simple phenomena, hidden elements, and finally force/resultant structures. It must be paired with synthesis, because the principles recombining the elements also have to be uncovered."
  evidence:
    - "parts/021-science-02-20-die-begriffsbildung.md"

- term: "hypothetische Elemente"
  kind: concept
  preferred: "hypothetical elements"
  alternatives: []
  status: seed
  notes: "Atoms, forces, and the electromagnetic field are not directly picked out as intuitive parts. They are posited as hidden elements whose values are manifested through properties and experimental reactions."
  evidence:
    - "parts/021-science-02-20-die-begriffsbildung.md"

- term: "Reaktion"
  kind: concept
  preferred: "reaction"
  alternatives:
    - "experimental reaction"
  status: open
  notes: "Section 20 uses `Reaktion` for the experimental bringing-together through which a system's hidden elements and quantitative values become manifest. It is broader than ordinary chemical reaction."
  evidence:
    - "parts/021-science-02-20-die-begriffsbildung.md"

- term: "Impuls"
  kind: concept
  preferred: "momentum"
  alternatives:
    - "impulse"
  status: seed
  notes: "In section 20, `Impuls` is primary relative to mass in the Galilean concept. The translation uses `momentum` for the physical quantity while preserving the German term when the historical concept is being discussed."
  evidence:
    - "parts/021-science-02-20-die-begriffsbildung.md"

- term: "Kraft"
  kind: concept
  preferred: "force"
  alternatives: []
  status: seed
  notes: "Weyl rejects the merely formal definition of force as derivative of momentum with respect to time as its essence. Force becomes an independent potency linking bodies by inner state, position, and motion, and a source of new measurable marks of matter."
  evidence:
    - "parts/021-science-02-20-die-begriffsbildung.md"

- term: "funktionale Begriffsbildung"
  kind: concept
  preferred: "functional concept-formation"
  alternatives:
    - "functional formation of concepts"
  status: seed
  notes: "Contrasted with Aristotelian abstraction by subtraction. Functional concept-formation makes continuously gradable moments variable and generates all possible objects in an open play-space rather than classifying only actual given objects."
  evidence:
    - "parts/021-science-02-20-die-begriffsbildung.md"

- term: "Bestimmungsfeld"
  kind: concept
  preferred: "determination field"
  alternatives:
    - "field of determination"
  status: open
  notes: "Section 20's control against set-theoretic closure: the continuum is not a closed aggregate but an infinity-open field in which functional concepts generate their possible cases."
  evidence:
    - "parts/021-science-02-20-die-begriffsbildung.md"

- term: "Theorienbildung"
  kind: concept
  preferred: "theory-formation"
  alternatives:
    - "formation of theories"
  status: seed
  notes: "Section 21 completes the methodology sequence by making the theory-system, not an isolated law, the unit of empirical accountability. Theory-formation binds measurement, concept-formation, geometry, and correction into one experiment-facing nexus."
  evidence:
    - "parts/022-science-02-21-theorienbildung.md"

- term: "Hierarchie der Gesetze"
  kind: concept
  preferred: "hierarchy of laws"
  alternatives: []
  status: seed
  notes: "Weyl's name for the different practical firmness of laws within a theory. Some laws rank as principles because of simplicity, instinctive evidentness, reach, and resilience under correction."
  evidence:
    - "parts/022-science-02-21-theorienbildung.md"

- term: "Stufenskala der Festigkeit"
  kind: concept
  preferred: "scale of firmness"
  alternatives:
    - "graded scale of firmness"
  status: seed
  notes: "The methodological replacement for a sharp Kantian `a priori / a posteriori` split in natural science. Principles and empirical laws differ by degree of resilience rather than by an absolute boundary."
  evidence:
    - "parts/022-science-02-21-theorienbildung.md"

- term: "Einfachheit"
  kind: concept
  preferred: "simplicity"
  alternatives: []
  status: open
  notes: "Section 21 treats simplicity as `sigillum veri`, but not as surface economy or fewness alone. True inner simplicity is learned historically through widened experience and mathematically prepared function-classes."
  evidence:
    - "parts/022-science-02-21-theorienbildung.md"

- term: "Vollkommenheit"
  kind: concept
  preferred: "perfection"
  alternatives: []
  status: seed
  notes: "A former Aristotelian explanatory principle that Galilei and later physics transform into a heuristic faith in lawful dynamic harmony rather than a theory-component lodged in perfect shapes or fixed things."
  evidence:
    - "parts/022-science-02-21-theorienbildung.md"

- term: "Satz vom zureichenden Grunde"
  kind: concept
  preferred: "principle of sufficient reason"
  alternatives:
    - "principle of reason"
  status: open
  notes: "A legitimate guide for theory-formation when used as a symmetry principle, but not an independent source of factual truths. Section 21 treats Leibniz as both source and warning."
  evidence:
    - "parts/022-science-02-21-theorienbildung.md"

- term: "Kontinuitätsprinzip"
  kind: concept
  preferred: "continuity principle"
  alternatives:
    - "principle of continuity"
  status: open
  notes: "Leibniz's guide for theory: rest as a limiting case of motion, zero and straight angles as included cases, and special laws as limits of general laws. Weyl values it but keeps it under empirical discipline."
  evidence:
    - "parts/022-science-02-21-theorienbildung.md"

- term: "Analogieprinzip"
  kind: concept
  preferred: "analogy principle"
  alternatives:
    - "principle of analogy"
  status: seed
  notes: "Newton's rule that like effects should, as far as possible, be assigned the same cause. Section 21 uses atom theory and Lorentz's electron theory to show analogy as an enabling but corrigible starting point."
  evidence:
    - "parts/022-science-02-21-theorienbildung.md"

- term: "physikalische Analogie"
  kind: concept
  preferred: "physical analogy"
  alternatives: []
  status: seed
  notes: "Maxwell's middle path between an opaque mathematical theory and a dogmatic physical hypothesis: partial similarity of laws across domains, useful for insight while guarded against literalizing the model."
  evidence:
    - "parts/022-science-02-21-theorienbildung.md"

- term: "Scheinbilder"
  kind: concept
  preferred: "semblance-images"
  alternatives:
    - "inner images"
    - "representational images"
  status: seed
  notes: "Hertz's term for the inner images or symbols of external objects whose thought-necessary consequences should image the nature-necessary consequences of the objects."
  evidence:
    - "parts/022-science-02-21-theorienbildung.md"

- term: "Weltvertrauen"
  kind: concept
  preferred: "world-trust"
  alternatives: []
  status: open
  notes: "Weyl's name for the basic stance underlying induction and prediction. It cannot be justified without circularity, but it is the natural ground posture of knowing life."
  evidence:
    - "parts/022-science-02-21-theorienbildung.md"

- term: "Selbstvertrauen"
  kind: concept
  preferred: "self-trust"
  alternatives: []
  status: open
  notes: "Paired with `Weltvertrauen` as the basic stance of spiritual life acting through thetic reason. It grounds the practical confidence in theory beyond formal justification."
  evidence:
    - "parts/022-science-02-21-theorienbildung.md"

- term: "Materie"
  kind: concept
  preferred: "matter"
  alternatives: []
  status: open
  notes: "Section 22 treats matter as the central test case for Weyl's world-picture. It is not a stable substrate concept but a historically transformed pressure point moving through substance, atom, force-center, field, ether, conservation law, and quantum complementarity."
  evidence:
    - "parts/023-science-03-22-die-materie.md"

- term: "Substanzstelle"
  kind: concept
  preferred: "substance-place"
  alternatives:
    - "place of substance"
  status: seed
  notes: "The unit presupposed by the older substance theory of matter: the same place of substance should be reidentifiable throughout the history of a body-system. Weyl uses it to show why homogeneous substance requires atomistic individuation."
  evidence:
    - "parts/023-science-03-22-die-materie.md"

- term: "Feldtheorie der Materie"
  kind: concept
  preferred: "field theory of matter"
  alternatives: []
  status: open
  notes: "The program that interprets a material particle such as the electron as a high-energy knot or region of field rather than as a substantial core. Weyl keeps the program live but not settled."
  evidence:
    - "parts/023-science-03-22-die-materie.md"

- term: "Erhaltungssätze"
  kind: concept
  preferred: "conservation laws"
  alternatives: []
  status: seed
  notes: "The modern carrier of substance-pressure. Section 22 joins energy and momentum through relativity, derives the older energy principle from normalized effects, and then denies that conservation laws are metaphysically immune to revision."
  evidence:
    - "parts/023-science-03-22-die-materie.md"

- term: "Massenfaktor"
  kind: concept
  preferred: "mass-factor"
  alternatives: []
  status: seed
  notes: "The invariant positive length of the four-dimensional energy-momentum vector. Weyl stresses that it cannot serve as a substance-quantity because it does not obey the addition law over subregions."
  evidence:
    - "parts/023-science-03-22-die-materie.md"

- term: "Atomistik"
  kind: concept
  preferred: "atomism"
  alternatives: []
  status: seed
  notes: "The atomistic theory begins as speculative support for substance theory but gains empirical force through chemistry, the electron, quantum action, and spectral series. It also exposes the discreteness problem that pure substance theory cannot explain."
  evidence:
    - "parts/023-science-03-22-die-materie.md"

- term: "Komplementarität"
  kind: concept
  preferred: "complementarity"
  alternatives: []
  status: open
  notes: "Bohr's name for the quantum situation in which features become tied to incompatible experimental arrangements. Section 22 treats it as replacing the old polarity of matter and force; Appendix C gives it formal pressure through noncommuting grids and Heisenberg uncertainty. Appendix E extends it cautiously toward the possible relation between constructive theory and inward understanding, without making that extension settled."
  evidence:
    - "parts/023-science-03-22-die-materie.md"
    - "parts/027-appendix-c-quantenphysik-und-kausalitaet.md"
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "Kausalität"
  kind: concept
  preferred: "causality"
  alternatives: []
  status: open
  notes: "Section 23 splits causality into methodological norm, functional law, physical causal structure, experimental agency, probability, and the boundary problem of freedom. Appendix C sharpens this by preserving strict causal law for wave-state evolution while denying strict causal determination for measurement outcomes."
  evidence:
    - "parts/024-science-03-23-kausalitaet-gesetz-zufall-freiheit.md"
    - "parts/027-appendix-c-quantenphysik-und-kausalitaet.md"

- term: "Funktionalgesetz"
  kind: concept
  preferred: "function-law"
  alternatives:
    - "functional law"
  status: seed
  notes: "Weyl uses the function-law as the natural-scientific replacement for naive cause, but stresses that functional dependence is indifferent to which term determines which."
  evidence:
