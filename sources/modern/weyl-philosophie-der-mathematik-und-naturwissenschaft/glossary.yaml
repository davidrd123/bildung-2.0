- term: "statistische Temperatur"
  kind: concept
  preferred: "statistical temperature"
  alternatives: []
  status: seed
  notes: "The reciprocal parameter `α⁻¹` in the canonical distribution, later identified with `kT` by comparison with an ideal gas."
