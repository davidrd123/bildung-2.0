- term: "Komplex"
  kind: concept
  preferred: "complex"
  alternatives:
    - "structured aggregate"
  status: open
  notes: "An aggregate equipped with a neighborhood or linkage relation among points. In Appendix B this becomes Weyl's formal schema for chromosomes, position effect, linkage, and structural mutation."
