- term: "Relativitätsprinzip"
  kind: concept
  preferred: "relativity principle"
  alternatives: []
  status: open
  notes: "In Appendix B this is the abstract demand that objective statements about aggregates must be invariant under arbitrary relabeling of elements. It extends Weyl's invariance theme from geometry and physics into combinatorics."
