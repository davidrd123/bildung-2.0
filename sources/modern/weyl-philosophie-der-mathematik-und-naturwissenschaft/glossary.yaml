  status: open
  notes: "The objectification of sets and properties is the key philosophical move in section 8. It transforms `x is red` into `x has property X` and makes the property place itself available for definition. Section 10 explicitly condemns the unrestricted right to objectification because the unrestricted set axiom rule yields formal contradiction."
  evidence:
