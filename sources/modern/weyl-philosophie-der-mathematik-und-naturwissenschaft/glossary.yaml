- term: "nicht-archimedische Größenlehre"
  kind: concept
  preferred: "non-Archimedean theory of magnitudes"
  alternatives:
    - "non-Archimedean magnitude theory"
  status: seed
  notes: "Weyl grants its consistency as a possibility but says it contributes nothing to analysis."
  evidence:
    - "parts/008-math-02-07-das-irrationale-und-das-unendlichkleine.md"

- term: "Mengenlehre"
