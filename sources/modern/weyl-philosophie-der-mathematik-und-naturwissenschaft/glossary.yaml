# Working glossary for Weyl translation pressure.
# Handles are intentionally withheld until terms recur across batches.

- term: "Wissenschaften"
  kind: concept
  preferred: "sciences"
  alternatives:
    - "disciplines"
    - "scientific fields"
  status: seed
  notes: "The calibration page uses the plural in `Philosophie der Wissenschaften`; preserve the plural unless a later passage clearly demands the modern singular phrase `philosophy of science`."
  evidence:
    - "parts/001-einfuehrung-calibration.md"

- term: "Naturwissenschaft"
  kind: concept
  preferred: "natural science"
  alternatives:
    - "natural sciences"
  status: seed
  notes: "In the opening sentence Weyl pairs mathematics and natural science as source-domains from whose own work the philosophical results arise."
  evidence:
    - "parts/001-einfuehrung-calibration.md"

- term: "Grundlagen"
  kind: concept
  preferred: "foundations"
  alternatives:
    - "grounds"
    - "basic principles"
  status: seed
  notes: "Likely central because Weyl immediately frames the presentation as one of the foundations of mathematics. Keep `foundations` unless later passages pressure a more active `grounding`."
  evidence:
    - "parts/001-einfuehrung-calibration.md"

- term: "inhaltliche Problematik"
  kind: phrase
  preferred: "substantive problematic"
  alternatives:
    - "content-problematic"
    - "problematic of content"
  status: open
  notes: "The contrast is with `das mehr Formale`; `substantive` carries the non-formal pressure better than `content` in running English, but the phrase needs more evidence."
  evidence:
    - "parts/001-einfuehrung-calibration.md"

- term: "das Mathematische"
  kind: concept
  preferred: "the mathematical"
  alternatives:
    - "the essence of mathematics"
    - "mathematics"
  status: open
  notes: "Weyl says Leibniz had the eye for `das Wesen des Mathematischen`; the nominalized adjective should stay visible for now."
  evidence:
    - "parts/001-einfuehrung-calibration.md"

- term: "Urteil"
  kind: concept
  preferred: "judgment"
  alternatives:
    - "proposition"
    - "statement"
  status: seed
  notes: "In subsection 1 Weyl is explicitly working against the traditional subject-predicate structure of judgment; keep `judgment` for `Urteil` while allowing `Satz` and `Aussage` to vary locally."
  evidence:
    - "parts/002-math-01-01-relationen-und-urteile.md"
    - "parts/004-math-01-03-logisches-schliessen.md"

- term: "Urteilsschema"
  kind: concept
  preferred: "judgment-schema"
  alternatives:
    - "schema of judgment"
    - "propositional schema"
  status: seed
  notes: "Names the relational form with fillable places before any determinate judgment arises. Keep the hyphenated form visible for now."
  evidence:
    - "parts/002-math-01-01-relationen-und-urteile.md"

- term: "Leerstelle"
  kind: concept
  preferred: "empty place"
  alternatives:
    - "placeholder"
    - "blank"
    - "argument place"
  status: open
  notes: "`Empty place` is awkward but preserves Weyl's spatial peg-and-ball analogy and the later loss of `Substitutionsfähigkeit` under quantification."
  evidence:
    - "parts/002-math-01-01-relationen-und-urteile.md"
    - "parts/003-math-01-02-aufbauende-definition.md"

- term: "anschaulich aufgewiesen"
  kind: phrase
  preferred: "intuitively exhibited"
  alternatives:
    - "intuitively shown"
    - "directly exhibited"
    - "given in intuition"
  status: open
  notes: "Important for undefined primitive objects and for the contrast with construction/definition. `Given` alone is too passive and too broad. Section 13 sharpens the contrast as `begriffliche Fixierung` versus `anschauliche Aufweisung`: for a continuum of points, conceptual fixing still requires a coordinate frame exhibited by an individual demonstrative act."
  evidence:
    - "parts/002-math-01-01-relationen-und-urteile.md"
    - "parts/003-math-01-02-aufbauende-definition.md"
    - "parts/014-math-03-13-relativitaetsproblem.md"

- term: "Sonderwesen"
  kind: concept
  preferred: "special entity"
  alternatives:
    - "special being"
    - "individual entity"
    - "distinctive entity"
  status: open
  notes: "Weyl uses the term for numbers as freely produced and individually characterized. Keep the strangeness visible because it bears directly on number magic and exact theoretical grasp."
  evidence:
    - "parts/002-math-01-01-relationen-und-urteile.md"

- term: "genetische Konstruktion"
  kind: concept
  preferred: "genetic construction"
  alternatives:
    - "generative construction"
    - "constructive generation"
  status: seed
  notes: "The subsection-1 hinge: Weyl first subordinates genetic construction to the resting being of relations, then announces that later he will reverse this. In chapter II, the same pressure appears as `genetischer Aufbau` of the number realm."
  evidence:
    - "parts/002-math-01-01-relationen-und-urteile.md"
    - "parts/006-math-02-05-rationale-zahlen-das-komplexe.md"

- term: "aufbauende mathematische Definition"
  kind: concept
  preferred: "constructive mathematical definition"
  alternatives:
    - "building-up mathematical definition"
    - "object-forming mathematical definition"
  status: open
  notes: "The section title names definition as a building-up act that introduces ideal objects. `Constructive` is readable English, but it must not yet be collapsed into later technical constructivism."
  evidence:
    - "parts/003-math-01-02-aufbauende-definition.md"

- term: "schöpferische Definition"
  kind: concept
  preferred: "creative definition"
  alternatives:
    - "generative definition"
    - "creative mathematical definition"
  status: seed
  notes: "Weyl says mathematics uses this definition to generate new ideal objects. `Creative` should remain visible because it carries more metaphysical pressure than ordinary stipulative definition."
  evidence:
    - "parts/003-math-01-02-aufbauende-definition.md"

- term: "ideale Elemente"
  kind: concept
  preferred: "ideal elements"
  alternatives:
    - "ideal objects"
  status: seed
  notes: "Used for ideal points, imaginary elements, ideal numbers, and fractions introduced to force simple laws, restore lost lawfulness, or secure invertibility. Section 6 pressures the related `ideal objects`: numbers are safe if understood functionally, dangerous when the infinity-open sequence is made into a closed aggregate of things existing in themselves. Section 10 adds the parallel case of `ideale Aussagen`, introduced to restore formal laws without restoring contentful truth."
  evidence:
    - "parts/003-math-01-02-aufbauende-definition.md"
    - "parts/006-math-02-05-rationale-zahlen-das-komplexe.md"
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"
    - "parts/011-math-02-10-symbolische-mathematik.md"

- term: "Definition durch Abstraktion"
  kind: concept
  preferred: "definition by abstraction"
  alternatives:
    - "definition through abstraction"
  status: seed
  notes: "A special case of creative definition: a new object domain arises by treating objects as distinct exactly when they fail an equivalence relation. Section 5 uses equality of fractions as another explicit case; section 6 notes that introducing cardinal number independently of order would require this route. Section 19 uses inertial mass as a physical case: equality is defined by a collision procedure and then tested as a genuine equality relation."
  evidence:
    - "parts/003-math-01-02-aufbauende-definition.md"
    - "parts/006-math-02-05-rationale-zahlen-das-komplexe.md"
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"
    - "parts/020-science-02-19-das-messen.md"

- term: "Menge"
  kind: concept
  preferred: "set"
  alternatives:
    - "collection"
  status: open
  notes: "Weyl explicitly rejects treating `Menge` as a concrete collective assembled by colligation. In section 6, cardinal number independent of ordering belongs to set-theoretic abstraction, but pairing still has to be executed temporally. In section 7, the object of continuum theory is possible sets or infinite sequences of natural numbers. Section 8 defines set theory by treating the totality of subsets of the natural-number series as a closed aggregate of objects existing in themselves. Keep `set`, but preserve the anti-collective and anti-dogmatic warning."
  evidence:
    - "parts/003-math-01-02-aufbauende-definition.md"
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"
    - "parts/008-math-02-07-das-irrationale-und-das-unendlichkleine.md"
    - "parts/009-math-02-08-die-mengenlehre.md"

- term: "Inbegriff"
  kind: concept
  preferred: "aggregate"
  alternatives:
    - "collection"
    - "totality"
  status: open
  notes: "Used for exhibited or individually given aggregates. Section 6 contrasts `Inbegriff` with `Menge`, rejects unnecessary abstraction from a shaped whole into a mere aggregate, and later warns against turning the infinity-open number series into a closed aggregate of things existing in themselves. Section 8 intensifies the warning: set theory treats fields of constructive possibilities as closed aggregates of objects existing in themselves. Section 9 rejects the continuum as an aggregate of fixed elements and shifts to part-whole."
  evidence:
    - "parts/003-math-01-02-aufbauende-definition.md"
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"
    - "parts/009-math-02-08-die-mengenlehre.md"
    - "parts/010-math-02-09-intuitive-mathematik.md"

- term: "Abstraktum"
  kind: concept
  preferred: "abstractum"
  alternatives:
    - "abstract object"
  status: open
  notes: "Appears in the final formal principle as `Φ(uv...)`. Keep the Latinism where the formula is live; smooth to `abstract object` only in less formal exposition."
  evidence:
    - "parts/003-math-01-02-aufbauende-definition.md"

- term: "sachhaltig"
  kind: term
  preferred: "substantive"
  alternatives:
    - "content-bearing"
    - "material"
  status: open
  notes: "In `sachhaltige Umstand`, Weyl contrasts a fact about a realm of existing objects with what can be read from the defining sense alone."
  evidence:
    - "parts/003-math-01-02-aufbauende-definition.md"
    - "parts/004-math-01-03-logisches-schliessen.md"

- term: "Das logische Schließen"
  kind: concept
  preferred: "logical inference"
  alternatives:
    - "logical concluding"
    - "logical reasoning"
  status: seed
  notes: "The section concerns proof and inference rules, not merely the psychological act of drawing a conclusion."
  evidence:
    - "parts/004-math-01-03-logisches-schliessen.md"

- term: "formale Gültigkeit"
  kind: concept
  preferred: "formal validity"
  alternatives:
    - "formal validness"
  status: seed
  notes: "The sharp logical concept against which Weyl says Kant's analytic/synthetic distinction is too unclear to compare."
  evidence:
    - "parts/004-math-01-03-logisches-schliessen.md"

- term: "finite Vorschrift"
  kind: concept
  preferred: "finite prescription"
  alternatives:
    - "finite procedure"
    - "finite rule"
  status: open
  notes: "Names the mechanical truth-table procedure for finite propositional formulas. `Prescription` preserves the procedural tone better than `rule` alone."
  evidence:
    - "parts/004-math-01-03-logisches-schliessen.md"

- term: "finite Logik"
  kind: concept
  preferred: "finite logic"
  alternatives:
    - "finitary logic"
  status: open
  notes: "Contrasted with transfinite logic. `Finitary` may become useful later, but the passage itself names the direct finite inspection procedure."
  evidence:
    - "parts/004-math-01-03-logisches-schliessen.md"

- term: "transfinite Logik"
  kind: concept
  preferred: "transfinite logic"
  alternatives:
    - "quantified logic"
  status: open
  notes: "Introduced as the logic using `es gibt` and `alle`; the term should not be flattened to quantified logic because Weyl connects it to the problem of the infinite."
  evidence:
    - "parts/004-math-01-03-logisches-schliessen.md"

- term: "Schlußregel"
  kind: concept
  preferred: "rule of inference"
  alternatives:
    - "inference rule"
  status: seed
  notes: "Weyl insists formulas alone are not enough because construction means action; logic needs a practically exercisable rule."
  evidence:
    - "parts/004-math-01-03-logisches-schliessen.md"

- term: "ursprüngliche Dunkelheit der Vernunft"
  kind: phrase
  preferred: "originary darkness of reason"
  alternatives:
    - "original darkness of reason"
  status: open
  notes: "Marks Weyl's anti-omniscience point: truth is not possessed by immediate survey, but won step by step through action."
  evidence:
    - "parts/004-math-01-03-logisches-schliessen.md"

- term: "Grund und Folge"
  kind: phrase
  preferred: "ground and consequence"
  alternatives:
    - "reason and consequence"
    - "ground and consequent"
  status: open
  notes: "Kept distinct from `Ursache und Wirkung`; Weyl says the implication sign remains neutral among logical, essential, causal, and empirical foundations."
  evidence:
    - "parts/004-math-01-03-logisches-schliessen.md"

- term: "Die axiomatische Methode"
  kind: concept
  preferred: "the axiomatic method"
  alternatives:
    - "axiomatic procedure"
  status: seed
  notes: "Names the method of collecting the basic concepts and basic facts from which a science's relevant general truths can be definitionally or deductively derived."
  evidence:
    - "parts/005-math-01-04-axiomatische-methode.md"

- term: "Axiomensystem"
  kind: concept
  preferred: "axiom system"
  alternatives:
    - "system of axioms"
  status: seed
  notes: "Weyl treats the choice of primitives and basic facts as partly arbitrary, then measures the system by consistency, independence, and completeness/categoricity."
  evidence:
    - "parts/005-math-01-04-axiomatische-methode.md"
    - "parts/006-math-02-05-rationale-zahlen-das-komplexe.md"

- term: "Widerspruchslosigkeit"
  kind: concept
  preferred: "consistency"
  alternatives:
    - "freedom from contradiction"
  status: open
  notes: "`Consistency` is idiomatic for axiom systems, but the literal pressure remains freedom from deriving both a formula and its negation. It matters because theory is bold construction rather than mere reproduction of the given. Section 10 makes consistency Hilbert's substitute target for truth in the old analysis. Section 11 folds this into the larger claim that formalism is symbolic presentation of the transcendent, not evident truth. Appendix A reopens the term after Gödel: consistency can no longer function as Hilbert's final security, and becomes closer to provisional scientific concordance."
  evidence:
    - "parts/005-math-01-04-axiomatische-methode.md"
    - "parts/006-math-02-05-rationale-zahlen-das-komplexe.md"
    - "parts/011-math-02-10-symbolische-mathematik.md"
    - "parts/012-math-02-11-ueber-das-wesen-der-mathematischen-erkenntnis.md"
    - "parts/025-appendix-a-struktur-der-mathematik.md"

- term: "Unabhängigkeit"
  kind: concept
  preferred: "independence"
  alternatives:
    - "independence of axioms"
  status: seed
  notes: "An axiom is independent when its negation does not contradict the remaining axioms. Weyl explicitly binds independence to consistency."
  evidence:
    - "parts/005-math-01-04-axiomatische-methode.md"

- term: "Modellmethode"
  kind: concept
  preferred: "model method"
  alternatives:
    - "method of models"
  status: seed
  notes: "The successful method for reducing consistency or proving independence by exhibiting objects and relations that satisfy one system under a suitable naming."
  evidence:
    - "parts/005-math-01-04-axiomatische-methode.md"

- term: "direkte Methode"
  kind: concept
  preferred: "direct method"
  alternatives:
    - "direct proof method"
  status: seed
  notes: "The method required for an absolute proof of consistency from the fully enumerated logical rules of inference."
  evidence:
    - "parts/005-math-01-04-axiomatische-methode.md"

- term: "Vollständigkeit"
  kind: concept
  preferred: "completeness"
  alternatives:
    - "completeness of an axiom system"
  status: open
  notes: "Weyl rejects the decision-procedure sense as trivializing mathematics and accepts the categorical sense: any two contentful interpretations are necessarily isomorphic."
  evidence:
    - "parts/005-math-01-04-axiomatische-methode.md"

- term: "kategorisch"
  kind: concept
  preferred: "categorical"
  alternatives:
    - "categoric"
  status: seed
  notes: "Paired with `vollständig`; an axiom system is categorical when its contentful interpretations are unique up to isomorphism."
  evidence:
    - "parts/005-math-01-04-axiomatische-methode.md"

- term: "Isomorphie"
  kind: concept
  preferred: "isomorphism"
  alternatives:
    - "isomorphy"
  status: seed
  notes: "The epistemological peak of chapter I: science determines a structure up to isomorphic mapping, not the inner essence of its objects."
  evidence:
    - "parts/005-math-01-04-axiomatische-methode.md"

- term: "inhaltliche Interpretation"
  kind: concept
  preferred: "contentful interpretation"
  alternatives:
    - "substantive interpretation"
    - "interpretation with content"
  status: open
  notes: "An interpretation in which meanings are exhibited for primitive names so that the axioms become true statements. `Contentful` keeps the link to `inhaltlich` without collapsing into empirical content."
  evidence:
    - "parts/005-math-01-04-axiomatische-methode.md"

- term: "logische Leerform"
  kind: concept
  preferred: "logical empty form"
  alternatives:
    - "logical blank form"
    - "logical form without content"
  status: open
  notes: "Preserve the relation to `Leerstelle`: pure mathematics develops empty relational forms without binding them to any one contentful interpretation."
  evidence:
    - "parts/005-math-01-04-axiomatische-methode.md"

- term: "implizite Definition"
  kind: concept
  preferred: "implicit definition"
  alternatives:
    - "definition by implication"
  status: seed
  notes: "The axiom-system version of the earlier creative-definition pressure: axioms define primitive concepts by the judgments in which they function, leaving a controlled scope of indeterminacy."
  evidence:
    - "parts/005-math-01-04-axiomatische-methode.md"

- term: "transfinites Kriterium"
  kind: concept
  preferred: "transfinite criterion"
  alternatives:
    - "transfinite test"
  status: seed
  notes: "In section 5, equality of fractions initially has a transfinite wording because it quantifies over all possible numbers `x, y`; natural-number calculation then replaces it by the finite cross-multiplication condition `(K)`."
  evidence:
    - "parts/006-math-02-05-rationale-zahlen-das-komplexe.md"

- term: "Widerspruchsfreiheit"
  kind: concept
  preferred: "consistency"
  alternatives:
    - "freedom from contradiction"
  status: open
  notes: "Chapter II uses `Widerspruchsfreiheit` where chapter I used `Widerspruchslosigkeit`. Treat as the same consistency pressure unless later passages distinguish them."
  evidence:
    - "parts/006-math-02-05-rationale-zahlen-das-komplexe.md"

- term: "Brüche"
  kind: concept
  preferred: "fractions"
  alternatives:
    - "fractional numbers"
  status: seed
  notes: "Do not collapse into `rational numbers`; Weyl uses `Brüche` for the initial extension forced by division/multiplication and reserves `rationale Zahlen` for the later extension including `0` and negatives."
  evidence:
    - "parts/006-math-02-05-rationale-zahlen-das-komplexe.md"

- term: "rationale Zahlen"
  kind: concept
  preferred: "rational numbers"
  alternatives:
    - "rational quantities"
  status: seed
  notes: "Reached from fractions by forcing invertibility of addition, including `0` and negatives, while sacrificing division by zero."
  evidence:
    - "parts/006-math-02-05-rationale-zahlen-das-komplexe.md"

- term: "Zahlbegriff"
  kind: concept
  preferred: "concept of number"
  alternatives:
    - "number concept"
  status: open
  notes: "Section 5 treats complex numbers as a natural boundary for extending the concept of number while preserving all formal laws of calculation. Section 6 adds the Kantian time-pressure: number is bound to temporal mental operations, though arithmetic is not simply a doctrine of time. Section 7 shows Dedekind's cut-principle fixing the concept of real number required for Cauchy's convergence criterion."
  evidence:
    - "parts/006-math-02-05-rationale-zahlen-das-komplexe.md"
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"
    - "parts/008-math-02-07-das-irrationale-und-das-unendlichkleine.md"

- term: "Größen-Axiome"
  kind: concept
  preferred: "axioms of magnitude"
  alternatives:
    - "magnitude axioms"
    - "order axioms"
  status: open
  notes: "The arithmetic axioms split into algebraic axioms and `Größen-Axiome`; the latter govern `a > b` and are suspended in the complex-number domain."
  evidence:
    - "parts/006-math-02-05-rationale-zahlen-das-komplexe.md"

- term: "vollständige Induktion"
  kind: concept
  preferred: "complete induction"
  alternatives:
    - "mathematical induction"
  status: open
  notes: "Weyl uses `vollständige Induktion` for both definition and proof: specify the first case and the transfer from `n` to `n + 1`. Modern English often says `mathematical induction`, but the literal phrase carries his construction-from-completion pressure. Section 8 recasts complete induction set-theoretically as the claim that every Dedekind chain containing 1 is identical with all of Z. Section 9 recovers it as Brouwer's concrete mathematical originary intuition, applied step by step. Section 10 lets it reappear as a transfinite arithmetical axiom rule and as the finite metamathematical reasoning needed for consistency proofs. Section 11 gives it the synthetic, non-analytic role that prevents mathematics from becoming a huge tautology."
  evidence:
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"
    - "parts/009-math-02-08-die-mengenlehre.md"
    - "parts/010-math-02-09-intuitive-mathematik.md"
    - "parts/011-math-02-10-symbolische-mathematik.md"
    - "parts/012-math-02-11-ueber-das-wesen-der-mathematischen-erkenntnis.md"

- term: "Ordinalzahl"
  kind: concept
  preferred: "ordinal number"
  alternatives:
    - "ordinal"
  status: seed
  notes: "Primary for Weyl because counting an aggregate already orders its elements in time; the natural numbers first appear through their place in the generated series."
  evidence:
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"
    - "parts/009-math-02-08-die-mengenlehre.md"

- term: "Kardinalzahl"
  kind: concept
  preferred: "cardinal number"
  alternatives:
    - "cardinal"
  status: seed
  notes: "Secondary for Weyl. If introduced independently of ordering, it requires definition by abstraction, but the pairing criterion still has to be tested through temporally ordered acts."
  evidence:
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"
    - "parts/009-math-02-08-die-mengenlehre.md"
    - "parts/009-math-02-08-die-mengenlehre.md"

- term: "Zahlzeichen"
  kind: concept
  preferred: "number-sign"
  alternatives:
    - "number sign"
    - "numeral"
  status: open
  notes: "Do not flatten to `numeral` where the sign-theoretic argument is active. Weyl is discussing concrete signs that can endure, preserve, communicate, and stabilize number-determinations."
  evidence:
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"

- term: "standhaltende Zeichen"
  kind: phrase
  preferred: "enduring signs"
  alternatives:
    - "persistent signs"
    - "signs that hold fast"
  status: open
  notes: "The first written sign must `standhält` if later comparison is shifted onto signs. `Enduring` preserves the role of persistence without making it a metaphysical substrate."
  evidence:
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"

- term: "Zahlvergleichung / Zahlbestimmung"
  kind: distinction
  preferred: "number-comparison / number-determination"
  alternatives:
    - "comparison of number / determination of number"
  status: open
  notes: "Central section-6 distinction. Signs are not essential for direct comparison if the first temporal sequence can be reproduced, but number-determination becomes essentially signitive once the act is split into separately preserved determinations."
  evidence:
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"

- term: "signativer Charakter"
  kind: concept
  preferred: "signitive character"
  alternatives:
    - "sign-character"
    - "semiotic character"
  status: open
  notes: "Keep `signitive`, not generic `semiotic`, because Weyl's local claim is precise: number-determination depends on reference to signs after the intuitive comparison has been split and displaced."
  evidence:
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"

- term: "konstruktives Erkennen"
  kind: concept
  preferred: "constructive knowing"
  alternatives:
    - "constructive cognition"
    - "constructive knowledge"
  status: open
  notes: "Section 6 gives three basic traits: operations on the given become features of the given; signs split and stabilize operations; actual occurrences are projected onto an infinity-open manifold of possibilities."
  evidence:
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"

- term: "Mannigfaltigkeit von Möglichkeiten"
  kind: phrase
  preferred: "manifold of possibilities"
  alternatives:
    - "multiplicity of possibilities"
  status: seed
  notes: "The generated series projects actual signs onto a background of possibilities producible by a fixed procedure and open into infinity. This phrase may become central in sections 7-11."
  evidence:
    - "parts/007-math-02-06-die-natuerlichen-zahlen.md"

- term: "Sprung ins Jenseits"
  kind: phrase
  preferred: "leap into the beyond"
  alternatives:
    - "leap into the other side"
    - "leap into transcendence"
  status: open
