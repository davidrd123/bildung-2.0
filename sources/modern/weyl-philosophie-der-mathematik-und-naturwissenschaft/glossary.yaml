    - "parts/025-appendix-a-struktur-der-mathematik.md"

- term: "theoretische Konstruktion der einen realen Welt"
  kind: concept
  preferred: "theoretical construction of the one real world"
  alternatives:
    - "theoretical construction of a single real world"
  status: open
  notes: "Appendix A's final standard for realistic mathematics: mathematics should be pursued parallel to physics, as disciplined construction of reality with sober caution toward hypothetical extensions, not as possession of final formal certainty."
  evidence:
    - "parts/025-appendix-a-struktur-der-mathematik.md"

- term: "Aggregat"
  kind: concept
  preferred: "aggregate"
  alternatives: []
  status: open
