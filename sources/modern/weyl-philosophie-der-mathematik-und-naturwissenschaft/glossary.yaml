    - "parts/028-appendix-d-chemische-valenz.md"

- term: "Strukturchemie"
  kind: concept
  preferred: "structural chemistry"
  alternatives: []
  status: seed
  notes: "The modern chemistry that keeps plausible valence schemata while minimizing the resonance corrections forced by quantum mechanics."
  evidence:
    - "parts/028-appendix-d-chemische-valenz.md"

- term: "Genaggregate"
  kind: concept
  preferred: "gene aggregates"
  alternatives:
    - "genetic aggregates"
  status: open
  notes: "Appendix D explicitly compares genetic aggregates and chromosomal linkages to chemical valence diagrams: useful provisional combinatorial schemata of limited validity awaiting deeper mediation. Appendix E moves into that mediation by treating genes as complex nuclein-protein molecules and mutations as quantum-linked chemical changes. Appendix F uses zygotic gene aggregates as the case where evolution becomes a problem of rare functional combinations in an enormous molecular possibility-space."
  evidence:
    - "parts/028-appendix-d-chemische-valenz.md"
    - "parts/029-appendix-e-physik-und-biologie.md"
    - "parts/030-appendix-f-physische-welt.md"

- term: "Selbst-Verdoppelung"
  kind: concept
  preferred: "self-duplication"
  alternatives:
    - "self-reduplication"
  status: open
  notes: "The gene's decisive life-property in Appendix E: a model gene organizes available cell material into a copy of itself. Viruses matter because they show self-duplication and mutation inside living cells while otherwise resembling inert matter. Appendix F extends this backward through Oparin's speculative protogenes and free ancestral genes."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"
    - "parts/030-appendix-f-physische-welt.md"

- term: "Virus"
  kind: concept
  preferred: "virus"
  alternatives:
    - "naked gene"
  status: seed
  notes: "The boundary case between organic and inorganic matter. Weyl treats viruses as crystal-like nuclein-protein bodies that behave inertly outside living cells but show self-duplication and mutation inside them. Appendix F uses the virus as an example of evolution that may be regressive rather than progressive."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"
    - "parts/030-appendix-f-physische-welt.md"

- term: "Nuklein-Protein"
  kind: concept
  preferred: "nuclein-protein"
  alternatives:
    - "nucleoprotein"
  status: seed
  notes: "The historical chemical carrier term Weyl uses for genes and viruses. Preserve the historical spelling while noting its role: it lets genes and viruses be treated as complex molecular structures rather than nonphysical life-principles."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "Akausalität"
  kind: concept
  preferred: "acausality"
  alternatives:
    - "non-causal element"
  status: open
  notes: "The quantum loosening of strict causal determination where it can matter biologically. In Appendix E, mutation supplies the central biological case: an atomic-scale event can become a hereditary macroscopic difference."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "Steuereffekt"
  kind: concept
  preferred: "control effect"
  alternatives:
    - "steering effect"
  status: seed
  notes: "Weyl's name for the biological relevance of small atomic groups: quantum physics matters for life wherever a moderate number of atoms can steer organism-scale events."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "Einzeltreffer / Zielscheibe"
  kind: distinction
  preferred: "single hit / target"
  alternatives:
    - "single-hit behavior / target volume"
  status: seed
  notes: "The radiation-genetics evidence for physical gene structure. Mutation rates show effects of individual ionization hits on a critical target volume rather than the combined effect of many hits."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "Delbrücksches Modell"
  kind: concept
  preferred: "Delbrück model"
  alternatives:
    - "Delbrück's model"
  status: open
  notes: "The model of mutation as a rare quantum jump or chemical change in a complex gene molecule caused by ionization of bound electrons. Weyl treats the specific model as complicated by later findings but keeps its direction: genes are complex molecules and mutations are linked with quantum events."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "Miniaturkodex / Entwicklungsplan"
  kind: distinction
  preferred: "miniature code / developmental plan"
  alternatives:
    - "miniature codex / development plan"
  status: open
  notes: "Weyl's way to recast the preformation/epigenesis problem. The combinatorial space of gene molecules can carry a miniature code corresponding to a complex developmental plan, but the mechanism of translating that code remains a live problem."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "aperiodischer Kristall"
  kind: concept
  preferred: "aperiodic crystal"
  alternatives: []
  status: open
  notes: "Schrödinger's image for the gene: stable like a crystal, but not periodically repetitive, because each atom has a specific noninterchangeable place and role. The term carries Weyl's order-from-small-scale-order pressure."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "mikrophysikalische Freiheit"
  kind: concept
  preferred: "microphysical freedom"
  alternatives: []
  status: open
  notes: "Jordan's phrase for locating life's control centers in the zone no longer governed by macroscopic causal determination. Weyl records the pressure but does not accept it as a complete account of freedom."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "biologisches Unbestimmtheitsprinzip"
  kind: concept
  preferred: "biological uncertainty principle"
  alternatives: []
  status: open
  notes: "Bohr's proposed biological extension of quantum uncertainty: physical investigation of living processes may have natural limits, analogous to measurement limits in atomic physics. Weyl keeps the content explicitly unsettled."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "Verstehen von innen her"
  kind: concept
  preferred: "understanding from within"
  alternatives:
    - "inward understanding"
    - "interpretation from within"
  status: open
  notes: "The nonconstructive route to life through direct self-awareness and interpretive grasp of other living beings. Weyl accepts it as a guide to important biological problems but denies that it can provide their objective theoretical solution. Appendix F repeats the limit: we do not know transcendental creative agencies in the same way we know thoughts and impulses through inward interpretation."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"
    - "parts/030-appendix-f-physische-welt.md"

- term: "hohles Symbol"
  kind: concept
  preferred: "empty symbol"
  alternatives:
    - "hollow symbol"
  status: open
  notes: "The freedom constructive theory has because its symbols are not already full concrete experience. Inward understanding lacks this freedom precisely because it is concrete and full."
  evidence:
    - "parts/029-appendix-e-physik-und-biologie.md"

- term: "Evolution / Schlußstein"
  kind: distinction
  preferred: "evolution / capstone"
  alternatives:
    - "development / capstone"
  status: open
  notes: "Appendix F's methodological claim: evolution is not the foundation of natural explanation but the capstone reached only after morphology, law, and inner constitution have been established."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "morphe"
  kind: concept
  preferred: "morphe"
  alternatives:
    - "form"
    - "primary form"
  status: open
  notes: "The title under which Weyl gathers the pronounced forms, regularities, temporal sequences, and relatively permanent structures first found by scientific ordering before full dynamic explanation."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "absolute Naturkonstanten"
  kind: concept
  preferred: "absolute natural constants"
  alternatives: []
  status: open
  notes: "The constants whose status tests physical explanation. Appendix F treats `c` and `h` as reducible to unit choice within relativity and quantum theory, while `e`, `α`, and `ε` remain deeper numerical mysteries."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "Elementarladung"
  kind: concept
  preferred: "elementary charge"
  alternatives: []
  status: seed
  notes: "The fixed charge `e` shared by charged elementary particles up to sign. For Weyl it cannot yet be explained like `c` or `h`; it remains a fundamental order fact."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "Ordnung / Beharrlichkeit"
  kind: distinction
  preferred: "order / persistence"
  alternatives:
    - "order / inertia"
  status: open
  notes: "Appendix F distinguishes fixed elementary-particle values from ordinary conservation by inertia. Elementary charge and mass require an ordering principle that fixes and restores determinate values, not mere persistence of arbitrary initial values."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "Kristallstruktur"
  kind: concept
  preferred: "crystal structure"
  alternatives:
    - "crystal symmetry"
  status: open
  notes: "The formal model for moving from visible morphology to hidden atomic structure. Weyl uses crystal groups, lattices, and space groups to show how classification can pass into dynamic explanation."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "diskret / kontinuierlich"
  kind: distinction
  preferred: "discrete / continuous"
  alternatives: []
  status: open
  notes: "Appendix F generalizes the crystal case: fixed group structure is discrete, while the compatible metric remains continuous. Weyl links this to morphology, nature/orientation, and constitution/environment."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "Konstitution / Umgebung"
  kind: distinction
  preferred: "constitution / environment"
  alternatives:
    - "inner constitution / outer conditions"
  status: open
  notes: "The schema for physical, chemical, genetic, and organismic features. Visible traits result from inner stable constitution under variable environmental conditions."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "nisus formativus"
  kind: concept
  preferred: "nisus formativus"
  alternatives:
    - "formative striving"
  status: open
  notes: "Weyl's phrase for nature's extravagant production of living form. It is descriptive pressure, not a promoted explanatory agent."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "Kosmogonie"
  kind: concept
  preferred: "cosmogony"
  alternatives: []
  status: seed
  notes: "The reconstruction of universe and stellar-system origins. Weyl treats Jeans and Lemaître as legitimate but provisional because cosmogony depends on prior physics of gravitation, atoms, and stellar constitution."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "Ontogenese / Phylogenese"
  kind: distinction
  preferred: "ontogeny / phylogeny"
  alternatives: []
  status: open
  notes: "Appendix F distinguishes individual development from evolutionary history and rejects treating Haeckel's biogenetic law as secure. Embryology may suggest common ancestry, but does not directly prove phylogeny."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "partikuläre Erblichkeit"
  kind: concept
  preferred: "particulate inheritance"
  alternatives: []
  status: seed
  notes: "The genetic replacement for blending inheritance. Because genes retain their nature through sexual reproduction, variation is not quickly homogenized away."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "Polyploidie"
  kind: concept
  preferred: "polyploidy"
  alternatives:
    - "whole chromosome-set duplication"
  status: seed
  notes: "A structural mutation in which the whole chromosome set is duplicated. Appendix F treats it as one important way new combinatorial species can arise."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "Protogene"
  kind: concept
  preferred: "protogenes"
  alternatives:
    - "first self-duplicating units"
  status: seed
  notes: "Oparin's speculative first self-duplicating units emerging from a prebiotic accumulation of organic molecules. Weyl treats the hypothesis as valuable but explicitly speculative."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "schöpferische Zufälle"
  kind: concept
  preferred: "creative chances"
  alternatives:
    - "creative accidents"
  status: open
  notes: "Jordan's origin-of-life pressure: life may begin as a special molecular event that happens once and starts an autocatalytic avalanche. Weyl records the possibility without treating it as established explanation."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"

- term: "Baupläne"
  kind: concept
  preferred: "plans"
  alternatives:
    - "structural plans"
    - "blueprints"
  status: open
  notes: "The speculative teleological pressure that images, ideas, or plans may enter evolution as immaterial factors. Appendix F keeps this visible but denies that such factors currently solve concrete biological problems."
  evidence:
    - "parts/030-appendix-f-physische-welt.md"
