    - "parts/026-appendix-b-ars-combinatoria.md"
    - "parts/030-appendix-f-physische-welt.md"

- term: "Bose-Einstein-Strahlungsstatistik"
  kind: concept
  preferred: "Bose-Einstein radiation statistics"
  alternatives:
