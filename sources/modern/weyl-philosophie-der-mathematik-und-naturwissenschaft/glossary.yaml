- term: "Zufall"
  kind: concept
  preferred: "chance"
  alternatives:
    - "randomness"
  status: open
  notes: "Section 23 treats chance through practical future-judgment, probability calculus, statistical physics, causal sensitivity, the ergodic program, and quantum probability. `Chance` keeps the life-world and physics pressures together."
  evidence:
