- term: "Tieferlegung der Fundamente"
  kind: concept
  preferred: "deepening of the foundations"
  alternatives:
    - "lowering of the foundations"
  status: open
  notes: "Hilbert's phrase for replacing a surface structure by a deeper foundation. Appendix D uses chemical valence as the case: Kekulé diagrams are grounded in quantum mechanics through an intermediate invariant-theoretic layer."
