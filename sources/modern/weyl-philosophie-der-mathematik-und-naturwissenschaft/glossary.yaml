- term: "chemische Valenz"
  kind: concept
  preferred: "chemical valence"
  alternatives: []
  status: open
  notes: "Appendix D treats chemical valence not as a primitive chemical line-count but as a mediated structure grounded in electron spin, antisymmetry, permutation symmetry, and quantum-mechanical bonding."
