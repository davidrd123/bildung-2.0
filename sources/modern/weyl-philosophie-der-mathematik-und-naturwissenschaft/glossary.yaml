- term: "Sündenfall und Erbsünde der Mengentheorie"
  kind: concept
  preferred: "fall and original sin of set theory"
  alternatives:
    - "fall and hereditary sin of set theory"
  status: open
  notes: "Weyl's Brouwerian diagnosis of the root error: an open field of infinite possibilities has been treated as a closed domain of independently existing things."
  evidence:
    - "parts/025-appendix-a-struktur-der-mathematik.md"

- term: "transzendentale Logik"
  kind: concept
  preferred: "transcendental logic"
  alternatives: []
  status: open
  notes: "The non-formal logical practice by which pre-Hilbert axiomatic systems use `not`, `if`, `there exists`, and `all` with their meanings intact. Appendix A also names Gödel's confidence in transcendental logic as the point where Weyl remains uneasy."
