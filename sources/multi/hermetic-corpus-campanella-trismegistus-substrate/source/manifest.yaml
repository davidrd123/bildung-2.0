known_gaps:
  - >
    Nock-Festugiere Bude volumes I-IV are the critical reference spine. Volume
    II is present as an ignored local private PDF/text extraction; volumes I and
    III-IV remain library/borrowing acquisitions if citation pressure reaches
    beyond the current Asclepius/CH XIII-XVIII tranche.
  - >
    PerseusDL has no Hermetic corpus surface in the checked canonical Greek
    tree. First1KGreek does have tlg1286, but it is Scott 1924 rather than
    Nock-Festugiere.
  - >
    First1KGreek tlg019 is a Scott-based Latin Asclepius TEI witness despite
    the work title "verba Graeca solum"; keep the 1505 Wayback transcription as
    the Renaissance transmission surface and verify critical claims against
    Nock-Festugiere volume II.
  - >
    Stobaeus OCR and First1KGreek tlg020 are discovery surfaces. Exact
    fragment boundaries and numbering need Nock-Festugiere III-IV confirmation.
sources:
  - id: asclepius-latin-critical
    cluster: direct-citation-and-statue-fabrication
    title: Asclepius
    language: Latin
    pressure: >
      Highest-pressure source. Leaf 0829 cites Ascl. 4 directly; leaf 0830
      treats the statue-making/factitious-gods passage.
    critical_reference:
      label: "A.D. Nock and A.-J. Festugiere, Corpus Hermeticum, vol. II"
      series: Collection des Universites de France
      publisher: Les Belles Lettres
      record_url: https://www.lesbelleslettres.com/livre/9782251001364/corpus-hermeticum-tome-ii-traites-xiii-xviii-asclepius
    local_private_reference:
      pdf: source/pdf/nock-festugiere-corpus-hermeticum-vol-2-asclepius-traite-xiii-xviii.pdf
      text_extract: source/local/critical/nock-festugiere-corpus-hermeticum-vol-2-asclepius-traite-xiii-xviii.txt
      note: "User-supplied local PDF; ignored by git and used for private citation checks."
    open_surfaces:
      - label: "Aussagenlogik transcription, archived Wayback copy of 1505 Stephanus volume"
        url: https://web.archive.org/web/20070117122532/http://www.aussagenlogik.org/asclepius-mercurii-trismegisti-dialogus/
        local: source/local/latin/asclepius-aussagenlogik-1505-wayback.html
        local_plain: source/latin/plain/asclepius-1505-stephanus-aussagenlogik-wayback.txt
      - label: "First1KGreek tlg1286.tlg019, Scott 1924 Latin Asclepius TEI"
        url: https://github.com/OpenGreekAndLatin/First1KGreek/tree/master/data/tlg1286/tlg019
        local_tei: source/greek/tei/tlg1286.tlg019.1st1K-lat1.xml
        local_plain: source/greek/plain/tlg1286.tlg019.1st1K-lat1.txt
        note: "Search surface only; not the Renaissance transmission witness and not the critical citation authority."
      - label: "Augustine, De Civitate Dei VIII.23-26, Latin Library counter-witness"
        url: https://www.thelatinlibrary.com/augustine/civ8.shtml
      - label: "Augustine, De Civitate Dei VIII.23-26, Bibliotheca Augustana counter-witness"
        url: https://www.hs-augsburg.de/~harsch/Chronologia/Lspost05/Augustinus/aug_cd08.html
