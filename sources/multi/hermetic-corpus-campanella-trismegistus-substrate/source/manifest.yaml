title: Hermetic Corpus for Campanella Trismegistus Substrate
status: live-bounded-substrate
source_quality: >
  Mixed shelf: First1KGreek TEI from Scott 1924, critical-reference records,
  open HTML witnesses, public-domain OCR/PDF scan witnesses, and ignored local
  acquisitions for private work.
purpose: >
  Supports Campanella Metaphysica Liber XV leaves 0829-0830, where Mercury
  Trismegistus supplies the direct Hermetic substrate for divine governance,
  fate, the World/Human triad, regeneration, decans, and statue fabrication.
generated_plain_text:
  first1k_tlg1286:
    tool_from_shelf_root: ../../../greek/tools/tei_to_plain.py
    input_dir: source/greek/tei
    output_dir: source/greek/plain
  latin_wayback_1505:
    tool_from_shelf_root: tools/aussagenlogik_html_to_plain.py
    input_dir: source/local/latin
    output_dir: source/latin/plain
acquisition_policy:
  ignored_local_dirs:
    - source/local/
    - source/pdf/
    - source/page-images/
    - source/abbyy/
  note: >
    Local scans, PDFs, OCR, and copied web witnesses are for private source
    work. Keep tracked files limited to manifest/readme-level source mapping
    unless an explicitly open-license text surface is added later.
tracked_search_surfaces:
  first1k_tlg1286:
    source_repo: OpenGreekAndLatin/First1KGreek
    source_dir: https://github.com/OpenGreekAndLatin/First1KGreek/tree/master/data/tlg1286
    edition_note: "Walter Scott, Hermetica, Oxford 1924; use for search, verify against Nock-Festugiere for citation."
    local_tei_dir: source/greek/tei
    local_plain_dir: source/greek/plain
  ficino_asclepius_1505_wayback:
    source_note: "Aussagenlogik transcriptions of the 1505 Stephanus Pimander/Asclepius volume, captured from Wayback."
    local_html:
      - source/local/latin/ficino-pimander-i-ix-aussagenlogik-1505-wayback.html
      - source/local/latin/ficino-pimander-x-xiv-aussagenlogik-1505-wayback.html
      - source/local/latin/asclepius-aussagenlogik-1505-wayback.html
    local_plain:
      - source/latin/plain/ficino-pimander-i-ix-1505-stephanus-aussagenlogik-wayback.txt
      - source/latin/plain/ficino-pimander-x-xiv-1505-stephanus-aussagenlogik-wayback.txt
      - source/latin/plain/asclepius-1505-stephanus-aussagenlogik-wayback.txt
