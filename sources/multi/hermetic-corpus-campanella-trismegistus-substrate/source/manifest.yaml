  - id: patrizi-nova-de-universis-philosophia-1591
    cluster: near-contemporary-reception-witness
    title: Nova de universis philosophia
    language: Latin
    author: Francesco Patrizi
    pressure: >
      Near-contemporary Hermetic compilation and reception frame. Record as a
      control witness for Renaissance Hermetic ordering, but do not let it
