      file: sources/latin/campanella-metaphysica/parts/part-iii-xv-013-leaf-0829-mercury-trismegistus-on-governance.md
      pressure_summary: >
        Monotriad, Word, mind, fate, divine governance, Ascl. 4 anthropology,
        Pantomorphon, 36 horoscopes/faces, and zodiacal form-sealing.
    - leaf: "0830"
