status: direct-volume-chapter-substrate
purpose: >
  Make Cassirer's three localized Philosophie der symbolischen Formen volumes
  searchable at full-volume and direct chapter-file resolution without
  promoting the scaffold to a texts campaign.

use_policy:
  direct_chapter_files: "Search, browsing, and exploratory engagement surfaces; verify against the authority PDF or normalized tranches before quotation-grade claims."
  normalized_files: "Working-level checked surfaces; still not a full critical edition."
  full_text: "Broad search surface for terms and phrase discovery."

