    file: raw/071-55-eine-urteilskraft-die-dialektisch-sein-soll-mu-zuvorderst-vernunfteln.txt
    kind: section
    slug: 55-eine-urteilskraft-die-dialektisch-sein-soll-mu-zuvorderst-vernunfteln
    title: "§ 55 Eine Urteilskraft, die dialektisch sein soll, muß zuvörderst vernünftelnd sein; d. i. die Urteile derselben müssen auf Allgemeinheit, und zwar a priori, Anspruch machen*: denn in solcher Urteile Entgegensetzung besteht die Dialektik. Daher ist die Unvereinbarkeit ästhetischer Sinnesurteile (über das Angenehme und Unangenehme) nicht dialektisch."
    parent: zweiter-abschnitt-die-dialektik
