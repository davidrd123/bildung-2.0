witness_policy:
  visual_authority: "Use original single-page JP2 images as the preferred visual witness for IA Pott pages once they land; use the GS VII/1 Google Books PDF as the current citation witness for Cassirer's GS VII references."
  ocr_priority:
    - "Inspect HOCR/CHOCR first for page-level OCR and layout evidence."
    - "Use FULL TEXT and OCR SEARCH TEXT for search and orientation only."
    - "Use local Tesseract OCR on JP2 samples when IA OCR is missing, misaligned, or too noisy."
  mapping_policy:
    - "Count JP2 files and detect sequence gaps before deriving page offsets."
    - "Anchor physical leaves to printed pages from visible page images."
    - "Record calculated offsets as provisional until several anchors agree."
  coverage_policy:
    - "Do not promote Band I extracts as Humboldt primary text unless a bounded check proves the passage is Humboldt's own wording."
    - "Use Band I for Pott's reception, apparatus, and edition framing."
    - "Locate the companion volume before beginning Humboldt main-text extraction."

